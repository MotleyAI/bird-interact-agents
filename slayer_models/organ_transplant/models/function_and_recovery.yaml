version: 3
name: function_and_recovery
sql_table: function_and_recovery
query_variables: {}
data_source: organ_transplant
columns:
- name: recov_don_registry
  sql: recov_don_registry
  type: string
  primary_key: true
  description: FK to demographics.contrib_registry. One row per donor.
  hidden: false
- name: don_crtn_val
  sql: don_crtn_val
  type: string
  primary_key: false
  description: Donor serum creatinine as text, e.g. '1.62 mg/dL'. See don_creatinine_mgdl.
  hidden: false
- name: don_gfr_val
  sql: don_gfr_val
  type: string
  primary_key: false
  description: "Donor GFR as text, e.g. '103.4 mL/min/1.73m\xB2'. See don_gfr_mlmin."
  hidden: false
- name: don_co_desc
  sql: don_co_desc
  type: string
  primary_key: false
  description: Donor cause of death (text, e.g. 'Anoxia, ...'). KB Cause of Death
    Impact / Anoxia.
  hidden: false
  meta:
    kb_ids:
    - 32
    - 47
- name: org_recov_dt
  sql: org_recov_dt
  type: string
  primary_key: false
  description: Date/time organ was recovered.
  hidden: false
- name: org_presv_meth
  sql: org_presv_meth
  type: string
  primary_key: false
  description: Organ preservation method (raw text). KB Static Cold Storage.
  hidden: false
- name: org_isch_time
  sql: org_isch_time
  type: string
  primary_key: false
  description: Cold ischemia time text, e.g. '702 mins'. See cold_ischemia_minutes.
    KB Cold Ischemia.
  hidden: false
  meta:
    kb_id: 21
- name: organfuncassess
  sql: organfuncassess
  type: string
  primary_key: false
  description: 'JSON: {Liv_Func, Card_Func, Pulm_Func} status bands (Normal/Mild/Moderate/Severe).
    KB LFT Values.'
  hidden: false
  meta:
    kb_ids:
    - 49
- name: don_creatinine_mgdl
  sql: CAST(substr(don_crtn_val, 1, instr(don_crtn_val, ' ') - 1) AS REAL)
  type: number
  primary_key: false
  description: Donor serum creatinine (mg/dL), parsed.
  hidden: false
  meta:
    kb_id: 41
- name: don_creatinine_band
  sql: CASE WHEN CAST(substr(don_crtn_val, 1, instr(don_crtn_val, ' ') - 1) AS REAL)
    < 0.7 THEN 'Low' WHEN CAST(substr(don_crtn_val, 1, instr(don_crtn_val, ' ') -
    1) AS REAL) <= 1.3 THEN 'Normal' WHEN CAST(substr(don_crtn_val, 1, instr(don_crtn_val,
    ' ') - 1) AS REAL) < 2.0 THEN 'Elevated' ELSE 'High' END
  type: string
  primary_key: false
  description: 'Banded serum creatinine: <0.7 Low, 0.7-1.3 Normal, 1.3-2.0 Elevated,
    >=2.0 High (KB Serum Creatinine Levels).'
  hidden: false
  meta:
    kb_ids:
    - 41
- name: don_gfr_mlmin
  sql: CAST(substr(don_gfr_val, 1, instr(don_gfr_val, ' ') - 1) AS REAL)
  type: number
  primary_key: false
  description: "Donor GFR in mL/min/1.73m\xB2, parsed."
  hidden: false
  meta:
    kb_id: 42
- name: don_gfr_band
  sql: CASE WHEN CAST(substr(don_gfr_val, 1, instr(don_gfr_val, ' ') - 1) AS REAL)
    > 90 THEN 'Normal' WHEN CAST(substr(don_gfr_val, 1, instr(don_gfr_val, ' ') -
    1) AS REAL) >= 60 THEN 'Mild' WHEN CAST(substr(don_gfr_val, 1, instr(don_gfr_val,
    ' ') - 1) AS REAL) >= 30 THEN 'Moderate' WHEN CAST(substr(don_gfr_val, 1, instr(don_gfr_val,
    ' ') - 1) AS REAL) >= 15 THEN 'Severe' ELSE 'Failure' END
  type: string
  primary_key: false
  description: 'GFR stages: >90 Normal, 60-90 Mild, 30-59 Moderate, 15-29 Severe,
    <15 Failure (KB GFR Values).'
  hidden: false
  meta:
    kb_ids:
    - 42
- name: is_anoxia_death
  sql: CASE WHEN don_co_desc LIKE 'Anoxia%' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: True when donor cause of death starts with 'Anoxia' (KB Anoxia).
  hidden: false
  meta:
    kb_ids:
    - 32
- name: is_static_cold_storage
  sql: CASE WHEN org_presv_meth LIKE 'Static cold storage%' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: True when preservation method is Static Cold Storage (KB Static Cold
    Storage).
  hidden: false
  meta:
    kb_id: 30
- name: cold_ischemia_minutes
  sql: CAST(substr(org_isch_time, 1, instr(org_isch_time, ' ') - 1) AS REAL)
  type: number
  primary_key: false
  description: Donor-side cold ischemia time in minutes (parsed). KB Cold Ischemia.
  hidden: false
  meta:
    kb_ids:
    - 21
- name: egfr_computed
  sql: 141 * pow(CAST(substr(don_crtn_val, 1, instr(don_crtn_val, ' ') - 1) AS REAL)
    / 0.9, -0.411) * pow(0.993, CAST(substr(demographics.age_count, 1, instr(demographics.age_count,
    ' ') - 1) AS INTEGER))
  type: number
  primary_key: false
  description: Estimated GFR via simplified KB formula 141 * (Cr/0.9)^-0.411 * 0.993^Age
    (males). Compare to don_gfr_mlmin.
  hidden: false
  meta:
    kb_id: 3
- name: renal_function_score
  sql: (1.0 * CAST(substr(don_gfr_val, 1, instr(don_gfr_val, ' ') - 1) AS REAL)) -
    (10.0 * CAST(substr(don_crtn_val, 1, instr(don_crtn_val, ' ') - 1) AS REAL))
  type: number
  primary_key: false
  description: Renal Function Score = 1.0*eGFR - 10.0*Cr (uses observed don_gfr_mlmin
    as eGFR).
  hidden: false
  meta:
    kb_id: 9
- name: liv_func
  sql: json_extract(organfuncassess, '$.Liv_Func')
  type: string
  primary_key: false
  description: Donor liver function band parsed from organfuncassess (KB Liver Function
    Test (LFT) Values).
  hidden: false
  meta:
    kb_ids:
    - 49
- name: card_func
  sql: json_extract(organfuncassess, '$.Card_Func')
  type: string
  primary_key: false
  description: Donor cardiac function band parsed from organfuncassess.
  hidden: false
- name: pulm_func
  sql: json_extract(organfuncassess, '$.Pulm_Func')
  type: string
  primary_key: false
  description: Donor pulmonary function band parsed from organfuncassess.
  hidden: false
measures: []
aggregations: []
joins:
- target_model: demographics
  join_pairs:
  - - recov_don_registry
    - contrib_registry
  join_type: left
filters: []
description: 'Per-donor organ recovery + function data: serum creatinine, GFR, cause
  of death, recovery timestamp, preservation method, cold ischemia time, and a JSON
  organfuncassess (Liv/Card/Pulm function bands).'
hidden: false
