version: 3
name: demographics
sql_table: demographics
query_variables: {}
data_source: organ_transplant
columns:
- name: contrib_registry
  sql: contrib_registry
  type: string
  primary_key: true
  description: Donor primary key.
  hidden: false
- name: age_count
  sql: age_count
  type: string
  primary_key: false
  description: Donor age (text, e.g. '57 years, mature donor'). Use donor_age_years
    for the numeric value.
  hidden: false
- name: blood_class
  sql: blood_class
  type: string
  primary_key: false
  description: Donor ABO blood type (raw text with descriptive suffix, e.g. 'A+ common
    type ...'). See blood_type_code.
  hidden: false
- name: nation_ref
  sql: nation_ref
  type: string
  primary_key: false
  hidden: false
- name: physicalstats
  sql: physicalstats
  type: string
  primary_key: false
  description: 'Raw JSON: {Height_Cm, Weight_Kg, Bmi_Value, Gender_Type, Ethnicity}.
    See parsed sibling columns.'
  hidden: false
- name: donor_age_years
  sql: CAST(substr(age_count, 1, instr(age_count, ' ') - 1) AS INTEGER)
  type: number
  primary_key: false
  description: Donor age in years parsed from age_count.
  hidden: false
- name: blood_type_code
  sql: CASE WHEN blood_class LIKE 'AB+%' THEN 'AB+' WHEN blood_class LIKE 'AB-%' THEN
    'AB-' WHEN blood_class LIKE 'A+%' THEN 'A+' WHEN blood_class LIKE 'A-%' THEN 'A-'
    WHEN blood_class LIKE 'B+%' THEN 'B+' WHEN blood_class LIKE 'B-%' THEN 'B-' WHEN
    blood_class LIKE 'O+%' THEN 'O+' WHEN blood_class LIKE 'O-%' THEN 'O-' END
  type: string
  primary_key: false
  description: Parsed donor ABO+Rh blood type code.
  hidden: false
- name: donor_height_cm
  sql: CAST(json_extract(physicalstats, '$.Height_Cm') AS REAL)
  type: number
  primary_key: false
  description: Donor height in cm (parsed from physicalstats JSON).
  hidden: false
- name: donor_weight_kg
  sql: CAST(json_extract(physicalstats, '$.Weight_Kg') AS REAL)
  type: number
  primary_key: false
  description: Donor weight in kg (parsed from physicalstats JSON).
  hidden: false
- name: donor_bmi_value
  sql: CAST(json_extract(physicalstats, '$.Bmi_Value') AS REAL)
  type: number
  primary_key: false
  description: 'Donor BMI as reported in physicalstats JSON. KB Body Mass Index (BMI):
    weight_kg / height_m^2.'
  hidden: false
  meta:
    kb_id: 0
- name: donor_bmi_computed
  sql: CAST(json_extract(physicalstats, '$.Weight_Kg') AS REAL) / pow(CAST(json_extract(physicalstats,
    '$.Height_Cm') AS REAL) / 100.0, 2)
  type: number
  primary_key: false
  description: Donor BMI re-computed via the KB formula weight_kg / (height_m^2).
    Use to validate physicalstats.Bmi_Value.
  hidden: false
  meta:
    kb_ids:
    - 0
- name: donor_bmi_category
  sql: CASE WHEN CAST(json_extract(physicalstats, '$.Bmi_Value') AS REAL) < 18.5 THEN
    'Underweight' WHEN CAST(json_extract(physicalstats, '$.Bmi_Value') AS REAL) <
    25 THEN 'Normal' WHEN CAST(json_extract(physicalstats, '$.Bmi_Value') AS REAL)
    < 30 THEN 'Overweight' ELSE 'Obese' END
  type: string
  primary_key: false
  description: 'Standard BMI bands: <18.5 underweight, 18.5-24.9 normal, 25-29.9 overweight,
    >=30 obese.'
  hidden: false
  meta:
    kb_id: 40
- name: donor_gender
  sql: json_extract(physicalstats, '$.Gender_Type')
  type: string
  primary_key: false
  description: Donor gender (M/F).
  hidden: false
- name: donor_ethnicity
  sql: json_extract(physicalstats, '$.Ethnicity')
  type: string
  primary_key: false
  description: Donor ethnicity.
  hidden: false
measures: []
aggregations: []
joins:
- target_model: medical_history
  join_pairs:
  - - contrib_registry
    - contrib_med_registry
  join_type: left
- target_model: function_and_recovery
  join_pairs:
  - - contrib_registry
    - recov_don_registry
  join_type: left
- target_model: hla_info
  join_pairs:
  - - contrib_registry
    - immu_don_registry
  join_type: left
filters: []
description: 'Donor demographics: one row per organ donor, keyed by contrib_registry.
  Holds donor age, ABO blood type, nationality, and a JSON physicalstats blob (height,
  weight, BMI, gender, ethnicity).'
hidden: false
