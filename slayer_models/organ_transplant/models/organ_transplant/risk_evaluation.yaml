version: 5
name: risk_evaluation
sql_table: risk_evaluation
query_variables: {}
data_source: organ_transplant
columns:
- name: risk_eval_registry
  sql: risk_eval_registry
  type: TEXT
  primary_key: true
  description: FK to transplant_matching.match_rec_registry.
  hidden: false
- name: org_qual_val
  sql: org_qual_val
  type: INT
  primary_key: false
  description: Organ quality score.
  hidden: false
  format:
    type: integer
- name: egs_val
  sql: egs_val
  type: INT
  primary_key: false
  description: "Expected Graft Survival (EGS) probability stored upstream (0-1). Predictive\
    \ score per KB formula based on Immunological Compatibility Score and donor age.\n\
    \n[kb=13]\nA predictive score based on factors like the Immunological Compatibility\
    \ Score and donor age. Formula: $EGS = \\frac{1}{1 + e^{-(-0.5 + 1.5 S_{immune}\
    \ - 0.02 Age_{donor})}}$ \u2014 Predicts the probability of a transplanted organ\
    \ functioning successfully over a specific period.\n[/kb=13]"
  label: Expected Graft Survival (EGS) Score
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 13
- name: eps_val
  sql: eps_val
  type: INT
  primary_key: false
  description: Expected patient survival score.
  hidden: false
  format:
    type: integer
- name: surg_cmpl_val
  sql: surg_cmpl_val
  type: INT
  primary_key: false
  description: Surgical complexity (proxy for KB C_procedure).
  hidden: false
  format:
    type: integer
- name: surg_risk_val
  sql: surg_risk_val
  type: INT
  primary_key: false
  description: "Surgical Risk Score (KB) as stored. Note: ~has random NULLs; use COALESCE\
    \ when composing. KB Surgical Risk Score.\n\n[kb=16]\nA composite score derived\
    \ from the recipient's comorbidities and the inherent complexity of the surgical\
    \ procedure. Formula: $S_{surgical} = 0.6 \\times N_{comorbidities} + 0.4 \\times\
    \ C_{procedure}$, where components are normalized. \u2014 A score assessing the\
    \ risk associated with the transplant surgery itself.\n[/kb=16]"
  label: Surgical Risk Score
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 16
- name: res_avail_val
  sql: res_avail_val
  type: INT
  primary_key: false
  description: Resource availability score.
  hidden: false
  format:
    type: integer
- name: cntr_exp_val
  sql: cntr_exp_val
  type: INT
  primary_key: false
  description: Center experience score.
  hidden: false
  format:
    type: integer
- name: cntr_vol_val
  sql: cntr_vol_val
  type: INT
  primary_key: false
  description: Center transplant volume score (KB V_transplants in Center Performance
    Score).
  hidden: false
  format:
    type: integer
- name: cntr_out_val
  sql: cntr_out_val
  type: INT
  primary_key: false
  description: Center outcomes/success rate score (KB R_success in Center Performance
    Score).
  hidden: false
  format:
    type: integer
- name: qol_val
  sql: qol_val
  type: INT
  primary_key: false
  description: Quality of life assessment score.
  hidden: false
  format:
    type: integer
- name: cost_eff_val
  sql: cost_eff_val
  type: INT
  primary_key: false
  description: Cost-effectiveness score (0-1) from upstream system.
  hidden: false
  format:
    type: integer
- name: alloc_prio_val
  sql: alloc_prio_val
  type: INT
  primary_key: false
  description: Allocation priority score from upstream.
  hidden: false
  format:
    type: integer
- name: donor_ref_reg
  sql: donor_ref_reg
  type: TEXT
  primary_key: false
  description: FK to demographics.contrib_registry.
  hidden: false
- name: recip_ref_reg
  sql: recip_ref_reg
  type: TEXT
  primary_key: false
  description: FK to recipients_demographics.recip_registry.
  hidden: false
- name: riskmetrics
  sql: riskmetrics
  type: TEXT
  primary_key: false
  description: 'JSON: {Immun_Risk, Infect_Risk, Reject_Risk, Cmpl_Risk, Readmit_Risk,
    Mort_Risk}.'
  hidden: false
- name: cost_qaly
  sql: cost_qaly
  type: TEXT
  primary_key: false
  description: "Cost-effectiveness per QALY text, e.g. '53700 USD/QALY'. Data carrier\
    \ \u2014 the parsed numeric is in cost_per_qaly_usd (KB 12 CER formula) and the\
    \ band is in cost_effectiveness_band (KB 48 thresholds)."
  label: Cost-Effectiveness per QALY (raw text)
  hidden: false
  meta: {}
- name: resource_consumption
  sql: resource_consumption
  type: TEXT
  primary_key: false
  description: Resource consumption text, e.g. '11.34 units/day'.
  hidden: false
- name: staff
  sql: staff
  type: TEXT
  primary_key: false
  description: Staff hours text, e.g. '15.47 hrs/case'.
  hidden: false
- name: surg_risk_score_computed
  sql: 0.6 * (CASE WHEN recipients_demographics__clinical.comorbid_detail IS NULL
    OR recipients_demographics__clinical.comorbid_detail = '' THEN 0 ELSE (length(recipients_demographics__clinical.comorbid_detail)
    - length(replace(recipients_demographics__clinical.comorbid_detail, ',', ''))
    + 1) END) / 5.0 + 0.4 * COALESCE(surg_cmpl_val, 0)
  type: DOUBLE
  primary_key: false
  description: "Surgical Risk Score = 0.6*N_comorbidities/5 + 0.4*C_procedure (KB;\
    \ N_comorbidities/5 used as a 0-1 normalization with 5 conditions considered max).\
    \ Pulls comorbidity count from clinical via recip join.\n\n[kb=16]\nA composite\
    \ score derived from the recipient's comorbidities and the inherent complexity\
    \ of the surgical procedure. Formula: $S_{surgical} = 0.6 \\times N_{comorbidities}\
    \ + 0.4 \\times C_{procedure}$, where components are normalized. \u2014 A score\
    \ assessing the risk associated with the transplant surgery itself.\n[/kb=16]"
  label: Surgical Risk Score
  hidden: false
  meta:
    kb_id: 16
- name: center_performance_score
  sql: 0.6 * COALESCE(cntr_vol_val, 0) + 0.4 * COALESCE(cntr_out_val, 0)
  type: DOUBLE
  primary_key: false
  description: "Center Performance Score = 0.6*V_transplants + 0.4*R_success (KB).\n\
    \n[kb=15]\nA weighted average of a center's transplant volume and its post-transplant\
    \ success rates. Formula: $S_{center} = 0.6 \\times V_{transplants} + 0.4 \\times\
    \ R_{success}$ \u2014 A score evaluating a transplant center's performance based\
    \ on its experience and patient outcomes.\n[/kb=15]"
  label: Center Performance Score
  hidden: false
  meta:
    kb_id: 15
- name: immun_risk
  sql: CAST(json_extract(riskmetrics, '$.Immun_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Immunological risk parsed from riskmetrics.
  hidden: false
- name: infect_risk
  sql: CAST(json_extract(riskmetrics, '$.Infect_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Infection risk parsed from riskmetrics.
  hidden: false
- name: reject_risk
  sql: CAST(json_extract(riskmetrics, '$.Reject_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Rejection risk parsed from riskmetrics.
  hidden: false
- name: cmpl_risk
  sql: CAST(json_extract(riskmetrics, '$.Cmpl_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Complication risk parsed from riskmetrics.
  hidden: false
- name: readmit_risk
  sql: CAST(json_extract(riskmetrics, '$.Readmit_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Readmission risk parsed from riskmetrics.
  hidden: false
- name: mort_risk
  sql: CAST(json_extract(riskmetrics, '$.Mort_Risk') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Mortality risk parsed from riskmetrics.
  hidden: false
- name: readmission_risk_index
  sql: 0.1 + 0.05 * (CASE WHEN recipients_demographics__clinical.comorbid_detail IS
    NULL OR recipients_demographics__clinical.comorbid_detail = '' THEN 0 ELSE (length(recipients_demographics__clinical.comorbid_detail)
    - length(replace(recipients_demographics__clinical.comorbid_detail, ',', ''))
    + 1) END) + 0.2 * COALESCE(surg_risk_val, 0)
  type: DOUBLE
  primary_key: false
  description: "Readmission Risk Index = 0.1 + 0.05*N_conditions + 0.2*S_surgical\
    \ (KB).\n\n[kb=19]\nA risk index calculated from the number of pre-existing medical\
    \ conditions and the Surgical Risk Score. Formula: $I_{readmission} = 0.1 + (0.05\
    \ \\times N_{conditions}) + (0.2 \\times S_{surgical})$ \u2014 A predictive index\
    \ for the likelihood of a patient being readmitted to the hospital post-transplant.\n\
    [/kb=19]"
  label: Readmission Risk Index
  hidden: false
  meta:
    kb_id: 19
- name: cost_per_qaly_usd
  sql: CAST(substr(cost_qaly, 1, instr(cost_qaly, ' ') - 1) AS REAL)
  type: DOUBLE
  primary_key: false
  description: "Cost per QALY in USD parsed from cost_qaly. KB Cost-Effectiveness\
    \ Ratio = Cost_net / QALY_gained.\n\n[kb=12]\nThe ratio of the net cost of an\
    \ intervention to its net health gain. Formula: $CER = \\frac{Cost_{net}}{QALY_{gained}}$\
    \ \u2014 Calculates the cost per unit of health outcome, often using Quality-Adjusted\
    \ Life Year (QALY).\n[/kb=12]"
  label: Cost-Effectiveness Ratio (CER)
  hidden: false
  meta:
    kb_id: 12
- name: cost_effectiveness_band
  sql: CASE WHEN CAST(substr(cost_qaly, 1, instr(cost_qaly, ' ') - 1) AS REAL) < 50000
    THEN 'High value' WHEN CAST(substr(cost_qaly, 1, instr(cost_qaly, ' ') - 1) AS
    REAL) <= 150000 THEN 'Acceptable' ELSE 'Low value' END
  type: TEXT
  primary_key: false
  description: "Cost-Effectiveness Threshold band per KB Thresholds: <$50k high value,\
    \ $50k-$150k acceptable, >$150k low value (US benchmark).\n\n[kb=48]\nA common\
    \ benchmark for the Cost-Effectiveness Ratio (CER) in the US is $50,000 to $150,000\
    \ per Quality-Adjusted Life Year (QALY) gained. Interventions below this threshold\
    \ are generally considered a good value. \u2014 Illustrates typical thresholds\
    \ for considering a medical intervention as cost-effective.\n[/kb=48]"
  label: Cost-Effectiveness Thresholds
  hidden: false
  meta:
    kb_id: 48
- name: resource_units_per_day
  sql: CAST(substr(resource_consumption, 1, instr(resource_consumption, ' ') - 1)
    AS REAL)
  type: DOUBLE
  primary_key: false
  description: Daily resource units (parsed).
  hidden: false
- name: staff_hours_per_case
  sql: CAST(substr(staff, 1, instr(staff, ' ') - 1) AS REAL)
  type: DOUBLE
  primary_key: false
  description: Staff hours per case (parsed).
  hidden: false
- name: graft_survival_outcome
  sql: CASE WHEN egs_val IS NULL THEN NULL WHEN egs_val >= 0.5 THEN 'Successful' ELSE
    'At Risk' END
  type: TEXT
  primary_key: false
  description: "Graft Survival outcome band (KB 28). Threshold (>= 0.5 = Successful)\
    \ is a documented common interpretation since KB 28 is descriptive prose, not\
    \ a numeric threshold.\n\n[kb=28]\nA key outcome measure in transplantation. Successful\
    \ Graft Survival means the organ is performing its intended biological functions\
    \ without signs of rejection or failure. \u2014 Refers to the period of time a\
    \ transplanted organ continues to function properly within the recipient's body.\n\
    [/kb=28]"
  label: Graft Survival
  hidden: false
  meta:
    kb_id: 28
measures: []
aggregations: []
joins:
- target_model: demographics
  join_pairs:
  - - donor_ref_reg
    - contrib_registry
  join_type: left
- target_model: recipients_demographics
  join_pairs:
  - - recip_ref_reg
    - recip_registry
  join_type: left
- target_model: transplant_matching
  join_pairs:
  - - risk_eval_registry
    - match_rec_registry
  join_type: left
filters: []
description: 'Per-match risk + cost evaluation: organ quality, EGS/EPS, surgical complexity/risk,
  resource availability, center scores, QoL, cost-effectiveness, allocation priority,
  plus a riskmetrics JSON (Immun/Infect/Reject/Cmpl/Readmit/Mort) and parsed cost_qaly
  / resource / staff text.'
hidden: false
