  description: "Donor HLA-A antigen typing value. KB HLA Typing.\n\n[kb=22]\nA genetic\
    \ test that identifies a person's unique HLA markers. A closer HLA match between\
    \ a donor and recipient reduces the risk of the recipient's immune system attacking,\
    \ or rejecting, the transplanted organ. \u2014 The process of identifying specific\
    \ HLA protein markers on a person's cells to match a donor with a recipient for\
    \ transplantation.\n[/kb=22]"
  label: Human Leukocyte Antigen (HLA) Typing
  hidden: false
