version: 3
name: analyticsindicators
sql_table: analyticsindicators
query_variables: {}
data_source: crypto
columns:
- name: analyticsindicatorsnode
  sql: analyticsindicatorsnode
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: mdataref
  sql: mdataref
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: mstatsref
  sql: mstatsref
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: market_sentiment_indicators
