description: "Market Efficiency Ratio / MER (KB #9) per order: Slippage Impact / slipratio.\
  \ Slippage Impact comes from the slippage_impact model (KB #1); slipratio is taken\
  \ from the most-recent systemmonitoring row (global gauge), cross-joined via a constant\
  \ key.\n\n[kb=9]\nMER = \\frac{Slippage Impact}{slipratio}, \\text{where } Slippage\
  \ Impact \\text{ is the calculated expected slippage and } slipratio \\text{ is\
  \ the average slippage measure.} \u2014 Measures how efficiently orders are executed\
  \ compared to expected slippage.\n[/kb=9]"
