version: 5
name: market_efficiency_ratio
source_queries:
- version: 3
  name: latest_slipratio_v
  source_model:
    source_name: systemmonitoring
    columns:
    - name: join_key
      type: DOUBLE
      sql: '1'
  dimensions:
  - name: slipratio
  - name: join_key
  order:
  - column:
      name: systemmonitoringpivot
    direction: desc
  limit: 1
  whole_periods_only: false
- version: 3
  source_model:
    source_name: slippage_impact
    columns:
    - name: join_key
      type: DOUBLE
      sql: '1'
    joins:
    - target_model: latest_slipratio_v
      join_pairs:
      - - join_key
        - join_key
  measures:
  - formula: slippage_impact:max / latest_slipratio_v.slipratio:max
    name: mer_value
  dimensions:
  - name: recordvault
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"slippage_impact.recordvault\" AS recordvault, \"slippage_impact.slippage_impact_max\"\
  \ AS slippage_impact_max, \"slippage_impact.mer_value\" AS mer_value, \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  \ AS latest_slipratio_v__slipratio_max FROM (WITH _base AS (\nSELECT\n  slippage_impact.recordvault\
  \ AS \"slippage_impact.recordvault\",\n  MAX(slippage_impact.slippage_impact) AS\
  \ \"slippage_impact.slippage_impact_max\"\nFROM (\n  SELECT\n    \"orders.recordvault\"\
  \ AS recordvault,\n    \"orders.slippage_impact\" AS slippage_impact\n  FROM (\n\
  \    SELECT\n      orders.recordvault AS \"orders.recordvault\",\n      orders.dealcount\
  \ / NULLIF(\n        CASE\n          WHEN orders.dealedge = 'Buy'\n          THEN\
  \ depth_per_pair.askunits_avg\n          ELSE depth_per_pair.bidunits_avg\n    \
  \    END,\n        0\n      ) * depth_per_pair.spreadband_avg AS \"orders.slippage_impact\"\
  \n    FROM orders AS orders\n    LEFT JOIN (\n      (\n        SELECT\n        \
  \  \"marketdata.mktcombo\" AS mktcombo,\n          \"marketdata.bidunits_avg\" AS\
  \ bidunits_avg,\n          \"marketdata.askunits_avg\" AS askunits_avg,\n      \
  \    \"marketdata.spreadband_avg\" AS spreadband_avg\n        FROM (\n         \
  \ SELECT\n            marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\
  \ AS \"marketdata.mktcombo\",\n            AVG(marketdata.quote_depth_snapshot ->>\
  \ '$.depth.bidunits') AS \"marketdata.bidunits_avg\",\n            AVG(marketdata.quote_depth_snapshot\
  \ ->> '$.depth.askunits') AS \"marketdata.askunits_avg\",\n            AVG(marketdata.quote_depth_snapshot\
  \ ->> '$.spread.spreadband') AS \"marketdata.spreadband_avg\"\n          FROM marketdata\
  \ AS marketdata\n          GROUP BY\n            marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo'\n        ) AS _inner\n      )\n    ) AS depth_per_pair\n\
  \      ON orders.mktnote = depth_per_pair.mktcombo\n  ) AS _inner\n) AS slippage_impact\n\
  GROUP BY\n  slippage_impact.recordvault\n),\n_cm_slippage_impact__latest_slipratio_v__slipratio_max\
  \ AS (\nSELECT\n  MAX(latest_slipratio_v.slipratio) AS \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  \nFROM (\n  SELECT\n    \"systemmonitoring.slipratio\" AS slipratio,\n    \"systemmonitoring.join_key\"\
  \ AS join_key\n  FROM (\n    SELECT\n      systemmonitoring.slipratio AS \"systemmonitoring.slipratio\"\
  ,\n      1 AS \"systemmonitoring.join_key\"\n    FROM systemmonitoring AS systemmonitoring\n\
  \    ORDER BY\n      \"systemmonitoring.systemmonitoringpivot\" DESC\n    LIMIT\
  \ 1\n  ) AS _inner\n) AS latest_slipratio_v\n),\n_combined AS (\nSELECT _base.\"\
  slippage_impact.recordvault\", _base.\"slippage_impact.slippage_impact_max\", _cm_slippage_impact__latest_slipratio_v__slipratio_max.\"\
  slippage_impact.latest_slipratio_v.slipratio_max\"\nFROM _base\nCROSS JOIN _cm_slippage_impact__latest_slipratio_v__slipratio_max\n\
  ),\nstep1 AS (\nSELECT\n    \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  ,\n    \"slippage_impact.recordvault\",\n    \"slippage_impact.slippage_impact_max\"\
  ,\n    \"slippage_impact.slippage_impact_max\" / \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  \ AS \"slippage_impact.mer_value\"\nFROM _combined\n)\nSELECT\n    \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  ,\n    \"slippage_impact.mer_value\",\n    \"slippage_impact.recordvault\",\n  \
  \  \"slippage_impact.slippage_impact_max\"\nFROM step1) AS _inner"
