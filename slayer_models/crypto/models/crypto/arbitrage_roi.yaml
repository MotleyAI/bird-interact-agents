version: 5
name: arbitrage_roi
source_queries:
- version: 3
  name: aos_per_pair
  source_model: analyticsindicators
  measures:
  - formula: aos:avg
    name: aos_avg
  dimensions:
  - name: mktcombo
    model: marketdata
  whole_periods_only: false
- version: 3
  source_model:
    source_name: orders
    joins:
    - target_model: fees
      join_pairs:
      - - recordvault
        - orderslink
    - target_model: aos_per_pair
      join_pairs:
      - - mktnote
        - marketdata__mktcombo
    columns:
    - name: arbitrage_roi
      type: DOUBLE
      sql: aos_per_pair.aos_avg * dealquote / NULLIF(fees.feetotal * 2, 0)
  dimensions:
  - name: recordvault
  - name: arbitrage_roi
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"orders.recordvault\" AS recordvault, \"orders.arbitrage_roi\"\
  \ AS arbitrage_roi FROM (SELECT\n  orders.recordvault AS \"orders.recordvault\"\
  ,\n  aos_per_pair.aos_avg * orders.dealquote / NULLIF(fees.feetotal * 2, 0) AS \"\
  orders.arbitrage_roi\"\nFROM orders AS orders\nLEFT JOIN (\n  (\n    SELECT\n  \
  \    \"analyticsindicators.marketdata.mktcombo\" AS marketdata__mktcombo,\n    \
  \  \"analyticsindicators.aos_avg\" AS aos_avg\n    FROM (\n      SELECT\n      \
  \  marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo' AS \"analyticsindicators.marketdata.mktcombo\"\
  ,\n        AVG(\n          CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.arbpotential' AS REAL) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.xexchband' AS REAL) + (\n            CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.fundgap' AS REAL) * 2\n          ) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.basisgap' AS REAL)\n        ) AS \"analyticsindicators.aos_avg\"\
  \n      FROM analyticsindicators AS analyticsindicators\n      LEFT JOIN marketdata\
  \ AS marketdata\n        ON analyticsindicators.mdataref = marketdata.marketdatanode\n\
  \      GROUP BY\n        marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\n\
  \    ) AS _inner\n  )\n) AS aos_per_pair\n  ON orders.mktnote = aos_per_pair.marketdata__mktcombo\n\
  LEFT JOIN fees AS fees\n  ON orders.recordvault = fees.orderslink) AS _inner"
data_source: crypto
columns:
- name: recordvault
  sql: recordvault
  type: TEXT
  primary_key: false
  hidden: false
- name: arbitrage_roi
  sql: arbitrage_roi
  type: DOUBLE
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Arbitrage ROI (KB #35) per order: AOS \xD7 dealquote / (feetotal \xD7\
  \ 2). AOS is per-pair (avg analyticsindicators.aos grouped by marketdata.mktcombo);\
  \ dealquote is per-order; feetotal is per-fee-record (joined to orders via fees.orderslink\
  \ \u2192 orders.recordvault). The order-to-pair link is orders.mktnote = mktcombo.\n\
  \n[kb=35]\nArbitrage ROI = \\frac{AOS \\times dealquote}{feetotal \\times 2}, \\\
  text{where } AOS \\text{ is the Arbitrage Opportunity Score and } feetotal \\text{\
  \ is multiplied by 2 to account for fees on both transactions involved in arbitrage.}\
  \ \u2014 Calculates the potential return on investment for an arbitrage opportunity.\n\
  [/kb=35]"
hidden: false
