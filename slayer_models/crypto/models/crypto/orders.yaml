- name: timespan
  sql: timespan
  type: TEXT
  primary_key: false
  description: "Time-in-force enum (KB #22): 'IOC' = immediate-or-cancel. 'GTC' =\
    \ good-till-cancelled. 'GTD' = good-till-date. 'FOK' = fill-or-kill.\n\n[kb=22]\n\
    An enum with values 'IOC', 'GTC', 'GTD', or 'FOK'. 'IOC' (Immediate-or-Cancel)\
    \ means execute immediately available portion or cancel. 'GTC' (Good-Till-Cancelled)\
    \ means the order remains active until explicitly cancelled. 'GTD' (Good-Till-Date)\
    \ means the order remains active until a specified date. 'FOK' (Fill-or-Kill)\
    \ means execute completely immediately or cancel entirely. \u2014 Illustrates\
    \ the meaning of different values for the timespan enum.\n[/kb=22]"
  label: timespan
