  description: "Order status enum (KB #21): 'New' = newly placed, unmatched. 'PartiallyFilled'\
    \ = some portion executed. 'Cancelled' = cancelled before full execution. 'Filled'\
    \ = completely executed.\n\n[kb=21]\nAn enum with values 'New', 'PartiallyFilled',\
    \ 'Cancelled', or 'Filled'. 'New' indicates a newly placed order that hasn't been\
    \ matched. 'PartiallyFilled' means some portion has been executed but not all.\
    \ 'Cancelled' means the order was cancelled before full execution. 'Filled' means\
    \ the order has been completely executed. \u2014 Illustrates the meaning of different\
    \ values for the orderflow enum.\n[/kb=21]"
  label: orderflow
