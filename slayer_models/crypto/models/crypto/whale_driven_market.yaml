description: "Whale-Driven Market (KB #46) per-pair: whalemotion is 'High' AND there\
  \ is at least one Whale Order (KB #10) in the same direction as Smart Money Flow\
  \ (KB #15). Direction mapping: smartforce > 0 with smart money dominant (smartforce\
  \ > 1.2\xD7 retailflow AND smartforce > 1.2\xD7 instflow) \u2192 'Buy' direction;\
  \ smartforce < 0 with smart money dominant inversely (retailflow > 1.2\xD7 smartforce\
  \ AND instflow > 1.2\xD7 smartforce) \u2192 'Sell' direction. Stage 1 aggregates\
  \ analyticsindicators per mktcombo (joined to marketdata for the pair key) into\
  \ any_high_whalemotion, any_sm_bull, any_sm_bear. Stage 2 aggregates whale_order\
  \ joined to orders per mktnote into any_whale_buy and any_whale_sell. Stage 3 joins\
  \ on mktcombo and emits is_whale_driven.\n\n[kb=46]\nMarket conditions where whalemotion\
  \ is 'High' and there is at least one Whale Order in the same direction as the Smart\
  \ Money Flow, indicating coordinated activity among large market participants. \u2014\
  \ Identifies periods where large traders significantly influence price direction.\n\
  [/kb=46]"
