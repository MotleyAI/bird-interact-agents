- name: liquidity_ratio
  sql: (CAST(marketdata.quote_depth_snapshot ->> '$.depth.bidunits' AS REAL) + CAST(marketdata.quote_depth_snapshot
    ->> '$.depth.askunits' AS REAL)) * CAST(marketdata.quote_depth_snapshot ->> '$.quotes.midquote'
    AS REAL) / NULLIF(volday, 0)
  type: number
  primary_key: false
  description: "Liquidity Ratio (KB #5): (bidunits + askunits) \xD7 midquote / volday.\
    \ Available liquidity vs 24h volume.\n\n[kb=5]\nLiquidity Ratio = \\frac{(bidunits\
    \ + askunits) \\times midquote}{volday}, \\text{where } bidunits \\text{ and }\
    \ askunits \\text{ are quantities at best bid and ask, } midquote \\text{ is the\
    \ midpoint price, and } volday \\text{ is the 24h volume.} \u2014 Measures the\
    \ ratio of available liquidity to total market volume.\n[/kb=5]"
  label: Liquidity Ratio
  hidden: false
  meta:
    kb_id: 5
- name: is_liquidity_crisis
  sql: (CAST(marketdata.quote_depth_snapshot ->> '$.depth.bidunits' AS REAL) + CAST(marketdata.quote_depth_snapshot
    ->> '$.depth.askunits' AS REAL)) * CAST(marketdata.quote_depth_snapshot ->> '$.quotes.midquote'
    AS REAL) / NULLIF(volday, 0) < 0.01
  type: boolean
  primary_key: false
  description: "Liquidity Crisis (KB #16): Liquidity Ratio < 0.01. Severely reduced\
    \ market liquidity.\n\n[kb=16]\nMarket conditions where the Liquidity Ratio falls\
    \ below 0.01, indicating insufficient market depth relative to typical trading\
    \ volume. \u2014 Identifies periods of severely reduced market liquidity.\n[/kb=16]"
  label: Liquidity Crisis
  hidden: false
  meta:
    kb_id: 16
- name: volatility_adjusted_spread
  sql: ((CAST(marketdata.quote_depth_snapshot ->> '$.quotes.askquote' AS REAL) - CAST(marketdata.quote_depth_snapshot
    ->> '$.quotes.bidquote' AS REAL)) / NULLIF(CAST(marketdata.quote_depth_snapshot
    ->> '$.quotes.midquote' AS REAL), 0) * 100) / NULLIF(volmeter * 0.1, 0)
  type: number
  primary_key: false
  description: "Volatility-Adjusted Spread (KB #37): Spread Percentage / (volmeter\
    \ \xD7 0.1). Tight spread relative to volatility \u2192 favorable.\n\n[kb=37]\n\
    Volatility-Adjusted Spread = \\frac{Spread Percentage}{volmeter \\times 0.1},\
    \ \\text{where } Spread Percentage \\text{ is the spread as percentage of midpoint\
    \ price and } volmeter \\text{ is the volatility or fluctuation rating.} \u2014\
    \ Normalizes the spread by the market volatility to determine if spread is wide\
    \ relative to expected price movement.\n[/kb=37]"
  label: Volatility-Adjusted Spread
  hidden: false
  meta:
    kb_id: 37
