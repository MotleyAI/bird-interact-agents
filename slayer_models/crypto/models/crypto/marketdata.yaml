  hidden: false
- name: spread_percentage
  sql: (CAST(quote_depth_snapshot ->> '$.quotes.askquote' AS REAL) - CAST(quote_depth_snapshot
    ->> '$.quotes.bidquote' AS REAL)) / NULLIF(CAST(quote_depth_snapshot ->> '$.quotes.midquote'
    AS REAL), 0) * 100
  type: number
  primary_key: false
  description: "Spread Percentage (KB #0): (askquote \u2212 bidquote) / midquote \xD7\
    \ 100. Spread as a percentage of the midpoint price.\n\n[kb=0]\nSpread Percentage\
    \ = \\frac{askquote - bidquote}{midquote} \\times 100, \\text{where } askquote\
    \ \\text{ is the best ask price, } bidquote \\text{ is the best bid price, and\
    \ } midquote \\text{ is the midpoint price.} \u2014 Calculates the spread as a\
    \ percentage of the midpoint price.\n[/kb=0]"
  label: Spread Percentage
  hidden: false
  meta:
    kb_id: 0
- name: order_book_imbalance_ratio
  sql: (CAST(quote_depth_snapshot ->> '$.depth.biddepth' AS REAL) - CAST(quote_depth_snapshot
    ->> '$.depth.askdepth' AS REAL)) / NULLIF(CAST(quote_depth_snapshot ->> '$.depth.biddepth'
    AS REAL) + CAST(quote_depth_snapshot ->> '$.depth.askdepth' AS REAL), 0)
  type: number
  primary_key: false
  description: "Order Book Imbalance Ratio (KB #32): (biddepth \u2212 askdepth) /\
    \ (biddepth + askdepth). Positive = buying pressure; negative = selling pressure.\n\
    \n[kb=32]\nOrder Book Imbalance Ratio = \\frac{biddepth - askdepth}{biddepth +\
    \ askdepth}, \\text{where } biddepth \\text{ is the deeper bid liquidity and }\
    \ askdepth \\text{ is the deeper ask liquidity. A positive Imbalance Ratio indicates\
    \ stronger buying pressure, while negative indicates stronger selling pressure.\
    \ \u2014 Quantifies the imbalance between bid and ask sides of the order book.\n\
    [/kb=32]"
  label: Order Book Imbalance Ratio
  hidden: false
  meta:
    kb_id: 32
