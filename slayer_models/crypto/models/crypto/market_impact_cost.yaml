version: 6
name: market_impact_cost
source_queries:
- version: 3
  name: latest_mkteffect
  source_model:
    source_name: systemmonitoring
    columns:
    - name: join_key
      type: DOUBLE
      sql: '1'
  dimensions:
  - name: mkteffect
  - name: join_key
  order:
  - column:
      name: systemmonitoringpivot
    direction: desc
  limit: 1
  whole_periods_only: false
- version: 3
  source_model:
    source_name: orders
    columns:
    - name: join_key
      type: DOUBLE
      sql: '1'
    joins:
    - target_model: latest_mkteffect
      join_pairs:
      - - join_key
        - join_key
  measures:
  - formula: dealcount:max * dealquote:max * latest_mkteffect.mkteffect:max * 0.01
    name: mic
  dimensions:
  - name: recordvault
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"orders.recordvault\" AS recordvault, \"orders.dealcount_max\"\
  \ AS dealcount_max, \"orders.dealquote_max\" AS dealquote_max, \"orders.mic\" AS\
  \ mic, \"orders.latest_mkteffect.mkteffect_max\" AS latest_mkteffect__mkteffect_max\
  \ FROM (WITH _base AS (\nSELECT\n  orders.recordvault AS \"orders.recordvault\"\
  ,\n  MAX(orders.dealcount) AS \"orders.dealcount_max\",\n  MAX(orders.dealquote)\
  \ AS \"orders.dealquote_max\"\nFROM orders AS orders\nGROUP BY\n  orders.recordvault\n\
  ),\n_cm_orders__latest_mkteffect__mkteffect_max AS (\nSELECT\n  MAX(latest_mkteffect.mkteffect)\
  \ AS \"orders.latest_mkteffect.mkteffect_max\"\nFROM (\n  SELECT\n    \"systemmonitoring.mkteffect\"\
  \ AS mkteffect,\n    \"systemmonitoring.join_key\" AS join_key\n  FROM (\n    SELECT\n\
  \      systemmonitoring.mkteffect AS \"systemmonitoring.mkteffect\",\n      1 AS\
  \ \"systemmonitoring.join_key\"\n    FROM systemmonitoring AS systemmonitoring\n\
  \    ORDER BY\n      \"systemmonitoring.systemmonitoringpivot\" DESC\n    LIMIT\
  \ 1\n  ) AS _inner\n) AS latest_mkteffect\n),\n_combined AS (\nSELECT _base.\"orders.recordvault\"\
  , _base.\"orders.dealcount_max\", _base.\"orders.dealquote_max\", _cm_orders__latest_mkteffect__mkteffect_max.\"\
  orders.latest_mkteffect.mkteffect_max\"\nFROM _base\nCROSS JOIN _cm_orders__latest_mkteffect__mkteffect_max\n\
  ),\nstep1 AS (\nSELECT\n    \"orders.dealcount_max\",\n    \"orders.dealquote_max\"\
  ,\n    \"orders.latest_mkteffect.mkteffect_max\",\n    \"orders.recordvault\",\n\
  \    \"orders.dealcount_max\" * \"orders.dealquote_max\" * \"orders.latest_mkteffect.mkteffect_max\"\
  \ * 0.01 AS \"orders.mic\"\nFROM _combined\n)\nSELECT\n    \"orders.dealcount_max\"\
  ,\n    \"orders.dealquote_max\",\n    \"orders.latest_mkteffect.mkteffect_max\"\
  ,\n    \"orders.mic\",\n    \"orders.recordvault\"\nFROM step1) AS _inner"
data_source: crypto
