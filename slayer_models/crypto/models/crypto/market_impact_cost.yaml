description: "Market Impact Cost (KB #4) per order: dealcount \xD7 dealquote \xD7\
  \ mkteffect \xD7 0.01. dealcount/dealquote come from orders; mkteffect is taken\
  \ from the most-recent systemmonitoring row (global system-wide latest). Implemented\
  \ as a multistage with a 1-row scalar (latest mkteffect) cross-joined via a constant\
  \ key onto the orders row-level data, per the W4c crypto.md hint.\n\n[kb=4]\nMIC\
  \ = dealcount \\times dealquote \\times mkteffect \\times 0.01, \\text{where } dealcount\
  \ \\text{ is the order quantity, } dealquote \\text{ is the limit or stop price,\
  \ and } mkteffect \\text{ is the approximating internal market impact.} \u2014 Estimates\
  \ the market impact cost of executing a large order.\n[/kb=4]"
hidden: false
meta:
  kb_id: 4
