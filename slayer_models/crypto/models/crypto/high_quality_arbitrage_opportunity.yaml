version: 6
name: high_quality_arbitrage_opportunity
source_queries:
- version: 3
  name: aw_per_pair
  source_model: analyticsindicators
  measures:
  - formula: aos:avg
    name: aos_avg
  dimensions:
  - name: mktcombo
    model: marketdata
  whole_periods_only: false
- version: 3
  name: roi
  source_model: arbitrage_roi
  measures:
  - formula: arbitrage_roi:max
    name: roi_v
  dimensions:
  - name: recordvault
  whole_periods_only: false
- version: 3
  name: mer
  source_model: market_efficiency_ratio
  measures:
  - formula: mer_value:max
    name: mer_v
  dimensions:
  - name: recordvault
  whole_periods_only: false
- version: 3
  source_model:
    source_name: orders
    joins:
    - target_model: aw_per_pair
      join_pairs:
      - - mktnote
        - marketdata__mktcombo
    - target_model: roi
      join_pairs:
      - - recordvault
        - recordvault
    - target_model: mer
      join_pairs:
      - - recordvault
        - recordvault
    columns:
    - name: is_high_quality
      type: BOOLEAN
      sql: aw_per_pair.aos_avg > 0.05 AND roi.roi_v > 0.005 AND mer.mer_v < 1.2
  dimensions:
  - name: recordvault
  - name: is_high_quality
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"orders.recordvault\" AS recordvault, \"orders.is_high_quality\"\
  \ AS is_high_quality FROM (SELECT\n  orders.recordvault AS \"orders.recordvault\"\
  ,\n  aw_per_pair.aos_avg > 0.05 AND roi.roi_v > 0.005 AND mer.mer_v < 1.2 AS \"\
  orders.is_high_quality\"\nFROM orders AS orders\nLEFT JOIN (\n  (\n    SELECT\n\
  \      \"arbitrage_roi.recordvault\" AS recordvault,\n      \"arbitrage_roi.roi_v\"\
  \ AS roi_v\n    FROM (\n      SELECT\n        arbitrage_roi.recordvault AS \"arbitrage_roi.recordvault\"\
  ,\n        MAX(arbitrage_roi.arbitrage_roi) AS \"arbitrage_roi.roi_v\"\n      FROM\
  \ (\n        SELECT\n          \"orders.recordvault\" AS recordvault,\n        \
  \  \"orders.arbitrage_roi\" AS arbitrage_roi\n        FROM (\n          SELECT\n\
  \            orders.recordvault AS \"orders.recordvault\",\n            aos_per_pair.aos_avg\
  \ * orders.dealquote / NULLIF(fees.feetotal * 2, 0) AS \"orders.arbitrage_roi\"\n\
  \          FROM orders AS orders\n          LEFT JOIN (\n            (\n       \
  \       SELECT\n                \"analyticsindicators.marketdata.mktcombo\" AS marketdata__mktcombo,\n\
  \                \"analyticsindicators.aos_avg\" AS aos_avg\n              FROM\
  \ (\n                SELECT\n                  marketdata.quote_depth_snapshot ->>\
  \ '$.metadata.mktcombo' AS \"analyticsindicators.marketdata.mktcombo\",\n      \
  \            AVG(\n                    CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.arbpotential' AS REAL) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.xexchband' AS REAL) + (\n                      CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.fundgap' AS REAL) * 2\n                    ) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.basisgap' AS REAL)\n                  ) AS \"analyticsindicators.aos_avg\"\
  \n                FROM analyticsindicators AS analyticsindicators\n            \
  \    LEFT JOIN marketdata AS marketdata\n                  ON analyticsindicators.mdataref\
  \ = marketdata.marketdatanode\n                GROUP BY\n                  marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo'\n              ) AS _inner\n            )\n        \
  \  ) AS aos_per_pair\n            ON orders.mktnote = aos_per_pair.marketdata__mktcombo\n\
  \          LEFT JOIN fees AS fees\n            ON orders.recordvault = fees.orderslink\n\
  \        ) AS _inner\n      ) AS arbitrage_roi\n      GROUP BY\n        arbitrage_roi.recordvault\n\
  \    ) AS _inner\n  )\n) AS roi\n  ON orders.recordvault = roi.recordvault\nLEFT\
  \ JOIN (\n  (\n    SELECT\n      \"market_efficiency_ratio.recordvault\" AS recordvault,\n\
  \      \"market_efficiency_ratio.mer_v\" AS mer_v\n    FROM (\n      SELECT\n  \
  \      market_efficiency_ratio.recordvault AS \"market_efficiency_ratio.recordvault\"\
  ,\n        MAX(market_efficiency_ratio.mer_value) AS \"market_efficiency_ratio.mer_v\"\
  \n      FROM (\n        SELECT\n          \"slippage_impact.recordvault\" AS recordvault,\n\
  \          \"slippage_impact.slippage_impact_max\" AS slippage_impact_max,\n   \
  \       \"slippage_impact.mer_value\" AS mer_value,\n          \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  \ AS latest_slipratio_v__slipratio_max\n        FROM (\n          WITH _base AS\
  \ (\n            SELECT\n              slippage_impact.recordvault AS \"slippage_impact.recordvault\"\
  ,\n              MAX(slippage_impact.slippage_impact) AS \"slippage_impact.slippage_impact_max\"\
  \n            FROM (\n              SELECT\n                \"orders.recordvault\"\
  \ AS recordvault,\n                \"orders.slippage_impact\" AS slippage_impact\n\
  \              FROM (\n                SELECT\n                  orders.recordvault\
  \ AS \"orders.recordvault\",\n                  orders.dealcount / NULLIF(\n   \
  \                 CASE\n                      WHEN orders.dealedge = 'Buy'\n   \
  \                   THEN depth_per_pair.askunits_avg\n                      ELSE\
  \ depth_per_pair.bidunits_avg\n                    END,\n                    0\n\
  \                  ) * depth_per_pair.spreadband_avg AS \"orders.slippage_impact\"\
  \n                FROM orders AS orders\n                LEFT JOIN (\n         \
  \         (\n                    SELECT\n                      \"marketdata.mktcombo\"\
  \ AS mktcombo,\n                      \"marketdata.bidunits_avg\" AS bidunits_avg,\n\
  \                      \"marketdata.askunits_avg\" AS askunits_avg,\n          \
  \            \"marketdata.spreadband_avg\" AS spreadband_avg\n                 \
  \   FROM (\n                      SELECT\n                        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo' AS \"marketdata.mktcombo\",\n                      \
  \  AVG(marketdata.quote_depth_snapshot ->> '$.depth.bidunits') AS \"marketdata.bidunits_avg\"\
  ,\n                        AVG(marketdata.quote_depth_snapshot ->> '$.depth.askunits')\
  \ AS \"marketdata.askunits_avg\",\n                        AVG(marketdata.quote_depth_snapshot\
  \ ->> '$.spread.spreadband') AS \"marketdata.spreadband_avg\"\n                \
  \      FROM marketdata AS marketdata\n                      GROUP BY\n         \
  \               marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\n    \
  \                ) AS _inner\n                  )\n                ) AS depth_per_pair\n\
  \                  ON orders.mktnote = depth_per_pair.mktcombo\n              )\
  \ AS _inner\n            ) AS slippage_impact\n            GROUP BY\n          \
  \    slippage_impact.recordvault\n          ), _cm_slippage_impact__latest_slipratio_v__slipratio_max\
  \ AS (\n            SELECT\n              MAX(latest_slipratio_v.slipratio) AS \"\
  slippage_impact.latest_slipratio_v.slipratio_max\"\n            FROM (\n       \
  \       SELECT\n                \"systemmonitoring.slipratio\" AS slipratio,\n \
  \               \"systemmonitoring.join_key\" AS join_key\n              FROM (\n\
  \                SELECT\n                  systemmonitoring.slipratio AS \"systemmonitoring.slipratio\"\
  ,\n                  1 AS \"systemmonitoring.join_key\"\n                FROM systemmonitoring\
  \ AS systemmonitoring\n                ORDER BY\n                  \"systemmonitoring.systemmonitoringpivot\"\
  \ DESC\n                LIMIT 1\n              ) AS _inner\n            ) AS latest_slipratio_v\n\
  \          ), _combined AS (\n            SELECT\n              _base.\"slippage_impact.recordvault\"\
  ,\n              _base.\"slippage_impact.slippage_impact_max\",\n              _cm_slippage_impact__latest_slipratio_v__slipratio_max.\"\
  slippage_impact.latest_slipratio_v.slipratio_max\"\n            FROM _base\n   \
  \         CROSS JOIN _cm_slippage_impact__latest_slipratio_v__slipratio_max\n  \
  \        ), step1 AS (\n            SELECT\n              \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  ,\n              \"slippage_impact.recordvault\",\n              \"slippage_impact.slippage_impact_max\"\
  ,\n              \"slippage_impact.slippage_impact_max\" / \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  \ AS \"slippage_impact.mer_value\"\n            FROM _combined\n          )\n  \
  \        SELECT\n            \"slippage_impact.latest_slipratio_v.slipratio_max\"\
  ,\n            \"slippage_impact.mer_value\",\n            \"slippage_impact.recordvault\"\
  ,\n            \"slippage_impact.slippage_impact_max\"\n          FROM step1\n \
  \       ) AS _inner\n      ) AS market_efficiency_ratio\n      GROUP BY\n      \
  \  market_efficiency_ratio.recordvault\n    ) AS _inner\n  )\n) AS mer\n  ON orders.recordvault\
  \ = mer.recordvault\nLEFT JOIN (\n  (\n    SELECT\n      \"analyticsindicators.marketdata.mktcombo\"\
  \ AS marketdata__mktcombo,\n      \"analyticsindicators.aos_avg\" AS aos_avg\n \
  \   FROM (\n      SELECT\n        marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\
  \ AS \"analyticsindicators.marketdata.mktcombo\",\n        AVG(\n          CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.arbpotential' AS REAL) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.xexchband' AS REAL) + (\n            CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.fundgap' AS REAL) * 2\n          ) + CAST(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.arbitrage.basisgap' AS REAL)\n        ) AS \"analyticsindicators.aos_avg\"\
  \n      FROM analyticsindicators AS analyticsindicators\n      LEFT JOIN marketdata\
  \ AS marketdata\n        ON analyticsindicators.mdataref = marketdata.marketdatanode\n\
  \      GROUP BY\n        marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\n\
  \    ) AS _inner\n  )\n) AS aw_per_pair\n  ON orders.mktnote = aw_per_pair.marketdata__mktcombo)\
  \ AS _inner"
data_source: crypto
columns:
- name: recordvault
  sql: recordvault
  type: TEXT
  primary_key: false
  hidden: false
- name: is_high_quality
  sql: is_high_quality
  type: BOOLEAN
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "High-Quality Arbitrage Opportunity (KB #41) per order: Arbitrage Window\
  \ AND Arbitrage ROI > 0.5% AND MER < 1.2. Arbitrage Window (AOS > 0.05) is computed\
  \ per-pair from analyticsindicators (avg aos grouped by marketdata.mktcombo); ROI\
  \ from arbitrage_roi (KB #35); MER from market_efficiency_ratio (KB #9). All joined\
  \ to orders by recordvault and pair.\n\n[kb=41]\nAn Arbitrage Window where the Arbitrage\
  \ ROI exceeds 0.5% and the Market Efficiency Ratio is less than 1.2, indicating\
  \ high potential return with low execution risk. \u2014 Identifies particularly\
  \ favorable arbitrage opportunities with minimal execution risk.\n[/kb=41]"
