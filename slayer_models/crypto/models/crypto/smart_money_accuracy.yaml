measures:
- formula: is_correct:avg
  name: smart_money_accuracy
  label: Smart Money Accuracy
  description: "Smart Money Accuracy (KB #51): mean of the per-(pair, hour) is_correct\
    \ boolean. Aggregates to the proportion of (pair, hour) buckets where Smart Money\
    \ Flow direction agreed with the 4-hour-ahead midquote movement.\n\n[kb=51]\n\
    The proportion of times the Smart Money Flow direction matches the 4-hour price\
    \ movement direction, calculated as: $$ \\frac{\\text{COUNT(CASE WHEN (smartforce\
    \ > retailflow AND smartforce > instflow AND next\\_price\\_4h > mid\\_price)\
    \ OR (smartforce < retailflow AND smartforce < instflow AND next\\_price\\_4h\
    \ < mid\\_price) THEN 1 ELSE 0 END)}}{\\text{COUNT(*)}} $$ \u2014 Measures the\
    \ success rate of smart money flow in predicting the 4-hour price movement direction.\n\
    [/kb=51]"
  meta:
    kb_id: 51
aggregations: []
joins: []
filters: []
description: "Smart Money Accuracy (KB #51): proportion of (mktcombo, hour) buckets\
  \ where Smart Money Flow direction matched the 4-hour-ahead midquote movement. Stage\
  \ 1 builds per-(pair, hour) midquote_now and midquote_next_4h via lead(midquote,\
  \ 4) on marketdata partitioned by mktcombo and ordered by timetrack. Stage 2 builds\
  \ per-(pair, hour) average flow signals (smartforce, retailflow, instflow) from\
  \ analyticsindicators (joined to marketdata for the pair/time keys). Stage 3 joins\
  \ them and emits is_correct: 1 when smart money was bullish (smartforce > retailflow\
  \ AND smartforce > instflow) and midquote_next_4h > midquote_now, OR bearish (smartforce\
  \ < retailflow AND smartforce < instflow) and midquote_next_4h < midquote_now, else\
  \ 0. Aggregate is_correct:avg to get the accuracy proportion.\n\n[kb=51]\nThe proportion\
  \ of times the Smart Money Flow direction matches the 4-hour price movement direction,\
  \ calculated as: $$ \\frac{\\text{COUNT(CASE WHEN (smartforce > retailflow AND smartforce\
  \ > instflow AND next\\_price\\_4h > mid\\_price) OR (smartforce < retailflow AND\
  \ smartforce < instflow AND next\\_price\\_4h < mid\\_price) THEN 1 ELSE 0 END)}}{\\\
  text{COUNT(*)}} $$ \u2014 Measures the success rate of smart money flow in predicting\
  \ the 4-hour price movement direction.\n[/kb=51]"
hidden: false
