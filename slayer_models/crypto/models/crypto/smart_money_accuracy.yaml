version: 4
name: smart_money_accuracy
source_queries:
- version: 3
  name: midquote_with_lead
  source_model: marketdata
  measures:
  - formula: midquote:avg
    name: midquote_now
  - formula: lead(midquote:avg, 4)
    name: midquote_next_4h
  dimensions:
  - name: mktcombo
  time_dimensions:
  - dimension:
      name: timetrack
    granularity: hour
  whole_periods_only: false
- version: 3
  name: flow_per_pair_hour
  source_model: analyticsindicators
  measures:
  - formula: smartforce:avg
    name: smartforce_avg
  - formula: retailflow:avg
    name: retailflow_avg
  - formula: instflow:avg
    name: instflow_avg
  dimensions:
  - name: mktcombo
    model: marketdata
  time_dimensions:
  - dimension:
      name: timetrack
      model: marketdata
    granularity: hour
  whole_periods_only: false
- version: 3
  source_model:
    source_name: midquote_with_lead
    joins:
    - target_model: flow_per_pair_hour
      join_pairs:
      - - mktcombo
        - marketdata__mktcombo
      - - timetrack
        - marketdata__timetrack
    columns:
    - name: is_correct
      type: number
      sql: CASE WHEN (flow_per_pair_hour.smartforce_avg > flow_per_pair_hour.retailflow_avg
        AND flow_per_pair_hour.smartforce_avg > flow_per_pair_hour.instflow_avg AND
        midquote_with_lead.midquote_next_4h > midquote_with_lead.midquote_now) OR
        (flow_per_pair_hour.smartforce_avg < flow_per_pair_hour.retailflow_avg AND
        flow_per_pair_hour.smartforce_avg < flow_per_pair_hour.instflow_avg AND midquote_with_lead.midquote_next_4h
        < midquote_with_lead.midquote_now) THEN 1 ELSE 0 END
  dimensions:
  - name: mktcombo
  - name: timetrack
  - name: midquote_now
  - name: midquote_next_4h
  - name: is_correct
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"midquote_with_lead.mktcombo\" AS mktcombo, \"midquote_with_lead.timetrack\"\
  \ AS timetrack, \"midquote_with_lead.midquote_now\" AS midquote_now, \"midquote_with_lead.midquote_next_4h\"\
  \ AS midquote_next_4h, \"midquote_with_lead.is_correct\" AS is_correct FROM (SELECT\n\
  \  midquote_with_lead.mktcombo AS \"midquote_with_lead.mktcombo\",\n  midquote_with_lead.timetrack\
  \ AS \"midquote_with_lead.timetrack\",\n  midquote_with_lead.midquote_now AS \"\
  midquote_with_lead.midquote_now\",\n  midquote_with_lead.midquote_next_4h AS \"\
  midquote_with_lead.midquote_next_4h\",\n  CASE\n    WHEN (\n      flow_per_pair_hour.smartforce_avg\
  \ > flow_per_pair_hour.retailflow_avg\n      AND flow_per_pair_hour.smartforce_avg\
  \ > flow_per_pair_hour.instflow_avg\n      AND midquote_with_lead.midquote_next_4h\
  \ > midquote_with_lead.midquote_now\n    )\n    OR (\n      flow_per_pair_hour.smartforce_avg\
  \ < flow_per_pair_hour.retailflow_avg\n      AND flow_per_pair_hour.smartforce_avg\
  \ < flow_per_pair_hour.instflow_avg\n      AND midquote_with_lead.midquote_next_4h\
  \ < midquote_with_lead.midquote_now\n    )\n    THEN 1\n    ELSE 0\n  END AS \"\
  midquote_with_lead.is_correct\"\nFROM (\n  SELECT\n    \"marketdata.mktcombo\" AS\
  \ mktcombo,\n    \"marketdata.timetrack\" AS timetrack,\n    \"marketdata.midquote_now\"\
  \ AS midquote_now,\n    \"marketdata.midquote_avg\" AS midquote_avg,\n    \"marketdata.midquote_next_4h\"\
  \ AS midquote_next_4h\n  FROM (\n    WITH base AS (\n      SELECT\n        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo' AS \"marketdata.mktcombo\",\n        STRFTIME('%Y-%m-%d\
  \ %H:00:00', marketdata.quote_depth_snapshot ->> '$.metadata.timetrack') AS \"marketdata.timetrack\"\
  ,\n        AVG(marketdata.quote_depth_snapshot ->> '$.quotes.midquote') AS \"marketdata.midquote_now\"\
  ,\n        AVG(marketdata.quote_depth_snapshot ->> '$.quotes.midquote') AS \"marketdata.midquote_avg\"\
  \n      FROM marketdata AS marketdata\n      GROUP BY\n        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo',\n        STRFTIME('%Y-%m-%d %H:00:00', marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.timetrack')\n    ), step1 AS (\n      SELECT\n        \"marketdata.midquote_avg\"\
  ,\n        \"marketdata.midquote_now\",\n        \"marketdata.mktcombo\",\n    \
  \    \"marketdata.timetrack\",\n        LEAD(\"marketdata.midquote_avg\", 4) OVER\
  \ (PARTITION BY \"marketdata.mktcombo\" ORDER BY \"marketdata.timetrack\") AS \"\
  marketdata.midquote_next_4h\"\n      FROM base\n    )\n    SELECT\n      \"marketdata.midquote_avg\"\
  ,\n      \"marketdata.midquote_next_4h\",\n      \"marketdata.midquote_now\",\n\
  \      \"marketdata.mktcombo\",\n      \"marketdata.timetrack\"\n    FROM step1\n\
  \  ) AS _inner\n) AS midquote_with_lead\nLEFT JOIN (\n  (\n    SELECT\n      \"\
  analyticsindicators.marketdata.mktcombo\" AS marketdata__mktcombo,\n      \"analyticsindicators.marketdata.timetrack\"\
  \ AS marketdata__timetrack,\n      \"analyticsindicators.smartforce_avg\" AS smartforce_avg,\n\
  \      \"analyticsindicators.retailflow_avg\" AS retailflow_avg,\n      \"analyticsindicators.instflow_avg\"\
  \ AS instflow_avg\n    FROM (\n      SELECT\n        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo' AS \"analyticsindicators.marketdata.mktcombo\",\n  \
  \      STRFTIME('%Y-%m-%d %H:00:00', marketdata.quote_depth_snapshot ->> '$.metadata.timetrack')\
  \ AS \"analyticsindicators.marketdata.timetrack\",\n        AVG(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.flow.smartforce') AS \"analyticsindicators.smartforce_avg\",\n        AVG(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.flow.retailflow') AS \"analyticsindicators.retailflow_avg\",\n        AVG(analyticsindicators.market_sentiment_indicators\
  \ ->> '$.flow.instflow') AS \"analyticsindicators.instflow_avg\"\n      FROM analyticsindicators\
  \ AS analyticsindicators\n      LEFT JOIN marketdata AS marketdata\n        ON analyticsindicators.mdataref\
  \ = marketdata.marketdatanode\n      GROUP BY\n        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo',\n        STRFTIME('%Y-%m-%d %H:00:00', marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.timetrack')\n    ) AS _inner\n  )\n) AS flow_per_pair_hour\n \
  \ ON midquote_with_lead.mktcombo = flow_per_pair_hour.marketdata__mktcombo\n  AND\
  \ midquote_with_lead.timetrack = flow_per_pair_hour.marketdata__timetrack) AS _inner"
