- name: risk_to_reward_ratio
  sql: ABS(orders.dealquote - CASE risk_margin_profile ->> '$.position.posedge' WHEN
    'Long' THEN CAST(risk_margin_profile ->> '$.price_levels.stopquote' AS REAL) ELSE
    CAST(risk_margin_profile ->> '$.price_levels.trigquote' AS REAL) END) / NULLIF(ABS(orders.dealquote
    - CASE risk_margin_profile ->> '$.position.posedge' WHEN 'Long' THEN CAST(risk_margin_profile
    ->> '$.price_levels.trigquote' AS REAL) ELSE CAST(risk_margin_profile ->> '$.price_levels.stopquote'
    AS REAL) END), 0)
  type: DOUBLE
  primary_key: false
  description: "Risk-to-Reward Ratio (KB #38): |entryquote \u2212 risk_side| / |entryquote\
    \ \u2212 reward_side|, where for Long the risk side is stopquote and reward is\
    \ trigquote (and vice versa for Short). 'entryquote' is taken as orders.dealquote\
    \ (the order's limit/stop price) reachable via the riskandmargin\u2192orders join.\n\
    \n[kb=38]\nRisk-to-Reward Ratio = \\frac{|entryquote - (posedge == 'Long' ? stopquote\
    \ : trigquote)|}{|entryquote - (posedge == 'Long' ? trigquote : stopquote)|},\
    \ \\text{where } entryquote \\text{ is the entry price, } stopquote \\text{ is\
    \ the stop price, } trigquote \\text{ is the advanced trigger price, and } posedge\
    \ \\text{ determines position direction (Long or Short).} \u2014 Calculates the\
    \ ratio of potential risk to potential reward for a position.\n[/kb=38]"
  label: Risk-to-Reward Ratio
  hidden: false
  meta:
    kb_id: 38
- name: posmagn_n
  sql: CAST(risk_margin_profile ->> '$.position.posmagn' AS REAL)
  type: DOUBLE
  primary_key: false
  description: "Numeric form of posmagn (leverage multiplier), so it can be used in\
    \ arithmetic.\n\n[kb=24]\nAn enum with values '1', '2', '3', '5', '10', '20',\
    \ '50', or '100', representing leverage multipliers. For example, '10' means the\
    \ position uses 10x leverage, amplifying both potential profits and losses by\
    \ a factor of 10 compared to an unleveraged position. \u2014 Illustrates the meaning\
    \ of different values for the posmagn enum.\n[/kb=24]"
  label: posmagn
  hidden: false
  meta:
    kb_id: 24
