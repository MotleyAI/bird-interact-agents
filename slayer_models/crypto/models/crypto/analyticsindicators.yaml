  primary_key: false
  description: Basis spread (futures vs spot).
  hidden: false
- name: aos
  sql: CAST(market_sentiment_indicators ->> '$.arbitrage.arbpotential' AS REAL) +
    CAST(market_sentiment_indicators ->> '$.arbitrage.xexchband' AS REAL) + (CAST(market_sentiment_indicators
    ->> '$.arbitrage.fundgap' AS REAL) * 2) + CAST(market_sentiment_indicators ->>
    '$.arbitrage.basisgap' AS REAL)
  type: DOUBLE
  primary_key: false
  description: "Arbitrage Opportunity Score (KB #3): arbpotential + xexchband + (fundgap\
    \ \xD7 2) + basisgap.\n\n[kb=3]\nAOS = arbpotential + xexchband + (fundgap \\\
    times 2) + basisgap, \\text{where these components represent different types of\
    \ arbitrage opportunities.} \u2014 Quantifies the potential arbitrage opportunity\
    \ considering multiple factors.\n[/kb=3]"
  label: Arbitrage Opportunity Score (AOS)
  hidden: false
  meta:
    kb_id: 3
- name: is_arbitrage_window
  sql: (CAST(market_sentiment_indicators ->> '$.arbitrage.arbpotential' AS REAL) +
    CAST(market_sentiment_indicators ->> '$.arbitrage.xexchband' AS REAL) + (CAST(market_sentiment_indicators
    ->> '$.arbitrage.fundgap' AS REAL) * 2) + CAST(market_sentiment_indicators ->>
    '$.arbitrage.basisgap' AS REAL)) > 0.05
  type: BOOLEAN
  primary_key: false
  description: "Arbitrage Window (KB #12): a market condition where the AOS exceeds\
    \ 0.05.\n\n[kb=12]\nA market condition where the Arbitrage Opportunity Score exceeds\
    \ 0.05, indicating substantial price discrepancies that can be exploited. \u2014\
    \ Identifies time periods with significant arbitrage opportunities across markets.\n\
    [/kb=12]"
  label: Arbitrage Window
  hidden: false
  meta:
    kb_id: 12
- name: is_smart_money_flow
  sql: CAST(market_sentiment_indicators ->> '$.flow.smartforce' AS REAL) > CAST(market_sentiment_indicators
    ->> '$.flow.retailflow' AS REAL) * 1.2 AND CAST(market_sentiment_indicators ->>
    '$.flow.smartforce' AS REAL) > CAST(market_sentiment_indicators ->> '$.flow.instflow'
    AS REAL) * 1.2
  type: BOOLEAN
  primary_key: false
  description: "Smart Money Flow (KB #15): smartforce exceeds both retailflow and\
    \ instflow by at least 20% (\xD71.2).\n\n[kb=15]\nMarket conditions where smartforce\
    \ exceeds both retailflow and instflow by at least 20%, indicating strong directional\
    \ bias from sophisticated traders. \u2014 Identifies directional bias of sophisticated\
    \ traders.\n[/kb=15]"
  label: Smart Money Flow
  hidden: false
  meta:
    kb_id: 15
- name: technical_signal_strength
  sql: (ABS(CAST(market_sentiment_indicators ->> '$.oscillators.rsi14spot' AS REAL)
    - 50) + ABS(CAST(market_sentiment_indicators ->> '$.oscillators.macdtrail' AS
    REAL)) + (CAST(market_sentiment_indicators ->> '$.oscillators.bbandspan' AS REAL)
    * 0.01)) / 3.0 * (CASE market_sentiment_indicators ->> '$.momentum.techmeter'
    WHEN 'Buy' THEN 1 WHEN 'Sell' THEN -1 ELSE 0 END)
  type: DOUBLE
  primary_key: false
  description: "Technical Signal Strength (KB #39): mean of |rsi14spot \u2212 50|,\
    \ |macdtrail|, bbandspan\xD70.01, signed by techmeter (Buy=+1, Sell=\u22121, Hold=0).\n\
    \n[kb=39]\nTechnical Signal Strength = \\frac{|rsi14spot - 50| + |macdtrail| +\
    \ (bbandspan \\times 0.01)}{3} \\times (techmeter == 'Buy' ? 1 : techmeter ==\
    \ 'Sell' ? -1 : 0), \\text{where } rsi14spot \\text{ is the RSI indicator, } macdtrail\
    \ \\text{ is the MACD line, } bbandspan \\text{ is the Bollinger Band width, and\
    \ } techmeter \\text{ determines direction (Buy, Sell, Hold).} \u2014 Quantifies\
    \ the strength of technical signals based on multiple indicators.\n[/kb=39]"
  label: Technical Signal Strength
  hidden: false
  meta:
    kb_id: 39
- name: flow_dominance
  sql: CASE WHEN CAST(market_sentiment_indicators ->> '$.flow.smartforce' AS REAL)
    > CAST(market_sentiment_indicators ->> '$.flow.retailflow' AS REAL) * 1.2 AND
    CAST(market_sentiment_indicators ->> '$.flow.smartforce' AS REAL) > CAST(market_sentiment_indicators
    ->> '$.flow.instflow' AS REAL) * 1.2 THEN 'Smart Money Dominant' WHEN CAST(market_sentiment_indicators
    ->> '$.flow.retailflow' AS REAL) > CAST(market_sentiment_indicators ->> '$.flow.smartforce'
    AS REAL) * 1.2 AND CAST(market_sentiment_indicators ->> '$.flow.retailflow' AS
    REAL) > CAST(market_sentiment_indicators ->> '$.flow.instflow' AS REAL) * 1.2
    THEN 'Retail Dominant' WHEN CAST(market_sentiment_indicators ->> '$.flow.instflow'
    AS REAL) > CAST(market_sentiment_indicators ->> '$.flow.smartforce' AS REAL) *
    1.2 AND CAST(market_sentiment_indicators ->> '$.flow.instflow' AS REAL) > CAST(market_sentiment_indicators
    ->> '$.flow.retailflow' AS REAL) * 1.2 THEN 'Institutional Dominant' ELSE 'Mixed'
    END
  type: TEXT
  primary_key: false
  description: "Flow Dominance (KB #50): categorizes which group (smart/retail/institutional)\
    \ leads, using the 1.2\xD7 dominance threshold over both other groups; otherwise\
    \ 'Mixed'.\n\n[kb=50]\nCategorized as 'Smart Money Dominant' when smartforce >\
    \ retail_flow * 1.2 AND smartforce > inst_flow * 1.2; 'Retail Dominant' when retail_flow\
    \ > smartforce * 1.2 AND retail_flow > inst_flow * 1.2; 'Institutional Dominant'\
    \ when inst_flow > smartforce * 1.2 AND inst_flow > retail_flow * 1.2; otherwise\
    \ 'Mixed'. \u2014 Categorizes market flow based on which group (smart money, retail,\
    \ or institutional) has the highest trading volume.\n[/kb=50]"
  label: Flow Dominance
  hidden: false
  meta:
    kb_id: 50
