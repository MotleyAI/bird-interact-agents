description: "Critically Over-Leveraged Position (KB #40) per order: Over-Leveraged\
  \ AND Effective Leverage > 20 AND Margin Utilization > 90%. Composes the three component\
  \ models (over_leveraged_position, effective_leverage, margin_utilization) by joining\
  \ on orders.recordvault.\n\n[kb=40]\nA position that qualifies as an Over-Leveraged\
  \ Position where additionally the Effective Leverage exceeds 20 and the Margin Utilization\
  \ exceeds 90%, creating extreme liquidation risk. \u2014 Identifies positions with\
  \ extremely dangerous leverage levels requiring immediate risk management.\n[/kb=40]"
