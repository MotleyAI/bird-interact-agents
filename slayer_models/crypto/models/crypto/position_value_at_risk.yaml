version: 5
name: position_value_at_risk
source_queries:
- version: 3
  name: vol_per_pair
  source_model: marketstats
  measures:
  - formula: volmeter:avg
    name: vol_avg
  dimensions:
  - name: mktcombo
    model: marketdata
  whole_periods_only: false
- version: 3
  source_model:
    source_name: orders
    joins:
    - target_model: riskandmargin
      join_pairs:
      - - recordvault
        - ordervault
    - target_model: vol_per_pair
      join_pairs:
      - - mktnote
        - marketdata__mktcombo
    columns:
    - name: pvar
      type: DOUBLE
      sql: riskandmargin.possum * vol_per_pair.vol_avg * 0.01
  dimensions:
  - name: recordvault
  - name: pvar
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"orders.recordvault\" AS recordvault, \"orders.pvar\"\
  \ AS pvar FROM (SELECT\n  orders.recordvault AS \"orders.recordvault\",\n  (\n \
  \   riskandmargin.risk_margin_profile ->> '$.position.possum'\n  ) * vol_per_pair.vol_avg\
  \ * 0.01 AS \"orders.pvar\"\nFROM orders AS orders\nLEFT JOIN riskandmargin AS riskandmargin\n\
  \  ON orders.recordvault = riskandmargin.ordervault\nLEFT JOIN (\n  (\n    SELECT\n\
  \      \"marketstats.marketdata.mktcombo\" AS marketdata__mktcombo,\n      \"marketstats.vol_avg\"\
  \ AS vol_avg\n    FROM (\n      SELECT\n        marketdata.quote_depth_snapshot\
  \ ->> '$.metadata.mktcombo' AS \"marketstats.marketdata.mktcombo\",\n        AVG(marketstats.volmeter)\
  \ AS \"marketstats.vol_avg\"\n      FROM marketstats AS marketstats\n      LEFT\
  \ JOIN marketdata AS marketdata\n        ON marketstats.mdlink = marketdata.marketdatanode\n\
  \      GROUP BY\n        marketdata.quote_depth_snapshot ->> '$.metadata.mktcombo'\n\
  \    ) AS _inner\n  )\n) AS vol_per_pair\n  ON orders.mktnote = vol_per_pair.marketdata__mktcombo)\
  \ AS _inner"
data_source: crypto
columns:
- name: recordvault
  sql: recordvault
  type: TEXT
  primary_key: false
  hidden: false
- name: pvar
  sql: pvar
  type: DOUBLE
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Position Value at Risk / PVaR (KB #2) per order: possum \xD7 volmeter\
  \ \xD7 0.01. possum is per-order (riskandmargin.possum); volmeter is per-pair (avg\
  \ marketstats.volmeter grouped by marketdata.mktcombo). Joined to orders via orders.mktnote\
  \ = pair.\n\n[kb=2]\nPVaR = possum \\times volmeter \\times 0.01, \\text{where }\
  \ possum \\text{ is the notional value of position and } volmeter \\text{ is the\
  \ volatility or fluctuation rating.} \u2014 Calculates the value at risk for a position\
  \ based on current market conditions.\n[/kb=2]"
hidden: false
meta:
  kb_id: 2
