- name: order_fill_rate
  sql: (orders.dealcount - remaincount) / NULLIF(orders.dealcount, 0) * 100
  type: DOUBLE
  primary_key: false
  description: "Order Fill Rate (KB #8): (dealcount \u2212 remaincount) / dealcount\
    \ \xD7 100. Percentage of the order that has been filled.\n\n[kb=8]\nOrder Fill\
    \ Rate = \\frac{dealcount - remaincount}{dealcount} \\times 100, \\text{where\
    \ } dealcount \\text{ is the order quantity and } remaincount \\text{ is how many\
    \ units remain unfilled.} \u2014 Calculates the percentage of an order that has\
    \ been filled.\n[/kb=8]"
  label: Order Fill Rate
  hidden: false
  meta:
    kb_id: 8
