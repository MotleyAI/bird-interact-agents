  description: "Execution-style enum (KB #29): 'Maker' = added liquidity (no immediate\
    \ match), 'Taker' = removed liquidity (immediately matched).\n\n[kb=29]\nAn enum\
    \ with values 'Maker' or 'Taker'. 'Maker' indicates the order added liquidity\
    \ to the order book by not matching immediately. 'Taker' indicates the order removed\
    \ liquidity from the order book by matching with existing orders immediately upon\
    \ placement. \u2014 Illustrates the meaning of different values for the exectune\
    \ enum.\n[/kb=29]"
  label: exectune
  hidden: false
  meta:
    kb_id: 29
