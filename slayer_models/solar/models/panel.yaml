- name: powratew
  sql: powratew
  type: number
  primary_key: false
  description: 'PowerRatedW (KB#20): rated power in W under Standard Test Conditions.
    Modern panels: 250W (older) to 650W (high-efficiency).'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 20
- name: paneeffpct
  sql: paneeffpct
  type: number
  primary_key: false
  description: 'PaneEffPct (KB#21): nominal panel efficiency percentage at STC. Also
    serves as `InitialEfficiencyPercent` for the Panel Efficiency Loss Rate (KB#1).'
  hidden: false
  format:
    type: float
  meta:
    kb_id: 21
- name: nomtempc
  sql: nomtempc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: tempcoef
  sql: tempcoef
  type: number
  primary_key: false
  description: 'TempCoef (KB#22): temperature coefficient (% per C, usually negative).
    Each C above 25C reduces output by |tempcoef|%. Typical: -0.25% to -0.50% per
    C.'
  hidden: false
  format:
    type: float
  meta:
    kb_id: 22
measures: []
aggregations: []
joins:
- target_model: plant
  join_pairs:
  - - hubregistry
    - growregistry
  join_type: left
- target_model: environment
  join_pairs:
  - - hubregistry
    - arearegistry
  join_type: left
- target_model: inverter
  join_pairs:
  - - hubregistry
    - siteref
  join_type: left
filters: []
description: 'A solar panel installed at a plant. `panemark` is its unique mark; `hubregistry`
  joins to `plant.growregistry`. Holds nameplate / Standard Test Conditions parameters:
  rated power (`powratew`, KB#20 PowerRatedW), nominal efficiency percentage (`paneeffpct`,
  KB#21 PaneEffPct, also used as InitialEfficiencyPercent in PELR/KB#1), nominal operating
  temperature in C (`nomtempc`), and temperature coefficient (`tempcoef`, KB#22 TempCoef).'
hidden: false
