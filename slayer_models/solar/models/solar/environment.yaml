- name: irradiance_conditions
  sql: irradiance_conditions
  type: string
  primary_key: false
  description: "JSON: {specmisfac, irradiance_types: [global, direct, diffuse, POA]\
    \ in W/m^2}.\n\n[kb=28]\nMeasured in watts per square meter (W/m\xB2), representing\
    \ the solar energy reaching the panel surface. Typical daytime values range from\
    \ 200 W/m\xB2 on heavily overcast days to 1000+ W/m\xB2 under clear sky conditions\
    \ at solar noon. \u2014 Illustrates the solar energy available to panels in their\
    \ installed orientation.\n[/kb=28]"
  label: POAIrradianceWM2 (Plane-of-Array Irradiance)
  hidden: false
  meta:
    kb_id: 28
- name: poa_irradiance_wm2
  sql: CAST(json_extract(irradiance_conditions, '$.irradiance_types[3]') AS REAL)
  type: number
  primary_key: false
  description: "POAIrradianceWM2 (KB#28): Plane-of-Array irradiance reaching the panel\
    \ surface, in W/m^2. Extracted from irradiance_conditions.irradiance_types[3].\
    \ Typical 200 (overcast) to 1000+ (clear noon).\n\n[kb=28]\nMeasured in watts\
    \ per square meter (W/m\xB2), representing the solar energy reaching the panel\
    \ surface. Typical daytime values range from 200 W/m\xB2 on heavily overcast days\
    \ to 1000+ W/m\xB2 under clear sky conditions at solar noon. \u2014 Illustrates\
    \ the solar energy available to panels in their installed orientation.\n[/kb=28]"
  label: POAIrradianceWM2 (Plane-of-Array Irradiance)
  hidden: false
  meta:
    kb_id: 28
- name: global_irradiance_wm2
  sql: CAST(json_extract(irradiance_conditions, '$.irradiance_types[0]') AS REAL)
  type: number
  primary_key: false
  description: Global solar irradiance in W/m^2 (irradiance_types[0]).
  hidden: false
- name: direct_irradiance_wm2
  sql: CAST(json_extract(irradiance_conditions, '$.irradiance_types[1]') AS REAL)
  type: number
  primary_key: false
  description: Direct normal irradiance in W/m^2 (irradiance_types[1]).
  hidden: false
- name: diffuse_irradiance_wm2
  sql: CAST(json_extract(irradiance_conditions, '$.irradiance_types[2]') AS REAL)
  type: number
  primary_key: false
  description: Diffuse irradiance in W/m^2 (irradiance_types[2]).
  hidden: false
- name: specmisfac
  sql: CAST(json_extract(irradiance_conditions, '$.specmisfac') AS REAL)
  type: number
  primary_key: false
  description: Spectral mismatch factor.
  hidden: false
- name: sif
  sql: CASE WHEN dustdengm2 > 0 THEN soillosspct / dustdengm2 ELSE NULL END
  type: number
  primary_key: false
  description: "Soiling Impact Factor (SIF, KB#6): SoilingLossPct / DustDensityGM2.\
    \ Higher = greater sensitivity of power loss to dust accumulation.\n\n[kb=6]\n\
    SIF = SoilingLossPercent / DustDensityGM2, \\text{where higher values indicate\
    \ greater sensitivity to dust accumulation.} \u2014 Quantifies the impact of soiling\
    \ on power production based on dust density.\n[/kb=6]"
  label: Soiling Impact Factor (SIF)
  hidden: false
  meta:
    kb_id: 6
- name: days_since_last_clean
  sql: CASE WHEN lastcleandt IS NOT NULL THEN julianday(envmoment) - julianday(lastcleandt)
    ELSE NULL END
  type: number
  primary_key: false
  description: Days elapsed between the environmental reading and the last cleaning.
    Used by the Cleaning Triggers rule (KB#51).
  hidden: false
- name: soiling_cleaning_threshold_met
  sql: CASE WHEN soillosspct > 5 OR dustdengm2 > 0.15 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Soiling Cleaning Threshold (KB#13): 1 when SoilingLossPct > 5% OR\
    \ DustDensityGM2 > 0.15 g/m^2 (whichever occurs first), else 0.\n\n[kb=13]\nCleaning\
    \ should be performed when Soiling Loss Percentage exceeds 5% or when Dust Density\
    \ exceeds 0.15 g/m\xB2, whichever occurs first. \u2014 Defines when panel cleaning\
    \ should be performed based on soiling conditions.\n[/kb=13]"
  label: Soiling Cleaning Threshold
  hidden: false
  meta:
    kb_id: 13
- name: cleaning_trigger
  sql: CASE WHEN soillosspct > 5 OR dustdengm2 > 0.15 OR (lastcleandt IS NOT NULL
    AND julianday(envmoment) - julianday(lastcleandt) > 30) THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Cleaning Triggers (KB#51): 1 when (Soiling Cleaning Threshold met)\
    \ OR (>30 days since last cleaning) - whichever occurs first.\n\n[kb=51]\nA panel\
    \ cleaning should be triggered when either: (1) meet Soiling Cleaning Threshold\
    \ (2) >30 days since last cleaning\u2014whichever occurs first. \u2014 Combined\
    \ conditions that determine when solar panel cleaning is economically justified.\n\
    [/kb=51]"
  label: Cleaning Triggers
  hidden: false
  meta:
    kb_id: 51
- name: in_optimal_window
  sql: CASE WHEN celltempc BETWEEN 25 AND 45 AND CAST(json_extract(irradiance_conditions,
    '$.irradiance_types[3]') AS REAL) > 800 AND soillosspct < 2 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Optimal Performance Window (KB#15): 1 when CellTempC in [25, 45] C\
    \ AND POAIrradianceWM2 > 800 W/m^2 AND SoilingLossPct < 2%, else 0.\n\n[kb=15]\n\
    The optimal performance window occurs when cell temperature is between 25-45\xB0\
    C, POA irradiance exceeds 800 W/m\xB2, and soiling loss is less than 2%. \u2014\
    \ Defines the environmental conditions for optimal panel performance.\n[/kb=15]"
  label: Optimal Performance Window
  hidden: false
  meta:
    kb_id: 15
- name: weather_severity_inputs
  sql: json_object('celltempc', celltempc, 'ambtempc', ambtempc, 'relhumpct', relhumpct,
    'windspdms', windspdms, 'preciptmm', preciptmm)
  type: string
  primary_key: false
  description: "Weather Severity Index (KB#18): a composite index calculated from\
    \ extreme values of temperature (celltempc, ambtempc), humidity (relhumpct), wind\
    \ speed (windspdms), and precipitation (preciptmm). Higher values indicate more\
    \ severe operating conditions and increased risk of performance issues. KB#18\
    \ doesn't pin a closed-form composite, so this column exposes the five raw inputs\
    \ as a JSON bundle for query-side composition.\n\n[kb=18]\nA composite index calculated\
    \ from extreme values of temperature, humidity, wind speed, and precipitation,\
    \ where higher values indicate more severe operating conditions and increased\
    \ risk of performance issues. \u2014 Classifies environmental conditions based\
    \ on their potential impact on solar plant operations.\n[/kb=18]"
  label: Weather Severity Index
  hidden: false
  meta:
    kb_id: 18
measures: []
aggregations: []
joins:
- target_model: plant
  join_pairs:
  - - arearegistry
    - growregistry
  join_type: left
filters: []
description: 'Environmental conditions at a plant area at a moment in time. Joins
  to `plant` via `arearegistry`. Includes weather (`celltempc`, `ambtempc`, `relhumpct`,
  `windspdms`, `preciptmm`, `airpresshpa`), soiling (`soillosspct`, `dustdengm2`,
  `cleancycledays`, `lastcleandt`), and the JSON `irradiance_conditions` (with the
  four-element `irradiance_types` array: global, direct, diffuse, plane-of-array irradiance,
  plus `specmisfac`).'
hidden: false
