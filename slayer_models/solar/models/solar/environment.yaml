  hidden: false
- name: celltempc
  sql: celltempc
  type: number
  primary_key: false
  description: "CellTempC (KB#23): operating temperature of the solar cells in C.\
    \ Typically 40-70C; >80C accelerates degradation.\n\n[kb=23]\nMeasured in degrees\
    \ Celsius, representing the actual temperature of the solar cells during operation.\
    \ Typically ranges from 40\xB0C to 70\xB0C depending on ambient conditions and\
    \ panel design, with temperatures above 80\xB0C potentially causing accelerated\
    \ degradation. \u2014 Illustrates the operating temperature of solar cells.\n\
    [/kb=23]"
  label: CellTempC (Cell Temperature)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 23
- name: ambtempc
  sql: ambtempc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: soillosspct
  sql: soillosspct
  type: number
  primary_key: false
  description: "SoilingLossPct (KB#25): power-output loss % due to dust/dirt accumulation.\
    \ Clean ~0%, heavily soiled >15%; well-maintained 2-5%.\n\n[kb=25]\nExpressed\
    \ as a percentage of power output lost due to soiling. Clean panels have values\
    \ near 0%, while heavily soiled panels in dusty environments may experience losses\
    \ exceeding 15%. Typical values in maintained systems range from 2% to 5%. \u2014\
    \ Illustrates the power loss due to dirt and dust accumulation.\n[/kb=25]"
  label: SoilingLossPct (Soiling Loss Percentage)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 25
