- name: mce
  sql: CASE WHEN plant.gencapmw > 0 THEN (COALESCE(maintcostusd, 0) + COALESCE(cleancostusd,
    0) + COALESCE(replacecostusd, 0)) / plant.gencapmw ELSE NULL END
  type: DOUBLE
  primary_key: false
  description: "Maintenance Cost Efficiency (MCE, KB#7): (MaintenanceCostUSD + CleaningCostUSD\
    \ + ReplacementCostUSD) / GenCapMW. Lower = more cost-effective maintenance.\n\
    \n[kb=7]\nMCE = \\frac{MaintenanceCostUSD + CleaningCostUSD + ReplacementCostUSD}{GenCapMW},\
    \ \\text{where lower values indicate more cost-effective maintenance.} \u2014\
    \ Evaluates the cost-effectiveness of maintenance relative to the plant's capacity.\n\
    [/kb=7]"
  label: Maintenance Cost Efficiency (MCE)
  hidden: false
  meta:
    kb_id: 7
- name: rlr
  sql: CASE WHEN plant.gencapmw > 0 THEN COALESCE(revlossusd, 0) / plant.gencapmw
    ELSE NULL END
  type: DOUBLE
  primary_key: false
  description: "Revenue Loss Rate (RLR, KB#8): RevenueLossUSD / GenCapMW. Higher =\
    \ greater financial impact from downtime.\n\n[kb=8]\nRLR = \\frac{RevenueLossUSD}{GenCapMW},\
    \ \\text{where higher values indicate greater financial impact from downtime.}\
    \ \u2014 Calculates the revenue loss per MW of capacity due to maintenance issues.\n\
    [/kb=8]"
  label: Revenue Loss Rate (RLR)
  hidden: false
  meta:
    kb_id: 8
- name: mroi
  sql: CASE WHEN (COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0) + COALESCE(replacecostusd,
    0)) > 0 AND plant.gencapmw > 0 THEN (COALESCE(revlossusd, 0) / plant.gencapmw)
    / ((COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0) + COALESCE(replacecostusd,
    0)) / plant.gencapmw) ELSE NULL END
  type: DOUBLE
  primary_key: false
  description: "Maintenance Return on Investment (MROI, KB#32): RLR / MCE. Higher\
    \ values indicate better return on maintenance investments.\n\n[kb=32]\nMROI =\
    \ RLR / MCE, where RLR is the Revenue Loss Rate and MCE is the Maintenance Cost\
    \ Efficiency. Higher values indicate better return on maintenance investments.\
    \ \u2014 Evaluates the financial return of maintenance activities.\n[/kb=32]"
  label: Maintenance Return on Investment (MROI)
  hidden: false
  meta:
    kb_id: 32
- name: premium_maintenance_candidate
  sql: CASE WHEN (COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0) + COALESCE(replacecostusd,
    0)) > 0 AND plant.gencapmw > 0 AND panel_performance__panel.powratew > 0 AND ((COALESCE(revlossusd,
    0) / plant.gencapmw) / ((COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0)
    + COALESCE(replacecostusd, 0)) / plant.gencapmw)) > 2.0 AND ((panel_performance.measpoww
    * 1.0 / panel_performance__panel.powratew * 100) * (1 - panel_performance__panel__environment.soillosspct
    / 100.0) * (1 - CAST(json_extract(panel_performance.efficiency_profile, '$.degradation.cumdegpct')
    AS REAL) / 100.0)) BETWEEN 75 AND 90 THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: "Premium Maintenance Candidate (KB#41): 1 when MROI > 2.0 AND 75% <\
    \ EPE < 90%; else 0. EPE = PPR \xD7 (1 - SoilingLossPct/100) \xD7 (1 - CumDegPct/100),\
    \ inlined here from panel_performance, panel, and environment via the maintenance\
    \ \u2192 panel_performance \u2192 panel \u2192 environment chain.\n\n[kb=41]\n\
    A panel is considered a premium maintenance candidate when its Maintenance Return\
    \ on Investment exceeds 2.0 and its Energy Production Efficiency is below 90%\
    \ but above 75%. \u2014 Identifies panels that would benefit most from premium\
    \ maintenance services.\n[/kb=41]"
  label: Premium Maintenance Candidate
  hidden: false
  meta:
    kb_id: 41
- name: has_critical_alert
  sql: CASE WHEN EXISTS (SELECT 1 FROM alerts a WHERE a.deviceref = maintenance.compref
    AND a.alertstat = 'Critical') THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: 'Helper for Maintenance Urgency Classification (KB#50): 1 iff there
    exists at least one alert with status ''Critical'' for the same panel as this
    maintenance row, else 0.'
  hidden: false
- name: maintenance_urgency
  sql: CASE WHEN EXISTS (SELECT 1 FROM alerts a WHERE a.deviceref = maintenance.compref
    AND a.alertstat = 'Critical') AND (COALESCE(maintcostusd, 0) + COALESCE(cleancostusd,
    0) + COALESCE(replacecostusd, 0)) > 0 AND plant.gencapmw > 0 AND ((COALESCE(revlossusd,
    0) / plant.gencapmw) / ((COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0)
    + COALESCE(replacecostusd, 0)) / plant.gencapmw)) > 2.0 THEN 'URGENT' WHEN EXISTS
    (SELECT 1 FROM alerts a WHERE a.deviceref = maintenance.compref AND a.alertstat
    = 'Critical') THEN 'HIGH' WHEN (COALESCE(maintcostusd, 0) + COALESCE(cleancostusd,
    0) + COALESCE(replacecostusd, 0)) > 0 AND plant.gencapmw > 0 AND ((COALESCE(revlossusd,
    0) / plant.gencapmw) / ((COALESCE(maintcostusd, 0) + COALESCE(cleancostusd, 0)
    + COALESCE(replacecostusd, 0)) / plant.gencapmw)) > 2.0 THEN 'MEDIUM' ELSE 'LOW'
    END
  type: TEXT
  primary_key: false
  description: "Maintenance Urgency Classification (KB#50): URGENT (critical alert\
    \ AND MROI>2), HIGH (critical alert), MEDIUM (MROI>2), LOW (else). 'Critical alert'\
    \ is a correlated EXISTS into the alerts table on the same panel.\n\n[kb=50]\n\
    URGENT: Having critical alerts AND MROI>2.0; HIGH: Having critical alerts; MEDIUM:\
    \ MROI>2.0; LOW: All other cases \u2014 Four-tier system prioritizing maintenance\
    \ actions based on combined financial and operational factors\n[/kb=50]"
  label: Maintenance Urgency Classification
  hidden: false
  meta:
    kb_id: 50
measures: []
aggregations: []
joins:
- target_model: panel
  join_pairs:
  - - compref
    - panemark
  join_type: left
- target_model: plant
  join_pairs:
  - - powerref
    - growregistry
  join_type: left
- target_model: panel_performance
  join_pairs:
  - - obsref
    - perfregistry
  join_type: left
filters: []
description: 'Maintenance / inspection event for a plant or panel. Joins to `plant`
  (via `powerref`), `panel` (via `compref`), and `panel_performance` (via `obsref`).
  Holds inspection metadata, warranty status, and the cost components used by MCE
  / RLR / MROI: `maintcostusd`, `cleancostusd`, `replacecostusd`, `revlossusd`.'
hidden: false
