- name: powratew
  sql: powratew
  type: number
  primary_key: false
  description: "PowerRatedW (KB#20): rated power in W under Standard Test Conditions.\
    \ Modern panels: 250W (older) to 650W (high-efficiency).\n\n[kb=20]\nMeasured\
    \ in watts (W), representing the maximum power output a panel can produce under\
    \ Standard Test Conditions (STC). Values typically range from 250W for older models\
    \ to 650W for newer high-efficiency panels. \u2014 Illustrates the rated power\
    \ output of solar panels.\n[/kb=20]"
  label: PowerRatedW (Panel Rated Power)
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 20
- name: paneeffpct
  sql: paneeffpct
  type: number
  primary_key: false
  description: "PaneEffPct (KB#21): nominal panel efficiency percentage at STC. Also\
    \ serves as `InitialEfficiencyPercent` for the Panel Efficiency Loss Rate (KB#1).\n\
    \n[kb=21]\nExpressed as a percentage, representing how much of the sun's energy\
    \ hitting the panel is converted to electricity. Modern panels typically range\
    \ from 15% to 23%, with premium models reaching up to 25%. \u2014 Illustrates\
    \ the efficiency of solar panels in converting sunlight to electricity.\n[/kb=21]"
  label: PaneEffPct (Panel Efficiency Percentage)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 21
- name: nomtempc
  sql: nomtempc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: tempcoef
  sql: tempcoef
  type: number
  primary_key: false
  description: "TempCoef (KB#22): temperature coefficient (% per C, usually negative).\
    \ Each C above 25C reduces output by |tempcoef|%. Typical: -0.25% to -0.50% per\
    \ C.\n\n[kb=22]\nExpressed as a percentage per degree Celsius (usually negative),\
    \ indicating how much a panel's power output decreases for each degree above 25\xB0\
    C. Typical values range from -0.25% to -0.50% per \xB0C, with lower absolute values\
    \ indicating better high-temperature performance. \u2014 Illustrates how panel\
    \ performance changes with temperature.\n[/kb=22]"
  label: TempCoef (Temperature Coefficient)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 22
measures: []
