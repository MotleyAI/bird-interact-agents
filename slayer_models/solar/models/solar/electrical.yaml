filters: []
description: Per-panel electrical parameters captured both initially and currently
  (Isc, Voc, Imp, Vmp, FillFactor, plus series and shunt resistance). Joins to `panel`
  (via `engyunitref`) and `panel_performance` (via `efflogref`).
