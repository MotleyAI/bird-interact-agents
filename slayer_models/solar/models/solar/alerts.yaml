description: "Performance/maintenance alerts. Joins to `plant` (via `compreg`), `panel`\
  \ (via `deviceref`), and `panel_performance` (via `incidentref`). KB#53 mandates\
  \ alert specification: Critical alerts must reference plant + panel + performance\
  \ record, set status to 'Critical', assign 'High' maintenance priority, set replacement\
  \ priority by performance shortfall (<60% of expected -> 'High', else 'Medium'),\
  \ and use 'ALERT_' prefix random-hash IDs (with a 30-day update window for duplicates).\n\
  \n[kb=53]\nMandates that critical alerts must: (1) Reference the plant ID, panel\
  \ ID and performance record; (2) Set status to 'Critical'; (3) Assign 'High' maintenance\
  \ priority; (4) Set replacement priority to 'High' if performance <60% of expected,\
  \ otherwise 'Medium'; (5) Mark optimization potential as 'High'; (6) Use 'ALERT_'\
  \ prefix with random hash for IDs; (7) Update existing alerts within 30-day window\
  \ rather than creating duplicates \u2014 Comprehensive rules for generating performance\
  \ alerts\n[/kb=53]"
