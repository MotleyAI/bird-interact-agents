  description: 'FillFactorInitial (KB#24): initial fill factor at install. Dimensionless
    0-1; high-quality commercial panels: 0.75-0.85.'
  hidden: false
  format:
    type: float
  meta:
    kb_id: 24
- name: ffactorcurr
  sql: ffactorcurr
  type: number
  primary_key: false
  description: 'FillFactorCurrent (KB#24): current fill factor measurement. Lower
    than initial reflects degradation.'
  hidden: false
  format:
    type: float
- name: seriesresohm
  sql: seriesresohm
  type: number
  primary_key: false
  hidden: false
