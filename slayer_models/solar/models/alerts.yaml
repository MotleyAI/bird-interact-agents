description: 'Performance/maintenance alerts. Joins to `plant` (via `compreg`), `panel`
  (via `deviceref`), and `panel_performance` (via `incidentref`). KB#53 mandates alert
  specification: Critical alerts must reference plant + panel + performance record,
  set status to ''Critical'', assign ''High'' maintenance priority, set replacement
  priority by performance shortfall (<60% of expected -> ''High'', else ''Medium''),
  and use ''ALERT_'' prefix random-hash IDs (with a 30-day update window for duplicates).'
