version: 3
name: stars
sql_table: stars
query_variables: {}
data_source: planets_data
columns:
- name: stellarref
  sql: stellarref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: hostplname
  sql: hostplname
  type: string
  primary_key: false
  hidden: false
- name: stellardist
  sql: stellardist
  type: number
  primary_key: false
  description: 'Distance to host star in parsecs (KB #40). Range ~3.21 to 8500 pc.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 40
- name: compcount
  sql: compcount
  type: number
  primary_key: false
  description: Number of confirmed planetary companions for this host star (range
    1..7).
  hidden: false
  format:
    type: integer
  meta: {}
- name: coordsys
  sql: coordsys
  type: string
  primary_key: false
  description: JSONB with RA_Text/RA_Decimal (right ascension) and Dec_Text/Dec_Decimal
    (declination).
  hidden: false
  meta: {}
- name: stellarprops
  sql: stellarprops
  type: string
  primary_key: false
  description: JSONB grouping photometry (Opt_Mag, Mag_Blend, Photo_Band) and physical
    properties (Temp_Value, Temp_Blend, Mass_Value, Mass_Blend, Radius_Value, Rad_Blend)
    for the host star. KB ids 41-44 illustrate the embedded values; KB 38 is the blend
    flag concept.
  hidden: false
  meta:
    kb_ids:
    - 38
    - 41
    - 42
    - 43
    - 44
- name: ra_decimal
  sql: CAST(json_extract(coordsys, '$.RA_Decimal') AS REAL)
  type: number
  primary_key: false
  description: Right Ascension in decimal degrees (0..360), extracted from coordsys
    JSON.
  hidden: false
- name: dec_decimal
  sql: CAST(json_extract(coordsys, '$.Dec_Decimal') AS REAL)
  type: number
  primary_key: false
  description: Declination in decimal degrees (-90..+90), extracted from coordsys
    JSON.
  hidden: false
- name: ra_text
  sql: json_extract(coordsys, '$.RA_Text')
  type: string
  primary_key: false
  description: Right Ascension in sexagesimal format (e.g. '12h20m43.03s').
  hidden: false
- name: dec_text
  sql: json_extract(coordsys, '$.Dec_Text')
  type: string
  primary_key: false
  description: Declination in sexagesimal format (e.g. '+17d47m34.3s').
  hidden: false
- name: stellar_mass
  sql: CAST(json_extract(stellarprops, '$.physical.Mass_Value') AS REAL)
  type: number
  primary_key: false
  description: 'Stellar mass in solar masses (KB #43). Extracted from stellarprops
    JSON.'
  hidden: false
- name: stellar_radius
  sql: CAST(json_extract(stellarprops, '$.physical.Radius_Value') AS REAL)
  type: number
  primary_key: false
  description: 'Stellar radius in solar radii (KB #44). Extracted from stellarprops
    JSON.'
  hidden: false
- name: stellar_temp
  sql: CAST(json_extract(stellarprops, '$.physical.Temp_Value') AS REAL)
  type: number
  primary_key: false
  description: 'Effective stellar temperature in Kelvin (KB #42). Extracted from stellarprops
    JSON.'
  hidden: false
- name: opt_mag
  sql: CAST(json_extract(stellarprops, '$.photometry.Opt_Mag') AS REAL)
  type: number
  primary_key: false
  description: 'Apparent optical magnitude (KB #41). Smaller is brighter. Extracted
    from stellarprops JSON.'
  hidden: false
- name: mag_blend
  sql: CAST(json_extract(stellarprops, '$.photometry.Mag_Blend') AS REAL)
  type: number
  primary_key: false
  description: Blend flag for optical magnitude (1 = blended, 0 = clean). Extracted
    from stellarprops JSON.
  hidden: false
- name: temp_blend
  sql: CAST(json_extract(stellarprops, '$.physical.Temp_Blend') AS REAL)
  type: number
  primary_key: false
  description: Blend flag for effective temperature (1 = blended, 0 = clean). Extracted
    from stellarprops JSON.
  hidden: false
- name: mass_blend
  sql: CAST(json_extract(stellarprops, '$.physical.Mass_Blend') AS REAL)
  type: number
  primary_key: false
  description: Blend flag for stellar mass (1 = blended, 0 = clean). Extracted from
    stellarprops JSON.
  hidden: false
- name: rad_blend
  sql: CAST(json_extract(stellarprops, '$.physical.Rad_Blend') AS REAL)
  type: number
  primary_key: false
  description: Blend flag for stellar radius (1 = blended, 0 = clean). Extracted from
    stellarprops JSON.
  hidden: false
- name: photo_band
  sql: json_extract(stellarprops, '$.photometry.Photo_Band')
  type: string
  primary_key: false
  description: Photometric band used for magnitude measurement (e.g. 'V (Johnson)',
    'Kepler-band').
  hidden: false
- name: distance_lightyears
  sql: stellardist * 3.26156
  type: number
  primary_key: false
  description: 'Distance to the star in light-years (KB #0): D_ly = D_pc x 3.26156.'
  hidden: false
  meta:
    kb_id: 0
- name: stellar_luminosity
  sql: pow(CAST(json_extract(stellarprops, '$.physical.Radius_Value') AS REAL), 2)
    * pow(CAST(json_extract(stellarprops, '$.physical.Temp_Value') AS REAL) / 5778.0,
    4)
  type: number
  primary_key: false
  description: 'Stellar luminosity in solar units (KB #3) via Stefan-Boltzmann: L
    = (R/Rsun)^2 * (T/Tsun)^4 with Tsun=5778 K.'
  hidden: false
  meta:
    kb_id: 3
- name: hz_inner_boundary
  sql: sqrt((pow(CAST(json_extract(stellarprops, '$.physical.Radius_Value') AS REAL),
    2) * pow(CAST(json_extract(stellarprops, '$.physical.Temp_Value') AS REAL) / 5778.0,
    4)) / 1.1)
  type: number
  primary_key: false
  description: 'Habitable Zone inner boundary in AU (KB #6): r_i = sqrt(L_star / 1.1).'
  hidden: false
  meta:
    kb_id: 6
- name: hz_outer_boundary
  sql: sqrt((pow(CAST(json_extract(stellarprops, '$.physical.Radius_Value') AS REAL),
    2) * pow(CAST(json_extract(stellarprops, '$.physical.Temp_Value') AS REAL) / 5778.0,
    4)) / 0.53)
  type: number
  primary_key: false
  description: 'Habitable Zone outer boundary in AU (KB #7): r_o = sqrt(L_star / 0.53).'
  hidden: false
  meta:
    kb_id: 7
- name: stellar_density
  sql: CAST(json_extract(stellarprops, '$.physical.Mass_Value') AS REAL) / ((4.0/3.0)
    * 3.141592653589793 * pow(CAST(json_extract(stellarprops, '$.physical.Radius_Value')
    AS REAL), 3))
  type: number
  primary_key: false
  description: 'Average stellar density (KB #12) in solar units: rho = M / (4/3 *
    pi * R^3).'
  hidden: false
  meta:
    kb_id: 12
- name: gravitational_parameter
  sql: 6.6743e-11 * CAST(json_extract(stellarprops, '$.physical.Mass_Value') AS REAL)
    * 1.989e30
  type: number
  primary_key: false
  description: 'Standard gravitational parameter mu = G * M_star (KB #19). G = 6.6743e-11
    N m^2/kg^2; M_star converted from solar masses to kg (1 M_sun = 1.989e30 kg).
    Units: m^3/s^2.'
  hidden: false
  meta:
    kb_id: 19
- name: is_multi_planetary
  sql: compcount > 1
  type: boolean
  primary_key: false
  description: 'Multi-planetary System (KB #28): the star hosts more than one confirmed
    planet.'
  hidden: false
  meta:
    kb_id: 28
- name: hr_diagram_position
  sql: '''('' || CAST(json_extract(stellarprops, ''$.physical.Temp_Value'') AS REAL)
    || '', '' || (pow(CAST(json_extract(stellarprops, ''$.physical.Radius_Value'')
    AS REAL), 2) * pow(CAST(json_extract(stellarprops, ''$.physical.Temp_Value'')
    AS REAL) / 5778.0, 4)) || '')'''
  type: string
  primary_key: false
  description: 'Hertzsprung-Russell diagram coordinate (KB #13): (T_star, L_star).
    Pair encoded as ''(T, L)'' string for grouping.'
  hidden: false
  meta:
    kb_id: 13
measures: []
aggregations: []
joins: []
filters: []
description: Host stars (one row per star). hostplname is the star system name. coordsys/stellarprops
  are JSONB blobs holding RA/Dec coordinates and stellar physical properties (temperature,
  mass, radius, photometry).
hidden: false
