version: 3
name: physical_properties
sql_table: physical_properties
query_variables: {}
data_source: planets_data
columns:
- name: physref
  sql: physref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: objectlink
  sql: objectlink
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: massjup
  sql: massjup
  type: number
  primary_key: false
  description: 'Planet mass in Jupiter masses (KB #47). Range 0.00006..28.5 M_J.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 47
- name: radjup
  sql: radjup
  type: number
  primary_key: false
  description: 'Planet radius in Jupiter radii (KB #48). Range 0.027..6.9 R_J.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 48
- name: densvalue
  sql: densvalue
  type: number
  primary_key: false
  description: 'Bulk planet density in g/cm^3 (KB #49). <1 = puffy gas giant, ~5.5
    = rocky, >20 = super-dense.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 49
- name: mass_earth
  sql: massjup * 317.83
  type: number
  primary_key: false
  description: 'Planet mass in Earth masses (KB #1): M_E = M_J x 317.83.'
  hidden: false
  meta:
    kb_id: 1
- name: radius_earth
  sql: radjup * 11.209
  type: number
  primary_key: false
  description: 'Planet radius in Earth radii (KB #2): R_E = R_J x 11.209.'
  hidden: false
  meta:
    kb_id: 2
- name: surface_gravity
  sql: (massjup * 317.83) / pow(radjup * 11.209, 2)
  type: number
  primary_key: false
  description: 'Planet surface gravity relative to Earth (KB #4): g_p = M_E / R_E^2.'
  hidden: false
  meta:
    kb_id: 4
- name: mass_radius_ratio
  sql: (massjup * 317.83) / NULLIF(radjup * 11.209, 0)
  type: number
  primary_key: false
  description: 'Mass-Radius Ratio (KB #16): MRR = M_E / R_E.'
  hidden: false
  meta:
    kb_id: 16
- name: escape_velocity
  sql: sqrt(2.0 * 6.6743e-11 * (massjup * 317.83 * 5.972e24) / NULLIF(radjup * 11.209
    * 6.371e6, 0))
  type: number
  primary_key: false
  description: 'Planet escape velocity in m/s (KB #10): v_e = sqrt(2 G M_p / R_p).
    Earth-mass and Earth-radius converted to SI (1 M_E=5.972e24 kg, 1 R_E=6.371e6
    m).'
  hidden: false
  meta:
    kb_id: 10
- name: transit_depth
  sql: pow((radjup * 11.209) / NULLIF(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Radius_Value') AS REAL) * 109.076, 0), 2)
  type: number
  primary_key: false
  description: 'Transit Depth (KB #9): Delta F = (R_p / R_star)^2. Both radii converted
    to common units (Earth radii; 1 R_sun = 109.076 R_E).'
  hidden: false
  meta:
    kb_id: 9
- name: planet_star_mass_ratio
  sql: (massjup * 317.83) / NULLIF(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Mass_Value') AS REAL) * 332946.0, 0)
  type: number
  primary_key: false
  description: 'Planet-Star Mass Ratio (KB #18): q = M_p / M_star. Both masses converted
    to Earth masses (1 M_sun = 332946 M_E).'
  hidden: false
  meta:
    kb_id: 18
- name: is_gas_giant
  sql: massjup > 0.1
  type: boolean
  primary_key: false
  description: 'Gas Giant (KB #20): planet mass > 0.1 Jupiter masses.'
  hidden: false
  meta:
    kb_id: 20
- name: is_rocky_planet
  sql: densvalue > 3
  type: boolean
  primary_key: false
  description: 'Rocky Planet (KB #21): bulk density > 3 g/cm^3.'
  hidden: false
  meta:
    kb_id: 21
- name: is_super_earth
  sql: densvalue > 3 AND (massjup * 317.83) BETWEEN 1 AND 10
  type: boolean
  primary_key: false
  description: 'Super-Earth (KB #24): a Rocky Planet with mass between 1 and 10 Earth
    masses.'
  hidden: false
  meta:
    kb_id: 24
- name: is_inflated_gas_giant
  sql: massjup > 0.1 AND densvalue < 0.5
  type: boolean
  primary_key: false
  description: 'Inflated Gas Giant (KB #32): a Gas Giant with bulk density < 0.5 g/cm^3.'
  hidden: false
  meta:
    kb_id: 32
measures: []
aggregations: []
joins:
- target_model: planets
  join_pairs:
  - - objectlink
    - planetref
  join_type: left
filters: []
description: Planet physical properties (one row per planet). Holds Jupiter-unit mass
  and radius plus bulk density. Joins to planets via objectlink, which transitively
  reaches the host stars model.
hidden: false
