- name: masssource
  sql: masssource
  type: string
  primary_key: false
  description: 'Mass determination method (KB #34). ''Msini'' = minimum mass from
    radial velocity (M*sin(i)); ''Mass'' = true mass; ''Msin(i)/sin(i)'' = inclination-corrected.'
  hidden: false
  meta:
    kb_id: 34
- name: updatestamp
  sql: updatestamp
  type: string
  primary_key: false
  hidden: false
- name: limitflags
  sql: limitflags
  type: string
  primary_key: false
  description: 'JSONB grouping limit flags for planetary and stellar parameters. Each
    flag is 0 (measured), 1 (upper limit per KB #35), or -1 (lower limit). Sub-paths:
    $.planetary_limits.{Period_Lim,Semimaj_Lim,Ecc_Lim,Incl_Lim,Mass_Lim,Rad_Lim,Dens_Lim}
    and $.stellar_limits.{Dist_Lim,OptMag_Lim,Temp_Lim,StellarMass_Lim,StellarRad_Lim}.'
  hidden: false
  meta:
    kb_ids:
    - 35
- name: is_minimum_mass
  sql: masssource = 'Msini'
  type: boolean
  primary_key: false
  description: 'Minimum Mass Status (KB #34): mass was measured via radial velocity
    so the value is M*sin(i), a lower bound on true mass.'
  hidden: false
  meta:
    kb_id: 34
- name: period_rel_uncertainty
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0
  type: number
  primary_key: false
  description: 'Relative uncertainty in orbital period (KB #8) as a percent: U_rel
    = ((e1 - e2) / 2) / v * 100. Wraps with ABS so the result is a magnitude regardless
    of sign convention.'
  hidden: false
  meta:
    kb_id: 8
- name: mass_rel_uncertainty
  sql: ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0
  type: number
  primary_key: false
  description: 'Relative uncertainty in planetary mass (KB #8) as a percent.'
  hidden: false
  meta:
    kb_id: 8
- name: radius_rel_uncertainty
  sql: ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0
  type: number
  primary_key: false
  description: 'Relative uncertainty in planetary radius (KB #8) as a percent.'
  hidden: false
  meta:
    kb_id: 8
- name: is_period_high_precision
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0 < 5.0
  type: boolean
  primary_key: false
  description: 'High-Precision Measurement of orbital period (KB #29): relative uncertainty
    < 5%.'
  hidden: false
  meta:
    kb_id: 29
- name: is_mass_high_precision
  sql: ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0 < 5.0
  type: boolean
  primary_key: false
  description: 'High-Precision Measurement of planetary mass (KB #29): relative uncertainty
    < 5%.'
  hidden: false
  meta:
    kb_id: 29
- name: is_radius_high_precision
  sql: ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0 < 5.0
  type: boolean
  primary_key: false
  description: 'High-Precision Measurement of planetary radius (KB #29): relative
    uncertainty < 5%.'
  hidden: false
  meta:
    kb_id: 29
- name: is_well_characterized
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0 < 5.0 AND ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0 < 5.0 AND ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0 < 5.0
  type: boolean
  primary_key: false
  description: 'Well-Characterized Planet (KB #30): mass, radius, and period are all
    High-Precision Measurements.'
  hidden: false
  meta:
    kb_id: 30
- name: period_is_upper_limit
  sql: CAST(json_extract(limitflags, '$.planetary_limits.Period_Lim') AS INTEGER)
    = 1
  type: boolean
  primary_key: false
  description: 'Upper Limit Value flag for orbital period (KB #35): the recorded period
    is an upper bound, not an exact measurement.'
  hidden: false
  meta:
    kb_id: 35
- name: mass_is_upper_limit
  sql: CAST(json_extract(limitflags, '$.planetary_limits.Mass_Lim') AS INTEGER) =
    1
  type: boolean
  primary_key: false
  description: 'Upper Limit Value flag for planetary mass (KB #35).'
  hidden: false
  meta:
    kb_id: 35
- name: radius_is_upper_limit
  sql: CAST(json_extract(limitflags, '$.planetary_limits.Rad_Lim') AS INTEGER) = 1
  type: boolean
  primary_key: false
  description: 'Upper Limit Value flag for planetary radius (KB #35).'
  hidden: false
  meta:
    kb_id: 35
measures: []
aggregations: []
joins:
- target_model: planets
  join_pairs:
  - - targetlink
    - planetref
  join_type: left
filters: []
description: 'Per-planet data-quality / uncertainty record. Stores +/- 1-sigma errors
  for orbital and physical parameters, plus mass-source flag and a JSONB limitflags
  blob. Joins to planets via targetlink. KB #8 defines the relative-uncertainty formula
  used to derive precision flags below.'
hidden: false
