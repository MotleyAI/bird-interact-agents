version: 3
name: orbital_characteristics
sql_table: orbital_characteristics
query_variables: {}
data_source: planets_data
columns:
- name: orbitalref
  sql: orbitalref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: bodylink
  sql: bodylink
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: period
  sql: period
  type: number
  primary_key: false
  description: 'Orbital period in days (KB #45). ''Hot Jupiters'' have a few-day periods;
    distant orbits can take thousands of years.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 45
- name: semimajor
  sql: semimajor
  type: number
  primary_key: false
  description: Semi-major axis in AU. Range 0.0044..2500 AU.
  hidden: false
  format:
    type: integer
  meta: {}
- name: eccentricity
  sql: eccentricity
  type: number
  primary_key: false
  description: 'Orbital eccentricity (KB #46). 0 = circular, approaches 1 = elongated/comet-like.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 46
- name: inclination
  sql: inclination
  type: number
  primary_key: false
  description: Orbital inclination in degrees relative to sky plane. 0 = face-on,
    180 = retrograde.
  hidden: false
  format:
    type: integer
  meta: {}
- name: equilibrium_temperature
  sql: CAST(json_extract(planets__stars.stellarprops, '$.physical.Temp_Value') AS
    REAL) * sqrt(CAST(json_extract(planets__stars.stellarprops, '$.physical.Radius_Value')
    AS REAL) * 0.00465047 / (2.0 * NULLIF(semimajor, 0)))
  type: number
  primary_key: false
  description: 'Planetary equilibrium temperature in Kelvin (KB #5): T_eq = T_star
    * sqrt(R_star / (2a)). Inlines stellar temperature/radius from JSON (1 R_sun =
    0.00465047 AU).'
  hidden: false
  meta:
    kb_id: 5
- name: orbital_velocity
  sql: sqrt(6.6743e-11 * CAST(json_extract(planets__stars.stellarprops, '$.physical.Mass_Value')
    AS REAL) * 1.989e30 / NULLIF(semimajor * 1.496e11, 0))
  type: number
  primary_key: false
  description: 'Orbital velocity in m/s (KB #11): v_orb = sqrt(G * M_star / a). Inlines
    stellar mass from JSON (1 M_sun = 1.989e30 kg, 1 AU = 1.496e11 m).'
  hidden: false
  meta:
    kb_id: 11
- name: kepler_stellar_mass
  sql: pow(semimajor, 3) / NULLIF(pow(period / 365.25, 2), 0)
  type: number
  primary_key: false
  description: 'Stellar mass in solar masses inferred from Kepler''s Third Law (KB
    #15): M_star = a^3 / P^2, with a in AU and P in years (period stored in days,
    divide by 365.25).'
  hidden: false
  meta:
    kb_id: 15
- name: goldilocks_value
  sql: (semimajor - sqrt((pow(CAST(json_extract(planets__stars.stellarprops, '$.physical.Radius_Value')
    AS REAL), 2) * pow(CAST(json_extract(planets__stars.stellarprops, '$.physical.Temp_Value')
    AS REAL) / 5778.0, 4)) / 1.1)) / NULLIF(sqrt((pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Radius_Value') AS REAL), 2) * pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Temp_Value') AS REAL) / 5778.0, 4)) / 0.53) - sqrt((pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Radius_Value') AS REAL), 2) * pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Temp_Value') AS REAL) / 5778.0, 4)) / 1.1), 0)
  type: number
  primary_key: false
  description: 'Goldilocks Value (KB #14): G = (a - r_i) / (r_o - r_i). 0.5 = perfectly
    centered in habitable zone. Inlines the HZ boundary formulas (KB #6, #7) since
    cross-table column-of-column references aren''t resolved by SLayer.'
  hidden: false
  meta:
    kb_id: 14
- name: is_short_period
  sql: period < 10
  type: boolean
  primary_key: false
  description: 'Short-Period Planet (KB #22): orbital period < 10 days.'
  hidden: false
  meta:
    kb_id: 22
- name: is_high_eccentricity
  sql: eccentricity > 0.25
  type: boolean
  primary_key: false
  description: 'High Eccentricity Planet (KB #27): orbital eccentricity > 0.25.'
  hidden: false
  meta:
    kb_id: 27
- name: is_retrograde
  sql: inclination > 90
  type: boolean
  primary_key: false
  description: 'Retrograde Orbit (KB #31): orbital inclination > 90 degrees.'
  hidden: false
  meta:
    kb_id: 31
- name: is_in_habitable_zone
  sql: semimajor BETWEEN sqrt((pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Radius_Value') AS REAL), 2) * pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Temp_Value') AS REAL) / 5778.0, 4)) / 1.1) AND sqrt((pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Radius_Value') AS REAL), 2) * pow(CAST(json_extract(planets__stars.stellarprops,
    '$.physical.Temp_Value') AS REAL) / 5778.0, 4)) / 0.53)
  type: boolean
  primary_key: false
  description: 'Planet in Habitable Zone (KB #25): semi-major axis falls between r_i
    and r_o. Inlines the HZ boundary formulas (KB #6, #7).'
  hidden: false
  meta:
    kb_id: 25
measures: []
aggregations: []
joins:
- target_model: planets
  join_pairs:
  - - bodylink
    - planetref
  join_type: left
filters: []
description: 'Planet orbital characteristics (one row per planet): orbital period,
  semi-major axis, eccentricity, inclination. Joins to planets via bodylink, which
  reaches stars transitively.'
hidden: false
