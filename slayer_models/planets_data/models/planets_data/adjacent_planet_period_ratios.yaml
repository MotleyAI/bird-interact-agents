description: "Per-planet (excluding the innermost in each system) ratio of this planet's\
  \ orbital period to the next-inner planet's orbital period. Encodes KB #17 Orbital\
  \ Period Ratio. Uses LAG within each host star, ordered by period ascending; rows\
  \ where there is no inner sibling are dropped.\n\n[kb=17]\nFor two planets, an outer\
  \ planet with period $P_{out}$ and an inner planet with period $P_{in}$, the ratio\
  \ is: $R_{period} = \\frac{P_{out}}{P_{in}}$. \u2014 Calculates the ratio of the\
  \ orbital periods of two adjacent planets in a system.\n[/kb=17]"
