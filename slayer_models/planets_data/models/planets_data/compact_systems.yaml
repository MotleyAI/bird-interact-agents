description: "Host stars whose system is a Compact System (KB #33): a Multi-planetary\
  \ System (compcount > 1) where every adjacent pair of planets has Orbital Period\
  \ Ratio < 3 (max ratio < 3).\n\n[kb=33]\nA Multi-planetary System where the Orbital\
  \ Period Ratio between all adjacent pairs of planets is less than 3. \u2014 A planetary\
  \ system where multiple planets orbit very close to each other.\n[/kb=33]"
