version: 6
name: compact_systems
source_queries:
- version: 3
  name: max_ratio_per_host
  source_model: adjacent_planet_period_ratios
  measures:
  - formula: period_ratio:max
  dimensions:
  - name: hostlink
  whole_periods_only: false
- version: 3
  source_model:
    source_name: max_ratio_per_host
    joins:
    - target_model: stars
      join_pairs:
      - - hostlink
        - stellarref
  dimensions:
  - name: hostlink
  - name: hostplname
    model: stars
  - name: compcount
    model: stars
  - name: period_ratio_max
  filters:
  - stars.compcount > 1
  - period_ratio_max < 3
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"max_ratio_per_host.hostlink\" AS hostlink, \"max_ratio_per_host.stars.hostplname\"\
  \ AS stars__hostplname, \"max_ratio_per_host.stars.compcount\" AS stars__compcount,\
  \ \"max_ratio_per_host.period_ratio_max\" AS period_ratio_max FROM (SELECT\n  max_ratio_per_host.hostlink\
  \ AS \"max_ratio_per_host.hostlink\",\n  stars.hostplname AS \"max_ratio_per_host.stars.hostplname\"\
  ,\n  stars.compcount AS \"max_ratio_per_host.stars.compcount\",\n  max_ratio_per_host.period_ratio_max\
  \ AS \"max_ratio_per_host.period_ratio_max\"\nFROM (\n  SELECT\n    \"adjacent_planet_period_ratios.hostlink\"\
  \ AS hostlink,\n    \"adjacent_planet_period_ratios.period_ratio_max\" AS period_ratio_max\n\
  \  FROM (\n    SELECT\n      adjacent_planet_period_ratios.hostlink AS \"adjacent_planet_period_ratios.hostlink\"\
  ,\n      MAX(adjacent_planet_period_ratios.period_ratio) AS \"adjacent_planet_period_ratios.period_ratio_max\"\
  \n    FROM (\n      SELECT\n        \"with_lag.bodylink\" AS bodylink,\n       \
  \ \"with_lag.hostlink\" AS hostlink,\n        \"with_lag.period_inner\" AS period_inner,\n\
  \        \"with_lag.period_outer\" AS period_outer,\n        \"with_lag.period_ratio\"\
  \ AS period_ratio\n      FROM (\n        SELECT\n          with_lag.bodylink AS\
  \ \"with_lag.bodylink\",\n          with_lag.hostlink AS \"with_lag.hostlink\",\n\
  \          with_lag.period_inner AS \"with_lag.period_inner\",\n          with_lag.period_outer\
  \ AS \"with_lag.period_outer\",\n          with_lag.period_ratio AS \"with_lag.period_ratio\"\
  \n        FROM (\n          SELECT\n            \"orbital_characteristics.bodylink\"\
  \ AS bodylink,\n            \"orbital_characteristics.hostlink\" AS hostlink,\n\
  \            \"orbital_characteristics.period_inner\" AS period_inner,\n       \
  \     \"orbital_characteristics.period_outer\" AS period_outer,\n            \"\
  orbital_characteristics.period_ratio\" AS period_ratio\n          FROM (\n     \
  \       SELECT\n              orbital_characteristics.bodylink AS \"orbital_characteristics.bodylink\"\
  ,\n              planets.hostlink AS \"orbital_characteristics.hostlink\",\n   \
  \           LAG(period) OVER (PARTITION BY planets.hostlink ORDER BY period ASC)\
  \ AS \"orbital_characteristics.period_inner\",\n              orbital_characteristics.period\
  \ AS \"orbital_characteristics.period_outer\",\n              period * 1.0 / NULLIF(LAG(period)\
  \ OVER (PARTITION BY planets.hostlink ORDER BY period ASC), 0) AS \"orbital_characteristics.period_ratio\"\
  \n            FROM orbital_characteristics AS orbital_characteristics\n        \
  \    LEFT JOIN planets AS planets\n              ON orbital_characteristics.bodylink\
  \ = planets.planetref\n          ) AS _inner\n        ) AS with_lag\n        WHERE\n\
  \          NOT with_lag.period_inner IS NULL\n      ) AS _inner\n    ) AS adjacent_planet_period_ratios\n\
  \    GROUP BY\n      adjacent_planet_period_ratios.hostlink\n  ) AS _inner\n) AS\
  \ max_ratio_per_host\nLEFT JOIN stars AS stars\n  ON max_ratio_per_host.hostlink\
  \ = stars.stellarref\nWHERE\n  stars.compcount > 1 AND max_ratio_per_host.period_ratio_max\
  \ < 3) AS _inner"
