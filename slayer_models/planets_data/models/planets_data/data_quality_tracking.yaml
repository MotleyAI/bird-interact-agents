  label: High-Precision Measurement
  hidden: false
  meta:
    kb_id: 29
- name: is_radius_high_precision
  sql: ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0 < 5.0
  type: BOOLEAN
  primary_key: false
  description: "High-Precision Measurement of planetary radius (KB #29): relative\
    \ uncertainty < 5%.\n\n[kb=29]\nA parameter for which the calculated Relative\
    \ Uncertainty is less than 5%. \u2014 Indicates that a specific physical or orbital\
    \ parameter is known with a high degree of confidence.\n[/kb=29]"
  label: High-Precision Measurement
  hidden: false
  meta:
    kb_id: 29
- name: is_well_characterized
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0 < 5.0 AND ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0 < 5.0 AND ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0 < 5.0
  type: BOOLEAN
  primary_key: false
  description: "Well-Characterized Planet (KB #30): mass, radius, and period are all\
    \ High-Precision Measurements.\n\n[kb=30]\nA planet where the measurements for\
    \ mass, radius, and orbital period are all considered High-Precision Measurements.\
    \ \u2014 A planet for which the key parameters of mass, radius, and period are\
    \ known with high precision.\n[/kb=30]"
  label: Well-Characterized Planet
  hidden: false
  meta:
    kb_id: 30
- name: period_is_upper_limit
  sql: CAST(json_extract(limitflags, '$.planetary_limits.Period_Lim') AS INTEGER)
    = 1
  type: BOOLEAN
  primary_key: false
  description: "Upper Limit Value flag for orbital period (KB #35): the recorded period\
    \ is an upper bound, not an exact measurement.\n\n[kb=35]\nA quality flag on a\
    \ parameter signifying that its true value is less than or equal to the stated\
