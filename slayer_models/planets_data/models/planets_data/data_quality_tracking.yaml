- name: masssource
  sql: masssource
  type: TEXT
  primary_key: false
  description: "Mass determination method (KB #34). 'Msini' = minimum mass from radial\
    \ velocity (M*sin(i)); 'Mass' = true mass; 'Msin(i)/sin(i)' = inclination-corrected.\n\
    \n[kb=34]\nA flag indicating that the planet's mass was determined using a method\
    \ (like radial velocity) that measures the minimum mass ($M \\sin i$) because\
    \ the orbital inclination is unknown. \u2014 Indicates that the provided mass\
    \ for a planet is a lower limit, not the true mass.\n[/kb=34]"
  label: Minimum Mass Status
  hidden: false
  meta:
    kb_id: 34
- name: updatestamp
  sql: updatestamp
  type: TEXT
  primary_key: false
  hidden: false
- name: limitflags
  sql: limitflags
  type: TEXT
  primary_key: false
  description: "JSONB grouping limit flags for planetary and stellar parameters. Each\
    \ flag is 0 (measured), 1 (upper limit per KB #35), or -1 (lower limit). Sub-paths:\
    \ $.planetary_limits.{Period_Lim,Semimaj_Lim,Ecc_Lim,Incl_Lim,Mass_Lim,Rad_Lim,Dens_Lim}\
    \ and $.stellar_limits.{Dist_Lim,OptMag_Lim,Temp_Lim,StellarMass_Lim,StellarRad_Lim}.\n\
    \n[kb=35]\nA quality flag on a parameter signifying that its true value is less\
    \ than or equal to the stated value. \u2014 Indicates that a measured value for\
    \ a parameter is not an exact measurement but an upper boundary.\n[/kb=35]"
  label: Upper Limit Value
  hidden: false
  meta:
    kb_id: 35
- name: is_minimum_mass
  sql: masssource = 'Msini'
  type: BOOLEAN
  primary_key: false
  description: "Minimum Mass Status (KB #34): mass was measured via radial velocity\
    \ so the value is M*sin(i), a lower bound on true mass.\n\n[kb=34]\nA flag indicating\
    \ that the planet's mass was determined using a method (like radial velocity)\
    \ that measures the minimum mass ($M \\sin i$) because the orbital inclination\
    \ is unknown. \u2014 Indicates that the provided mass for a planet is a lower\
    \ limit, not the true mass.\n[/kb=34]"
  label: Minimum Mass Status
  hidden: false
  meta:
    kb_id: 34
- name: period_rel_uncertainty
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0
  type: DOUBLE
  primary_key: false
  description: "Relative uncertainty in orbital period (KB #8) as a percent: U_rel\
    \ = ((e1 - e2) / 2) / v * 100. Wraps with ABS so the result is a magnitude regardless\
    \ of sign convention.\n\n[kb=8]\nFor a value $v$ with positive error $e_1$ and\
    \ negative error $e_2$, the relative uncertainty ($U_{rel}$) is: $U_{rel} = \\\
    frac{(e_1 - e_2) / 2}{v} \\times 100\\%$ \u2014 Measures the precision of a measurement\
    \ as a percentage of the measured value.\n[/kb=8]"
  label: Relative Uncertainty
  hidden: false
  meta:
    kb_id: 8
- name: mass_rel_uncertainty
  sql: ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0
  type: DOUBLE
  primary_key: false
  description: "Relative uncertainty in planetary mass (KB #8) as a percent.\n\n[kb=8]\n\
    For a value $v$ with positive error $e_1$ and negative error $e_2$, the relative\
    \ uncertainty ($U_{rel}$) is: $U_{rel} = \\frac{(e_1 - e_2) / 2}{v} \\times 100\\\
    %$ \u2014 Measures the precision of a measurement as a percentage of the measured\
    \ value.\n[/kb=8]"
  label: Relative Uncertainty
  hidden: false
  meta:
    kb_id: 8
- name: radius_rel_uncertainty
  sql: ABS((raderr1 - raderr2) / 2.0) / NULLIF(planets__physical_properties.radjup,
    0) * 100.0
  type: DOUBLE
  primary_key: false
  description: "Relative uncertainty in planetary radius (KB #8) as a percent.\n\n\
    [kb=8]\nFor a value $v$ with positive error $e_1$ and negative error $e_2$, the\
    \ relative uncertainty ($U_{rel}$) is: $U_{rel} = \\frac{(e_1 - e_2) / 2}{v} \\\
    times 100\\%$ \u2014 Measures the precision of a measurement as a percentage of\
    \ the measured value.\n[/kb=8]"
  label: Relative Uncertainty
  hidden: false
  meta:
    kb_id: 8
- name: is_period_high_precision
  sql: ABS((perioderr1 - perioderr2) / 2.0) / NULLIF(planets__orbital_characteristics.period,
    0) * 100.0 < 5.0
  type: BOOLEAN
  primary_key: false
  description: "High-Precision Measurement of orbital period (KB #29): relative uncertainty\
    \ < 5%.\n\n[kb=29]\nA parameter for which the calculated Relative Uncertainty\
    \ is less than 5%. \u2014 Indicates that a specific physical or orbital parameter\
    \ is known with a high degree of confidence.\n[/kb=29]"
  label: High-Precision Measurement
  hidden: false
  meta:
    kb_id: 29
- name: is_mass_high_precision
  sql: ABS((masserr1 - masserr2) / 2.0) / NULLIF(planets__physical_properties.massjup,
    0) * 100.0 < 5.0
  type: BOOLEAN
  primary_key: false
  description: "High-Precision Measurement of planetary mass (KB #29): relative uncertainty\
    \ < 5%.\n\n[kb=29]\nA parameter for which the calculated Relative Uncertainty\
