measures: []
aggregations: []
joins:
- target_model: planets
  join_pairs:
  - - targetlink
    - planetref
  join_type: left
filters: []
description: 'Per-planet data-quality / uncertainty record. Stores +/- 1-sigma errors
  for orbital and physical parameters, plus mass-source flag and a JSONB limitflags
  blob. Joins to planets via targetlink. KB #8 defines the relative-uncertainty formula
  used to derive precision flags below.'
hidden: false
