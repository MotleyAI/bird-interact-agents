version: 3
name: news_sessions
sql_table: sessions
query_variables: {}
data_source: news
columns:
- name: seshkey
  sql: seshkey
  type: number
  primary_key: true
  description: Primary key.
  hidden: false
- name: userel
  sql: userel
  type: number
  primary_key: false
  description: FK to news_users.userkey.
  hidden: false
- name: devrel
  sql: devrel
  type: number
  primary_key: false
  description: FK to news_devices.devkey.
  hidden: false
- name: seshstart
  sql: seshstart
  type: time
  primary_key: false
  description: Session start timestamp.
  hidden: false
- name: seshdur
  sql: seshdur
  type: number
  primary_key: false
  description: Session duration in seconds.
  hidden: false
- name: seshviews
  sql: seshviews
  type: number
  primary_key: false
  description: Articles/pages viewed in session.
  hidden: false
- name: bncrate
  sql: bncrate
  type: number
  primary_key: false
  description: Raw session bounce rate (0..1).
  hidden: false
- name: seshdepth
  sql: seshdepth
  type: number
  primary_key: false
  description: Navigation depth (number of screens).
  hidden: false
- name: engscore
  sql: engscore
  type: number
  primary_key: false
  description: Session engagement score (0..1).
  hidden: false
- name: seshrecs
  sql: seshrecs
  type: number
  primary_key: false
  description: Recommendations shown to the user.
  hidden: false
- name: seshclicks
  sql: seshclicks
  type: number
  primary_key: false
  description: Recommendation clicks.
  hidden: false
- name: ctrval
  sql: ctrval
  type: number
  primary_key: false
  description: Click-through rate for recommendations (raw value).
  hidden: false
- name: langcode
  sql: langcode
  type: string
  primary_key: false
  description: 'Language code: en, fr, es, de, zh.'
  hidden: false
- name: tzoffset
  sql: tzoffset
  type: string
  primary_key: false
  description: Time-zone offset.
  hidden: false
- name: ipaddr
  sql: ipaddr
  type: string
  primary_key: false
  description: IP address.
  hidden: false
- name: geoctry
  sql: geoctry
  type: string
  primary_key: false
  description: 'Country (KB #26 illustrates geo-location data: ''San Francisco'' or
    ''USA'' provide context for regional content consumption).'
  hidden: false
  meta:
    kb_id: 26
- name: georeg
  sql: georeg
  type: string
  primary_key: false
  description: Region/state.
  hidden: false
- name: geocity
  sql: geocity
  type: string
  primary_key: false
  description: City.
  hidden: false
- name: expref
  sql: expref
  type: string
  primary_key: false
  description: A/B experiment ID.
  hidden: false
- name: persver
  sql: persver
  type: string
  primary_key: false
  description: Personalization version (v1..v5).
  hidden: false
- name: recset
  sql: recset
  type: string
  primary_key: false
  description: Recommendation-set identifier.
  hidden: false
- name: relscore
  sql: relscore
  type: number
  primary_key: false
  description: Overall content relevance for the session (0..1).
  hidden: false
- name: persacc
  sql: persacc
  type: number
  primary_key: false
  description: Personalization accuracy (0..1).
  hidden: false
- name: recutil
  sql: recutil
  type: number
  primary_key: false
  description: 'Recommendation utility/value (0..1). Used by KB #2 RRS (deferred).'
  hidden: false
- name: user_engagement_rate
  sql: (seshviews * engscore) * 1.0 / NULLIF(seshdur, 0)
  type: number
  primary_key: false
  description: "User Engagement Rate (UER, KB #0) = seshviews \xD7 engscore / seshdur."
  hidden: false
  meta:
    kb_id: 0
- name: session_bounce_rate_adjustment
  sql: bncrate * (1.0 - ctrval / 100.0)
  type: number
  primary_key: false
  description: "Session Bounce Rate Adjustment (SBRA, KB #3) = bncrate \xD7 (1 - ctrval/100)."
  hidden: false
  meta:
    kb_id: 3
- name: rctr
  sql: CASE WHEN seshrecs > 0 THEN seshclicks * 1.0 / seshrecs ELSE NULL END
  type: number
  primary_key: false
  description: 'Recommendation Click-Through Rate (RCTR, KB #58) = seshclicks/seshrecs
    when seshrecs>0. Computed at the session grain.'
  hidden: false
  meta:
    kb_id: 58
- name: elite_user_interaction_metric
  sql: (seshclicks + seshviews) * (engscore / 100.0)
  type: number
  primary_key: false
  description: "Elite User Interaction Metric (EUIM, KB #59) = (seshclicks + seshviews)\
    \ \xD7 (engscore / 100)."
  hidden: false
  meta:
    kb_id: 59
- name: bounce_percentile
  sql: PERCENT_RANK() OVER (ORDER BY bncrate * (1.0 - ctrval / 100.0))
  type: number
  primary_key: false
  description: 'Bounce Percentile (KB #52): PERCENT_RANK() over all sessions ordered
    by adjusted_bounce_rate (SBRA) ascending.'
  hidden: false
  meta:
    kb_id: 52
- name: ctr_percentile
  sql: PERCENT_RANK() OVER (ORDER BY ctrval DESC)
  type: number
  primary_key: false
  description: 'CTR Percentile (KB #53): PERCENT_RANK() over all sessions ordered
    by ctrval descending.'
  hidden: false
  meta:
    kb_id: 53
- name: performance_segment
  sql: CASE WHEN PERCENT_RANK() OVER (ORDER BY bncrate * (1.0 - ctrval / 100.0)) <
    0.25 AND PERCENT_RANK() OVER (ORDER BY ctrval DESC) < 0.25 THEN 'High Bounce,
    Low CTR' WHEN PERCENT_RANK() OVER (ORDER BY bncrate * (1.0 - ctrval / 100.0))
    < 0.25 AND PERCENT_RANK() OVER (ORDER BY ctrval DESC) >= 0.75 THEN 'High Bounce,
    High CTR' WHEN PERCENT_RANK() OVER (ORDER BY bncrate * (1.0 - ctrval / 100.0))
    >= 0.75 AND PERCENT_RANK() OVER (ORDER BY ctrval DESC) < 0.25 THEN 'Low Bounce,
    Low CTR' WHEN PERCENT_RANK() OVER (ORDER BY bncrate * (1.0 - ctrval / 100.0))
    >= 0.75 AND PERCENT_RANK() OVER (ORDER BY ctrval DESC) >= 0.75 THEN 'Low Bounce,
    High CTR' ELSE 'Average Performance' END
  type: string
  primary_key: false
  description: 'Performance Segment (KB #54): classification using bounce/ctr percentiles.
    Combinations of <0.25 (High Bounce / Low CTR) and >=0.75 (Low Bounce / High CTR),
    else ''Average Performance''.'
  hidden: false
  meta:
    kb_id: 54
- name: composite_user_activity_score
  sql: ((seshviews * engscore * 1.0 / NULLIF(seshdur, 0)) + (news_users.ageval * (CASE
    WHEN UPPER(TRIM(news_users.gendlbl)) IN ('M','F','MALE','FEMALE') THEN 1.0 ELSE
    0.8 END) * (CASE LOWER(TRIM(news_users.occulbl)) WHEN 'professional' THEN 1.5
    WHEN 'retired' THEN 1.2 WHEN 'student' THEN 0.7 ELSE 1.0 END)) + (news_users.subdays
    * (CASE LOWER(TRIM(news_users.substatus)) WHEN 'premium' THEN 2.0 WHEN 'enterprise'
    THEN 3.0 WHEN 'basic' THEN 1.0 ELSE 0.5 END))) / 3.0
  type: number
  primary_key: false
  description: 'Composite User Activity Score (CUAS, KB #50) = (UER + UDS + USV) /
    3. Computed at the session grain (UER per-session; UDS/USV inlined from joined
    news_users columns).'
  hidden: false
  meta:
    kb_id: 50
measures: []
aggregations: []
joins:
- target_model: news_users
  join_pairs:
  - - userel
    - userkey
  join_type: left
- target_model: news_devices
  join_pairs:
  - - devrel
    - devkey
  join_type: left
filters: []
description: 'News DB: User browsing sessions: duration, page views, bounce rate,
  engagement score, recommendations shown/clicked, click-through rate, geo, language,
  A/B experiment ref, personalization version, plus relevance/personalization/recommendation-utility
  scores.'
hidden: false
meta:
  kb_ids:
  - 16
  - 18
