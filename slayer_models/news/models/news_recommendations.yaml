version: 3
name: news_recommendations
sql_table: recommendations
query_variables: {}
data_source: news
columns:
- name: reckey
  sql: reckey
  type: number
  primary_key: true
  description: Primary key.
  hidden: false
- name: alglabel
  sql: alglabel
  type: string
  primary_key: false
  description: 'Algorithm: Contextual, Content-based, Collaborative, Hybrid.'
  hidden: false
- name: stratlabel
  sql: stratlabel
  type: string
  primary_key: false
  description: 'Strategy: Trending, Editorial, Similar, Personalized.'
  hidden: false
- name: posval
  sql: posval
  type: number
  primary_key: false
  description: 'Position/rank in the list. KB #28: a recommendation placed in position
    3 may benefit from higher prominence than lower-ranked placements.'
  hidden: false
  meta:
    kb_id: 28
- name: recpage
  sql: recpage
  type: string
  primary_key: false
  description: Page where the recommendation is shown.
  hidden: false
- name: recsec
  sql: recsec
  type: string
  primary_key: false
  description: Section where the recommendation is shown.
  hidden: false
- name: recscore
  sql: recscore
  type: number
  primary_key: false
  description: Recommendation relevance score (0..1).
  hidden: false
- name: confval
  sql: confval
  type: number
  primary_key: false
  description: Algorithm confidence score (0..1).
  hidden: false
- name: divval
  sql: divval
  type: number
  primary_key: false
  description: Diversity score.
  hidden: false
- name: novval
  sql: novval
  type: number
  primary_key: false
  description: Novelty score.
  hidden: false
- name: seryval
  sql: seryval
  type: number
  primary_key: false
  description: Serendipity score.
  hidden: false
- name: artlink
  sql: artlink
  type: number
  primary_key: false
  description: FK to news_articles.artkey.
  hidden: false
measures: []
aggregations: []
joins:
- target_model: news_articles
  join_pairs:
  - - artlink
    - artkey
  join_type: left
filters: []
description: 'News DB: Recommendation records (one per shown recommendation): algorithm,
  strategy, position, page/section, recommendation score, confidence, diversity, novelty,
  serendipity, FK to articles.'
hidden: false
meta:
  kb_ids:
  - 11
  - 15
