description: "Adjusted Bounce Ratio (ABR, KB #37) = SBRA \xD7 RTSE, modifying the\
  \ raw bounce metric by integrating real-time efficiency. SBRA is the Session Bounce\
  \ Rate Adjustment and RTSE is the Real-Time Session Efficiency.\n\n[kb=37]\nABR\
  \ = SBRA \\times (RTSE \\; factor), with SBRA representing the Session Bounce Rate\
  \ Adjustment and RTSE signifying Real-Time Session Efficiency. \u2014 Modifies the\
  \ raw bounce metric by integrating real-time efficiency factors.\n[/kb=37]"
