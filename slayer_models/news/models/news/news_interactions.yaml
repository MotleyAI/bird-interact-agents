version: 4
name: news_interactions
sql_table: interactions
query_variables: {}
data_source: news
columns:
- name: intkey
  sql: intkey
  type: number
  primary_key: true
  description: Primary key.
  hidden: false
- name: seshlink2
  sql: seshlink2
  type: number
  primary_key: false
  description: FK to news_sessions.seshkey.
  hidden: false
- name: reclink
  sql: reclink
  type: number
  primary_key: false
  description: FK to news_recommendations.reckey.
  hidden: false
- name: artval
  sql: artval
  type: number
  primary_key: false
  description: Article id (non-FK reference).
  hidden: false
- name: intts
  sql: intts
  type: time
  primary_key: false
  description: When the interaction occurred.
  hidden: false
- name: evttype
  sql: evttype
  type: string
  primary_key: false
  description: Event type.
  hidden: false
- name: seqval
  sql: seqval
  type: number
  primary_key: false
  description: "Event sequence/position within the session.\n\n[kb=9]\nCIE = AVG(seqval)\n\
    \nHere `seqval` is the event\u2019s sequence/position within a session (e.g.,\
    \ 1, 2, 3\u2026).  Average it across all interactions in a session. \u2014 Measures\
    \ how efficiently a user interacts with content inside a session by looking at\
    \ the average relative order in which events occur (their sequence values)\n[/kb=9]"
  label: Content Interaction Efficiency (CIE)
  hidden: false
  meta:
    kb_id: 9
- name: agentval
  sql: agentval
  type: string
  primary_key: false
  description: User agent.
  hidden: false
- name: clkts
  sql: clkts
  type: time
  primary_key: false
  description: Click timestamp.
  hidden: false
- name: clkpos
  sql: clkpos
  type: string
  primary_key: false
  description: Click position.
  hidden: false
- name: clktype
  sql: clktype
  type: string
  primary_key: false
  description: Click type.
  hidden: false
- name: clksrc
  sql: clksrc
  type: string
  primary_key: false
  description: Click source.
  hidden: false
- name: clkctx
  sql: clkctx
  type: string
  primary_key: false
  description: Click context.
  hidden: false
- name: inttype
  sql: inttype
  type: string
  primary_key: false
  description: Interaction type.
  hidden: false
measures:
- formula: seqval:avg
  name: content_interaction_efficiency
  label: Content Interaction Efficiency (CIE)
  description: "CIE (KB #9) = AVG(seqval) per session.\n\n[kb=9]\nCIE = AVG(seqval)\n\
    \nHere `seqval` is the event\u2019s sequence/position within a session (e.g.,\
    \ 1, 2, 3\u2026).  Average it across all interactions in a session. \u2014 Measures\
    \ how efficiently a user interacts with content inside a session by looking at\
    \ the average relative order in which events occur (their sequence values)\n[/kb=9]"
  meta:
    kb_id: 9
aggregations: []
joins:
- target_model: news_sessions
  join_pairs:
  - - seshlink2
    - seshkey
  join_type: left
- target_model: news_recommendations
  join_pairs:
  - - reclink
    - reckey
  join_type: left
filters: []
description: "News DB: per-event interaction records (bookmark/click/scroll/share/view)\
  \ within a session; references a recommendation and an article. Drives KB #9 CIE.\n\
  \n[kb=19]\nA minimal delay between content exposure and user interaction indicates\
  \ high interest, thereby enhancing content performance metrics. \u2014 Evaluates\
  \ the promptness of user interactions after content presentation.\n[/kb=19]"
hidden: false
meta:
  kb_id: 19
