- name: system_performance_index
  sql: ((perfscore - loadscore) * 100.0) / NULLIF(resptime, 0)
  type: DOUBLE
  primary_key: false
  description: "System Performance Index (SPI, KB #4) = (perfscore - loadscore) \xD7\
    \ 100 / resptime.\n\n[kb=4]\nSPI = \\frac{(perfscore - loadscore) \\times 100}{resptime},\
    \ \\text{ where resptime is measured in milliseconds.} \u2014 Measures overall\
    \ system performance by considering response time, load, and performance scores.\n\
    [/kb=4]"
  label: System Performance Index (SPI)
  hidden: false
  meta:
    kb_id: 4
- name: performance_status
  sql: CASE WHEN resptime > 200 THEN 'Critical' WHEN resptime > 150 THEN 'Warning'
    ELSE 'Normal' END
  type: TEXT
  primary_key: false
  description: "Performance Status (KB #51): resptime>200 'Critical', >150 'Warning',\
    \ else 'Normal'.\n\n[kb=51]\nA CASE-based classification where resptime > 200\
    \ is 'Critical', >150 is 'Warning', and others are 'Normal'. \u2014 Categorizes\
    \ system records based on response time into Critical, Warning, or Normal bands.\n\
    [/kb=51]"
  label: Performance Status
  hidden: false
  meta:
    kb_id: 51
