description: "Real-Time Session Efficiency (RTSE, KB #31) = CIE / SBRA, where CIE\
  \ is Content Interaction Efficiency (avg seqval per session over interactions) and\
  \ SBRA is the Session Bounce Rate Adjustment.\n\n[kb=31]\nRTSE = \\frac{CIE}{SBRA},\
  \ where CIE denotes the Content Interaction Efficiency and SBRA is the Session Bounce\
  \ Rate Adjustment. \u2014 Evaluates session efficiency by balancing interaction\
  \ outcomes against bounce adjustments.\n[/kb=31]"
hidden: false
