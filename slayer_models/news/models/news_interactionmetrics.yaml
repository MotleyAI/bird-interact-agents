version: 3
name: news_interactionmetrics
sql_table: interactionmetrics
query_variables: {}
data_source: news
columns:
- name: intmetkey
  sql: intmetkey
  type: number
  primary_key: true
  description: Primary key (also FK to interactions.intkey).
  hidden: false
- name: interaction_behavior
  sql: interaction_behavior
  type: string
  primary_key: false
  description: 'JSON column: nested scroll/time_spent/conversion sub-objects plus
    exit_type, next_action, bounce_status, click_seconds. New rows default to the
    KB #60 template (scroll depth/speed/percentage 0; exit_type ''Natural''; conversion
    {value:0,status:''None''}; time_spent zeros; next_action ''None''; bounce_status
    ''No''; click_seconds 0).'
  hidden: false
  meta:
    kb_id: 60
measures: []
aggregations: []
joins:
- target_model: news_interactions
  join_pairs:
  - - intmetkey
    - intkey
  join_type: left
filters: []
description: 'News DB: Per-interaction behavior metrics. The JSON `interaction_behavior`
  field captures scroll {depth/speed/percentage}, time_spent {viewport/attention/reading/duration},
  click_seconds, conversion {value/status}, exit_type, next_action, and bounce_status.
  KB #60 documents the default-value template populated when a new interaction record
  is created.'
hidden: false
