  type: number
  primary_key: false
  description: 'Social Influence Multiplier (SIM, KB #14) = (follcount/100) * (engrate*2)
    * (viralcont+1) * 0.5. Reflects ability to spread content through followers, engagement
    and viral history.'
  hidden: false
  meta:
    kb_id: 14
- name: lpr
  sql: (CAST(json_extract(loyaltyandachievements.reward_progress, '$.loyalty.loypts')
