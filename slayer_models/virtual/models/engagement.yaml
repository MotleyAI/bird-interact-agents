    kb_id: 41
- name: is_rapidly_ascending
  sql: ((membershipandspending__fans.tierstep / sqrt(NULLIF(membershipandspending.membdays,
    0))) * (10 / sqrt(365.0))) > 1.5 AND ((CAST(json_extract(loyaltyandachievements.reward_progress,
    '$.loyalty.loypts') AS INTEGER) * 1.0 / NULLIF(membershipandspending.membdays,
    0)) * (1 + (engrate * 2))) > 20
  type: boolean
  primary_key: false
  description: 'Rapidly Ascending Fan (KB #42): TAF > 1.5 AND LPR > 20. Exceptional
    speed advancing through tier levels and accumulating loyalty.'
  hidden: false
  meta:
    kb_id: 42
- name: is_retention_risk_superfan
  sql: membershipandspending__fans.tierstep >= 8 AND ((engrate * 0.4) + (socintscore
    / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount / 10.0 * 0.1)) > 0.7
    AND (membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) > 200 AND ((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) > 2.0
  type: boolean
  primary_key: false
  description: 'Retention Risk Superfan (KB #44): tierstep >= 8 AND FEI > 0.7 AND
    MV > 200 AND RRF > 2.0. Significant value at risk of being lost.'
  hidden: false
  meta:
    kb_id: 44
- name: is_loyalty_underperformer
  sql: (CAST(json_extract(loyaltyandachievements.reward_progress, '$.loyalty.loypts')
    AS INTEGER) * 1.0 / NULLIF((membershipandspending.spendusd * (1 + membershipandspending.membdays
    / 365.0 * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) * 10, 0)) < 0.5 AND
    (membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) > 150
  type: boolean
  primary_key: false
  description: 'Loyalty Underperformer (KB #45): LVR < 0.5 AND MV > 150. Lower than
    expected loyalty point accumulation vs spending.'
  hidden: false
  meta:
    kb_id: 45
- name: is_premium_service_candidate
  sql: ((supportandfeedback.satrate / (supportandfeedback.supptix + 1)) * (1 + (membershipandspending.spendusd
    * (1 + membershipandspending.membdays / 365.0 * 0.5) * (1 + interactions.gifttot
    / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01')
    - julianday(preferencesandsettings.lastlogdt)) / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag
    WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE
    NULL END / 3.0) * 2) / 10.0) * (1 + ((engrate * 0.4) + (socintscore / 100.0 *
    0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount / 10.0 * 0.1))) * 24 / 100.0))
    < 0.8 AND (membershipandspending.spendusd * (1 + membershipandspending.membdays
    / 365.0 * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) > 300 AND supportandfeedback.supptix
    > 5
  type: boolean
  primary_key: false
  description: 'Premium Service Candidate (KB #46): SEI < 0.8 AND MV > 300 AND supptix
    > 5. Heavy support consumers with significant economic value.'
  hidden: false
  meta:
    kb_id: 46
- name: is_social_network_underutilizer
  sql: CAST(json_extract(socialcommunity.community_engagement, '$.network.follcount')
    AS INTEGER) > 1000 AND (retentionandinfluence.refcount * 100.0 / NULLIF(CAST(json_extract(socialcommunity.community_engagement,
    '$.network.follcount') AS INTEGER), 0)) < 0.5
  type: boolean
  primary_key: false
  description: 'Social Network Underutilizer (KB #47): follcount > 1000 AND SCR <
    0.5%. Large social network but largely untapped.'
  hidden: false
  meta:
    kb_id: 47
- name: is_tier_stuck_veteran
  sql: membershipandspending.membdays > 365 AND engrate > 0.4 AND ((membershipandspending__fans.tierstep
    / sqrt(NULLIF(membershipandspending.membdays, 0))) * (10 / sqrt(365.0))) < 0.5
  type: boolean
  primary_key: false
  description: 'Tier-Stuck Veteran (KB #48): membdays > 365 AND engrate > 0.4 AND
    TAF < 0.5. Engaged but slow tier progression.'
  hidden: false
  meta:
    kb_id: 48
- name: is_gift_focused_supporter
  sql: (interactions.giftvalusd * interactions.gifttot / 100.0) > 50 AND membershipandspending.spendusd
    < 100
  type: boolean
  primary_key: false
  description: 'Gift-Focused Supporter (KB #49): GIQ > 50 AND spendusd < 100. Prefers
    gift-based support over subscriptions/purchases.'
  hidden: false
  meta:
    kb_id: 49
