version: 3
name: eventsandclub
sql_table: eventsandclub
query_variables: {}
data_source: virtual
columns:
- name: eventsreg
  sql: eventsreg
  type: string
  primary_key: true
  hidden: false
- name: eventssocialpivot
  sql: eventssocialpivot
  type: string
  primary_key: false
  hidden: false
- name: eventsmemberpivot
  sql: eventsmemberpivot
  type: string
  primary_key: false
  hidden: false
- name: clubjdate
  sql: clubjdate
  type: string
  primary_key: false
  hidden: false
- name: participation_summary
  sql: participation_summary
  type: string
  primary_key: false
  description: 'JSONB: event_attendance (concatt, evtpart, meetatt, onevtatt, offevtatt),
    engagement (votepartrate, camppart), club (clubstat, clubcontrib). Sub-fields
    are exposed as helper columns.'
  hidden: false
- name: evtpart
  sql: participation_summary ->> '$.event_attendance.evtpart'
  type: string
  primary_key: false
  description: Event participation enum (Never / Rare / Regular / Always), extracted
    from participation_summary.event_attendance.evtpart.
  hidden: false
- name: concatt
  sql: CAST(json_extract(participation_summary, '$.event_attendance.concatt') AS INTEGER)
  type: number
  primary_key: false
  description: Concert attendance count, extracted from participation_summary.event_attendance.concatt.
  hidden: false
- name: meetatt
  sql: CAST(json_extract(participation_summary, '$.event_attendance.meetatt') AS INTEGER)
  type: number
  primary_key: false
  description: Meet-and-greet attendance count, extracted from participation_summary.event_attendance.meetatt.
  hidden: false
- name: onevtatt
  sql: CAST(json_extract(participation_summary, '$.event_attendance.onevtatt') AS
    INTEGER)
  type: number
  primary_key: false
  description: Online event attendance count, extracted from participation_summary.event_attendance.onevtatt.
  hidden: false
- name: offevtatt
  sql: CAST(json_extract(participation_summary, '$.event_attendance.offevtatt') AS
    INTEGER)
  type: number
  primary_key: false
  description: Offline event attendance count, extracted from participation_summary.event_attendance.offevtatt.
  hidden: false
- name: votepartrate
  sql: CAST(json_extract(participation_summary, '$.engagement.votepartrate') AS REAL)
  type: number
  primary_key: false
  description: Voting participation rate, extracted from participation_summary.engagement.votepartrate.
  hidden: false
- name: camppart
  sql: participation_summary ->> '$.engagement.camppart'
  type: string
  primary_key: false
  description: Campaign participation (Selective / All / Active), extracted from participation_summary.engagement.camppart.
  hidden: false
- name: clubstat
  sql: participation_summary ->> '$.club.clubstat'
  type: string
  primary_key: false
  description: Fan club status (Non-member / Basic / Premium / Elite), extracted from
    participation_summary.club.clubstat.
  hidden: false
- name: clubcontrib
  sql: participation_summary ->> '$.club.clubcontrib'
  type: string
  primary_key: false
  description: Fan club contribution level (Low / Medium / High / Outstanding), extracted
    from participation_summary.club.clubcontrib.
  hidden: false
- name: evtpart_numeric
  sql: CASE participation_summary ->> '$.event_attendance.evtpart' WHEN 'Never' THEN
    0 WHEN 'Rare' THEN 1 WHEN 'Regular' THEN 2 WHEN 'Always' THEN 3 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric mapping of evtpart enum used by ERP (KB #18): Never=0, Rare=1,
    Regular=2, Always=3.'
  hidden: false
measures: []
aggregations: []
joins:
- target_model: membershipandspending
  join_pairs:
  - - eventsmemberpivot
    - memberreg
  join_type: left
- target_model: socialcommunity
  join_pairs:
  - - eventssocialpivot
    - socialreg
  join_type: left
filters: []
description: Per-fan event/club participation (1:1 with fans via membership). Holds
  clubjdate and a `participation_summary` JSONB with event_attendance (concatt, evtpart,
  meetatt, onevtatt, offevtatt), engagement (votepartrate, camppart), club (clubstat,
  clubcontrib).
hidden: false
