- name: churnflag_numeric
  sql: CASE churnflag WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN
    'High' THEN 3 ELSE NULL END
  type: DOUBLE
  primary_key: false
  description: "Numeric mapping of churnflag (KB #52) used by RRF and other retention\
    \ calcs: None=0, Low=1, Medium=2, High=3.\n\n[kb=52]\nTransforms the churnflag\
    \ enum values into numeric equivalents for use in calculations and risk models:\
    \ 'None' maps to 0 (representing minimal risk), 'Low' maps to 1 (representing\
    \ slight risk), 'Medium' maps to 2 (representing moderate risk), and 'High' maps\
    \ to 3 (representing severe risk). This numeric mapping enables mathematical operations\
    \ in retention analysis formulas, especially for the Retention Risk Factor (RRF)\
    \ calculation. \u2014 Converts the churn risk enum values to numeric form for\
    \ analytical calculations\n[/kb=52]"
  label: Churn Risk Numeric Mapping
  hidden: false
  meta:
    kb_id: 52
