- name: churnflag
  sql: churnflag
  type: TEXT
  primary_key: false
  description: "Churn risk rating (KB #8). 'None' = extremely low risk (high-frequency\
    \ interaction + recent consumption); 'Low' = slight risk (slightly decreased login\
    \ freq); 'Medium' = moderate risk (significantly decreased interaction/consumption\
    \ + longer login intervals); 'High' = severe risk (no logins or interactions in\
    \ past 14-30 days, immediate intervention).\n\n[kb=8]\n'None' indicates extremely\
    \ low churn risk, with users maintaining high-frequency interaction and recent\
    \ consumption; 'Low' represents slight churn risk with slightly decreased login\
    \ frequency; 'Medium' indicates moderate churn risk with significantly decreased\
    \ interaction and consumption frequency and increased login intervals; 'High'\
    \ represents severe churn risk with no logins or interactions in the past 14-30\
    \ days, requiring immediate intervention. \u2014 Explains the judgment basis for\
    \ churn risk rating\n[/kb=8]"
  label: retentionandinfluence.churnflag
  hidden: false
  meta:
    kb_id: 8
