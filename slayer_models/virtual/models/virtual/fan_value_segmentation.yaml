description: "Fan Value Segmentation (KB #53): per-fan classification by FLV percentile\
  \ band \u2014 'Top Tier' (>p90), 'High Value' (p75-p90), 'Medium Value' (p50-p75),\
  \ 'Low Value' (<p50). Uses NTILE(100) over FLV across all fans. RRF anchor 2025-03-01.\n\
  \n[kb=53]\nSegments fans into four distinct value categories using percentile thresholds:\
  \ 'Top Tier' identifies fans with FLV above the 90th percentile (p90), representing\
  \ the platform's most valuable users; 'High Value' identifies fans with FLV between\
  \ the 75th and 90th percentiles (p75 to p90); 'Medium Value' identifies fans with\
  \ FLV between the 50th and 75th percentiles (median to p75); 'Low Value' applies\
  \ to all fans with FLV below the median (p50). This segmentation enables targeted\
  \ retention strategies, premium service offerings, and resource allocation based\
  \ on projected economic contribution. \u2014 Classifies fans into value tiers based\
  \ on their Fan Lifetime Value (FLV) relative to platform-wide percentiles\n[/kb=53]"
