- name: engrate
  sql: engrate
  type: DOUBLE
  primary_key: false
  description: "Engagement rate (KB #5), 0..1.000. 0-0.200 = low (view only); 0.201-0.500\
    \ = moderate (occasional comments/likes); 0.501-0.800 = high (frequent comments/sharing);\
    \ 0.801-1.000 = ultra-high (deep co-creation). Platforms typically treat >0.500\
    \ as quality fans.\n\n[kb=5]\nEngagement rate (engrate) typically ranges from\
    \ 0 to 1.000, with higher values indicating more active fans. 0-0.200 represents\
    \ low engagement (viewing only without participation), 0.201-0.500 indicates moderate\
    \ engagement (occasional comments and likes), 0.501-0.800 shows high engagement\
    \ (frequent comments and sharing), and 0.801-1.000 represents ultra-high engagement\
    \ (comprehensive deep participation in content co-creation). Platforms generally\
    \ consider rates above 0.500 as quality fans. \u2014 Explains the calculation\
    \ basis and business significance of fan engagement rate\n[/kb=5]"
  label: engagement.engrate
  hidden: false
  format:
    type: float
  meta:
    kb_id: 5
- name: actfreq
  sql: actfreq
  type: TEXT
  primary_key: false
  description: "Activity frequency band (KB #4). 'Daily' = >=1 login/day; 'Weekly'\
    \ = 3-5 logins/week; 'Monthly' = 1-2 logins/month; 'Occasional' = >1 month between\
    \ logins. Affects push priority, content recs, event invites; Daily users are\
    \ the platform's core active group.\n\n[kb=4]\n'Daily' users log into the platform\
    \ at least once per day on average; 'Weekly' users log in 3-5 times per week;\
    \ 'Monthly' users log in 1-2 times per month; 'Occasional' users have login intervals\
    \ exceeding one month. Interaction frequency affects platform push priority, content\
    \ recommendations, and event invitations, with Daily users considered the platform's\
    \ core active group. \u2014 Analyzes the significance of interaction frequency\
    \ for fan classification\n[/kb=4]"
  label: engagement.actfreq
  hidden: false
  meta:
    kb_id: 4
