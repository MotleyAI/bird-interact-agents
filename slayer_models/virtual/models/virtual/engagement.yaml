    \ = FLV \\times \\frac{RRF}{5} \\times 0.1, \\text{ suggesting investing up to\
    \ 10\\% of at-risk value, scaled according to churn risk level.} \u2014 Calculates\
    \ the optimal investment for preventing churn based on fan value and risk\n[/kb=39]"
  label: Churn Prevention Investment (CPI)
  hidden: false
  meta:
    kb_id: 39
- name: content_pref_class
  sql: CASE contpref WHEN 'Music' THEN 'Content Consumer (Music)' WHEN 'Dance' THEN
    'Content Consumer (Dance)' WHEN 'Gaming' THEN 'Content Consumer (Gaming)' ELSE
    'General Content Consumer' END
  type: TEXT
  primary_key: false
  description: "Content Preference Classification (KB #51): Music \u2192 'Content\
    \ Consumer (Music)', Dance \u2192 'Content Consumer (Dance)', Gaming \u2192 'Content\
    \ Consumer (Gaming)', else 'General Content Consumer'.\n\n[kb=51]\nUses the contpref\
    \ field to classify viewers: contpref = 'Music' maps to 'Content Consumer (Music)',\
    \ contpref = 'Dance' maps to 'Content Consumer (Dance)', contpref = 'Gaming' maps\
    \ to 'Content Consumer (Gaming)', and all other values map to 'General Content\
    \ Consumer'. This classification enables targeted content delivery and personalized\
    \ marketing. \u2014 Categorizes fans based on their primary content consumption\
    \ preferences\n[/kb=51]"
  label: Content Preference Classification
  hidden: false
  meta:
    kb_id: 51
- name: churn_severity_class
  sql: CASE WHEN ((1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01')
    - julianday(preferencesandsettings.lastlogdt)) / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag
    WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE
    NULL END / 3.0) * 2) > 4.5 THEN 'Severe' WHEN ((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) > 3.5
    THEN 'High' WHEN ((1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01')
    - julianday(preferencesandsettings.lastlogdt)) / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag
    WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE
    NULL END / 3.0) * 2) > 2.5 THEN 'Medium' ELSE NULL END
  type: TEXT
  primary_key: false
  description: "Enhanced Churn Risk Severity Classification (KB #54): Severe = RRF\
    \ > 4.5 (immediate intervention + executive attention); High = RRF in (3.5, 4.5]\
    \ (prioritized retention); Medium = RRF in (2.5, 3.5] (standard monitoring). RRF\
    \ anchored at 2025-03-01.\n\n[kb=54]\nEnhances the standard churn risk classification\
    \ by adding a 'Severe' category for critically at-risk users. The classification\
    \ uses precise RRF thresholds: 'Severe' identifies users with RRF > 4.5 requiring\
    \ immediate intervention and executive attention; 'High' identifies users with\
    \ RRF between 3.5-4.5 requiring prioritized retention campaigns; 'Medium' applies\
    \ to users with RRF between 2.5-3.5 requiring standard monitoring. This refined\
    \ classification enables more targeted allocation of retention resources based\
    \ on urgency level and churn probability. \u2014 Defines detailed categorization\
    \ for high-risk churn candidates requiring intervention\n[/kb=54]"
