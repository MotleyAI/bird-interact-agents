- name: fei
  sql: (engrate * 0.4) + (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount
    / 10.0 * 0.1)
  type: DOUBLE
  primary_key: false
  description: "Fan Engagement Index (FEI, KB #10) = (engrate*0.4) + (socintscore/100*0.3)\
    \ + (actdayswk/7*0.2) + (avgsesscount/10*0.1). Range 0-1; higher = more engaged.\n\
    \n[kb=10]\nFEI = (engrate \\times 0.4) + (\\frac{socintscore}{100} \\times 0.3)\
    \ + (\\frac{actdayswk}{7} \\times 0.2) + (\\frac{avgsesscount}{10} \\times 0.1),\
    \ \\text{ where weights reflect each factor's different contribution to engagement,\
    \ with results ranging from 0-1. Higher values indicate more engaged fans.} \u2014\
    \ A comprehensive metric measuring fan activity level with platform and virtual\
    \ idols\n[/kb=10]"
  label: Fan Engagement Index (FEI)
  hidden: false
  meta:
    kb_id: 10
- name: mv
  sql: membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)
  type: DOUBLE
  primary_key: false
  description: "Monetization Value (MV, KB #11) = spendusd * (1 + membdays/365 * 0.5)\
    \ * (1 + gifttot/10 * 0.2). Adjusts spending for membership tenure and gift activity.\n\
    \n[kb=11]\nMV = spendusd \\times \\left(1 + \\frac{membdays}{365} \\times 0.5\\\
    right) \\times \\left(1 + \\frac{gifttot}{10} \\times 0.2\\right), \\text{ where\
    \ the formula adjusts spending based on membership duration and gift activity\
    \ to reflect long-term value.} \u2014 Calculates the monetary value a fan brings\
    \ to the platform over time\n[/kb=11]"
  label: Monetization Value (MV)
  hidden: false
  meta:
    kb_id: 11
- name: rrf
  sql: (1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2
  type: DOUBLE
  primary_key: false
  description: "Retention Risk Factor (RRF, KB #13) = (1 - intconsist) * 2 + (days_since_last_login\
    \ / 30) * 0.5 + (churnflag_numeric / 3) * 2. The 'now' anchor for days_since_last_login\
    \ is hardcoded to 2025-03-01 (the day after the latest lastlogdt in the dataset).\
    \ churnflag_numeric (KB #52) maps None=0, Low=1, Medium=2, High=3.\n\n[kb=13]\n\
    RRF = (1 - intconsist) \\times 2 + \\left(\\frac{CURRENT\\_DATE - lastlogdt}{30}\\\
    right) \\times 0.5 + \\left(\\frac{churnflag\\_numeric}{3}\\right) \\times 2,\
    \ \\text{ where churnflag\\_numeric maps churnflag enum: None=0, Low=1, Medium=2,\
    \ High=3.} \u2014 Quantifies the risk of fan churn based on multiple behavioral\
    \ indicators\n[/kb=13]"
  label: Retention Risk Factor (RRF)
  hidden: false
  meta:
    kb_id: 13
- name: sim
  sql: (CAST(json_extract(socialcommunity.community_engagement, '$.network.follcount')
    AS INTEGER) / 100.0) * (engrate * 2) * (retentionandinfluence.viralcont + 1) *
    0.5
  type: DOUBLE
  primary_key: false
  description: "Social Influence Multiplier (SIM, KB #14) = (follcount/100) * (engrate*2)\
    \ * (viralcont+1) * 0.5. Reflects ability to spread content through followers,\
    \ engagement and viral history.\n\n[kb=14]\nSIM = \\left(\\frac{follcount}{100}\\\
    right) \\times (engrate \\times 2) \\times (viralcont + 1) \\times 0.5, \\text{\
    \ reflecting the fan's ability to spread content through their network based on\
    \ their following, engagement level, and history of creating viral content.} \u2014\
    \ Calculates how much a fan amplifies content through their social network\n[/kb=14]"
  label: Social Influence Multiplier (SIM)
  hidden: false
  meta:
    kb_id: 14
- name: lpr
  sql: (CAST(json_extract(loyaltyandachievements.reward_progress, '$.loyalty.loypts')
    AS INTEGER) * 1.0 / NULLIF(membershipandspending.membdays, 0)) * (1 + (engrate
    * 2))
  type: DOUBLE
  primary_key: false
  description: "Loyalty Progression Rate (LPR, KB #15) = (loypts/membdays) * (1 +\
    \ engrate*2). Loyalty points per membership day, adjusted by engagement.\n\n[kb=15]\n\
    LPR = \\left(\\frac{loypts}{membdays}\\right) \\times (1 + (engrate \\times 2)),\
    \ \\text{ showing points earned per day adjusted by engagement level to identify\
    \ rapidly advancing fans.} \u2014 Measures how quickly a fan is accumulating loyalty\
    \ within the system\n[/kb=15]"
  label: Loyalty Progression Rate (LPR)
  hidden: false
  meta:
    kb_id: 15
- name: flv
  sql: (membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) / 10.0)
    * (1 + ((engrate * 0.4) + (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2)
    + (avgsesscount / 10.0 * 0.1))) * 24
  type: DOUBLE
  primary_key: false
  description: "Fan Lifetime Value (FLV, KB #16) = MV * (1 - RRF/10) * (1 + FEI) *\
    \ 24. 24-month projection adjusted for retention risk and engagement.\n\n[kb=16]\n\
    FLV = MV \\times \\left(1 - \\frac{RRF}{10}\\right) \\times (1 + FEI) \\times\
    \ 24, \\text{ estimating 24-month value adjusted by retention risk and engagement\
    \ level.} \u2014 Projects the total economic value of a fan throughout their relationship\
    \ with the platform\n[/kb=16]"
  label: Fan Lifetime Value (FLV)
  hidden: false
  meta:
    kb_id: 16
- name: cci
  sql: ((CAST(json_extract(socialcommunity.community_engagement, '$.content_creation.contqualrate')
    AS REAL) * (CAST(json_extract(socialcommunity.community_engagement, '$.content_creation.ugcval')
    AS INTEGER) / 10.0) * (1 + CAST(json_extract(socialcommunity.community_engagement,
    '$.network.follcount') AS INTEGER) / 100.0 * 0.5)) * 0.4) + (((CAST(json_extract(socialcommunity.community_engagement,
    '$.network.follcount') AS INTEGER) / 100.0) * (engrate * 2) * (retentionandinfluence.viralcont
    + 1) * 0.5) * 0.3) + (socialcommunity.collabcount * 0.1) + (((engrate * 0.4) +
    (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount / 10.0 *
    0.1)) * 0.2)
  type: DOUBLE
  primary_key: false
  description: "Community Contribution Index (CCI, KB #17) = (CCIS*0.4) + (SIM*0.3)\
    \ + (collabcount*0.1) + (FEI*0.2). Balances content creation, social influence,\
    \ collaboration and general engagement.\n\n[kb=17]\nCCI = (CCIS \\times 0.4) +\
    \ (SIM \\times 0.3) + (collabcount \\times 0.1) + (FEI \\times 0.2), \\text{ balancing\
    \ content creation, social influence, collaboration activity, and general engagement.}\
    \ \u2014 Measures a fan's overall contribution to the virtual idol community\n\
    [/kb=17]"
  label: Community Contribution Index (CCI)
  hidden: false
  meta:
    kb_id: 17
- name: erp
  sql: ((membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) / 10.0)
    * (1 + ((engrate * 0.4) + (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2)
    + (avgsesscount / 10.0 * 0.1))) * 24) * ((CASE eventsandclub.participation_summary
    ->> '$.event_attendance.evtpart' WHEN 'Never' THEN 0 WHEN 'Rare' THEN 1 WHEN 'Regular'
    THEN 2 WHEN 'Always' THEN 3 ELSE NULL END) / 3.0) * (membershipandspending__fans.tierstep
    / 5.0) * (1 + loyaltyandachievements.inflscore / 100.0)
  type: DOUBLE
  primary_key: false
  description: "Event ROI Potential (ERP, KB #18) = FLV * (evtpart_numeric/3) * (tierstep/5)\
    \ * (1 + inflscore/100). evtpart_numeric maps event attendance enum: Never=0,\
    \ Rare=1, Regular=2, Always=3.\n\n[kb=18]\nERP = FLV \\times \\left(\\frac{evtpart\\\
    _numeric}{3}\\right) \\times \\left(\\frac{tierstep}{5}\\right) \\times \\left(1\
    \ + \\frac{inflscore}{100}\\right), \\text{ where evtpart\\_numeric maps participation\\\
    _summary.event\\_attendance.evtpart enum values: Never=0, Rare=1, Regular=2, Always=3.\
    \ Higher scores indicate fans likely to generate more value when included in events.}\
    \ \u2014 Estimates the potential return on investment for inviting a fan to exclusive\
    \ events\n[/kb=18]"
  label: Event ROI Potential (ERP)
  hidden: false
  meta:
    kb_id: 18
- name: sei
  sql: (supportandfeedback.satrate / (supportandfeedback.supptix + 1)) * (1 + (membershipandspending.spendusd
    * (1 + membershipandspending.membdays / 365.0 * 0.5) * (1 + interactions.gifttot
    / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01')
    - julianday(preferencesandsettings.lastlogdt)) / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag
    WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE
    NULL END / 3.0) * 2) / 10.0) * (1 + ((engrate * 0.4) + (socintscore / 100.0 *
    0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount / 10.0 * 0.1))) * 24 / 100.0)
  type: DOUBLE
  primary_key: false
  description: "Support Efficiency Index (SEI, KB #19) = (satrate / (supptix + 1))\
    \ * (1 + FLV/100). Higher = good ratings with low support need, weighted by FLV.\n\
    \n[kb=19]\nSEI = \\frac{satrate}{(supptix + 1)} \\times \\left(1 + \\frac{FLV}{100}\\\
    right), \\text{ where higher values indicate fans who provide good platform ratings\
    \ with minimal support requirements, adjusted by their lifetime value.} \u2014\
    \ Measures the efficiency of platform resources spent on supporting a fan\n[/kb=19]"
  label: Support Efficiency Index (SEI)
  hidden: false
  meta:
    kb_id: 19
- name: per
  sql: (membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) / NULLIF(((engrate * 0.4) +
    (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2) + (avgsesscount / 10.0 *
    0.1)) * 100, 0)
  type: DOUBLE
  primary_key: false
  description: "Premium Engagement Ratio (PER, KB #30) = MV / (FEI * 100). Higher\
    \ = more spend relative to engagement.\n\n[kb=30]\nPER = \\frac{MV}{FEI \\times\
    \ 100}, \\text{ where higher values indicate fans who spend more relative to their\
    \ engagement level.} \u2014 Measures the relationship between fan spending and\
    \ their engagement level\n[/kb=30]"
  label: Premium Engagement Ratio (PER)
  hidden: false
  meta:
    kb_id: 30
- name: cqer
  sql: CAST(json_extract(socialcommunity.community_engagement, '$.content_creation.contqualrate')
    AS REAL) / NULLIF(engrate * 10, 0)
  type: DOUBLE
  primary_key: false
  description: "Content Quality to Engagement Ratio (CQER, KB #31) = contqualrate\
    \ / (engrate * 10). Values >1.0 indicate content quality outpacing engagement.\n\
    \n[kb=31]\nCQER = \\frac{contqualrate}{engrate \\times 10}, \\text{ where values\
    \ above 1.0 indicate fans producing content of quality higher than their general\
    \ engagement level would predict.} \u2014 Measures how a fan's content quality\
    \ relates to their overall engagement\n[/kb=31]"
  label: Content Quality to Engagement Ratio (CQER)
  hidden: false
  meta:
    kb_id: 31
- name: irp
  sql: (supportandfeedback.supptix * 30) / NULLIF((membershipandspending.spendusd
    * (1 + membershipandspending.membdays / 365.0 * 0.5) * (1 + interactions.gifttot
    / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist) * 2 + (julianday('2025-03-01')
    - julianday(preferencesandsettings.lastlogdt)) / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag
    WHEN 'None' THEN 0 WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE
    NULL END / 3.0) * 2) / 10.0), 0)
  type: DOUBLE
  primary_key: false
  description: "Investment Recovery Period (IRP, KB #32) = (supptix * 30) / (MV *\
    \ (1 - RRF/10)). Months to recoup platform investment in the fan; supptix proxies\
    \ invested resources.\n\n[kb=32]\nIRP = \\frac{supptix \\times 30}{MV \\times\
    \ (1 - \\frac{RRF}{10})}, \\text{ where supptix represents support tickets as\
    \ a proxy for platform resources invested in the fan.} \u2014 Estimates how many\
    \ months it will take to recover platform investment in a fan\n[/kb=32]"
  label: Investment Recovery Period (IRP)
  hidden: false
  meta:
    kb_id: 32
- name: taf
  sql: (membershipandspending__fans.tierstep / sqrt(NULLIF(membershipandspending.membdays,
    0))) * (10 / sqrt(365.0))
  type: DOUBLE
  primary_key: false
  description: "Tier Acceleration Factor (TAF, KB #33) = tierstep / sqrt(membdays)\
    \ * 10/sqrt(365). Annual-scale normalisation of tier progression speed.\n\n[kb=33]\n\
    TAF = \\frac{tierstep}{\\sqrt{membdays}} \\times \\frac{10}{\\sqrt{365}}, \\text{\
    \ normalized to annual scale for consistent comparison across fans with different\
    \ membership durations.} \u2014 Measures how quickly a fan is advancing through\
    \ tier levels relative to platform norms\n[/kb=33]"
  label: Tier Acceleration Factor (TAF)
  hidden: false
  meta:
    kb_id: 33
- name: scr
  sql: retentionandinfluence.refcount * 100.0 / NULLIF(CAST(json_extract(socialcommunity.community_engagement,
    '$.network.follcount') AS INTEGER), 0)
  type: DOUBLE
  primary_key: false
  description: "Social Conversion Rate (SCR, KB #35) = refcount / follcount * 100.\
    \ Pct of followers converted to platform users.\n\n[kb=35]\nSCR = \\frac{refcount}{(socialcommunity.community\\\
    _engagement->>'network.follcount')::int} \\times 100, \\text{ expressed as a percentage\
    \ of followers successfully converted to platform users.} \u2014 Measures a fan's\
    \ ability to convert their social network into active platform participants\n\
    [/kb=35]"
  label: Social Conversion Rate (SCR)
  hidden: false
  meta:
    kb_id: 35
- name: cqc
  sql: CAST(json_extract(socialcommunity.community_engagement, '$.content_creation.contqualrate')
    AS REAL) * preferencesandsettings.intconsist * (CAST(json_extract(socialcommunity.community_engagement,
    '$.content_creation.ugcval') AS INTEGER) / 10.0)
  type: DOUBLE
  primary_key: false
  description: "Content Quality Consistency (CQC, KB #36) = contqualrate * intconsist\
    \ * ugcval/10. intconsist (0-1) measures interaction consistency.\n\n[kb=36]\n\
    CQC = contqualrate \\times intconsist \\times \\frac{ugcval}{10}, \\text{ where\
    \ intconsist measures interaction consistency on a scale of 0-1.} \u2014 Measures\
    \ the consistency of a fan's content quality relative to their engagement consistency\n\
    [/kb=36]"
  label: Content Quality Consistency (CQC)
  hidden: false
  meta:
    kb_id: 36
- name: lvr
  sql: CAST(json_extract(loyaltyandachievements.reward_progress, '$.loyalty.loypts')
    AS INTEGER) * 1.0 / NULLIF((membershipandspending.spendusd * (1 + membershipandspending.membdays
    / 365.0 * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) * 10, 0)
  type: DOUBLE
  primary_key: false
  description: "Loyalty Value Ratio (LVR, KB #37) = loypts / (MV * 10). Higher = loyalty\
    \ accruing faster than spending would predict.\n\n[kb=37]\nLVR = \\frac{loypts}{MV\
    \ \\times 10}, \\text{ where higher values indicate fans accumulating loyalty\
    \ faster than their spending would predict.} \u2014 Evaluates the relationship\
    \ between a fan's loyalty points and their economic value\n[/kb=37]"
  label: Loyalty Value Ratio (LVR)
  hidden: false
  meta:
    kb_id: 37
- name: erf
  sql: (CAST(json_extract(eventsandclub.participation_summary, '$.event_attendance.onevtatt')
    AS INTEGER) + CAST(json_extract(eventsandclub.participation_summary, '$.event_attendance.offevtatt')
    AS INTEGER)) / 10.0 * (1 + ((engrate * 0.4) + (socintscore / 100.0 * 0.3) + (actdayswk
    / 7.0 * 0.2) + (avgsesscount / 10.0 * 0.1)) / 2.0)
  type: DOUBLE
  primary_key: false
  description: "Event Response Factor (ERF, KB #38) = (onevtatt + offevtatt) / 10\
    \ * (1 + FEI/2). Online + offline event attendance weighted by FEI.\n\n[kb=38]\n\
    ERF = \\frac{(eventsandclub.participation\\_summary->>'event\\_attendance.onevtatt')::int\
    \ + (eventsandclub.participation\\_summary->>'event\\_attendance.offevtatt')::int}{10}\
    \ \\times \\left(1 + \\frac{FEI}{2}\\right), \\text{ where onevtatt and offevtatt\
    \ represent online and offline events attended.} \u2014 Measures a fan's response\
    \ rate to official events and activities\n[/kb=38]"
  label: Event Response Factor (ERF)
  hidden: false
  meta:
    kb_id: 38
- name: cpi
  sql: (membershipandspending.spendusd * (1 + membershipandspending.membdays / 365.0
    * 0.5) * (1 + interactions.gifttot / 10.0 * 0.2)) * (1 - ((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) / 10.0)
    * (1 + ((engrate * 0.4) + (socintscore / 100.0 * 0.3) + (actdayswk / 7.0 * 0.2)
    + (avgsesscount / 10.0 * 0.1))) * 24 * (((1 - preferencesandsettings.intconsist)
    * 2 + (julianday('2025-03-01') - julianday(preferencesandsettings.lastlogdt))
    / 30.0 * 0.5 + (CASE retentionandinfluence.churnflag WHEN 'None' THEN 0 WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END / 3.0) * 2) / 5.0)
    * 0.1
  type: DOUBLE
  primary_key: false
  description: "Churn Prevention Investment (CPI, KB #39) = FLV * (RRF/5) * 0.1. Suggests\
