version: 5
name: loyaltyandachievements
sql_table: loyaltyandachievements
query_variables: {}
data_source: virtual
columns:
- name: loyaltyreg
  sql: loyaltyreg
  type: TEXT
  primary_key: true
  hidden: false
- name: loyaltyeventspivot
  sql: loyaltyeventspivot
  type: TEXT
  primary_key: false
  hidden: false
- name: loyaltyengagepivot
  sql: loyaltyengagepivot
  type: TEXT
  primary_key: false
  hidden: false
- name: rankpos
  sql: rankpos
  type: INT
  primary_key: false
  hidden: false
  format:
    type: integer
- name: inflscore
  sql: inflscore
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
- name: reputelv
  sql: reputelv
  type: TEXT
  primary_key: false
  hidden: false
- name: trustval
  sql: trustval
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
