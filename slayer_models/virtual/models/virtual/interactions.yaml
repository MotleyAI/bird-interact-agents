  primary_key: false
  description: 'JSONB: session (sessdurmin, liveatt, watchhrs), chat_activity (chatmsg,
    chatlang, msgtone, emojicount, stkcount). Sub-fields are exposed as helper columns.'
  hidden: false
- name: sessdurmin
  sql: CAST(json_extract(engagement_metrics, '$.session.sessdurmin') AS INTEGER)
  type: number
  primary_key: false
  description: Session duration in minutes, extracted from engagement_metrics.session.sessdurmin.
  hidden: false
- name: liveatt
  sql: CAST(json_extract(engagement_metrics, '$.session.liveatt') AS INTEGER)
  type: number
  primary_key: false
  description: Live stream attendances in this session, extracted from engagement_metrics.session.liveatt.
  hidden: false
- name: watchhrs
  sql: CAST(json_extract(engagement_metrics, '$.session.watchhrs') AS REAL)
  type: number
  primary_key: false
  description: Watch hours, extracted from engagement_metrics.session.watchhrs.
  hidden: false
- name: chatmsg
  sql: CAST(json_extract(engagement_metrics, '$.chat_activity.chatmsg') AS INTEGER)
  type: number
  primary_key: false
  description: Chat messages count, extracted from engagement_metrics.chat_activity.chatmsg.
  hidden: false
- name: msgtone
  sql: engagement_metrics ->> '$.chat_activity.msgtone'
  type: string
  primary_key: false
  description: Message sentiment (Negative / Positive / Neutral), extracted from engagement_metrics.chat_activity.msgtone.
  hidden: false
- name: chatlang
  sql: engagement_metrics ->> '$.chat_activity.chatlang'
  type: string
  primary_key: false
  description: Chat language usage (Mixed / Translation / English / Native), extracted
    from engagement_metrics.chat_activity.chatlang.
  hidden: false
- name: stkcount
  sql: CAST(json_extract(engagement_metrics, '$.chat_activity.stkcount') AS INTEGER)
  type: number
  primary_key: false
  description: Stickers count, extracted from engagement_metrics.chat_activity.stkcount.
  hidden: false
- name: emojicount
  sql: CAST(json_extract(engagement_metrics, '$.chat_activity.emojicount') AS INTEGER)
  type: number
  primary_key: false
  description: Emoji count, extracted from engagement_metrics.chat_activity.emojicount.
  hidden: false
- name: giq
  sql: giftvalusd * gifttot / 100.0
  type: number
  primary_key: false
  description: "Gift Impact Quotient (GIQ, KB #34) = giftvalusd * gifttot / 100. Combined\
    \ volume and value of gifting.\n\n[kb=34]\nGIQ = \\frac{giftvalusd \\times gifttot}{100},\
    \ \\text{ producing an amplified measure of gifting significance by combining\
    \ both quantity and monetary value.} \u2014 Evaluates the relative impact of a\
    \ fan's gifting behavior considering both volume and value\n[/kb=34]"
  label: Gift Impact Quotient (GIQ)
  hidden: false
  meta:
    kb_id: 34
