- name: gifttot
  sql: gifttot
  type: number
  primary_key: false
  description: "Total number of gifts sent in this interaction (KB #7). Bands: <10\
    \ minimal gifting, 10-50 moderate support, >50 substantial support. Combined with\
    \ giftvalusd to assess economic support level.\n\n[kb=7]\ngifttot represents the\
    \ total number of gifts sent by fans, typically classified as: fewer than 10 is\
    \ considered minimal gifting, 10-50 represents moderate support, and above 50\
    \ indicates substantial support; giftvalusd represents the USD value of gifts,\
    \ generally $1-5 for small support, $5-20 for moderate support, $20-100 for large\
    \ support, and above $100 for super support. Both metrics combined assess a fan's\
    \ economic support level. \u2014 Explains the statistical significance of gift\
    \ quantity and value\n[/kb=7]"
  label: interactions.gifttot_interactions.giftvalusd
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 7
- name: giftvalusd
  sql: giftvalusd
  type: number
  primary_key: false
  description: "USD value of gifts sent (KB #7). Bands: $1-5 small support, $5-20\
    \ moderate, $20-100 large, >$100 super support. Combined with gifttot to assess\
    \ economic support level.\n\n[kb=7]\ngifttot represents the total number of gifts\
    \ sent by fans, typically classified as: fewer than 10 is considered minimal gifting,\
    \ 10-50 represents moderate support, and above 50 indicates substantial support;\
    \ giftvalusd represents the USD value of gifts, generally $1-5 for small support,\
    \ $5-20 for moderate support, $20-100 for large support, and above $100 for super\
    \ support. Both metrics combined assess a fan's economic support level. \u2014\
    \ Explains the statistical significance of gift quantity and value\n[/kb=7]"
  label: interactions.gifttot_interactions.giftvalusd
  hidden: false
  format:
    type: float
  meta:
    kb_id: 7
