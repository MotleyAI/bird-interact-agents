version: 3
name: securitydetection
sql_table: securitydetection
query_variables: {}
data_source: fake
columns:
- name: secdetkey
  sql: secdetkey
  type: string
  primary_key: true
  hidden: false
- name: sectechref
  sql: sectechref
  type: string
  primary_key: false
  hidden: false
- name: detecttime
  sql: detecttime
  type: string
  primary_key: false
  description: 'Detection timestamp. KB #84 ''last activity proxy time'' = max(detecttime)
    per account.'
  hidden: false
  meta:
    kb_id: 84
- name: detectsource
  sql: detectsource
  type: string
  primary_key: false
  hidden: false
- name: lastupd
  sql: lastupd
  type: string
  primary_key: false
  hidden: false
- name: updfreqhrs
  sql: updfreqhrs
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: detection_score_profile
  sql: detection_score_profile
  type: string
  primary_key: false
  description: 'JSONB column. Aggregates all granular detection scores, risk indicators,
    and model-reliability attributes for a security event. Sub-fields (confval, riskval,
    threatlvl, botlikscore, autobehavscore) are extracted as separate columns; see
    KB #20 (confval) and KB #29 (botlikscore).'
  hidden: false
  meta:
    kb_ids:
    - 20
    - 29
- name: confval
  sql: json_extract(detection_score_profile, '$.overall.confval')
  type: number
  primary_key: false
  description: 'Confidence value of the detection (KB #20). Ranges 0-1; >0.8 high-confidence;
    <0.3 uncertain.'
  hidden: false
- name: riskval
  sql: json_extract(detection_score_profile, '$.overall.riskval')
  type: number
  primary_key: false
  description: 'Overall risk rating (component of SRS, KB #4).'
  hidden: false
- name: threatlvl
  sql: json_extract(detection_score_profile, '$.overall.threatlvl')
  type: string
  primary_key: false
  description: 'Threat priority enum (Critical / High / Low / Medium). KB #10 ''High-Risk
    Account'' triggers on threatlvl=''Critical''.'
  hidden: false
- name: fposprob
  sql: json_extract(detection_score_profile, '$.overall.fposprob')
  type: number
  primary_key: false
  description: False-positive probability.
  hidden: false
- name: detectconf
  sql: json_extract(detection_score_profile, '$.overall.detectconf')
  type: number
  primary_key: false
  description: Detection confidence (overall).
  hidden: false
- name: botlikscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.botlikscore')
  type: number
  primary_key: false
  description: 'Bot-likelihood score (KB #29). Range 0-100; >70 strongly indicates
    bot behavior.'
  hidden: false
- name: autobehavscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.autobehavscore')
  type: number
  primary_key: false
  description: 'Automated-behavior score (component of BBI, KB #3).'
  hidden: false
- name: spambehavscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.spambehavscore')
  type: number
  primary_key: false
  description: Spam-behavior score.
  hidden: false
- name: commintscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.commintscore')
  type: number
  primary_key: false
  description: Commercial / spam intent score.
  hidden: false
- name: behavpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.behavpatscore')
  type: number
  primary_key: false
  description: Behavioral pattern score.
  hidden: false
- name: temppatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.temppatscore')
  type: number
  primary_key: false
  description: Temporal pattern score.
  hidden: false
- name: netpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.netpatscore')
  type: number
  primary_key: false
  description: Network pattern score.
  hidden: false
- name: contpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.contpatscore')
  type: number
  primary_key: false
  description: Content pattern score.
  hidden: false
- name: profpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.profpatscore')
  type: number
  primary_key: false
  description: Profile pattern score.
  hidden: false
- name: techpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.techpatscore')
  type: number
  primary_key: false
  description: Technical pattern score.
  hidden: false
- name: is_critical
  sql: CASE WHEN json_extract(detection_score_profile, '$.overall.threatlvl') = 'Critical'
    THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: '1 if threatlvl=''Critical'', else 0. Used for KB #10 (High-Risk Account).'
  hidden: false
measures:
- formula: detecttime:max
  name: last_activity_proxy_time
  description: 'Last activity proxy time (KB #84): max(detecttime) of associated security-detection
    records, used when direct session timestamps are insufficient.'
aggregations: []
joins:
- target_model: technicalinfo
  join_pairs:
  - - sectechref
    - techkey
  join_type: left
filters: []
description: Security detections raised against accounts. The `detection_score_profile`
  JSONB column carries overall risk scores, behavior scores, pattern scores, and reliability
  metadata; a set of derived columns extracts the most-referenced sub-fields.
hidden: false
