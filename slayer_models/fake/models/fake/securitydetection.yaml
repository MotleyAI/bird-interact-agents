version: 4
name: securitydetection
sql_table: securitydetection
query_variables: {}
data_source: fake
columns:
- name: secdetkey
  sql: secdetkey
  type: string
  primary_key: true
  hidden: false
- name: sectechref
  sql: sectechref
  type: string
  primary_key: false
  hidden: false
- name: detecttime
  sql: detecttime
  type: string
  primary_key: false
  description: "Detection timestamp. KB #84 'last activity proxy time' = max(detecttime)\
    \ per account.\n\n[kb=84]\nDerived as \\max(\\text{detecttime}) from associated\
    \ securitydetection records for an account. \u2014 An estimated timestamp of the\
    \ last known activity for an account, used when direct session timestamps are\
    \ unavailable or insufficient.\n[/kb=84]"
  label: last activity proxy time
  hidden: false
  meta:
    kb_id: 84
- name: detectsource
  sql: detectsource
  type: string
  primary_key: false
  hidden: false
- name: lastupd
  sql: lastupd
  type: string
  primary_key: false
  hidden: false
- name: updfreqhrs
  sql: updfreqhrs
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: detection_score_profile
  sql: detection_score_profile
  type: string
  primary_key: false
  description: 'JSONB column. Aggregates all granular detection scores, risk indicators,
    and model-reliability attributes for a security event. Sub-fields (confval, riskval,
    threatlvl, botlikscore, autobehavscore) are extracted as separate columns; helper
    columns confval (KB #20) and botlikscore (KB #29) carry the per-sub-field kb_ids.'
  hidden: false
  meta: {}
- name: confval
  sql: json_extract(detection_score_profile, '$.overall.confval')
  type: number
  primary_key: false
  description: "Confidence value of the detection (KB #20). Ranges 0-1; values >0.8\
    \ indicate high-confidence detections, <0.3 suggest uncertain results requiring\
    \ manual review.\n\n[kb=20]\nRanges from 0 to 1. Values above 0.8 indicate high-confidence\
    \ detections, while values below 0.3 suggest uncertain results requiring manual\
    \ review. \u2014 Illustrates confidence value in detection scores.\n[/kb=20]"
  label: detection_score_profile.overall.confval
  hidden: false
  meta:
    kb_id: 20
- name: riskval
  sql: json_extract(detection_score_profile, '$.overall.riskval')
  type: number
  primary_key: false
  description: 'Overall risk rating (component of SRS, KB #4).'
  hidden: false
- name: threatlvl
  sql: json_extract(detection_score_profile, '$.overall.threatlvl')
  type: string
  primary_key: false
  description: 'Threat priority enum (Critical / High / Low / Medium). KB #10 ''High-Risk
    Account'' triggers on threatlvl=''Critical''.'
  hidden: false
- name: fposprob
  sql: json_extract(detection_score_profile, '$.overall.fposprob')
  type: number
  primary_key: false
  description: False-positive probability.
  hidden: false
- name: detectconf
  sql: json_extract(detection_score_profile, '$.overall.detectconf')
  type: number
  primary_key: false
  description: Detection confidence (overall).
  hidden: false
- name: botlikscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.botlikscore')
  type: number
  primary_key: false
  description: "Bot-likelihood score (KB #29). Ranges 0-100; scores >70 strongly indicate\
    \ bot behavior, <20 suggest human-like behavior patterns. Component of BBI alongside\
    \ autobehavscore.\n\n[kb=29]\nRanges from 0 to 100. Scores above 70 strongly indicate\
    \ bot behavior, while scores below 20 suggest human-like behavior patterns. \u2014\
    \ Illustrates bot likelihood scoring.\n[/kb=29]"
  label: detection_score_profile.behavior_scores.botlikscore
  hidden: false
  meta:
    kb_id: 29
- name: autobehavscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.autobehavscore')
  type: number
  primary_key: false
  description: 'Automated-behavior score (component of BBI, KB #3).'
  hidden: false
- name: spambehavscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.spambehavscore')
  type: number
  primary_key: false
  description: Spam-behavior score.
  hidden: false
- name: commintscore
  sql: json_extract(detection_score_profile, '$.behavior_scores.commintscore')
  type: number
  primary_key: false
  description: Commercial / spam intent score.
  hidden: false
- name: behavpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.behavpatscore')
  type: number
  primary_key: false
  description: Behavioral pattern score.
  hidden: false
- name: temppatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.temppatscore')
  type: number
  primary_key: false
  description: Temporal pattern score.
  hidden: false
- name: netpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.netpatscore')
  type: number
  primary_key: false
  description: Network pattern score.
  hidden: false
- name: contpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.contpatscore')
  type: number
  primary_key: false
  description: Content pattern score.
  hidden: false
- name: profpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.profpatscore')
  type: number
  primary_key: false
  description: Profile pattern score.
  hidden: false
- name: techpatscore
  sql: json_extract(detection_score_profile, '$.pattern_scores.techpatscore')
  type: number
  primary_key: false
  description: Technical pattern score.
  hidden: false
- name: is_critical
  sql: CASE WHEN json_extract(detection_score_profile, '$.overall.threatlvl') = 'Critical'
    THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: '1 if threatlvl=''Critical'', else 0. Used for KB #10 (High-Risk Account).'
  hidden: false
- name: account_id
  sql: technicalinfo__networkmetrics__sessionbehavior__profile.profaccref
  type: string
  primary_key: false
  description: "Per-row account identifier resolved through the securitydetection\
    \ \u2192 technicalinfo \u2192 networkmetrics \u2192 sessionbehavior \u2192 profile\
    \ join chain. Convenience handle for grouping/multistage; equals the underlying\
    \ account.accindex."
  hidden: false
measures:
- formula: detecttime:max
  name: last_activity_proxy_time
  description: 'Last activity proxy time (KB #84): max(detecttime) of associated security-detection
    records, used when direct session timestamps are insufficient.'
aggregations: []
joins:
- target_model: technicalinfo
  join_pairs:
  - - sectechref
    - techkey
  join_type: left
filters: []
default_time_dimension: detecttime
description: Security detections raised against accounts. The `detection_score_profile`
  JSONB column carries overall risk scores, behavior scores, pattern scores, and reliability
  metadata; a set of derived columns extracts the most-referenced sub-fields.
hidden: false
