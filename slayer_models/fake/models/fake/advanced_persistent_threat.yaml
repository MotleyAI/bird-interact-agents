  name: scores_per_account
  source_model: moderationaction
  measures:
  - formula: bbi:avg
    name: bbi_v
  - formula: cbr:avg
    name: cbr_v
  - formula: srs:avg
    name: srs_v
  - formula: nmi:avg
    name: nmi_v
  - formula: tei:avg
    name: tei_v
  - formula: clustsize:max
    name: clustsize_v
  dimensions:
  - name: account_id
  - name: cluster_id
  whole_periods_only: false
- version: 3
  source_model: scores_per_account
  measures:
  - formula: bbi_v:avg
    name: avg_bbi
  - formula: cbr_v:avg
    name: avg_cbr
  - formula: srs_v:avg
    name: avg_srs
  - formula: nmi_v:avg
    name: avg_nmi
  - formula: tei_v:avg
