query_variables: {}
backing_query_sql: "SELECT \"scores_per_account.cluster_id\" AS cluster_id, \"scores_per_account.avg_bbi\"\
  \ AS avg_bbi, \"scores_per_account.avg_cbr\" AS avg_cbr, \"scores_per_account.avg_srs\"\
  \ AS avg_srs, \"scores_per_account.avg_nmi\" AS avg_nmi, \"scores_per_account.avg_tei\"\
  \ AS avg_tei, \"scores_per_account.max_clustsize\" AS max_clustsize, \"scores_per_account.member_count\"\
  \ AS member_count FROM (SELECT\n  scores_per_account.cluster_id AS \"scores_per_account.cluster_id\"\
  ,\n  AVG(scores_per_account.bbi_v) AS \"scores_per_account.avg_bbi\",\n  AVG(scores_per_account.cbr_v)\
  \ AS \"scores_per_account.avg_cbr\",\n  AVG(scores_per_account.srs_v) AS \"scores_per_account.avg_srs\"\
  ,\n  AVG(scores_per_account.nmi_v) AS \"scores_per_account.avg_nmi\",\n  AVG(scores_per_account.tei_v)\
  \ AS \"scores_per_account.avg_tei\",\n  MAX(scores_per_account.clustsize_v) AS \"\
  scores_per_account.max_clustsize\",\n  COUNT(*) AS \"scores_per_account.member_count\"\
  \nFROM (\n  SELECT\n    \"moderationaction.account_id\" AS account_id,\n    \"moderationaction.cluster_id\"\
  \ AS cluster_id,\n    \"moderationaction.bbi_v\" AS bbi_v,\n    \"moderationaction.cbr_v\"\
  \ AS cbr_v,\n    \"moderationaction.srs_v\" AS srs_v,\n    \"moderationaction.nmi_v\"\
  \ AS nmi_v,\n    \"moderationaction.tei_v\" AS tei_v,\n    \"moderationaction.clustsize_v\"\
  \ AS clustsize_v\n  FROM (\n    SELECT\n      contentbehavior__sessionbehavior__profile.profaccref\
  \ AS \"moderationaction.account_id\",\n      contentbehavior__sessionbehavior__profile__account.platident\
  \ AS \"moderationaction.cluster_id\",\n      AVG(\n        0.4 * JSON_EXTRACT(securitydetection.detection_score_profile,\
  \ '$.behavior_scores.botlikscore') + 0.3 * JSON_EXTRACT(securitydetection.detection_score_profile,\
  \ '$.behavior_scores.autobehavscore') + 0.3 * (\n          1 - securitydetection__technicalinfo__messaginganalysis.convnatval\n\
  \        )\n      ) AS \"moderationaction.bbi_v\",\n      AVG(\n        (\n    \
  \      0.4 * JSON_EXTRACT(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')\
  \ + 0.3 * JSON_EXTRACT(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')\
  \ + 0.3 * (\n            1 - securitydetection__technicalinfo__messaginganalysis.convnatval\n\
  \          )\n        ) * (\n          0.5 * moderationaction.coordscore + 0.3 *\
  \ moderationaction.netinflscore + 0.2 * (\n            CAST(moderationaction.clustsize\
  \ AS REAL) / 100\n          )\n        ) * (\n          CAST(moderationaction.clustsize\
  \ AS REAL) / 100\n        )\n      ) AS \"moderationaction.cbr_v\",\n      AVG(\n\
  \        0.4 * JSON_EXTRACT(securitydetection.detection_score_profile, '$.overall.riskval')\
  \ + 0.3 * (\n          1 - moderationaction.trustval\n        ) + 0.3 * moderationaction.impactval\n\
  \      ) AS \"moderationaction.srs_v\",\n      AVG(\n        0.6 * (\n         \
  \ 0.4 * JSON_EXTRACT(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')\
  \ + 0.3 * JSON_EXTRACT(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')\
  \ + 0.3 * (\n            1 - securitydetection__technicalinfo__messaginganalysis.convnatval\n\
  \          )\n        ) + 0.4 * (\n          0.5 * moderationaction.coordscore +\
  \ 0.3 * moderationaction.netinflscore + 0.2 * (\n            CAST(moderationaction.clustsize\
  \ AS REAL) / 100\n          )\n        )\n      ) AS \"moderationaction.nmi_v\"\
  ,\n      AVG(\n        0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (\n\
  \          CAST(securitydetection__technicalinfo.proxycount AS REAL) / 10\n    \
  \    ) + 0.3 * (\n          CAST(securitydetection__technicalinfo.ipcountrynum AS\
  \ REAL) / 20\n        )\n      ) AS \"moderationaction.tei_v\",\n      MAX(moderationaction.clustsize)\
  \ AS \"moderationaction.clustsize_v\"\n    FROM moderationaction AS moderationaction\n\
  \    LEFT JOIN contentbehavior AS contentbehavior\n      ON moderationaction.macntref\
  \ = contentbehavior.cntref\n    LEFT JOIN securitydetection AS securitydetection\n\
  \      ON moderationaction.masedetref = securitydetection.secdetkey\n    LEFT JOIN\
  \ technicalinfo AS securitydetection__technicalinfo\n      ON securitydetection.sectechref\
  \ = securitydetection__technicalinfo.techkey\n    LEFT JOIN sessionbehavior AS contentbehavior__sessionbehavior\n\
  \      ON contentbehavior.cntsessref = contentbehavior__sessionbehavior.sessref\n\
  \    LEFT JOIN messaginganalysis AS securitydetection__technicalinfo__messaginganalysis\n\
  \      ON securitydetection__technicalinfo.techmsgref = securitydetection__technicalinfo__messaginganalysis.msgkey\n\
  \    LEFT JOIN profile AS contentbehavior__sessionbehavior__profile\n      ON contentbehavior__sessionbehavior.sessprofref\
  \ = contentbehavior__sessionbehavior__profile.profkey\n    LEFT JOIN account AS\
  \ contentbehavior__sessionbehavior__profile__account\n      ON contentbehavior__sessionbehavior__profile.profaccref\
  \ = contentbehavior__sessionbehavior__profile__account.accindex\n    GROUP BY\n\
  \      contentbehavior__sessionbehavior__profile.profaccref,\n      contentbehavior__sessionbehavior__profile__account.platident\n\
  \  ) AS _inner\n) AS scores_per_account\nGROUP BY\n  scores_per_account.cluster_id)\
  \ AS _inner"
data_source: fake
columns:
- name: cluster_id
  sql: cluster_id
  type: TEXT
  primary_key: false
  description: "Per-row cluster identifier resolved through the moderationaction \u2192\
    \ contentbehavior \u2192 sessionbehavior \u2192 profile \u2192 account join chain.\
    \ Equals account.platident; per KB #80, this is the cluster identifier used to\
    \ group accounts in cluster-level rules (Bot Network, Amplification Network, ...)."
  hidden: false
- name: avg_bbi
  sql: avg_bbi
  type: DOUBLE
  primary_key: false
  description: 'Bot Behavior Index (KB #3): 0.4*botlikscore + 0.3*autobehavscore +
    0.3*(1-convnatval). botlikscore observed in 0-100; KB-implied composite assumes
    0-1, so values may exceed 1.'
  hidden: false
  format:
    type: float
- name: avg_cbr
  sql: avg_cbr
  type: DOUBLE
  primary_key: false
  description: 'Coordinated Bot Risk (KB #33): BBI * CAS-coord * clustsize/100.'
  hidden: false
  format:
    type: float
- name: avg_srs
  sql: avg_srs
  type: DOUBLE
  primary_key: false
  description: 'Security Risk Score (KB #4): 0.4*riskval + 0.3*(1-trustval) + 0.3*impactval.'
  hidden: false
  format:
    type: float
- name: avg_nmi
  sql: avg_nmi
  type: DOUBLE
  primary_key: false
  description: 'Network Manipulation Index (KB #31): 0.6*BBI + 0.4*CAS-coord. BBI
    and CAS-coord inlined.'
  hidden: false
  format:
    type: float
- name: avg_tei
  sql: avg_tei
  type: DOUBLE
  primary_key: false
  description: 'Technical Evasion Index (KB #7): 0.4*vpnratio + 0.3*proxycount/10
    + 0.3*ipcountrynum/20.'
  hidden: false
  format:
    type: float
- name: max_clustsize
  sql: max_clustsize
  type: DOUBLE
  primary_key: false
  description: Size of the related account cluster.
  hidden: false
  format:
    type: integer
- name: member_count
  sql: member_count
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: integer
