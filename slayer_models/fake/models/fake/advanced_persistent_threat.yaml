  \ > 0.7 AND max_clustsize > 10 (Bot Network) AND avg_cbr > 0.8 AND avg_srs > 0.7.\
  \ Apply all six filters at query time.\n\n[kb=49]\nA High-Risk Bot Network with\
  \ NMI > 0.9 and TEI > 0.8 \u2014 Identifies sophisticated, persistent security threats.\n\
  [/kb=49]"
