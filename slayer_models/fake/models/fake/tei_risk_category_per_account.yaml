description: "TEI Risk Category per account (KB #79). Maps the account's TEI Quartile\
  \ (KB #70) to a categorical label: 'Low Risk' (Quartile 1), 'Moderate Risk' (Quartile\
  \ 2), 'High Risk' (Quartile 3), 'Very High Risk' (Quartile 4).\n\n[kb=79]\nA category\
  \ assigned as 'Low Risk' (Quartile 1), 'Moderate Risk' (Quartile 2), 'High Risk'\
  \ (Quartile 3), or 'Very High Risk' (Quartile 4) based on the account's calculated\
  \ TEI Quartile. \u2014 A categorical risk level assigned based on an account's TEI\
  \ Quartile.\n[/kb=79]"
