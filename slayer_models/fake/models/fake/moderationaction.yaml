- formula: contentbehavior.sessionbehavior.profile.account.accindex:count_distinct
  name: member_count
  label: member count
  description: "Member Count (KB #81): COUNT(DISTINCT accindex) per cluster (platident).\n\
    \n[kb=81]\nCalculated using COUNT(DISTINCT account_index) for accounts grouped\
    \ by the cluster identifier. \u2014 The total number of unique accounts within\
    \ an identified cluster.\n[/kb=81]"
  meta:
    kb_id: 81
- formula: coordscore:max
  name: max_coordscore
  label: maximum coordination score
  description: "Maximum Coordination Score (KB #82): max over coordscore in a cluster.\n\
    \n[kb=82]\n\\max_{a \\in cluster C} (\\text{coordscore}_a) \u2014 The highest\
    \ coordination score observed among the members of an identified cluster.\n[/kb=82]"
  meta:
    kb_id: 82
- formula: contentbehavior.sessionbehavior.profile.account.accindex:list_distinct
  name: member_account_ids
  label: member account IDs
  description: "Member Account IDs (KB #83): comma-separated distinct accindex values\
    \ in a cluster.\n\n[kb=83]\n\\{ \\text{accindex}_a \\mid a \\in cluster C \\}\
    \ \u2014 A collection (array) of the unique account indexes belonging to an identified\
