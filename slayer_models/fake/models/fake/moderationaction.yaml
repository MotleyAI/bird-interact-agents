- name: coordscore
  sql: coordscore
  type: number
  primary_key: false
  description: "Coordination score (KB #21). KB documents [0,1] range with >0.7 strongly\
    \ indicating coordinated behavior and <0.2 suggesting independent actions; observed\
    \ data is on a 0-100 scale.\n\n[kb=21]\nRanges from 0 to 1. Scores above 0.7 strongly\
    \ indicate coordinated behavior, while scores below 0.2 suggest independent actions.\
    \ \u2014 Illustrates coordination score meaning.\n[/kb=21]"
  label: moderationaction.coordscore
  hidden: false
  format:
    type: float
  meta:
    kb_id: 21
- name: authenscore
  sql: authenscore
  type: number
  primary_key: false
  description: Authenticity score (component of CAS / Content Authenticity).
  hidden: false
  format:
    type: float
- name: credscore
  sql: credscore
  type: number
  primary_key: false
  description: Credibility score (component of PCI).
  hidden: false
  format:
    type: float
- name: reputscore
  sql: reputscore
  type: number
  primary_key: false
  description: Reputation score (component of PCI; underlies RVI).
  hidden: false
  format:
    type: float
- name: trustval
  sql: trustval
  type: number
  primary_key: false
  description: "Trust value (KB #27). KB documents the [0,1] range; observed data\
    \ is on a 0-10 scale. Higher = more trusted.\n\n[kb=27]\nRanges from 0 to 1. Values\
    \ above 0.7 indicate highly trusted accounts, while values below 0.3 suggest untrusted\
    \ or suspicious accounts. \u2014 Illustrates trust value meaning.\n[/kb=27]"
  label: moderationaction.trustval
  hidden: false
  format:
    type: float
  meta:
    kb_id: 27
- name: impactval
  sql: impactval
  type: number
  primary_key: false
  description: "Impact value of the violation (KB #28). KB documents the [0,1] range;\
    \ observed data extends beyond 1.\n\n[kb=28]\nRanges from 0 to 1. Values above\
    \ 0.7 indicate high-impact violations requiring immediate attention, while values\
    \ below 0.3 suggest low-priority issues. \u2014 Illustrates impact value meaning.\n\
    [/kb=28]"
  label: moderationaction.impactval
  hidden: false
  format:
    type: float
  meta:
    kb_id: 28
- name: monitorpriority
  sql: monitorpriority
  type: string
  primary_key: false
  hidden: false
- name: investstatus
  sql: investstatus
  type: string
  primary_key: false
  hidden: false
- name: actiontaken
  sql: actiontaken
  type: string
  primary_key: false
  hidden: false
- name: reviewfreq
  sql: reviewfreq
  type: string
  primary_key: false
  hidden: false
- name: lastrevdate
  sql: lastrevdate
  type: string
  primary_key: false
  hidden: false
- name: nextrevdate
  sql: nextrevdate
  type: string
  primary_key: false
  hidden: false
- name: aaf
  sql: CAST(contentbehavior__sessionbehavior.sesscount AS REAL) / NULLIF(contentbehavior__sessionbehavior__profile__account.acctagespan,
    0)
  type: number
  primary_key: false
  description: "Account Activity Frequency (AAF) = sesscount / acctagespan. KB #0.\n\
    \n[kb=0]\nAAF = \\frac{\\text{sesscount}}{\\text{acctagespan}} \u2014 Measures\
    \ how frequently an account engages in platform activities relative to its age.\n\
    [/kb=0]"
  label: Account Activity Frequency (AAF)
  hidden: false
  meta:
    kb_id: 0
- name: cas_authenticity
  sql: 0.3 * authenscore + 0.3 * contentbehavior.cntuniqscore + 0.4 * securitydetection__technicalinfo__messaginganalysis.convnatval
  type: number
  primary_key: false
  description: "Content Authenticity Score (KB #1). Defined as 0.3*authenscore + 0.3*cntuniqscore\
    \ + 0.4*convnatval. KB says values are normalized to [0,1]; observed scales may\
    \ differ.\n\n[kb=1]\nCAS = 0.3 \\times \\text{authenscore} + 0.3 \\times \\text{cntuniqscore}\
    \ + 0.4 \\times \\text{convnatval} where values are normalized to [0,1] \u2014\
    \ Aggregates multiple authenticity indicators into a single score.\n[/kb=1]"
  label: Content Authenticity Score (CAS)
  hidden: false
  meta:
    kb_id: 1
- name: ngv
  sql: sqrt((CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) + (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)))
  type: number
  primary_key: false
  description: "Network Growth Velocity (KB #2): sqrt(followgrowrate^2 + followinggrowrate^2).\
    \ Joined networkmetrics row reached via securitydetection->technicalinfo->networkmetrics.\n\
    \n[kb=2]\nNGV = \\sqrt{\\text{followgrowrate}^2 + \\text{followinggrowrate}^2}\
    \ \u2014 Measures the rate of network growth considering both followers and following.\n\
    [/kb=2]"
  label: Network Growth Velocity (NGV)
  hidden: false
  meta:
    kb_id: 2
- name: bbi
  sql: 0.4 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')
    + 0.3 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval)
  type: number
  primary_key: false
  description: "Bot Behavior Index (KB #3): 0.4*botlikscore + 0.3*autobehavscore +\
    \ 0.3*(1-convnatval). botlikscore observed in 0-100; KB-implied composite assumes\
    \ 0-1, so values may exceed 1.\n\n[kb=3]\nBBI = 0.4 \\times \\text{botlikscore}\
    \ + 0.3 \\times \\text{autobehavscore} + 0.3 \\times (1 - \\text{convnatval})\
    \ \u2014 Combines multiple bot-detection metrics into a single score.\n[/kb=3]"
  label: Bot Behavior Index (BBI)
  hidden: false
  meta:
    kb_id: 3
- name: srs
  sql: 0.4 * json_extract(securitydetection.detection_score_profile, '$.overall.riskval')
    + 0.3 * (1 - trustval) + 0.3 * impactval
  type: number
  primary_key: false
  description: "Security Risk Score (KB #4): 0.4*riskval + 0.3*(1-trustval) + 0.3*impactval.\n\
    \n[kb=4]\nSRS = 0.4 \\times \\text{riskval} + 0.3 \\times (1 - \\text{trustval})\
    \ + 0.3 \\times \\text{impactval} \u2014 Calculates overall security risk based\
    \ on multiple factors.\n[/kb=4]"
  label: Security Risk Score (SRS)
  hidden: false
  meta:
    kb_id: 4
- name: pci
  sql: 0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness')
  type: number
  primary_key: false
  description: "Profile Credibility Index (KB #5): 0.3*credscore + 0.3*reputscore\
    \ + 0.4*completeness.\n\n[kb=5]\nPCI = 0.3 \\times \\text{credscore} + 0.3 \\\
    times \\text{reputscore} + 0.4 \\times \\text{completeness} \u2014 Evaluates overall\
    \ profile credibility.\n[/kb=5]"
  label: Profile Credibility Index (PCI)
  hidden: false
  meta:
    kb_id: 5
- name: cas_coordinated
  sql: 0.5 * coordscore + 0.3 * netinflscore + 0.2 * (CAST(clustsize AS REAL) / 100)
  type: number
  primary_key: false
  description: "Coordinated Activity Score (KB #6): 0.5*coordscore + 0.3*netinflscore\
    \ + 0.2*clustsize/100.\n\n[kb=6]\nCAS = 0.5 \\times \\text{coordscore} + 0.3 \\\
    times \\text{netinflscore} + 0.2 \\times \\frac{\\text{clustsize}}{100} \u2014\
    \ Measures likelihood of coordinated behavior across accounts.\n[/kb=6]"
  label: Coordinated Activity Score (CAS)
  hidden: false
  meta:
    kb_id: 6
- name: tei
  sql: 0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)
  type: number
  primary_key: false
  description: "Technical Evasion Index (KB #7): 0.4*vpnratio + 0.3*proxycount/10\
    \ + 0.3*ipcountrynum/20.\n\n[kb=7]\nTEI = 0.4 \\times \\text{vpnratio} + 0.3 \\\
    times \\frac{\\text{proxycount}}{10} + 0.3 \\times \\frac{\\text{ipcountrynum}}{20}\
    \ \u2014 Quantifies attempts to evade detection.\n[/kb=7]"
  label: Technical Evasion Index (TEI)
  hidden: false
  meta:
    kb_id: 7
- name: cms
  sql: 0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq)
  type: number
  primary_key: false
  description: "Content Manipulation Score (KB #8): 0.4*(1-cntuniqscore) + 0.3*mediareratio\
    \ + 0.3*(1-txtuniq).\n\n[kb=8]\nCMS = 0.4 \\times (1 - \\text{cntuniqscore}) +\
    \ 0.3 \\times \\text{mediareratio} + 0.3 \\times (1 - \\text{txtuniq}) \u2014\
    \ Evaluates content manipulation patterns.\n[/kb=8]"
  label: Content Manipulation Score (CMS)
  hidden: false
  meta:
    kb_id: 8
- name: mps
  sql: 0.3 * (CAST(abuserepnum AS REAL) / 1000) + 0.4 * impactval + 0.3 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval')
  type: number
  primary_key: false
  description: "Moderation Priority Score (KB #9): 0.3*abuserepnum/1000 + 0.4*impactval\
    \ + 0.3*riskval.\n\n[kb=9]\nMPS = 0.3 \\times \\frac{\\text{abuserepnum}}{1000}\
    \ + 0.4 \\times \\text{impactval} + 0.3 \\times \\text{riskval} \u2014 Calculates\
    \ priority for moderation review.\n[/kb=9]"
  label: Moderation Priority Score (MPS)
  hidden: false
  meta:
    kb_id: 9
- name: cpri
  sql: (0.4 * json_extract(securitydetection.detection_score_profile, '$.overall.riskval')
    + 0.3 * (1 - trustval) + 0.3 * impactval) * (1 + 0.2 * securitydetection__technicalinfo.ipcountrynum)
  type: number
  primary_key: false
  description: "Cross-Platform Risk Index (KB #30): SRS * (1 + 0.2 * ipcountrynum).\
    \ Inlines SRS to avoid cross-column reference inside Column.sql.\n\n[kb=30]\n\
    CPRI = SRS \\times (1 + 0.2 \\times \\text{ipcountrynum}) \u2014 Evaluates risk\
    \ across multiple platform types for the same account.\n[/kb=30]"
  label: Cross-Platform Risk Index (CPRI)
  hidden: false
  meta:
    kb_id: 30
- name: nmi
  sql: 0.6 * (0.4 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')
    + 0.3 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval))
    + 0.4 * (0.5 * coordscore + 0.3 * netinflscore + 0.2 * (CAST(clustsize AS REAL)
    / 100))
  type: number
  primary_key: false
  description: "Network Manipulation Index (KB #31): 0.6*BBI + 0.4*CAS-coord. BBI\
    \ and CAS-coord inlined.\n\n[kb=31]\nNMI = 0.6 \\times BBI + 0.4 \\times CAS \u2014\
    \ Measures the extent of network manipulation considering bot behavior and coordination.\n\
    [/kb=31]"
  label: Network Manipulation Index (NMI)
  hidden: false
  meta:
    kb_id: 31
- name: ets
  sql: 0.5 * (0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness')) + 0.5 * (0.3 * authenscore + 0.3 * contentbehavior.cntuniqscore
    + 0.4 * securitydetection__technicalinfo__messaginganalysis.convnatval)
  type: number
  primary_key: false
  description: "Enhanced Trust Score (KB #32): 0.5*PCI + 0.5*CAS-authenticity. PCI\
    \ and CAS inlined.\n\n[kb=32]\nETS = 0.5 \\times PCI + 0.5 \\times CAS \u2014\
    \ Calculates trust score considering both profile credibility and content authenticity.\n\
    [/kb=32]"
  label: Enhanced Trust Score (ETS)
  hidden: false
  meta:
    kb_id: 32
- name: cbr
  sql: (0.4 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')
    + 0.3 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval))
    * (0.5 * coordscore + 0.3 * netinflscore + 0.2 * (CAST(clustsize AS REAL) / 100))
    * (CAST(clustsize AS REAL) / 100)
  type: number
  primary_key: false
  description: "Coordinated Bot Risk (KB #33): BBI * CAS-coord * clustsize/100.\n\n\
    [kb=33]\nCBR = BBI \\times CAS \\times \\frac{\\text{clustsize}}{100} \u2014 Assesses\
    \ risk from coordinated bot networks.\n[/kb=33]"
  label: Coordinated Bot Risk (CBR)
  hidden: false
  meta:
    kb_id: 33
- name: csi
  sql: 0.7 * (1 - (0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq))) +
    0.3 * (0.3 * authenscore + 0.3 * contentbehavior.cntuniqscore + 0.4 * securitydetection__technicalinfo__messaginganalysis.convnatval)
  type: number
  primary_key: false
  description: "Content Security Index (KB #34): 0.7*(1-CMS) + 0.3*CAS-authenticity.\n\
    \n[kb=34]\nCSI = 0.7 \\times (1 - CMS) + 0.3 \\times CAS \u2014 Evaluates content\
    \ security considering manipulation and authenticity.\n[/kb=34]"
  label: Content Security Index (CSI)
  hidden: false
  meta:
    kb_id: 34
- name: abs_score
  sql: 0.4 * (0.4 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')
    + 0.3 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval))
    + 0.3 * (0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)) + 0.3 * (1 - (0.3 * authenscore + 0.3 * contentbehavior.cntuniqscore
    + 0.4 * securitydetection__technicalinfo__messaginganalysis.convnatval))
  type: number
  primary_key: false
  description: "Automated Behavior Score (KB #35): 0.4*BBI + 0.3*TEI + 0.3*(1-CAS-authenticity).\n\
    \n[kb=35]\nABS = 0.4 \\times BBI + 0.3 \\times TEI + 0.3 \\times (1 - CAS) \u2014\
    \ Measures degree of automation in account behavior.\n[/kb=35]"
  label: Automated Behavior Score (ABS)
  hidden: false
  meta:
    kb_id: 35
- name: nts
  sql: (0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness')) * (1 - sqrt((CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) + (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)))) * (1 - ((0.4 * json_extract(securitydetection.detection_score_profile,
    '$.behavior_scores.botlikscore') + 0.3 * json_extract(securitydetection.detection_score_profile,
    '$.behavior_scores.autobehavscore') + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval))
    * (0.5 * coordscore + 0.3 * netinflscore + 0.2 * (CAST(clustsize AS REAL) / 100))
    * (CAST(clustsize AS REAL) / 100)))
  type: number
  primary_key: false
  description: "Network Trust Score (KB #36): PCI * (1-NGV) * (1-CBR). All inlined.\n\
    \n[kb=36]\nNTS = PCI \\times (1 - NGV) \\times (1 - CBR) \u2014 Evaluates trustworthiness\
    \ of account's network connections.\n[/kb=36]"
  label: Network Trust Score (NTS)
  hidden: false
  meta:
    kb_id: 36
- name: cis
  sql: (0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq)) * (0.3
    * (CAST(abuserepnum AS REAL) / 1000) + 0.4 * impactval + 0.3 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval')) * (CAST(netinflscore AS REAL) / 100)
  type: number
  primary_key: false
  description: "Content Impact Score (KB #37): CMS * MPS * netinflscore/100.\n\n[kb=37]\n\
    CIS = CMS \\times MPS \\times \\frac{\\text{netinflscore}}{100} \u2014 Measures\
    \ potential impact of manipulated content.\n[/kb=37]"
  label: Content Impact Score (CIS)
  hidden: false
  meta:
    kb_id: 37
- name: ars
  sql: 0.5 * (0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)) + 0.3 * (1 - (0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness'))) + 0.2 * (0.4 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval') + 0.3 * (1 - trustval) + 0.3 * impactval)
  type: number
  primary_key: false
  description: "Authentication Risk Score (KB #38): 0.5*TEI + 0.3*(1-PCI) + 0.2*SRS.\n\
    \n[kb=38]\nARS = 0.5 \\times TEI + 0.3 \\times (1 - PCI) + 0.2 \\times SRS \u2014\
    \ Assesses authentication-related risks.\n[/kb=38]"
  label: Authentication Risk Score (ARS)
  hidden: false
  meta:
    kb_id: 38
- name: bas
  sql: 0.4 * (0.4 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.botlikscore')
    + 0.3 * json_extract(securitydetection.detection_score_profile, '$.behavior_scores.autobehavscore')
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.convnatval))
    + 0.4 * (CAST(contentbehavior__sessionbehavior.sesscount AS REAL) / NULLIF(contentbehavior__sessionbehavior__profile__account.acctagespan,
    0)) + 0.2 * sqrt((CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followgrowrate') AS REAL)) + (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)) * (CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.followinggrowrate') AS REAL)))
  type: number
  primary_key: false
  description: "Behavioral Anomaly Score (KB #39): 0.4*BBI + 0.4*AAF + 0.2*NGV.\n\n\
    [kb=39]\nBAS = 0.4 \\times BBI + 0.4 \\times AAF + 0.2 \\times NGV \u2014 Quantifies\
    \ unusual behavior patterns.\n[/kb=39]"
  label: Behavioral Anomaly Score (BAS)
  hidden: false
  meta:
    kb_id: 39
- name: nic
  sql: 0.4 * CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.connqualscore') AS REAL) + 0.3 * netinflscore + 0.3 * CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.interaction_metrics.interactdiv') AS REAL)
  type: number
  primary_key: false
  description: "Network Influence Centrality (KB #51): 0.4*connqualscore + 0.3*netinflscore\
    \ + 0.3*interactdiv.\n\n[kb=51]\nNIC = 0.4 \\times \\text{connqualscore} + 0.3\
    \ \\times \\text{netinflscore} + 0.3 \\times \\text{interactdiv} \u2014 Quantifies\
    \ account's position and influence in interaction network.\n[/kb=51]"
  label: Network Influence Centrality (NIC)
  hidden: false
  meta:
    kb_id: 51
- name: cae
  sql: (0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq)) * (0.3
    * (CAST(abuserepnum AS REAL) / 1000) + 0.4 * impactval + 0.3 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval')) * (CAST(netinflscore AS REAL) / 100) * (0.4 * CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.connection_metrics.connqualscore') AS REAL) + 0.3 * netinflscore + 0.3 * CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.interaction_metrics.interactdiv') AS REAL)) * ln(1 + COALESCE(linkacctnum,
    0))
  type: number
  primary_key: false
  description: "Content Amplification Effect (KB #57): CIS * NIC * ln(1 + resharecount).\
    \ resharecount is not in schema; using linkacctnum as a best-effort proxy for\
    \ cascade size. CIS and NIC inlined.\n\n[kb=57]\nCAE = \\text{CIS} \\times NIC\
    \ \\times \\log(1 + \\text{resharecount}) \u2014 Measures the cascade effect of\
    \ content sharing.\n[/kb=57]"
  label: Content Amplification Effect (CAE)
  hidden: false
  meta:
    kb_id: 57
- name: is_high_risk_account
  sql: CASE WHEN (0.4 * json_extract(securitydetection.detection_score_profile, '$.overall.riskval')
    + 0.3 * (1 - trustval) + 0.3 * impactval) > 0.8 AND json_extract(securitydetection.detection_score_profile,
    '$.overall.threatlvl') = 'Critical' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "High-Risk Account predicate (KB #10): SRS > 0.8 AND threatlvl='Critical'.\
    \ 1=true.\n\n[kb=10]\nAn account with SRS > 0.8 and at least one active security\
    \ detection with threatlvl = 'Critical' \u2014 Identifies accounts requiring immediate\
    \ attention.\n[/kb=10]"
  label: High-Risk Account
  hidden: false
  meta:
    kb_id: 10
- name: is_dormant_bot
  sql: CASE WHEN contentbehavior__sessionbehavior__profile__account.acctstatus = 'Dormant'
    THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Dormant Bot predicate (KB #15): acctstatus='Dormant'. 1=true.\n\n\
    [kb=15]\nAn account with acctstatus = 'Dormant'. \u2014 Identifies inactive bot\
    \ accounts.\n[/kb=15]"
  label: Dormant Bot
  hidden: false
  meta:
    kb_id: 15
- name: is_vpn_abuser
  sql: CASE WHEN (0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)) > 0.8 AND securitydetection__technicalinfo.ipcountrynum >= 3 THEN
    1 ELSE 0 END
  type: number
  primary_key: false
  description: "VPN Abuser predicate (KB #16): TEI > 0.8 AND ipcountrynum >= 3 (proxy\
    \ for '3+ different countries in login locations'). 1=true.\n\n[kb=16]\nAn account\
    \ with TEI > 0.8 and at least 3 different countries in login locations \u2014\
    \ Identifies accounts systematically using VPNs.\n[/kb=16]"
  label: VPN Abuser
  hidden: false
  meta:
    kb_id: 16
- name: is_engagement_manipulator
  sql: CASE WHEN CAST(json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.engagement_metrics.engauth') AS REAL) < 0.3 AND json_extract(securitydetection__technicalinfo__networkmetrics.network_engagement_metrics,
    '$.interaction_metrics.tempinteractpat') = 'Automated' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Engagement Manipulator predicate (KB #17): engauth < 0.3 AND tempinteractpat='Automated'.\
    \ 1=true.\n\n[kb=17]\nAn account where engauth < 0.3 and tempinteractpat = 'Automated'\
    \ \u2014 Identifies artificial engagement patterns.\n[/kb=17]"
  label: Engagement Manipulator
  hidden: false
  meta:
    kb_id: 17
- name: is_serial_violator
  sql: CASE WHEN CAST(susphist AS INTEGER) > 2 AND warnnum > 5 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Serial Violator predicate (KB #18): susphist > 2 AND warnnum > 5.\
    \ 1=true.\n\n[kb=18]\nAn account with susphist > 2 and warnnum > 5 \u2014 Identifies\
    \ repeat policy violators.\n[/kb=18]"
  label: Serial Violator
  hidden: false
  meta:
    kb_id: 18
- name: is_amplifier_in_amplification_network
  sql: CASE WHEN clustrole = 'Amplifier' AND coordscore > 0.8 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Amplification Network predicate (KB #19): clustrole='Amplifier' AND\
    \ coordscore > 0.8. 1=true.\n\n[kb=19]\nA cluster where clustrole = 'Amplifier'\
    \ and coordscore > 0.8 \u2014 Identifies coordinated content amplification.\n\
    [/kb=19]"
  label: Amplification Network
  hidden: false
  meta:
    kb_id: 19
- name: is_high_impact_amplifier
  sql: CASE WHEN netinflscore > 80 AND contentbehavior.postfreq > 30 THEN 1 ELSE 0
    END
  type: number
  primary_key: false
  description: "High-Impact Amplifier predicate (KB #73): netinflscore > 80 AND postfreq\
    \ > 30.\n\n[kb=73]\nAn account with netinflscore > 80 and postfreq > 30 posts\
    \ per day. \u2014 Identifies accounts with substantial network influence and frequent\
    \ posting activity, acting as key amplifiers in coordinated networks.\n[/kb=73]"
  label: High-Impact Amplifier
  hidden: false
  meta:
    kb_id: 73
- name: is_content_farm
  sql: CASE WHEN (0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq)) > 0.7
    AND contentbehavior.postfreq > 50 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Content Farm predicate (KB #13): CMS > 0.7 AND postfreq > 50.\n\n\
    [kb=13]\nAn account with CMS > 0.7 and postfreq > 50 posts per day \u2014 Identifies\
    \ accounts mass-producing similar content.\n[/kb=13]"
  label: Content Farm
  hidden: false
  meta:
    kb_id: 13
- name: is_sockpuppet_member
  sql: CASE WHEN linkacctnum > 5 AND (0.5 * coordscore + 0.3 * netinflscore + 0.2
    * (CAST(clustsize AS REAL) / 100)) > 0.8 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Sockpuppet Network member predicate (KB #14): linkacctnum > 5 AND\
    \ CAS_coord > 0.8.\n\n[kb=14]\nA group of accounts where linkacctnum > 5 and CAS\
    \ > 0.8 \u2014 Identifies related accounts used for manipulation.\n[/kb=14]"
  label: Sockpuppet Network
  hidden: false
  meta:
    kb_id: 14
- name: is_trusted_content_creator
  sql: CASE WHEN (0.5 * (0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness')) + 0.5 * (0.3 * authenscore + 0.3 * contentbehavior.cntuniqscore
    + 0.4 * securitydetection__technicalinfo__messaginganalysis.convnatval)) > 0.8
    AND ((0.4 * (1 - contentbehavior.cntuniqscore) + 0.3 * contentbehavior.mediareratio
    + 0.3 * (1 - securitydetection__technicalinfo__messaginganalysis.txtuniq)) * (0.3
    * (CAST(abuserepnum AS REAL) / 1000) + 0.4 * impactval + 0.3 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval')) * (CAST(netinflscore AS REAL) / 100)) < 0.2 THEN 1 ELSE
    0 END
  type: number
  primary_key: false
  description: "Trusted Content Creator predicate (KB #41): ETS > 0.8 AND CIS < 0.2.\n\
    \n[kb=41]\nAn account with ETS > 0.8 and CIS < 0.2 \u2014 Identifies reliable\
    \ content creators.\n[/kb=41]"
  label: Trusted Content Creator
  hidden: false
  meta:
    kb_id: 41
- name: is_authentication_risk_account
  sql: CASE WHEN (0.5 * (0.4 * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)) + 0.3 * (1 - (0.3 * credscore + 0.3 * reputscore + 0.4 * json_extract(contentbehavior__sessionbehavior__profile.profile_composition,
    '$.completeness'))) + 0.2 * (0.4 * json_extract(securitydetection.detection_score_profile,
    '$.overall.riskval') + 0.3 * (1 - trustval) + 0.3 * impactval)) > 0.7 AND (0.4
    * securitydetection__technicalinfo.vpnratio + 0.3 * (CAST(securitydetection__technicalinfo.proxycount
    AS REAL) / 10) + 0.3 * (CAST(securitydetection__technicalinfo.ipcountrynum AS
    REAL) / 20)) > 0.8 AND securitydetection__technicalinfo.ipcountrynum >= 3 THEN
    1 ELSE 0 END
  type: number
  primary_key: false
  description: "Authentication Risk Account predicate (KB #42): ARS > 0.7 AND has\
    \ VPN-Abuser detection (TEI > 0.8 AND ipcountrynum >= 3 on this row).\n\n[kb=42]\n\
    An account with ARS > 0.7 and at least one VPN Abuser detection \u2014 Identifies\
    \ accounts with suspicious authentication patterns.\n[/kb=42]"
  label: Authentication Risk Account
  hidden: false
  meta:
    kb_id: 42
- name: is_reputational_risk
  sql: CASE WHEN reputscore < 30 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Reputational Risk predicate (KB #72): reputscore < 30 (with 'high\
    \ abuserepnum' as descriptive context). The 'top quartile of abuse reports' priority\
    \ component is a windowing concern deferred to W4b R-MULTISTAGE.\n\n[kb=72]\n\
    An account with reputscore < 30 and high abuserepnum, prioritized by the top quartile\
    \ of abuse reports. \u2014 Measures the potential risk to an account\u2019s reputation\
    \ based on past moderation actions and low reputation scores.\n[/kb=72]"
  label: Reputational Risk
  hidden: false
  meta:
    kb_id: 72
- name: is_high_activity_account
  sql: CASE WHEN contentbehavior__sessionbehavior.sesscount > 1000 OR contentbehavior.postfreq
    > 50 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "High-Activity Account predicate (KB #74 / #77): session_count > 1000\
    \ OR total_post_frequency > 50. Per-row proxy; for true per-account aggregates\
    \ use the SC (KB #75) and TPF (KB #76) measures instead.\n\n[kb=74]\nAn account\
    \ with session_count > 1000 or total_post_frequency > 50. \u2014 Identifies accounts\
    \ with elevated engagement levels based on the number of sessions or total posting\
    \ frequency.\n[/kb=74]"
  label: High-Activity Account
  hidden: false
  meta:
    kb_id: 74
- name: account_id
  sql: contentbehavior__sessionbehavior__profile.profaccref
  type: string
  primary_key: false
  description: "Per-row account identifier resolved through the moderationaction \u2192\
    \ contentbehavior \u2192 sessionbehavior \u2192 profile join chain. Convenience\
    \ handle for grouping/multistage; equals the underlying account.accindex."
  hidden: false
- name: cluster_id
  sql: contentbehavior__sessionbehavior__profile__account.platident
  type: string
  primary_key: false
  description: "Per-row cluster identifier resolved through the moderationaction \u2192\
    \ contentbehavior \u2192 sessionbehavior \u2192 profile \u2192 account join chain.\
    \ Equals account.platident; per KB #80, this is the cluster identifier used to\
    \ group accounts in cluster-level rules (Bot Network, Amplification Network, ...)."
  hidden: false
