aggregations:
- name: list_distinct
  formula: GROUP_CONCAT(DISTINCT {value})
  params: []
  description: 'Comma-separated list of distinct values, used for member account ID
    enumeration (KB #83).'
joins:
- target_model: contentbehavior
  join_pairs:
  - - macntref
    - cntref
  join_type: left
- target_model: securitydetection
  join_pairs:
  - - masedetref
    - secdetkey
  join_type: left
filters: []
description: Moderation actions and review records. Hosts most KB composite scores
  (CAS, BBI, SRS, PCI, CAS-coordinated, MPS, TEI, NMI, ETS, CBR, ABS, ARS, BAS, NIC,
  NMI etc.) because it joins to both securitydetection (reaching technicalinfo + securitydetection
  JSON scores) and contentbehavior (reaching messaginganalysis + sessionbehavior +
  profile + account). Each row is one moderation-action; KB metrics are per-account,
  so queries group by contentbehavior.sessionbehavior.profile.account.accindex.
hidden: false
