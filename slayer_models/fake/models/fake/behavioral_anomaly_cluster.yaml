description: "Behavioral Anomaly Cluster (KB #47): cluster where avg_bas > 0.8 AND\
  \ contains a Bot Network condition (avg_bbi > 0.7 AND max_clustsize > 10). Apply\
  \ all three at query time.\n\n[kb=47]\nA cluster where average BAS > 0.8 and contains\
  \ at least one Bot Network \u2014 Identifies groups showing unusual behavior patterns.\n\
  [/kb=47]"
