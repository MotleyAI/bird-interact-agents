description: "Cross-Platform Threat (KB #46): an account that is a High-Risk Account\
  \ (KB #10; is_hra = 1) AND has cpri_v > 0.9 AND is part of a Sockpuppet Network\
  \ cluster (cluster_in_sockpuppet = 1, i.e. \u22651 cluster member is a Sockpuppet\
  \ member).\n\n[kb=46]\nA High-Risk Account with CPRI > 0.9 and is part of a Sockpuppet\
  \ Network \u2014 Identifies threats operating across multiple platforms.\n[/kb=46]"
