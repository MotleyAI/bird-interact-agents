- version: 3
  source_model: account_scores
  measures:
  - formula: cms_v:min
    name: min_cms
  - formula: cas_coord_v:avg
    name: avg_cas_coord
  - formula: linkacctnum_v:max
    name: max_linkacctnum
  - formula: is_sockpuppet:min
    name: all_sockpuppet
  - formula: '*:count'
