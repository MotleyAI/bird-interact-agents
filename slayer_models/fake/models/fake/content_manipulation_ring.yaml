version: 5
name: content_manipulation_ring
source_queries:
- version: 3
  name: account_scores
  source_model: moderationaction
  measures:
  - formula: cms:avg
    name: cms_v
  - formula: cas_coordinated:avg
    name: cas_coord_v
  - formula: linkacctnum:max
    name: linkacctnum_v
  - formula: is_sockpuppet_member:max
    name: is_sockpuppet
  dimensions:
  - name: account_id
