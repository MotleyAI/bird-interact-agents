description: "Content Manipulation Ring (KB #44): a Sockpuppet Network (KB #14) where\
  \ all accounts have CMS > 0.7. Filter: all_sockpuppet = 1 (every member is a Sockpuppet\
  \ member, i.e. linkacctnum > 5 AND CAS_coord > 0.8 per row) AND min_cms > 0.7 (every\
  \ account in the cluster has CMS > 0.7).\n\n[kb=44]\nA Sockpuppet Network where\
  \ all accounts have CMS > 0.7 \u2014 Identifies coordinated content manipulation\
  \ groups.\n[/kb=44]"
