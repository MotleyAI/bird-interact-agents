description: "Automated Spam Network (KB #45): a Bot Network (KB #11; avg_bbi > 0.7\
  \ AND max_clustsize > 10) where avg_abs > 0.8 AND all_content_farm = 1 (every cluster\
  \ member is a Content Farm: CMS > 0.7 AND postfreq > 50).\n\n[kb=45]\nA Bot Network\
  \ where average ABS > 0.8 and all accounts are Content Farms \u2014 Identifies automated\
  \ spam distribution networks.\n[/kb=45]"
