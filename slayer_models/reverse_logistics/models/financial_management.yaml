version: 3
name: financial_management
sql_table: financial_management
query_variables: {}
data_source: reverse_logistics
columns:
- name: creditref
  sql: creditref
  type: string
  primary_key: true
  hidden: false
- name: casetag
  sql: casetag
  type: string
  primary_key: false
  hidden: false
- name: dispcost
  sql: dispcost
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: cost_breakdown
  sql: cost_breakdown
  type: string
  primary_key: false
  hidden: false
- name: restocking_fee
  sql: CAST(json_extract(cost_breakdown, '$.fees.restocking_fee') AS REAL)
  type: number
  primary_key: false
  description: 'Restocking Fee (R_f): service charge for reintegrating a returned
    item into inventory.'
  hidden: false
  meta:
    kb_id: 11
- name: relabeling_cost
  sql: CAST(json_extract(cost_breakdown, '$.fees.relabeling_cost') AS REAL)
  type: number
  primary_key: false
  description: 'Relabeling Cost (L_c): expense of printing/applying new labels or
    packaging identifiers.'
  hidden: false
  meta:
    kb_id: 12
- name: disposal_cost
  sql: CAST(json_extract(cost_breakdown, '$.disposal.disposal_cost') AS REAL)
  type: number
  primary_key: false
  description: 'Disposal Cost (D_c): fee incurred when discarding a returned item
    that cannot be resold or refurbished.'
  hidden: false
  meta:
    kb_id: 13
- name: repair_estimate
  sql: CAST(json_extract(cost_breakdown, '$.repair_costs.repair_estimate') AS REAL)
  type: number
  primary_key: false
  description: 'Repair Estimate (R_e): projected expense required to bring a defective
    return back to sellable condition.'
  hidden: false
  meta:
    kb_id: 14
- name: recovery_value
  sql: CAST(json_extract(cost_breakdown, '$.valuation.recovery_value') AS REAL)
  type: number
  primary_key: false
  description: 'Recovery Value (R_v): amount of monetary value recaptured from a return
    via resale, refurbish, or parts harvesting.'
  hidden: false
  meta:
    kb_id: 15
- name: carbon_footprint
  sql: CAST(json_extract(cost_breakdown, '$.sustainability.carbon_footprint') AS REAL)
  type: number
  primary_key: false
  description: 'Carbon Footprint (C_f): estimated kilograms of CO2-equivalent generated
    through return processing activities.'
  hidden: false
  meta:
    kb_id: 19
- name: disposal_method
  sql: TRIM(json_extract(cost_breakdown, '$.disposal.disposal_method'), '"')
  type: string
  primary_key: false
  description: "Disposal Methods \u2014 'Recycle' (recycling streams), 'Hazardous\
    \ Waste' (batteries/chemicals/e-waste), 'Landfill' (non-recyclable residuals),\
    \ 'Return to Vendor' (supplier specialised processing)."
  hidden: false
  meta:
    kb_id: 23
- name: refund_method
  sql: TRIM(json_extract(cost_breakdown, '$.refund.method'), '"')
  type: string
  primary_key: false
  description: "Refund Methods \u2014 'Original Payment' (gateway reversal), 'Bank\
    \ Transfer' (ACH/SEPA when gateway blocked), 'Store Credit' (gift card / voucher)."
  hidden: false
  meta:
    kb_id: 24
- name: total_return_cost
  sql: COALESCE(CAST(json_extract("financial_management".cost_breakdown, '$.fees.restocking_fee')
    AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.relabeling_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.disposal.disposal_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.repair_costs.repair_estimate') AS REAL), 0) + COALESCE(CAST(json_extract(returns.return_details,
    '$.shipping.fee') AS REAL), 0)
  type: number
  primary_key: false
  description: Total Return Cost (TRC) = S_f + R_f + L_c + D_c + R_e. Aggregated monetary
    outlay to handle a single return.
  hidden: false
  meta:
    kb_id: 0
- name: return_profit_impact
  sql: CAST(json_extract("financial_management".cost_breakdown, '$.valuation.recovery_value')
    AS REAL) - (COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.restocking_fee') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.relabeling_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.disposal.disposal_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.repair_costs.repair_estimate') AS REAL), 0) + COALESCE(CAST(json_extract(returns.return_details,
    '$.shipping.fee') AS REAL), 0))
  type: number
  primary_key: false
  description: Return Profit Impact (RPI) = R_v - TRC. Net financial impact of a return
    after accounting for cost and recovery value.
  hidden: false
  meta:
    kb_id: 1
- name: recovery_rate_per_day
  sql: CAST(json_extract("financial_management".cost_breakdown, '$.valuation.recovery_value')
    AS REAL) * 1.0 / NULLIF(returns.dayslapsed, 0)
  type: number
  primary_key: false
  description: 'Recovery Rate per Day (RRD) = R_v / D_l. Daily efficiency: value recovered
    per day elapsed since sale.'
  hidden: false
  meta:
    kb_id: 2
- name: sustainability_adjusted_loss
  sql: (COALESCE(CAST(json_extract("financial_management".cost_breakdown, '$.fees.restocking_fee')
    AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.relabeling_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.disposal.disposal_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.repair_costs.repair_estimate') AS REAL), 0) + COALESCE(CAST(json_extract(returns.return_details,
    '$.shipping.fee') AS REAL), 0)) + 0.5 * CAST(json_extract("financial_management".cost_breakdown,
    '$.sustainability.carbon_footprint') AS REAL) - CAST(json_extract("financial_management".cost_breakdown,
    '$.valuation.recovery_value') AS REAL)
  type: number
  primary_key: false
  description: Sustainability-Adjusted Loss (SAL) = TRC + 0.5 * C_f - R_v. Cost of
    a return adjusted for environmental impact factors.
  hidden: false
  meta:
    kb_id: 4
- name: regulatory_compliance_penalty
  sql: CASE WHEN TRIM(json_extract(returns__rl_products.product_traceability, '$.compliance.regulatory_compliance'),
    '"') = 'Non-compliant' THEN 0.2 * (COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.restocking_fee') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.fees.relabeling_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.disposal.disposal_cost') AS REAL), 0) + COALESCE(CAST(json_extract("financial_management".cost_breakdown,
    '$.repair_costs.repair_estimate') AS REAL), 0) + COALESCE(CAST(json_extract(returns.return_details,
    '$.shipping.fee') AS REAL), 0)) ELSE 0 END
  type: number
  primary_key: false
  description: Regulatory Compliance Penalty (RCP) = 0.2 * TRC if product is Non-compliant
    else 0.
  hidden: false
  meta:
    kb_id: 8
measures: []
aggregations: []
joins:
- target_model: returns
  join_pairs:
  - - casetag
    - casenum
  join_type: left
filters: []
description: Per-return cost / refund / recovery / sustainability breakdown. One row
  per return case (joined to returns via casetag = casenum).
hidden: false
