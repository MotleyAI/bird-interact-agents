version: 3
name: returns
sql_table: returns
query_variables: {}
data_source: reverse_logistics
columns:
- name: casenum
  sql: casenum
  type: string
  primary_key: true
  hidden: false
- name: logtime
  sql: logtime
  type: string
  primary_key: false
  hidden: false
- name: srctxn
  sql: srctxn
  type: string
  primary_key: false
  hidden: false
- name: itemlink
  sql: itemlink
  type: string
  primary_key: false
  hidden: false
- name: revdate
  sql: revdate
  type: string
  primary_key: false
  hidden: false
- name: dayslapsed
  sql: dayslapsed
  type: number
  primary_key: false
  description: 'Days Lapsed: number of calendar days between original transaction
    and completion of return processing.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 16
- name: return_channel
  sql: return_channel
  type: string
  primary_key: false
  description: "Return Channels \u2014 pathway through which the customer sent the\
    \ item back. 'Store' (in-person retail outlet), 'Courier' (doorstep pickup), 'Mail'\
    \ (national post), 'Locker' (automated drop-box), 'Pickup' (retailer-scheduled\
    \ collection for oversized/fragile goods)."
  hidden: false
  meta:
    kb_id: 20
- name: return_details
  sql: return_details
  type: string
  primary_key: false
  hidden: false
- name: shipping_fee
  sql: CAST(json_extract(return_details, '$.shipping.fee') AS REAL)
  type: number
  primary_key: false
  description: 'Shipping Fee (S_f): cost charged by the logistics provider for transporting
    the returned item.'
  hidden: false
  meta:
    kb_id: 10
- name: fraud_flags
  sql: CAST(json_extract(return_details, '$.fraud.fraud_flags') AS INTEGER)
  type: number
  primary_key: false
  description: Number of fraud flags raised on this return (0-5).
  hidden: false
  meta:
    kb_id: 7
- name: fraud_risk_level
  sql: TRIM(json_extract(return_details, '$.fraud.risk_level'), '"')
  type: string
  primary_key: false
  description: "Fraud Risk Level \u2014 qualitative grading of suspected fraud severity.\
    \ 'Low', 'Medium', or 'High'."
  hidden: false
  meta:
    kb_id: 21
- name: fraud_risk_weight
  sql: CASE TRIM(json_extract(return_details, '$.fraud.risk_level'), '"') WHEN 'Low'
    THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END
  type: number
  primary_key: false
  description: "Risk weight for FFS \u2014 Low=1, Medium=2, High=3 (KB does not pin\
    \ exact weights; using ascending-by-severity ordinals)."
  hidden: false
  meta:
    kb_id: 7
- name: fraud_flag_severity_score
  sql: CAST(json_extract(return_details, '$.fraud.fraud_flags') AS INTEGER) * (CASE
    TRIM(json_extract(return_details, '$.fraud.risk_level'), '"') WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE NULL END)
  type: number
  primary_key: false
  description: Fraud Flag Severity Score (FFS) = F_f * w_risk. F_f is fraud_flags;
    w_risk is 1/2/3 for Low/Medium/High.
  hidden: false
  meta:
    kb_id: 7
- name: warranty_status
  sql: TRIM(json_extract(return_details, '$.authorization.warranty_status'), '"')
  type: string
  primary_key: false
  description: "Warranty Status \u2014 'Valid' (within manufacturer/retailer warranty),\
    \ 'Expired' (term lapsed), 'Not Applicable' (no warranty / proof unavailable)."
  hidden: false
  meta:
    kb_id: 27
- name: warranty_claim
  sql: TRIM(json_extract(return_details, '$.authorization.warranty_claim'), '"')
  type: string
  primary_key: false
  description: Warranty claim identifier (NULL if none filed).
  hidden: false
  meta:
    kb_id: 6
- name: has_warranty_claim
  sql: CASE WHEN json_extract(return_details, '$.authorization.warranty_claim') <>
    'null' AND json_extract(return_details, '$.authorization.warranty_claim') IS NOT
    NULL THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: '1 if a warranty claim id was filed for this return, else 0 (KB #6
    N_claims indicator). Workaround: SLayer rewrites json_extract -> ->; we test against
    the JSON literal ''null''.'
  hidden: false
  meta:
    kb_id: 6
measures:
- formula: has_warranty_claim:sum * 1.0 / *:count
  name: warranty_claim_ratio
  description: Warranty Claim Ratio (WCR) = N_claims / T_r. N_claims = returns with
    a non-null warranty claim id; T_r = total returns.
aggregations: []
joins:
- target_model: rl_products
  join_pairs:
  - - itemlink
    - itemcode
  join_type: left
- target_model: rl_orders
  join_pairs:
  - - srctxn
    - txnnum
  join_type: left
filters: []
description: A return case logged for an item, joined to its source order, product,
  and (via children) financial / quality / processing / case detail tables.
hidden: false
