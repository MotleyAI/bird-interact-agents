  description: "Return Channels \u2014 pathway through which the customer sent the\
    \ item back. 'Store' (in-person retail outlet), 'Courier' (doorstep pickup), 'Mail'\
    \ (national post), 'Locker' (automated drop-box), 'Pickup' (retailer-scheduled\
    \ collection for oversized/fragile goods)."
  hidden: false
- name: shipping_fee_avg
  sql: shipping_fee_avg
  type: DOUBLE
  primary_key: false
  description: 'Shipping Fee (S_f): cost charged by the logistics provider for transporting
    the returned item.'
  hidden: false
  format:
    type: float
- name: rcci
  sql: rcci
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
- name: avg_fee_per_channel__channel_avg_fee_avg
  sql: avg_fee_per_channel__channel_avg_fee_avg
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
measures: []
aggregations: []
joins: []
filters: []
description: "Return Channel Cost Index (RCCI) = S_f / mean(S_f for the same Return_Channel).\
  \ Relative shipping expense of a return channel compared to its historical average.\
  \ KB #9.\n\n[kb=9]\n$$RCCI = \\frac{S_f}{\\overline{S_{channel}}}$$ where $S_f$\
  \ is Shipping Fee and $\\overline{S_{channel}}$ is average Shipping Fee for the\
  \ same Return Channel. \u2014 Relative shipping expense of a return channel compared\
  \ to its historical average.\n[/kb=9]"
hidden: false
meta:
  kb_id: 9
