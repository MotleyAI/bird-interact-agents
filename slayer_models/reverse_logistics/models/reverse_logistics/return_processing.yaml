version: 5
name: return_processing
sql_table: return_processing
query_variables: {}
data_source: reverse_logistics
columns:
- name: loccode
  sql: loccode
  type: TEXT
  primary_key: true
  hidden: false
- name: procprio
  sql: procprio
  type: TEXT
  primary_key: false
  description: "Processing Priorities \u2014 'Bulk' (palletised/batch in low-demand\
    \ periods), 'Standard' (default 3-5 day SLA), 'Express' (expedited for VIP/high-value/premium).\n\
    \n[kb=28]\nUse 'Bulk' for palletised or batch returns processed during low-demand\
    \ periods; 'Standard' for default SLA (e.g., 3-5 days); 'Express' for expedited\
    \ for VIP customers, high resale value, or paid premium. \u2014 Queue categories\
    \ dictating speed of return handling.\n[/kb=28]"
  label: Processing Priorities
  hidden: false
  meta:
    kb_id: 28
- name: procstate
  sql: procstate
  type: TEXT
  primary_key: false
  hidden: false
- name: proctime
  sql: proctime
  type: INT
  primary_key: false
  description: "Processing time PT_i (calendar time spent processing this return at\
    \ the facility). Source column for the Average Processing Time (APT) measure (KB\
    \ #5).\n\n[kb=5]\n$$APT = \\frac{\\sum_{i=1}^{n} PT_i}{n}$$ where $PT_i$ is the\
    \ processing time of each case. \u2014 Mean calendar time spent processing a batch\
    \ of returns at a given facility.\n[/kb=5]"
  label: Average Processing Time (APT)
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 5
