columns:
- name: hubregistry
  sql: hubregistry
  type: string
  primary_key: true
  hidden: false
- name: disteventref
  sql: disteventref
  type: string
  primary_key: false
  hidden: false
- name: hubcaptons
  sql: hubcaptons
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: hubutilpct
  sql: hubutilpct
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: storecapm3
  sql: storecapm3
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: storeavailm3
  sql: storeavailm3
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: coldstorecapm3
  sql: coldstorecapm3
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: coldstoretempc
  sql: coldstoretempc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: warehousestate
  sql: warehousestate
  type: string
  primary_key: false
  hidden: false
- name: invaccpct
  sql: invaccpct
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: stockturnrate
  sql: stockturnrate
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: rur
  sql: (hubutilpct / 100.0) * (storecapm3 / (storeavailm3 + 1.0))
  type: number
  primary_key: false
  description: 'Resource Utilization Ratio (RUR, KB #10): (hubutilpct/100) * (storecapm3
    / (storeavailm3+1)).'
  hidden: false
  meta:
    kb_id: 10
- name: rur_classification
  sql: CASE WHEN ((hubutilpct / 100.0) * (storecapm3 / (storeavailm3 + 1.0))) > 5
    THEN 'High Utilization' WHEN ((hubutilpct / 100.0) * (storecapm3 / (storeavailm3
    + 1.0))) >= 2 THEN 'Moderate Utilization' ELSE 'Low Utilization' END
  type: string
  primary_key: false
  description: 'Resource Utilization Classification (KB #50): High Utilization (RUR>5),
    Moderate (2<=RUR<=5), Low (RUR<2).'
  hidden: false
  meta:
    kb_id: 50
- name: available_storage_percentage
  sql: (storeavailm3 * 1.0 / NULLIF(storecapm3, 0)) * 100
  type: number
  primary_key: false
  description: 'Available Storage Percentage (KB #53): (storeavailm3 / storecapm3)
    * 100.'
  hidden: false
  meta:
    kb_id: 53
measures: []
aggregations: []
joins:
- target_model: disasterevents
  join_pairs:
  - - disteventref
    - distregistry
  join_type: left
filters: []
description: Distribution hub per disaster event; 1:1 with disasterevents.
hidden: false
