version: 3
name: financials
sql_table: financials
query_variables: {}
data_source: disaster
columns:
- name: financeregistry
  sql: financeregistry
  type: string
  primary_key: true
  hidden: false
- name: findistref
  sql: findistref
  type: string
  primary_key: false
  hidden: false
- name: finopsref
  sql: finopsref
  type: string
  primary_key: false
  hidden: false
- name: budgetallotusd
  sql: budgetallotusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: fundsutilpct
  sql: fundsutilpct
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: costbeneusd
  sql: costbeneusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: opscostsusd
  sql: opscostsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: transportcostsusd
  sql: transportcostsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: storagecostsusd
  sql: storagecostsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: personnelcostsusd
  sql: personnelcostsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: fundingstate
  sql: fundingstate
  type: string
  primary_key: false
  description: 'Financial-resource condition for operations (KB #4). Adequate = sufficient
    funds; Limited = funding constraints affecting some activities; Critical = severe
    shortages threatening essential operations.'
  hidden: false
  meta:
    kb_id: 4
- name: donorcommitmentsusd
  sql: donorcommitmentsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: resourcegapsusd
  sql: resourcegapsusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: fsr
  sql: (donorcommitmentsusd * 1.0 / NULLIF(budgetallotusd, 0)) * (1 - fundsutilpct
    / 100.0) - (resourcegapsusd * 1.0 / NULLIF(budgetallotusd, 0))
  type: number
  primary_key: false
  description: 'Financial Sustainability Ratio (FSR, KB #18): (donorcommitmentsusd/budgetallotusd)
    * (1 - fundsutilpct/100) - resourcegapsusd/budgetallotusd.'
  hidden: false
  meta:
    kb_id: 18
- name: is_financial_crisis_risk
  sql: fundsutilpct > 80 AND fundingstate = 'Critical' AND ((donorcommitmentsusd *
    1.0 / NULLIF(budgetallotusd, 0)) * (1 - fundsutilpct / 100.0) - (resourcegapsusd
    * 1.0 / NULLIF(budgetallotusd, 0))) < 0.2
  type: boolean
  primary_key: false
  description: 'Financial Crisis Risk (KB #27): fundsutilpct>80 AND fundingstate=''Critical''
    AND FSR<0.2.'
  hidden: false
  meta:
    kb_id: 27
- name: fem
  sql: (beneficiariesandassessments.benefeedbackscore * 1.0 / NULLIF(costbeneusd,
    0)) * ((donorcommitmentsusd * 1.0 / NULLIF(budgetallotusd, 0)) * (1 - fundsutilpct
    / 100.0) - (resourcegapsusd * 1.0 / NULLIF(budgetallotusd, 0))) * (1 + (transportation.deliverysuccessrate
    / 100.0 * (1 - transportation.avgdeliveryhours / 24.0) * (1 + transportation.distributionpoints
    / 10.0)) / 10.0)
  type: number
  primary_key: false
  description: 'Financial Efficiency Metric (FEM, KB #35): (benefeedbackscore/costbeneusd)
    * FSR * (1 + OEI/10).'
  hidden: false
  meta:
    kb_id: 35
measures: []
aggregations: []
joins:
- target_model: disasterevents
  join_pairs:
  - - findistref
    - distregistry
  join_type: left
- target_model: operations
  join_pairs:
  - - finopsref
    - opsregistry
  join_type: left
- target_model: transportation
  join_pairs:
  - - findistref
    - transportdistref
  join_type: left
- target_model: beneficiariesandassessments
  join_pairs:
  - - finopsref
    - beneopsref
  join_type: left
filters: []
description: Financial profile per (disaster, operation); 1:1 with operations.
hidden: false
