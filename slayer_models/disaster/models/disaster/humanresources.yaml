version: 4
name: humanresources
sql_table: humanresources
query_variables: {}
data_source: disaster
columns:
- name: hrregistry
  sql: hrregistry
  type: string
  primary_key: true
  hidden: false
- name: hrdistref
  sql: hrdistref
  type: string
  primary_key: false
  hidden: false
- name: hropsref
  sql: hropsref
  type: string
  primary_key: false
  hidden: false
- name: staffingprofile
  sql: staffingprofile
  type: string
  primary_key: false
  description: "JSON consolidating personnel counts and readiness. Sub-fields: personnel.{total,medical,security,logistics,volunteers},\
    \ readiness.{ppe_status (KB #8), comm_equipment, training_status, availability_percent}.\n\
    \n[kb=8]\nAdequate means sufficient PPE available for all personnel, Limited indicates\
    \ restrictions in PPE distribution requiring prioritization, and Critical represents\
    \ severe shortages threatening staff safety and operational continuity \u2014\
    \ Illustrates the availability of Personal Protective Equipment\n[/kb=8]"
  label: staffingProfile.readiness.ppe_status
  hidden: false
  meta:
    kb_id: 8
- name: personnel_total
  sql: CAST(staffingprofile ->> '$.personnel.total' AS INTEGER)
  type: number
  primary_key: false
  description: Total staff (parsed from staffingprofile.personnel.total).
  hidden: false
- name: personnel_medical
  sql: CAST(staffingprofile ->> '$.personnel.medical' AS INTEGER)
  type: number
  primary_key: false
  description: Medical personnel count.
  hidden: false
- name: personnel_security
  sql: CAST(staffingprofile ->> '$.personnel.security' AS INTEGER)
  type: number
  primary_key: false
  description: Security personnel count.
  hidden: false
- name: personnel_logistics
  sql: CAST(staffingprofile ->> '$.personnel.logistics' AS INTEGER)
  type: number
  primary_key: false
  description: Logistics personnel count.
  hidden: false
- name: personnel_volunteers
  sql: CAST(staffingprofile ->> '$.personnel.volunteers' AS INTEGER)
  type: number
  primary_key: false
  description: Volunteer count.
  hidden: false
- name: ppe_status
  sql: staffingprofile ->> '$.readiness.ppe_status'
  type: string
  primary_key: false
  description: 'Personal Protective Equipment availability (KB #8). Adequate / Limited
    / Critical.'
  hidden: false
- name: ppe_factor
  sql: CASE staffingprofile ->> '$.readiness.ppe_status' WHEN 'Adequate' THEN 1.2
    WHEN 'Limited' THEN 0.8 WHEN 'Critical' THEN 0.5 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric factor used by KB #34 (SNR): Adequate=1.2, Limited=0.8, Critical=0.5,
    else=0.'
  hidden: false
- name: availability_percent
  sql: CAST(staffingprofile ->> '$.readiness.availability_percent' AS REAL)
  type: number
  primary_key: false
  description: Staff availability percentage.
  hidden: false
- name: training_status
  sql: staffingprofile ->> '$.readiness.training_status'
  type: string
  primary_key: false
  description: 'Training progress: Complete / In Progress / Required.'
  hidden: false
- name: comm_equipment
  sql: staffingprofile ->> '$.readiness.comm_equipment'
  type: string
  primary_key: false
  description: 'Communication gear availability: Sufficient / Insufficient / Limited.'
  hidden: false
- name: per
  sql: (CAST(staffingprofile ->> '$.personnel.total' AS INTEGER) * 1.0 / NULLIF(financials.personnelcostsusd
    / 10000.0, 0)) * (CAST(staffingprofile ->> '$.readiness.availability_percent'
    AS REAL) / 100.0)
  type: number
  primary_key: false
  description: "Personnel Effectiveness Ratio (PER, KB #13): (staffingprofile.personnel.total\
    \ / (personnelcostsusd/10000)) * (staffingprofile.readiness.availability_percent/100).\n\
    \n[kb=13]\nPER = \\frac{staffingprofile->>'personnel'->>'total'}{(personnelcostsusd\
    \ / 10000)} \\times \\frac{staffingprofile->>'readiness'->>'availability_percent'}{100}\
    \ \u2014 Evaluates how effectively human resources are utilized in operations\n\
    [/kb=13]"
  label: Personnel Effectiveness Ratio (PER)
  hidden: false
  meta:
    kb_id: 13
- name: snr
  sql: (CAST(staffingprofile ->> '$.personnel.total' AS INTEGER) * 1.0 / NULLIF(CAST(disasterevents.impactmetrics
    ->> '$.population.affected' AS INTEGER) / 10000.0, 0)) * ((CAST(staffingprofile
    ->> '$.personnel.total' AS INTEGER) * 1.0 / NULLIF(financials.personnelcostsusd
    / 10000.0, 0)) * (CAST(staffingprofile ->> '$.readiness.availability_percent'
    AS REAL) / 100.0)) * (CASE staffingprofile ->> '$.readiness.ppe_status' WHEN 'Adequate'
    THEN 1.2 WHEN 'Limited' THEN 0.8 WHEN 'Critical' THEN 0.5 ELSE 0 END)
  type: number
  primary_key: false
  description: "Staffing to Need Ratio (SNR, KB #34): (staffingprofile.personnel.total\
    \ / (impactMetrics.population.affected/10000)) * PER * ppe_factor.\n\n[kb=34]\n\
    SNR = \\frac{staffingprofile->>'personnel'->>'total'}{(impactMetrics->>'population'->>'affected'/10000)}\
    \ \\times PER \\times ppe\\_factor, \\text{ where ppe\\_factor is 1.2 for Adequate,\
    \ 0.8 for Limited, 0.5 for Critical PPE status, and 0 for else} \u2014 Evaluates\
    \ whether staffing levels match operational requirements\n[/kb=34]"
  label: Staffing to Need Ratio (SNR)
  hidden: false
  meta:
    kb_id: 34
measures: []
aggregations: []
joins:
- target_model: disasterevents
  join_pairs:
  - - hrdistref
    - distregistry
  join_type: left
- target_model: operations
  join_pairs:
  - - hropsref
    - opsregistry
  join_type: left
- target_model: financials
  join_pairs:
  - - hropsref
    - finopsref
  join_type: left
filters: []
description: Staffing profile per (disaster, operation); 1:1 with operations.
hidden: false
