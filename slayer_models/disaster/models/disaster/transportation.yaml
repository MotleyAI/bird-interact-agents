- name: lastmilestatus
  sql: lastmilestatus
  type: TEXT
  primary_key: false
  description: "Last-mile delivery state (KB #3). On Track = proceeding as scheduled;\
    \ Delayed = non-critical setbacks; Suspended = temporarily halted due to severe\
    \ constraints.\n\n[kb=3]\nOn Track indicates deliveries proceeding as scheduled,\
    \ Delayed shows deliveries facing non-critical setbacks, and Suspended means deliveries\
    \ have temporarily halted due to severe constraints \u2014 Illustrates the state\
    \ of final delivery operations to affected populations\n[/kb=3]"
  label: lastmilestatus
  hidden: false
  meta:
    kb_id: 3
- name: distributionpoints
  sql: distributionpoints
  type: INT
  primary_key: false
  hidden: false
  format:
    type: integer
