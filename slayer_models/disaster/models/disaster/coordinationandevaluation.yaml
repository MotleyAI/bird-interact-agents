- name: coordeffectlvl
  sql: coordeffectlvl
  type: string
  primary_key: false
  description: "Coordination effectiveness between agencies (KB #9). High = seamless\
    \ integration; Medium = adequate with occasional gaps; Low = significant problems\
    \ hindering response.\n\n[kb=9]\nHigh indicates seamless integration and information\
    \ sharing across agencies, Medium represents adequate coordination with occasional\
    \ communication gaps, and Low indicates significant coordination problems hindering\
    \ effective response \u2014 Illustrates the quality of coordination between responding\
    \ agencies\n[/kb=9]"
  label: coordeffectlvl
