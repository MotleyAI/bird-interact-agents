- name: coordeffect_numeric
  sql: CASE coordeffectlvl WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN
    3 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of coordeffectlvl used by KB #39 (CACI) and KB #31
    (RDE): Low=1, Medium=2, High=3, else=0.'
  hidden: false
- name: coordeffect_factor
  sql: CASE coordeffectlvl WHEN 'High' THEN 1.2 WHEN 'Medium' THEN 1.0 WHEN 'Low'
    THEN 0.8 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric factor used by KB #31 (RDE): High=1.2, Medium=1.0, Low=0.8,
    else=0.'
  hidden: false
- name: infosharing_numeric
  sql: CASE infosharingstate WHEN 'Poor' THEN 1 WHEN 'Limited' THEN 2 WHEN 'Effective'
    THEN 3 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of infosharingstate used by KB #39 (CACI): Poor=1,
    Limited=2, Effective=3, else=0.'
  hidden: false
- name: partnerorgs_count
  sql: CAST(partnerorgs AS INTEGER)
  type: number
  primary_key: false
  description: 'Numeric value of partnerorgs (the column is TEXT in schema but rows
    hold integer counts; KB #14 and KB #39 use it as an integer).'
  hidden: false
- name: csr
  sql: secincidentcount * 5 + (100 - reportcompliance) + 90 - (dataqualityvalue *
    3)
  type: number
  primary_key: false
  description: "Communication Security Risk (CSR, KB #12): secincidentcount*5 + (100\
    \ - reportcompliance) + 90 - (dataqualityvalue*3).\n\n[kb=12]\nCSR = secincidentcount\
    \ \\times 5 + (100 - reportcompliance) + 90 - (dataqualityvalue \\times 3) \u2014\
    \ Measures the security risk associated with communication systems during disaster\
    \ response\n[/kb=12]"
  label: Communication Security Risk (CSR)
  hidden: false
  meta:
    kb_id: 12
- name: crf
  sql: 100 - ((secincidentcount * 5 + (100 - reportcompliance) + 90 - (dataqualityvalue
    * 3)) / 2.0) * (CASE disasterevents.impactmetrics ->> '$.communication' WHEN 'Operational'
    THEN 1.0 WHEN 'Limited' THEN 0.6 WHEN 'Down' THEN 0.3 ELSE 0 END)
  type: number
  primary_key: false
  description: "Communication Resilience Factor (CRF, KB #32): 100 - (CSR/2) * communication_factor\
    \ (Operational=1.0, Limited=0.6, Down=0.3).\n\n[kb=32]\nCRF = 100 - \\frac{CSR}{2}\
    \ \\times communication\\_factor, \\text{ where communication\\_factor is 1.0\
    \ for Operational, 0.6 for Limited, and 0.3 for Down communication status from\
    \ impactMetrics.communication} \u2014 Measures the resilience of communication\
    \ systems during disasters\n[/kb=32]"
  label: Communication Resilience Factor (CRF)
  hidden: false
  meta:
    kb_id: 32
- name: caci
  sql: (CAST(partnerorgs AS INTEGER) / 10.0) * (CASE coordeffectlvl WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE 0 END) * ((CASE infosharingstate
    WHEN 'Poor' THEN 1 WHEN 'Limited' THEN 2 WHEN 'Effective' THEN 3 ELSE 0 END +
    1) / 3.0)
  type: number
  primary_key: false
  description: "Cross-Agency Coordination Index (CACI, KB #39): (partnerorgs/10) *\
    \ coordeffect_numeric * ((infosharing_numeric+1)/3).\n\n[kb=39]\nCACI = \\frac{partnerorgs}{10}\
    \ \\times coordeffect\\_numeric \\times \\left(\\frac{infosharing\\_numeric +\
    \ 1}{3}\\right), \\text{ where coordeffect\\_numeric maps Low=1, Medium=2, High=3,\
    \ else=0 and infosharing\\_numeric maps Poor=1, Limited=2, Effective=3, else=0}\
    \ \u2014 Quantifies how effectively multiple agencies coordinate during disaster\
    \ response\n[/kb=39]"
  label: Cross-Agency Coordination Index (CACI)
  hidden: false
  meta:
    kb_id: 39
- name: is_high_impact_comm_failure
  sql: (disasterevents.impactmetrics ->> '$.communication') = 'Down' AND (100 - ((secincidentcount
    * 5 + (100 - reportcompliance) + 90 - (dataqualityvalue * 3)) / 2.0) * (CASE disasterevents.impactmetrics
    ->> '$.communication' WHEN 'Operational' THEN 1.0 WHEN 'Limited' THEN 0.6 WHEN
    'Down' THEN 0.3 ELSE 0 END)) < 40 AND coordeffectlvl = 'Low'
  type: boolean
  primary_key: false
  description: "High-Impact Communication Failure (KB #41): impactMetrics.communication='Down'\
    \ AND CRF<40 AND coordeffectlvl='Low'.\n\n[kb=41]\nAreas where impactMetrics.communication\
    \ is 'Down' AND CRF < 40 AND coordeffectlvl is 'Low', representing critical communication\
    \ failures that severely impede response coordination \u2014 Identifies disaster\
    \ areas with severe communication infrastructure breakdown\n[/kb=41]"
  label: High-Impact Communication Failure
  hidden: false
  meta:
    kb_id: 41
- name: is_cross_agency_coordination_crisis
  sql: ((CAST(partnerorgs AS INTEGER) / 10.0) * (CASE coordeffectlvl WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 ELSE 0 END) * ((CASE infosharingstate
    WHEN 'Poor' THEN 1 WHEN 'Limited' THEN 2 WHEN 'Effective' THEN 3 ELSE 0 END +
    1) / 3.0)) < 1.5 AND secincidentcount > 40 AND operations.emerglevel = 'Black'
  type: boolean
  primary_key: false
  description: "Cross-Agency Coordination Crisis (KB #47): CACI<1.5 AND secincidentcount>40\
    \ AND emerglevel='Black'.\n\n[kb=47]\nSituations where CACI < 1.5 AND secincidentcount\
    \ > 40 AND emerglevel is 'Black', indicating dangerous breakdowns in inter-agency\
    \ coordination during critical emergency situations \u2014 Identifies critical\
    \ failures in multi-agency coordination\n[/kb=47]"
  label: Cross-Agency Coordination Crisis
  hidden: false
  meta:
    kb_id: 47
