  join_pairs:
  - - envdistref
    - transportdistref
  join_type: left
- target_model: humanresources
  join_pairs:
  - - envdistref
    - hrdistref
  join_type: left
filters: []
description: Environmental and health profile per disaster event; 1:1 with disasterevents.
hidden: false
