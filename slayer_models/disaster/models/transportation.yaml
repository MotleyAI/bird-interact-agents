- name: dailydeliverytons
  sql: dailydeliverytons
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: lastmilestatus
  sql: lastmilestatus
  type: string
  primary_key: false
  description: 'Last-mile delivery state (KB #3). On Track = proceeding as scheduled;
    Delayed = non-critical setbacks; Suspended = temporarily halted due to severe
    constraints.'
  hidden: false
  meta:
    kb_id: 3
- name: distributionpoints
  sql: distributionpoints
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: avgdeliveryhours
  sql: avgdeliveryhours
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: deliverysuccessrate
  sql: deliverysuccessrate
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: routeoptstatus
  sql: routeoptstatus
  type: string
  primary_key: false
  hidden: false
- name: fuelefficiencylpk
  sql: fuelefficiencylpk
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: maintenancestate
  sql: maintenancestate
  type: string
  primary_key: false
  hidden: false
- name: vehiclebreakrate
  sql: vehiclebreakrate
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: lastmile_factor
  sql: CASE lastmilestatus WHEN 'On Track' THEN 1.0 WHEN 'Delayed' THEN 0.7 WHEN 'Suspended'
    THEN 0.4 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric factor used by KB #36 (LNR): On Track=1.0, Delayed=0.7, Suspended=0.4,
    else=0.'
  hidden: false
- name: oei
  sql: (deliverysuccessrate / 100.0) * (1 - avgdeliveryhours / 24.0) * (1 + distributionpoints
    / 10.0)
  type: number
  primary_key: false
  description: 'Operational Efficiency Index (OEI, KB #11): (deliverysuccessrate/100)
    * (1 - avgdeliveryhours/24) * (1 + distributionpoints/10).'
  hidden: false
  meta:
    kb_id: 11
- name: lpm
  sql: (totaldeliverytons * 1.0 / NULLIF(distributionhubs.hubcaptons, 0)) * deliverysuccessrate
    * (1 - vehiclebreakrate / 100.0) * 100
  type: number
  primary_key: false
  description: 'Logistics Performance Metric (LPM, KB #15): (totaldeliverytons/distributionhubs.hubcaptons)
    * deliverysuccessrate * (1 - vehiclebreakrate/100) * 100.'
  hidden: false
  meta:
    kb_id: 15
- name: lnr
  sql: ((totaldeliverytons * 1.0 / NULLIF(distributionhubs.hubcaptons, 0)) * deliverysuccessrate
    * (1 - vehiclebreakrate / 100.0) * 100) * (vehiclecount / 20.0) * (CASE lastmilestatus
    WHEN 'On Track' THEN 1.0 WHEN 'Delayed' THEN 0.7 WHEN 'Suspended' THEN 0.4 ELSE
    0 END)
  type: number
  primary_key: false
  description: 'Logistics Network Resilience (LNR, KB #36): LPM * (vehiclecount/20)
    * lastmile_factor.'
  hidden: false
  meta:
    kb_id: 36
- name: is_logistics_breakdown
  sql: ((totaldeliverytons * 1.0 / NULLIF(distributionhubs.hubcaptons, 0)) * deliverysuccessrate
    * (1 - vehiclebreakrate / 100.0) * 100) < 30 AND lastmilestatus = 'Suspended'
    AND vehiclebreakrate > 15
  type: boolean
  primary_key: false
  description: 'Logistics Breakdown (KB #29): LPM<30 AND lastmilestatus=''Suspended''
    AND vehiclebreakrate>15.'
  hidden: false
  meta:
    kb_id: 29
- name: is_logistics_collapse_risk
  sql: ((totaldeliverytons * 1.0 / NULLIF(distributionhubs.hubcaptons, 0)) * deliverysuccessrate
    * (1 - vehiclebreakrate / 100.0) * 100) < 30 AND lastmilestatus = 'Suspended'
    AND vehiclebreakrate > 15 AND (((totaldeliverytons * 1.0 / NULLIF(distributionhubs.hubcaptons,
    0)) * deliverysuccessrate * (1 - vehiclebreakrate / 100.0) * 100) * (vehiclecount
    / 20.0) * (CASE lastmilestatus WHEN 'On Track' THEN 1.0 WHEN 'Delayed' THEN 0.7
    WHEN 'Suspended' THEN 0.4 ELSE 0 END)) < 20 AND vehiclebreakrate > 25
  type: boolean
  primary_key: false
  description: 'Logistics System Collapse Risk (KB #45): is_logistics_breakdown AND
    LNR<20 AND vehiclebreakrate>25.'
  hidden: false
  meta:
    kb_id: 45
measures: []
aggregations: []
joins:
- target_model: supplies
  join_pairs:
  - - transportsupref
    - supplyregistry
  join_type: left
- target_model: disasterevents
  join_pairs:
  - - transportdistref
    - distregistry
  join_type: left
- target_model: distributionhubs
  join_pairs:
  - - transporthubref
    - hubregistry
  join_type: left
filters: []
description: Transportation/logistics record per (disaster, hub, supply); 1:1 with
  operations through the shared distregistry.
hidden: false
