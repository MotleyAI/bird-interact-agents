  primary_key: false
  hidden: false
- name: transporthubref
  sql: transporthubref
  type: string
  primary_key: false
  hidden: false
- name: transportsupref
  sql: transportsupref
  type: string
  primary_key: false
  hidden: false
- name: vehiclecount
  sql: vehiclecount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: trucksavailable
  sql: trucksavailable
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: helosavailable
  sql: helosavailable
  type: number
  primary_key: false
  hidden: false
  format:
