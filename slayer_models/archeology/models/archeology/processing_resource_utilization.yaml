description: "Processing Resource Utilization (PRU, KB #37): (FlowHrs * (ProcCPU +\
  \ ProcGPU)/2) / (GBSize * 10 * log10(FacetVerts + 10^4)). Lower = more efficient\
  \ resource use. Multistage anchored at scans, joining scanprocessing (per zoneref)\
  \ and scanmesh (per zoneref).\n\n[kb=37]\nPRU = \\frac{FlowHrs \\times (ProcCPU\
  \ + ProcGPU) / 2}{GBSize \\times 10 \\times \\log_{10}(FacetVerts + 10^4)}, \\text{\
  \ where lower values indicate more efficient use of computing resources relative\
  \ to mesh complexity.} \u2014 Measures the efficiency of computing resource utilization\
  \ during scan processing relative to data complexity.\n[/kb=37]"
