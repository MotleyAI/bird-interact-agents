version: 5
name: full_archaeological_digital_twin
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: sqs:avg
    name: sqs
  - formula: sce:avg
    name: sce
  - formula: noisedb:avg
    name: noisedb
  - formula: is_premium_quality_scan:max
    name: is_premium
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: mesh_per_zone
  source_model: scanmesh
  measures:
  - formula: mfs:avg
    name: mfs
  - formula: is_high_fidelity_mesh:max
    name: is_hifi
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: reg_per_arcref
  source_model: scanregistration
  measures:
  - formula: is_registration_quality_threshold_met:max
    name: is_reg_quality
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: pc_per_arcref
      join_pairs:
      - - arcref
        - arcref
    - target_model: mesh_per_zone
      join_pairs:
      - - zoneref
        - zoneref
    - target_model: reg_per_arcref
      join_pairs:
      - - arcref
        - arcref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: sqs
    model: pc_per_arcref
  - name: sce
    model: pc_per_arcref
  - name: noisedb
    model: pc_per_arcref
  - name: is_premium
    model: pc_per_arcref
  - name: mfs
    model: mesh_per_zone
  - name: is_hifi
    model: mesh_per_zone
  - name: is_reg_quality
    model: reg_per_arcref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: adc
      type: DOUBLE
      sql: pc_per_arcref__sqs * 0.4 + mesh_per_zone__mfs * 0.4 + pc_per_arcref__sce
        * 0.2 - 5 * sqrt(pc_per_arcref__noisedb / 10.0)
    - name: is_full_archaeological_digital_twin
      type: BOOLEAN
      sql: CASE WHEN pc_per_arcref__is_premium = 1 AND mesh_per_zone__is_hifi = 1
        AND reg_per_arcref__is_reg_quality = 1 AND (pc_per_arcref__sqs * 0.4 + mesh_per_zone__mfs
        * 0.4 + pc_per_arcref__sce * 0.2 - 5 * sqrt(pc_per_arcref__noisedb / 10.0))
        > 85 THEN 1 ELSE 0 END
  measures:
  - formula: adc:avg
    name: adc
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: is_full_archaeological_digital_twin
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.is_full_archaeological_digital_twin\"\
  \ AS is_full_archaeological_digital_twin, \"scans_keyed.adc\" AS adc FROM (SELECT\n\
  \  scans_keyed.questregistry AS \"scans_keyed.questregistry\",\n  scans_keyed.arcref\
  \ AS \"scans_keyed.arcref\",\n  scans_keyed.zoneref AS \"scans_keyed.zoneref\",\n\
  \  CASE\n    WHEN scans_keyed.pc_per_arcref__is_premium = 1\n    AND scans_keyed.mesh_per_zone__is_hifi\
  \ = 1\n    AND scans_keyed.reg_per_arcref__is_reg_quality = 1\n    AND (\n     \
  \ scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs * 0.4 +\
  \ scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n    ) > 85\n    THEN 1\n    ELSE 0\n  END AS \"scans_keyed.is_full_archaeological_digital_twin\"\
  ,\n  AVG(\n    scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs\
  \ * 0.4 + scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n  ) AS \"scans_keyed.adc\"\nFROM (\n  SELECT\n    \"scans.questregistry\"\
  \ AS questregistry,\n    \"scans.arcref\" AS arcref,\n    \"scans.zoneref\" AS zoneref,\n\
  \    \"scans.pc_per_arcref.sqs\" AS pc_per_arcref__sqs,\n    \"scans.pc_per_arcref.sce\"\
  \ AS pc_per_arcref__sce,\n    \"scans.pc_per_arcref.noisedb\" AS pc_per_arcref__noisedb,\n\
  \    \"scans.pc_per_arcref.is_premium\" AS pc_per_arcref__is_premium,\n    \"scans.mesh_per_zone.mfs\"\
  \ AS mesh_per_zone__mfs,\n    \"scans.mesh_per_zone.is_hifi\" AS mesh_per_zone__is_hifi,\n\
  \    \"scans.reg_per_arcref.is_reg_quality\" AS reg_per_arcref__is_reg_quality\n\
  \  FROM (\n    SELECT\n      scans.questregistry AS \"scans.questregistry\",\n \
  \     scans.arcref AS \"scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\"\
  ,\n      pc_per_arcref.sqs AS \"scans.pc_per_arcref.sqs\",\n      pc_per_arcref.sce\
  \ AS \"scans.pc_per_arcref.sce\",\n      pc_per_arcref.noisedb AS \"scans.pc_per_arcref.noisedb\"\
  ,\n      pc_per_arcref.is_premium AS \"scans.pc_per_arcref.is_premium\",\n     \
  \ mesh_per_zone.mfs AS \"scans.mesh_per_zone.mfs\",\n      mesh_per_zone.is_hifi\
  \ AS \"scans.mesh_per_zone.is_hifi\",\n      reg_per_arcref.is_reg_quality AS \"\
  scans.reg_per_arcref.is_reg_quality\"\n    FROM scans AS scans\n    LEFT JOIN (\n\
  \      (\n        SELECT\n          \"scanregistration.arcref\" AS arcref,\n   \
  \       \"scanregistration.is_reg_quality\" AS is_reg_quality\n        FROM (\n\
  \          SELECT\n            scanregistration.arcref AS \"scanregistration.arcref\"\
  ,\n            MAX(\n              CASE\n                WHEN scanregistration.logaccumm\
  \ < 1.0 AND scanregistration.errvalmm < 2.0\n                THEN 1\n          \
  \      ELSE 0\n              END\n            ) AS \"scanregistration.is_reg_quality\"\
  \n          FROM scanregistration AS scanregistration\n          GROUP BY\n    \
  \        scanregistration.arcref\n        ) AS _inner\n      )\n    ) AS reg_per_arcref\n\
  \      ON scans.arcref = reg_per_arcref.arcref\n    LEFT JOIN (\n      (\n     \
  \   SELECT\n          \"scanmesh.zoneref\" AS zoneref,\n          \"scanmesh.mfs\"\
  \ AS mfs,\n          \"scanmesh.is_hifi\" AS is_hifi\n        FROM (\n         \
  \ SELECT\n            scanmesh.zoneref AS \"scanmesh.zoneref\",\n            AVG(\n\
  \              (\n                (\n                  scanmesh.facetfaces * 1.0\
  \ / (\n                    scanmesh.facetverts * scanmesh.facetresmm * scanmesh.facetresmm\n\
  \                  )\n                ) * 1000.0\n              ) * (\n        \
  \        (\n                  (\n                    scanmesh.texpix * 1.0 / (\n\
  \                      SQRT(scanmesh.facetfaces) * scanmesh.facetresmm\n       \
  \             )\n                  ) * 0.01\n                ) / 10.0\n        \
  \      ) * (\n                1 + EXP(-scanmesh.geomdeltamm)\n              )\n\
  \            ) AS \"scanmesh.mfs\",\n            MAX(\n              CASE\n    \
  \            WHEN (\n                  (\n                    scanmesh.facetfaces\
  \ * 1.0 / (\n                      scanmesh.facetverts * scanmesh.facetresmm * scanmesh.facetresmm\n\
  \                    )\n                  ) * 1000.0\n                ) > 5.0\n\
  \                AND scanmesh.facetresmm < 1.0\n                AND scanmesh.geomdeltamm\
  \ < 0.5\n                THEN 1\n                ELSE 0\n              END\n   \
  \         ) AS \"scanmesh.is_hifi\"\n          FROM scanmesh AS scanmesh\n     \
  \     GROUP BY\n            scanmesh.zoneref\n        ) AS _inner\n      )\n   \
  \ ) AS mesh_per_zone\n      ON scans.zoneref = mesh_per_zone.zoneref\n    LEFT JOIN\
  \ (\n      (\n        SELECT\n          \"scanpointcloud.arcref\" AS arcref,\n \
  \         \"scanpointcloud.sqs\" AS sqs,\n          \"scanpointcloud.sce\" AS sce,\n\
  \          \"scanpointcloud.noisedb\" AS noisedb,\n          \"scanpointcloud.is_premium\"\
  \ AS is_premium\n        FROM (\n          SELECT\n            scanpointcloud.arcref\
  \ AS \"scanpointcloud.arcref\",\n            AVG(\n              (\n           \
  \     CASE\n                  WHEN (\n                    (\n                  \
  \    LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                    ) * 5.0\n                  ) > 0\n                  THEN POWER(\n\
  \                    10.0 / (\n                      (\n                       \
  \ LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                      ) * 5.0\n                    ),\n                    1.5\n\
  \                  )\n                  ELSE NULL\n                END\n       \
  \       ) * (\n                (\n                  scanpointcloud.coverpct * (\n\
  \                    1 + (\n                      scanpointcloud.lappct / 100.0\n\
  \                    ) * (\n                      1 - scanpointcloud.coverpct /\
  \ 100.0\n                    )\n                  )\n                ) / 100.0\n\
  \              ) * POWER(1 - scanpointcloud.noisedb / 30.0, 2)\n            ) AS\
  \ \"scanpointcloud.sqs\",\n            AVG(\n              scanpointcloud.coverpct\
  \ * (\n                1 + (\n                  scanpointcloud.lappct / 100.0\n\
  \                ) * (\n                  1 - scanpointcloud.coverpct / 100.0\n\
  \                )\n              )\n            ) AS \"scanpointcloud.sce\",\n\
  \            AVG(scanpointcloud.noisedb) AS \"scanpointcloud.noisedb\",\n      \
  \      MAX(\n              CASE\n                WHEN scanpointcloud.scanresolmm\
  \ <= 1.0\n                AND scanpointcloud.pointdense >= 1000\n              \
  \  AND scanpointcloud.coverpct >= 95\n                AND scanpointcloud.lappct\
  \ >= 30\n                AND (\n                  (\n                    CASE\n\
  \                      WHEN (\n                        (\n                     \
  \     LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                        ) * 5.0\n                      ) > 0\n                \
  \      THEN POWER(\n                        10.0 / (\n                         \
  \ (\n                            LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                          ) * 5.0\n                        ),\n               \
  \         1.5\n                      )\n                      ELSE NULL\n      \
  \              END\n                  ) * (\n                    (\n           \
  \           scanpointcloud.coverpct * (\n                        1 + (\n       \
  \                   scanpointcloud.lappct / 100.0\n                        ) * (\n\
  \                          1 - scanpointcloud.coverpct / 100.0\n               \
  \         )\n                      )\n                    ) / 100.0\n          \
  \        ) * POWER(1 - scanpointcloud.noisedb / 30.0, 2)\n                ) > 7.5\n\
  \                THEN 1\n                ELSE 0\n              END\n           \
  \ ) AS \"scanpointcloud.is_premium\"\n          FROM scanpointcloud AS scanpointcloud\n\
  \          GROUP BY\n            scanpointcloud.arcref\n        ) AS _inner\n  \
  \    )\n    ) AS pc_per_arcref\n      ON scans.arcref = pc_per_arcref.arcref\n \
  \ ) AS _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref,\n  CASE\n    WHEN scans_keyed.pc_per_arcref__is_premium\
  \ = 1\n    AND scans_keyed.mesh_per_zone__is_hifi = 1\n    AND scans_keyed.reg_per_arcref__is_reg_quality\
  \ = 1\n    AND (\n      scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs\
  \ * 0.4 + scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n    ) > 85\n    THEN 1\n    ELSE 0\n  END) AS _inner"
