description: "Full Archaeological Digital Twin (KB #19): a site that has Premium Quality\
  \ Scans (KB #12) AND High Fidelity Mesh (KB #13) AND Registration Quality Threshold\
  \ met (KB #18) AND ADC > 85 (KB #9). Multistage anchored at scans, joining all four\
  \ predicates and ADC.\n\n[kb=19]\nA site with Premium Quality Scans, High Fidelity\
  \ Mesh, Registration Quality Threshold met, and ADC > 85, where ADC is Archaeological\
  \ Documentation Completeness, representing a complete digital twin suitable for\
  \ research, conservation, and visualization purposes. \u2014 Defines the comprehensive\
  \ digital representation of an archaeological site meeting all quality standards\
  \ for research and preservation.\n[/kb=19]"
