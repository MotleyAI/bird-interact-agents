description: "Feature Extraction Efficiency (FEE, KB #32): (TraitCount + ArtiCount)\
  \ / (PCDR * sqrt(CloudDense)) * 10^3, where PCDR is the Point Cloud Density Ratio\
  \ (KB #2). Multistage anchored at scans, joining scanfeatures (per zoneref), scanpointcloud\
  \ (per arcref) for CloudDense, and point_cloud_density_ratio (per arcref) for PCDR.\n\
  \n[kb=32]\nFEE = \\frac{TraitCount + ArtiCount}{PCDR \\times \\sqrt{CloudDense}}\
  \ \\times 10^3, \\text{ where PCDR is the Point Cloud Density Ratio and higher values\
  \ indicate more effective feature extraction from point cloud data relative to spatial\
  \ distribution efficiency.} \u2014 Measures the efficiency of feature identification\
  \ in scan data relative to point cloud density and complexity.\n[/kb=32]"
