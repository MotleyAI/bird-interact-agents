version: 5
name: digital_preservation_quality
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: sqs:avg
    name: sqs
  - formula: sce:avg
    name: sce
  - formula: noisedb:avg
    name: noisedb
  - formula: scanresolmm:avg
    name: scanresolmm
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: mesh_per_zone
  source_model: scanmesh
  measures:
  - formula: mfs:avg
    name: mfs
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: reg_per_arcref
  source_model: scanregistration
  measures:
  - formula: logaccumm:avg
    name: logaccumm
  - formula: errvalmm:avg
    name: errvalmm
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: pc_per_arcref
      join_pairs:
      - - arcref
        - arcref
    - target_model: mesh_per_zone
      join_pairs:
      - - zoneref
        - zoneref
    - target_model: reg_per_arcref
      join_pairs:
      - - arcref
        - arcref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: sqs
    model: pc_per_arcref
  - name: sce
    model: pc_per_arcref
  - name: noisedb
    model: pc_per_arcref
  - name: scanresolmm
    model: pc_per_arcref
  - name: mfs
    model: mesh_per_zone
  - name: logaccumm
    model: reg_per_arcref
  - name: errvalmm
    model: reg_per_arcref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: adc
      type: DOUBLE
      sql: pc_per_arcref__sqs * 0.4 + mesh_per_zone__mfs * 0.4 + pc_per_arcref__sce
        * 0.2 - 5 * sqrt(pc_per_arcref__noisedb / 10.0)
    - name: rar
      type: DOUBLE
      sql: pc_per_arcref__scanresolmm / (reg_per_arcref__logaccumm * sqrt(1 + reg_per_arcref__errvalmm
        / reg_per_arcref__logaccumm))
    - name: dpq
      type: DOUBLE
      sql: 0.3 * (pc_per_arcref__sqs * 0.4 + mesh_per_zone__mfs * 0.4 + pc_per_arcref__sce
        * 0.2 - 5 * sqrt(pc_per_arcref__noisedb / 10.0)) + 0.3 * mesh_per_zone__mfs
        + 0.2 * (pc_per_arcref__scanresolmm / (reg_per_arcref__logaccumm * sqrt(1
        + reg_per_arcref__errvalmm / reg_per_arcref__logaccumm))) + 0.2 * pc_per_arcref__sce
        - 2 * sqrt(reg_per_arcref__errvalmm / pc_per_arcref__scanresolmm)
  measures:
  - formula: dpq:avg
    name: dpq
  - formula: adc:avg
    name: adc
  - formula: rar:avg
    name: rar
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.dpq\" AS dpq, \"\
  scans_keyed.adc\" AS adc, \"scans_keyed.rar\" AS rar FROM (SELECT\n  scans_keyed.questregistry\
  \ AS \"scans_keyed.questregistry\",\n  scans_keyed.arcref AS \"scans_keyed.arcref\"\
  ,\n  scans_keyed.zoneref AS \"scans_keyed.zoneref\",\n  AVG(\n    0.3 * (\n    \
  \  scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs * 0.4 +\
  \ scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n    ) + 0.3 * scans_keyed.mesh_per_zone__mfs + 0.2 * (\n      scans_keyed.pc_per_arcref__scanresolmm\
  \ / (\n        scans_keyed.reg_per_arcref__logaccumm * SQRT(1 + scans_keyed.reg_per_arcref__errvalmm\
  \ / scans_keyed.reg_per_arcref__logaccumm)\n      )\n    ) + 0.2 * scans_keyed.pc_per_arcref__sce\
  \ - 2 * SQRT(scans_keyed.reg_per_arcref__errvalmm / scans_keyed.pc_per_arcref__scanresolmm)\n\
  \  ) AS \"scans_keyed.dpq\",\n  AVG(\n    scans_keyed.pc_per_arcref__sqs * 0.4 +\
  \ scans_keyed.mesh_per_zone__mfs * 0.4 + scans_keyed.pc_per_arcref__sce * 0.2 -\
  \ 5 * SQRT(scans_keyed.pc_per_arcref__noisedb / 10.0)\n  ) AS \"scans_keyed.adc\"\
  ,\n  AVG(\n    scans_keyed.pc_per_arcref__scanresolmm / (\n      scans_keyed.reg_per_arcref__logaccumm\
  \ * SQRT(1 + scans_keyed.reg_per_arcref__errvalmm / scans_keyed.reg_per_arcref__logaccumm)\n\
  \    )\n  ) AS \"scans_keyed.rar\"\nFROM (\n  SELECT\n    \"scans.questregistry\"\
  \ AS questregistry,\n    \"scans.arcref\" AS arcref,\n    \"scans.zoneref\" AS zoneref,\n\
  \    \"scans.pc_per_arcref.sqs\" AS pc_per_arcref__sqs,\n    \"scans.pc_per_arcref.sce\"\
  \ AS pc_per_arcref__sce,\n    \"scans.pc_per_arcref.noisedb\" AS pc_per_arcref__noisedb,\n\
  \    \"scans.pc_per_arcref.scanresolmm\" AS pc_per_arcref__scanresolmm,\n    \"\
  scans.mesh_per_zone.mfs\" AS mesh_per_zone__mfs,\n    \"scans.reg_per_arcref.logaccumm\"\
  \ AS reg_per_arcref__logaccumm,\n    \"scans.reg_per_arcref.errvalmm\" AS reg_per_arcref__errvalmm\n\
  \  FROM (\n    SELECT\n      scans.questregistry AS \"scans.questregistry\",\n \
  \     scans.arcref AS \"scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\"\
  ,\n      pc_per_arcref.sqs AS \"scans.pc_per_arcref.sqs\",\n      pc_per_arcref.sce\
  \ AS \"scans.pc_per_arcref.sce\",\n      pc_per_arcref.noisedb AS \"scans.pc_per_arcref.noisedb\"\
  ,\n      pc_per_arcref.scanresolmm AS \"scans.pc_per_arcref.scanresolmm\",\n   \
  \   mesh_per_zone.mfs AS \"scans.mesh_per_zone.mfs\",\n      reg_per_arcref.logaccumm\
  \ AS \"scans.reg_per_arcref.logaccumm\",\n      reg_per_arcref.errvalmm AS \"scans.reg_per_arcref.errvalmm\"\
  \n    FROM scans AS scans\n    LEFT JOIN (\n      (\n        SELECT\n          \"\
  scanregistration.arcref\" AS arcref,\n          \"scanregistration.logaccumm\" AS\
  \ logaccumm,\n          \"scanregistration.errvalmm\" AS errvalmm\n        FROM\
  \ (\n          SELECT\n            scanregistration.arcref AS \"scanregistration.arcref\"\
  ,\n            AVG(scanregistration.logaccumm) AS \"scanregistration.logaccumm\"\
  ,\n            AVG(scanregistration.errvalmm) AS \"scanregistration.errvalmm\"\n\
  \          FROM scanregistration AS scanregistration\n          GROUP BY\n     \
  \       scanregistration.arcref\n        ) AS _inner\n      )\n    ) AS reg_per_arcref\n\
  \      ON scans.arcref = reg_per_arcref.arcref\n    LEFT JOIN (\n      (\n     \
  \   SELECT\n          \"scanmesh.zoneref\" AS zoneref,\n          \"scanmesh.mfs\"\
  \ AS mfs\n        FROM (\n          SELECT\n            scanmesh.zoneref AS \"scanmesh.zoneref\"\
  ,\n            AVG(\n              (\n                (\n                  scanmesh.facetfaces\
  \ * 1.0 / (\n                    scanmesh.facetverts * scanmesh.facetresmm * scanmesh.facetresmm\n\
  \                  )\n                ) * 1000.0\n              ) * (\n        \
  \        (\n                  (\n                    scanmesh.texpix * 1.0 / (\n\
  \                      SQRT(scanmesh.facetfaces) * scanmesh.facetresmm\n       \
  \             )\n                  ) * 0.01\n                ) / 10.0\n        \
  \      ) * (\n                1 + EXP(-scanmesh.geomdeltamm)\n              )\n\
  \            ) AS \"scanmesh.mfs\"\n          FROM scanmesh AS scanmesh\n      \
  \    GROUP BY\n            scanmesh.zoneref\n        ) AS _inner\n      )\n    )\
  \ AS mesh_per_zone\n      ON scans.zoneref = mesh_per_zone.zoneref\n    LEFT JOIN\
  \ (\n      (\n        SELECT\n          \"scanpointcloud.arcref\" AS arcref,\n \
  \         \"scanpointcloud.sqs\" AS sqs,\n          \"scanpointcloud.sce\" AS sce,\n\
  \          \"scanpointcloud.noisedb\" AS noisedb,\n          \"scanpointcloud.scanresolmm\"\
  \ AS scanresolmm\n        FROM (\n          SELECT\n            scanpointcloud.arcref\
  \ AS \"scanpointcloud.arcref\",\n            AVG(\n              (\n           \
  \     CASE\n                  WHEN (\n                    (\n                  \
  \    LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                    ) * 5.0\n                  ) > 0\n                  THEN POWER(\n\
  \                    10.0 / (\n                      (\n                       \
  \ LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                      ) * 5.0\n                    ),\n                    1.5\n\
  \                  )\n                  ELSE NULL\n                END\n       \
  \       ) * (\n                (\n                  scanpointcloud.coverpct * (\n\
  \                    1 + (\n                      scanpointcloud.lappct / 100.0\n\
  \                    ) * (\n                      1 - scanpointcloud.coverpct /\
  \ 100.0\n                    )\n                  )\n                ) / 100.0\n\
  \              ) * POWER(1 - scanpointcloud.noisedb / 30.0, 2)\n            ) AS\
  \ \"scanpointcloud.sqs\",\n            AVG(\n              scanpointcloud.coverpct\
  \ * (\n                1 + (\n                  scanpointcloud.lappct / 100.0\n\
  \                ) * (\n                  1 - scanpointcloud.coverpct / 100.0\n\
  \                )\n              )\n            ) AS \"scanpointcloud.sce\",\n\
  \            AVG(scanpointcloud.noisedb) AS \"scanpointcloud.noisedb\",\n      \
  \      AVG(scanpointcloud.scanresolmm) AS \"scanpointcloud.scanresolmm\"\n     \
  \     FROM scanpointcloud AS scanpointcloud\n          GROUP BY\n            scanpointcloud.arcref\n\
  \        ) AS _inner\n      )\n    ) AS pc_per_arcref\n      ON scans.arcref = pc_per_arcref.arcref\n\
  \  ) AS _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref) AS _inner"
