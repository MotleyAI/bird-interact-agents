description: "Digital Preservation Quality (DPQ, KB #38): 0.3*ADC + 0.3*MFS + 0.2*RAR\
  \ + 0.2*SCE - 2*sqrt(ErrValMm/ScanResolMm). References ADC (KB #9), MFS (KB #6),\
  \ RAR (KB #33), SCE (KB #1). Multistage anchored at scans, joining scanpointcloud\
  \ (per arcref), scanmesh (per zoneref), scanregistration (per arcref), and the ADC/RAR\
  \ query-backed models.\n\n[kb=38]\nDPQ = (0.3 \\times ADC) + (0.3 \\times MFS) +\
  \ (0.2 \\times RAR) + (0.2 \\times SCE) - 2 \\times \\sqrt{\\frac{ErrValMm}{ScanResolMm}},\
  \ \\text{ where ADC is Archaeological Documentation Completeness, MFS is Model Fidelity\
  \ Score, RAR is Registration Accuracy Ratio, and SCE is Scan Coverage Effectiveness.}\
  \ \u2014 Comprehensive metric for evaluating digital preservation quality for archaeological\
  \ sites with weighted quality factors.\n[/kb=38]"
