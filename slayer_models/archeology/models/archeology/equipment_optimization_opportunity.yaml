description: "Equipment Optimization Opportunity (KB #49): EER < 30 AND ESI > 80.\
  \ Indicates potential for improved equipment utilization in favorable conditions.\
  \ Multistage joining EER (KB #39) and ESI (KB #7) at scan grain.\n\n[kb=49]\nScanning\
  \ scenarios where EER < 30 but ESI > 80, where EER is Equipment Effectiveness Ratio\
  \ and ESI is Environmental Suitability Index, indicating potential for improved\
  \ equipment utilization in favorable conditions through calibration adjustment and\
  \ scanning parameter optimization. \u2014 Identifies scenarios where equipment settings\
  \ could be optimized for better results based on performance analysis.\n[/kb=49]"
