version: 6
name: equipment_optimization_opportunity
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: sqs:avg
    name: sqs
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: env_per_zone
  source_model: scanenvironment
  measures:
  - formula: esi:avg
    name: esi
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: scan_with_equip
  source_model:
    source_name: scans
    joins:
    - target_model: pc_per_arcref
      join_pairs:
      - - arcref
        - arcref
    - target_model: env_per_zone
      join_pairs:
      - - zoneref
        - zoneref
    - target_model: scanprocessing
      join_pairs:
      - - zoneref
        - zoneref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: equipref
    model: scanprocessing
  - name: equipstatus_value
    model: scanprocessing.equipment
  - name: equipage_days
    model: scanprocessing.equipment
  - name: powerlevel
    model: scanprocessing.equipment
  - name: sqs
    model: pc_per_arcref
  - name: esi
    model: env_per_zone
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scan_with_equip
    columns:
    - name: eer
      type: DOUBLE
      sql: (pc_per_arcref__sqs * scanprocessing__equipment__equipstatus_value) / (scanprocessing__equipment__powerlevel
        * (101 - scanprocessing__equipment__equipage_days) / 365.0) * 25
    - name: is_equipment_optimization_opportunity
      type: BOOLEAN
      sql: CASE WHEN ((pc_per_arcref__sqs * scanprocessing__equipment__equipstatus_value)
        / (scanprocessing__equipment__powerlevel * (101 - scanprocessing__equipment__equipage_days)
        / 365.0) * 25) < 30 AND env_per_zone__esi > 80 THEN 1 ELSE 0 END
  measures:
  - formula: eer:avg
    name: eer
  - formula: env_per_zone__esi:avg
    name: esi
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: scanprocessing__equipref
  - name: is_equipment_optimization_opportunity
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scan_with_equip.questregistry\" AS questregistry, \"\
  scan_with_equip.arcref\" AS arcref, \"scan_with_equip.zoneref\" AS zoneref, \"scan_with_equip.scanprocessing__equipref\"\
  \ AS scanprocessing__equipref, \"scan_with_equip.is_equipment_optimization_opportunity\"\
  \ AS is_equipment_optimization_opportunity, \"scan_with_equip.eer\" AS eer, \"scan_with_equip.esi\"\
  \ AS esi FROM (SELECT\n  scan_with_equip.questregistry AS \"scan_with_equip.questregistry\"\
  ,\n  scan_with_equip.arcref AS \"scan_with_equip.arcref\",\n  scan_with_equip.zoneref\
  \ AS \"scan_with_equip.zoneref\",\n  scan_with_equip.scanprocessing__equipref AS\
  \ \"scan_with_equip.scanprocessing__equipref\",\n  CASE\n    WHEN (\n      (\n \
  \       scan_with_equip.pc_per_arcref__sqs * scan_with_equip.scanprocessing__equipment__equipstatus_value\n\
  \      ) / (\n        scan_with_equip.scanprocessing__equipment__powerlevel * (\n\
  \          101 - scan_with_equip.scanprocessing__equipment__equipage_days\n    \
  \    ) / 365.0\n      ) * 25\n    ) < 30\n    AND scan_with_equip.env_per_zone__esi\
  \ > 80\n    THEN 1\n    ELSE 0\n  END AS \"scan_with_equip.is_equipment_optimization_opportunity\"\
  ,\n  AVG(\n    (\n      scan_with_equip.pc_per_arcref__sqs * scan_with_equip.scanprocessing__equipment__equipstatus_value\n\
  \    ) / (\n      scan_with_equip.scanprocessing__equipment__powerlevel * (\n  \
  \      101 - scan_with_equip.scanprocessing__equipment__equipage_days\n      ) /\
  \ 365.0\n    ) * 25\n  ) AS \"scan_with_equip.eer\",\n  AVG(scan_with_equip.env_per_zone__esi)\
  \ AS \"scan_with_equip.esi\"\nFROM (\n  SELECT\n    \"scans.questregistry\" AS questregistry,\n\
  \    \"scans.arcref\" AS arcref,\n    \"scans.zoneref\" AS zoneref,\n    \"scans.scanprocessing.equipref\"\
  \ AS scanprocessing__equipref,\n    \"scans.scanprocessing.equipment.equipstatus_value\"\
  \ AS scanprocessing__equipment__equipstatus_value,\n    \"scans.scanprocessing.equipment.equipage_days\"\
  \ AS scanprocessing__equipment__equipage_days,\n    \"scans.scanprocessing.equipment.powerlevel\"\
  \ AS scanprocessing__equipment__powerlevel,\n    \"scans.pc_per_arcref.sqs\" AS\
  \ pc_per_arcref__sqs,\n    \"scans.env_per_zone.esi\" AS env_per_zone__esi\n  FROM\
  \ (\n    SELECT\n      scans.questregistry AS \"scans.questregistry\",\n      scans.arcref\
  \ AS \"scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\",\n      scanprocessing.equipref\
  \ AS \"scans.scanprocessing.equipref\",\n      CASE scanprocessing__equipment.equipstatus\n\
  \        WHEN 'Excellent'\n        THEN 1.0\n        WHEN 'Good'\n        THEN 0.7\n\
  \        WHEN 'Fair'\n        THEN 0.5\n        WHEN 'Poor'\n        THEN 0.2\n\
  \        ELSE NULL\n      END AS \"scans.scanprocessing.equipment.equipstatus_value\"\
  ,\n      JULIANDAY('now') - JULIANDAY(scanprocessing__equipment.equiptune) AS \"\
  scans.scanprocessing.equipment.equipage_days\",\n      scanprocessing__equipment.powerlevel\
  \ AS \"scans.scanprocessing.equipment.powerlevel\",\n      pc_per_arcref.sqs AS\
  \ \"scans.pc_per_arcref.sqs\",\n      env_per_zone.esi AS \"scans.env_per_zone.esi\"\
  \n    FROM scans AS scans\n    LEFT JOIN scanprocessing AS scanprocessing\n    \
  \  ON scans.zoneref = scanprocessing.zoneref\n    LEFT JOIN (\n      (\n       \
  \ SELECT\n          \"scanenvironment.zoneref\" AS zoneref,\n          \"scanenvironment.esi\"\
  \ AS esi\n        FROM (\n          SELECT\n            scanenvironment.zoneref\
  \ AS \"scanenvironment.zoneref\",\n            AVG(\n              100 - 2.5 * ABS(scanenvironment.ambictemp\
  \ - 20) - POWER(ABS((\n                scanenvironment.humepct - 50\n          \
  \    ) / 2.0), 1.5) - 600.0 / (\n                scanenvironment.illumelux + 100\n\
  \              )\n            ) AS \"scanenvironment.esi\"\n          FROM scanenvironment\
  \ AS scanenvironment\n          GROUP BY\n            scanenvironment.zoneref\n\
  \        ) AS _inner\n      )\n    ) AS env_per_zone\n      ON scans.zoneref = env_per_zone.zoneref\n\
  \    LEFT JOIN (\n      (\n        SELECT\n          \"scanpointcloud.arcref\" AS\
  \ arcref,\n          \"scanpointcloud.sqs\" AS sqs\n        FROM (\n          SELECT\n\
  \            scanpointcloud.arcref AS \"scanpointcloud.arcref\",\n            AVG(\n\
  \              (\n                CASE\n                  WHEN (\n             \
  \       (\n                      LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                    ) * 5.0\n                  ) > 0\n                  THEN POWER(\n\
  \                    10.0 / (\n                      (\n                       \
  \ LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                      ) * 5.0\n                    ),\n                    1.5\n\
  \                  )\n                  ELSE NULL\n                END\n       \
  \       ) * (\n                (\n                  scanpointcloud.coverpct * (\n\
  \                    1 + (\n                      scanpointcloud.lappct / 100.0\n\
  \                    ) * (\n                      1 - scanpointcloud.coverpct /\
  \ 100.0\n                    )\n                  )\n                ) / 100.0\n\
  \              ) * POWER(1 - scanpointcloud.noisedb / 30.0, 2)\n            ) AS\
  \ \"scanpointcloud.sqs\"\n          FROM scanpointcloud AS scanpointcloud\n    \
  \      GROUP BY\n            scanpointcloud.arcref\n        ) AS _inner\n      )\n\
  \    ) AS pc_per_arcref\n      ON scans.arcref = pc_per_arcref.arcref\n    LEFT\
  \ JOIN equipment AS scanprocessing__equipment\n      ON scanprocessing.equipref\
  \ = scanprocessing__equipment.equipregistry\n  ) AS _inner\n) AS scan_with_equip\n\
  GROUP BY\n  scan_with_equip.questregistry,\n  scan_with_equip.arcref,\n  scan_with_equip.zoneref,\n\
  \  scan_with_equip.scanprocessing__equipref,\n  CASE\n    WHEN (\n      (\n    \
  \    scan_with_equip.pc_per_arcref__sqs * scan_with_equip.scanprocessing__equipment__equipstatus_value\n\
  \      ) / (\n        scan_with_equip.scanprocessing__equipment__powerlevel * (\n\
  \          101 - scan_with_equip.scanprocessing__equipment__equipage_days\n    \
  \    ) / 365.0\n      ) * 25\n    ) < 30\n    AND scan_with_equip.env_per_zone__esi\
  \ > 80\n    THEN 1\n    ELSE 0\n  END) AS _inner"
