description: "Resource-Intensive Model (KB #47): FacetFaces > 2,000,000 AND MPR <\
  \ 15 (KB #36). Indicates 3D models requiring substantial computing resources. Multistage\
  \ extending mesh_to_point_ratio.\n\n[kb=47]\nA model with FacetFaces > 2,000,000\
  \ and MPR < 15, where MPR is Mesh-to-Point Ratio, requiring specialized hardware\
  \ for effective interaction and analytical software optimized for large-scale geometric\
  \ processing with hierarchical level-of-detail implementation. \u2014 Identifies\
  \ 3D models requiring substantial computing resources for visualization and analysis\
  \ based on complexity metrics.\n[/kb=47]"
