description: "Processing Efficiency Ratio (PER, KB #8): (GBSize * log10(TotalPts))\
  \ / (FlowHrs * (ProcCPU + ProcGPU)/200). Higher = more efficient processing. Multistage\
  \ anchored at scans, joining scanpointcloud (per arcref) for TotalPts and scanprocessing\
  \ (per zoneref) for FlowHrs/ProcCPU/ProcGPU.\n\n[kb=8]\nPER = \\frac{GBSize \\times\
  \ \\log_{10}(TotalPts)}{FlowHrs \\times (ProcCPU + ProcGPU)/200}, \\text{ where\
  \ higher values indicate more efficient processing relative to data complexity.}\
  \ \u2014 Measures the efficiency of scan processing by comparing processing time\
  \ to data complexity and size.\n[/kb=8]"
