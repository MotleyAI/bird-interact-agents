- target_model: projects
  join_pairs:
  - - arcref
    - arcregistry
  join_type: left
- target_model: sites
  join_pairs:
  - - zoneref
    - zoneregistry
  join_type: left
filters: []
description: 'Per-project conservation assessments. Hosts the Degradation Risk Zone
  predicate (KB #14), Risk Zone Category classification (KB #52), Conservation Priority
  Index (CPI, KB #35), and Conservation Emergency predicate (KB #42). Joins to `sites`
  for PresStat / GuessDate / TypeSite and to `projects`.'
hidden: false
