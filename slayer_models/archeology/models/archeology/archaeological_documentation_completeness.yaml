version: 6
name: archaeological_documentation_completeness
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: sqs:avg
    name: sqs
  - formula: sce:avg
    name: sce
  - formula: noisedb:avg
    name: noisedb
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: mesh_per_zone
  source_model: scanmesh
  measures:
  - formula: mfs:avg
    name: mfs
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: pc_per_arcref
      join_pairs:
      - - arcref
        - arcref
    - target_model: mesh_per_zone
      join_pairs:
      - - zoneref
        - zoneref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: sqs
    model: pc_per_arcref
  - name: sce
    model: pc_per_arcref
  - name: noisedb
    model: pc_per_arcref
  - name: mfs
    model: mesh_per_zone
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: adc
      type: DOUBLE
      sql: pc_per_arcref__sqs * 0.4 + mesh_per_zone__mfs * 0.4 + pc_per_arcref__sce
        * 0.2 - 5 * sqrt(pc_per_arcref__noisedb / 10.0)
  measures:
  - formula: adc:avg
    name: adc
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.adc\" AS adc FROM\
  \ (SELECT\n  scans_keyed.questregistry AS \"scans_keyed.questregistry\",\n  scans_keyed.arcref\
  \ AS \"scans_keyed.arcref\",\n  scans_keyed.zoneref AS \"scans_keyed.zoneref\",\n\
  \  AVG(\n    scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs\
  \ * 0.4 + scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n  ) AS \"scans_keyed.adc\"\nFROM (\n  SELECT\n    \"scans.questregistry\"\
  \ AS questregistry,\n    \"scans.arcref\" AS arcref,\n    \"scans.zoneref\" AS zoneref,\n\
  \    \"scans.pc_per_arcref.sqs\" AS pc_per_arcref__sqs,\n    \"scans.pc_per_arcref.sce\"\
  \ AS pc_per_arcref__sce,\n    \"scans.pc_per_arcref.noisedb\" AS pc_per_arcref__noisedb,\n\
  \    \"scans.mesh_per_zone.mfs\" AS mesh_per_zone__mfs\n  FROM (\n    SELECT\n \
  \     scans.questregistry AS \"scans.questregistry\",\n      scans.arcref AS \"\
  scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\",\n      pc_per_arcref.sqs\
  \ AS \"scans.pc_per_arcref.sqs\",\n      pc_per_arcref.sce AS \"scans.pc_per_arcref.sce\"\
  ,\n      pc_per_arcref.noisedb AS \"scans.pc_per_arcref.noisedb\",\n      mesh_per_zone.mfs\
  \ AS \"scans.mesh_per_zone.mfs\"\n    FROM scans AS scans\n    LEFT JOIN (\n   \
  \   (\n        SELECT\n          \"scanmesh.zoneref\" AS zoneref,\n          \"\
  scanmesh.mfs\" AS mfs\n        FROM (\n          SELECT\n            scanmesh.zoneref\
  \ AS \"scanmesh.zoneref\",\n            AVG(\n              (\n                (\n\
  \                  scanmesh.facetfaces * 1.0 / (\n                    scanmesh.facetverts\
  \ * scanmesh.facetresmm * scanmesh.facetresmm\n                  )\n           \
  \     ) * 1000.0\n              ) * (\n                (\n                  (\n\
  \                    scanmesh.texpix * 1.0 / (\n                      SQRT(scanmesh.facetfaces)\
  \ * scanmesh.facetresmm\n                    )\n                  ) * 0.01\n   \
  \             ) / 10.0\n              ) * (\n                1 + EXP(-scanmesh.geomdeltamm)\n\
  \              )\n            ) AS \"scanmesh.mfs\"\n          FROM scanmesh AS\
  \ scanmesh\n          GROUP BY\n            scanmesh.zoneref\n        ) AS _inner\n\
  \      )\n    ) AS mesh_per_zone\n      ON scans.zoneref = mesh_per_zone.zoneref\n\
  \    LEFT JOIN (\n      (\n        SELECT\n          \"scanpointcloud.arcref\" AS\
  \ arcref,\n          \"scanpointcloud.sqs\" AS sqs,\n          \"scanpointcloud.sce\"\
  \ AS sce,\n          \"scanpointcloud.noisedb\" AS noisedb\n        FROM (\n   \
  \       SELECT\n            scanpointcloud.arcref AS \"scanpointcloud.arcref\",\n\
  \            AVG(\n              (\n                CASE\n                  WHEN\
  \ (\n                    (\n                      LOG10(scanpointcloud.scanresolmm\
  \ * 1000.0) / LOG10(scanpointcloud.pointdense)\n                    ) * 5.0\n  \
  \                ) > 0\n                  THEN POWER(\n                    10.0\
  \ / (\n                      (\n                        LOG10(scanpointcloud.scanresolmm\
  \ * 1000.0) / LOG10(scanpointcloud.pointdense)\n                      ) * 5.0\n\
  \                    ),\n                    1.5\n                  )\n        \
  \          ELSE NULL\n                END\n              ) * (\n               \
  \ (\n                  scanpointcloud.coverpct * (\n                    1 + (\n\
  \                      scanpointcloud.lappct / 100.0\n                    ) * (\n\
  \                      1 - scanpointcloud.coverpct / 100.0\n                   \
  \ )\n                  )\n                ) / 100.0\n              ) * POWER(1 -\
  \ scanpointcloud.noisedb / 30.0, 2)\n            ) AS \"scanpointcloud.sqs\",\n\
  \            AVG(\n              scanpointcloud.coverpct * (\n                1\
  \ + (\n                  scanpointcloud.lappct / 100.0\n                ) * (\n\
  \                  1 - scanpointcloud.coverpct / 100.0\n                )\n    \
  \          )\n            ) AS \"scanpointcloud.sce\",\n            AVG(scanpointcloud.noisedb)\
  \ AS \"scanpointcloud.noisedb\"\n          FROM scanpointcloud AS scanpointcloud\n\
  \          GROUP BY\n            scanpointcloud.arcref\n        ) AS _inner\n  \
  \    )\n    ) AS pc_per_arcref\n      ON scans.arcref = pc_per_arcref.arcref\n \
  \ ) AS _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref) AS _inner"
