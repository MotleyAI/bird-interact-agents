description: "Archaeological Documentation Completeness (ADC, KB #9): SQS*0.4 + MFS*0.4\
  \ + SCE*0.2 - 5*sqrt(NoiseDb/10). Higher = more complete documentation. Multistage\
  \ anchored at scans (arcref + zoneref) joining scanpointcloud (per arcref) and scanmesh\
  \ (per zoneref).\n\n[kb=9]\nADC = \\left(SQS \\times 0.4\\right) + \\left(MFS \\\
  times 0.4\\right) + \\left(SCE \\times 0.2\\right) - 5 \\times \\sqrt{\\frac{NoiseDb}{10}},\
  \ \\text{ where higher values indicate more complete documentation with multiple\
  \ quality factors.} \u2014 Comprehensive score for how completely a site has been\
  \ documented through scanning with weighted importance factors.\n[/kb=9]"
