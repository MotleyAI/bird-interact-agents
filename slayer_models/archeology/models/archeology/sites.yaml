  description: "Cultural / Historical Period (KB #25). Examples: 'Neolithic' (10,000-4,500\
    \ BCE), 'Bronze Age' (3,300-1,200 BCE), 'Roman' (27 BCE-476 CE), 'Medieval' (476-1453\
    \ CE). Determines applicable research methodologies, conservation approaches,\
    \ and contextual interpretation frameworks.\n\n[kb=25]\nClassifies archaeological\
    \ sites into standardized chronological/cultural periods. Values like 'Neolithic'\
    \ (10,000-4,500 BCE), 'Bronze Age' (3,300-1,200 BCE), 'Roman' (27 BCE-476 CE),\
    \ or 'Medieval' (476-1453 CE) determine applicable research methodologies, conservation\
    \ approaches, and contextual interpretation frameworks. \u2014 Illustrates the\
    \ significance of cultural period classification in archaeological sites.\n[/kb=25]"
  label: PhaseFactor (Cultural Period)
  hidden: false
  meta:
    kb_id: 25
- name: guessdate
  sql: guessdate
  type: string
  primary_key: false
  description: "Estimated Date (KB #29). Free-form labels like '3500-3000 BCE', '1st\
    \ c. CE', or 'ca. 1450 CE' for chronological placement. Precision varies from\
    \ specific years to century-level estimates.\n\n[kb=29]\nValues like '3500-3000\
    \ BCE', '1st c. CE', or 'ca. 1450 CE' represent estimated chronological placement\
    \ based on excavation findings. Precision varies from specific years to century-level\
    \ estimates depending on available evidence and dating methodologies employed.\
    \ \u2014 Illustrates dating conventions in archaeological classification for chronological\
