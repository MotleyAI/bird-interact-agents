version: 6
name: processing_optimized_workflow
source_queries:
- version: 3
  name: proc_per_zone
  source_model: scanprocessing
  measures:
  - formula: flowhrs:avg
    name: flowhrs
  - formula: proccpu:avg
    name: proccpu
  - formula: procgpu:avg
    name: procgpu
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: mesh_per_zone
  source_model: scanmesh
  measures:
  - formula: facetverts:avg
    name: facetverts
  - formula: mfs:avg
    name: mfs
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: proc_per_zone
      join_pairs:
      - - zoneref
        - zoneref
    - target_model: mesh_per_zone
      join_pairs:
      - - zoneref
        - zoneref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: gbsize
  - name: flowhrs
    model: proc_per_zone
  - name: proccpu
    model: proc_per_zone
  - name: procgpu
    model: proc_per_zone
  - name: facetverts
    model: mesh_per_zone
  - name: mfs
    model: mesh_per_zone
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: pru
      type: DOUBLE
      sql: (proc_per_zone__flowhrs * (proc_per_zone__proccpu + proc_per_zone__procgpu)
        / 2.0) / (gbsize * 10 * log10(mesh_per_zone__facetverts + 10000.0))
    - name: is_processing_optimized_workflow
      type: BOOLEAN
      sql: CASE WHEN ((proc_per_zone__flowhrs * (proc_per_zone__proccpu + proc_per_zone__procgpu)
        / 2.0) / (gbsize * 10 * log10(mesh_per_zone__facetverts + 10000.0))) < 5.0
        AND mesh_per_zone__mfs > 7.0 THEN 1 ELSE 0 END
  measures:
  - formula: pru:avg
    name: pru
  - formula: mesh_per_zone__mfs:avg
    name: mfs
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: is_processing_optimized_workflow
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.is_processing_optimized_workflow\"\
  \ AS is_processing_optimized_workflow, \"scans_keyed.pru\" AS pru, \"scans_keyed.mfs\"\
  \ AS mfs FROM (SELECT\n  scans_keyed.questregistry AS \"scans_keyed.questregistry\"\
  ,\n  scans_keyed.arcref AS \"scans_keyed.arcref\",\n  scans_keyed.zoneref AS \"\
  scans_keyed.zoneref\",\n  CASE\n    WHEN (\n      (\n        scans_keyed.proc_per_zone__flowhrs\
  \ * (\n          scans_keyed.proc_per_zone__proccpu + scans_keyed.proc_per_zone__procgpu\n\
  \        ) / 2.0\n      ) / (\n        scans_keyed.gbsize * 10 * LOG10(scans_keyed.mesh_per_zone__facetverts\
  \ + 10000.0)\n      )\n    ) < 5.0\n    AND scans_keyed.mesh_per_zone__mfs > 7.0\n\
  \    THEN 1\n    ELSE 0\n  END AS \"scans_keyed.is_processing_optimized_workflow\"\
  ,\n  AVG(\n    (\n      scans_keyed.proc_per_zone__flowhrs * (\n        scans_keyed.proc_per_zone__proccpu\
  \ + scans_keyed.proc_per_zone__procgpu\n      ) / 2.0\n    ) / (\n      scans_keyed.gbsize\
  \ * 10 * LOG10(scans_keyed.mesh_per_zone__facetverts + 10000.0)\n    )\n  ) AS \"\
  scans_keyed.pru\",\n  AVG(scans_keyed.mesh_per_zone__mfs) AS \"scans_keyed.mfs\"\
  \nFROM (\n  SELECT\n    \"scans.questregistry\" AS questregistry,\n    \"scans.arcref\"\
  \ AS arcref,\n    \"scans.zoneref\" AS zoneref,\n    \"scans.gbsize\" AS gbsize,\n\
  \    \"scans.proc_per_zone.flowhrs\" AS proc_per_zone__flowhrs,\n    \"scans.proc_per_zone.proccpu\"\
  \ AS proc_per_zone__proccpu,\n    \"scans.proc_per_zone.procgpu\" AS proc_per_zone__procgpu,\n\
  \    \"scans.mesh_per_zone.facetverts\" AS mesh_per_zone__facetverts,\n    \"scans.mesh_per_zone.mfs\"\
  \ AS mesh_per_zone__mfs\n  FROM (\n    SELECT\n      scans.questregistry AS \"scans.questregistry\"\
  ,\n      scans.arcref AS \"scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\"\
  ,\n      scans.gbsize AS \"scans.gbsize\",\n      proc_per_zone.flowhrs AS \"scans.proc_per_zone.flowhrs\"\
  ,\n      proc_per_zone.proccpu AS \"scans.proc_per_zone.proccpu\",\n      proc_per_zone.procgpu\
  \ AS \"scans.proc_per_zone.procgpu\",\n      mesh_per_zone.facetverts AS \"scans.mesh_per_zone.facetverts\"\
  ,\n      mesh_per_zone.mfs AS \"scans.mesh_per_zone.mfs\"\n    FROM scans AS scans\n\
  \    LEFT JOIN (\n      (\n        SELECT\n          \"scanmesh.zoneref\" AS zoneref,\n\
  \          \"scanmesh.facetverts\" AS facetverts,\n          \"scanmesh.mfs\" AS\
  \ mfs\n        FROM (\n          SELECT\n            scanmesh.zoneref AS \"scanmesh.zoneref\"\
  ,\n            AVG(scanmesh.facetverts) AS \"scanmesh.facetverts\",\n          \
  \  AVG(\n              (\n                (\n                  scanmesh.facetfaces\
  \ * 1.0 / (\n                    scanmesh.facetverts * scanmesh.facetresmm * scanmesh.facetresmm\n\
  \                  )\n                ) * 1000.0\n              ) * (\n        \
  \        (\n                  (\n                    scanmesh.texpix * 1.0 / (\n\
  \                      SQRT(scanmesh.facetfaces) * scanmesh.facetresmm\n       \
  \             )\n                  ) * 0.01\n                ) / 10.0\n        \
  \      ) * (\n                1 + EXP(-scanmesh.geomdeltamm)\n              )\n\
  \            ) AS \"scanmesh.mfs\"\n          FROM scanmesh AS scanmesh\n      \
  \    GROUP BY\n            scanmesh.zoneref\n        ) AS _inner\n      )\n    )\
  \ AS mesh_per_zone\n      ON scans.zoneref = mesh_per_zone.zoneref\n    LEFT JOIN\
  \ (\n      (\n        SELECT\n          \"scanprocessing.zoneref\" AS zoneref,\n\
  \          \"scanprocessing.flowhrs\" AS flowhrs,\n          \"scanprocessing.proccpu\"\
  \ AS proccpu,\n          \"scanprocessing.procgpu\" AS procgpu\n        FROM (\n\
  \          SELECT\n            scanprocessing.zoneref AS \"scanprocessing.zoneref\"\
  ,\n            AVG(scanprocessing.flowhrs) AS \"scanprocessing.flowhrs\",\n    \
  \        AVG(scanprocessing.proccpu) AS \"scanprocessing.proccpu\",\n          \
  \  AVG(scanprocessing.procgpu) AS \"scanprocessing.procgpu\"\n          FROM scanprocessing\
  \ AS scanprocessing\n          GROUP BY\n            scanprocessing.zoneref\n  \
  \      ) AS _inner\n      )\n    ) AS proc_per_zone\n      ON scans.zoneref = proc_per_zone.zoneref\n\
  \  ) AS _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref,\n  CASE\n    WHEN (\n      (\n        scans_keyed.proc_per_zone__flowhrs\
  \ * (\n          scans_keyed.proc_per_zone__proccpu + scans_keyed.proc_per_zone__procgpu\n\
  \        ) / 2.0\n      ) / (\n        scans_keyed.gbsize * 10 * LOG10(scans_keyed.mesh_per_zone__facetverts\
  \ + 10000.0)\n      )\n    ) < 5.0\n    AND scans_keyed.mesh_per_zone__mfs > 7.0\n\
  \    THEN 1\n    ELSE 0\n  END) AS _inner"
