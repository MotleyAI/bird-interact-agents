  description: "Registration Method (KB #28). Values: 'ICP' (Iterative Closest Point),\
    \ 'Target-based' (alignment via physical reference markers), 'Hybrid' (automatic\
    \ + manual), 'SLAM' (Simultaneous Localization and Mapping). Each has distinct\
    \ accuracy characteristics.\n\n[kb=28]\nA categorization of alignment techniques\
    \ with specific methodologies: 'ICP' (Iterative Closest Point algorithm for point\
    \ cloud alignment), 'Target-based' (alignment using physical reference markers),\
    \ 'Hybrid' (combination of automatic and manual alignment), and 'SLAM' (Simultaneous\
    \ Localization and Mapping for real-time registration). Each method has distinct\
    \ accuracy characteristics and use cases. \u2014 Illustrates different scan registration\
    \ methodologies in archaeological documentation.\n[/kb=28]"
  label: LogMethod (Registration Method)
  hidden: false
