  primary_key: false
  description: "Registration Quality Threshold (KB #18): LogAccuMm < 1.0 AND ErrValMm\
    \ < 2.0 \u2014 sufficient accuracy for reliable spatial analysis.\n\n[kb=18]\n\
    A registration with LogAccuMm < 1.0 and ErrValMm < 2.0, ensuring sufficient accuracy\
    \ for reliable spatial analysis with maximum tolerable error below the significant\
    \ feature size threshold. \u2014 Defines the quality threshold for scan registration\
    \ in archaeological documentation based on error propagation analysis.\n[/kb=18]"
  label: Registration Quality Threshold
  hidden: false
