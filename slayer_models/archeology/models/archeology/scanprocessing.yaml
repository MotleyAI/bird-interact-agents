  description: "Processing Stage (KB #27). Sequential workflow: 'Raw' (unprocessed)\
    \ \u2192 'Aligned' (multiple scans registered) \u2192 'Cleaned' (noise/artifacts\
    \ removed) \u2192 'Meshed' (point cloud \u2192 polygon mesh) \u2192 'Textured'\
    \ (surface textures applied). Each stage is a discrete processing milestone.\n\
    \n[kb=27]\nA sequential classification system with defined stages: 'Raw' (unprocessed\
    \ scan data), 'Aligned' (multiple scans registered together), 'Cleaned' (noise\
    \ and artifacts removed), 'Meshed' (point cloud converted to polygon mesh), and\
    \ 'Textured' (surface textures applied to mesh). Each stage represents a discrete\
    \ processing milestone. \u2014 Illustrates the progression of data processing\
    \ in archaeological scanning workflows.\n[/kb=27]"
  label: FlowStage (Processing Stage)
