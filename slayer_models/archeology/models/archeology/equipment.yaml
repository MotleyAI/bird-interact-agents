columns:
- name: equipregistry
  sql: equipregistry
  type: string
  primary_key: true
  hidden: false
- name: equipform
  sql: equipform
  type: string
  primary_key: false
  hidden: false
- name: equipdesign
  sql: equipdesign
  type: string
  primary_key: false
  hidden: false
- name: equiptune
  sql: equiptune
  type: string
  primary_key: false
  hidden: false
- name: equipstatus
  sql: equipstatus
  type: string
  primary_key: false
  hidden: false
- name: powerlevel
  sql: powerlevel
