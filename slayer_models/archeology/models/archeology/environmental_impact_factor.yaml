description: "Environmental Impact Factor (EIF, KB #31): SQS / (ESI + 10) * 100. Values\
  \ closer to 100 indicate minimal environmental interference. Multistage anchored\
  \ at scans which has both arcref (project, for SQS) and zoneref (site, for ESI).\n\
  \n[kb=31]\nEIF = \\frac{SQS}{\\text{ESI} + 10} \\times 100, \\text{ where SQS is\
  \ the Scan Quality Score and ESI is the Environmental Suitability Index. Values\
  \ closer to 100 indicate minimal environmental interference with data acquisition.}\
  \ \u2014 Quantifies how environmental conditions affected scan quality using statistical\
  \ correlation analysis.\n[/kb=31]"
