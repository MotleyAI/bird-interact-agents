version: 4
name: processing_bottleneck
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: totalpts:avg
    name: totalpts
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: proc_per_zone
  source_model: scanprocessing
  measures:
  - formula: flowhrs:avg
    name: flowhrs
  - formula: proccpu:avg
    name: proccpu
  - formula: procgpu:avg
    name: procgpu
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: pc_per_arcref
      join_pairs:
      - - arcref
        - arcref
    - target_model: proc_per_zone
      join_pairs:
      - - zoneref
        - zoneref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: gbsize
  - name: totalpts
    model: pc_per_arcref
  - name: flowhrs
    model: proc_per_zone
  - name: proccpu
    model: proc_per_zone
  - name: procgpu
    model: proc_per_zone
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: per
      type: number
      sql: (gbsize * log10(pc_per_arcref__totalpts)) / (proc_per_zone__flowhrs * (proc_per_zone__proccpu
        + proc_per_zone__procgpu) / 200.0)
    - name: is_processing_bottleneck
      type: boolean
      sql: CASE WHEN ((gbsize * log10(pc_per_arcref__totalpts)) / (proc_per_zone__flowhrs
        * (proc_per_zone__proccpu + proc_per_zone__procgpu) / 200.0)) < 0.5 THEN 1
        ELSE 0 END
  measures:
  - formula: per:avg
    name: per
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: is_processing_bottleneck
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.is_processing_bottleneck\"\
  \ AS is_processing_bottleneck, \"scans_keyed.per\" AS per FROM (SELECT\n  scans_keyed.questregistry\
  \ AS \"scans_keyed.questregistry\",\n  scans_keyed.arcref AS \"scans_keyed.arcref\"\
  ,\n  scans_keyed.zoneref AS \"scans_keyed.zoneref\",\n  CASE\n    WHEN (\n     \
  \ (\n        scans_keyed.gbsize * LOG10(scans_keyed.pc_per_arcref__totalpts)\n \
  \     ) / (\n        scans_keyed.proc_per_zone__flowhrs * (\n          scans_keyed.proc_per_zone__proccpu\
  \ + scans_keyed.proc_per_zone__procgpu\n        ) / 200.0\n      )\n    ) < 0.5\n\
  \    THEN 1\n    ELSE 0\n  END AS \"scans_keyed.is_processing_bottleneck\",\n  AVG(\n\
  \    (\n      scans_keyed.gbsize * LOG10(scans_keyed.pc_per_arcref__totalpts)\n\
  \    ) / (\n      scans_keyed.proc_per_zone__flowhrs * (\n        scans_keyed.proc_per_zone__proccpu\
  \ + scans_keyed.proc_per_zone__procgpu\n      ) / 200.0\n    )\n  ) AS \"scans_keyed.per\"\
  \nFROM (\n  SELECT\n    \"scans.questregistry\" AS questregistry,\n    \"scans.arcref\"\
  \ AS arcref,\n    \"scans.zoneref\" AS zoneref,\n    \"scans.gbsize\" AS gbsize,\n\
  \    \"scans.pc_per_arcref.totalpts\" AS pc_per_arcref__totalpts,\n    \"scans.proc_per_zone.flowhrs\"\
  \ AS proc_per_zone__flowhrs,\n    \"scans.proc_per_zone.proccpu\" AS proc_per_zone__proccpu,\n\
  \    \"scans.proc_per_zone.procgpu\" AS proc_per_zone__procgpu\n  FROM (\n    SELECT\n\
  \      scans.questregistry AS \"scans.questregistry\",\n      scans.arcref AS \"\
  scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\",\n      scans.gbsize AS\
  \ \"scans.gbsize\",\n      pc_per_arcref.totalpts AS \"scans.pc_per_arcref.totalpts\"\
  ,\n      proc_per_zone.flowhrs AS \"scans.proc_per_zone.flowhrs\",\n      proc_per_zone.proccpu\
  \ AS \"scans.proc_per_zone.proccpu\",\n      proc_per_zone.procgpu AS \"scans.proc_per_zone.procgpu\"\
  \n    FROM scans AS scans\n    LEFT JOIN (\n      (\n        SELECT\n          \"\
  scanpointcloud.arcref\" AS arcref,\n          \"scanpointcloud.totalpts\" AS totalpts\n\
  \        FROM (\n          SELECT\n            scanpointcloud.arcref AS \"scanpointcloud.arcref\"\
  ,\n            AVG(scanpointcloud.totalpts) AS \"scanpointcloud.totalpts\"\n   \
  \       FROM scanpointcloud AS scanpointcloud\n          GROUP BY\n            scanpointcloud.arcref\n\
  \        ) AS _inner\n      )\n    ) AS pc_per_arcref\n      ON scans.arcref = pc_per_arcref.arcref\n\
  \    LEFT JOIN (\n      (\n        SELECT\n          \"scanprocessing.zoneref\"\
  \ AS zoneref,\n          \"scanprocessing.flowhrs\" AS flowhrs,\n          \"scanprocessing.proccpu\"\
  \ AS proccpu,\n          \"scanprocessing.procgpu\" AS procgpu\n        FROM (\n\
  \          SELECT\n            scanprocessing.zoneref AS \"scanprocessing.zoneref\"\
  ,\n            AVG(scanprocessing.flowhrs) AS \"scanprocessing.flowhrs\",\n    \
  \        AVG(scanprocessing.proccpu) AS \"scanprocessing.proccpu\",\n          \
  \  AVG(scanprocessing.procgpu) AS \"scanprocessing.procgpu\"\n          FROM scanprocessing\
  \ AS scanprocessing\n          GROUP BY\n            scanprocessing.zoneref\n  \
  \      ) AS _inner\n      )\n    ) AS proc_per_zone\n      ON scans.zoneref = proc_per_zone.zoneref\n\
  \  ) AS _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref,\n  CASE\n    WHEN (\n      (\n        scans_keyed.gbsize\
  \ * LOG10(scans_keyed.pc_per_arcref__totalpts)\n      ) / (\n        scans_keyed.proc_per_zone__flowhrs\
  \ * (\n          scans_keyed.proc_per_zone__proccpu + scans_keyed.proc_per_zone__procgpu\n\
  \        ) / 200.0\n      )\n    ) < 0.5\n    THEN 1\n    ELSE 0\n  END) AS _inner"
