version: 4
name: high_temporal_value_site
source_queries:
- version: 3
  name: cons_per_zone
  source_model: scanconservation
  measures:
  - formula: cpi:avg
    name: cpi
  dimensions:
  - name: zoneref
  whole_periods_only: false
- version: 3
  name: scans_keyed
  source_model:
    source_name: scans
    joins:
    - target_model: cons_per_zone
      join_pairs:
      - - zoneref
        - zoneref
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: guessdate
    model: sites
  - name: cpi
    model: cons_per_zone
  whole_periods_only: false
- version: 3
  source_model:
    source_name: scans_keyed
    columns:
    - name: is_high_temporal_value_site
      type: boolean
      sql: CASE WHEN CAST(sites__guessdate AS REAL) < 500 AND cons_per_zone__cpi >
        60 THEN 1 ELSE 0 END
  measures:
  - formula: cons_per_zone__cpi:avg
    name: cpi
  dimensions:
  - name: questregistry
  - name: arcref
  - name: zoneref
  - name: is_high_temporal_value_site
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"scans_keyed.questregistry\" AS questregistry, \"scans_keyed.arcref\"\
  \ AS arcref, \"scans_keyed.zoneref\" AS zoneref, \"scans_keyed.is_high_temporal_value_site\"\
  \ AS is_high_temporal_value_site, \"scans_keyed.cpi\" AS cpi FROM (SELECT\n  scans_keyed.questregistry\
  \ AS \"scans_keyed.questregistry\",\n  scans_keyed.arcref AS \"scans_keyed.arcref\"\
  ,\n  scans_keyed.zoneref AS \"scans_keyed.zoneref\",\n  CASE\n    WHEN CAST(scans_keyed.sites__guessdate\
  \ AS REAL) < 500\n    AND scans_keyed.cons_per_zone__cpi > 60\n    THEN 1\n    ELSE\
  \ 0\n  END AS \"scans_keyed.is_high_temporal_value_site\",\n  AVG(scans_keyed.cons_per_zone__cpi)\
  \ AS \"scans_keyed.cpi\"\nFROM (\n  SELECT\n    \"scans.questregistry\" AS questregistry,\n\
  \    \"scans.arcref\" AS arcref,\n    \"scans.zoneref\" AS zoneref,\n    \"scans.sites.guessdate\"\
  \ AS sites__guessdate,\n    \"scans.cons_per_zone.cpi\" AS cons_per_zone__cpi\n\
  \  FROM (\n    SELECT\n      scans.questregistry AS \"scans.questregistry\",\n \
  \     scans.arcref AS \"scans.arcref\",\n      scans.zoneref AS \"scans.zoneref\"\
  ,\n      sites.guessdate AS \"scans.sites.guessdate\",\n      cons_per_zone.cpi\
  \ AS \"scans.cons_per_zone.cpi\"\n    FROM scans AS scans\n    LEFT JOIN sites AS\
  \ sites\n      ON scans.zoneref = sites.zoneregistry\n    LEFT JOIN (\n      (\n\
  \        SELECT\n          \"scanconservation.zoneref\" AS zoneref,\n          \"\
  scanconservation.cpi\" AS cpi\n        FROM (\n          SELECT\n            scanconservation.zoneref\
  \ AS \"scanconservation.zoneref\",\n            AVG(\n              CASE\n     \
  \           WHEN (\n                  sites.presstat LIKE '%Poor%' OR sites.presstat\
  \ LIKE '%Critical%'\n                )\n                AND (\n                \
  \  scanconservation.structstate IS NULL\n                  OR NOT scanconservation.structstate\
  \ LIKE '%Stable%'\n                )\n                THEN 100 - (\n           \
  \       CASE sites.presstat\n                    WHEN 'Excellent'\n            \
  \        THEN 10\n                    WHEN 'Good'\n                    THEN 30\n\
  \                    WHEN 'Fair'\n                    THEN 50\n                \
  \    WHEN 'Poor'\n                    THEN 70\n                    WHEN 'Critical'\n\
  \                    THEN 90\n                    ELSE 0\n                  END\n\
  \                ) + (\n                  ABS(CAST(sites.guessdate AS REAL)) / 1000.0\n\
  \                ) * (\n                  1 + (\n                    CASE sites.typesite\n\
  \                      WHEN 'Religious'\n                      THEN 10\n       \
  \               WHEN 'Military'\n                      THEN 8\n                \
  \      WHEN 'Settlement'\n                      THEN 6\n                      WHEN\
  \ 'Industrial'\n                      THEN 4\n                      WHEN 'Burial'\n\
  \                      THEN 2\n                      ELSE 0\n                  \
  \  END\n                  ) / 10.0\n                )\n                ELSE 50 -\
  \ (\n                  CASE sites.presstat\n                    WHEN 'Excellent'\n\
  \                    THEN 10\n                    WHEN 'Good'\n                \
  \    THEN 30\n                    WHEN 'Fair'\n                    THEN 50\n   \
  \                 WHEN 'Poor'\n                    THEN 70\n                   \
  \ WHEN 'Critical'\n                    THEN 90\n                    ELSE 0\n   \
  \               END\n                ) + (\n                  ABS(CAST(sites.guessdate\
  \ AS REAL)) / 1000.0\n                ) * (\n                  1 + (\n         \
  \           CASE sites.typesite\n                      WHEN 'Religious'\n      \
  \                THEN 10\n                      WHEN 'Military'\n              \
  \        THEN 8\n                      WHEN 'Settlement'\n                     \
  \ THEN 6\n                      WHEN 'Industrial'\n                      THEN 4\n\
  \                      WHEN 'Burial'\n                      THEN 2\n           \
  \           ELSE 0\n                    END\n                  ) / 20.0\n      \
  \          )\n              END\n            ) AS \"scanconservation.cpi\"\n   \
  \       FROM scanconservation AS scanconservation\n          LEFT JOIN sites AS\
  \ sites\n            ON scanconservation.zoneref = sites.zoneregistry\n        \
  \  GROUP BY\n            scanconservation.zoneref\n        ) AS _inner\n      )\n\
  \    ) AS cons_per_zone\n      ON scans.zoneref = cons_per_zone.zoneref\n  ) AS\
  \ _inner\n) AS scans_keyed\nGROUP BY\n  scans_keyed.questregistry,\n  scans_keyed.arcref,\n\
  \  scans_keyed.zoneref,\n  CASE\n    WHEN CAST(scans_keyed.sites__guessdate AS REAL)\
  \ < 500\n    AND scans_keyed.cons_per_zone__cpi > 60\n    THEN 1\n    ELSE 0\n \
  \ END) AS _inner"
