description: "High Temporal Value Site (KB #46): GuessDate containing dates before\
  \ 500 CE AND CPI > 60 (KB #35). Sites of exceptional chronological significance.\
  \ Anchored at scans joined to sites (for GuessDate) and scanconservation (for CPI).\n\
  \n[kb=46]\nA site with GuessDate containing dates before 500 CE and CPI > 60, where\
  \ CPI is Conservation Priority Index, representing locations of exceptional chronological\
  \ significance requiring specialized documentation protocols to capture temporally\
  \ significant features. \u2014 Identifies sites with exceptional historical significance\
  \ based on age and context for prioritized research attention.\n[/kb=46]"
