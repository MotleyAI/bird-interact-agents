version: 4
name: scanpointcloud
sql_table: scanpointcloud
query_variables: {}
data_source: archeology
columns:
- name: cloudregistry
  sql: cloudregistry
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: crewref
  sql: crewref
  type: string
  primary_key: false
  hidden: false
- name: arcref
  sql: arcref
  type: string
  primary_key: false
  hidden: false
- name: scanresolmm
  sql: scanresolmm
  type: number
  primary_key: false
  description: "Scan Resolution (mm) \u2014 smallest feature distinguishable in the\
    \ scan. ~0.5mm captures fine tool marks; ~2.0mm captures only macroscopic features.\n\
    \n[kb=20]\nMeasured in millimeters, representing the smallest feature that can\
    \ be distinguished in the scan. Values like 0.5mm enable documentation of fine\
    \ tool marks on artifacts, while 2.0mm might only capture general shape and macroscopic\
    \ features. \u2014 Illustrates the significance of scan resolution measurements\
    \ in archaeological scanning for feature detection.\n[/kb=20]"
  label: ScanResolMm (Scan Resolution)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 20
- name: pointdense
  sql: pointdense
  type: number
  primary_key: false
  description: "Point Density (points/m^2). ~100 captures basic topography; ~1,000\
    \ captures structural details; >=10,000 enables surface-texture / fine-engraving\
    \ analysis.\n\n[kb=21]\nMeasured as points per square meter. Values around 100\
    \ capture basic site topography, 1,000 can document structural details, while\
    \ 10,000+ enables analysis of surface textures and fine engravings across multiple\
    \ scales of inquiry. \u2014 Illustrates the significance of point density in archaeological\
    \ point clouds for information richness.\n[/kb=21]"
  label: PointDense (Point Density)
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 21
- name: coverpct
  sql: coverpct
  type: number
  primary_key: false
  description: "Coverage Percentage of target area. >=95% = near-complete documentation;\
    \ ~80% has significant gaps requiring additional scanning or interpolation.\n\n\
    [kb=23]\nPercentage of target area successfully captured in scan data. Values\
    \ above 95% indicate near-complete documentation, while 80% might have significant\
    \ gaps requiring additional scanning or interpolation methods for comprehensive\
    \ site analysis. \u2014 Illustrates the significance of coverage percentage in\
    \ archaeological scans for site completeness assessment.\n[/kb=23]"
  label: CoverPct (Coverage Percentage)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 23
- name: totalpts
  sql: totalpts
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: clouddense
  sql: clouddense
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: lappct
  sql: lappct
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: noisedb
  sql: noisedb
  type: number
  primary_key: false
  description: "Noise Level (dB). <1.0 = clean data, suitable for detailed analysis;\
    \ >3.0 = significant noise that may obscure small features.\n\n[kb=22]\nMeasured\
    \ in decibels, representing signal-to-noise ratio in scan data. Values below 1.0\
    \ indicate clean data suitable for detailed analysis, while values above 3.0 suggest\
    \ significant noise that may obscure small features and introduce measurement\
    \ uncertainty. \u2014 Illustrates the impact of noise levels in point cloud data\
    \ on feature recognition accuracy.\n[/kb=22]"
  label: NoiseDb (Noise Level)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 22
- name: refpct
  sql: refpct
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: sri
  sql: (log10(scanresolmm * 1000.0) / log10(pointdense)) * 5.0
  type: number
  primary_key: false
  description: "Scan Resolution Index (SRI, KB #0): log10(ScanResolMm * 10^3) / log10(PointDense)\
    \ * 5. Lower values indicate higher quality / more balanced scanning parameters.\n\
    \n[kb=0]\nSRI = \\frac{\\log_{10}(ScanResolMm \\times 10^3)}{\\log_{10}(PointDense)}\
    \ \\times 5, \\text{ where lower values indicate higher quality resolution and\
    \ more balanced scanning parameters.} \u2014 A sophisticated compound index measuring\
    \ the overall resolution quality of a scan based on resolution and point density.\n\
    [/kb=0]"
  label: Scan Resolution Index (SRI)
  hidden: false
  meta:
    kb_id: 0
- name: sce
  sql: coverpct * (1 + (lappct / 100.0) * (1 - coverpct / 100.0))
  type: number
  primary_key: false
  description: "Scan Coverage Effectiveness (SCE, KB #1): CoverPct * (1 + LapPct/100\
    \ * (1 - CoverPct/100)). Higher values indicate more effective coverage with appropriate\
    \ overlap.\n\n[kb=1]\nSCE = CoverPct \\times \\left(1 + \\frac{LapPct}{100} \\\
    times \\left(1 - \\frac{CoverPct}{100}\\right)\\right), \\text{ where higher values\
    \ indicate more effective coverage with appropriate overlap.} \u2014 Measures\
    \ how effectively a scan covers its target area considering both coverage percentage\
    \ and overlap redundancy.\n[/kb=1]"
  label: Scan Coverage Effectiveness (SCE)
  hidden: false
  meta:
    kb_id: 1
- name: sqs
  sql: (CASE WHEN ((log10(scanresolmm * 1000.0) / log10(pointdense)) * 5.0) > 0 THEN
    power(10.0 / ((log10(scanresolmm * 1000.0) / log10(pointdense)) * 5.0), 1.5) ELSE
    NULL END) * ((coverpct * (1 + (lappct / 100.0) * (1 - coverpct / 100.0))) / 100.0)
    * power(1 - noisedb / 30.0, 2)
  type: number
  primary_key: false
  description: "Scan Quality Score (SQS, KB #3): (10/SRI)^1.5 * (SCE/100) * (1 - NoiseDb/30)^2.\
    \ Higher = exponentially better overall scan quality with emphasis on resolution.\n\
    \n[kb=3]\nSQS = \\left(\\frac{10}{SRI}\\right)^{1.5} \\times \\left(\\frac{SCE}{100}\\\
    right) \\times \\left(1 - \\frac{NoiseDb}{30}\\right)^2, \\text{ where higher\
    \ values indicate exponentially better overall scan quality with emphasis on resolution.}\
    \ \u2014 Comprehensive quality metric combining resolution, coverage, and noise\
    \ factors with weighted importance.\n[/kb=3]"
  label: Scan Quality Score (SQS)
  hidden: false
  meta:
    kb_id: 3
- name: is_high_resolution_scan
  sql: CASE WHEN scanresolmm <= 1.0 AND pointdense >= 1000 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "High Resolution Scan (KB #10): ScanResolMm <= 1.0 AND PointDense >=\
    \ 1000 \u2014 sub-millimeter precision suitable for fine archaeological feature\
    \ detection.\n\n[kb=10]\nA scan with ScanResolMm \\leq 1.0 and PointDense \\geq\
    \ 1000, allowing for sub-millimeter precision in archaeological documentation\
    \ and feature detection. \u2014 Defines what constitutes a high-resolution archaeological\
    \ scan based on quantitative parameters.\n[/kb=10]"
  label: High Resolution Scan
  hidden: false
  meta:
    kb_id: 10
- name: is_comprehensive_coverage
  sql: CASE WHEN coverpct >= 95 AND lappct >= 30 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Comprehensive Coverage (KB #11): CoverPct >= 95 AND LapPct >= 30 \u2014\
    \ minimal data gaps and sufficient overlap for accurate registration.\n\n[kb=11]\n\
    A scan with CoverPct \\geq 95 and LapPct \\geq 30, ensuring minimal data gaps\
    \ and sufficient overlap for accurate registration with 95% confidence interval\
    \ for spatial measurements. \u2014 Defines the standard for comprehensive scan\
    \ coverage of an archaeological site or artifact with statistical confidence.\n\
    [/kb=11]"
  label: Comprehensive Coverage
  hidden: false
  meta:
    kb_id: 11
- name: is_premium_quality_scan
  sql: CASE WHEN scanresolmm <= 1.0 AND pointdense >= 1000 AND coverpct >= 95 AND
    lappct >= 30 AND ((CASE WHEN ((log10(scanresolmm * 1000.0) / log10(pointdense))
    * 5.0) > 0 THEN power(10.0 / ((log10(scanresolmm * 1000.0) / log10(pointdense))
    * 5.0), 1.5) ELSE NULL END) * ((coverpct * (1 + (lappct / 100.0) * (1 - coverpct
    / 100.0))) / 100.0) * power(1 - noisedb / 30.0, 2)) > 7.5 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Premium Quality Scan (KB #12): High Resolution Scan AND Comprehensive\
    \ Coverage AND SQS > 7.5 \u2014 suitable for conservation planning and scholarly\
    \ publication.\n\n[kb=12]\nA scan that is both a High Resolution Scan and has\
    \ Comprehensive Coverage with SQS > 7.5, where SQS is the Scan Quality Score,\
    \ producing data suitable for detailed analysis and conservation planning. \u2014\
    \ Defines the criteria for a premium quality archaeological scan suitable for\
    \ conservation planning and scholarly publication.\n[/kb=12]"
  label: Premium Quality Scan
  hidden: false
  meta:
    kb_id: 12
measures: []
aggregations: []
joins:
- target_model: projects
  join_pairs:
  - - arcref
    - arcregistry
  join_type: left
- target_model: personnel
  join_pairs:
  - - crewref
    - crewregistry
  join_type: left
filters: []
description: 'Per-scan point cloud quality metrics. Hosts the Scan Resolution Index
  (SRI, KB #0), Scan Coverage Effectiveness (SCE, KB #1), Scan Quality Score (SQS,
  KB #3), and the High Resolution Scan / Comprehensive Coverage / Premium Quality
  Scan predicates (KB #10/11/12).'
hidden: false
