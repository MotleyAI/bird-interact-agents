  sql: facetregistry
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: zoneref
  sql: zoneref
  type: string
  primary_key: false
  hidden: false
- name: equipref
  sql: equipref
  type: string
  primary_key: false
  hidden: false
