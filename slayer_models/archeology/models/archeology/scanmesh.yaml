  sql: facetverts
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: facetfaces
  sql: facetfaces
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: facetresmm
  sql: facetresmm
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: texdist
  sql: texdist
  type: string
  primary_key: false
  hidden: false
- name: texpix
  sql: texpix
  type: number
  primary_key: false
  hidden: false
  format:
