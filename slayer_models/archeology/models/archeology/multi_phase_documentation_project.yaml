description: "Multi-Phase Documentation Project (KB #48): a project with multiple\
  \ scans where individual ADC < 70 but combined DPQ > 80. ADC is Archaeological Documentation\
  \ Completeness (KB #9), DPQ is Digital Preservation Quality (KB #38). Multistage:\
  \ per-scan ADC and DPQ aggregated by project (arcref); flagged if scan_count > 1\
  \ AND avg(ADC) < 70 AND avg(DPQ) > 80.\n\n[kb=48]\nA project with multiple scans\
  \ where the total ADC < 70 for individual scans but DPQ > 80 when combined, where\
  \ ADC is Archaeological Documentation Completeness and DPQ is Digital Preservation\
  \ Quality, indicating comprehensive documentation achieved through multiple phases\
  \ with coherent registration strategy for holistic interpretation. \u2014 Defines\
  \ complex archaeological projects requiring multiple scanning phases with integrated\
  \ documentation strategy.\n[/kb=48]"
