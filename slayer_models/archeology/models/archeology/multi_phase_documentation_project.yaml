version: 4
name: multi_phase_documentation_project
source_queries:
- version: 3
  name: adc_per_scan
  source_model: archaeological_documentation_completeness
  measures:
  - formula: adc:avg
    name: adc
  dimensions:
  - name: arcref
  - name: questregistry
  whole_periods_only: false
- version: 3
  name: dpq_per_scan
  source_model: digital_preservation_quality
  measures:
  - formula: dpq:avg
    name: dpq
  dimensions:
  - name: arcref
  - name: questregistry
  whole_periods_only: false
- version: 3
  name: per_project_adc
  source_model: adc_per_scan
  measures:
  - formula: '*:count'
    name: scan_count
  - formula: adc:avg
    name: avg_adc
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: per_project_dpq
  source_model: dpq_per_scan
  measures:
  - formula: dpq:avg
    name: avg_dpq
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: merged
  source_model:
    source_name: per_project_adc
    joins:
    - target_model: per_project_dpq
      join_pairs:
      - - arcref
        - arcref
  dimensions:
  - name: arcref
  - name: scan_count
  - name: avg_adc
  - name: avg_dpq
    model: per_project_dpq
  whole_periods_only: false
- version: 3
  source_model:
    source_name: merged
    columns:
    - name: is_multi_phase_documentation_project
      type: boolean
      sql: CASE WHEN scan_count > 1 AND avg_adc < 70 AND per_project_dpq__avg_dpq
        > 80 THEN 1 ELSE 0 END
  measures:
  - formula: scan_count:max
    name: scan_count
  - formula: avg_adc:avg
    name: avg_adc
  - formula: per_project_dpq__avg_dpq:avg
    name: avg_dpq
  dimensions:
  - name: arcref
  - name: is_multi_phase_documentation_project
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"merged.arcref\" AS arcref, \"merged.is_multi_phase_documentation_project\"\
  \ AS is_multi_phase_documentation_project, \"merged.scan_count\" AS scan_count,\
  \ \"merged.avg_adc\" AS avg_adc, \"merged.avg_dpq\" AS avg_dpq FROM (SELECT\n  merged.arcref\
  \ AS \"merged.arcref\",\n  CASE\n    WHEN merged.scan_count > 1\n    AND merged.avg_adc\
  \ < 70\n    AND merged.per_project_dpq__avg_dpq > 80\n    THEN 1\n    ELSE 0\n \
  \ END AS \"merged.is_multi_phase_documentation_project\",\n  MAX(merged.scan_count)\
  \ AS \"merged.scan_count\",\n  AVG(merged.avg_adc) AS \"merged.avg_adc\",\n  AVG(merged.per_project_dpq__avg_dpq)\
  \ AS \"merged.avg_dpq\"\nFROM (\n  SELECT\n    \"per_project_adc.arcref\" AS arcref,\n\
  \    \"per_project_adc.scan_count\" AS scan_count,\n    \"per_project_adc.avg_adc\"\
  \ AS avg_adc,\n    \"per_project_adc.per_project_dpq.avg_dpq\" AS per_project_dpq__avg_dpq\n\
  \  FROM (\n    SELECT\n      per_project_adc.arcref AS \"per_project_adc.arcref\"\
  ,\n      per_project_adc.scan_count AS \"per_project_adc.scan_count\",\n      per_project_adc.avg_adc\
  \ AS \"per_project_adc.avg_adc\",\n      per_project_dpq.avg_dpq AS \"per_project_adc.per_project_dpq.avg_dpq\"\
  \n    FROM (\n      SELECT\n        \"adc_per_scan.arcref\" AS arcref,\n       \
  \ \"adc_per_scan.scan_count\" AS scan_count,\n        \"adc_per_scan.avg_adc\" AS\
  \ avg_adc\n      FROM (\n        SELECT\n          adc_per_scan.arcref AS \"adc_per_scan.arcref\"\
  ,\n          COUNT(*) AS \"adc_per_scan.scan_count\",\n          AVG(adc_per_scan.adc)\
  \ AS \"adc_per_scan.avg_adc\"\n        FROM (\n          SELECT\n            \"\
  archaeological_documentation_completeness.arcref\" AS arcref,\n            \"archaeological_documentation_completeness.questregistry\"\
  \ AS questregistry,\n            \"archaeological_documentation_completeness.adc\"\
  \ AS adc\n          FROM (\n            SELECT\n              archaeological_documentation_completeness.arcref\
  \ AS \"archaeological_documentation_completeness.arcref\",\n              archaeological_documentation_completeness.questregistry\
  \ AS \"archaeological_documentation_completeness.questregistry\",\n            \
  \  AVG(archaeological_documentation_completeness.adc) AS \"archaeological_documentation_completeness.adc\"\
  \n            FROM (\n              SELECT\n                \"scans_keyed.questregistry\"\
  \ AS questregistry,\n                \"scans_keyed.arcref\" AS arcref,\n       \
  \         \"scans_keyed.zoneref\" AS zoneref,\n                \"scans_keyed.adc\"\
  \ AS adc\n              FROM (\n                SELECT\n                  scans_keyed.questregistry\
  \ AS \"scans_keyed.questregistry\",\n                  scans_keyed.arcref AS \"\
  scans_keyed.arcref\",\n                  scans_keyed.zoneref AS \"scans_keyed.zoneref\"\
  ,\n                  AVG(\n                    scans_keyed.pc_per_arcref__sqs *\
  \ 0.4 + scans_keyed.mesh_per_zone__mfs * 0.4 + scans_keyed.pc_per_arcref__sce *\
  \ 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb / 10.0)\n                  )\
  \ AS \"scans_keyed.adc\"\n                FROM (\n                  SELECT\n   \
  \                 \"scans.questregistry\" AS questregistry,\n                  \
  \  \"scans.arcref\" AS arcref,\n                    \"scans.zoneref\" AS zoneref,\n\
  \                    \"scans.pc_per_arcref.sqs\" AS pc_per_arcref__sqs,\n      \
  \              \"scans.pc_per_arcref.sce\" AS pc_per_arcref__sce,\n            \
  \        \"scans.pc_per_arcref.noisedb\" AS pc_per_arcref__noisedb,\n          \
  \          \"scans.mesh_per_zone.mfs\" AS mesh_per_zone__mfs\n                 \
  \ FROM (\n                    SELECT\n                      scans.questregistry\
  \ AS \"scans.questregistry\",\n                      scans.arcref AS \"scans.arcref\"\
  ,\n                      scans.zoneref AS \"scans.zoneref\",\n                 \
  \     pc_per_arcref.sqs AS \"scans.pc_per_arcref.sqs\",\n                      pc_per_arcref.sce\
  \ AS \"scans.pc_per_arcref.sce\",\n                      pc_per_arcref.noisedb AS\
  \ \"scans.pc_per_arcref.noisedb\",\n                      mesh_per_zone.mfs AS \"\
  scans.mesh_per_zone.mfs\"\n                    FROM scans AS scans\n           \
  \         LEFT JOIN (\n                      (\n                        SELECT\n\
  \                          \"scanmesh.zoneref\" AS zoneref,\n                  \
  \        \"scanmesh.mfs\" AS mfs\n                        FROM (\n             \
  \             SELECT\n                            scanmesh.zoneref AS \"scanmesh.zoneref\"\
  ,\n                            AVG(\n                              (\n         \
  \                       (\n                                  scanmesh.facetfaces\
  \ * 1.0 / (\n                                    scanmesh.facetverts * scanmesh.facetresmm\
  \ * scanmesh.facetresmm\n                                  )\n                 \
  \               ) * 1000.0\n                              ) * (\n              \
  \                  (\n                                  (\n                    \
  \                scanmesh.texpix * 1.0 / (\n                                   \
  \   SQRT(scanmesh.facetfaces) * scanmesh.facetresmm\n                          \
  \          )\n                                  ) * 0.01\n                     \
  \           ) / 10.0\n                              ) * (\n                    \
  \            1 + EXP(-scanmesh.geomdeltamm)\n                              )\n \
  \                           ) AS \"scanmesh.mfs\"\n                          FROM\
  \ scanmesh AS scanmesh\n                          GROUP BY\n                   \
  \         scanmesh.zoneref\n                        ) AS _inner\n              \
  \        )\n                    ) AS mesh_per_zone\n                      ON scans.zoneref\
  \ = mesh_per_zone.zoneref\n                    LEFT JOIN (\n                   \
  \   (\n                        SELECT\n                          \"scanpointcloud.arcref\"\
  \ AS arcref,\n                          \"scanpointcloud.sqs\" AS sqs,\n       \
  \                   \"scanpointcloud.sce\" AS sce,\n                          \"\
  scanpointcloud.noisedb\" AS noisedb\n                        FROM (\n          \
  \                SELECT\n                            scanpointcloud.arcref AS \"\
  scanpointcloud.arcref\",\n                            AVG(\n                   \
  \           (\n                                CASE\n                          \
  \        WHEN (\n                                    (\n                       \
  \               LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                                    ) * 5.0\n                                 \
  \ ) > 0\n                                  THEN POWER(\n                       \
  \             10.0 / (\n                                      (\n              \
  \                          LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                                      ) * 5.0\n                               \
  \     ),\n                                    1.5\n                            \
  \      )\n                                  ELSE NULL\n                        \
  \        END\n                              ) * (\n                            \
  \    (\n                                  scanpointcloud.coverpct * (\n        \
  \                            1 + (\n                                      scanpointcloud.lappct\
  \ / 100.0\n                                    ) * (\n                         \
  \             1 - scanpointcloud.coverpct / 100.0\n                            \
  \        )\n                                  )\n                              \
  \  ) / 100.0\n                              ) * POWER(1 - scanpointcloud.noisedb\
  \ / 30.0, 2)\n                            ) AS \"scanpointcloud.sqs\",\n       \
  \                     AVG(\n                              scanpointcloud.coverpct\
  \ * (\n                                1 + (\n                                 \
  \ scanpointcloud.lappct / 100.0\n                                ) * (\n       \
  \                           1 - scanpointcloud.coverpct / 100.0\n              \
  \                  )\n                              )\n                        \
  \    ) AS \"scanpointcloud.sce\",\n                            AVG(scanpointcloud.noisedb)\
  \ AS \"scanpointcloud.noisedb\"\n                          FROM scanpointcloud AS\
  \ scanpointcloud\n                          GROUP BY\n                         \
  \   scanpointcloud.arcref\n                        ) AS _inner\n               \
  \       )\n                    ) AS pc_per_arcref\n                      ON scans.arcref\
  \ = pc_per_arcref.arcref\n                  ) AS _inner\n                ) AS scans_keyed\n\
  \                GROUP BY\n                  scans_keyed.questregistry,\n      \
  \            scans_keyed.arcref,\n                  scans_keyed.zoneref\n      \
  \        ) AS _inner\n            ) AS archaeological_documentation_completeness\n\
  \            GROUP BY\n              archaeological_documentation_completeness.arcref,\n\
  \              archaeological_documentation_completeness.questregistry\n       \
  \   ) AS _inner\n        ) AS adc_per_scan\n        GROUP BY\n          adc_per_scan.arcref\n\
  \      ) AS _inner\n    ) AS per_project_adc\n    LEFT JOIN (\n      (\n       \
  \ SELECT\n          \"dpq_per_scan.arcref\" AS arcref,\n          \"dpq_per_scan.avg_dpq\"\
  \ AS avg_dpq\n        FROM (\n          SELECT\n            dpq_per_scan.arcref\
  \ AS \"dpq_per_scan.arcref\",\n            AVG(dpq_per_scan.dpq) AS \"dpq_per_scan.avg_dpq\"\
  \n          FROM (\n            SELECT\n              \"digital_preservation_quality.arcref\"\
  \ AS arcref,\n              \"digital_preservation_quality.questregistry\" AS questregistry,\n\
  \              \"digital_preservation_quality.dpq\" AS dpq\n            FROM (\n\
  \              SELECT\n                digital_preservation_quality.arcref AS \"\
  digital_preservation_quality.arcref\",\n                digital_preservation_quality.questregistry\
  \ AS \"digital_preservation_quality.questregistry\",\n                AVG(digital_preservation_quality.dpq)\
  \ AS \"digital_preservation_quality.dpq\"\n              FROM (\n              \
  \  SELECT\n                  \"scans_keyed.questregistry\" AS questregistry,\n \
  \                 \"scans_keyed.arcref\" AS arcref,\n                  \"scans_keyed.zoneref\"\
  \ AS zoneref,\n                  \"scans_keyed.dpq\" AS dpq,\n                 \
  \ \"scans_keyed.adc\" AS adc,\n                  \"scans_keyed.rar\" AS rar\n  \
  \              FROM (\n                  SELECT\n                    scans_keyed.questregistry\
  \ AS \"scans_keyed.questregistry\",\n                    scans_keyed.arcref AS \"\
  scans_keyed.arcref\",\n                    scans_keyed.zoneref AS \"scans_keyed.zoneref\"\
  ,\n                    AVG(\n                      0.3 * (\n                   \
  \     scans_keyed.pc_per_arcref__sqs * 0.4 + scans_keyed.mesh_per_zone__mfs * 0.4\
  \ + scans_keyed.pc_per_arcref__sce * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb\
  \ / 10.0)\n                      ) + 0.3 * scans_keyed.mesh_per_zone__mfs + 0.2\
  \ * (\n                        scans_keyed.pc_per_arcref__scanresolmm / (\n    \
  \                      scans_keyed.reg_per_arcref__logaccumm * SQRT(1 + scans_keyed.reg_per_arcref__errvalmm\
  \ / scans_keyed.reg_per_arcref__logaccumm)\n                        )\n        \
  \              ) + 0.2 * scans_keyed.pc_per_arcref__sce - 2 * SQRT(scans_keyed.reg_per_arcref__errvalmm\
  \ / scans_keyed.pc_per_arcref__scanresolmm)\n                    ) AS \"scans_keyed.dpq\"\
  ,\n                    AVG(\n                      scans_keyed.pc_per_arcref__sqs\
  \ * 0.4 + scans_keyed.mesh_per_zone__mfs * 0.4 + scans_keyed.pc_per_arcref__sce\
  \ * 0.2 - 5 * SQRT(scans_keyed.pc_per_arcref__noisedb / 10.0)\n                \
  \    ) AS \"scans_keyed.adc\",\n                    AVG(\n                     \
  \ scans_keyed.pc_per_arcref__scanresolmm / (\n                        scans_keyed.reg_per_arcref__logaccumm\
  \ * SQRT(1 + scans_keyed.reg_per_arcref__errvalmm / scans_keyed.reg_per_arcref__logaccumm)\n\
  \                      )\n                    ) AS \"scans_keyed.rar\"\n       \
  \           FROM (\n                    SELECT\n                      \"scans.questregistry\"\
  \ AS questregistry,\n                      \"scans.arcref\" AS arcref,\n       \
  \               \"scans.zoneref\" AS zoneref,\n                      \"scans.pc_per_arcref.sqs\"\
  \ AS pc_per_arcref__sqs,\n                      \"scans.pc_per_arcref.sce\" AS pc_per_arcref__sce,\n\
  \                      \"scans.pc_per_arcref.noisedb\" AS pc_per_arcref__noisedb,\n\
  \                      \"scans.pc_per_arcref.scanresolmm\" AS pc_per_arcref__scanresolmm,\n\
  \                      \"scans.mesh_per_zone.mfs\" AS mesh_per_zone__mfs,\n    \
  \                  \"scans.reg_per_arcref.logaccumm\" AS reg_per_arcref__logaccumm,\n\
  \                      \"scans.reg_per_arcref.errvalmm\" AS reg_per_arcref__errvalmm\n\
  \                    FROM (\n                      SELECT\n                    \
  \    scans.questregistry AS \"scans.questregistry\",\n                        scans.arcref\
  \ AS \"scans.arcref\",\n                        scans.zoneref AS \"scans.zoneref\"\
  ,\n                        pc_per_arcref.sqs AS \"scans.pc_per_arcref.sqs\",\n \
  \                       pc_per_arcref.sce AS \"scans.pc_per_arcref.sce\",\n    \
  \                    pc_per_arcref.noisedb AS \"scans.pc_per_arcref.noisedb\",\n\
  \                        pc_per_arcref.scanresolmm AS \"scans.pc_per_arcref.scanresolmm\"\
  ,\n                        mesh_per_zone.mfs AS \"scans.mesh_per_zone.mfs\",\n \
  \                       reg_per_arcref.logaccumm AS \"scans.reg_per_arcref.logaccumm\"\
  ,\n                        reg_per_arcref.errvalmm AS \"scans.reg_per_arcref.errvalmm\"\
  \n                      FROM scans AS scans\n                      LEFT JOIN (\n\
  \                        (\n                          SELECT\n                 \
  \           \"scanregistration.arcref\" AS arcref,\n                           \
  \ \"scanregistration.logaccumm\" AS logaccumm,\n                            \"scanregistration.errvalmm\"\
  \ AS errvalmm\n                          FROM (\n                            SELECT\n\
  \                              scanregistration.arcref AS \"scanregistration.arcref\"\
  ,\n                              AVG(scanregistration.logaccumm) AS \"scanregistration.logaccumm\"\
  ,\n                              AVG(scanregistration.errvalmm) AS \"scanregistration.errvalmm\"\
  \n                            FROM scanregistration AS scanregistration\n      \
  \                      GROUP BY\n                              scanregistration.arcref\n\
  \                          ) AS _inner\n                        )\n            \
  \          ) AS reg_per_arcref\n                        ON scans.arcref = reg_per_arcref.arcref\n\
  \                      LEFT JOIN (\n                        (\n                \
  \          SELECT\n                            \"scanmesh.zoneref\" AS zoneref,\n\
  \                            \"scanmesh.mfs\" AS mfs\n                         \
  \ FROM (\n                            SELECT\n                              scanmesh.zoneref\
  \ AS \"scanmesh.zoneref\",\n                              AVG(\n               \
  \                 (\n                                  (\n                     \
  \               scanmesh.facetfaces * 1.0 / (\n                                \
  \      scanmesh.facetverts * scanmesh.facetresmm * scanmesh.facetresmm\n       \
  \                             )\n                                  ) * 1000.0\n\
  \                                ) * (\n                                  (\n  \
  \                                  (\n                                      scanmesh.texpix\
  \ * 1.0 / (\n                                        SQRT(scanmesh.facetfaces) *\
  \ scanmesh.facetresmm\n                                      )\n               \
  \                     ) * 0.01\n                                  ) / 10.0\n   \
  \                             ) * (\n                                  1 + EXP(-scanmesh.geomdeltamm)\n\
  \                                )\n                              ) AS \"scanmesh.mfs\"\
  \n                            FROM scanmesh AS scanmesh\n                      \
  \      GROUP BY\n                              scanmesh.zoneref\n              \
  \            ) AS _inner\n                        )\n                      ) AS\
  \ mesh_per_zone\n                        ON scans.zoneref = mesh_per_zone.zoneref\n\
  \                      LEFT JOIN (\n                        (\n                \
  \          SELECT\n                            \"scanpointcloud.arcref\" AS arcref,\n\
  \                            \"scanpointcloud.sqs\" AS sqs,\n                  \
  \          \"scanpointcloud.sce\" AS sce,\n                            \"scanpointcloud.noisedb\"\
  \ AS noisedb,\n                            \"scanpointcloud.scanresolmm\" AS scanresolmm\n\
  \                          FROM (\n                            SELECT\n        \
  \                      scanpointcloud.arcref AS \"scanpointcloud.arcref\",\n   \
  \                           AVG(\n                                (\n          \
  \                        CASE\n                                    WHEN (\n    \
  \                                  (\n                                        LOG10(scanpointcloud.scanresolmm\
  \ * 1000.0) / LOG10(scanpointcloud.pointdense)\n                               \
  \       ) * 5.0\n                                    ) > 0\n                   \
  \                 THEN POWER(\n                                      10.0 / (\n\
  \                                        (\n                                   \
  \       LOG10(scanpointcloud.scanresolmm * 1000.0) / LOG10(scanpointcloud.pointdense)\n\
  \                                        ) * 5.0\n                             \
  \         ),\n                                      1.5\n                      \
  \              )\n                                    ELSE NULL\n              \
  \                    END\n                                ) * (\n              \
  \                    (\n                                    scanpointcloud.coverpct\
  \ * (\n                                      1 + (\n                           \
  \             scanpointcloud.lappct / 100.0\n                                  \
  \    ) * (\n                                        1 - scanpointcloud.coverpct\
  \ / 100.0\n                                      )\n                           \
  \         )\n                                  ) / 100.0\n                     \
  \           ) * POWER(1 - scanpointcloud.noisedb / 30.0, 2)\n                  \
  \            ) AS \"scanpointcloud.sqs\",\n                              AVG(\n\
  \                                scanpointcloud.coverpct * (\n                 \
  \                 1 + (\n                                    scanpointcloud.lappct\
  \ / 100.0\n                                  ) * (\n                           \
  \         1 - scanpointcloud.coverpct / 100.0\n                                \
  \  )\n                                )\n                              ) AS \"scanpointcloud.sce\"\
  ,\n                              AVG(scanpointcloud.noisedb) AS \"scanpointcloud.noisedb\"\
  ,\n                              AVG(scanpointcloud.scanresolmm) AS \"scanpointcloud.scanresolmm\"\
  \n                            FROM scanpointcloud AS scanpointcloud\n          \
  \                  GROUP BY\n                              scanpointcloud.arcref\n\
  \                          ) AS _inner\n                        )\n            \
  \          ) AS pc_per_arcref\n                        ON scans.arcref = pc_per_arcref.arcref\n\
  \                    ) AS _inner\n                  ) AS scans_keyed\n         \
  \         GROUP BY\n                    scans_keyed.questregistry,\n           \
  \         scans_keyed.arcref,\n                    scans_keyed.zoneref\n       \
  \         ) AS _inner\n              ) AS digital_preservation_quality\n       \
  \       GROUP BY\n                digital_preservation_quality.arcref,\n       \
  \         digital_preservation_quality.questregistry\n            ) AS _inner\n\
  \          ) AS dpq_per_scan\n          GROUP BY\n            dpq_per_scan.arcref\n\
  \        ) AS _inner\n      )\n    ) AS per_project_dpq\n      ON per_project_adc.arcref\
  \ = per_project_dpq.arcref\n  ) AS _inner\n) AS merged\nGROUP BY\n  merged.arcref,\n\
  \  CASE\n    WHEN merged.scan_count > 1\n    AND merged.avg_adc < 70\n    AND merged.per_project_dpq__avg_dpq\
  \ > 80\n    THEN 1\n    ELSE 0\n  END) AS _inner"
