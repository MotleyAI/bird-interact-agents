description: "Mesh-to-Point Ratio (MPR, KB #36): FacetVerts/TotalPts * 100 * (MCR/10)^0.3,\
  \ where MCR is Mesh Complexity Ratio (KB #4). Values around 25-30 indicate optimal\
  \ decimation. Multistage anchored at scans, joining scanmesh (per zoneref) and scanpointcloud\
  \ (per arcref).\n\n[kb=36]\nMPR = \\frac{FacetVerts}{TotalPts} \\times 100 \\times\
  \ \\left(\\frac{MCR}{10}\\right)^{0.3}, \\text{ where MCR is the Mesh Complexity\
  \ Ratio and values around 25-30 indicate optimal decimation for archaeological purposes\
  \ with appropriate feature preservation.} \u2014 Evaluates the efficiency of mesh\
  \ generation from point cloud data for optimal decimation determination.\n[/kb=36]"
