description: "Equipment Effectiveness Ratio (EER, KB #39): SQS * EquipStatus_value\
  \ / (PowerLevel * (101 - EquipAge_days)/365) * 25, where EquipStatus_value = 1.0\
  \ (Excellent), 0.7 (Good), 0.5 (Fair), 0.2 (Poor) and EquipAge_days = days since\
  \ EquipTune. Multistage: scanpointcloud (SQS per arcref) joined to scans (arcref\
  \ + zoneref) joined to scanprocessing (zoneref \u2192 equipref) joined to equipment.\n\
  \n[kb=39]\nEER = \\frac{SQS \\times EquipStatus\\_value}{PowerLevel \\times (101\
  \ - EquipAge\\_days) / 365} \\times 25, \\text{ where SQS is the Scan Quality Score,\
  \ EquipStatus_value is 1.0 for 'Excellent' to 0.2 for 'Poor', and EquipAge_days\
  \ is days since EquipTune, with higher values indicating more efficient use of equipment\
  \ relative to condition.} \u2014 Evaluates how effectively equipment was utilized\
  \ based on power consumption and scan quality relative to equipment capability.\n\
  [/kb=39]"
