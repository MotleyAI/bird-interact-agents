description: "Spatial Density Index (SDI, KB #34): TotalPts / (AreaM2 * 10^4) * sqrt(PointDense\
  \ / CloudDense). Assesses point cloud density relative to site dimensions for spatial\
  \ sampling adequacy. Multistage: scanpointcloud + scanspatial joined on arcref.\n\
  \n[kb=34]\nSDI = \\frac{TotalPts}{AreaM2 \\times 10^4} \\times \\left(\\frac{PointDense}{CloudDense}\\\
  right)^{0.5} \u2014 Assesses point cloud density relative to site dimensions for\
  \ spatial sampling adequacy.\n[/kb=34]"
