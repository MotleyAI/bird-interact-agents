version: 4
name: spatial_density_index
source_queries:
- version: 3
  name: pc_per_arcref
  source_model: scanpointcloud
  measures:
  - formula: totalpts:avg
    name: totalpts
  - formula: pointdense:avg
    name: pointdense
  - formula: clouddense:avg
