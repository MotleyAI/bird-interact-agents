  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  name: sp_per_arcref
  source_model: scanspatial
  measures:
  - formula: aream2:avg
    name: aream2
  dimensions:
  - name: arcref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: pc_per_arcref
    joins:
    - target_model: sp_per_arcref
      join_pairs:
      - - arcref
        - arcref
  measures:
  - formula: totalpts:avg / (sp_per_arcref.aream2:avg * 10000.0) * sqrt(pointdense:avg
