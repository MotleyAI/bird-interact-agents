    name: sdi
  dimensions:
  - name: arcref
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"pc_per_arcref.arcref\" AS arcref, \"pc_per_arcref.totalpts_avg\"\
  \ AS totalpts_avg, \"pc_per_arcref.pointdense_avg\" AS pointdense_avg, \"pc_per_arcref.clouddense_avg\"\
  \ AS clouddense_avg, \"pc_per_arcref.sdi\" AS sdi, \"pc_per_arcref.sp_per_arcref.aream2_avg\"\
  \ AS sp_per_arcref__aream2_avg FROM (WITH _base AS (\nSELECT\n  pc_per_arcref.arcref\
  \ AS \"pc_per_arcref.arcref\",\n  AVG(pc_per_arcref.totalpts) AS \"pc_per_arcref.totalpts_avg\"\
  ,\n  AVG(pc_per_arcref.pointdense) AS \"pc_per_arcref.pointdense_avg\",\n  AVG(pc_per_arcref.clouddense)\
  \ AS \"pc_per_arcref.clouddense_avg\"\nFROM (\n  SELECT\n    \"scanpointcloud.arcref\"\
  \ AS arcref,\n    \"scanpointcloud.totalpts\" AS totalpts,\n    \"scanpointcloud.pointdense\"\
  \ AS pointdense,\n    \"scanpointcloud.clouddense\" AS clouddense\n  FROM (\n  \
  \  SELECT\n      scanpointcloud.arcref AS \"scanpointcloud.arcref\",\n      AVG(scanpointcloud.totalpts)\
  \ AS \"scanpointcloud.totalpts\",\n      AVG(scanpointcloud.pointdense) AS \"scanpointcloud.pointdense\"\
  ,\n      AVG(scanpointcloud.clouddense) AS \"scanpointcloud.clouddense\"\n    FROM\
  \ scanpointcloud AS scanpointcloud\n    GROUP BY\n      scanpointcloud.arcref\n\
  \  ) AS _inner\n) AS pc_per_arcref\nGROUP BY\n  pc_per_arcref.arcref\n),\n_cm_pc_per_arcref__sp_per_arcref__aream2_avg\
  \ AS (\nSELECT\n  AVG(sp_per_arcref.aream2) AS \"pc_per_arcref.sp_per_arcref.aream2_avg\"\
  \nFROM (\n  SELECT\n    \"scanspatial.arcref\" AS arcref,\n    \"scanspatial.aream2\"\
  \ AS aream2\n  FROM (\n    SELECT\n      scanspatial.arcref AS \"scanspatial.arcref\"\
  ,\n      AVG(scanspatial.aream2) AS \"scanspatial.aream2\"\n    FROM scanspatial\
  \ AS scanspatial\n    GROUP BY\n      scanspatial.arcref\n  ) AS _inner\n) AS sp_per_arcref\n\
  ),\n_combined AS (\nSELECT _base.\"pc_per_arcref.arcref\", _base.\"pc_per_arcref.totalpts_avg\"\
  , _base.\"pc_per_arcref.pointdense_avg\", _base.\"pc_per_arcref.clouddense_avg\"\
  , _cm_pc_per_arcref__sp_per_arcref__aream2_avg.\"pc_per_arcref.sp_per_arcref.aream2_avg\"\
  \nFROM _base\nCROSS JOIN _cm_pc_per_arcref__sp_per_arcref__aream2_avg\n),\nstep1\
  \ AS (\nSELECT\n    \"pc_per_arcref.arcref\",\n    \"pc_per_arcref.clouddense_avg\"\
  ,\n    \"pc_per_arcref.pointdense_avg\",\n    \"pc_per_arcref.sp_per_arcref.aream2_avg\"\
  ,\n    \"pc_per_arcref.totalpts_avg\",\n    \"pc_per_arcref.totalpts_avg\" / (\"\
  pc_per_arcref.sp_per_arcref.aream2_avg\" * 10000.0) * sqrt(\"pc_per_arcref.pointdense_avg\"\
  \ / \"pc_per_arcref.clouddense_avg\") AS \"pc_per_arcref.sdi\"\nFROM _combined\n\
  )\nSELECT\n    \"pc_per_arcref.arcref\",\n    \"pc_per_arcref.clouddense_avg\",\n\
  \    \"pc_per_arcref.pointdense_avg\",\n    \"pc_per_arcref.sdi\",\n    \"pc_per_arcref.sp_per_arcref.aream2_avg\"\
  ,\n    \"pc_per_arcref.totalpts_avg\"\nFROM step1) AS _inner"
