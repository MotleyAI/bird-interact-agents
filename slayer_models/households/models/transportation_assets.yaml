version: 3
name: transportation_assets
sql_table: transportation_assets
query_variables: {}
data_source: households
columns:
- name: transref
  sql: transref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: housetag
  sql: housetag
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vehicleinventory
  sql: vehicleinventory
  type: string
  primary_key: false
  description: "JSONB with vehicle_counts (Auto_Count, Bike_Count, Motor_Count \u2014\
    \ KB #36) and Newest_Year (text ranges like '2010 to 2013', '2014 or newer', 'Not\
    \ applicable' \u2014 KB #10). Null counts default to 0."
  hidden: false
  meta:
    kb_ids:
    - 10
    - 36
- name: auto_count
  sql: COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Auto_Count'), 0)
  type: number
  primary_key: false
  description: "Cars owned by household (from vehicleinventory JSON; null \u2192 0)."
  hidden: false
- name: bike_count
  sql: COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Bike_Count'), 0)
  type: number
  primary_key: false
  description: "Bicycles owned by household (from vehicleinventory JSON; null \u2192\
    \ 0)."
  hidden: false
- name: motor_count
  sql: COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Motor_Count'), 0)
  type: number
  primary_key: false
  description: "Motorcycles/scooters owned by household (from vehicleinventory JSON;\
    \ null \u2192 0)."
  hidden: false
- name: newest_year_text
  sql: json_extract(vehicleinventory, '$.Newest_Year')
  type: string
  primary_key: false
  description: Newest vehicle year band as raw text from vehicleinventory JSON.
  hidden: false
- name: newest_year_score
  sql: CASE LOWER(TRIM(json_extract(vehicleinventory, '$.Newest_Year'))) WHEN '2014
    or newer' THEN 5 WHEN '2010 to 2013' THEN 4 WHEN '2005 to 2009' THEN 3 WHEN '2000
    to 2004' THEN 2 WHEN '1995 to 1999' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of Newest_Year band, used by Mobility Score (KB #18).'
  hidden: false
- name: vehicle_ownership_index
  sql: COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Auto_Count'), 0)
    + COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Bike_Count'), 0) +
    COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Motor_Count'), 0)
  type: number
  primary_key: false
  description: 'Vehicle Ownership Index (KB #14): Auto + Bike + Motor counts.'
  hidden: false
  meta:
    kb_id: 14
- name: mobility_score
  sql: (COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Auto_Count'), 0)
    + COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Bike_Count'), 0) +
    COALESCE(json_extract(vehicleinventory, '$.vehicle_counts.Motor_Count'), 0)) *
    (CASE LOWER(TRIM(json_extract(vehicleinventory, '$.Newest_Year'))) WHEN '2014
    or newer' THEN 5 WHEN '2010 to 2013' THEN 4 WHEN '2005 to 2009' THEN 3 WHEN '2000
    to 2004' THEN 2 WHEN '1995 to 1999' THEN 1 ELSE 0 END)
  type: number
  primary_key: false
  description: "Mobility Score (KB #18): vehicle_ownership_index \xD7 newest_year_score."
  hidden: false
  meta:
    kb_id: 18
measures: []
aggregations: []
joins:
- target_model: households
  join_pairs:
  - - housetag
    - housenum
  join_type: left
filters: []
hidden: false
