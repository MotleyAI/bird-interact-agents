version: 3
name: service_types
sql_table: service_types
query_variables: {}
data_source: households
columns:
- name: serviceref
  sql: serviceref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: domestichelp
  sql: domestichelp
  type: string
  primary_key: false
  description: 'Domestic worker availability (KB #8). ''Full-time'' (daily), ''Part-time''
    (periodic), ''Occasional'', ''None'', ''Live-in''. Null = informal/undisclosed.'
  hidden: false
  meta:
    kb_id: 8
- name: socsupport
  sql: socsupport
  type: string
  primary_key: false
  description: 'Social assistance participation (KB #9 / KB #37). Binary ''Yes'' /
    ''No''.'
  hidden: false
  meta:
    kb_ids:
    - 9
    - 37
- name: domestic_help_score
  sql: CASE LOWER(TRIM(domestichelp)) WHEN 'live-in' THEN 4 WHEN 'full-time' THEN
    3 WHEN 'part-time' THEN 2 WHEN 'occasional' THEN 1 WHEN 'none' THEN 0 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of domestichelp tier (KB #8).'
  hidden: false
- name: soc_support_score
  sql: CASE LOWER(TRIM(socsupport)) WHEN 'yes' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: '1 if household participates in social assistance, else 0 (KB #9).'
  hidden: false
- name: service_support_score
  sql: (CASE LOWER(TRIM(domestichelp)) WHEN 'live-in' THEN 4 WHEN 'full-time' THEN
    3 WHEN 'part-time' THEN 2 WHEN 'occasional' THEN 1 WHEN 'none' THEN 0 ELSE 0 END)
    + 2 * (CASE LOWER(TRIM(socsupport)) WHEN 'yes' THEN 1 ELSE 0 END)
  type: number
  primary_key: false
  description: "Service Support Score (KB #16): weighted sum of domestic-help tier\
    \ + 2 \xD7 socsupport indicator. KB doesn't specify exact weights; this uses 1\
    \ \xD7 domestic + 2 \xD7 socsupport."
  hidden: false
  meta:
    kb_id: 16
- name: is_supported_household
  sql: LOWER(TRIM(socsupport)) = 'yes'
  type: boolean
  primary_key: false
  description: 'Supported Household (KB #24): TRUE iff socsupport=''Yes''.'
  hidden: false
  meta:
    kb_id: 24
measures: []
aggregations: []
joins: []
filters: []
hidden: false
