version: 3
name: properties
sql_table: properties
query_variables: {}
data_source: households
columns:
- name: propref
  sql: propref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: houselink
  sql: houselink
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: infralink
  sql: infralink
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: dwelling_specs
  sql: dwelling_specs
  type: string
  primary_key: false
  description: "JSONB with Dwelling_Class ('Brickwork house', 'Apartment', 'Condominium',\
    \ etc \u2014 KB #6; case-mixed in data: APARTMENT/Apartment), Bath_Count (number\
    \ of bathrooms), Room_Count (number of bedrooms)."
  hidden: false
  meta:
    kb_id: 6
- name: bath_count
  sql: json_extract(dwelling_specs, '$.Bath_Count')
  type: number
  primary_key: false
  description: Number of bathrooms (extracted from dwelling_specs JSON).
  hidden: false
- name: room_count
  sql: json_extract(dwelling_specs, '$.Room_Count')
  type: number
  primary_key: false
  description: Number of bedrooms (extracted from dwelling_specs JSON).
  hidden: false
- name: dwelling_class
  sql: TRIM(json_extract(dwelling_specs, '$.Dwelling_Class'))
  type: string
  primary_key: false
  description: Dwelling class (extracted from dwelling_specs JSON).
  hidden: false
- name: household_density
  sql: households.residentcount * 1.0 / NULLIF(json_extract(dwelling_specs, '$.Room_Count'),
    0)
  type: number
  primary_key: false
  description: 'Household Density (KB #11): residents per bedroom.'
  hidden: false
  meta:
    kb_id: 11
- name: bathroom_ratio
  sql: json_extract(dwelling_specs, '$.Bath_Count') * 1.0 / NULLIF(households.residentcount,
    0)
  type: number
  primary_key: false
  description: 'Bathroom Ratio (KB #15): bathrooms per resident.'
  hidden: false
  meta:
    kb_id: 15
- name: dwelling_capacity
  sql: 2 * COALESCE(json_extract(dwelling_specs, '$.Room_Count'), 0) + COALESCE(json_extract(dwelling_specs,
    '$.Bath_Count'), 0)
  type: number
  primary_key: false
  description: "Dwelling Capacity (KB #17): 2 \xD7 bedrooms + bathrooms."
  hidden: false
  meta:
    kb_id: 17
- name: dwelling_type_score
  sql: CASE WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class')) LIKE '%brickwork%'
    THEN 4 WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class')) LIKE '%apartment%'
    THEN 3 ELSE 1 END
  type: number
  primary_key: false
  description: 'Dwelling Type Score (KB #44): Brickwork house=4, Apartment=3, else=1.
    LIKE patterns to absorb whitespace + case variations in raw JSON.'
  hidden: false
  meta:
    kb_id: 44
- name: living_condition_score
  sql: 0.5 * (CASE WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class')) LIKE
    '%brickwork%' THEN 4 WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class'))
    LIKE '%apartment%' THEN 3 ELSE 1 END) + 0.5 * (CASE WHEN LOWER(TRIM(infrastructure.wateraccess))
    IN ('yes', 'available', 'available at least in one room', 'piped') THEN 1.0 ELSE
    0.0 END + CASE WHEN LOWER(TRIM(infrastructure.roadsurface)) IN ('asphalt', 'concrete',
    'asphalt, concrete') THEN 1.0 WHEN LOWER(TRIM(infrastructure.roadsurface)) LIKE
    '%gravel%' THEN 0.5 ELSE 0.0 END + CASE WHEN LOWER(TRIM(infrastructure.parkavail))
    = 'available' THEN 1.0 ELSE 0.0 END) / 3.0
  type: number
  primary_key: false
  description: "Living Condition Score (KB #20): 0.5 \xD7 dwelling_type_score + 0.5\
    \ \xD7 infrastructure_quality_score. Inlined since neither helper is reachable\
    \ as a Column reference from here."
  hidden: false
  meta:
    kb_id: 20
- name: is_comfortable_living
  sql: (0.5 * (CASE WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class')) LIKE
    '%brickwork%' THEN 4 WHEN LOWER(json_extract(dwelling_specs, '$.Dwelling_Class'))
    LIKE '%apartment%' THEN 3 ELSE 1 END) + 0.5 * (CASE WHEN LOWER(TRIM(infrastructure.wateraccess))
    IN ('yes', 'available', 'available at least in one room', 'piped') THEN 1.0 ELSE
    0.0 END + CASE WHEN LOWER(TRIM(infrastructure.roadsurface)) IN ('asphalt', 'concrete',
    'asphalt, concrete') THEN 1.0 WHEN LOWER(TRIM(infrastructure.roadsurface)) LIKE
    '%gravel%' THEN 0.5 ELSE 0.0 END + CASE WHEN LOWER(TRIM(infrastructure.parkavail))
    = 'available' THEN 1.0 ELSE 0.0 END) / 3.0) > 3 AND (json_extract(dwelling_specs,
    '$.Bath_Count') * 1.0 / NULLIF(households.residentcount, 0)) > 0.5
  type: boolean
  primary_key: false
  description: 'Comfortable Living Household (KB #29): TRUE iff Living Condition Score
    > 3 AND Bathroom Ratio > 0.5.'
  hidden: false
  meta:
    kb_id: 29
measures: []
aggregations: []
joins:
- target_model: households
  join_pairs:
  - - houselink
    - housenum
  join_type: left
- target_model: infrastructure
  join_pairs:
  - - infralink
    - infraref
  join_type: left
filters: []
hidden: false
