version: 3
name: infrastructure
sql_table: infrastructure
query_variables: {}
data_source: households
columns:
- name: infraref
  sql: infraref
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: wateraccess
  sql: wateraccess
  type: string
  primary_key: false
  description: 'Piped water supply access type (KB #3). ''Yes'' (or ''available...'')
    indicates piped access; other values are non-piped statuses.'
  hidden: false
  meta:
    kb_id: 3
- name: roadsurface
  sql: roadsurface
  type: string
  primary_key: false
  description: 'Road surface / pavement type around the household (KB #4). Examples:
    ''Asphalt'', ''Concrete'', ''Gravel''.'
  hidden: false
  meta:
    kb_id: 4
- name: parkavail
  sql: parkavail
  type: string
  primary_key: false
  description: 'Private parking availability (KB #5). ''Available'' / ''not available''.'
  hidden: false
  meta:
    kb_id: 5
- name: water_access_score
  sql: CASE WHEN LOWER(TRIM(wateraccess)) IN ('yes', 'available', 'available at least
    in one room', 'piped') THEN 1.0 ELSE 0.0 END
  type: number
  primary_key: false
  description: 'Score component of Infrastructure Quality (KB #13): 1 if piped/available
    water, else 0.'
  hidden: false
- name: road_surface_score
  sql: CASE WHEN LOWER(TRIM(roadsurface)) IN ('asphalt', 'concrete', 'asphalt, concrete')
    THEN 1.0 WHEN LOWER(TRIM(roadsurface)) LIKE '%gravel%' THEN 0.5 ELSE 0.0 END
  type: number
  primary_key: false
  description: 'Score component of Infrastructure Quality (KB #13): asphalt/concrete=1,
    gravel=0.5, else 0.'
  hidden: false
- name: parking_availability_score
  sql: CASE WHEN LOWER(TRIM(parkavail)) = 'available' THEN 1.0 ELSE 0.0 END
  type: number
  primary_key: false
  description: 'Score component of Infrastructure Quality (KB #13): 1 if ''Available'',
    else 0.'
  hidden: false
- name: infrastructure_quality_score
  sql: (CASE WHEN LOWER(TRIM(wateraccess)) IN ('yes', 'available', 'available at least
    in one room', 'piped') THEN 1.0 ELSE 0.0 END + CASE WHEN LOWER(TRIM(roadsurface))
    IN ('asphalt', 'concrete', 'asphalt, concrete') THEN 1.0 WHEN LOWER(TRIM(roadsurface))
    LIKE '%gravel%' THEN 0.5 ELSE 0.0 END + CASE WHEN LOWER(TRIM(parkavail)) = 'available'
    THEN 1.0 ELSE 0.0 END) / 3.0
  type: number
  primary_key: false
  description: "Infrastructure Quality Score (KB #13): mean of water-access, road-surface,\
    \ parking-availability scores. 0.0\u20131.0."
  hidden: false
  meta:
    kb_id: 13
measures: []
aggregations: []
joins: []
filters: []
hidden: false
