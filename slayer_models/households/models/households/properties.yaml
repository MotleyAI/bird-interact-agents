version: 6
name: properties
sql_table: properties
query_variables: {}
data_source: households
columns:
- name: propref
  sql: propref
  type: INT
  primary_key: true
  description: A SERIAL primary key uniquely identifying each residential property
    record in the database. EX. 1,2,3
  hidden: false
  format:
    type: integer
- name: houselink
  sql: houselink
  type: INT
  primary_key: false
  description: Foreign key referencing households.HouseNum with unique constraint,
    ensuring 1:1 relationship between properties and households. EX.3,4,7
  hidden: false
  format:
    type: integer
- name: infralink
  sql: infralink
  type: INT
  primary_key: false
  description: Foreign key referencing infrastructure.InfraRef, indicating which infrastructure
    configuration applies to this property's location and services. EX.1,2
  hidden: false
  format:
    type: integer
- name: dwelling_specs
  sql: dwelling_specs
  type: TEXT
  primary_key: false
  description: JSONB column. Combines dwelling characteristics including structural
    type and room specifications for property classification and capacity assessment.
  hidden: false
  meta:
    jsonb: true
- name: dwelling_specs__Dwelling_Class
  sql: JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')
  type: TEXT
  primary_key: false
  description: "Dwelling type classification describing the structural and architectural\
    \ category of the residential unit. Contains NULL when dwelling type is non-standard,\
    \ mixed-use, or classification is pending assessment.\n\nLive data is noisy: 'Brickwork\
    \ house', 'Apartment'/'Apt', 'Brick house', 'Shack (with floor finish)', 'Unfinished\
    \ brickwork', 'Other', etc., with many case/whitespace variants. Use LOWER(TRIM(...))\
    \ plus LIKE patterns to filter.\n\n[kb=6]\nValues based on schema include 'Brickwork\
    \ house', 'Apartment', 'Condominium', etc. \u2014 Illustrates dwelling categories.\
    \ For scoring, 'Brickwork house' and 'Condominium' are 4 points, 'Apartment' is\
    \ 3 points, and all other types are 1 point.\n[/kb=6]"
  label: Dwelling Type
  hidden: false
  meta:
    derived_from:
      json_col: dwelling_specs
      path:
      - Dwelling_Class
    kb_id: 6
- name: dwelling_specs__Bath_Count
  sql: JSON_EXTRACT(dwelling_specs, '$.Bath_Count')
  type: TEXT
  primary_key: false
  description: Total number of bathrooms in the residential property, including full
    bathrooms and half-bathrooms. Contains NULL when bathroom count is not available
    or property has shared/communal bathroom facilities that cannot be counted per
    household. Ex. 1, 2, 3
  label: Bath Count
  hidden: false
  meta:
    derived_from:
      json_col: dwelling_specs
      path:
      - Bath_Count
- name: dwelling_specs__Room_Count
  sql: JSON_EXTRACT(dwelling_specs, '$.Room_Count')
  type: TEXT
  primary_key: false
  description: Total number of bedrooms in the residential property, representing
    the sleeping accommodation capacity. Contains NULL when room count is not available
    or property has non-standard room configurations that cannot be classified as
    bedrooms. Ex. 1, 2, 3
  label: Room Count
  hidden: false
  meta:
    derived_from:
      json_col: dwelling_specs
      path:
      - Room_Count
- name: dwelling_type_score
  sql: CASE WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class'))) LIKE
    'brickwork%' THEN 4 WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')))
    IN ('apartment', 'apt') THEN 3 ELSE 1 END
  type: INT
  primary_key: false
  description: "Dwelling Type Score per KB #44: 'Brickwork house' = 4, 'Apartment'\
    \ = 3, else 1. Pattern-matches on LOWER(TRIM(...)) of the Dwelling_Class JSON\
    \ leaf so case/whitespace variants resolve correctly. 'Apt' is treated as a synonym\
    \ for 'Apartment'. Used in the Living Condition Score (KB #20).\n\n[kb=44]\nA\
    \ scoring system where 'Brickwork house' receives 4 points, 'Apartment' receives\
    \ 3 points, and all other types receive 1 point. This score is used in broader\
    \ calculations like the Living Condition Score. \u2014 Assigns a numerical score\
    \ to different dwelling types based on a predefined quality ranking.\n[/kb=44]"
  label: Dwelling Type Score
  hidden: false
  meta:
    kb_id: 44
- name: bath_count_num
  sql: CAST(JSON_EXTRACT(dwelling_specs, '$.Bath_Count') AS INTEGER)
  type: INT
  primary_key: false
  description: 'Bath_Count JSON leaf cast to INTEGER for arithmetic. NULLs propagate
    when Bath_Count is missing (see KB DEV-1380: ''unknown'' semantics).'
  label: Bath Count (numeric)
  hidden: false
- name: room_count_num
  sql: CAST(JSON_EXTRACT(dwelling_specs, '$.Room_Count') AS INTEGER)
  type: INT
  primary_key: false
  description: Room_Count JSON leaf cast to INTEGER for arithmetic. NULLs propagate
    when Room_Count is missing.
  label: Room Count (numeric)
  hidden: false
- name: household_density
  sql: CAST(households.residentcount AS REAL) / NULLIF(CAST(JSON_EXTRACT(dwelling_specs,
    '$.Room_Count') AS REAL), 0)
  type: DOUBLE
  primary_key: false
  description: "Average residents per bedroom for the property's host household. NULLIF\
    \ on the denominator guards against bedroom_count = 0 \u2014 in that case density\
    \ is NULL rather than throwing.\n\n[kb=11]\nCalculated as the number of residents\
    \ divided by the number of bedrooms. \u2014 Calculates the average number of residents\
    \ per bedroom in a household.\n[/kb=11]"
  label: Household Density
  hidden: false
  meta:
    kb_id: 11
- name: bathroom_ratio
  sql: CAST(JSON_EXTRACT(dwelling_specs, '$.Bath_Count') AS REAL) / NULLIF(CAST(households.residentcount
    AS REAL), 0)
  type: DOUBLE
  primary_key: false
  description: "Bathrooms per resident for the host household. NULLIF on residentcount\
    \ guards against 0 (yields NULL rather than throw).\n\n[kb=15]\nCalculated as\
    \ the number of bathrooms divided by the number of residents. \u2014 Calculates\
    \ the number of bathrooms per resident in a household.\n[/kb=15]"
  label: Bathroom Ratio
  hidden: false
  meta:
    kb_id: 15
- name: dwelling_capacity
  sql: 2 * CAST(JSON_EXTRACT(dwelling_specs, '$.Room_Count') AS INTEGER) + CAST(JSON_EXTRACT(dwelling_specs,
    '$.Bath_Count') AS INTEGER)
  type: INT
  primary_key: false
  description: "Capacity = 2 \xD7 bedrooms + bathrooms. NULL propagates when either\
    \ input is NULL.\n\n[kb=17]\nCalculated as twice the number of bedrooms plus the\
    \ number of bathrooms. \u2014 Calculates the potential capacity of a dwelling\
    \ based on bedrooms and bathrooms.\n[/kb=17]"
  label: Dwelling Capacity
  hidden: false
  meta:
    kb_id: 17
- name: living_condition_score
  sql: 0.5 * CAST((CASE WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')))
    LIKE 'brickwork%' THEN 4 WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')))
    IN ('apartment', 'apt') THEN 3 ELSE 1 END) AS REAL) + 0.5 * infrastructure.infrastructure_quality_score
  type: DOUBLE
  primary_key: false
  description: "50/50 weighted average of the Dwelling Type Score (per KB #44, on\
    \ this row) and the Infrastructure Quality Score (per KB #13, reached via `infralink\
    \ \u2192 infrastructure`). Both inputs are bounded in [1, 4], so the composite\
    \ also lives in [1, 4].\n\n[kb=20]\nCalculated as a 50/50 weighted average of\
    \ the Dwelling Type score and the Infrastructure Quality Score. \u2014 Calculates\
    \ a composite score for a household's living conditions.\n[/kb=20]"
  label: Living Condition Score
  hidden: false
  meta:
    kb_id: 20
- name: is_comfortable_living_household
  sql: CASE WHEN (0.5 * CAST((CASE WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')))
    LIKE 'brickwork%' THEN 4 WHEN LOWER(TRIM(JSON_EXTRACT(dwelling_specs, '$.Dwelling_Class')))
    IN ('apartment', 'apt') THEN 3 ELSE 1 END) AS REAL) + 0.5 * infrastructure.infrastructure_quality_score)
    > 3 AND (CAST(JSON_EXTRACT(dwelling_specs, '$.Bath_Count') AS REAL) / NULLIF(CAST(households.residentcount
    AS REAL), 0)) > 0.5 THEN 1 ELSE 0 END
  type: BOOLEAN
  primary_key: false
  description: "Boolean (1/0): Living Condition Score > 3 AND Bathroom Ratio > 0.5,\
    \ both per the same-row inputs already encoded as `living_condition_score` (KB\
    \ #20) and `bathroom_ratio` (KB #15). Inlined here so the column doesn't depend\
    \ on a measure layer.\n\n[kb=29]\nA household is considered 'Comfortable' if its\
    \ Living Condition Score is greater than 3 AND its Bathroom Ratio is greater than\
    \ 0.5. \u2014 Defines a household with a high standard of living conditions.\n\
    [/kb=29]"
  label: Comfortable Living Household
  hidden: false
  meta:
    kb_id: 29
measures: []
aggregations: []
joins:
- target_model: households
  join_pairs:
  - - houselink
    - housenum
  join_type: left
- target_model: infrastructure
  join_pairs:
  - - infralink
    - infraref
  join_type: left
filters: []
hidden: false
