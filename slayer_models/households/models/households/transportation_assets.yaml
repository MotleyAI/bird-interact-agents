version: 6
name: transportation_assets
sql_table: transportation_assets
query_variables: {}
data_source: households
columns:
- name: transref
  sql: transref
  type: INT
  primary_key: true
  description: A SERIAL primary key uniquely identifying each transportation asset
    record for households. EX. 1,2,3
  hidden: false
  format:
    type: integer
- name: housetag
  sql: housetag
  type: INT
  primary_key: false
  description: Foreign key referencing households.HouseNum with unique constraint,
    ensuring 1:1 relationship for transportation assets per household. EX.3,4,7
  hidden: false
  format:
    type: integer
  sampled: 3 .. 6507
- name: vehicleinventory
  sql: vehicleinventory
  type: TEXT
  primary_key: false
  description: "JSONB column aggregating transportation assets owned by household,\
    \ including counts of different vehicle types (vehicle_counts.Auto_Count / Bike_Count\
    \ / Motor_Count) and the newest-vehicle year range. The leaves are extracted as\
    \ separate columns; KB 36's structural description lives here.\n\n[kb=36]\nAn\
    \ array of counts representing vehicle types. Null indicates unknown or unverified\
    \ ownership. \u2014 Illustrates the structure of vehicle ownership by type for\
    \ a household.\n[/kb=36]"
  label: Vehicle Type Distribution
  hidden: false
  meta:
    kb_id: 36
  sampled: '> 20 distinct'
- name: vehicleinventory__vehicle_counts__Auto_Count
  sql: JSON_EXTRACT(vehicleinventory, '$.vehicle_counts.Auto_Count')
  type: TEXT
  primary_key: false
  description: Number of passenger vehicles owned by the household, defaulting to
    0 if no vehicles are owned. Contains NULL when vehicle ownership status is unknown
    or verification is pending. ex.0
  label: Auto Count
  hidden: false
  meta:
    derived_from:
      json_col: vehicleinventory
      path:
      - vehicle_counts
      - Auto_Count
- name: vehicleinventory__vehicle_counts__Bike_Count
  sql: JSON_EXTRACT(vehicleinventory, '$.vehicle_counts.Bike_Count')
  type: TEXT
  primary_key: false
  description: Number of bicycles owned by the household for transportation and recreation,
    defaulting to 0 if none are owned. Contains NULL when bicycle ownership information
    is not available or not tracked. ex.0,1
  label: Bike Count
  hidden: false
  meta:
    derived_from:
      json_col: vehicleinventory
      path:
      - vehicle_counts
      - Bike_Count
- name: vehicleinventory__vehicle_counts__Motor_Count
  sql: JSON_EXTRACT(vehicleinventory, '$.vehicle_counts.Motor_Count')
  type: TEXT
  primary_key: false
  description: Number of motorcycles, scooters, or motorized two-wheelers owned by
    the household, defaulting to 0 if none are owned. Contains NULL when motorcycle
    ownership information is not available or not applicable. EX.0,1,2
  label: Motor Count
  hidden: false
  meta:
    derived_from:
      json_col: vehicleinventory
      path:
      - vehicle_counts
      - Motor_Count
- name: vehicleinventory__Newest_Year
  sql: JSON_EXTRACT(vehicleinventory, '$.Newest_Year')
  type: TEXT
  primary_key: false
  description: "Year of manufacture for the newest vehicle in the household's fleet,\
    \ stored as a free-text range. Sample values are mixed case and informal ('2010\
    \ TO 2013', 'after 2014', 'nOt apPLIcaBlE'). KB 18 (Mobility Score) cites this\
    \ column but does not specify the numeric mapping for the ranges.\n\n[kb=10]\n\
    Text ranges like '1995 to 1999', '2005 to 2009', or '2010 to 2013'. Null indicates\
    \ no vehicles or unknown age. \u2014 Illustrates the year ranges for the newest\
    \ vehicle owned by a household.\n[/kb=10]"
  label: Vehicle Year Range
  hidden: false
  meta:
    kb_id: 10
  sampled: '> 20 distinct'
- name: vehicle_ownership_index
  sql: COALESCE(CAST(vehicleinventory__vehicle_counts__Auto_Count AS REAL), 0) + COALESCE(CAST(vehicleinventory__vehicle_counts__Bike_Count
    AS REAL), 0) + COALESCE(CAST(vehicleinventory__vehicle_counts__Motor_Count AS
    REAL), 0)
  type: DOUBLE
  primary_key: false
  description: "Per column meanings ('defaulting to 0 if no vehicles are owned'),\
    \ the three counts coalesce to 0 before summing so the index is well-defined when\
    \ a sub-field is missing.\n\n[kb=14]\nCalculated as the sum of car, bicycle, and\
    \ motorcycle counts. \u2014 Calculates the total number of vehicles owned by a\
    \ household.\n[/kb=14]"
  label: Vehicle Ownership Index
  hidden: false
  meta:
    kb_id: 14
measures: []
aggregations: []
joins:
- target_model: households
  join_pairs:
  - - housetag
    - housenum
  join_type: left
filters: []
hidden: false
