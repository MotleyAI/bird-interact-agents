version: 6
name: infrastructure
sql_table: infrastructure
query_variables: {}
data_source: households
columns:
- name: infraref
  sql: infraref
  type: INT
  primary_key: true
  description: A SERIAL primary key uniquely identifying each infrastructure configuration
    record in the database. EX. 1,2,3
  hidden: false
  format:
    type: integer
- name: wateraccess
  sql: wateraccess
  type: TEXT
  primary_key: false
  description: Piped water supply access type indicating the household's water infrastructure
    connectivity. Part of unique constraint combination. ex.Yes, available at least
    in one room
  hidden: false
  sampled: " Yes, available at least in one room,  Yes, but only connected to a tap\
    \ outside of the house (in the property), Yes,\tavailable at least in one room,\
    \ Yes,\tbut only connected to a tap outside of the house (in the property), Yes,\
    \  available at least in one room, Yes,  but only connected to a tap outside of\
    \ the house (in the property), Yes, available at least in one room, Yes, available\
    \ at least in one room , Yes, but only connected to a tap outside of the house\
    \ (in the property), Yes, but only connected to a tap outside of the house (in\
    \ the property) "
- name: roadsurface
  sql: roadsurface
  type: TEXT
  primary_key: false
  description: Street pavement condition and type describing the road infrastructure
    quality around the household location. Part of unique constraint combination.
    EX. Asphalt, concrete;Gravel surface
  hidden: false
  sampled: " Asphalt, concrete,  Gravel surface, Asphalt,\tconcrete, Asphalt,  concrete,\
    \ Asphalt, concrete, Asphalt, concrete , Gravel surface"
- name: parkavail
  sql: parkavail
  type: TEXT
  primary_key: false
  description: Private parking space availability indicating whether households have
    dedicated parking facilities. Part of unique constraint combination. EX.Available,
    not available
  hidden: false
  sampled: " Available,  Not available, Available, Available , Not\tavailable, Not\
    \  available, Not available, Not available "
- name: wateraccess_score
  sql: CASE WHEN wateraccess IS NULL OR TRIM(wateraccess) = '' THEN NULL WHEN LOWER(TRIM(wateraccess))
    LIKE 'yes%' THEN 4 ELSE 1 END
  type: DOUBLE
  primary_key: false
  description: "Score derived from wateraccess by KB 3's mapping. Sample values all\
    \ start with 'Yes,...' so the 'Yes' branch covers piped access; any other non-NULL\
    \ string scores 1. NULL/blank wateraccess returns NULL so the score doesn't masquerade\
    \ as a low value when the data is missing.\n\n[kb=3]\nValues based on schema include\
    \ 'Yes' and other non-piped statuses. \u2014 Illustrates water supply types. For\
    \ scoring, 'Yes' (piped access) is assigned 4 points, while other statuses are\
    \ assigned 1 point.\n[/kb=3]"
  label: Water Access Type
  hidden: false
  meta:
    kb_id: 3
  sampled: 4.0 .. 4.0
- name: roadsurface_score
  sql: CASE WHEN roadsurface IS NULL OR TRIM(roadsurface) = '' THEN NULL WHEN LOWER(roadsurface)
    LIKE '%asphalt%' OR LOWER(roadsurface) LIKE '%concrete%' THEN 4 ELSE 1 END
  type: DOUBLE
  primary_key: false
  description: "NULL/blank roadsurface returns NULL so the score doesn't inflate the\
    \ IQS average for missing data.\n\n[kb=4]\nValues based on schema include 'Asphalt',\
    \ 'Concrete', 'Gravel', etc. \u2014 Illustrates road surface types. For scoring,\
    \ 'Asphalt' and 'Concrete' surfaces are assigned 4 points, while others are 1\
    \ point.\n[/kb=4]"
  label: Road Surface Quality
  hidden: false
  meta:
    kb_id: 4
  sampled: 1.0 .. 4.0
- name: parkavail_score
  sql: CASE WHEN parkavail IS NULL OR TRIM(parkavail) = '' THEN NULL WHEN LOWER(parkavail)
    LIKE '%not%' THEN 1 ELSE 4 END
  type: DOUBLE
  primary_key: false
  description: "Sample values include 'Available' and 'Not available' (with whitespace/tab\
    \ variants). Any non-NULL string containing 'not' scores 1; other non-NULL strings\
    \ score 4. NULL/blank parkavail returns NULL so the score doesn't get treated\
    \ as 'Available' for missing data.\n\n[kb=5]\nValues based on schema include 'Available'\
    \ and 'not available'. \u2014 Illustrates parking options. For scoring, 'Available'\
    \ status is assigned 4 points, while 'not available' is 1 point.\n[/kb=5]"
  label: Parking Availability
  hidden: false
  meta:
    kb_id: 5
  sampled: 1.0 .. 4.0
- name: infrastructure_quality_score
  sql: (CAST(CASE WHEN wateraccess IS NULL OR TRIM(wateraccess) = '' THEN NULL WHEN
    LOWER(TRIM(wateraccess)) LIKE 'yes%' THEN 4 ELSE 1 END AS REAL) + CAST(CASE WHEN
    roadsurface IS NULL OR TRIM(roadsurface) = '' THEN NULL WHEN LOWER(roadsurface)
    LIKE '%asphalt%' OR LOWER(roadsurface) LIKE '%concrete%' THEN 4 ELSE 1 END AS
    REAL) + CAST(CASE WHEN parkavail IS NULL OR TRIM(parkavail) = '' THEN NULL WHEN
    LOWER(parkavail) LIKE '%not%' THEN 1 ELSE 4 END AS REAL)) / 3.0
  type: DOUBLE
  primary_key: false
  description: "Inlines the three component scores rather than referring to wateraccess_score\
    \ / roadsurface_score / parkavail_score by name \u2014 SLayer does not recursively\
    \ expand same-model derived-column refs in Column.sql, so a name-based composite\
    \ emits literal column references that don't exist in the physical table (tracked\
    \ as motley-ai DEV-1410). If any component is NULL (missing base value) the sum\
    \ is NULL, propagating the unknown through the average rather than imputing a\
    \ value.\n\n[kb=13]\nCalculated as the average of the individual scores for Water\
    \ Access, Road Surface, and Parking Availability. \u2014 Calculates a composite\
    \ score for infrastructure quality.\n[/kb=13]"
  label: Infrastructure Quality Score
  hidden: false
  meta:
    kb_id: 13
  sampled: 2.0 .. 4.0
measures: []
aggregations: []
joins: []
filters: []
hidden: false
