version: 5
name: service_types
sql_table: service_types
query_variables: {}
data_source: households
columns:
- name: serviceref
  sql: serviceref
  type: INT
  primary_key: true
  hidden: false
  format:
    type: integer
- name: domestichelp
  sql: domestichelp
  type: TEXT
  primary_key: false
  description: "Domestic worker availability (KB #8). 'Full-time' (daily), 'Part-time'\
    \ (periodic), 'Occasional', 'None', 'Live-in'. Null = informal/undisclosed.\n\n\
    [kb=8]\nIncludes 'Full-time' (daily), 'Part-time' (periodic), 'Occasional' (as-needed),\
    \ 'None' (no help), and 'Live-in' (resident worker). Null indicates informal or\
    \ undisclosed arrangements. \u2014 Illustrates the types of domestic worker services\
    \ for households.\n[/kb=8]"
  label: Domestic Help Availability
  hidden: false
  meta:
    kb_id: 8
- name: socsupport
  sql: socsupport
  type: TEXT
  primary_key: false
  description: "Social assistance participation (KB #9 / KB #37). Binary 'Yes' / 'No'.\n\
    \n[kb=9]\nBinary indicator where 'Yes' means the household accepts social assistance\
    \ and 'No' means it does not. Part of unique constraint combination. \u2014 Indicates\
    \ whether a household participates in social assistance programs.\n[/kb=9]"
  label: Social Support Status
  hidden: false
  meta:
    kb_id: 9
- name: domestic_help_score
  sql: CASE LOWER(TRIM(domestichelp)) WHEN 'live-in' THEN 4 WHEN 'full-time' THEN
    3 WHEN 'part-time' THEN 2 WHEN 'occasional' THEN 1 WHEN 'none' THEN 0 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: 'Numeric mapping of domestichelp tier (KB #8).'
  hidden: false
- name: soc_support_score
  sql: CASE LOWER(TRIM(socsupport)) WHEN 'yes' THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: '1 if household participates in social assistance, else 0 (KB #9).'
  hidden: false
- name: service_support_score
  sql: (CASE LOWER(TRIM(domestichelp)) WHEN 'live-in' THEN 4 WHEN 'full-time' THEN
    3 WHEN 'part-time' THEN 2 WHEN 'occasional' THEN 1 WHEN 'none' THEN 0 ELSE 0 END)
    + 2 * (CASE LOWER(TRIM(socsupport)) WHEN 'yes' THEN 1 ELSE 0 END)
  type: DOUBLE
  primary_key: false
  description: 'Heuristic Service Support helper (KB #16 weights are unspecified in
    KB definition; agent should compose ad-hoc from domestic_help_score and soc_support_score
    at query time).'
  hidden: false
  meta: {}
- name: is_supported_household
  sql: LOWER(TRIM(socsupport)) = 'yes'
  type: BOOLEAN
  primary_key: false
  description: "Supported Household (KB #24): TRUE iff socsupport='Yes'.\n\n[kb=24]\n\
    A household with social support status marked as 'Yes'. \u2014 Defines a household\
    \ receiving social assistance.\n[/kb=24]"
  label: Supported Household
  hidden: false
  meta:
    kb_id: 24
measures: []
aggregations: []
joins: []
filters: []
hidden: false
