version: 6
name: service_types
sql_table: service_types
query_variables: {}
data_source: households
columns:
- name: serviceref
  sql: serviceref
  type: INT
  primary_key: true
  description: A SERIAL primary key uniquely identifying each social service type
    or package configuration available to households. Ex. 1,2,3
  hidden: false
  format:
    type: integer
- name: domestichelp
  sql: domestichelp
  type: TEXT
  primary_key: false
  description: "Domestic worker service availability indicating whether households\
    \ have access to or utilize domestic help services.\n\nLive data values include\
    \ 'No domestic workers', 'Yes, occasional', 'Yes, regular', 'Yes, living-in' (with\
    \ case/whitespace variants). Use LOWER(TRIM(...)) when filtering.\n\n[kb=8]\n\
    Includes 'Full-time' (daily), 'Part-time' (periodic), 'Occasional' (as-needed),\
    \ 'None' (no help), and 'Live-in' (resident worker). Null indicates informal or\
    \ undisclosed arrangements. \u2014 Illustrates the types of domestic worker services\
    \ for households.\n[/kb=8]"
  label: Domestic Help Availability
  hidden: false
  meta:
    kb_id: 8
- name: socsupport
  sql: socsupport
  type: TEXT
  primary_key: false
  description: "Social assistance program participation indicating whether a household\
    \ accepts social assistance. Part of unique constraint combination.\n\nLive data:\
    \ 'Yes' and 'No' with case/whitespace variants. Use LOWER(TRIM(...)) when filtering.\n\
    \n[kb=9]\nBinary indicator where 'Yes' means the household accepts social assistance\
    \ and 'No' means it does not. Part of unique constraint combination. \u2014 Indicates\
    \ whether a household participates in social assistance programs.\n[/kb=9]"
  label: Social Support Status
  hidden: false
  meta:
    kb_id: 9
- name: domestic_help_score
  sql: CASE WHEN LOWER(TRIM(domestichelp)) LIKE 'yes, regular%' OR LOWER(TRIM(domestichelp))
    LIKE 'yes, living-in%' THEN 4 WHEN LOWER(TRIM(domestichelp)) LIKE 'yes, occasional%'
    THEN 3 WHEN LOWER(TRIM(domestichelp)) LIKE 'yes%' THEN 2 ELSE 1 END
  type: INT
  primary_key: false
  description: 'Ordinal helper for service support: regular/live-in domestic help
    = 4, occasional = 3, other ''yes'' = 2, no domestic workers = 1. Used as a building
    block for KB #16 (Service Support Score) and KB #30. Not tagged with a KB id (KB
    #16 leaves weights unspecified).'
  label: Domestic Help Score
  hidden: false
- name: soc_support_score
  sql: CASE WHEN LOWER(TRIM(socsupport)) = 'yes' THEN 1 ELSE 0 END
  type: INT
  primary_key: false
  description: "Binary helper (1/0) for social-assistance participation: 'Yes' \u2192\
    \ 1, otherwise 0. Used as a building block for KB #16 and KB #30. Not tagged with\
    \ a KB id."
  label: Social Support Score
  hidden: false
- name: is_supported_household
  sql: CASE WHEN LOWER(TRIM(socsupport)) = 'yes' THEN 1 ELSE 0 END
  type: BOOLEAN
  primary_key: false
  description: "Boolean (1/0): household receives social assistance (socsupport =\
    \ 'Yes', normalized via LOWER(TRIM)).\n\n[kb=24]\nA household with social support\
    \ status marked as 'Yes'. \u2014 Defines a household receiving social assistance.\n\
    [/kb=24]"
  label: Supported Household
  hidden: false
  meta:
    kb_id: 24
measures: []
aggregations: []
joins: []
filters: []
hidden: false
