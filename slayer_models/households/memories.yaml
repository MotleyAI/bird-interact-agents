  learning: "KB 35 \u2014 Utility Access Level\n\nKB item (verbatim from households_kb.jsonl):\n\
    \  id: 35\n  knowledge: \"Utility Access Level\"\n  description: \"Illustrates\
    \ the level of utility connectivity available to households.\"\n  definition:\
    \ \"Includes 'Full' (all utilities like water and cable available), 'Partial'\
    \ (some utilities available), 'Basic' (only essential utilities like water), and\
    \ 'None' (no utility access). Null indicates unassessed connectivity.\"\n  type:\
    \ value_illustration\n  children_knowledge: [3, 7]\n\nReason: The schema has no\
    \ `utility_access_level` column. KB 3 (`infrastructure.wateraccess`) and KB 7\
    \ (`amenities.cablestatus`) cover individual utilities, but there is no documented\
    \ rule for combining them into the Full / Partial / Basic / None bands.\n\nStatus:\
    \ deferred \u2014 SCHEMA-GAP\n\nClarifying questions:\n  Q1: How should `wateraccess`\
    \ + `cablestatus` combine into Full / Partial / Basic / None (e.g. Full = both\
    \ available, Basic = only water, etc.)?\n  Q2: Are other utility columns (electricity,\
    \ gas, sewer) intended but missing from the schema, or is the level derived solely\
    \ from water + cable?\n\nRelated KB ids:\n  - KB 3 (Water Access Type) \u2014\
    \ water source\n  - KB 7 (Cable TV Status) \u2014 cable source\n  - KB 41 (Stable\
    \ Infrastructure Household) \u2014 cites KB 35 as a child\n\nRelevant entities:\n\
    \  - households.infrastructure.wateraccess\n  - households.amenities.cablestatus"
  entities:
  - households.infrastructure.wateraccess
  - households.amenities.cablestatus
  query: null
  created_at: '2026-05-13T17:46:46.935887Z'
