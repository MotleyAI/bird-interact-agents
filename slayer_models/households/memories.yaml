  learning: "KB 12 \u2014 Expenditure Ratio\n\nKB item (verbatim from households_kb.jsonl):\n\
    \  id: 12\n  knowledge: \"Expenditure Ratio\"\n  description: \"Calculates the\
    \ household's expenditure coefficient relative to its income bracket.\"\n  definition:\
    \ \"Calculated as the expenditure coefficient divided by a numeric mapping of\
    \ income bracket.\"\n  type: calculation_knowledge\n  children_knowledge: [2]\n\
    \nReason: The numerator (`socioeconomic__Expend_Coeff`, stored as TEXT but holding\
    \ floats) is in the schema, but the denominator requires a numeric mapping from\
    \ `socioeconomic__Income_Bracket` text values (R$ range strings like \"More than\
    \ R$ 1,760 and less than R$ 2,640\") to scalars. Neither the KB nor the schema\
    \ specifies that mapping (lower bound? midpoint? ordinal rank?), so any encoded\
    \ ratio would burn in an arbitrary policy.\n\nStatus: deferred \u2014 AMBIGUOUS-PROSE\n\
    \nClarifying questions:\n  Q1: How should each Income_Bracket R$ range string\
    \ map to a numeric value (use the lower bound, the midpoint, or an ordinal rank\
    \ 1..N)?\n  Q2: How should NULL Income_Bracket rows be treated \u2014 excluded,\
    \ mapped to 0, or kept as NULL?\n\nRelated KB ids:\n  - KB 2 (Income Classification)\
    \ \u2014 source column with unspecified numeric mapping\n  - KB 19 (Socioeconomic\
    \ Index) \u2014 consumes Expenditure Ratio as one term\n  - KB 28 (Economically\
    \ Stable Household) \u2014 consumes \"low Expenditure Ratio\"\n\nRelevant entities:\n\
    \  - households.households.socioeconomic__Income_Bracket\n  - households.households.socioeconomic__Expend_Coeff"
  entities:
  - households.households.socioeconomic__Income_Bracket
