  learning: "KB 34 \u2014 Residential Zone Types\n\nKB item (verbatim from households_kb.jsonl):\n\
    \  id: 34\n  knowledge: \"Residential Zone Types\"\n  description: \"Illustrates\
    \ the types of residential zones based on geographic classification.\"\n  definition:\
    \ \"Includes 'Urban' (densely populated city areas), 'Suburban' (residential outskirts),\
    \ 'Rural' (sparsely populated countryside), and 'Mixed' (transitional areas).\
    \ Null indicates unclassified or pending zoning.\"\n  type: value_illustration\n\
    \  children_knowledge: -1\n\nReason: The schema has no `residential_zone` column.\
    \ `locations` carries only `regioncode` (text) and `zonenum` (int); `households.locregion`\
    \ and `households.loczone` are foreign-key references with no documented categorical\
    \ mapping to Urban / Suburban / Rural / Mixed. KB 45 states that `loczone = 1`\
    \ defines an Urban Zone (encoded as `households.is_urban_zone`); no comparable\
    \ mappings exist for Suburban, Rural, or Mixed.\n\nStatus: deferred \u2014 SCHEMA-GAP\n\
    \nClarifying questions:\n  Q1: Which `loczone` numeric values (or which `regioncode`\
    \ strings) correspond to each of Urban / Suburban / Rural / Mixed?\n  Q2: Is the\
    \ zone classification derivable from other columns (e.g. infrastructure quality),\
    \ or does it require a new column?\n\nRelated KB ids:\n  - KB 40 (High-Mobility\
    \ Urban Household) \u2014 cites KB 34 as a child\n  - KB 45 (Urban Zone) \u2014\
    \ encodes the Urban case as loczone = 1\n\nRelevant entities:\n  - households.locations\n\
    \  - households.locations.zonenum\n  - households.locations.regioncode\n  - households.households.loczone\n\
    \  - households.households.is_urban_zone"
  entities:
  - households.locations
  - households.locations.zonenum
  - households.locations.regioncode
  - households.households.loczone
  - households.households.is_urban_zone
