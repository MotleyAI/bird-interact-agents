version: 3
name: transactions
sql_table: transactions
query_variables: {}
data_source: cybermarket
columns:
- name: txregistry
  sql: txregistry
  type: string
  primary_key: true
  hidden: false
- name: rectag
  sql: rectag
  type: string
  primary_key: false
  hidden: false
- name: eventstamp
  sql: eventstamp
  type: string
  primary_key: false
  hidden: false
- name: paymethod
  sql: paymethod
  type: string
  primary_key: false
  description: 'Payment method, by anonymity / traceability: ''Crypto_A'' typically
    Bitcoin (pseudonymous, public ledger); ''Crypto_B'' typically Monero / privacy
    coins (enhanced obfuscation); ''Crypto_C'' emerging / niche cryptocurrencies;
    ''Token'' platform-specific value exchange outside standard blockchains.'
  hidden: false
  meta:
    kb_id: 2
- name: payamtusd
  sql: payamtusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: txfeeusd
  sql: txfeeusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: escrowused
  sql: escrowused
  type: string
  primary_key: false
  hidden: false
- name: escrowhrs
  sql: escrowhrs
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: multisigflag
  sql: multisigflag
  type: string
  primary_key: false
  hidden: false
- name: txstatus
  sql: txstatus
  type: string
  primary_key: false
  description: 'Transaction lifecycle stage: ''Pending'' = initiated, awaiting verification
    or escrow; ''Completed'' = successfully executed; ''Cancelled'' = terminated before
    completion (often refund-pending); ''Disputed'' = contested, requiring arbitration
    (potential fraud / service failure).'
  hidden: false
  meta:
    kb_id: 3
- name: txfinishhrs
  sql: txfinishhrs
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: shipmethod
  sql: shipmethod
  type: string
  primary_key: false
  hidden: false
- name: shipregionsrc
  sql: shipregionsrc
  type: string
  primary_key: false
  hidden: false
- name: shipregiondst
  sql: shipregiondst
  type: string
  primary_key: false
  hidden: false
- name: crossborderflag
  sql: crossborderflag
  type: string
  primary_key: false
  hidden: false
- name: routecomplexity
  sql: routecomplexity
  type: string
  primary_key: false
  hidden: false
- name: mktref
  sql: mktref
  type: string
  primary_key: false
  hidden: false
- name: prodref
  sql: prodref
  type: string
  primary_key: false
  hidden: false
- name: buyref
  sql: buyref
  type: string
  primary_key: false
  hidden: false
- name: tas
  sql: (payamtusd * 1.0 / 1000) * (txfinishhrs * 1.0 / 24) * (1 + escrowhrs * 1.0
    / 100) * (1 - markets.esccomprate * 1.0 / 100)
  type: number
  primary_key: false
  description: 'Transaction Anomaly Score (TAS): (payamtusd/1000)*(txfinishhrs/24)*(1+escrowhrs/100)*(1-esccomprate/100).
    esccomprate is from the associated market (joined via mktref). Higher = more suspicious.'
  hidden: false
  meta:
    kb_id: 12
- name: prodtheme_weight
  sql: CASE products.prodtheme WHEN 'Digital' THEN 10 WHEN 'Data' THEN 20 WHEN 'Service'
    THEN 30 WHEN 'Physical' THEN 50 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric weight of the linked product''s prodtheme used by PRE: Digital=10,
    Data=20, Service=30, Physical=50.'
  hidden: false
  meta:
    kb_ids:
    - 4
- name: escrowused_numeric
  sql: CASE WHEN escrowused = 'Yes' THEN 0 WHEN escrowused = 'No' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of escrowused (used by PRE): 0 if escrow used (''Yes''),
    1 if not (''No'').'
  hidden: false
  meta:
    kb_ids:
    - 4
- name: pre
  sql: (CASE products.prodtheme WHEN 'Digital' THEN 10 WHEN 'Data' THEN 20 WHEN 'Service'
    THEN 30 WHEN 'Physical' THEN 50 ELSE 0 END) + (CASE WHEN escrowused = 'Yes' THEN
    0 WHEN escrowused = 'No' THEN 1 ELSE 0 END) * 10 - (escrowhrs * 1.0 / 24) + (payamtusd
    * 1.0 / 500)
  type: number
  primary_key: false
  description: 'Product Risk Exposure (PRE): prodtheme_weight + 10*escrowused_numeric
    - escrowhrs/24 + payamtusd/500. Encoded on transactions because both product theme
    (via prodref) and transaction-level escrow / pay fields are needed.'
  hidden: false
  meta:
    kb_id: 32
- name: is_suspicious_transaction_pattern
  sql: ((payamtusd * 1.0 / 1000) * (txfinishhrs * 1.0 / 24) * (1 + escrowhrs * 1.0
    / 100) * (1 - markets.esccomprate * 1.0 / 100)) > 75 AND paymethod = 'Crypto_B'
    AND (escrowused = 'No' OR escrowhrs < 24) AND routecomplexity = 'Complex'
  type: boolean
  primary_key: false
  description: 'Suspicious Transaction Pattern (KB #22): TAS > 75, paymethod = ''Crypto_B''
    (privacy coin), escrow disabled or <24h, routecomplexity = ''Complex''.'
  hidden: false
  meta:
    kb_id: 22
- name: is_high_exposure_product
  sql: ((CASE products.prodtheme WHEN 'Digital' THEN 10 WHEN 'Data' THEN 20 WHEN 'Service'
    THEN 30 WHEN 'Physical' THEN 50 ELSE 0 END) + (CASE WHEN escrowused = 'Yes' THEN
    0 WHEN escrowused = 'No' THEN 1 ELSE 0 END) * 10 - (escrowhrs * 1.0 / 24) + (payamtusd
    * 1.0 / 500)) > 60 AND products.prodtheme = 'Physical' AND escrowused = 'No' AND
    paymethod = 'Crypto_B'
  type: boolean
  primary_key: false
  description: 'High-Exposure Product (KB #42): PRE > 60, prodtheme=''Physical'',
    escrowused=''No'', paymethod=''Crypto_B''. Encoded on transactions (the row that
    carries pay/escrow/method and joins to product theme).'
  hidden: false
  meta:
    kb_id: 42
measures: []
aggregations: []
joins:
- target_model: buyers
  join_pairs:
  - - buyref
    - buyregistry
  join_type: left
- target_model: markets
  join_pairs:
  - - mktref
    - mktregistry
  join_type: left
- target_model: products
  join_pairs:
  - - prodref
    - prodregistry
  join_type: left
filters: []
description: 'Cybermarket transactions. One row per transaction, joined to its market
  (mktref), product (prodref), and buyer (buyref). Key dimensions: paymethod, txstatus,
  escrow flags, shipping method/region, route complexity. Numeric metrics: payamtusd,
  txfeeusd, escrowhrs, txfinishhrs.'
hidden: false
