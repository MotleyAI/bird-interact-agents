  label: cybermarket|riskanalysis|moneyrisk
  hidden: false
  meta:
    kb_id: 8
- name: ips
  sql: ((CASE lawinterest WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN
    3 WHEN 'Unknown' THEN 2 ELSE 2 END) * 30) + ((CASE regrisklvl WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN 'Unknown' THEN 2 ELSE 2 END) *
    20) + (riskanalysis.fraudprob * 100) - (compliancescore * 0.5) + (notescount *
    2)
  type: number
  primary_key: false
  description: "Investigation Priority Score (IPS): 30*lawinterest_numeric + 20*regrisklvl_numeric\
    \ + 100*fraudprob (from linked riskanalysis via riskref) - 0.5*compliancescore\
    \ + 2*notescount. Higher = higher priority.\n\n[kb=18]\nIPS = (lawinterest\\_numeric\
    \ \\times 30) + (regrisklvl\\_numeric \\times 20) + (fraudprob \\times 100) -\
    \ (compliancescore \\times 0.5) + (notescount \\times 2), \\text{where lawinterest\\\
    _numeric and regrisklvl\\_numeric map Low=1, Medium=2, High=3, Unknown=2, and\
    \ higher scores indicate higher priority.} \u2014 Determines how urgently an investigation\
    \ should be handled\n[/kb=18]"
  label: Investigation Priority Score (IPS)
  hidden: false
  meta:
    kb_id: 18
- name: cpra
  sql: (riskanalysis__communication.keymatchcount * 3) + (1 * 10) + (((riskanalysis.fraudprob
    * 100) + (riskanalysis.wallrisksc * 0.5) - (riskanalysis.wallage * 1.0 / 30) +
    (riskanalysis.wallturnrt * 10) + (riskanalysis.txvel * 1.0 / 10)) * 0.2) + ((riskanalysis__transactions__markets.mktspan
    * 1.0 / 365) * 5) - (compliancescore * 1.0 / 20)
  type: number
  primary_key: false
  description: "Cross-Platform Risk Amplification (CPRA, KB #38): keymatchcount*3\
    \ + COUNT(DISTINCT mktref)*10 + WRI*0.2 + (mktspan/365)*5 - compliancescore/20.\
    \ Schema shortfall: `riskanalysis` is per-transaction and the schema has no cross-market\
    \ entity identity, so COUNT(DISTINCT mktref) per entity literal-fits to 1 (per\
    \ W4c hint). keymatchcount comes from the linked communication, WRI from riskanalysis,\
    \ mktspan from the linked transaction's market, and compliancescore from this\
    \ investigation.\n\n[kb=38]\nCPRA = (keymatchcount \\times 3) + (COUNT(DISTINCT\
    \ mktref) \\times 10) + (WRI \\times 0.2) + (\\frac{mktspan}{365} \\times 5) -\
    \ (\\frac{compliancescore}{20}), \\text{where WRI is defined by the Wallet Risk\
    \ Index, platformcount is the count of distinct markets an entity operates on,\
    \ and higher values indicate greater cross-platform risk.} \u2014 Measures how\
    \ risk increases when an entity operates across multiple platforms\n[/kb=38]"
  label: Cross-Platform Risk Amplification (CPRA)
  hidden: false
  meta:
    kb_id: 38
- name: is_multi_platform_threat_entity
  sql: ((riskanalysis__communication.keymatchcount * 3) + (1 * 10) + (((riskanalysis.fraudprob
    * 100) + (riskanalysis.wallrisksc * 0.5) - (riskanalysis.wallage * 1.0 / 30) +
    (riskanalysis.wallturnrt * 10) + (riskanalysis.txvel * 1.0 / 10)) * 0.2) + ((riskanalysis__transactions__markets.mktspan
    * 1.0 / 365) * 5) - (compliancescore * 1.0 / 20)) > 80 AND riskanalysis__communication.keymatchcount
    > 30 AND ((riskanalysis.fraudprob * 100) + (riskanalysis.wallrisksc * 0.5) - (riskanalysis.wallage
    * 1.0 / 30) + (riskanalysis.wallturnrt * 10) + (riskanalysis.txvel * 1.0 / 10))
    > 70
  type: boolean
  primary_key: false
  description: "Multi-Platform Threat Entity (KB #48): CPRA > 80, displays Cross-Platform\
    \ Operator characteristics (KB #29: keymatchcount > 30 with cross-market identity),\
    \ WRI > 70, plus consistent OPSEC across platforms. Encoded on investigation so\
    \ it can reach communication / transactions / markets. Schema shortfall: cross-market\
    \ entity identity is not expressible (same issue as KB #29 / #38) \u2014 the 'operating\
    \ on >=3 markets' part of the Cross-Platform Operator predicate cannot be checked\
    \ against the current schema, and the 'consistent OPSEC across platforms' clause\
    \ is purely cross-row temporal / aggregate semantics that don't fit a row-level\
    \ boolean. The literal-fit predicate keeps the keymatchcount and WRI thresholds\
    \ and lets cross-market identity collapse to 1, matching the literal-fit choice\
    \ for CPRA / VNC.\n\n[kb=48]\nAn entity with CPRA > 80, displaying Cross-Platform\
    \ Operator characteristics, with high Wallet Risk Index scores (WRI > 70), and\
    \ consistently employing the same operational security tactics across platforms.\
    \ These entities represent priority targets for coordinated investigation efforts\
    \ due to their expanded reach. \u2014 Identifies high-risk entities operating\
    \ across multiple cybermarket platforms\n[/kb=48]"
  label: Multi-Platform Threat Entity
  hidden: false
  meta:
    kb_id: 48
