- name: txstatus
  sql: txstatus
  type: TEXT
  primary_key: false
  description: "Transaction lifecycle stage: 'Pending' = initiated, awaiting verification\
    \ or escrow; 'Completed' = successfully executed; 'Cancelled' = terminated before\
    \ completion (often refund-pending); 'Disputed' = contested, requiring arbitration\
    \ (potential fraud / service failure).\n\n[kb=3]\n'Pending' represents initiated\
    \ but incomplete transactions awaiting verification or escrow conditions; 'Completed'\
    \ indicates successfully executed transactions with all parties satisfied; 'Cancelled'\
    \ denotes transactions terminated before completion, often requiring refund processing;\
    \ 'Disputed' represents contested transactions requiring arbitration, indicating\
    \ potential fraud or service failure. \u2014 Explains the transaction lifecycle\
    \ stages and their implications\n[/kb=3]"
  label: cybermarket|transactions|txstatus
  hidden: false
