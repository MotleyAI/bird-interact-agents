- name: paymethod
  sql: paymethod
  type: TEXT
  primary_key: false
  description: "Payment method, by anonymity / traceability: 'Crypto_A' typically\
    \ Bitcoin (pseudonymous, public ledger); 'Crypto_B' typically Monero / privacy\
    \ coins (enhanced obfuscation); 'Crypto_C' emerging / niche cryptocurrencies;\
    \ 'Token' platform-specific value exchange outside standard blockchains.\n\n[kb=2]\n\
    Payment methods represent varying degrees of anonymity and traceability: 'Crypto_A'\
    \ typically refers to Bitcoin, offering pseudonymous transactions with public\
    \ ledgers; 'Crypto_B' often indicates Monero or similar privacy coins with enhanced\
    \ transaction obfuscation; 'Crypto_C' represents emerging or niche cryptocurrencies;\
    \ 'Token' indicates platform-specific value exchange systems that operate outside\
    \ traditional blockchain networks. \u2014 Explains the significance of different\
    \ payment methods\n[/kb=2]"
  label: cybermarket|transactions|paymethod
  hidden: false
  meta:
    kb_id: 2
