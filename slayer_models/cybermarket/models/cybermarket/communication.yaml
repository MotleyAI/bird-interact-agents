  type: string
  primary_key: false
  description: "Language / writing-style pattern: 'Consistent' = uniform pattern,\
    \ single user with established habits; 'Variable' = significant variations (multiple\
    \ users sharing an account, automated translation); 'Suspicious' = deliberate\
    \ masking via syntax switching / unnatural patterns (often deceptive).\n\n[kb=6]\n\
    'Consistent' indicates uniform linguistic patterns suggesting single-user accounts\
    \ with established communication habits; 'Variable' indicates significant linguistic\
    \ variations that may signal multiple users sharing an account or automated translation\
    \ tools; 'Suspicious' denotes deliberate attempts to mask writing style through\
    \ syntax switching or unnatural language patterns often associated with deception\
    \ attempts. \u2014 Explains the significance of language pattern classification\n\
