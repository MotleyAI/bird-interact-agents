- name: vpnflag_numeric
  sql: CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE
    0 END
  type: number
  primary_key: false
  description: "Numeric mapping of vpnflag used by CSR / APL / CPR: Yes=1, Suspected=0.5,\
    \ No=0.\n\n[kb=5]\n'Yes' indicates confirmed VPN usage, demonstrating deliberate\
    \ attempts to mask true location and identity; 'No' suggests direct connections\
    \ potentially revealing actual user locations; 'Suspected' indicates communication\
    \ patterns consistent with VPN usage but lacking definitive confirmation, requiring\
    \ further investigation to determine the true level of identity obfuscation. \u2014\
    \ Explains the significance of VPN detection in communication analysis\n[/kb=5]"
  label: cybermarket|communication|vpnflag
  hidden: false
  meta:
