- name: csr
  sql: (iptally * 5) + (tornodecount * 2) + ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN
    'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30) + (brwsrunique * 1.0 /
    10) + (susppatscore * 3) + (riskindiccount * 4)
  type: number
  primary_key: false
  description: "Communication Security Risk (CSR): 5*iptally + 2*tornodecount + 30*vpnflag_numeric\
    \ + brwsrunique/10 + 3*susppatscore + 4*riskindiccount. Higher = greater security\
    \ concern.\n\n[kb=13]\nCSR = (iptally \\times 5) + (tornodecount \\times 2) +\
    \ (vpnflag\\_numeric \\times 30) + \\frac{brwsrunique}{10} + (susppatscore \\\
    times 3) + (riskindiccount \\times 4), \\text{where vpnflag\\_numeric maps Yes=1,\
    \ Suspected=0.5, No=0, and higher scores indicate greater security concerns.}\
    \ \u2014 Evaluates the security risk of a communication channel\n[/kb=13]"
  label: Communication Security Risk (CSR)
  hidden: false
  meta:
    kb_id: 13
- name: apl
  sql: ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0
    ELSE 0 END) * 30) + (tornodecount * 2) + ((CASE encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 15) + (connpatscore
    * 0.2) + (brwsrunique * 1.0 / 20)
  type: number
  primary_key: false
  description: "Anonymity Protection Level (APL): 30*vpnflag_numeric + 2*tornodecount\
    \ + 15*encryptmethod_numeric + 0.2*connpatscore + brwsrunique/20. Higher = stronger\
    \ anonymity protection.\n\n[kb=19]\nAPL = (vpnflag\\_numeric \\times 30) + (tornodecount\
    \ \\times 2) + (encryptmethod\\_numeric \\times 15) + (connpatscore \\times 0.2)\
    \ + \\frac{brwsrunique}{20}, \\text{where vpnflag\\_numeric maps Yes=1, Suspected=0.5,\
    \ No=0, encryptmethod\\_numeric maps Standard=1, Enhanced=2, Custom=3, else=0\
    \ and higher scores indicate stronger anonymity protections.} \u2014 Measures\
    \ how well a user's identity is protected\n[/kb=19]"
  label: Anonymity Protection Level (APL)
  hidden: false
  meta:
    kb_id: 19
- name: cpr
  sql: ((CASE langpattern WHEN 'Consistent' THEN 1 WHEN 'Variable' THEN 2 WHEN 'Suspicious'
    THEN 3 ELSE 0 END) * 15) + (((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag
    WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30)
    + (brwsrunique * 1.0 / 10) + (susppatscore * 3) + (riskindiccount * 4)) * 0.2)
    + (msgtally * 0.5) - (1 - (CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN
    0.5 WHEN 'No' THEN 0 ELSE 0 END)) * 20
  type: number
  primary_key: false
  description: "Communication Pattern Risk (CPR): 15*langpattern_numeric + 0.2*CSR\
    \ + 0.5*msgtally - 20*(1 - vpnflag_numeric). Higher = more suspicious communication.\n\
    \n[kb=33]\nCPR = (langpattern_numeric \\times 15) + (CSR \\times 0.2) + (msgtally\
    \ \\times 0.5) - (1 - vpnflag_numeric) \\times 20, \\text{where langpattern_numeric\
    \ maps Consistent=1, Variable=2, Suspicious=3 as explained in the language pattern\
    \ classification, and higher scores represent more suspicious communication behavior.}\
    \ \u2014 Evaluates how suspicious a communication pattern is based on multiple\
    \ factors\n[/kb=33]"
  label: Communication Pattern Risk (CPR)
  hidden: false
  meta:
    kb_id: 33
- name: is_identity_protected_user
  sql: (((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN
    0 ELSE 0 END) * 30) + (tornodecount * 2) + ((CASE encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 15) + (connpatscore
    * 0.2) + (brwsrunique * 1.0 / 20)) > 100 AND tornodecount > 20 AND vpnflag = 'Yes'
    AND encryptmethod = 'Custom'
  type: boolean
  primary_key: false
  description: "Identity-Protected User (KB #26): APL > 100, tornodecount > 20, vpnflag='Yes',\
    \ encryptmethod='Custom'.\n\n[kb=26]\nA user with APL > 100, consistently using\
    \ TOR (tornodecount > 20), employing VPN protection (vpnflag = 'Yes'), and utilizing\
    \ custom encryption methods. These users demonstrate sophisticated operational\
    \ security requiring specialized investigation techniques. \u2014 Identifies users\
    \ with robust anonymity protections\n[/kb=26]"
  label: Identity-Protected User
  hidden: false
  meta:
    kb_id: 26
- name: is_deceptive_communication_pattern
  sql: (((CASE langpattern WHEN 'Consistent' THEN 1 WHEN 'Variable' THEN 2 WHEN 'Suspicious'
    THEN 3 ELSE 0 END) * 15) + (((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag
    WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30)
    + (brwsrunique * 1.0 / 10) + (susppatscore * 3) + (riskindiccount * 4)) * 0.2)
    + (msgtally * 0.5) - (1 - (CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN
    0.5 WHEN 'No' THEN 0 ELSE 0 END)) * 20) > 70 AND langpattern = 'Suspicious' AND
    ((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected'
    THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30) + (brwsrunique * 1.0 / 10) + (susppatscore
    * 3) + (riskindiccount * 4)) > 80
  type: boolean
  primary_key: false
  description: "Deceptive Communication Pattern (KB #43): CPR > 70, langpattern='Suspicious',\
    \ CSR > 80. (KB also mentions 'frequently changing connection parameters' but\
    \ the schema has no such column; encoded predicate uses the three numeric/categorical\
    \ conditions.)\n\n[kb=43]\nA communication with CPR > 70, 'Suspicious' language\
    \ patterns as defined in the language pattern classification, high CSR values\
    \ (CSR > 80), and frequently changing connection parameters. These patterns suggest\
    \ deliberate attempts to obfuscate identity and intentions. \u2014 Identifies\
    \ communication exhibiting signs of deliberate deception\n[/kb=43]"
  label: Deceptive Communication Pattern
  hidden: false
  meta:
    kb_id: 43
- name: is_cross_platform_operator
  sql: keymatchcount > 30 AND 1 >= 3
  type: boolean
  primary_key: false
  description: "Cross-Platform Operator (KB #29): identifies entities with keymatchcount\
    \ > 30 operating on three or more markets simultaneously, with consistent security\
    \ and similar transaction patterns across markets. Schema shortfall: the mini-interact\
    \ schema has no cross-market entity identity column (commregistry / vendregistry\
    \ / buyregistry are unique per market), so COUNT(DISTINCT mktref) per entity literal-fits\
    \ to 1 (per W4c hint), making the `>= 3` clause always false. The cross-market\
    \ consistency + similarity requirements are also not expressible row-by-row. Encoded\
    \ as a literal-fit predicate for verifier coverage; produces no positives until\
    \ cross-market identity is added to the schema.\n\n[kb=29]\nAn entity identified\
    \ through matching cryptographic or communication fingerprints (keymatchcount\
    \ > 30) operating on three or more markets simultaneously, maintaining consistent\
    \ security practices, and exhibiting similar transaction patterns across platforms.\
    \ These operators represent higher-value intelligence targets due to their broader\
    \ cybermarket ecosystem involvement. \u2014 Identifies entities operating across\
    \ multiple cybermarket platforms\n[/kb=29]"
  label: Cross-Platform Operator
  hidden: false
  meta:
    kb_id: 29
