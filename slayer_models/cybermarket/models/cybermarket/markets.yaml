  description: "Market scale and reach: 'Small' (<10k monthly users, limited vendors),\
    \ 'Medium' (10-50k users, moderate vendor diversity), 'Large' (50-100k users,\
    \ extensive catalogs), 'Mega' (>100k users, comprehensive vendor networks; highest-risk\
    \ monitoring targets).\n\n[kb=1]\nSize clusters represent market scale and reach:\
    \ 'Small' markets typically have under 10,000 monthly users and limited vendor\
    \ presence; 'Medium' markets host 10,000-50,000 monthly users with moderate vendor\
    \ diversity; 'Large' markets serve 50,000-100,000 users with extensive product\
    \ catalogs; 'Mega' markets exceed 100,000 monthly users with comprehensive vendor\
    \ networks and represent the highest-risk monitoring targets. \u2014 Illustrates\
    \ the significance of market size classification\n[/kb=1]"
