    MRS = \\frac{dlyflow}{1000} + (esccomprate \\times 0.2) + (interscore \\times\
    \ 0.3) + (vendcount \\times 0.1) - \\frac{mktspan}{100}, \\text{where higher scores\
    \ indicate greater risk exposure requiring enhanced monitoring.} \u2014 Calculates\
