- name: prodtheme
  sql: prodtheme
  type: string
  primary_key: false
  description: "Product theme classification, used for enforcement risk: 'Digital'\
    \ = software, credentials, virtual goods (no shipping); 'Data' = databases, PII,\
    \ IP packages; 'Service' = activities (hacking, docs, technical assistance); 'Physical'\
    \ = tangible goods requiring shipment (highest exposure-risk category).\n\n[kb=4]\n\
    'Digital' products include software, account credentials, and virtual goods requiring\
    \ no physical shipping; 'Data' encompasses information packages like databases,\
    \ personal information, and intellectual property; 'Service' refers to activities\
    \ rather than tangible products, including hacking, documentation, or technical\
    \ assistance; 'Physical' indicates tangible goods requiring actual shipment through\
    \ delivery networks, representing the highest exposure risk category. \u2014 Clarifies\
    \ product theme classifications and their enforcement implications\n[/kb=4]"
  label: cybermarket|products|prodtheme
  hidden: false
  meta:
    kb_id: 4
