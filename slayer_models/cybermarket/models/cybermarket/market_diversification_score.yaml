version: 5
name: market_diversification_score
source_queries:
- version: 3
  name: subcat_per_market
  source_model: products
  measures:
  - formula: prodsubcat:count_distinct
    name: distinct_prodsubcat_count
  dimensions:
  - name: mktref
    model: vendors
  whole_periods_only: false
- version: 3
  name: tx_per_market
  source_model: transactions
  measures:
  - formula: '*:count'
    name: tx_count
  dimensions:
  - name: mktref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: markets
    joins:
    - target_model: subcat_per_market
      join_pairs:
      - - mktregistry
        - vendors__mktref
    - target_model: tx_per_market
      join_pairs:
      - - mktregistry
        - mktref
    columns:
    - name: mds
      type: DOUBLE
      sql: (COALESCE(subcat_per_market.distinct_prodsubcat_count, 0) * 1.0 / 5) +
        (markets.vendcount * 1.0 / 50) + ((COALESCE(tx_per_market.tx_count, 0) * 1.0
        / NULLIF(markets.vendcount, 0)) * 0.5) - ((CASE markets.mktclass WHEN 'Forum'
        THEN 1 WHEN 'Service' THEN 2 WHEN 'Marketplace' THEN 4 WHEN 'Exchange' THEN
        3 ELSE 0 END) * 1.0 / 10)
    - name: distinct_prodsubcat_count_col
      type: DOUBLE
      sql: COALESCE(subcat_per_market.distinct_prodsubcat_count, 0)
  dimensions:
  - name: mktregistry
  - name: mds
  - name: distinct_prodsubcat_count_col
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"markets.mktregistry\" AS mktregistry, \"markets.mds\"\
  \ AS mds, \"markets.distinct_prodsubcat_count_col\" AS distinct_prodsubcat_count_col\
  \ FROM (SELECT\n  markets.mktregistry AS \"markets.mktregistry\",\n  (\n    COALESCE(subcat_per_market.distinct_prodsubcat_count,\
  \ 0) * 1.0 / 5\n  ) + (\n    markets.vendcount * 1.0 / 50\n  ) + (\n    (\n    \
  \  COALESCE(tx_per_market.tx_count, 0) * 1.0 / NULLIF(markets.vendcount, 0)\n  \
  \  ) * 0.5\n  ) - (\n    (\n      CASE markets.mktclass\n        WHEN 'Forum'\n\
  \        THEN 1\n        WHEN 'Service'\n        THEN 2\n        WHEN 'Marketplace'\n\
  \        THEN 4\n        WHEN 'Exchange'\n        THEN 3\n        ELSE 0\n     \
  \ END\n    ) * 1.0 / 10\n  ) AS \"markets.mds\",\n  COALESCE(subcat_per_market.distinct_prodsubcat_count,\
  \ 0) AS \"markets.distinct_prodsubcat_count_col\"\nFROM markets AS markets\nLEFT\
  \ JOIN (\n  (\n    SELECT\n      \"transactions.mktref\" AS mktref,\n      \"transactions.tx_count\"\
  \ AS tx_count\n    FROM (\n      SELECT\n        transactions.mktref AS \"transactions.mktref\"\
  ,\n        COUNT(*) AS \"transactions.tx_count\"\n      FROM transactions AS transactions\n\
  \      GROUP BY\n        transactions.mktref\n    ) AS _inner\n  )\n) AS tx_per_market\n\
  \  ON markets.mktregistry = tx_per_market.mktref\nLEFT JOIN (\n  (\n    SELECT\n\
  \      \"products.vendors.mktref\" AS vendors__mktref,\n      \"products.distinct_prodsubcat_count\"\
  \ AS distinct_prodsubcat_count\n    FROM (\n      SELECT\n        vendors.mktref\
  \ AS \"products.vendors.mktref\",\n        COUNT(DISTINCT products.prodsubcat) AS\
  \ \"products.distinct_prodsubcat_count\"\n      FROM products AS products\n    \
  \  LEFT JOIN vendors AS vendors\n        ON products.vendref = vendors.vendregistry\n\
  \      GROUP BY\n        vendors.mktref\n    ) AS _inner\n  )\n) AS subcat_per_market\n\
  \  ON markets.mktregistry = subcat_per_market.vendors__mktref) AS _inner"
data_source: cybermarket
columns:
- name: mktregistry
  sql: mktregistry
  type: TEXT
  primary_key: false
  hidden: false
- name: mds
  sql: mds
  type: DOUBLE
  primary_key: false
  hidden: false
- name: distinct_prodsubcat_count_col
  sql: distinct_prodsubcat_count_col
  type: DOUBLE
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Market Diversification Score (MDS, KB #35) per market: COUNT(DISTINCT\
  \ prodsubcat)/5 + vendcount/50 + (COUNT(txregistry)/vendcount)*0.5 - mktclass_weight/10.\
  \ mktclass_weight: Forum=1, Service=2, Marketplace=4, Exchange=3. Multistage: stage\
  \ 1 counts distinct prodsubcat per market by aggregating products through vendors\
  \ (products\u2192vendors.mktref). Stage 2 counts transactions per market. Stage\
  \ 3 anchors at markets and composes the formula.\n\n[kb=35]\nMDS = \\frac{COUNT(DISTINCT\
  \ prodsubcat)}{5} + \\frac{vendcount}{50} + \\frac{COUNT(txregistry)}{vendcount}\
  \ \\times 0.5 - \\frac{mktclass\\_weight}{10}, \\text{where mktclass\\_weight assigns\
  \ Forum=1, Service=2, Marketplace=4, Exchange=3 as per the market classification\
  \ system defined in cybermarket|markets|mktclass, and higher scores represent greater\
  \ market diversification.} \u2014 Evaluates the diversity of products and vendors\
  \ within a market\n[/kb=35]"
hidden: false
meta:
  kb_id: 35
