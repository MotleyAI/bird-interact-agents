- name: alertsev
  sql: alertsev
  type: TEXT
  primary_key: false
  description: "Alert severity: 'Low' = minor anomaly, minimal attention; 'Medium'\
    \ = notable deviation, investigate within standard timeframes; 'High' = significant\
    \ security concern, prompt attention; 'Critical' = severe, immediate threat requiring\
    \ urgent action / emergency response.\n\n[kb=9]\n'Low' alerts indicate minor anomalies\
    \ requiring minimal attention and posing limited security risk; 'Medium' alerts\
    \ signal notable deviations from baseline behavior requiring investigation within\
    \ standard timeframes; 'High' alerts denote significant security concerns demanding\
    \ prompt attention and intervention; 'Critical' alerts represent severe and immediate\
    \ security threats requiring urgent action and potential emergency response protocols.\
    \ \u2014 Explains the alert severity classification system\n[/kb=9]"
  label: cybermarket|securitymonitoring|alertsev
