version: 3
name: riskanalysis
sql_table: riskanalysis
query_variables: {}
data_source: cybermarket
columns:
- name: riskregistry
  sql: riskregistry
  type: string
  primary_key: true
  hidden: false
- name: fraudprob
  sql: fraudprob
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: moneyrisk
  sql: moneyrisk
  type: string
  primary_key: false
  description: 'Money-laundering risk: ''Low'' = transparent flows, consistent monetary
    behaviour; ''Medium'' = unusual patterns warranting monitoring; ''High'' = significant
    red flags (rapid transfers, unusual chains, known high-risk wallet associations);
    ''Unknown'' = insufficient data (itself a risk indicator due to potential deliberate
    obfuscation).'
  hidden: false
  meta:
    kb_id: 8
- name: linkedtxcount
  sql: linkedtxcount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: txchainlen
  sql: txchainlen
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: wallrisksc
  sql: wallrisksc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: wallage
  sql: wallage
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: wallbalusd
  sql: wallbalusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: wallturnrt
  sql: wallturnrt
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: txvel
  sql: txvel
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: profilecomplete
  sql: profilecomplete
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: idverifyscore
  sql: idverifyscore
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: feedbackauthscore
  sql: feedbackauthscore
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: commref
  sql: commref
  type: string
  primary_key: false
  hidden: false
- name: txref
  sql: txref
  type: string
  primary_key: false
  hidden: false
- name: network_behavior_analytics
  sql: network_behavior_analytics
  type: string
  primary_key: false
  hidden: false
- name: wri
  sql: (fraudprob * 100) + (wallrisksc * 0.5) - (wallage * 1.0 / 30) + (wallturnrt
    * 10) + (txvel * 1.0 / 10)
  type: number
  primary_key: false
  description: 'Wallet Risk Index (WRI): 100*fraudprob + 0.5*wallrisksc - wallage/30
    + 10*wallturnrt + txvel/10. Higher = more suspicious wallet activity.'
  hidden: false
  meta:
    kb_id: 14
- name: tcr
  sql: (txchainlen * 10) + (linkedtxcount * 5) + (fraudprob * 100) - (profilecomplete
    * 0.5) - (idverifyscore * 0.5)
  type: number
  primary_key: false
  description: 'Transaction Chain Risk (TCR): 10*txchainlen + 5*linkedtxcount + 100*fraudprob
    - 0.5*profilecomplete - 0.5*idverifyscore. Higher = higher-risk transaction chain.'
  hidden: false
  meta:
    kb_id: 16
- name: moneyrisk_numeric
  sql: CASE moneyrisk WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN
    'Unknown' THEN 2 ELSE 2 END
  type: number
  primary_key: false
  description: 'Numeric mapping of moneyrisk used by MFC: Low=1, Medium=2, High=3,
    Unknown=2.'
  hidden: false
  meta:
    kb_ids:
    - 8
- name: mfc
  sql: (txchainlen * 5) + (linkedtxcount * 3) + ((CASE moneyrisk WHEN 'Low' THEN 1
    WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN 'Unknown' THEN 2 ELSE 2 END) * 15)
    + (((txchainlen * 10) + (linkedtxcount * 5) + (fraudprob * 100) - (profilecomplete
    * 0.5) - (idverifyscore * 0.5)) * 0.2) - (profilecomplete * 10)
  type: number
  primary_key: false
  description: 'Money Flow Complexity (MFC): 5*txchainlen + 3*linkedtxcount + 15*moneyrisk_numeric
    + 0.2*TCR - 10*profilecomplete. Higher = more complex money flows.'
  hidden: false
  meta:
    kb_id: 39
- name: is_money_laundering_indicator
  sql: ((txchainlen * 10) + (linkedtxcount * 5) + (fraudprob * 100) - (profilecomplete
    * 0.5) - (idverifyscore * 0.5)) > 150 AND wallage < 30 AND wallturnrt > 5 AND
    linkedtxcount >= 3
  type: boolean
  primary_key: false
  description: 'Money Laundering Indicator (KB #23): TCR > 150, wallage < 30, wallturnrt
    > 5, linkedtxcount >= 3.'
  hidden: false
  meta:
    kb_id: 23
- name: is_complex_money_laundering_operation
  sql: ((txchainlen * 5) + (linkedtxcount * 3) + ((CASE moneyrisk WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN 'Unknown' THEN 2 ELSE 2 END) *
    15) + (((txchainlen * 10) + (linkedtxcount * 5) + (fraudprob * 100) - (profilecomplete
    * 0.5) - (idverifyscore * 0.5)) * 0.2) - (profilecomplete * 10)) > 90 AND ((txchainlen
    * 10) + (linkedtxcount * 5) + (fraudprob * 100) - (profilecomplete * 0.5) - (idverifyscore
    * 0.5)) > 180 AND moneyrisk = 'High' AND ((txchainlen * 10) + (linkedtxcount *
    5) + (fraudprob * 100) - (profilecomplete * 0.5) - (idverifyscore * 0.5)) > 150
    AND wallage < 30 AND wallturnrt > 5 AND linkedtxcount >= 3
  type: boolean
  primary_key: false
  description: 'Complex Money Laundering Operation (KB #49): MFC > 90, displays Money
    Laundering Indicator (KB #23), TCR > 180, moneyrisk = ''High''.'
  hidden: false
  meta:
    kb_id: 49
- name: is_sophisticated_opsec_entity
  sql: ((((CASE communication.vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5
    WHEN 'No' THEN 0 ELSE 0 END) * 30) + (communication.tornodecount * 2) + ((CASE
    communication.encryptmethod WHEN 'Standard' THEN 1 WHEN 'Enhanced' THEN 2 WHEN
    'Custom' THEN 3 ELSE 0 END) * 15) + (communication.connpatscore * 0.2) + (communication.brwsrunique
    * 1.0 / 20)) > 120) AND communication.langpattern = 'Variable' AND communication.msgtally
    < 10 AND txchainlen > 5
  type: boolean
  primary_key: false
  description: 'Sophisticated Operational Security (KB #28): APL > 120, langpattern=''Variable'',
    msgtally < 10, txchainlen > 5. APL is inlined since cross-model refs must be raw
    column refs. Encoded on riskanalysis (it FK-joins to communication via commref
    and carries txchainlen).'
  hidden: false
  meta:
    kb_id: 28
measures: []
aggregations: []
joins:
- target_model: communication
  join_pairs:
  - - commref
    - commregistry
  join_type: left
- target_model: transactions
  join_pairs:
  - - txref
    - txregistry
  join_type: left
filters: []
description: Risk-analysis records, each tied to a transaction (txref) and the originating
  communication (commref). Carries fraud probability, money-laundering risk classification,
  transaction-chain shape, wallet attributes (age, balance, turnover), and identity
  / profile completeness.
hidden: false
