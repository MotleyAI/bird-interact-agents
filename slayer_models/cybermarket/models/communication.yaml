  hidden: false
- name: vpnflag_numeric
  sql: CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE
    0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of vpnflag used by CSR / APL / CPR: Yes=1, Suspected=0.5,
    No=0.'
  hidden: false
  meta:
    kb_ids:
    - 5
- name: encryptmethod_numeric
  sql: CASE encryptmethod WHEN 'Standard' THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom'
    THEN 3 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of encryptmethod used by APL / OSI: Standard=1, Enhanced=2,
    Custom=3, else=0.'
  hidden: false
  meta:
    kb_ids:
    - 5
- name: langpattern_numeric
  sql: CASE langpattern WHEN 'Consistent' THEN 1 WHEN 'Variable' THEN 2 WHEN 'Suspicious'
    THEN 3 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of langpattern used by CPR: Consistent=1, Variable=2,
    Suspicious=3.'
  hidden: false
  meta:
    kb_ids:
    - 6
- name: csr
  sql: (iptally * 5) + (tornodecount * 2) + ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN
    'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30) + (brwsrunique * 1.0 /
    10) + (susppatscore * 3) + (riskindiccount * 4)
  type: number
  primary_key: false
  description: 'Communication Security Risk (CSR): 5*iptally + 2*tornodecount + 30*vpnflag_numeric
    + brwsrunique/10 + 3*susppatscore + 4*riskindiccount. Higher = greater security
    concern.'
  hidden: false
  meta:
    kb_id: 13
- name: apl
  sql: ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0
    ELSE 0 END) * 30) + (tornodecount * 2) + ((CASE encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 15) + (connpatscore
    * 0.2) + (brwsrunique * 1.0 / 20)
  type: number
  primary_key: false
  description: 'Anonymity Protection Level (APL): 30*vpnflag_numeric + 2*tornodecount
    + 15*encryptmethod_numeric + 0.2*connpatscore + brwsrunique/20. Higher = stronger
    anonymity protection.'
  hidden: false
  meta:
    kb_id: 19
- name: cpr
  sql: ((CASE langpattern WHEN 'Consistent' THEN 1 WHEN 'Variable' THEN 2 WHEN 'Suspicious'
    THEN 3 ELSE 0 END) * 15) + (((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag
    WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30)
    + (brwsrunique * 1.0 / 10) + (susppatscore * 3) + (riskindiccount * 4)) * 0.2)
    + (msgtally * 0.5) - (1 - (CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN
    0.5 WHEN 'No' THEN 0 ELSE 0 END)) * 20
  type: number
  primary_key: false
  description: 'Communication Pattern Risk (CPR): 15*langpattern_numeric + 0.2*CSR
    + 0.5*msgtally - 20*(1 - vpnflag_numeric). Higher = more suspicious communication.'
  hidden: false
  meta:
    kb_id: 33
- name: is_identity_protected_user
  sql: (((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN
    0 ELSE 0 END) * 30) + (tornodecount * 2) + ((CASE encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 15) + (connpatscore
    * 0.2) + (brwsrunique * 1.0 / 20)) > 100 AND tornodecount > 20 AND vpnflag = 'Yes'
    AND encryptmethod = 'Custom'
  type: boolean
  primary_key: false
  description: 'Identity-Protected User (KB #26): APL > 100, tornodecount > 20, vpnflag=''Yes'',
    encryptmethod=''Custom''.'
  hidden: false
  meta:
    kb_id: 26
- name: is_deceptive_communication_pattern
  sql: (((CASE langpattern WHEN 'Consistent' THEN 1 WHEN 'Variable' THEN 2 WHEN 'Suspicious'
    THEN 3 ELSE 0 END) * 15) + (((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag
    WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30)
    + (brwsrunique * 1.0 / 10) + (susppatscore * 3) + (riskindiccount * 4)) * 0.2)
    + (msgtally * 0.5) - (1 - (CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN
    0.5 WHEN 'No' THEN 0 ELSE 0 END)) * 20) > 70 AND langpattern = 'Suspicious' AND
    ((iptally * 5) + (tornodecount * 2) + ((CASE vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected'
    THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30) + (brwsrunique * 1.0 / 10) + (susppatscore
    * 3) + (riskindiccount * 4)) > 80
  type: boolean
  primary_key: false
  description: 'Deceptive Communication Pattern (KB #43): CPR > 70, langpattern=''Suspicious'',
    CSR > 80. (KB also mentions ''frequently changing connection parameters'' but
    the schema has no such column; encoded predicate uses the three numeric/categorical
    conditions.)'
  hidden: false
  meta:
    kb_id: 43
measures: []
aggregations: []
joins:
- target_model: products
  join_pairs:
  - - prodref
    - prodregistry
  join_type: left
- target_model: transactions
  join_pairs:
  - - txref
    - txregistry
  join_type: left
filters: []
description: Cybermarket communication / session logs. One row per session, optionally
  tied to a transaction (txref) or product (prodref). Captures network indicators
  (iptally, tornodecount, vpnflag, brwsrunique, devfpscore), encryption / channel,
  message volume, and language / sentiment / suspicion scores.
hidden: false
