description: Cybermarket marketplaces. Each row is a darknet/grey market platform
  with its scale (sizecluster), business model (mktclass), activity counters (dlyflow,
  mthactive, vendcount, buycount), and behaviour scores (interscore, esccomprate).
  The market_status_reputation JSON column carries operational status, trust level,
  and compliance metrics.
