version: 3
name: vendors
sql_table: vendors
query_variables: {}
data_source: cybermarket
columns:
- name: vendregistry
  sql: vendregistry
  type: string
  primary_key: true
  hidden: false
- name: vendspan
  sql: vendspan
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vendrate
  sql: vendrate
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: vendtxcount
  sql: vendtxcount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vendsucccount
  sql: vendsucccount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: venddisputecount
  sql: venddisputecount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vendplacecount
  sql: vendplacecount
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vendpaymethods
  sql: vendpaymethods
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: vendchecklvl
  sql: vendchecklvl
  type: string
  primary_key: false
  description: 'Vendor verification tier: ''Basic'' = minimal (email + captcha) with
    limited platform history; ''Advanced'' = additional ID consistency checks + longer
    positive history; ''Premium'' = highest tier, verifiable identity elements + extended
    positive transaction record with minimal disputes.'
  hidden: false
  meta:
    kb_id: 7
- name: vendlastmoment
  sql: vendlastmoment
  type: string
  primary_key: false
  hidden: false
- name: mktref
  sql: mktref
  type: string
  primary_key: false
  hidden: false
- name: vti
  sql: (vendsucccount * 1.0 / NULLIF(vendtxcount, 0)) * 100 - (venddisputecount *
    1.0 / NULLIF(vendtxcount, 0)) * 50 + (vendrate * 5)
  type: number
  primary_key: false
  description: 'Vendor Trust Index (VTI): (vendsucccount/vendtxcount)*100 - (venddisputecount/vendtxcount)*50
    + 5*vendrate. Higher = more trustworthy vendor.'
  hidden: false
  meta:
    kb_id: 11
- name: vendchecklvl_numeric
  sql: CASE vendchecklvl WHEN 'Basic' THEN 1 WHEN 'Advanced' THEN 2 WHEN 'Premium'
    THEN 3 ELSE 0 END
  type: number
  primary_key: false
  description: 'Numeric mapping of vendchecklvl: Basic=1, Advanced=2, Premium=3, else=0
    (used by VRS).'
  hidden: false
  meta:
    kb_ids:
    - 7
- name: vrs
  sql: (vendrate * 10) + (vendsucccount * 1.0 / NULLIF(vendtxcount, 0)) * 50 + (CASE
    vendchecklvl WHEN 'Basic' THEN 1 WHEN 'Advanced' THEN 2 WHEN 'Premium' THEN 3
    ELSE 0 END) * 15 - (venddisputecount * 1.0 / NULLIF(vendtxcount, 0)) * 100
  type: number
  primary_key: false
  description: 'Vendor Relationship Strength (VRS): 10*vendrate + (vendsucccount/vendtxcount)*50
    + 15*vendchecklvl_numeric - (venddisputecount/vendtxcount)*100. Higher = stronger
    vendor-customer relationships.'
  hidden: false
  meta:
    kb_id: 37
- name: is_trusted_vendor
  sql: ((vendsucccount * 1.0 / NULLIF(vendtxcount, 0)) * 100 - (venddisputecount *
    1.0 / NULLIF(vendtxcount, 0)) * 50 + (vendrate * 5)) > 80 AND vendchecklvl IN
    ('Advanced', 'Premium') AND (venddisputecount * 1.0 / NULLIF(vendtxcount, 0))
    < 0.05 AND vendspan > 90
  type: boolean
  primary_key: false
  description: 'Trusted Vendor (KB #21): VTI > 80, vendchecklvl Advanced/Premium,
    dispute rate < 5%, vendspan > 90 days.'
  hidden: false
  meta:
    kb_id: 21
measures: []
aggregations: []
joins:
- target_model: markets
  join_pairs:
  - - mktref
    - mktregistry
  join_type: left
filters: []
description: 'Cybermarket vendors. One row per vendor on a market (mktref FK). Activity
  metrics: vendspan (days active), vendtxcount, vendsucccount, venddisputecount, vendplacecount
  (listings), vendpaymethods. vendchecklvl is the verification tier.'
hidden: false
