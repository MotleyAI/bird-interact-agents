- name: sps
  sql: (100 - (vulntally * 5)) + (securitymeasurecount * 2) + (sessionsecurityscore
    * 0.5) + (privprotscore * 0.3) - (fpprob * 100)
  type: number
  primary_key: false
  description: 'Security Posture Score (SPS): (100 - 5*vulntally) + 2*securitymeasurecount
    + 0.5*sessionsecurityscore + 0.3*privprotscore - 100*fpprob. Higher = stronger
    security posture.'
  hidden: false
  meta:
    kb_id: 17
- name: osi
  sql: ((((CASE communication.vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5
    WHEN 'No' THEN 0 ELSE 0 END) * 30) + (communication.tornodecount * 2) + ((CASE
    communication.encryptmethod WHEN 'Standard' THEN 1 WHEN 'Enhanced' THEN 2 WHEN
    'Custom' THEN 3 ELSE 0 END) * 15) + (communication.connpatscore * 0.2) + (communication.brwsrunique
    * 1.0 / 20)) * 0.5) + (((100 - (vulntally * 5)) + (securitymeasurecount * 2) +
    (sessionsecurityscore * 0.5) + (privprotscore * 0.3) - (fpprob * 100)) * 0.2)
    + (communication.tornodecount * 2) + ((CASE communication.encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 5) - (communication.iptally
    * 0.5)
  type: number
  primary_key: false
  description: 'Operational Security Index (OSI): 0.5*APL + 0.2*SPS + 2*tornodecount
    + 5*encryptmethod_numeric (Standard=1/Enhanced=2/Custom=3 else=0) - 0.5*iptally.
    APL/tornodecount/iptally/encryptmethod come from the linked communication record
    (commref FK). APL is inlined since cross-model references must be raw column refs,
    not computed-column refs.'
  hidden: false
  meta:
    kb_id: 36
- name: is_high_security_entity
  sql: ((100 - (vulntally * 5)) + (securitymeasurecount * 2) + (sessionsecurityscore
    * 0.5) + (privprotscore * 0.3) - (fpprob * 100)) > 80 AND encryptionstrength =
    'Military-grade' AND authenticationmethod IN ('2FA', 'Multi-factor') AND vulntally
    < 5
  type: boolean
  primary_key: false
  description: 'High-Security Entity (KB #24): SPS > 80, encryptionstrength=''Military-grade'',
    authenticationmethod IN (''2FA'',''Multi-factor''), vulntally < 5.'
  hidden: false
  meta:
    kb_id: 24
- name: is_opsec_specialist
  sql: (((((CASE communication.vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected' THEN 0.5
    WHEN 'No' THEN 0 ELSE 0 END) * 30) + (communication.tornodecount * 2) + ((CASE
    communication.encryptmethod WHEN 'Standard' THEN 1 WHEN 'Enhanced' THEN 2 WHEN
    'Custom' THEN 3 ELSE 0 END) * 15) + (communication.connpatscore * 0.2) + (communication.brwsrunique
    * 1.0 / 20)) * 0.5) + (((100 - (vulntally * 5)) + (securitymeasurecount * 2) +
    (sessionsecurityscore * 0.5) + (privprotscore * 0.3) - (fpprob * 100)) * 0.2)
    + (communication.tornodecount * 2) + ((CASE communication.encryptmethod WHEN 'Standard'
    THEN 1 WHEN 'Enhanced' THEN 2 WHEN 'Custom' THEN 3 ELSE 0 END) * 5) - (communication.iptally
    * 0.5)) > 85 AND ((((CASE communication.vpnflag WHEN 'Yes' THEN 1 WHEN 'Suspected'
    THEN 0.5 WHEN 'No' THEN 0 ELSE 0 END) * 30) + (communication.tornodecount * 2)
    + ((CASE communication.encryptmethod WHEN 'Standard' THEN 1 WHEN 'Enhanced' THEN
    2 WHEN 'Custom' THEN 3 ELSE 0 END) * 15) + (communication.connpatscore * 0.2)
    + (communication.brwsrunique * 1.0 / 20)) > 120) AND communication.langpattern
    = 'Variable' AND communication.msgtally < 10 AND riskanalysis.txchainlen > 5 AND
    communication.encryptmethod IN ('Enhanced', 'Custom')
  type: boolean
  primary_key: false
  description: 'OpSec Specialist (KB #46): OSI > 85, displays Sophisticated Operational
    Security characteristics (KB #28: APL > 120, langpattern=''Variable'', msgtally
    < 10, txchainlen > 5), encryptmethod IN (''Enhanced'',''Custom''). Encoded on
    securitymonitoring; reaches communication via commref and riskanalysis via riskref.'
  hidden: false
  meta:
    kb_id: 46
measures: []
aggregations: []
joins:
- target_model: communication
  join_pairs:
  - - commref
    - commregistry
  join_type: left
- target_model: riskanalysis
  join_pairs:
  - - riskref
    - riskregistry
  join_type: left
filters: []
description: Security-monitoring records for the platform / entity, tied to a risk
  profile (riskref) and communication (commref). Captures audit status, vulnerability
  + incident counts, encryption + auth posture, alert severity / category, and the
  threat_analysis_metrics JSON column with detection scores.
hidden: false
