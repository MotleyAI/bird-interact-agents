- name: lawinterest_numeric
  sql: CASE lawinterest WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3
    WHEN 'Unknown' THEN 2 ELSE 2 END
  type: number
  primary_key: false
  description: 'Numeric mapping of lawinterest used by IPS: Low=1, Medium=2, High=3,
    Unknown=2.'
  hidden: false
  meta:
    kb_ids:
    - 8
- name: regrisklvl_numeric
  sql: CASE regrisklvl WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN
    'Unknown' THEN 2 ELSE 2 END
  type: number
  primary_key: false
  description: 'Numeric mapping of regrisklvl used by IPS: Low=1, Medium=2, High=3,
    Unknown=2.'
  hidden: false
  meta:
    kb_ids:
    - 8
- name: ips
  sql: ((CASE lawinterest WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN
    3 WHEN 'Unknown' THEN 2 ELSE 2 END) * 30) + ((CASE regrisklvl WHEN 'Low' THEN
    1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN 'Unknown' THEN 2 ELSE 2 END) *
    20) + (riskanalysis.fraudprob * 100) - (compliancescore * 0.5) + (notescount *
    2)
  type: number
  primary_key: false
  description: 'Investigation Priority Score (IPS): 30*lawinterest_numeric + 20*regrisklvl_numeric
    + 100*fraudprob (from linked riskanalysis via riskref) - 0.5*compliancescore +
    2*notescount. Higher = higher priority.'
  hidden: false
  meta:
    kb_id: 18
