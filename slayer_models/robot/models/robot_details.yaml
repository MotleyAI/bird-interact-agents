version: 3
name: robot_details
sql_table: robot_details
query_variables: {}
data_source: robot
columns:
- name: botdetreg
  sql: botdetreg
  type: string
  primary_key: true
  description: 'Robot primary key. Carrier for Robot Count measure (KB #56).'
  hidden: false
  meta:
    kb_id: 56
- name: mfgnameval
  sql: mfgnameval
  type: string
  primary_key: false
  hidden: false
- name: modelseriesval
  sql: modelseriesval
  type: string
  primary_key: false
  hidden: false
- name: bottypeval
  sql: bottypeval
  type: string
  primary_key: false
  hidden: false
- name: payloadcapkg
  sql: payloadcapkg
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: reachmmval
  sql: reachmmval
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: instdateval
  sql: instdateval
  type: string
  primary_key: false
  hidden: false
- name: fwversionval
  sql: fwversionval
  type: string
  primary_key: false
  hidden: false
- name: ctrltypeval
  sql: ctrltypeval
  type: string
  primary_key: false
  hidden: false
- name: ray
  sql: (julianday(robot_record.rects) - julianday(instdateval)) / 365.25
  type: number
  primary_key: false
  description: "Robot Age in Years (RAY) (KB #0): (record_timestamp \u2212 install_date)\
    \ in years. Joins robot_record.rects with this row's instdateval."
  hidden: false
  meta:
    kb_id: 0
- name: is_old_robot
  sql: ((julianday(robot_record.rects) - julianday(instdateval)) / 365.25) >= 2
  type: boolean
  primary_key: false
  description: 'Old Robot (KB #10): RAY >= 2 years.'
  hidden: false
  meta:
    kb_id: 10
measures:
- formula: '*:count'
  name: robot_count
  label: Robot Count
  description: "Robot Count (KB #56) \u2014 number of distinct robots in a group (e.g.\
    \ group by modelseriesval). Each row of robot_details is one robot."
aggregations: []
joins:
- target_model: robot_record
  join_pairs:
  - - botdetreg
    - recreg
  join_type: left
filters: []
description: One row per robot. Holds installation/spec metadata (manufacturer, model
  series, type, payload capacity, reach, install date, firmware, controller type).
  Most robot-level metrics aggregate child tables that reference botdetreg.
hidden: false
