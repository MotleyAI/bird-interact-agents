- name: row_payload_ratio
  sql: payloadwval * 1.0 / NULLIF(robot_details.payloadcapkg, 0)
  type: number
  primary_key: false
  description: "Row-level payload weight relative to robot's payload capacity \u2014\
    \ helper for PUR (KB #39)."
  hidden: false
- name: is_aged_over_one
  sql: ((julianday(robot_details__robot_record.rects) - julianday(robot_details.instdateval))
    / 365.25) > 1
  type: boolean
  primary_key: false
  description: 'Row-level: is the owning robot older than 1 year (RAY>1)? Helper for
    KB #49 Overloaded.'
  hidden: true
measures:
- formula: poserrmmval:avg
  name: ape
  label: APE
  description: "Average Position Error (APE) (KB #3) \u2014 mean poserrmmval across\
    \ actuation_data rows. Group by actdetref for per-robot."
- formula: tcpspeedval:avg
  name: atcs
  label: ATCS
  description: "Average TCP Speed (ATCS) (KB #4) \u2014 mean tcpspeedval across actuation_data\
    \ rows. Group by actdetref for per-robot."
- formula: row_payload_ratio:avg
  name: pur
  label: PUR
  description: "Payload Utilization Ratio (KB #39) \u2014 mean of (payloadwval / robot_details.payloadcapkg)\
    \ across actuation_data rows. Equivalent to \u03A3payloadwval / (payloadcapkg\
    \ \xB7 |rows|). Group by actdetref for per-robot."
- formula: tcpspeedval:avg > 1000
  name: is_fast_robot
  label: Fast Robot
  description: "Fast Robot (KB #14) \u2014 true if ATCS > 1000. Group by actdetref\
    \ for per-robot."
- formula: poserrmmval:avg < 0.1
  name: is_high_precision
  label: 'High Precision (KB #13 bucket)'
  description: "Precision Category (KB #13) \u2014 'High Precision' bucket: APE <\
    \ 0.1. Group by actdetref. The other buckets are is_medium_precision and is_low_precision;\
    \ exactly one is true per robot."
- formula: poserrmmval:avg >= 0.1 and poserrmmval:avg < 0.5
  name: is_medium_precision
  label: 'Medium Precision (KB #13 bucket)'
  description: "Precision Category (KB #13) \u2014 'Medium Precision' bucket: 0.1\
    \ \u2264 APE < 0.5."
- formula: poserrmmval:avg >= 0.5
  name: is_low_precision
  label: 'Low Precision (KB #13 bucket)'
  description: "Precision Category (KB #13) \u2014 'Low Precision' bucket: APE \u2265\
    \ 0.5."
- formula: row_payload_ratio:avg > 0.9 and is_aged_over_one:max > 0
  name: is_overloaded
  label: 'Overloaded Robot (KB #49)'
  description: "Overloaded Robot (KB #49) \u2014 true if PUR > 0.9 AND RAY > 1. Group\
    \ by actdetref."
aggregations: []
joins:
- target_model: robot_details
  join_pairs:
  - - actdetref
    - botdetreg
  join_type: left
- target_model: operation
  join_pairs:
  - - actoperref
    - operreg
  join_type: left
- target_model: robot_record
  join_pairs:
  - - actrecref
    - recreg
  join_type: left
filters: []
description: 'Per-actuation telemetry: TCP pose/speed/accel, position/orientation
  error, payload, motor currents/voltages. One row per actuation event, joined to
  robot_details via actdetref.'
hidden: false
