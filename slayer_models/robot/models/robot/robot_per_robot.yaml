    \ APE values across robots in a model series. Avg-of-aggregate; one row per robot\
    \ in the underlying multistage rollup, then averaged. Group by modelseriesval.\n\
    \n[kb=57]\nLet M be the model series, \\mathcal{R}_M be the set of unique robot\
    \ identifiers in M. Then Model Avg Pos Error = \\frac{\\sum_{R \\in \\mathcal{R}_M}\
    \ \\text{APE}(R)}{|\\mathcal{R}_M|} \u2014 The average of the Average Position\
