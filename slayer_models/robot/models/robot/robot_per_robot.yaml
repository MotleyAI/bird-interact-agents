measures:
- formula: eer:max
  name: eer_value
  label: Energy Efficiency Ratio (EER)
  description: "Energy Efficiency Ratio (KB #31): \u03A3energyusekwhval (performance_and_safety)\
    \ / TOH (operation), composed at per-robot grain via the multistage rollup. One\
    \ value per robot \u2014 :max equals :avg equals :min for the robot's row.\n\n\
    [kb=31]\nFor a given robot R, EER = \\frac{\\sum_{ps \\in \\text{performance_and_safety}\
    \ \\mid \\text{effectivenessrobot = R}} energyusekwhval}{\\text{TOH}}, \\text{where\
    \ TOH is used to normalize energy consumption.} \u2014 Measures energy efficiency\
    \ by comparing energy usage to operating hours.\n[/kb=31]"
  meta:
    kb_id: 31
- formula: twr:max
  name: twr_value
  label: Tool Wear Rate (TWR)
  description: "Tool Wear Rate (KB #37): \u03A3toolwearpct (performance_and_safety)\
    \ / TPC (operation), composed at per-robot grain via the multistage rollup.\n\n\
    [kb=37]\nFor a given robot R, TWR = \\frac{\\sum_{ps \\in \\text{performance_and_safety}\
    \ \\mid \\text{effectivenessrobot = R}} toolwearpct}{\\text{TPC}}, \\text{where\
    \ TPC normalizes tool wear percentage.} \u2014 Estimates the rate of tool wear\
    \ relative to program cycles.\n[/kb=37]"
  meta:
    kb_id: 37
- formula: jdi:max
  name: jdi_value
  label: Joint Degradation Index (JDI)
  description: "Joint Degradation Index (KB #32): (\u03A3temps / (MJT \xB7 |jc| \xB7\
    \ 6)) + (\u03A3vibs / (|jc| \xB7 6)), composed at per-robot grain via the multistage\
    \ rollup so MJT (the per-robot global divisor) is materialized first.\n\n[kb=32]\n\
    For a given robot R, JDI = \\frac{\\sum_{jc \\in \\text{joint_condition} \\mid\
    \ \\text{jcdetref = R}} \\sum_{i=1}^6 (jitempval_i / \\text{MJT} + jivibval_i)}{\\\
    text{|}\\{jc \\in \\text{joint_condition} \\mid \\text{jcdetref = R}\\}| \\cdot\
    \ 6}, \\text{where MJT normalizes temperatures, and jitempval_i, jivibval_i are\
    \ joint i's temperature and vibration.} \u2014 Computes a composite index of joint\
    \ health based on temperature and vibration.\n[/kb=32]"
  meta:
    kb_id: 32
