description: Per-robot aggregate view. One row per robot, joining per-child-table
  rollups so peer-table metrics (EER, TWR, JDI, OCE) compose without fan-out. Built
  as a multistage query over operation, performance_and_safety, joint_condition, actuation_data,
  maintenance_and_fault. Use this model for any KB metric whose value is fixed at
  the robot grain.
