- formula: jdi:covar_pop(other=toh) / toh:var_pop
  name: jdi_toh_regression_slope
  label: JDI-TOH Regression Slope
  description: "JDI-TOH Regression Slope (KB #50) \u2014 OLS slope of JDI on TOH across\
    \ robots qualifying jdi > 1.5 AND mjt > 65 AND toh > 5000. Equivalent to covar_pop(JDI,\
    \ TOH)/var_pop(TOH). Apply the qualifying filters in the query.\n\n[kb=50]\nFor\
    \ a set of robots meeting JDI > 1.5, MJT > 65, and TOH > 5000, the JDI-TOH Regression\
    \ Slope is given by \\[ \\text{slope} = \\frac{n \\sum (x_i y_i) - \\sum x_i \\\
    sum y_i}{n \\sum x_i^2 - (\\sum x_i)^2} \\] where \\( y_i = \\text{JDI} \\) (Joint\
    \ Degradation Index for robot \\( i \\)), \\( x_i = \\text{TOH} \\) (Total Operating\
    \ Hours for robot \\( i \\)), \\( n \\) is the number of qualifying robots, and\
    \ sums are over all qualifying robots. \u2014 Measures the linear relationship\
    \ between Joint Degradation Index and Total Operating Hours using regression.\n\
    [/kb=50]"
  meta:
    kb_id: 50
