- name: row_max_joint_temp
  sql: MAX(j1tempval, j2tempval, j3tempval, j4tempval, j5tempval, j6tempval)
  type: number
  primary_key: false
  description: "Row-level max across the 6 joint temperatures \u2014 helper for MJT\
    \ (KB #2).\n\n[kb=2]\nFor a given robot R, MJT = \\max_{jc \\in \\text{joint_condition}\
    \ \\mid \\text{jcdetref = R}} \\max(jc.j1tempval, jc.j2tempval, jc.j3tempval,\
    \ jc.j4tempval, jc.j5tempval, jc.j6tempval) \u2014 Finds the maximum temperature\
    \ recorded for any joint across all operations for a specific robot.\n[/kb=2]"
  label: Maximum Joint Temperature (MJT)
  hidden: false
  meta:
    kb_id: 2
measures:
- formula: j1tempval:avg
  name: aj1t
  label: Average Joint 1 Temperature (AJ1T)
  description: "Average Joint 1 Temperature (AJ1T) (KB #1) \u2014 mean j1tempval across\
    \ all joint_condition rows. Group by jcdetref to get per-robot value.\n\n[kb=1]\n\
    For a given robot R, AJ1T = \\frac{\\sum_{jc \\in \\text{joint_condition} \\mid\
    \ \\text{jcdetref = R}} j1tempval}{|\\{jc \\in \\text{joint_condition} \\mid \\\
    text{jcdetref = R}\\}|} \u2014 Calculates the average temperature of Joint 1 across\
    \ all operations for a specific robot.\n[/kb=1]"
  meta:
    kb_id: 1
- formula: row_max_joint_temp:max
  name: mjt
  label: Maximum Joint Temperature (MJT)
  description: "Maximum Joint Temperature (MJT) (KB #2) \u2014 max across all joints\
    \ across all rows. Group by jcdetref for per-robot.\n\n[kb=2]\nFor a given robot\
    \ R, MJT = \\max_{jc \\in \\text{joint_condition} \\mid \\text{jcdetref = R}}\
    \ \\max(jc.j1tempval, jc.j2tempval, jc.j3tempval, jc.j4tempval, jc.j5tempval,\
    \ jc.j6tempval) \u2014 Finds the maximum temperature recorded for any joint across\
    \ all operations for a specific robot.\n[/kb=2]"
  meta:
    kb_id: 2
- formula: j1tempval:avg > 50
  name: is_high_temp_j1
  label: High Temperature Joint 1
  description: "High Temperature Joint 1 (KB #11) \u2014 true if AJ1T > 50. Group\
    \ by jcdetref for per-robot.\n\n[kb=11]\nJoint 1 has high temperature if AJ1T\
    \ > 50. \u2014 Indicates if Joint 1 has a high average temperature.\n[/kb=11]"
  meta:
    kb_id: 11
- formula: row_max_joint_temp:max > 70
  name: is_overheating_risk
  label: Overheating Risk
  description: "Overheating Risk (KB #12) \u2014 true if MJT > 70. Group by jcdetref\
    \ for per-robot.\n\n[kb=12]\nThere is an overheating risk if MJT > 70. \u2014\
    \ Indicates if there is a risk of overheating based on maximum joint temperature.\n\
    [/kb=12]"
  meta:
    kb_id: 12
