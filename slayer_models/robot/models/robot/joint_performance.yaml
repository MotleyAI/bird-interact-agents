- name: j1_torque
  sql: CAST(json_extract(joint_metrics, '$.joint1.torque') AS REAL)
  type: number
  primary_key: false
  description: "Joint 1 torque from joint_metrics JSON \u2014 helper for JTV (KB #38).\n\
    \n[kb=38]\nFor a given robot R, JTV = \\frac{\\sum_{jp \\in \\text{joint_performance}\
    \ \\mid \\text{jperfdetref = R}} \\sum_{i=1}^6 ((joint_metrics->>'jointi'->>'torque'::float\
    \ - \\mu_i)^2)}{\\text{|}\\{jp \\in \\text{joint_performance} \\mid \\text{jperfdetref\
    \ = R}\\}| \\cdot 6}, \\text{where } \\mu_i = \\frac{\\sum_{jp} joint_metrics->>'jointi'->>'torque'::float}{\\\
    text{|}\\{jp\\}|}, \\text{and jointi is joint i's metrics.} \u2014 Calculates\
    \ the variance of joint torques to assess operational stability.\n[/kb=38]"
  label: Joint Torque Variance (JTV)
  hidden: false
  meta:
    kb_id: 38
