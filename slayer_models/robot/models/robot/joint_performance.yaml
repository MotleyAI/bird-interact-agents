measures:
- formula: (j1_torque:var_pop + j2_torque:var_pop + j3_torque:var_pop + j4_torque:var_pop
    + j5_torque:var_pop + j6_torque:var_pop) / 6
  name: jtv
  label: Joint Torque Variance (JTV)
  description: "Joint Torque Variance (KB #38) \u2014 (\u03A3_i var_pop(torque_i))\
    \ / 6 across joint_performance rows, where torque_i is extracted from joint_metrics\
    \ JSON. Group by jperfdetref for per-robot.\n\n[kb=38]\nFor a given robot R, JTV\
    \ = \\frac{\\sum_{jp \\in \\text{joint_performance} \\mid \\text{jperfdetref =\
    \ R}} \\sum_{i=1}^6 ((joint_metrics->>'jointi'->>'torque'::float - \\mu_i)^2)}{\\\
    text{|}\\{jp \\in \\text{joint_performance} \\mid \\text{jperfdetref = R}\\}|\
    \ \\cdot 6}, \\text{where } \\mu_i = \\frac{\\sum_{jp} joint_metrics->>'jointi'->>'torque'::float}{\\\
    text{|}\\{jp\\}|}, \\text{and jointi is joint i's metrics.} \u2014 Calculates\
    \ the variance of joint torques to assess operational stability.\n[/kb=38]"
  meta:
    kb_id: 38
- formula: (j1_torque:var_pop + j2_torque:var_pop + j3_torque:var_pop + j4_torque:var_pop
    + j5_torque:var_pop + j6_torque:var_pop) / 6 > 50
  name: is_high_torque_variance
  label: Operational Instability
  description: "Operational Instability (KB #48) \u2014 JTV > 50 part of the predicate.\
    \ KB #48 also requires MJT > 60 (on joint_condition, peer table); the agent must\
    \ intersect with joint_condition's is_overheating_risk-style filter. Group by\
    \ jperfdetref for per-robot.\n\n[kb=48]\nA robot R has Operational Instability\
    \ if JTV > 50 and MJT > 60. \u2014 Identifies robots with unstable joint performance.\n\
    [/kb=48]"
  meta:
    kb_id: 48
aggregations: []
joins:
- target_model: robot_details
  join_pairs:
