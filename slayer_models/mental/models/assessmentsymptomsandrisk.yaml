version: 3
name: assessmentsymptomsandrisk
sql_table: assessmentsymptomsandrisk
query_variables: {}
data_source: mental
columns:
- name: asrkey
  sql: asrkey
  type: string
  primary_key: true
  hidden: false
- name: suicideation
  sql: suicideation
  type: string
  primary_key: false
  hidden: false
- name: suicrisk
  sql: suicrisk
  type: string
  primary_key: false
  description: Suicide risk level enum (Low, Medium, High, Severe). Low = minimal
    risk, Medium = some concern, High = immediate concern, Severe = urgent intervention
    needed.
  hidden: false
  meta:
    kb_id: 22
- name: selfharm
  sql: selfharm
  type: string
  primary_key: false
  hidden: false
- name: violrisk
  sql: violrisk
  type: string
  primary_key: false
  hidden: false
- name: subuse
  sql: subuse
  type: string
  primary_key: false
  hidden: false
- name: subusefreq
  sql: subusefreq
  type: string
  primary_key: false
  hidden: false
- name: subusesev
  sql: subusesev
  type: string
  primary_key: false
  hidden: false
- name: mental_health_scores
  sql: mental_health_scores
  type: string
  primary_key: false
  hidden: false
- name: phq9_score
  sql: CAST(mental_health_scores ->> '$.depression.phq9_score' AS INTEGER)
  type: number
  primary_key: false
  description: 'PHQ-9 depression score (0-27). 0-4 minimal, 5-9 mild, 10-14 moderate,
    15-19 moderately severe, 20-27 severe. Source: mental_health_scores JSON.'
  hidden: false
  meta:
    kb_ids:
    - 0
    - 20
    - 30
- name: phq9_severity
  sql: mental_health_scores ->> '$.depression.phq9_severity'
  type: string
  primary_key: false
  description: PHQ-9 severity bucket (Mild, Moderate, Moderately Severe, Severe).
  hidden: false
- name: gad7_score
  sql: CAST(mental_health_scores ->> '$.anxiety.gad7_score' AS INTEGER)
  type: number
  primary_key: false
  description: 'GAD-7 anxiety score (0-21). 0-4 minimal, 5-9 mild, 10-14 moderate,
    15-21 severe. Source: mental_health_scores JSON.'
  hidden: false
  meta:
    kb_ids:
    - 1
    - 21
- name: gad7_severity
  sql: mental_health_scores ->> '$.anxiety.gad7_severity'
  type: string
  primary_key: false
  description: GAD-7 severity bucket (Mild, Moderate, Severe).
  hidden: false
- name: is_high_severe_suicrisk
  sql: CASE WHEN suicrisk IN ('High', 'Severe') THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: Indicator (0/1) for suicide risk in {High, Severe}. Used as numerator
    for SRP.
  hidden: false
- name: high_severe_suicrisk_helper
  sql: asrkey
  type: number
  primary_key: false
  description: 'Filtered count helper: rows with suicrisk in {High, Severe}.'
  hidden: false
  filter: suicrisk IN ('High', 'Severe')
  meta:
    kb_id: 3
- name: is_high_risk
  sql: suicrisk IN ('High', 'Severe') OR CAST(mental_health_scores ->> '$.depression.phq9_score'
    AS INTEGER) > 15 OR CAST(mental_health_scores ->> '$.anxiety.gad7_score' AS INTEGER)
    > 15
  type: boolean
  primary_key: false
  description: 'High-Risk Patient (KB #10): suicrisk in {High,Severe} OR PHQ-9 > 15
    OR GAD-7 > 15.'
  hidden: false
  meta:
    kb_id: 10
- name: is_severe_comorbid_distress
  sql: CAST(mental_health_scores ->> '$.depression.phq9_score' AS INTEGER) >= 15 AND
    CAST(mental_health_scores ->> '$.anxiety.gad7_score' AS INTEGER) >= 15 AND EXISTS
    (SELECT 1 FROM assessmentsocialanddiagnosis asd WHERE asd.asdkey = assessmentsymptomsandrisk.asrkey
    AND asd.funcimp = 'Severe')
  type: boolean
  primary_key: false
  description: 'Severe Comorbid Distress Profile (KB #45): PHQ-9 >= 15 AND GAD-7 >=
    15 AND linked assessmentsocialanddiagnosis.funcimp = ''Severe''.'
  hidden: false
  meta:
    kb_id: 45
- name: is_high_severity_high_risk
  sql: (CAST(mental_health_scores ->> '$.depression.phq9_score' AS INTEGER) > 19 OR
    CAST(mental_health_scores ->> '$.anxiety.gad7_score' AS INTEGER) > 14) AND suicrisk
    IN ('High', 'Severe')
  type: boolean
  primary_key: false
  description: 'High Severity, High Risk Patient Group (KB #49): (PHQ-9 > 19 OR GAD-7
    > 14) AND suicrisk in {High, Severe}.'
  hidden: false
  meta:
    kb_id: 49
measures:
- formula: phq9_score:avg
  name: apsf
  description: "Average PHQ-9 Score (APSF) \u2014 average depression score across\
    \ assessments."
- formula: gad7_score:avg
  name: agsf
  description: "Average GAD-7 Score (AGSF) \u2014 average anxiety score across assessments."
- formula: high_severe_suicrisk_helper:count * 100.0 / *:count
  name: srp
  description: "Suicide Risk Prevalence (SRP) \u2014 % of assessments with suicrisk\
    \ in {High, Severe}, scaled 0-100."
- formula: (apsf + agsf) / 2
  name: ssi
  description: "Symptom Severity Index (SSI) \u2014 (APSF + AGSF) / 2."
aggregations: []
joins:
- target_model: assessmentbasics
  join_pairs:
  - - asrkey
    - abkey
  join_type: left
filters: []
description: Per-assessment symptom and risk record. Each row corresponds 1:1 with
  an assessmentbasics row (same primary key). Holds suicide ideation, suicide risk
  level, self-harm history, violence risk, substance use details, plus the JSONB mental_health_scores
  column with PHQ-9/GAD-7 scores and severities.
hidden: false
