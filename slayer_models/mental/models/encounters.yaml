version: 3
name: encounters
sql_table: encounters
query_variables: {}
data_source: mental
columns:
- name: enckey
  sql: enckey
  type: string
  primary_key: true
  hidden: false
- name: timemark
  sql: timemark
  type: string
  primary_key: false
  hidden: false
- name: abref
  sql: abref
  type: string
  primary_key: false
  hidden: false
- name: patref
  sql: patref
  type: string
  primary_key: false
  hidden: false
- name: clinid
  sql: clinid
  type: string
  primary_key: false
  hidden: false
- name: facid
  sql: facid
  type: string
  primary_key: false
  hidden: false
- name: missappt
  sql: missappt
  type: number
  primary_key: false
  description: Missed appointment count for this encounter (e.g. 0 = perfect attendance,
    5 = frequent absences).
  hidden: false
  format:
    type: float
  meta:
    kb_ids:
    - 9
    - 29
- name: txbarrier
  sql: txbarrier
  type: string
  primary_key: false
  hidden: false
- name: nxapptdt
  sql: nxapptdt
  type: string
  primary_key: false
  hidden: false
- name: dqscore
  sql: dqscore
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: assesscomplete
  sql: assesscomplete
  type: string
  primary_key: false
  hidden: false
- name: is_stale_outcome
  sql: julianday('now') - julianday(timemark) > 60
  type: boolean
  primary_key: false
  description: 'Stale Treatment Outcome Records (KB #62): TRUE iff the encounter''s
    timemark is more than 60 days old. Used to flag outcomes linked to old encounters.'
  hidden: false
  meta:
    kb_id: 62
- name: is_high_appt_adherence
  sql: missappt < 1
  type: boolean
  primary_key: false
  description: 'High Appointment Adherence (KB #19): per-encounter missappt < 1.'
  hidden: false
  meta:
    kb_id: 19
measures:
- formula: missappt:sum * 1.0 / patref:count_distinct
  name: mar
  description: "Missed Appointment Rate (MAR) \u2014 sum of missappt across encounters\
    \ divided by the count of distinct patients."
aggregations: []
joins:
- target_model: assessmentbasics
  join_pairs:
  - - abref
    - abkey
  join_type: left
- target_model: patients
  join_pairs:
  - - patref
    - patkey
  join_type: left
- target_model: facilities
  join_pairs:
  - - facid
    - fackey
  join_type: left
- target_model: clinicians
  join_pairs:
  - - clinid
    - clinkey
  join_type: left
filters: []
description: Per-encounter record. Links a patient to an assessment, clinician, and
  facility; records missed-appointment count, treatment barrier, next appointment
  date, and a data-quality score. timemark is the encounter timestamp.
hidden: false
