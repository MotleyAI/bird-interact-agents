version: 5
name: _debug_v2
source_queries:
- version: 3
  name: fac_with_jk
  source_model:
    source_name: facility_metrics
    columns:
    - name: _jk
      type: DOUBLE
      sql: '1'
    - name: psm_row
      type: DOUBLE
      sql: 1.0 / (1 + tb_per_fac__cif + enc_per_fac__mar)
  dimensions:
  - name: fackey
  - name: _jk
  - name: tox_per_fac__tar
  - name: psm_row
  whole_periods_only: false
- version: 3
  name: median_tar
  source_model: fac_with_jk
  measures:
  - formula: tox_per_fac__tar:median
    name: median_tar
  dimensions:
  - name: _jk
  whole_periods_only: false
- version: 3
  name: median_psm
  source_model: fac_with_jk
  measures:
  - formula: psm_row:median
    name: median_psm
  dimensions:
  - name: _jk
  whole_periods_only: false
- version: 3
  source_model:
    source_name: fac_with_jk
    joins:
    - target_model: median_tar
      join_pairs:
      - - _jk
        - _jk
    - target_model: median_psm
      join_pairs:
      - - _jk
        - _jk
    columns:
    - name: quadrant
      type: TEXT
      sql: CASE WHEN tox_per_fac__tar >= median_tar__median_tar AND psm_row >= median_psm__median_psm
        THEN 'High Adherence, High Stability' WHEN tox_per_fac__tar >= median_tar__median_tar
        AND psm_row < median_psm__median_psm THEN 'High Adherence, Low Stability'
        WHEN tox_per_fac__tar < median_tar__median_tar AND psm_row >= median_psm__median_psm
        THEN 'Low Adherence, High Stability' ELSE 'Low Adherence, Low Stability' END
  dimensions:
  - name: fackey
  - name: quadrant
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"fac_with_jk.fackey\" AS fackey, \"fac_with_jk.quadrant\"\
  \ AS quadrant FROM (SELECT\n  fac_with_jk.fackey AS \"fac_with_jk.fackey\",\n  CASE\n\
  \    WHEN fac_with_jk.tox_per_fac__tar >= fac_with_jk.median_tar__median_tar\n \
  \   AND fac_with_jk.psm_row >= fac_with_jk.median_psm__median_psm\n    THEN 'High\
  \ Adherence, High Stability'\n    WHEN fac_with_jk.tox_per_fac__tar >= fac_with_jk.median_tar__median_tar\n\
  \    AND fac_with_jk.psm_row < fac_with_jk.median_psm__median_psm\n    THEN 'High\
  \ Adherence, Low Stability'\n    WHEN fac_with_jk.tox_per_fac__tar < fac_with_jk.median_tar__median_tar\n\
  \    AND fac_with_jk.psm_row >= fac_with_jk.median_psm__median_psm\n    THEN 'Low\
  \ Adherence, High Stability'\n    ELSE 'Low Adherence, Low Stability'\n  END AS\
  \ \"fac_with_jk.quadrant\"\nFROM (\n  SELECT\n    \"facility_metrics.fackey\" AS\
  \ fackey,\n    \"facility_metrics._jk\" AS _jk,\n    \"facility_metrics.tox_per_fac__tar\"\
  \ AS tox_per_fac__tar,\n    \"facility_metrics.psm_row\" AS psm_row\n  FROM (\n\
  \    SELECT\n      facility_metrics.fackey AS \"facility_metrics.fackey\",\n   \
  \   1 AS \"facility_metrics._jk\",\n      facility_metrics.tox_per_fac__tar AS \"\
  facility_metrics.tox_per_fac__tar\",\n      1.0 / (\n        1 + facility_metrics.tb_per_fac__cif\
  \ + facility_metrics.enc_per_fac__mar\n      ) AS \"facility_metrics.psm_row\"\n\
  \    FROM (\n      SELECT\n        \"fac_stage.fackey\" AS fackey,\n        \"fac_stage.frai\"\
  \ AS frai,\n        \"fac_stage.asr_per_fac.apsf\" AS asr_per_fac__apsf,\n     \
  \   \"fac_stage.asr_per_fac.agsf\" AS asr_per_fac__agsf,\n        \"fac_stage.asr_per_fac.srp\"\
  \ AS asr_per_fac__srp,\n        \"fac_stage.asd_per_fac.pfis\" AS asd_per_fac__pfis,\n\
  \        \"fac_stage.asd_per_fac.sse_avg\" AS asd_per_fac__sse_avg,\n        \"\
  fac_stage.tb_per_fac.tes\" AS tb_per_fac__tes,\n        \"fac_stage.tb_per_fac.cif\"\
  \ AS tb_per_fac__cif,\n        \"fac_stage.tox_per_fac.tar\" AS tox_per_fac__tar,\n\
  \        \"fac_stage.tox_per_fac.theralliance_avg\" AS tox_per_fac__theralliance_avg,\n\
  \        \"fac_stage.tox_per_fac.funcimpv_avg\" AS tox_per_fac__funcimpv_avg,\n\
  \        \"fac_stage.enc_per_fac.mar\" AS enc_per_fac__mar\n      FROM (\n     \
  \   SELECT\n          fac_stage.fackey AS \"fac_stage.fackey\",\n          fac_stage.frai\
  \ AS \"fac_stage.frai\",\n          asr_per_fac.apsf AS \"fac_stage.asr_per_fac.apsf\"\
  ,\n          asr_per_fac.agsf AS \"fac_stage.asr_per_fac.agsf\",\n          asr_per_fac.srp\
  \ AS \"fac_stage.asr_per_fac.srp\",\n          asd_per_fac.pfis AS \"fac_stage.asd_per_fac.pfis\"\
  ,\n          asd_per_fac.sse_avg AS \"fac_stage.asd_per_fac.sse_avg\",\n       \
  \   tb_per_fac.tes AS \"fac_stage.tb_per_fac.tes\",\n          tb_per_fac.cif AS\
  \ \"fac_stage.tb_per_fac.cif\",\n          tox_per_fac.tar AS \"fac_stage.tox_per_fac.tar\"\
  ,\n          tox_per_fac.theralliance_avg AS \"fac_stage.tox_per_fac.theralliance_avg\"\
  ,\n          tox_per_fac.funcimpv_avg AS \"fac_stage.tox_per_fac.funcimpv_avg\"\
  ,\n          enc_per_fac.mar AS \"fac_stage.enc_per_fac.mar\"\n        FROM (\n\
  \          SELECT\n            \"facilities.fackey\" AS fackey,\n            \"\
  facilities.frai\" AS frai\n          FROM (\n            SELECT\n              facilities.fackey\
  \ AS \"facilities.fackey\",\n              AVG(\n                CASE facilities.support_and_resources\
  \ ->> '$.community_resources'\n                  WHEN 'Comprehensive'\n        \
  \          THEN 3\n                  WHEN 'Adequate'\n                  THEN 2\n\
  \                  WHEN 'Limited'\n                  THEN 1\n                  ELSE\
  \ NULL\n                END\n              ) AS \"facilities.frai\"\n          \
  \  FROM facilities AS facilities\n            GROUP BY\n              facilities.fackey\n\
  \          ) AS _inner\n        ) AS fac_stage\n        LEFT JOIN (\n          (\n\
  \            SELECT\n              \"encounters.facid\" AS facid,\n            \
  \  \"encounters.patref_count_distinct\" AS patref_count_distinct,\n            \
  \  \"encounters.missappt_sum\" AS missappt_sum,\n              \"encounters.mar\"\
  \ AS mar\n            FROM (\n              WITH base AS (\n                SELECT\n\
  \                  encounters.facid AS \"encounters.facid\",\n                 \
  \ COUNT(DISTINCT encounters.patref) AS \"encounters.patref_count_distinct\",\n \
  \                 SUM(encounters.missappt) AS \"encounters.missappt_sum\"\n    \
  \            FROM encounters AS encounters\n                GROUP BY\n         \
  \         encounters.facid\n              ), step1 AS (\n                SELECT\n\
  \                  \"encounters.facid\",\n                  \"encounters.missappt_sum\"\
  ,\n                  \"encounters.patref_count_distinct\",\n                  \"\
  encounters.missappt_sum\" * 1.0 / \"encounters.patref_count_distinct\" AS \"encounters.mar\"\
  \n                FROM base\n              )\n              SELECT\n           \
  \     \"encounters.facid\",\n                \"encounters.mar\",\n             \
  \   \"encounters.missappt_sum\",\n                \"encounters.patref_count_distinct\"\
  \n              FROM step1\n            ) AS _inner\n          )\n        ) AS enc_per_fac\n\
  \          ON fac_stage.fackey = enc_per_fac.facid\n        LEFT JOIN (\n      \
  \    (\n            SELECT\n              \"treatmentbasics.encounters.facid\" AS\
  \ encounters__facid,\n              \"treatmentbasics.tes\" AS tes,\n          \
  \    \"treatmentbasics.crisisint_sum\" AS crisisint_sum,\n              \"treatmentbasics.cif\"\
  \ AS cif,\n              \"treatmentbasics.encounters.patref_count_distinct\" AS\
  \ encounters__patref_count_distinct\n            FROM (\n              WITH _base\
  \ AS (\n                SELECT\n                  encounters.facid AS \"treatmentbasics.encounters.facid\"\
  ,\n                  AVG(\n                    CASE treatmentbasics.therapy_details\
  \ ->> '$.engagement'\n                      WHEN 'High'\n                      THEN\
  \ 3\n                      WHEN 'Medium'\n                      THEN 2\n       \
  \               WHEN 'Low'\n                      THEN 1\n                     \
  \ WHEN 'Non-compliant'\n                      THEN 0\n                      ELSE\
  \ NULL\n                    END\n                  ) AS \"treatmentbasics.tes\"\
  ,\n                  SUM(treatmentbasics.crisisint) AS \"treatmentbasics.crisisint_sum\"\
  \n                FROM treatmentbasics AS treatmentbasics\n                LEFT\
  \ JOIN encounters AS encounters\n                  ON treatmentbasics.encref = encounters.enckey\n\
  \                GROUP BY\n                  encounters.facid\n              ),\
  \ _cm_treatmentbasics__encounters__patref_count_distinct AS (\n                SELECT\n\
  \                  encounters.facid AS \"treatmentbasics.encounters.facid\",\n \
  \                 COUNT(DISTINCT encounters.patref) AS \"treatmentbasics.encounters.patref_count_distinct\"\
  \n                FROM encounters AS encounters\n                GROUP BY\n    \
  \              encounters.facid\n              ), _combined AS (\n             \
  \   SELECT\n                  _base.\"treatmentbasics.encounters.facid\",\n    \
  \              _base.\"treatmentbasics.tes\",\n                  _base.\"treatmentbasics.crisisint_sum\"\
  ,\n                  _cm_treatmentbasics__encounters__patref_count_distinct.\"treatmentbasics.encounters.patref_count_distinct\"\
  \n                FROM _base\n                LEFT JOIN _cm_treatmentbasics__encounters__patref_count_distinct\n\
  \                  ON _base.\"treatmentbasics.encounters.facid\" = _cm_treatmentbasics__encounters__patref_count_distinct.\"\
  treatmentbasics.encounters.facid\"\n              ), step1 AS (\n              \
  \  SELECT\n                  \"treatmentbasics.crisisint_sum\",\n              \
  \    \"treatmentbasics.encounters.facid\",\n                  \"treatmentbasics.encounters.patref_count_distinct\"\
  ,\n                  \"treatmentbasics.tes\",\n                  \"treatmentbasics.crisisint_sum\"\
  \ * 1.0 / \"treatmentbasics.encounters.patref_count_distinct\" AS \"treatmentbasics.cif\"\
  \n                FROM _combined\n              )\n              SELECT\n      \
  \          \"treatmentbasics.cif\",\n                \"treatmentbasics.crisisint_sum\"\
  ,\n                \"treatmentbasics.encounters.facid\",\n                \"treatmentbasics.encounters.patref_count_distinct\"\
  ,\n                \"treatmentbasics.tes\"\n              FROM step1\n         \
  \   ) AS _inner\n          )\n        ) AS tb_per_fac\n          ON fac_stage.fackey\
  \ = tb_per_fac.encounters__facid\n        LEFT JOIN (\n          (\n           \
  \ SELECT\n              \"assessmentsymptomsandrisk.encounters.facid\" AS encounters__facid,\n\
  \              \"assessmentsymptomsandrisk.apsf\" AS apsf,\n              \"assessmentsymptomsandrisk.agsf\"\
  \ AS agsf,\n              \"assessmentsymptomsandrisk._count\" AS _count,\n    \
  \          \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\" AS high_severe_suicrisk_helper_count,\n\
  \              \"assessmentsymptomsandrisk.srp\" AS srp\n            FROM (\n  \
  \            WITH base AS (\n                SELECT\n                  encounters.facid\
  \ AS \"assessmentsymptomsandrisk.encounters.facid\",\n                  AVG(\n \
  \                   CAST(assessmentsymptomsandrisk.mental_health_scores ->> '$.depression.phq9_score'\
  \ AS INTEGER)\n                  ) AS \"assessmentsymptomsandrisk.apsf\",\n    \
  \              AVG(\n                    CAST(assessmentsymptomsandrisk.mental_health_scores\
  \ ->> '$.anxiety.gad7_score' AS INTEGER)\n                  ) AS \"assessmentsymptomsandrisk.agsf\"\
  ,\n                  COUNT(*) AS \"assessmentsymptomsandrisk._count\",\n       \
  \           COUNT(\n                    CASE\n                      WHEN assessmentsymptomsandrisk.suicrisk\
  \ IN ('High', 'Severe')\n                      THEN assessmentsymptomsandrisk.asrkey\n\
  \                    END\n                  ) AS \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\
  \n                FROM assessmentsymptomsandrisk AS assessmentsymptomsandrisk\n\
  \                LEFT JOIN encounters AS encounters\n                  ON assessmentsymptomsandrisk.asrkey\
  \ = encounters.abref\n                GROUP BY\n                  encounters.facid\n\
  \              ), step1 AS (\n                SELECT\n                  \"assessmentsymptomsandrisk._count\"\
  ,\n                  \"assessmentsymptomsandrisk.agsf\",\n                  \"assessmentsymptomsandrisk.apsf\"\
  ,\n                  \"assessmentsymptomsandrisk.encounters.facid\",\n         \
  \         \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\",\n   \
  \               \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\
  \ * 100.0 / \"assessmentsymptomsandrisk._count\" AS \"assessmentsymptomsandrisk.srp\"\
  \n                FROM base\n              )\n              SELECT\n           \
  \     \"assessmentsymptomsandrisk._count\",\n                \"assessmentsymptomsandrisk.agsf\"\
  ,\n                \"assessmentsymptomsandrisk.apsf\",\n                \"assessmentsymptomsandrisk.encounters.facid\"\
  ,\n                \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\
  ,\n                \"assessmentsymptomsandrisk.srp\"\n              FROM step1\n\
  \            ) AS _inner\n          )\n        ) AS asr_per_fac\n          ON fac_stage.fackey\
  \ = asr_per_fac.encounters__facid\n        LEFT JOIN (\n          (\n          \
  \  SELECT\n              \"assessmentsocialanddiagnosis.encounters.facid\" AS encounters__facid,\n\
  \              \"assessmentsocialanddiagnosis.pfis\" AS pfis,\n              \"\
  assessmentsocialanddiagnosis.sse_avg\" AS sse_avg\n            FROM (\n        \
  \      SELECT\n                encounters.facid AS \"assessmentsocialanddiagnosis.encounters.facid\"\
  ,\n                AVG(\n                  CASE assessmentsocialanddiagnosis.funcimp\n\
  \                    WHEN 'Severe'\n                    THEN 3\n               \
  \     WHEN 'Moderate'\n                    THEN 2\n                    WHEN 'Mild'\n\
  \                    THEN 1\n                    ELSE NULL\n                  END\n\
  \                ) AS \"assessmentsocialanddiagnosis.pfis\",\n                AVG(\n\
  \                  (\n                    CASE assessmentsocialanddiagnosis.socsup\n\
  \                      WHEN 'Strong'\n                      THEN 3\n           \
  \           WHEN 'Moderate'\n                      THEN 2\n                    \
  \  WHEN 'Limited'\n                      THEN 1\n                      ELSE NULL\n\
  \                    END\n                  ) + (\n                    CASE assessmentsocialanddiagnosis.relqual\n\
  \                      WHEN 'Good'\n                      THEN 3\n             \
  \         WHEN 'Fair'\n                      THEN 2\n                      WHEN\
  \ 'Poor'\n                      THEN 1\n                      WHEN 'Conflicted'\n\
  \                      THEN 0\n                      ELSE NULL\n               \
  \     END\n                  )\n                ) AS \"assessmentsocialanddiagnosis.sse_avg\"\
  \n              FROM assessmentsocialanddiagnosis AS assessmentsocialanddiagnosis\n\
  \              LEFT JOIN encounters AS encounters\n                ON assessmentsocialanddiagnosis.asdkey\
  \ = encounters.abref\n              GROUP BY\n                encounters.facid\n\
  \            ) AS _inner\n          )\n        ) AS asd_per_fac\n          ON fac_stage.fackey\
  \ = asd_per_fac.encounters__facid\n        LEFT JOIN (\n          (\n          \
  \  SELECT\n              \"treatmentoutcomes.treatmentbasics.encounters.facid\"\
  \ AS treatmentbasics__encounters__facid,\n              \"treatmentoutcomes._count\"\
  \ AS _count,\n              \"treatmentoutcomes.high_med_adh_helper_count\" AS high_med_adh_helper_count,\n\
  \              \"treatmentoutcomes.theralliance_avg\" AS theralliance_avg,\n   \
  \           \"treatmentoutcomes.funcimpv_avg\" AS funcimpv_avg,\n              \"\
  treatmentoutcomes.tar\" AS tar\n            FROM (\n              WITH base AS (\n\
  \                SELECT\n                  treatmentbasics__encounters.facid AS\
  \ \"treatmentoutcomes.treatmentbasics.encounters.facid\",\n                  COUNT(*)\
  \ AS \"treatmentoutcomes._count\",\n                  COUNT(\n                 \
  \   CASE\n                      WHEN treatmentoutcomes.txadh IN ('High', 'Medium')\n\
  \                      THEN treatmentoutcomes.txoutkey\n                    END\n\
  \                  ) AS \"treatmentoutcomes.high_med_adh_helper_count\",\n     \
  \             AVG(\n                    CASE treatmentoutcomes.theralliance\n  \
  \                    WHEN 'Strong'\n                      THEN 3\n             \
  \         WHEN 'Moderate'\n                      THEN 2\n                      WHEN\
  \ 'Weak'\n                      THEN 1\n                      WHEN 'Poor'\n    \
  \                  THEN 0\n                      ELSE NULL\n                   \
  \ END\n                  ) AS \"treatmentoutcomes.theralliance_avg\",\n        \
  \          AVG(\n                    CASE treatmentoutcomes.funcimpv\n         \
  \             WHEN 'Significant'\n                      THEN 3\n               \
  \       WHEN 'Moderate'\n                      THEN 2\n                      WHEN\
  \ 'Minimal'\n                      THEN 1\n                      ELSE NULL\n   \
  \                 END\n                  ) AS \"treatmentoutcomes.funcimpv_avg\"\
  \n                FROM treatmentoutcomes AS treatmentoutcomes\n                LEFT\
  \ JOIN treatmentbasics AS treatmentbasics\n                  ON treatmentoutcomes.txref\
  \ = treatmentbasics.txkey\n                LEFT JOIN encounters AS treatmentbasics__encounters\n\
  \                  ON treatmentbasics.encref = treatmentbasics__encounters.enckey\n\
  \                GROUP BY\n                  treatmentbasics__encounters.facid\n\
  \              ), step1 AS (\n                SELECT\n                  \"treatmentoutcomes._count\"\
  ,\n                  \"treatmentoutcomes.funcimpv_avg\",\n                  \"treatmentoutcomes.high_med_adh_helper_count\"\
  ,\n                  \"treatmentoutcomes.theralliance_avg\",\n                 \
  \ \"treatmentoutcomes.treatmentbasics.encounters.facid\",\n                  \"\
  treatmentoutcomes.high_med_adh_helper_count\" * 1.0 / \"treatmentoutcomes._count\"\
  \ AS \"treatmentoutcomes.tar\"\n                FROM base\n              )\n   \
  \           SELECT\n                \"treatmentoutcomes._count\",\n            \
  \    \"treatmentoutcomes.funcimpv_avg\",\n                \"treatmentoutcomes.high_med_adh_helper_count\"\
  ,\n                \"treatmentoutcomes.tar\",\n                \"treatmentoutcomes.theralliance_avg\"\
  ,\n                \"treatmentoutcomes.treatmentbasics.encounters.facid\"\n    \
  \          FROM step1\n            ) AS _inner\n          )\n        ) AS tox_per_fac\n\
  \          ON fac_stage.fackey = tox_per_fac.treatmentbasics__encounters__facid\n\
  \      ) AS _inner\n    ) AS facility_metrics\n  ) AS _inner\n) AS fac_with_jk)\
  \ AS _inner"
data_source: mental
columns:
- name: fackey
  sql: fackey
  type: TEXT
  primary_key: false
  hidden: false
- name: quadrant
  sql: quadrant
  type: TEXT
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
