version: 5
name: facility_metrics
source_queries:
- version: 3
  name: fac_stage
  source_model: facilities
  measures:
  - formula: resource_score:avg
    name: frai
  dimensions:
  - name: fackey
  whole_periods_only: false
- version: 3
  name: asr_per_fac
  source_model: assessmentsymptomsandrisk
  measures:
  - formula: phq9_score:avg
    name: apsf
  - formula: gad7_score:avg
    name: agsf
  - formula: high_severe_suicrisk_helper:count * 100.0 / *:count
    name: srp
  dimensions:
  - name: facid
    model: encounters
  whole_periods_only: false
- version: 3
  name: asd_per_fac
  source_model: assessmentsocialanddiagnosis
  measures:
  - formula: funcimp_score:avg
    name: pfis
  - formula: sse_per_row:avg
    name: sse_avg
  dimensions:
  - name: facid
    model: encounters
  whole_periods_only: false
- version: 3
  name: tb_per_fac
  source_model: treatmentbasics
  measures:
  - formula: engagement_score:avg
    name: tes
  - formula: crisisint:sum * 1.0 / encounters.patref:count_distinct
    name: cif
  dimensions:
  - name: facid
    model: encounters
  whole_periods_only: false
- version: 3
  name: tox_per_fac
  source_model: treatmentoutcomes
  measures:
  - formula: high_med_adh_helper:count * 1.0 / *:count
    name: tar
  - formula: theralliance_score:avg
    name: theralliance_avg
  - formula: funcimpv_score:avg
    name: funcimpv_avg
  dimensions:
  - name: facid
    model: treatmentbasics.encounters
  whole_periods_only: false
- version: 3
  name: enc_per_fac
  source_model: encounters
  measures:
  - formula: missappt:sum * 1.0 / patref:count_distinct
    name: mar
  dimensions:
  - name: facid
  whole_periods_only: false
- version: 3
  source_model:
    source_name: fac_stage
    joins:
    - target_model: asr_per_fac
      join_pairs:
      - - fackey
        - encounters__facid
    - target_model: asd_per_fac
      join_pairs:
      - - fackey
        - encounters__facid
    - target_model: tb_per_fac
      join_pairs:
      - - fackey
        - encounters__facid
    - target_model: tox_per_fac
      join_pairs:
      - - fackey
        - treatmentbasics__encounters__facid
    - target_model: enc_per_fac
      join_pairs:
      - - fackey
        - facid
  dimensions:
  - name: fackey
  - name: frai
  - name: apsf
    model: asr_per_fac
  - name: agsf
    model: asr_per_fac
  - name: srp
    model: asr_per_fac
  - name: pfis
    model: asd_per_fac
  - name: sse_avg
    model: asd_per_fac
  - name: tes
    model: tb_per_fac
  - name: cif
    model: tb_per_fac
  - name: tar
    model: tox_per_fac
  - name: theralliance_avg
    model: tox_per_fac
  - name: funcimpv_avg
    model: tox_per_fac
  - name: mar
    model: enc_per_fac
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"fac_stage.fackey\" AS fackey, \"fac_stage.frai\" AS frai,\
  \ \"fac_stage.asr_per_fac.apsf\" AS asr_per_fac__apsf, \"fac_stage.asr_per_fac.agsf\"\
  \ AS asr_per_fac__agsf, \"fac_stage.asr_per_fac.srp\" AS asr_per_fac__srp, \"fac_stage.asd_per_fac.pfis\"\
  \ AS asd_per_fac__pfis, \"fac_stage.asd_per_fac.sse_avg\" AS asd_per_fac__sse_avg,\
  \ \"fac_stage.tb_per_fac.tes\" AS tb_per_fac__tes, \"fac_stage.tb_per_fac.cif\"\
  \ AS tb_per_fac__cif, \"fac_stage.tox_per_fac.tar\" AS tox_per_fac__tar, \"fac_stage.tox_per_fac.theralliance_avg\"\
  \ AS tox_per_fac__theralliance_avg, \"fac_stage.tox_per_fac.funcimpv_avg\" AS tox_per_fac__funcimpv_avg,\
  \ \"fac_stage.enc_per_fac.mar\" AS enc_per_fac__mar FROM (SELECT\n  fac_stage.fackey\
  \ AS \"fac_stage.fackey\",\n  fac_stage.frai AS \"fac_stage.frai\",\n  asr_per_fac.apsf\
  \ AS \"fac_stage.asr_per_fac.apsf\",\n  asr_per_fac.agsf AS \"fac_stage.asr_per_fac.agsf\"\
  ,\n  asr_per_fac.srp AS \"fac_stage.asr_per_fac.srp\",\n  asd_per_fac.pfis AS \"\
  fac_stage.asd_per_fac.pfis\",\n  asd_per_fac.sse_avg AS \"fac_stage.asd_per_fac.sse_avg\"\
  ,\n  tb_per_fac.tes AS \"fac_stage.tb_per_fac.tes\",\n  tb_per_fac.cif AS \"fac_stage.tb_per_fac.cif\"\
  ,\n  tox_per_fac.tar AS \"fac_stage.tox_per_fac.tar\",\n  tox_per_fac.theralliance_avg\
  \ AS \"fac_stage.tox_per_fac.theralliance_avg\",\n  tox_per_fac.funcimpv_avg AS\
  \ \"fac_stage.tox_per_fac.funcimpv_avg\",\n  enc_per_fac.mar AS \"fac_stage.enc_per_fac.mar\"\
  \nFROM (\n  SELECT\n    \"facilities.fackey\" AS fackey,\n    \"facilities.frai\"\
  \ AS frai\n  FROM (\n    SELECT\n      facilities.fackey AS \"facilities.fackey\"\
  ,\n      AVG(\n        CASE facilities.support_and_resources ->> '$.community_resources'\n\
  \          WHEN 'Comprehensive'\n          THEN 3\n          WHEN 'Adequate'\n \
  \         THEN 2\n          WHEN 'Limited'\n          THEN 1\n          ELSE NULL\n\
  \        END\n      ) AS \"facilities.frai\"\n    FROM facilities AS facilities\n\
  \    GROUP BY\n      facilities.fackey\n  ) AS _inner\n) AS fac_stage\nLEFT JOIN\
  \ (\n  (\n    SELECT\n      \"encounters.facid\" AS facid,\n      \"encounters.patref_count_distinct\"\
  \ AS patref_count_distinct,\n      \"encounters.missappt_sum\" AS missappt_sum,\n\
  \      \"encounters.mar\" AS mar\n    FROM (\n      WITH base AS (\n        SELECT\n\
  \          encounters.facid AS \"encounters.facid\",\n          COUNT(DISTINCT encounters.patref)\
  \ AS \"encounters.patref_count_distinct\",\n          SUM(encounters.missappt) AS\
  \ \"encounters.missappt_sum\"\n        FROM encounters AS encounters\n        GROUP\
  \ BY\n          encounters.facid\n      ), step1 AS (\n        SELECT\n        \
  \  \"encounters.facid\",\n          \"encounters.missappt_sum\",\n          \"encounters.patref_count_distinct\"\
  ,\n          \"encounters.missappt_sum\" * 1.0 / \"encounters.patref_count_distinct\"\
  \ AS \"encounters.mar\"\n        FROM base\n      )\n      SELECT\n        \"encounters.facid\"\
  ,\n        \"encounters.mar\",\n        \"encounters.missappt_sum\",\n        \"\
  encounters.patref_count_distinct\"\n      FROM step1\n    ) AS _inner\n  )\n) AS\
  \ enc_per_fac\n  ON fac_stage.fackey = enc_per_fac.facid\nLEFT JOIN (\n  (\n   \
  \ SELECT\n      \"treatmentbasics.encounters.facid\" AS encounters__facid,\n   \
  \   \"treatmentbasics.tes\" AS tes,\n      \"treatmentbasics.crisisint_sum\" AS\
  \ crisisint_sum,\n      \"treatmentbasics.cif\" AS cif,\n      \"treatmentbasics.encounters.patref_count_distinct\"\
  \ AS encounters__patref_count_distinct\n    FROM (\n      WITH _base AS (\n    \
  \    SELECT\n          encounters.facid AS \"treatmentbasics.encounters.facid\"\
  ,\n          AVG(\n            CASE treatmentbasics.therapy_details ->> '$.engagement'\n\
  \              WHEN 'High'\n              THEN 3\n              WHEN 'Medium'\n\
  \              THEN 2\n              WHEN 'Low'\n              THEN 1\n        \
  \      WHEN 'Non-compliant'\n              THEN 0\n              ELSE NULL\n   \
  \         END\n          ) AS \"treatmentbasics.tes\",\n          SUM(treatmentbasics.crisisint)\
  \ AS \"treatmentbasics.crisisint_sum\"\n        FROM treatmentbasics AS treatmentbasics\n\
  \        LEFT JOIN encounters AS encounters\n          ON treatmentbasics.encref\
  \ = encounters.enckey\n        GROUP BY\n          encounters.facid\n      ), _cm_treatmentbasics__encounters__patref_count_distinct\
  \ AS (\n        SELECT\n          encounters.facid AS \"treatmentbasics.encounters.facid\"\
  ,\n          COUNT(DISTINCT encounters.patref) AS \"treatmentbasics.encounters.patref_count_distinct\"\
  \n        FROM encounters AS encounters\n        GROUP BY\n          encounters.facid\n\
  \      ), _combined AS (\n        SELECT\n          _base.\"treatmentbasics.encounters.facid\"\
  ,\n          _base.\"treatmentbasics.tes\",\n          _base.\"treatmentbasics.crisisint_sum\"\
  ,\n          _cm_treatmentbasics__encounters__patref_count_distinct.\"treatmentbasics.encounters.patref_count_distinct\"\
  \n        FROM _base\n        LEFT JOIN _cm_treatmentbasics__encounters__patref_count_distinct\n\
  \          ON _base.\"treatmentbasics.encounters.facid\" = _cm_treatmentbasics__encounters__patref_count_distinct.\"\
  treatmentbasics.encounters.facid\"\n      ), step1 AS (\n        SELECT\n      \
  \    \"treatmentbasics.crisisint_sum\",\n          \"treatmentbasics.encounters.facid\"\
  ,\n          \"treatmentbasics.encounters.patref_count_distinct\",\n          \"\
  treatmentbasics.tes\",\n          \"treatmentbasics.crisisint_sum\" * 1.0 / \"treatmentbasics.encounters.patref_count_distinct\"\
  \ AS \"treatmentbasics.cif\"\n        FROM _combined\n      )\n      SELECT\n  \
  \      \"treatmentbasics.cif\",\n        \"treatmentbasics.crisisint_sum\",\n  \
  \      \"treatmentbasics.encounters.facid\",\n        \"treatmentbasics.encounters.patref_count_distinct\"\
  ,\n        \"treatmentbasics.tes\"\n      FROM step1\n    ) AS _inner\n  )\n) AS\
  \ tb_per_fac\n  ON fac_stage.fackey = tb_per_fac.encounters__facid\nLEFT JOIN (\n\
  \  (\n    SELECT\n      \"assessmentsymptomsandrisk.encounters.facid\" AS encounters__facid,\n\
  \      \"assessmentsymptomsandrisk.apsf\" AS apsf,\n      \"assessmentsymptomsandrisk.agsf\"\
  \ AS agsf,\n      \"assessmentsymptomsandrisk._count\" AS _count,\n      \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\
  \ AS high_severe_suicrisk_helper_count,\n      \"assessmentsymptomsandrisk.srp\"\
  \ AS srp\n    FROM (\n      WITH base AS (\n        SELECT\n          encounters.facid\
  \ AS \"assessmentsymptomsandrisk.encounters.facid\",\n          AVG(\n         \
  \   CAST(assessmentsymptomsandrisk.mental_health_scores ->> '$.depression.phq9_score'\
  \ AS INTEGER)\n          ) AS \"assessmentsymptomsandrisk.apsf\",\n          AVG(\n\
  \            CAST(assessmentsymptomsandrisk.mental_health_scores ->> '$.anxiety.gad7_score'\
  \ AS INTEGER)\n          ) AS \"assessmentsymptomsandrisk.agsf\",\n          COUNT(*)\
  \ AS \"assessmentsymptomsandrisk._count\",\n          COUNT(\n            CASE\n\
  \              WHEN assessmentsymptomsandrisk.suicrisk IN ('High', 'Severe')\n \
  \             THEN assessmentsymptomsandrisk.asrkey\n            END\n         \
  \ ) AS \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\n       \
  \ FROM assessmentsymptomsandrisk AS assessmentsymptomsandrisk\n        LEFT JOIN\
  \ encounters AS encounters\n          ON assessmentsymptomsandrisk.asrkey = encounters.abref\n\
  \        GROUP BY\n          encounters.facid\n      ), step1 AS (\n        SELECT\n\
  \          \"assessmentsymptomsandrisk._count\",\n          \"assessmentsymptomsandrisk.agsf\"\
  ,\n          \"assessmentsymptomsandrisk.apsf\",\n          \"assessmentsymptomsandrisk.encounters.facid\"\
  ,\n          \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\",\n\
  \          \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\" * 100.0\
  \ / \"assessmentsymptomsandrisk._count\" AS \"assessmentsymptomsandrisk.srp\"\n\
  \        FROM base\n      )\n      SELECT\n        \"assessmentsymptomsandrisk._count\"\
  ,\n        \"assessmentsymptomsandrisk.agsf\",\n        \"assessmentsymptomsandrisk.apsf\"\
  ,\n        \"assessmentsymptomsandrisk.encounters.facid\",\n        \"assessmentsymptomsandrisk.high_severe_suicrisk_helper_count\"\
  ,\n        \"assessmentsymptomsandrisk.srp\"\n      FROM step1\n    ) AS _inner\n\
  \  )\n) AS asr_per_fac\n  ON fac_stage.fackey = asr_per_fac.encounters__facid\n\
  LEFT JOIN (\n  (\n    SELECT\n      \"assessmentsocialanddiagnosis.encounters.facid\"\
  \ AS encounters__facid,\n      \"assessmentsocialanddiagnosis.pfis\" AS pfis,\n\
  \      \"assessmentsocialanddiagnosis.sse_avg\" AS sse_avg\n    FROM (\n      SELECT\n\
  \        encounters.facid AS \"assessmentsocialanddiagnosis.encounters.facid\",\n\
  \        AVG(\n          CASE assessmentsocialanddiagnosis.funcimp\n           \
  \ WHEN 'Severe'\n            THEN 3\n            WHEN 'Moderate'\n            THEN\
  \ 2\n            WHEN 'Mild'\n            THEN 1\n            ELSE NULL\n      \
  \    END\n        ) AS \"assessmentsocialanddiagnosis.pfis\",\n        AVG(\n  \
  \        (\n            CASE assessmentsocialanddiagnosis.socsup\n             \
  \ WHEN 'Strong'\n              THEN 3\n              WHEN 'Moderate'\n         \
  \     THEN 2\n              WHEN 'Limited'\n              THEN 1\n             \
  \ ELSE NULL\n            END\n          ) + (\n            CASE assessmentsocialanddiagnosis.relqual\n\
  \              WHEN 'Good'\n              THEN 3\n              WHEN 'Fair'\n  \
  \            THEN 2\n              WHEN 'Poor'\n              THEN 1\n         \
  \     WHEN 'Conflicted'\n              THEN 0\n              ELSE NULL\n       \
  \     END\n          )\n        ) AS \"assessmentsocialanddiagnosis.sse_avg\"\n\
  \      FROM assessmentsocialanddiagnosis AS assessmentsocialanddiagnosis\n     \
  \ LEFT JOIN encounters AS encounters\n        ON assessmentsocialanddiagnosis.asdkey\
  \ = encounters.abref\n      GROUP BY\n        encounters.facid\n    ) AS _inner\n\
  \  )\n) AS asd_per_fac\n  ON fac_stage.fackey = asd_per_fac.encounters__facid\n\
  LEFT JOIN (\n  (\n    SELECT\n      \"treatmentoutcomes.treatmentbasics.encounters.facid\"\
  \ AS treatmentbasics__encounters__facid,\n      \"treatmentoutcomes._count\" AS\
  \ _count,\n      \"treatmentoutcomes.high_med_adh_helper_count\" AS high_med_adh_helper_count,\n\
  \      \"treatmentoutcomes.theralliance_avg\" AS theralliance_avg,\n      \"treatmentoutcomes.funcimpv_avg\"\
  \ AS funcimpv_avg,\n      \"treatmentoutcomes.tar\" AS tar\n    FROM (\n      WITH\
  \ base AS (\n        SELECT\n          treatmentbasics__encounters.facid AS \"treatmentoutcomes.treatmentbasics.encounters.facid\"\
  ,\n          COUNT(*) AS \"treatmentoutcomes._count\",\n          COUNT(\n     \
  \       CASE\n              WHEN treatmentoutcomes.txadh IN ('High', 'Medium')\n\
  \              THEN treatmentoutcomes.txoutkey\n            END\n          ) AS\
  \ \"treatmentoutcomes.high_med_adh_helper_count\",\n          AVG(\n           \
  \ CASE treatmentoutcomes.theralliance\n              WHEN 'Strong'\n           \
  \   THEN 3\n              WHEN 'Moderate'\n              THEN 2\n              WHEN\
  \ 'Weak'\n              THEN 1\n              WHEN 'Poor'\n              THEN 0\n\
  \              ELSE NULL\n            END\n          ) AS \"treatmentoutcomes.theralliance_avg\"\
  ,\n          AVG(\n            CASE treatmentoutcomes.funcimpv\n              WHEN\
  \ 'Significant'\n              THEN 3\n              WHEN 'Moderate'\n         \
  \     THEN 2\n              WHEN 'Minimal'\n              THEN 1\n             \
  \ ELSE NULL\n            END\n          ) AS \"treatmentoutcomes.funcimpv_avg\"\n\
  \        FROM treatmentoutcomes AS treatmentoutcomes\n        LEFT JOIN treatmentbasics\
  \ AS treatmentbasics\n          ON treatmentoutcomes.txref = treatmentbasics.txkey\n\
  \        LEFT JOIN encounters AS treatmentbasics__encounters\n          ON treatmentbasics.encref\
  \ = treatmentbasics__encounters.enckey\n        GROUP BY\n          treatmentbasics__encounters.facid\n\
  \      ), step1 AS (\n        SELECT\n          \"treatmentoutcomes._count\",\n\
  \          \"treatmentoutcomes.funcimpv_avg\",\n          \"treatmentoutcomes.high_med_adh_helper_count\"\
  ,\n          \"treatmentoutcomes.theralliance_avg\",\n          \"treatmentoutcomes.treatmentbasics.encounters.facid\"\
  ,\n          \"treatmentoutcomes.high_med_adh_helper_count\" * 1.0 / \"treatmentoutcomes._count\"\
  \ AS \"treatmentoutcomes.tar\"\n        FROM base\n      )\n      SELECT\n     \
  \   \"treatmentoutcomes._count\",\n        \"treatmentoutcomes.funcimpv_avg\",\n\
  \        \"treatmentoutcomes.high_med_adh_helper_count\",\n        \"treatmentoutcomes.tar\"\
  ,\n        \"treatmentoutcomes.theralliance_avg\",\n        \"treatmentoutcomes.treatmentbasics.encounters.facid\"\
  \n      FROM step1\n    ) AS _inner\n  )\n) AS tox_per_fac\n  ON fac_stage.fackey\
  \ = tox_per_fac.treatmentbasics__encounters__facid) AS _inner"
data_source: mental
