description: 'Per-facility composite metrics: APSF, AGSF, SRP, SSI, PFIS, SSE, TES,
  CIF, TAR, MAR, FRAI, theralliance_avg, funcimpv_avg. Multistage DAG: each peer is
  aggregated to one row per facility in its own stage; final stage anchors at fac_stage
  (facilities aggregated by fackey to surface FRAI) and joins all peer stages on facid==fackey.'
