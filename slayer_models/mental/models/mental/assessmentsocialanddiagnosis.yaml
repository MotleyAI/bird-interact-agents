- name: socsup
  sql: socsup
  type: TEXT
  primary_key: false
  description: "Social support level enum (Limited, Moderate, Strong). Limited = minimal\
    \ support, Moderate = some, Strong = robust.\n\n[kb=28]\nRanges from Limited to\
    \ Strong. Limited indicates minimal support, Moderate indicates some support,\
    \ and Strong indicates robust support. \u2014 Illustrates the value of social\
    \ support levels.\n[/kb=28]"
  label: Social Support Level
  hidden: false
  meta:
    kb_id: 28
