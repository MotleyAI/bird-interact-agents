- name: asdkey
  sql: asdkey
  type: string
  primary_key: false
  hidden: false
- name: assessmentbasics__patownerref
  sql: assessmentbasics__patownerref
  type: string
  primary_key: false
  hidden: false
- name: is_stable_recovery
  sql: is_stable_recovery
  type: boolean
  primary_key: false
  description: 'Stable Recovery Patient (KB #13): recstatus=''Stable'' AND any linked
