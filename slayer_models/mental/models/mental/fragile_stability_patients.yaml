- name: sse_per_row
  sql: sse_per_row
  type: number
  primary_key: false
  description: 'Per-row Social Support Effectiveness contribution: socsup_score +
    relqual_score.'
  hidden: false
- name: missappt_per_patient__avg_missappt
  sql: missappt_per_patient__avg_missappt
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
measures: []
aggregations: []
joins: []
filters: []
description: "Patients meeting Fragile Stability profile (KB #56): is_stable_recovery\
  \ (KB #13) AND (avg missappt > 2 across their encounters OR per-row SSE < 3). Stage\
  \ 1 aggregates missappt per patient. Stage 2 anchors at assessmentsocialanddiagnosis\
  \ (which carries is_stable_recovery and per-row SSE), joined to stage 1 by patient\
  \ (via assessmentbasics.patownerref).\n\n[kb=56]\nA patient meeting Stable Recovery\
  \ Patient criteria BUT having an average missappt > 2 across their encounters OR\
  \ an individual SSE score < 3. \\text{Combines Stable Recovery Patient status with\
  \ risk factors related to MAR and SSE}. \u2014 Identifies patients currently classified\
  \ as 'Stable Recovery' but who exhibit risk factors like frequent missed appointments\
  \ or low social support, suggesting potential for destabilization.\n[/kb=56]"
hidden: false
