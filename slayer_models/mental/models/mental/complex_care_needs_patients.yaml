description: "Patients meeting Complex Care Needs criteria (KB #12): SRP > 20% AND\
  \ PFIS > 2.5 (at the patient's facility) AND subuse in {Opioids, Multiple} on the\
  \ patient's row. Multistage: stage 1 = facility_metrics filtered by SRP>20 AND PFIS>2.5;\
  \ stage 2 = assessmentsymptomsandrisk rows with subuse in {Opioids, Multiple}, joined\
  \ to encounters to get facid, joined to stage 1 on facid==fackey.\n\n[kb=12]\nA\
  \ patient with SRP > 20\\% and PFIS > 2.5 and subuse \\in \\{Opioids, Multiple\\\
  } \u2014 Identifies patients requiring intensive care coordination due to multiple\
  \ risk factors.\n[/kb=12]"
