version: 3
name: signal_full
source_queries:
- version: 3
  source_model:
    source_name: signals
    joins:
    - target_model: signalprobabilities
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signalclassification
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signaldecoding
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signaladvancedphenomena
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signaldynamics
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: sourceproperties
      join_pairs:
      - - signalregistry
        - signalref
    columns:
    - name: signalregistry
      type: string
      sql: signalregistry
      primary_key: true
    - name: eci
      type: number
      sql: (signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval)
        / 10.0
    - name: is_technosignature
      type: boolean
      sql: CASE WHEN signalprobabilities.techsigprob > 0.7 AND signalprobabilities.natsrcprob
        < 0.3 AND signalprobabilities.artsrcprob < 50 AND (bwhz / (centerfreqmhz *
        1000000.0)) < 0.001 AND signalclassification.infodense > 0.8 THEN 1 ELSE 0
        END
    - name: is_cip
      type: boolean
      sql: CASE WHEN ((1 - ABS(freqdrifthzs) / (freqmhz * 1000.0)) * sigdursec / (1
        + doppshifthz / 1000.0)) > 0.8 AND signalclassification.entropyval BETWEEN
        0.4 AND 0.8 AND modindex > 0.5 THEN 1 ELSE 0 END
    - name: cip_class
      type: string
      sql: CASE WHEN ((1 - ABS(freqdrifthzs) / (freqmhz * 1000.0)) * sigdursec / (1
        + doppshifthz / 1000.0)) > 0.8 AND signalclassification.entropyval BETWEEN
        0.4 AND 0.8 AND modindex > 0.5 THEN 'Coherent Information Pattern Detected'
        WHEN ((1 - ABS(freqdrifthzs) / (freqmhz * 1000.0)) * sigdursec / (1 + doppshifthz
        / 1000.0)) > 0.6 AND signalclassification.entropyval BETWEEN 0.3 AND 0.9 THEN
        'Potential Information Pattern' ELSE 'No Clear Pattern' END
    - name: is_frt
      type: boolean
      sql: CASE WHEN sigdursec < 0.1 AND sigstrdb > 15 AND bwhz > 1000000 AND signalclassification.repeatcount
        = 1 THEN 1 ELSE 0 END
    - name: is_eit
      type: boolean
      sql: CASE WHEN ((signaldecoding.compressratio * signalclassification.complexidx
        * signalclassification.entropyval) / 10.0) > 1.8 AND signalclassification.entropyval
        BETWEEN 0.3 AND 0.7 THEN 1 ELSE 0 END
    - name: aidp
      type: number
      sql: (((signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval)
        / 10.0) * (signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0)))
        / (1 + signalprobabilities.natsrcprob)
    - name: ier
      type: number
      sql: signalclassification.entropyval / (signalprobabilities.natsrcprob * 0.9
        + 0.1)
    - name: spei
      type: number
      sql: (signaldecoding.decodeiters * signaldecoding.proctimehrs) / (((signaldecoding.compressratio
        * signalclassification.complexidx * signalclassification.entropyval) / 10.0)
        * signalclassification.complexidx)
    - name: ccs
      type: number
      sql: (1 - signalprobabilities.falseposprob) * signaldecoding.decodeconf * signalclassification.classconf
        * (CASE WHEN (snrratio - 0.1 * ABS(noisefloordbm)) > 0 THEN (snrratio - 0.1
        * ABS(noisefloordbm)) / 10.0 + 0.5 ELSE 0.1 END)
    - name: ccs_approx
      type: number
      sql: (1 - signalprobabilities.falseposprob) * signaldecoding.decodeconf * (CASE
        WHEN (snrratio - 0.1 * ABS(noisefloordbm)) > 0 THEN (snrratio - 0.1 * ABS(noisefloordbm))
        / 10.0 + 0.5 ELSE 0.1 END)
    - name: hzsr
      type: number
      sql: (signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0))
        * (CASE WHEN sourceproperties.objtype = 'Dwarf' THEN (CASE WHEN sourceproperties.objmasssol
        BETWEEN 0.7 AND 1.4 THEN (CASE WHEN (sourceproperties.sourcedistly / (CASE
        WHEN sourceproperties.objmasssol > 0 THEN sourceproperties.objmasssol ELSE
        1 END)) BETWEEN 0.8 AND 1.7 THEN 2 ELSE 0.5 END) ELSE 0.3 END) ELSE 0.1 END)
    - name: is_technosig_high_conf
      type: boolean
      sql: CASE WHEN signalprobabilities.techsigprob > 0.7 AND signalprobabilities.natsrcprob
        < 0.3 AND signalprobabilities.artsrcprob < 50 AND (bwhz / (centerfreqmhz *
        1000000.0)) < 0.001 AND signalclassification.infodense > 0.8 AND ((1 - signalprobabilities.falseposprob)
        * signaldecoding.decodeconf * signalclassification.classconf * (CASE WHEN
        (snrratio - 0.1 * ABS(noisefloordbm)) > 0 THEN (snrratio - 0.1 * ABS(noisefloordbm))
        / 10.0 + 0.5 ELSE 0.1 END)) > 0.9 AND (modindex * (1 + ((1 - ABS(freqdrifthzs)
        / (freqmhz * 1000.0)) * sigdursec / (1 + doppshifthz / 1000.0))) * (CASE modtype
        WHEN 'AM' THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END)) > 1.5 AND ((((signaldecoding.compressratio
        * signalclassification.complexidx * signalclassification.entropyval) / 10.0)
        * (signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0)))
        / (1 + signalprobabilities.natsrcprob)) > 0.8 THEN 1 ELSE 0 END
    - name: is_high_confidence
      type: boolean
      sql: CASE WHEN ((1 - signalprobabilities.falseposprob) * signaldecoding.decodeconf
        * signalclassification.classconf * (CASE WHEN (snrratio - 0.1 * ABS(noisefloordbm))
        > 0 THEN (snrratio - 0.1 * ABS(noisefloordbm)) / 10.0 + 0.5 ELSE 0.1 END))
        > 0.8 THEN 1 ELSE 0 END
    - name: is_habitable_zone_transmission
      type: boolean
      sql: CASE WHEN ((signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0))
        * (CASE WHEN sourceproperties.objtype = 'Dwarf' THEN (CASE WHEN sourceproperties.objmasssol
        BETWEEN 0.7 AND 1.4 THEN (CASE WHEN (sourceproperties.sourcedistly / (CASE
        WHEN sourceproperties.objmasssol > 0 THEN sourceproperties.objmasssol ELSE
        1 END)) BETWEEN 0.8 AND 1.7 THEN 2 ELSE 0.5 END) ELSE 0.3 END) ELSE 0.1 END))
        > 1.5 AND signalprobabilities.techsigprob > 0.7 AND signalprobabilities.natsrcprob
        < 0.3 AND signalprobabilities.artsrcprob < 50 AND (bwhz / (centerfreqmhz *
        1000000.0)) < 0.001 AND signalclassification.infodense > 0.8 THEN 1 ELSE 0
        END
    - name: is_multi_channel_protocol
      type: boolean
      sql: CASE WHEN ((1 - ABS(freqdrifthzs) / (freqmhz * 1000.0)) * sigdursec / (1
        + doppshifthz / 1000.0)) > 0.8 AND signalclassification.entropyval BETWEEN
        0.4 AND 0.8 AND modindex > 0.5 AND signalclassification.repeatcount > 3 AND
        ((signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval)
        / 10.0) > 2.0 THEN 1 ELSE 0 END
    - name: is_quantum_coherent
      type: boolean
      sql: CASE WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')
        AND signalclassification.infodense > 1.5 AND ((signaldecoding.compressratio
        * signalclassification.complexidx * signalclassification.entropyval) / 10.0)
        > 2.5 THEN 1 ELSE 0 END
    - name: is_directed_transmission
      type: boolean
      sql: CASE WHEN signaldynamics.spatstab = 'Moderate' AND polarmode = 'Linear'
        AND (signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0))
        > 0.85 THEN 1 ELSE 0 END
    - name: is_galactic_significance
      type: boolean
      sql: CASE WHEN ((CASE WHEN sourceproperties.celestobj IS NOT NULL AND sourceproperties.celestobj
        <> '' AND sourceproperties.celestobj <> 'Unknown' THEN 2 ELSE 1 END) * (CASE
        WHEN sourceproperties.objtype = 'Giant' AND sourceproperties.objmasssol BETWEEN
        0.8 AND 1.2 THEN 1.5 ELSE 1 END) * (CASE WHEN sourceproperties.objmetal >
        0 THEN sourceproperties.objmetal + 1 ELSE 0.5 END)) > 2.0 AND signalprobabilities.techsigprob
        > 0.7 AND signalprobabilities.natsrcprob < 0.3 AND signalprobabilities.artsrcprob
        < 50 AND (bwhz / (centerfreqmhz * 1000000.0)) < 0.001 AND signalclassification.infodense
        > 0.8 AND ((((signaldecoding.compressratio * signalclassification.complexidx
        * signalclassification.entropyval) / 10.0) * (signalprobabilities.techsigprob
        * (1 - signalprobabilities.natsrcprob) * signalprobabilities.sigunique * (0.5
        + signalprobabilities.anomscore / 10.0))) / (1 + signalprobabilities.natsrcprob))
        > 0.7 THEN 1 ELSE 0 END
    - name: is_anomalous_quantum
      type: boolean
      sql: CASE WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')
        AND signalprobabilities.anomscore > 8 AND (modindex * (1 + ((1 - ABS(freqdrifthzs)
        / (freqmhz * 1000.0)) * sigdursec / (1 + doppshifthz / 1000.0))) * (CASE modtype
        WHEN 'AM' THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END)) > 2.0 THEN 1 ELSE 0 END
    - name: is_observation_verified
      type: boolean
      sql: CASE WHEN ((1 - signalprobabilities.falseposprob) * signaldecoding.decodeconf
        * signalclassification.classconf * (CASE WHEN (snrratio - 0.1 * ABS(noisefloordbm))
        > 0 THEN (snrratio - 0.1 * ABS(noisefloordbm)) / 10.0 + 0.5 ELSE 0.1 END))
        > 0.8 AND (telescopes.observatories.atmostransparency * (1 - telescopes.observatories.humidityrate
        / 100.0) * (1 - 0.02 * telescopes.observatories.windspeedms)) > 0.85 AND telescopes.observatories.lunarstage
        IN ('New', 'First Quarter') AND telescopes.observatories.lunardistdeg > 45
        AND telescopes.observatories.solarstatus IN ('Low', 'Moderate') AND ((telescopes.observatories.atmostransparency
        * (1 - telescopes.observatories.humidityrate / 100.0) * (1 - 0.02 * telescopes.observatories.windspeedms))
        * (1 - ((1 - telescopes.observatories.lunardistdeg / 180.0) * (1 - telescopes.observatories.atmostransparency)))
        * (CASE WHEN telescopes.pointaccarc < 2 THEN 1 ELSE 2.0 / telescopes.pointaccarc
        END)) > 0.85 THEN 1 ELSE 0 END
  dimensions:
  - name: signalregistry
  - name: eci
  - name: is_technosignature
  - name: is_cip
  - name: cip_class
  - name: is_frt
  - name: is_eit
  - name: aidp
  - name: ier
  - name: spei
  - name: ccs
  - name: ccs_approx
  - name: hzsr
  - name: is_technosig_high_conf
  - name: is_high_confidence
  - name: is_habitable_zone_transmission
  - name: is_multi_channel_protocol
  - name: is_quantum_coherent
  - name: is_directed_transmission
  - name: is_galactic_significance
  - name: is_anomalous_quantum
  - name: is_observation_verified
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"signals.signalregistry\" AS signalregistry, \"signals.eci\"\
  \ AS eci, \"signals.is_technosignature\" AS is_technosignature, \"signals.is_cip\"\
  \ AS is_cip, \"signals.cip_class\" AS cip_class, \"signals.is_frt\" AS is_frt, \"\
  signals.is_eit\" AS is_eit, \"signals.aidp\" AS aidp, \"signals.ier\" AS ier, \"\
  signals.spei\" AS spei, \"signals.ccs\" AS ccs, \"signals.ccs_approx\" AS ccs_approx,\
  \ \"signals.hzsr\" AS hzsr, \"signals.is_technosig_high_conf\" AS is_technosig_high_conf,\
  \ \"signals.is_high_confidence\" AS is_high_confidence, \"signals.is_habitable_zone_transmission\"\
  \ AS is_habitable_zone_transmission, \"signals.is_multi_channel_protocol\" AS is_multi_channel_protocol,\
  \ \"signals.is_quantum_coherent\" AS is_quantum_coherent, \"signals.is_directed_transmission\"\
  \ AS is_directed_transmission, \"signals.is_galactic_significance\" AS is_galactic_significance,\
  \ \"signals.is_anomalous_quantum\" AS is_anomalous_quantum, \"signals.is_observation_verified\"\
  \ AS is_observation_verified FROM (SELECT\n  signals.signalregistry AS \"signals.signalregistry\"\
  ,\n  (\n    signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval\n\
  \  ) / 10.0 AS \"signals.eci\",\n  CASE\n    WHEN signalprobabilities.techsigprob\
  \ > 0.7\n    AND signalprobabilities.natsrcprob < 0.3\n    AND signalprobabilities.artsrcprob\
  \ < 50\n    AND (\n      bwhz / (\n        centerfreqmhz * 1000000.0\n      )\n\
  \    ) < 0.001\n    AND signalclassification.infodense > 0.8\n    THEN 1\n    ELSE\
  \ 0\n  END AS \"signals.is_technosignature\",\n  CASE\n    WHEN (\n      (\n   \
  \     1 - ABS(freqdrifthzs) / (\n          freqmhz * 1000.0\n        )\n      )\
  \ * sigdursec / (\n        1 + doppshifthz / 1000.0\n      )\n    ) > 0.8\n    AND\
  \ signalclassification.entropyval BETWEEN 0.4 AND 0.8\n    AND modindex > 0.5\n\
  \    THEN 1\n    ELSE 0\n  END AS \"signals.is_cip\",\n  CASE\n    WHEN (\n    \
  \  (\n        1 - ABS(freqdrifthzs) / (\n          freqmhz * 1000.0\n        )\n\
  \      ) * sigdursec / (\n        1 + doppshifthz / 1000.0\n      )\n    ) > 0.8\n\
  \    AND signalclassification.entropyval BETWEEN 0.4 AND 0.8\n    AND modindex >\
  \ 0.5\n    THEN 'Coherent Information Pattern Detected'\n    WHEN (\n      (\n \
  \       1 - ABS(freqdrifthzs) / (\n          freqmhz * 1000.0\n        )\n     \
  \ ) * sigdursec / (\n        1 + doppshifthz / 1000.0\n      )\n    ) > 0.6\n  \
  \  AND signalclassification.entropyval BETWEEN 0.3 AND 0.9\n    THEN 'Potential\
  \ Information Pattern'\n    ELSE 'No Clear Pattern'\n  END AS \"signals.cip_class\"\
  ,\n  CASE\n    WHEN sigdursec < 0.1\n    AND sigstrdb > 15\n    AND bwhz > 1000000\n\
  \    AND signalclassification.repeatcount = 1\n    THEN 1\n    ELSE 0\n  END AS\
  \ \"signals.is_frt\",\n  CASE\n    WHEN (\n      (\n        signaldecoding.compressratio\
  \ * signalclassification.complexidx * signalclassification.entropyval\n      ) /\
  \ 10.0\n    ) > 1.8\n    AND signalclassification.entropyval BETWEEN 0.3 AND 0.7\n\
  \    THEN 1\n    ELSE 0\n  END AS \"signals.is_eit\",\n  (\n    (\n      (\n   \
  \     signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval\n\
  \      ) / 10.0\n    ) * (\n      signalprobabilities.techsigprob * (\n        1\
  \ - signalprobabilities.natsrcprob\n      ) * signalprobabilities.sigunique * (\n\
  \        0.5 + signalprobabilities.anomscore / 10.0\n      )\n    )\n  ) / (\n \
  \   1 + signalprobabilities.natsrcprob\n  ) AS \"signals.aidp\",\n  signalclassification.entropyval\
  \ / (\n    signalprobabilities.natsrcprob * 0.9 + 0.1\n  ) AS \"signals.ier\",\n\
  \  (\n    signaldecoding.decodeiters * signaldecoding.proctimehrs\n  ) / (\n   \
  \ (\n      (\n        signaldecoding.compressratio * signalclassification.complexidx\
  \ * signalclassification.entropyval\n      ) / 10.0\n    ) * signalclassification.complexidx\n\
  \  ) AS \"signals.spei\",\n  (\n    1 - signalprobabilities.falseposprob\n  ) *\
  \ signaldecoding.decodeconf * signalclassification.classconf * (\n    CASE\n   \
  \   WHEN (\n        snrratio - 0.1 * ABS(noisefloordbm)\n      ) > 0\n      THEN\
  \ (\n        snrratio - 0.1 * ABS(noisefloordbm)\n      ) / 10.0 + 0.5\n      ELSE\
  \ 0.1\n    END\n  ) AS \"signals.ccs\",\n  (\n    1 - signalprobabilities.falseposprob\n\
  \  ) * signaldecoding.decodeconf * (\n    CASE\n      WHEN (\n        snrratio -\
  \ 0.1 * ABS(noisefloordbm)\n      ) > 0\n      THEN (\n        snrratio - 0.1 *\
  \ ABS(noisefloordbm)\n      ) / 10.0 + 0.5\n      ELSE 0.1\n    END\n  ) AS \"signals.ccs_approx\"\
  ,\n  (\n    signalprobabilities.techsigprob * (\n      1 - signalprobabilities.natsrcprob\n\
  \    ) * signalprobabilities.sigunique * (\n      0.5 + signalprobabilities.anomscore\
  \ / 10.0\n    )\n  ) * (\n    CASE\n      WHEN sourceproperties.objtype = 'Dwarf'\n\
  \      THEN (\n        CASE\n          WHEN sourceproperties.objmasssol BETWEEN\
  \ 0.7 AND 1.4\n          THEN (\n            CASE\n              WHEN (\n      \
  \          sourceproperties.sourcedistly / (\n                  CASE\n         \
  \           WHEN sourceproperties.objmasssol > 0\n                    THEN sourceproperties.objmasssol\n\
  \                    ELSE 1\n                  END\n                )\n        \
  \      ) BETWEEN 0.8 AND 1.7\n              THEN 2\n              ELSE 0.5\n   \
  \         END\n          )\n          ELSE 0.3\n        END\n      )\n      ELSE\
  \ 0.1\n    END\n  ) AS \"signals.hzsr\",\n  CASE\n    WHEN signalprobabilities.techsigprob\
  \ > 0.7\n    AND signalprobabilities.natsrcprob < 0.3\n    AND signalprobabilities.artsrcprob\
  \ < 50\n    AND (\n      bwhz / (\n        centerfreqmhz * 1000000.0\n      )\n\
  \    ) < 0.001\n    AND signalclassification.infodense > 0.8\n    AND (\n      (\n\
  \        1 - signalprobabilities.falseposprob\n      ) * signaldecoding.decodeconf\
  \ * signalclassification.classconf * (\n        CASE\n          WHEN (\n       \
  \     snrratio - 0.1 * ABS(noisefloordbm)\n          ) > 0\n          THEN (\n \
  \           snrratio - 0.1 * ABS(noisefloordbm)\n          ) / 10.0 + 0.5\n    \
  \      ELSE 0.1\n        END\n      )\n    ) > 0.9\n    AND (\n      modindex *\
  \ (\n        1 + (\n          (\n            1 - ABS(freqdrifthzs) / (\n       \
  \       freqmhz * 1000.0\n            )\n          ) * sigdursec / (\n         \
  \   1 + doppshifthz / 1000.0\n          )\n        )\n      ) * (\n        CASE\
  \ modtype WHEN 'AM' THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END\n      )\n    ) > 1.5\n\
  \    AND (\n      (\n        (\n          (\n            signaldecoding.compressratio\
  \ * signalclassification.complexidx * signalclassification.entropyval\n        \
  \  ) / 10.0\n        ) * (\n          signalprobabilities.techsigprob * (\n    \
  \        1 - signalprobabilities.natsrcprob\n          ) * signalprobabilities.sigunique\
  \ * (\n            0.5 + signalprobabilities.anomscore / 10.0\n          )\n   \
  \     )\n      ) / (\n        1 + signalprobabilities.natsrcprob\n      )\n    )\
  \ > 0.8\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_technosig_high_conf\",\n\
  \  CASE\n    WHEN (\n      (\n        1 - signalprobabilities.falseposprob\n   \
  \   ) * signaldecoding.decodeconf * signalclassification.classconf * (\n       \
  \ CASE\n          WHEN (\n            snrratio - 0.1 * ABS(noisefloordbm)\n    \
  \      ) > 0\n          THEN (\n            snrratio - 0.1 * ABS(noisefloordbm)\n\
  \          ) / 10.0 + 0.5\n          ELSE 0.1\n        END\n      )\n    ) > 0.8\n\
  \    THEN 1\n    ELSE 0\n  END AS \"signals.is_high_confidence\",\n  CASE\n    WHEN\
  \ (\n      (\n        signalprobabilities.techsigprob * (\n          1 - signalprobabilities.natsrcprob\n\
  \        ) * signalprobabilities.sigunique * (\n          0.5 + signalprobabilities.anomscore\
  \ / 10.0\n        )\n      ) * (\n        CASE\n          WHEN sourceproperties.objtype\
  \ = 'Dwarf'\n          THEN (\n            CASE\n              WHEN sourceproperties.objmasssol\
  \ BETWEEN 0.7 AND 1.4\n              THEN (\n                CASE\n            \
  \      WHEN (\n                    sourceproperties.sourcedistly / (\n         \
  \             CASE\n                        WHEN sourceproperties.objmasssol > 0\n\
  \                        THEN sourceproperties.objmasssol\n                    \
  \    ELSE 1\n                      END\n                    )\n                \
  \  ) BETWEEN 0.8 AND 1.7\n                  THEN 2\n                  ELSE 0.5\n\
  \                END\n              )\n              ELSE 0.3\n            END\n\
  \          )\n          ELSE 0.1\n        END\n      )\n    ) > 1.5\n    AND signalprobabilities.techsigprob\
  \ > 0.7\n    AND signalprobabilities.natsrcprob < 0.3\n    AND signalprobabilities.artsrcprob\
  \ < 50\n    AND (\n      bwhz / (\n        centerfreqmhz * 1000000.0\n      )\n\
  \    ) < 0.001\n    AND signalclassification.infodense > 0.8\n    THEN 1\n    ELSE\
  \ 0\n  END AS \"signals.is_habitable_zone_transmission\",\n  CASE\n    WHEN (\n\
  \      (\n        1 - ABS(freqdrifthzs) / (\n          freqmhz * 1000.0\n      \
  \  )\n      ) * sigdursec / (\n        1 + doppshifthz / 1000.0\n      )\n    )\
  \ > 0.8\n    AND signalclassification.entropyval BETWEEN 0.4 AND 0.8\n    AND modindex\
  \ > 0.5\n    AND signalclassification.repeatcount > 3\n    AND (\n      (\n    \
  \    signaldecoding.compressratio * signalclassification.complexidx * signalclassification.entropyval\n\
  \      ) / 10.0\n    ) > 2.0\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_multi_channel_protocol\"\
  ,\n  CASE\n    WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')\n\
  \    AND signalclassification.infodense > 1.5\n    AND (\n      (\n        signaldecoding.compressratio\
  \ * signalclassification.complexidx * signalclassification.entropyval\n      ) /\
  \ 10.0\n    ) > 2.5\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_quantum_coherent\"\
  ,\n  CASE\n    WHEN signaldynamics.spatstab = 'Moderate'\n    AND polarmode = 'Linear'\n\
  \    AND (\n      signalprobabilities.techsigprob * (\n        1 - signalprobabilities.natsrcprob\n\
  \      ) * signalprobabilities.sigunique * (\n        0.5 + signalprobabilities.anomscore\
  \ / 10.0\n      )\n    ) > 0.85\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_directed_transmission\"\
  ,\n  CASE\n    WHEN (\n      (\n        CASE\n          WHEN NOT sourceproperties.celestobj\
  \ IS NULL\n          AND sourceproperties.celestobj <> ''\n          AND sourceproperties.celestobj\
  \ <> 'Unknown'\n          THEN 2\n          ELSE 1\n        END\n      ) * (\n \
  \       CASE\n          WHEN sourceproperties.objtype = 'Giant'\n          AND sourceproperties.objmasssol\
  \ BETWEEN 0.8 AND 1.2\n          THEN 1.5\n          ELSE 1\n        END\n     \
  \ ) * (\n        CASE\n          WHEN sourceproperties.objmetal > 0\n          THEN\
  \ sourceproperties.objmetal + 1\n          ELSE 0.5\n        END\n      )\n    )\
  \ > 2.0\n    AND signalprobabilities.techsigprob > 0.7\n    AND signalprobabilities.natsrcprob\
  \ < 0.3\n    AND signalprobabilities.artsrcprob < 50\n    AND (\n      bwhz / (\n\
  \        centerfreqmhz * 1000000.0\n      )\n    ) < 0.001\n    AND signalclassification.infodense\
  \ > 0.8\n    AND (\n      (\n        (\n          (\n            signaldecoding.compressratio\
  \ * signalclassification.complexidx * signalclassification.entropyval\n        \
  \  ) / 10.0\n        ) * (\n          signalprobabilities.techsigprob * (\n    \
  \        1 - signalprobabilities.natsrcprob\n          ) * signalprobabilities.sigunique\
  \ * (\n            0.5 + signalprobabilities.anomscore / 10.0\n          )\n   \
  \     )\n      ) / (\n        1 + signalprobabilities.natsrcprob\n      )\n    )\
  \ > 0.7\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_galactic_significance\",\n\
  \  CASE\n    WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')\n\
  \    AND signalprobabilities.anomscore > 8\n    AND (\n      modindex * (\n    \
  \    1 + (\n          (\n            1 - ABS(freqdrifthzs) / (\n              freqmhz\
  \ * 1000.0\n            )\n          ) * sigdursec / (\n            1 + doppshifthz\
  \ / 1000.0\n          )\n        )\n      ) * (\n        CASE modtype WHEN 'AM'\
  \ THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END\n      )\n    ) > 2.0\n    THEN 1\n    ELSE\
  \ 0\n  END AS \"signals.is_anomalous_quantum\",\n  CASE\n    WHEN (\n      (\n \
  \       1 - signalprobabilities.falseposprob\n      ) * signaldecoding.decodeconf\
  \ * signalclassification.classconf * (\n        CASE\n          WHEN (\n       \
  \     snrratio - 0.1 * ABS(noisefloordbm)\n          ) > 0\n          THEN (\n \
  \           snrratio - 0.1 * ABS(noisefloordbm)\n          ) / 10.0 + 0.5\n    \
  \      ELSE 0.1\n        END\n      )\n    ) > 0.8\n    AND (\n      telescopes__observatories.atmostransparency\
  \ * (\n        1 - telescopes__observatories.humidityrate / 100.0\n      ) * (\n\
  \        1 - 0.02 * telescopes__observatories.windspeedms\n      )\n    ) > 0.85\n\
  \    AND telescopes__observatories.lunarstage IN ('New', 'First Quarter')\n    AND\
  \ telescopes__observatories.lunardistdeg > 45\n    AND telescopes__observatories.solarstatus\
  \ IN ('Low', 'Moderate')\n    AND (\n      (\n        telescopes__observatories.atmostransparency\
  \ * (\n          1 - telescopes__observatories.humidityrate / 100.0\n        ) *\
  \ (\n          1 - 0.02 * telescopes__observatories.windspeedms\n        )\n   \
  \   ) * (\n        1 - (\n          (\n            1 - telescopes__observatories.lunardistdeg\
  \ / 180.0\n          ) * (\n            1 - telescopes__observatories.atmostransparency\n\
  \          )\n        )\n      ) * (\n        CASE WHEN telescopes.pointaccarc <\
  \ 2 THEN 1 ELSE 2.0 / telescopes.pointaccarc END\n      )\n    ) > 0.85\n    THEN\
  \ 1\n    ELSE 0\n  END AS \"signals.is_observation_verified\"\nFROM signals AS signals\n\
  LEFT JOIN signalprobabilities AS signalprobabilities\n  ON signals.signalregistry\
  \ = signalprobabilities.signalref\nLEFT JOIN signaladvancedphenomena AS signaladvancedphenomena\n\
  \  ON signals.signalregistry = signaladvancedphenomena.signalref\nLEFT JOIN signaldynamics\
  \ AS signaldynamics\n  ON signals.signalregistry = signaldynamics.signalref\nLEFT\
  \ JOIN signaldecoding AS signaldecoding\n  ON signals.signalregistry = signaldecoding.signalref\n\
  LEFT JOIN telescopes AS telescopes\n  ON signals.telescref = telescopes.telescregistry\n\
  LEFT JOIN sourceproperties AS sourceproperties\n  ON signals.signalregistry = sourceproperties.signalref\n\
  LEFT JOIN signalclassification AS signalclassification\n  ON signals.signalregistry\
  \ = signalclassification.signalref\nLEFT JOIN observatories AS telescopes__observatories\n\
  \  ON telescopes.observstation = telescopes__observatories.observstation) AS _inner"
