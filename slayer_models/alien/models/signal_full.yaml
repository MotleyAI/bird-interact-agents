  \ child tables (signalprobabilities, signalclassification, signaldecoding, signaladvancedphenomena,\
  \ signaldynamics, sourceproperties) plus signals \u2192 telescopes \u2192 observatories.\
  \ Hosts every composite KB metric whose formula references columns living on multiple\
  \ peer tables, including ECI (KB6), Technosignature (KB10), CIP (KB11), FRT (KB19),\
  \ EIT (KB18), AIDP (KB31), IER (KB33), SPEI (KB34), CCS (KB36), HZSR (KB37), CIP\
  \ class (KB24), CCS Approximation (KB47), High-Confidence Technosignature (KB40),\
  \ High Confidence Signals (KB54), Habitable Zone Transmission (KB41), Multi-Channel\
  \ Communication Protocol (KB42), Quantum-Coherent Transmission (KB43), Directed\
  \ Transmission (KB45), Signal of Galactic Significance (KB46), Anomalous Quantum\
  \ Signal (KB49), and Observation-Verified Signal (KB48)."
