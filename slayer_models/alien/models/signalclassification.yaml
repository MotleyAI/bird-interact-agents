- name: sigclasstype
  sql: sigclasstype
  type: string
  primary_key: false
  description: Classification Type. sigclasstype='Broadband Transient' describes short-duration
    signals (SigDurSec typically < 5) that span a large portion of the spectrum (BFR
    > 0.1). Examples include solar radio bursts, lightning discharges, and certain
    types of cosmic explosions like Fast Radio Bursts (FRBs).
  hidden: false
  meta:
    kb_id: 25
