description: "Habitable Zone Transmission predicate per signal.\n\n[kb=41]\nA signal\
  \ with $\\text{HZSR} > 1.5$ and Technosignature characteristics, originating from\
  \ a star system with conditions potentially suitable for life, making it a priority\
  \ candidate for SETI research. \u2014 Identifies signals originating from stellar\
  \ habitable zones with technological characteristics.\n[/kb=41]"
