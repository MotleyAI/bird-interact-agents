version: 4
name: signal_is_habitable_zone_transmission
source_queries:
- version: 3
  source_model:
    source_name: signals
    joins:
    - target_model: signalclassification
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signalprobabilities
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: sourceproperties
      join_pairs:
      - - signalregistry
        - signalref
    columns:
    - name: is_habitable_zone_transmission
      type: boolean
      sql: CASE WHEN ((signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0))
        * (CASE WHEN sourceproperties.objtype = 'Dwarf' THEN (CASE WHEN sourceproperties.objmasssol
        BETWEEN 0.7 AND 1.4 THEN (CASE WHEN (sourceproperties.sourcedistly / (CASE
        WHEN sourceproperties.objmasssol > 0 THEN sourceproperties.objmasssol ELSE
        1 END)) BETWEEN 0.8 AND 1.7 THEN 2 ELSE 0.5 END) ELSE 0.3 END) ELSE 0.1 END))
        > 1.5 AND signalprobabilities.techsigprob > 0.7 AND signalprobabilities.natsrcprob
        < 0.3 AND signalprobabilities.artsrcprob < 50 AND (bwhz / (centerfreqmhz *
        1000000.0)) < 0.001 AND signalclassification.infodense > 0.8 THEN 1 ELSE 0
        END
  dimensions:
  - name: signalregistry
  - name: is_habitable_zone_transmission
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"signals.signalregistry\" AS signalregistry, \"signals.is_habitable_zone_transmission\"\
  \ AS is_habitable_zone_transmission FROM (SELECT\n  signals.signalregistry AS \"\
  signals.signalregistry\",\n  CASE\n    WHEN (\n      (\n        signalprobabilities.techsigprob\
  \ * (\n          1 - signalprobabilities.natsrcprob\n        ) * signalprobabilities.sigunique\
  \ * (\n          0.5 + signalprobabilities.anomscore / 10.0\n        )\n      )\
  \ * (\n        CASE\n          WHEN sourceproperties.objtype = 'Dwarf'\n       \
  \   THEN (\n            CASE\n              WHEN sourceproperties.objmasssol BETWEEN\
  \ 0.7 AND 1.4\n              THEN (\n                CASE\n                  WHEN\
  \ (\n                    sourceproperties.sourcedistly / (\n                   \
  \   CASE\n                        WHEN sourceproperties.objmasssol > 0\n       \
  \                 THEN sourceproperties.objmasssol\n                        ELSE\
  \ 1\n                      END\n                    )\n                  ) BETWEEN\
  \ 0.8 AND 1.7\n                  THEN 2\n                  ELSE 0.5\n          \
  \      END\n              )\n              ELSE 0.3\n            END\n         \
  \ )\n          ELSE 0.1\n        END\n      )\n    ) > 1.5\n    AND signalprobabilities.techsigprob\
  \ > 0.7\n    AND signalprobabilities.natsrcprob < 0.3\n    AND signalprobabilities.artsrcprob\
  \ < 50\n    AND (\n      signals.bwhz / (\n        signals.centerfreqmhz * 1000000.0\n\
  \      )\n    ) < 0.001\n    AND signalclassification.infodense > 0.8\n    THEN\
  \ 1\n    ELSE 0\n  END AS \"signals.is_habitable_zone_transmission\"\nFROM signals\
  \ AS signals\nLEFT JOIN signalprobabilities AS signalprobabilities\n  ON signals.signalregistry\
  \ = signalprobabilities.signalref\nLEFT JOIN sourceproperties AS sourceproperties\n\
  \  ON signals.signalregistry = sourceproperties.signalref\nLEFT JOIN signalclassification\
  \ AS signalclassification\n  ON signals.signalregistry = signalclassification.signalref)\
  \ AS _inner"
