description: "CCS Approximation per signal.\n\n[kb=47]\n$(1 - \\text{FalsePosProb})\
  \ \\times \\text{DecodeConf} \\times (\\text{SNR} - 0.1 \\times |\\text{NoiseFloorDbm}|\
  \ > 0 ? \\frac{\\text{SNR} - 0.1 \\times |\\text{NoiseFloorDbm}|}{10} + 0.5 : 0.1)$\
  \ \u2014 Simplified CCS calculation using direct signal-to-noise ratio values when\
  \ full Signal-to-Noise Quality Indicator (SNQI) data is unavailable.\n[/kb=47]"
