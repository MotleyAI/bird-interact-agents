description: "Multi-Channel Communication Protocol predicate per signal.\n\n[kb=42]\n\
  Signal exhibiting Coherent Information Pattern (CIP) characteristics across multiple\
  \ frequency channels with coordinated timing ($\\text{RepeatCount} > 3$, $\\text{PeriodSec}$\
  \ consistent across observations) and $\\text{ECI} > 2.0$, suggesting a designed\
  \ communication system. \u2014 Identifies signal patterns consistent with sophisticated\
  \ communication protocols.\n[/kb=42]"
