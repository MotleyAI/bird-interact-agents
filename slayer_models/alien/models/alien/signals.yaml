    \ waves where the electric field vector rotates in a circular pattern as the wave\
    \ propagates. Circular polarization maintaining high purity across frequency (indicated\
    \ by PolarAngleDeg stability) is rare in natural sources and may indicate technological\
    \ origin.\n\n[kb=26]\nDescribes electromagnetic waves where the electric field\
    \ vector rotates in a circular pattern as the wave propagates. Circular polarization\
    \ maintaining high purity across frequency (indicated by $\\text{PolarAngleDeg}$\
    \ stability) is rare in natural sources and may indicate technological origin.\
