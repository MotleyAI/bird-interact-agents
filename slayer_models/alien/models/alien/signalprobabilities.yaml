  - - signalref
    - signalregistry
  join_type: left
filters: []
description: 'Per-signal probabilistic scores: false positive probability, signal
  uniqueness, similarity / correlation / anomaly scores, and origin probabilities
  (technosignature / biosignature / natural / artificial).'
hidden: false
