columns:
- name: signalref
  sql: signalref
  type: string
  primary_key: true
  hidden: false
- name: falseposprob
  sql: falseposprob
  type: number
  primary_key: false
  description: "False Positive Probability. FalsePosProb < 0.01 indicates less than\
    \ 1% probability that the signal is a false detection or artifact. Such low false\
    \ positive probability typically results from multiple independent confirmations,\
    \ excellent signal strength (high SnrRatio), and elimination of all known terrestrial\
    \ and instrumental sources.\n\n[kb=29]\nIndicates less than 1% probability that\
    \ the signal is a false detection or artifact. Such low false positive probability\
    \ typically results from multiple independent confirmations, excellent signal\
    \ strength (high $\\text{SnrRatio}$), and elimination of all known terrestrial\
    \ and instrumental sources. \u2014 Illustrates extremely high confidence in signal\
    \ detection.\n[/kb=29]"
  label: 'FalsePosProb: <0.01'
  hidden: false
  format:
    type: float
  meta:
    kb_id: 29
- name: sigunique
  sql: sigunique
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: simindex
  sql: simindex
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: corrscore
  sql: corrscore
