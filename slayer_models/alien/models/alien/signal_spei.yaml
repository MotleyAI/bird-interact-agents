description: "Signal Processing Efficiency Index (SPEI) per signal.\n\n[kb=34]\n$\\\
  text{SPEI} = \\frac{\\text{DecodeIters} \\times \\text{ProcTimeHrs}}{\\text{ECI}\
  \ \\times \\text{ComplexIdx}}$, where ECI (Encoding Complexity Index) provides the\
  \ complexity component to normalize processing time and iterations. \u2014 Evaluates\
  \ the computational efficiency of signal processing relative to complexity.\n[/kb=34]"
