description: "Confirmation Confidence Score (CCS) per signal.\n\n[kb=36]\n$\\text{CCS}\
  \ = (1 - \\text{FalsePosProb}) \\times \\text{DecodeConf} \\times \\text{ClassConf}\
  \ \\times (\\text{SNQI} > 0 ? \\frac{\\text{SNQI}}{10} + 0.5 : 0.1)$, where SNQI\
  \ (Signal-to-Noise Quality Indicator) provides a quality weighting factor. \u2014\
  \ Quantifies overall confidence in signal verification across multiple parameters.\n\
  [/kb=36]"
