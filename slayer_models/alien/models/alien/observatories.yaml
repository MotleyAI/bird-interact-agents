- name: geomagstatus
  sql: geomagstatus
  type: string
  primary_key: false
  description: "Geomagnetic Activity status. GeomagStatus='Storm' (or 'Major Storm'\
    \ in domain prose) indicates intense solar-induced geomagnetic activity (Kp index\
    \ >= 7). During such conditions, ionospheric perturbations significantly affect\
    \ radio observations below 100 MHz, aurora may be visible at mid-latitudes, and\
    \ satellite communications may experience disruptions.\n\n[kb=23]\nIndicates intense\
    \ solar-induced geomagnetic activity with Kp index \u2265 7. During such conditions,\
    \ ionospheric perturbations significantly affect radio observations below 100\
    \ MHz, aurora may be visible at mid-latitudes, and satellite communications may\
    \ experience disruptions. \u2014 Illustrates severe geomagnetic disturbance conditions.\n\
    [/kb=23]"
  label: 'GeomagStatus: Major Storm'
  hidden: false
  meta:
    kb_id: 23
