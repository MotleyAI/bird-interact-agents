- name: weathprofile
  sql: weathprofile
  type: string
  primary_key: false
  description: "Weather Profile. WeathProfile='Clear' indicates pristine sky conditions\
    \ with no clouds, usually associated with AtmosTransparency > 0.9, low HumidityRate\
    \ (<40%), and minimal WindSpeedMs (<3.0). Provides ideal visibility for optical\
    \ observations and minimal atmospheric interference for radio observations.\n\n\
    [kb=20]\nIndicates pristine sky conditions with no clouds, usually associated\
    \ with $\\text{AtmosTransparency} > 0.9$, low $\\text{HumidityRate} (< 40\\%)$,\
    \ and minimal $\\text{WindSpeedMs} (< 3.0)$. Provides ideal visibility for optical\
    \ observations and minimal atmospheric interference for radio observations. \u2014\
    \ Illustrates optimal weather conditions for signal detection.\n[/kb=20]"
  label: 'WeathProfile: Clear'
  hidden: false
  meta:
    kb_id: 20
- name: seeingprofile
  sql: seeingprofile
  type: string
  primary_key: false
  description: "Seeing Profile. SeeingProfile='Excellent' describes atmospheric conditions\
    \ with minimal turbulence, allowing for sharp, detailed observations. Typically\
    \ corresponds to image stability better than 1 arcsecond and is often associated\
    \ with stable temperature gradients and low wind speeds (WindSpeedMs < 2.5).\n\
    \n[kb=21]\nDescribes atmospheric conditions with minimal turbulence, allowing\
    \ for sharp, detailed observations. Typically corresponds to image stability better\
    \ than 1 arcsecond and is often associated with stable temperature gradients and\
    \ low wind speeds ($\\text{WindSpeedMs} < 2.5$). \u2014 Illustrates superior atmospheric\
    \ seeing conditions.\n[/kb=21]"
  label: 'SeeingProfile: Excellent'
  hidden: false
  meta:
    kb_id: 21
