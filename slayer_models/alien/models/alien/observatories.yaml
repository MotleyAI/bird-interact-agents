- name: aoi
  sql: atmostransparency * (1 - humidityrate / 100.0) * (1 - 0.02 * windspeedms)
  type: number
  primary_key: false
  description: "Atmospheric Observability Index (AOI) = AtmosTransparency * (1 - HumidityRate/100)\
    \ * (1 - 0.02 * WindSpeedMs). Values closer to 1 indicate ideal observation conditions.\n\
    \n[kb=1]\n$\\text{AOI} = \\text{AtmosTransparency} \\times (1 - \\frac{\\text{HumidityRate}}{100})\
    \ \\times (1 - 0.02 \\times \\text{WindSpeedMs})$, where values closer to 1 indicate\
    \ ideal observation conditions. \u2014 Quantifies how conducive atmospheric conditions\
    \ are for signal detection.\n[/kb=1]"
  label: Atmospheric Observability Index (AOI)
  hidden: false
  meta:
    kb_id: 1
- name: disf
  sql: (10 - ABS(airtempc - 15) / 10.0) * atmostransparency * (1 - humidityrate /
    200.0) * (100 - lunardistdeg) / 100.0
  type: number
  primary_key: false
  description: "Detection Instrument Sensitivity Factor (DISF) = (10 - |AirTempC-15|/10)\
    \ * AtmosTransparency * (1 - HumidityRate/200) * (100 - LunarDistDeg)/100. Values\
    \ closer to 10 indicate optimal detection sensitivity.\n\n[kb=5]\n$\\text{DISF}\
    \ = (10 - \\frac{|\\text{AirTempC} - 15|}{10}) \\times \\text{AtmosTransparency}\
    \ \\times (1 - \\frac{\\text{HumidityRate}}{200}) \\times \\frac{100 - \\text{LunarDistDeg}}{100}$,\
    \ where values closer to 10 indicate optimal detection sensitivity. \u2014 Calculates\
    \ the effective sensitivity of the detection setup based on telescope and environmental\
    \ factors.\n[/kb=5]"
  label: Detection Instrument Sensitivity Factor (DISF)
  hidden: false
  meta:
    kb_id: 5
- name: lif
  sql: (1 - lunardistdeg / 180.0) * (1 - atmostransparency)
  type: number
  primary_key: false
  description: "Lunar Interference Factor (LIF) = (1 - LunarDistDeg/180) * (1 - AtmosTransparency).\
    \ Higher values indicate more lunar interference; values above 0.5 suggest significant\
    \ lunar contamination.\n\n[kb=9]\n$\\text{LIF} = (1 - \\frac{\\text{LunarDistDeg}}{180})\
    \ \\times (1 - \\text{AtmosTransparency})$, where higher values indicate more\
    \ lunar interference. Values above 0.5 suggest significant lunar contamination\
    \ in data. \u2014 Calculates the potential interference from lunar illumination\
    \ on observations.\n[/kb=9]"
  label: Lunar Interference Factor (LIF)
  hidden: false
  meta:
    kb_id: 9
- name: is_oow
  sql: CASE WHEN (atmostransparency * (1 - humidityrate / 100.0) * (1 - 0.02 * windspeedms))
    > 0.85 AND lunarstage IN ('New', 'First Quarter') AND lunardistdeg > 45 AND solarstatus
    IN ('Low', 'Moderate') THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Optimal Observing Window (OOW): periods when AOI > 0.85, LunarStage\
    \ in ('New','First Quarter'), LunarDistDeg > 45, SolarStatus in ('Low','Moderate').\n\
    \n[kb=13]\nTime periods when $\\text{AOI} > 0.85$, $\\text{LunarStage}$ is 'New'\
    \ or 'First Quarter', $\\text{LunarDistDeg} > 45$, and $\\text{SolarStatus}$ is\
    \ 'Low' or 'Moderate'. \u2014 Defines conditions when observational quality is\
    \ maximized.\n[/kb=13]"
  label: Optimal Observing Window (OOW)
  hidden: false
  meta:
    kb_id: 13
- name: is_sds
  sql: CASE WHEN atmostransparency < 0.7 OR humidityrate > 70 OR windspeedms > 8 OR
    geomagstatus LIKE '%Storm%' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Signal Degradation Scenario (SDS): observation conditions where AtmosTransparency<0.7\
    \ OR HumidityRate>70 OR WindSpeedMs>8 OR GeomagStatus contains 'Storm'.\n\n[kb=14]\n\
    Observation conditions where one or more of: $\\text{AtmosTransparency} < 0.7$,\
    \ $\\text{HumidityRate} > 70$, $\\text{WindSpeedMs} > 8$, or $\\text{GeomagStatus}$\
    \ contains 'Storm', resulting in compromised data quality. \u2014 Characterizes\
    \ situations where signal quality is compromised by environmental factors.\n[/kb=14]"
  label: Signal Degradation Scenario (SDS)
  hidden: false
  meta:
    kb_id: 14
- name: is_high_lif
  sql: CASE WHEN ((1 - lunardistdeg / 180.0) * (1 - atmostransparency)) > 0.5 THEN
    1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "High Lunar Interference Events: observations where LIF > 0.5, indicating\
    \ strong lunar contamination in the data.\n\n[kb=53]\nEvents where the calculated\
    \ LIF is greater than 0.5, indicating strong lunar contamination in the data.\
    \ \u2014 Observations with significant lunar interference.\n[/kb=53]"
  label: High Lunar Interference Events
  hidden: false
  meta:
    kb_id: 53
