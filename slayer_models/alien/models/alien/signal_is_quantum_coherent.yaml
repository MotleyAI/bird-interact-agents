version: 4
name: signal_is_quantum_coherent
source_queries:
- version: 3
  source_model:
    source_name: signals
    joins:
    - target_model: signaldecoding
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signalclassification
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signaladvancedphenomena
      join_pairs:
      - - signalregistry
        - signalref
    columns:
    - name: is_quantum_coherent
      type: boolean
      sql: CASE WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')
        AND signalclassification.infodense > 1.5 AND ((signaldecoding.compressratio
        * signalclassification.complexidx * signalclassification.entropyval) / 10.0)
        > 2.5 THEN 1 ELSE 0 END
  dimensions:
  - name: signalregistry
  - name: is_quantum_coherent
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"signals.signalregistry\" AS signalregistry, \"signals.is_quantum_coherent\"\
  \ AS is_quantum_coherent FROM (SELECT\n  signals.signalregistry AS \"signals.signalregistry\"\
  ,\n  CASE\n    WHEN signaladvancedphenomena.quanteffects IN ('Significant', 'Observed')\n\
  \    AND signalclassification.infodense > 1.5\n    AND (\n      (\n        signaldecoding.compressratio\
  \ * signalclassification.complexidx * signalclassification.entropyval\n      ) /\
  \ 10.0\n    ) > 2.5\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_quantum_coherent\"\
  \nFROM signals AS signals\nLEFT JOIN signaladvancedphenomena AS signaladvancedphenomena\n\
  \  ON signals.signalregistry = signaladvancedphenomena.signalref\nLEFT JOIN signaldecoding\
  \ AS signaldecoding\n  ON signals.signalregistry = signaldecoding.signalref\nLEFT\
  \ JOIN signalclassification AS signalclassification\n  ON signals.signalregistry\
  \ = signalclassification.signalref) AS _inner"
data_source: alien
columns:
- name: signalregistry
  sql: signalregistry
  type: string
  primary_key: false
  hidden: false
- name: is_quantum_coherent
  sql: is_quantum_coherent
  type: boolean
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Quantum-Coherent Transmission predicate per signal.\n\n[kb=43]\nSignals\
  \ with $\\text{QuantEffects}$ containing 'Significant' or 'Observed' patterns, exhibiting\
  \ unusually high information density ($\\text{InfoDense} > 1.5$) while maintaining\
  \ an $\\text{ECI} > 2.5$, suggesting advanced transmission technologies beyond conventional\
  \ radiofrequency methods. \u2014 Describes signals potentially employing quantum\
  \ properties for communication.\n[/kb=43]"
