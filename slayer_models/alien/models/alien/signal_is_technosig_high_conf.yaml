  \ Technosignature with $\\text{CCS} > 0.9$, $\\text{MCS} > 1.5$, and $\\text{AIDP}\
  \ > 0.8$, indicating a signal that meets the basic Technosignature criteria with\
  \ additional confirmation through modulation complexity and artificial intelligence\
  \ detection markers. \u2014 Defines signals with extremely high likelihood of technological\
  \ origin.\n[/kb=40]"
