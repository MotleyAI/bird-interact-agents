version: 4
name: signal_is_technosig_high_conf
source_queries:
- version: 3
  source_model:
    source_name: signals
    joins:
    - target_model: signaldecoding
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signalclassification
      join_pairs:
      - - signalregistry
        - signalref
    - target_model: signalprobabilities
      join_pairs:
      - - signalregistry
        - signalref
    columns:
    - name: is_technosig_high_conf
      type: boolean
      sql: CASE WHEN signalprobabilities.techsigprob > 0.7 AND signalprobabilities.natsrcprob
        < 0.3 AND signalprobabilities.artsrcprob < 50 AND (bwhz / (centerfreqmhz *
        1000000.0)) < 0.001 AND signalclassification.infodense > 0.8 AND ((1 - signalprobabilities.falseposprob)
        * signaldecoding.decodeconf * signalclassification.classconf * (CASE WHEN
        (snrratio - 0.1 * ABS(noisefloordbm)) > 0 THEN (snrratio - 0.1 * ABS(noisefloordbm))
        / 10.0 + 0.5 ELSE 0.1 END)) > 0.9 AND (modindex * (1 + ((1 - ABS(freqdrifthzs)
        / (freqmhz * 1000.0)) * sigdursec / (1 + doppshifthz / 1000.0))) * (CASE modtype
        WHEN 'AM' THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END)) > 1.5 AND ((((signaldecoding.compressratio
        * signalclassification.complexidx * signalclassification.entropyval) / 10.0)
        * (signalprobabilities.techsigprob * (1 - signalprobabilities.natsrcprob)
        * signalprobabilities.sigunique * (0.5 + signalprobabilities.anomscore / 10.0)))
        / (1 + signalprobabilities.natsrcprob)) > 0.8 THEN 1 ELSE 0 END
  dimensions:
  - name: signalregistry
  - name: is_technosig_high_conf
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"signals.signalregistry\" AS signalregistry, \"signals.is_technosig_high_conf\"\
  \ AS is_technosig_high_conf FROM (SELECT\n  signals.signalregistry AS \"signals.signalregistry\"\
  ,\n  CASE\n    WHEN signalprobabilities.techsigprob > 0.7\n    AND signalprobabilities.natsrcprob\
  \ < 0.3\n    AND signalprobabilities.artsrcprob < 50\n    AND (\n      signals.bwhz\
  \ / (\n        signals.centerfreqmhz * 1000000.0\n      )\n    ) < 0.001\n    AND\
  \ signalclassification.infodense > 0.8\n    AND (\n      (\n        1 - signalprobabilities.falseposprob\n\
  \      ) * signaldecoding.decodeconf * signalclassification.classconf * (\n    \
  \    CASE\n          WHEN (\n            signals.snrratio - 0.1 * ABS(signals.noisefloordbm)\n\
  \          ) > 0\n          THEN (\n            signals.snrratio - 0.1 * ABS(signals.noisefloordbm)\n\
  \          ) / 10.0 + 0.5\n          ELSE 0.1\n        END\n      )\n    ) > 0.9\n\
  \    AND (\n      signals.modindex * (\n        1 + (\n          (\n           \
  \ 1 - ABS(signals.freqdrifthzs) / (\n              signals.freqmhz * 1000.0\n  \
  \          )\n          ) * signals.sigdursec / (\n            1 + signals.doppshifthz\
  \ / 1000.0\n          )\n        )\n      ) * (\n        CASE signals.modtype WHEN\
  \ 'AM' THEN 2 WHEN 'FM' THEN 1.5 ELSE 1 END\n      )\n    ) > 1.5\n    AND (\n \
  \     (\n        (\n          (\n            signaldecoding.compressratio * signalclassification.complexidx\
  \ * signalclassification.entropyval\n          ) / 10.0\n        ) * (\n       \
  \   signalprobabilities.techsigprob * (\n            1 - signalprobabilities.natsrcprob\n\
  \          ) * signalprobabilities.sigunique * (\n            0.5 + signalprobabilities.anomscore\
  \ / 10.0\n          )\n        )\n      ) / (\n        1 + signalprobabilities.natsrcprob\n\
  \      )\n    ) > 0.8\n    THEN 1\n    ELSE 0\n  END AS \"signals.is_technosig_high_conf\"\
  \nFROM signals AS signals\nLEFT JOIN signaldecoding AS signaldecoding\n  ON signals.signalregistry\
  \ = signaldecoding.signalref\nLEFT JOIN signalprobabilities AS signalprobabilities\n\
  \  ON signals.signalregistry = signalprobabilities.signalref\nLEFT JOIN signalclassification\
  \ AS signalclassification\n  ON signals.signalregistry = signalclassification.signalref)\
  \ AS _inner"
