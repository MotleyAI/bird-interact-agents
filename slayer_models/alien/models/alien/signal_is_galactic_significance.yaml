description: "Signal of Galactic Significance predicate per signal.\n\n[kb=46]\nSignals\
  \ originating from regions of high $\\text{CLSF} (> 2.0)$ that display Technosignature\
  \ characteristics and have $\\text{AIDP} > 0.7$, representing potential evidence\
  \ of advanced civilizations at galactic-relevant locations. \u2014 Classifies signals\
  \ with potential importance to galactic civilization models.\n[/kb=46]"
