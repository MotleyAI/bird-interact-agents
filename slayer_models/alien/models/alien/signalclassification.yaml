- name: sigclasstype
  sql: sigclasstype
  type: TEXT
  primary_key: false
  description: "Classification Type. sigclasstype='Broadband Transient' describes\
    \ short-duration signals (SigDurSec typically < 5) that span a large portion of\
    \ the spectrum (BFR > 0.1). Examples include solar radio bursts, lightning discharges,\
    \ and certain types of cosmic explosions like Fast Radio Bursts (FRBs).\n\n[kb=25]\n\
    Describes short-duration signals ($\\text{SigDurSec}$ typically $< 5$) that span\
    \ a large portion of the spectrum ($\\text{BFR} > 0.1$). Examples include solar\
    \ radio bursts, lightning discharges, and certain types of cosmic explosions like\
    \ Fast Radio Bursts (FRBs). \u2014 Illustrates a class of brief signals covering\
    \ wide frequency ranges.\n[/kb=25]"
  label: 'SigClassType: Broadband Transient'
  hidden: false
  meta:
    kb_id: 25
