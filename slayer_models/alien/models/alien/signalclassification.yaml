- name: scr
  sql: (complexidx * infodense) / log10(signals.bwhz)
  type: DOUBLE
  primary_key: false
  description: "Signal Complexity Ratio (SCR) = (ComplexIdx * InfoDense) / log10(BwHz).\
    \ ComplexIdx and InfoDense are local; BwHz is reached through the signalclassification.signalref\
    \ \u2192 signals FK. log10 is provided as a SQLite UDF by SLayer 0.4.2. Higher\
    \ values suggest potential artificial origin rather than natural phenomena.\n\n\
    [kb=2]\n$\\text{SCR} = \\frac{\\text{ComplexIdx} \\times \\text{InfoDense}}{\\\
    log(\\text{BwHz})}$, where higher values suggest potential artificial origin rather\
    \ than natural phenomena. \u2014 Measures the relationship between signal complexity\
    \ and information density.\n[/kb=2]"
  label: Signal Complexity Ratio (SCR)
  hidden: false
  meta:
    kb_id: 2
- name: prc
  sql: (CASE WHEN repeatcount > 1 THEN 1 + log10(repeatcount) ELSE 0.5 END) * (CASE
    WHEN entropyval < 0.9 THEN 1 ELSE 0.3 END) * ((complexidx * infodense) / log10(signals.bwhz))
  type: DOUBLE
  primary_key: false
  description: "Pattern Recognition Confidence (PRC) = (RepeatCount>1 ? 1+log10(RepeatCount)\
    \ : 0.5) * (EntropyVal<0.9 ? 1 : 0.3) * SCR. SCR is the local signalclassification.scr\
    \ column inlined as its formula (since referencing a derived sibling column inside\
    \ a Column.sql expression isn't guaranteed to resolve at SQL-generation time).\n\
    \n[kb=38]\n$\\text{PRC} = (\\text{RepeatCount} > 1 ? 1 + \\log_{10}(\\text{RepeatCount})\
    \ : 0.5) \\times (\\text{EntropyVal} < 0.9 ? 1 : 0.3) \\times \\text{SCR}$, where\
    \ SCR (Signal Complexity Ratio) provides complexity weighting. \u2014 Measures\
    \ confidence in identified signal patterns based on multiple factors.\n[/kb=38]"
  label: Pattern Recognition Confidence (PRC)
  hidden: false
  meta:
    kb_id: 38
