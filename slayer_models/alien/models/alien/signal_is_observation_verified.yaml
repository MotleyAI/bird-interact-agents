description: "Observation-Verified Signal predicate per signal.\n\n[kb=48]\nSignals\
  \ observed under Optimal Observing Window (OOW) conditions with $\\text{OQF} > 0.85$\
  \ and $\\text{CCS} > 0.8$, indicating high-quality observations with multiple verification\
  \ methods applied. \u2014 Defines signals that have undergone rigorous verification\
  \ processes.\n[/kb=48]"
