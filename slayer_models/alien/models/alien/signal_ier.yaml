description: "Information Entropy Ratio (IER) per signal.\n\n[kb=33]\n$\\text{IER}\
  \ = \\frac{\\text{EntropyVal}}{\\text{NatSrcProb} \\times 0.9 + 0.1}$, where values\
  \ significantly greater than 1 suggest non-natural information content. Uses NatSrcProb\
  \ as a baseline for expected natural entropy. \u2014 Compares signal entropy to\
  \ expected natural background entropy.\n[/kb=33]"
