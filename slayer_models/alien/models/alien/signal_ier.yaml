backing_query_sql: "SELECT \"signals.signalregistry\" AS signalregistry, \"signals.ier\"\
  \ AS ier FROM (SELECT\n  signals.signalregistry AS \"signals.signalregistry\",\n\
  \  signalclassification.entropyval / (\n    signalprobabilities.natsrcprob * 0.9\
  \ + 0.1\n  ) AS \"signals.ier\"\nFROM signals AS signals\nLEFT JOIN signalprobabilities\
  \ AS signalprobabilities\n  ON signals.signalregistry = signalprobabilities.signalref\n\
  LEFT JOIN signalclassification AS signalclassification\n  ON signals.signalregistry\
  \ = signalclassification.signalref) AS _inner"
