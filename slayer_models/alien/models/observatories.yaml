version: 3
name: observatories
sql_table: observatories
query_variables: {}
data_source: alien
columns:
- name: observstation
  sql: observstation
  type: string
  primary_key: true
  hidden: false
- name: weathprofile
  sql: weathprofile
  type: string
  primary_key: false
  description: Weather Profile. WeathProfile='Clear' indicates pristine sky conditions
    with no clouds, usually associated with AtmosTransparency > 0.9, low HumidityRate
    (<40%), and minimal WindSpeedMs (<3.0). Provides ideal visibility for optical
    observations and minimal atmospheric interference for radio observations.
  hidden: false
  meta:
    kb_id: 20
- name: seeingprofile
  sql: seeingprofile
  type: string
  primary_key: false
  description: Seeing Profile. SeeingProfile='Excellent' describes atmospheric conditions
    with minimal turbulence, allowing for sharp, detailed observations. Typically
    corresponds to image stability better than 1 arcsecond and is often associated
    with stable temperature gradients and low wind speeds (WindSpeedMs < 2.5).
  hidden: false
  meta:
    kb_id: 21
- name: atmostransparency
  sql: atmostransparency
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: lunarstage
  sql: lunarstage
  type: string
  primary_key: false
  hidden: false
- name: lunardistdeg
  sql: lunardistdeg
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: solarstatus
  sql: solarstatus
  type: string
  primary_key: false
  hidden: false
- name: geomagstatus
  sql: geomagstatus
  type: string
  primary_key: false
  description: Geomagnetic Activity status. GeomagStatus='Storm' (or 'Major Storm'
    in domain prose) indicates intense solar-induced geomagnetic activity (Kp index
    >= 7). During such conditions, ionospheric perturbations significantly affect
    radio observations below 100 MHz, aurora may be visible at mid-latitudes, and
    satellite communications may experience disruptions.
  hidden: false
  meta:
    kb_id: 23
- name: sidereallocal
  sql: sidereallocal
  type: string
  primary_key: false
  hidden: false
- name: airtempc
  sql: airtempc
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: humidityrate
  sql: humidityrate
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: windspeedms
  sql: windspeedms
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: presshpa
  sql: presshpa
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
- name: aoi
  sql: atmostransparency * (1 - humidityrate / 100.0) * (1 - 0.02 * windspeedms)
  type: number
  primary_key: false
  description: Atmospheric Observability Index (AOI) = AtmosTransparency * (1 - HumidityRate/100)
    * (1 - 0.02 * WindSpeedMs). Values closer to 1 indicate ideal observation conditions.
  hidden: false
  meta:
    kb_id: 1
- name: disf
  sql: (10 - ABS(airtempc - 15) / 10.0) * atmostransparency * (1 - humidityrate /
    200.0) * (100 - lunardistdeg) / 100.0
  type: number
  primary_key: false
  description: Detection Instrument Sensitivity Factor (DISF) = (10 - |AirTempC-15|/10)
    * AtmosTransparency * (1 - HumidityRate/200) * (100 - LunarDistDeg)/100. Values
    closer to 10 indicate optimal detection sensitivity.
  hidden: false
  meta:
    kb_id: 5
- name: lif
  sql: (1 - lunardistdeg / 180.0) * (1 - atmostransparency)
  type: number
  primary_key: false
  description: Lunar Interference Factor (LIF) = (1 - LunarDistDeg/180) * (1 - AtmosTransparency).
    Higher values indicate more lunar interference; values above 0.5 suggest significant
    lunar contamination.
  hidden: false
  meta:
    kb_id: 9
- name: is_oow
  sql: CASE WHEN (atmostransparency * (1 - humidityrate / 100.0) * (1 - 0.02 * windspeedms))
    > 0.85 AND lunarstage IN ('New', 'First Quarter') AND lunardistdeg > 45 AND solarstatus
    IN ('Low', 'Moderate') THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'Optimal Observing Window (OOW): periods when AOI > 0.85, LunarStage
    in (''New'',''First Quarter''), LunarDistDeg > 45, SolarStatus in (''Low'',''Moderate'').'
  hidden: false
  meta:
    kb_id: 13
- name: is_sds
  sql: CASE WHEN atmostransparency < 0.7 OR humidityrate > 70 OR windspeedms > 8 OR
    geomagstatus LIKE '%Storm%' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'Signal Degradation Scenario (SDS): observation conditions where AtmosTransparency<0.7
    OR HumidityRate>70 OR WindSpeedMs>8 OR GeomagStatus contains ''Storm''.'
  hidden: false
  meta:
    kb_id: 14
- name: is_high_lif
  sql: CASE WHEN ((1 - lunardistdeg / 180.0) * (1 - atmostransparency)) > 0.5 THEN
    1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'High Lunar Interference Events: observations where LIF > 0.5, indicating
    strong lunar contamination in the data.'
  hidden: false
  meta:
    kb_id: 53
measures: []
aggregations: []
joins: []
filters: []
description: Observatory stations and their environmental observation conditions (weather,
  atmospheric transparency, lunar phase, geomagnetic & solar activity).
hidden: false
