- name: aqi
  sql: (1 - thdpct * 1.0 / 2) * (spksensedb * 1.0 / 100) * (1 - audlatms * 1.0 / 100)
    * 10
  type: number
  primary_key: false
  description: "Audio Quality Index (AQI) \u2014 (1 - ThdPct/2) \xD7 SpkSenseDb/100\
    \ \xD7 (1 - AudLatMs/100) \xD7 10. Higher = better quality with minimal distortion.\n\
    \n[kb=4]\nAQI = \\left(1 - \\frac{ThdPct}{2}\\right) \\times \\frac{SpkSenseDb}{100}\
    \ \\times \\left(1 - \\frac{AudLatMs}{100}\\right) \\times 10, \\text{ where higher\
    \ values indicate better overall audio quality with minimal distortion.} \u2014\
    \ A comprehensive metric for evaluating audio device quality based on frequency\
    \ response, distortion, and sensitivity.\n[/kb=4]"
  label: Audio Quality Index (AQI)
  hidden: false
  meta:
    kb_id: 4
- name: is_audiophile_gaming_headset
  sql: ((1 - thdpct * 1.0 / 2) * (spksensedb * 1.0 / 100) * (1 - audlatms * 1.0 /
    100) * 10) > 8.0 AND freqresp LIKE '10%-22%' AND thdpct < 0.5 AND noiseisodb >
    15
  type: boolean
  primary_key: false
  description: "Audiophile Gaming Headset (KB #12): AQI > 8.0 AND FreqResp covers\
    \ 10Hz-22kHz AND ThdPct < 0.5 AND NoiseIsoDb > 15.\n\n[kb=12]\nA headset with\
    \ AQI > 8.0, FreqResp covering at least '10Hz-22kHz', ThdPct < 0.5%, and NoiseIsoDb\
    \ > 15, delivering exceptional sound clarity, detail, and isolation for immersive\
    \ gaming experiences. \u2014 Defines the standards for premium audio quality in\
    \ gaming headsets suitable for audiophiles.\n[/kb=12]"
  label: Audiophile Gaming Headset
  hidden: false
  meta:
    kb_id: 12
- name: is_streaming_optimized
  sql: micsensedb < -45 AND (micfreqresp LIKE '50%-18%' OR micfreqresp LIKE '50%-2%')
    AND deviceidentity.mcresptime < 1.0 AND deviceidentity.profcount >= 5
  type: boolean
  primary_key: false
  description: "Streaming-Optimized Device (KB #15): MicSenseDb < -45 AND MicFreqResp\
    \ covers '50Hz-18kHz' AND McRespTime < 1.0 AND ProfCount >= 5.\n\n[kb=15]\nA device\
    \ with MicSenseDb < -45, MicFreqResp covering at least '50Hz-18kHz', McRespTime\
    \ < 1.0, and ProfCount \u2265 5, allowing streamers to capture high-quality audio\
    \ while maintaining flexible device configurations. \u2014 Identifies devices\
    \ specifically designed for content creators and streamers with appropriate features.\n\
    [/kb=15]"
  label: Streaming-Optimized Device
  hidden: false
  meta:
    kb_id: 15
- name: is_subpar_audio_device
  sql: ((1 - thdpct * 1.0 / 2) * (spksensedb * 1.0 / 100) * (1 - audlatms * 1.0 /
    100) * 10) <= 8.0 OR thdpct >= 0.5 OR noiseisodb <= 15 OR freqresp NOT LIKE '10%-22%'
  type: boolean
  primary_key: false
  description: "Subpar Audio Device (KB #52): AQI <= 8.0 OR ThdPct >= 0.5 OR NoiseIsoDb\
    \ <= 15 OR FreqResp NOT covering 10Hz-22kHz.\n\n[kb=52]\nAudio devices with one\
    \ or more critical quality deficiencies: AQI score of 8.0 or lower, total harmonic\
    \ distortion (ThdPct) of 0.5% or higher, noise isolation (NoiseIsoDb) of 15dB\
    \ or lower, or frequency response not covering the full 10Hz-22kHz range required\
    \ for immersive gaming audio experiences. These devices are candidates for improvement\
    \ or reclassification to non-audiophile product categories. \u2014 Identifies\
    \ audio devices that fail to meet audiophile gaming standards and need improvement\
    \ or removal from premium product lines\n[/kb=52]"
  label: Subpar Audio Device Identification
  hidden: false
  meta:
    kb_id: 52
