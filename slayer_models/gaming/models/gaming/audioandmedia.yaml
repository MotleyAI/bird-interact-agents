- name: thdpct
  sql: thdpct
  type: number
  primary_key: false
  description: "Total harmonic distortion (KB #26: <0.1% audiophile, 0.1-0.5% excellent\
    \ gaming, 0.5-1.0% acceptable, >1.0% noticeable).\n\n[kb=26]\nMeasured as a percentage,\
    \ representing audio signal distortion at high volumes. Values below 0.1% indicate\
    \ audiophile-grade reproduction with imperceptible distortion, 0.1-0.5% represents\
    \ excellent gaming audio quality, 0.5-1.0% is acceptable for most gaming scenarios,\
    \ while values above 1.0% may produce noticeable distortion during intense gaming\
    \ sequences. \u2014 Illustrates the impact of harmonic distortion measurements\
    \ on audio quality in gaming headsets.\n[/kb=26]"
  label: ThdPct (Total Harmonic Distortion)
  hidden: false
  format:
    type: float
