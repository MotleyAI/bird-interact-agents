- name: ergorate
  sql: ergorate
  type: INT
  primary_key: false
  description: "Ergonomic rating 1-10 (KB #24: 1-3 basic, 4-6 good, 7-8 extended-comfort,\
    \ 9-10 specialized anti-RSI).\n\n[kb=24]\nRated on a scale of 1-10, where 1-3\
    \ indicates basic designs prioritizing aesthetics over comfort, 4-6 represents\
    \ good ergonomics for average gaming sessions, 7-8 denotes devices designed for\
    \ extended comfort, and 9-10 indicates specialized ergonomic designs preventing\
    \ repetitive strain injuries during marathon sessions. \u2014 Illustrates the\
    \ significance of ergonomic ratings in gaming peripherals for comfort during extended\
    \ use.\n[/kb=24]"
  label: ErgoRate (Ergonomic Rating)
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 24
- name: ci
  sql: (ergorate * 1.0 / 10) * (1 + (CASE WHEN wristflag = 1 THEN 1 ELSE 0 END) *
    1.0 / 5) * (1 - ABS(palmangle - 15) * 1.0 / 45) * 10
  type: DOUBLE
  primary_key: false
  description: "Comfort Index (CI) \u2014 ergonomic comfort: ergorate, wristflag bonus,\
    \ palm-angle deviation from 15\xB0.\n\n[kb=3]\nCI = \\frac{ErgoRate}{10} \\times\
    \ \\left(1 + \\frac{(WristFlag ? 1 : 0)}{5}\\right) \\times \\left(1 - \\frac{|PalmAngle\
    \ - 15|}{45}\\right) \\times 10 \u2014 Evaluates the ergonomic comfort of a device\
    \ based on its physical design factors and ergonomic rating.\n[/kb=3]"
  label: Comfort Index (CI)
  hidden: false
  meta:
    kb_id: 3
- name: spr
  sql: (log10(swtchdur) * 1.0 / 7) * swtchcons * (1 - keychatter * 1.0 / 2)
  type: DOUBLE
  primary_key: false
  description: "Switch Performance Rating (SPR) \u2014 mechanical switch quality:\
    \ durability (log10), consistency, chatter penalty.\n\n[kb=5]\nSPR = \\frac{\\\
    log_{10}(SwtchDur)}{7} \\times SwtchCons \\times \\left(1 - \\frac{KeyChatter}{2}\\\
    right), \\text{ where higher values indicate better switch quality with longer\
    \ lifespan and consistent performance.} \u2014 Rates mechanical switch performance\
    \ based on durability, consistency, and tactile feedback.\n[/kb=5]"
  label: Switch Performance Rating (SPR)
  hidden: false
  meta:
    kb_id: 5
- name: esf
  sql: ((ergorate * 1.0 / 10) * (1 + (CASE WHEN wristflag = 1 THEN 1 ELSE 0 END) *
    1.0 / 5) * (1 - ABS(palmangle - 15) * 1.0 / 45) * 10) * (1 + (ergorate - 5) *
    1.0 / 10) * (1 - ABS(palmangle - 15) * 1.0 / 30) * (1 + (ergorate * (CASE WHEN
    wristflag = 1 THEN 1 ELSE 0 END)) * 1.0 / 50)
  type: DOUBLE
  primary_key: false
  description: "Ergonomic Sustainability Factor (ESF) = CI \xD7 (1 + (ErgoRate-5)/10)\
    \ \xD7 (1 - |PalmAngle-15|/30) \xD7 (1 + ErgoRate*WristFlag/50). Inlined CI to\
    \ avoid self-reference.\n\n[kb=32]\nESF = CI \\times \\left(1 + \\frac{ErgoRate\
    \ - 5}{10}\\right) \\times \\left(1 - \\frac{|PalmAngle - 15|}{30}\\right) \\\
    times \\left(1 + \\frac{ErgoRate \\times WristFlag}{50}\\right) \u2014 Evaluates\
    \ how suitable a device is for extended gaming sessions based on ergonomic design\
    \ and comfort metrics.\n[/kb=32]"
  label: Ergonomic Sustainability Factor (ESF)
  hidden: false
  meta:
    kb_id: 32
- name: is_tournament_ready_keyboard
  sql: (deviceidentity__testsessions.pollratehz * 1.0 / 100) * (1 - (deviceidentity__testsessions.inplagms
    + deviceidentity__testsessions.resptimems) * 1.0 / 30) * 10 > 8.5 AND performance.clklat
    < 1.0 AND deviceidentity__testsessions.pollratehz >= 1000 AND ((log10(swtchdur)
    * 1.0 / 7) * swtchcons * (1 - keychatter * 1.0 / 2)) > 8.0
  type: BOOLEAN
  primary_key: false
  description: "Tournament-Ready Keyboard (KB #11): IRS > 8.5 AND ClkLat < 1.0 AND\
    \ PollRateHz >= 1000 AND SPR > 8.0. Reaches IRS via deviceidentity\u2192testsessions,\
    \ ClkLat via performance.\n\n[kb=11]\nA keyboard with IRS > 8.5, ClkLat < 1.0ms,\
    \ PollRateHz \u2265 1000, and SPR > 8.0, ensuring minimal input latency and consistent\
    \ actuation during high-pressure competitive scenarios. \u2014 Defines what constitutes\
    \ a keyboard suitable for competitive tournament play based on response time and\
    \ switch quality.\n[/kb=11]"
  label: Tournament-Ready Keyboard
  hidden: false
  meta:
    kb_id: 11
- name: is_ergonomic_excellence
  sql: (((ergorate * 1.0 / 10) * (1 + (CASE WHEN wristflag = 1 THEN 1 ELSE 0 END)
    * 1.0 / 5) * (1 - ABS(palmangle - 15) * 1.0 / 45) * 10) * (1 + (ergorate - 5)
    * 1.0 / 10) * (1 - ABS(palmangle - 15) * 1.0 / 30) * (1 + (ergorate * (CASE WHEN
    wristflag = 1 THEN 1 ELSE 0 END)) * 1.0 / 50)) > 8.5 AND ergorate > 8 AND ((ergorate
    * 1.0 / 10) * (1 + (CASE WHEN wristflag = 1 THEN 1 ELSE 0 END) * 1.0 / 5) * (1
    - ABS(palmangle - 15) * 1.0 / 45) * 10) > 8.5 AND (wristflag = 1 OR (palmangle
    BETWEEN 10 AND 20))
  type: BOOLEAN
  primary_key: false
  description: "Ergonomic Excellence Certification (KB #41): ESF > 8.5 AND ErgoRate\
    \ > 8 AND CI > 8.5 AND (WristFlag=1 OR PalmAngle BETWEEN 10 AND 20).\n\n[kb=41]\n\
    A device with ESF > 8.5, ErgoRate > 8, CI > 8.5, and at least one specialized\
    \ ergonomic feature (WristFlag = true or PalmAngle between 10-20\xB0), designed\
    \ to maintain player comfort and prevent strain during marathon gaming sessions.\
    \ \u2014 Designates devices specifically designed to prevent repetitive strain\
    \ injuries and support extended professional gaming sessions.\n[/kb=41]"
  label: Ergonomic Excellence Certification
  hidden: false
  meta:
    kb_id: 41
