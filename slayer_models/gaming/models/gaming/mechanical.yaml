  description: "Switch durability in actuation cycles (KB #23: 20M consumer-grade,\
    \ 50M premium, 100M+ optical/magnetic).\n\n[kb=23]\nMeasured in actuation cycles\
    \ before failure. Values around 20 million indicate consumer-grade mechanical\
    \ switches, 50 million represent premium mechanical switches for enthusiasts,\
    \ and 100+ million typically denote optical or magnetic switches designed for\
    \ extended competitive use with minimal degradation over time. \u2014 Illustrates\
    \ the significance of switch durability ratings in keyboard longevity.\n[/kb=23]"
  label: SwtchDur (Switch Durability)
  hidden: false
