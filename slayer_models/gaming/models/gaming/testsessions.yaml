- name: latms
  sql: latms
  type: DOUBLE
  primary_key: false
  description: "Overall latency in ms (KB #20: < 1.0ms enables split-second reactions;\
    \ > 5.0ms is noticeable input delay).\n\n[kb=20]\nMeasured in milliseconds, representing\
    \ the delay between user input and system response. Values below 1.0ms enable\
    \ split-second reactions in fast-paced competitive games, while values above 5.0ms\
    \ can create noticeable input delay that impacts performance in timing-critical\
    \ scenarios. \u2014 Illustrates the significance of latency measurements in gaming\
    \ peripherals for competitive play.\n[/kb=20]"
  label: LatMs (Latency)
  hidden: false
  format:
    type: float
  meta:
    kb_id: 20
