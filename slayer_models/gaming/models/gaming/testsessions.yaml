- name: pollratehz
  sql: pollratehz
  type: INT
  primary_key: false
  description: "Polling rate in Hz (KB #21: 125Hz office, 500Hz casual, 1000Hz competitive,\
    \ 4000Hz+ pro esports).\n\n[kb=21]\nMeasured in Hertz (times per second), representing\
    \ how often the device reports its state to the computer. Values of 125Hz are\
    \ standard for office peripherals, 500Hz is good for casual gaming, 1000Hz is\
    \ preferred for competitive play, and 4000Hz+ represents cutting-edge technology\
    \ offering ultra-responsive input for professional esports. \u2014 Illustrates\
    \ the importance of polling rate in gaming device responsiveness.\n[/kb=21]"
  label: PollRateHz (Polling Rate)
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 21
