- name: wlsignal
  sql: wlsignal
  type: DOUBLE
  primary_key: false
  description: "Wireless signal strength in dBm (KB #25: -30 excellent, -90 poor;\
    \ > -50 optimal, -50 to -70 good, < -70 occasional disconnects).\n\n[kb=25]\n\
    Typically measured in dBm, with values ranging from -30 (excellent) to -90 (poor).\
    \ Signal strength above -50dBm indicates optimal performance with minimal interference,\
    \ -50 to -70dBm represents good connectivity suitable for most gaming, while below\
    \ -70dBm may experience occasional disconnections or increased latency in challenging\
    \ environments. \u2014 Illustrates the importance of wireless signal strength\
    \ measurements for stable connectivity.\n[/kb=25]"
  label: WlSignal (Wireless Signal Strength)
  hidden: false
  format:
    type: float
