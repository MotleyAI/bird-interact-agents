- name: irs
  sql: (pollratehz * 1.0 / 100) * (1 - (inplagms + resptimems) * 1.0 / 30) * 10
  type: DOUBLE
  primary_key: false
  description: "Input Responsiveness Score (IRS) \u2014 polling rate, input lag, response\
    \ time. Higher = more responsive input.\n\n[kb=2]\nIRS = \\frac{PollRateHz}{100}\
    \ \\times \\left(1 - \\frac{InpLagMs + RespTimeMs}{30}\\right) \\times 10, \\\
    text{ where higher values indicate more responsive input with minimal lag.} \u2014\
    \ Quantifies the overall input responsiveness of a device considering polling\
    \ rate, latency, and response time.\n[/kb=2]"
  label: Input Responsiveness Score (IRS)
  hidden: false
  meta:
    kb_id: 2
- name: is_minimal_input_latency
  sql: inplagms < 1.0 AND pollratehz >= 1000 AND latms < 2.0
  type: BOOLEAN
  primary_key: false
  description: "Minimal Input Latency (KB #17), session-level subset: InpLagMs < 1.0\
    \ AND PollRateHz >= 1000 AND LatMs < 2.0. Full KB also requires ClkLat < 0.8 (on\
    \ performance, accessible from session via the performance \u2192 testsessions\
    \ FK).\n\n[kb=17]\nA device with InpLagMs < 1.0, PollRateHz \u2265 1000, LatMs\
    \ < 2.0, and ClkLat < 0.8, providing almost instantaneous input recognition critical\
    \ for competitive FPS and fighting games. \u2014 Identifies devices with exceptionally\
    \ low input latency suitable for reaction-critical games.\n[/kb=17]"
  label: Minimal Input Latency
  hidden: false
  meta:
    kb_id: 17
