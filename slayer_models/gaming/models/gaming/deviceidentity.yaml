  type: number
  primary_key: false
  description: "Battery Efficiency Ratio (BER) \u2014 battery life \xD7 capacity /\
    \ (active power \xD7 10). Joins to testsessions for battlifeh/battcapmah.\n\n\
    [kb=1]\nBER = \\frac{BattLifeH \\times BattCapMah}{PwrActMw \\times 10}, \\text{\
    \ where higher values indicate more efficient power management and battery utilization.}\
    \ \u2014 Measures how efficiently a device uses its battery capacity relative\
    \ to its power draw under active conditions.\n[/kb=1]"
  label: Battery Efficiency Ratio (BER)
  hidden: false
  meta:
    kb_id: 1
- name: wpr
  sql: (wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 / 2)
    * ((testsessions.wlsignal + 100) * 1.0 / 100)
  type: number
  primary_key: false
  description: "Wireless Performance Rating (WPR) \u2014 range, latency variance,\
    \ channel hopping, signal strength. Joins to testsessions for wlsignal.\n\n[kb=8]\n\
    WPR = \\frac{WlRangeM}{10} \\times \\left(1 - \\frac{WlLatVar}{5}\\right) \\times\
    \ \\left(1 + \\frac{WlChanHop}{2}\\right) \\times \\frac{WlSignal + 100}{100},\
    \ \\text{ where higher values indicate more reliable wireless performance with\
    \ better range and stability.} \u2014 Rates the quality of wireless connectivity\
    \ based on range, latency, and interference handling.\n[/kb=8]"
  label: Wireless Performance Rating (WPR)
  hidden: false
  meta:
    kb_id: 8
- name: wpe
  sql: ((wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 /
