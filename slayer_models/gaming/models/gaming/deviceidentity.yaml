  primary_key: false
  description: "Sensor Performance Index (SPI) \u2014 composite of DPI resolution,\
    \ microcontroller response time. Higher = better balanced resolution and responsiveness.\n\
    \n[kb=0]\nSPI = \\frac{DpiRes}{1000} \\times \\left(1 - \\frac{McRespTime}{10}\\\
    right) \\times 10, \\text{ where higher values indicate better overall sensor\
    \ performance with balanced resolution and responsiveness.} \u2014 A composite\
    \ metric that evaluates overall sensor quality based on resolution, accuracy,\
    \ and response time.\n[/kb=0]"
