  primary_key: false
  description: "Wireless Performance Efficiency (WPE) = WPR \xD7 sqrt(BER/5) \xD7\
    \ (1 - WlLatVar/3) \xD7 2. Inlined to avoid self-reference.\n\n[kb=35]\nWPE =\
    \ WPR \\times \\sqrt{\\frac{BER}{5}} \\times \\left(1 - \\frac{WlLatVar}{3}\\\
    right) \\times 2 \u2014 Evaluates the efficiency of wireless performance relative\
    \ to battery consumption for untethered gaming devices.\n[/kb=35]"
  label: Wireless Performance Efficiency (WPE)
  hidden: false
  meta:
    kb_id: 35
- name: battery_efficiency_class
  sql: CASE WHEN ((testsessions.battlifeh * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw
    * 10, 0)) > 7.5 THEN 'Excellent Efficiency' WHEN ((testsessions.battlifeh * testsessions.battcapmah)
    * 1.0 / NULLIF(pwractmw * 10, 0)) >= 5.0 THEN 'Good Efficiency' WHEN ((testsessions.battlifeh
    * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw * 10, 0)) >= 2.5 THEN 'Average
    Efficiency' ELSE 'Poor Efficiency' END
  type: string
  primary_key: false
  description: "Battery Efficiency Classification (KB #50): 'Excellent' BER > 7.5,\
    \ 'Good' 5.0-7.5, 'Average' 2.5-4.9, 'Poor' < 2.5.\n\n[kb=50]\nA classification\
    \ system that segments wireless gaming devices into four efficiency categories:\
    \ 'Excellent Efficiency' (BER > 7.5) indicating marathon gaming capability, 'Good\
    \ Efficiency' (BER between 5.0 and 7.5) for extended gaming sessions, 'Average\
    \ Efficiency' (BER between 2.5 and 4.9) suitable for regular gameplay, and 'Poor\
    \ Efficiency' (BER < 2.5) requiring frequent recharging, providing standardized\
    \ comparison metrics across different gaming peripherals. \u2014 A categorical\
    \ framework for evaluating and classifying the battery efficiency of gaming devices\
    \ based on their Battery Efficiency Ratio (BER).\n[/kb=50]"
  label: Battery Efficiency Classification
  hidden: false
  meta:
    kb_id: 50
- name: is_premium_gaming_mouse
  sql: ((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) > 7.5 AND dpires
    >= 16000 AND testsessions.pollratehz >= 1000
