  primary_key: false
  description: "Premium Gaming Mouse (KB #10) \u2014 partial: SPI > 7.5 AND DpiRes\
    \ >= 16000 AND PollRateHz >= 1000. KB also requires CI > 8.0 (on mechanical, peer-table);\
    \ applies to mouse devices specifically.\n\n[kb=10]\nA mouse with SPI > 7.5, DpiRes\
    \ \u2265 16000, PollRateHz \u2265 1000, and CI > 8.0, offering exceptional precision\
    \ and comfort for competitive gaming scenarios. \u2014 Defines the criteria for\
    \ a high-end gaming mouse based on sensor performance and ergonomics.\n[/kb=10]"
  label: Premium Gaming Mouse
  hidden: false
  meta:
    kb_id: 10
