- name: rgbzones
  sql: rgbzones
  type: INT
  primary_key: false
  description: "Independently controllable RGB zones (KB #28: single-zone basic, 3-5\
    \ directional, 10+ complex patterns, 100+ per-key max customization).\n\n[kb=28]\n\
    Measured as distinct independently controllable lighting areas. Single-zone devices\
    \ offer basic lighting effects, 3-5 zones allow for moderate customization like\
    \ directional effects, 10+ zones enable complex patterns and game-reactive lighting,\
    \ while per-key RGB (often 100+ zones) provides maximum customization with unique\
    \ effects for individual keys or areas. \u2014 Illustrates the customization potential\
    \ of RGB lighting zones in gaming peripherals.\n[/kb=28]"
  label: RgbZones (RGB Lighting Zones)
  hidden: false
  format:
    type: integer
