  sql: driftres
  type: number
  primary_key: false
  description: 'Drift resistance 1-10 (KB #27: <5 prone to drift, 6-8 good, 9-10 Hall
    Effect/magnetic eliminating drift).'
  hidden: false
  format:
    type: float
  meta:
    kb_id: 27
- name: rai
  sql: ((joyprec + dpadacc) * 1.0 / 20) * (1 - deviceidentity__testsessions.inplagms
    * 1.0 / 10) * 10
  type: number
  primary_key: false
  description: "Response Accuracy Index (RAI) = ((JoyPrec + DpadAcc)/20) \xD7 (1 -\
    \ InpLagMs/10) \xD7 10. Reaches InpLagMs via deviceidentity\u2192testsessions."
  hidden: false
  meta:
    kb_id: 31
- name: hfq
  sql: (hapstr * 1.0 / 10) * (1 + vibmodes * 1.0 / 10) * (1 + LENGTH(forcefeed) *
    1.0 / 20)
  type: number
  primary_key: false
  description: "Haptic Feedback Quality (HFQ) = (HapStr/10) \xD7 (1 + VibModes/10)\
    \ \xD7 (1 + ForceFeed_length/20). ForceFeed_length is the string length of the\
    \ ForceFeed descriptor."
  hidden: false
  meta:
    kb_id: 34
- name: is_pro_esports_controller
  sql: ((deviceidentity__testsessions.pollratehz * 1.0 / 100) * (1 - (deviceidentity__testsessions.inplagms
    + deviceidentity__testsessions.resptimems) * 1.0 / 30) * 10) > 8.0 AND joyprec
    > 9.0 AND driftres > 9.5 AND trigres >= 5 AND hapstr > 8
  type: boolean
  primary_key: false
  description: 'Professional Esports Controller (KB #14): IRS > 8.0 AND JoyPrec >
    9.0 AND DriftRes > 9.5 AND TrigRes >= 5 AND HapStr > 8.'
  hidden: false
  meta:
    kb_id: 14
- name: is_ultra_responsive
  sql: ((deviceidentity__testsessions.pollratehz * 1.0 / 100) * (1 - (deviceidentity__testsessions.inplagms
    + deviceidentity__testsessions.resptimems) * 1.0 / 30) * 10) > 9.0 AND (((joyprec
    + dpadacc) * 1.0 / 20) * (1 - deviceidentity__testsessions.inplagms * 1.0 / 10)
    * 10) > 8.5 AND deviceidentity__testsessions.latms < 1.0 AND physicaldurability__performance.clklat
    < 0.5
  type: boolean
  primary_key: false
  description: "Ultra-Responsive Gaming Device (KB #43): IRS > 9.0 AND RAI > 8.5 AND\
    \ LatMs < 1.0 AND ClkLat < 0.5. Reaches ClkLat via physicaldurability\u2192performance."
  hidden: false
  meta:
    kb_id: 43
- name: is_pro_control_consistency
  sql: (((joyprec + dpadacc) * 1.0 / 20) * (1 - deviceidentity__testsessions.inplagms
    * 1.0 / 10) * 10) > 8.5 AND physicaldurability__rgb__mechanical.swtchcons > 9.0
    AND joyprec > 9.0 AND driftres > 9.0
  type: boolean
  primary_key: false
  description: "Professional-Grade Control Consistency (KB #46): RAI > 8.5 AND SwtchCons\
    \ > 9.0 AND JoyPrec > 9.0 AND DriftRes > 9.0. Reaches SwtchCons via physicaldurability\u2192\
    rgb\u2192mechanical (multi-hop)."
  hidden: false
  meta:
    kb_id: 46
