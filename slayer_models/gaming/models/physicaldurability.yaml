- name: ds
  sql: ((drophtm * 1.0 / 2) + (bendforce * 1.0 / 100) + (twistdeg * 1.0 / 90)) * (usbconndur
    * 1.0 / 10000) * 10
  type: number
  primary_key: false
  description: "Durability Score (DS) \u2014 (DropHtM/2 + BendForce/100 + TwistDeg/90)\
    \ \xD7 UsbConnDur/10000 \xD7 10."
  hidden: false
  meta:
    kb_id: 7
- name: per
  sql: (((drophtm * 1.0 / 2) + (bendforce * 1.0 / 100) + (twistdeg * 1.0 / 90)) *
    (usbconndur * 1.0 / 10000) * 10) * (1 + (CASE dustres WHEN 'IPX0' THEN 0 WHEN
    'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 ELSE 0 END + CASE waterres
    WHEN 'IPX0' THEN 0 WHEN 'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 WHEN
    'IPX4' THEN 4 WHEN 'IPX5' THEN 5 WHEN 'IPX6' THEN 6 WHEN 'IPX7' THEN 7 WHEN 'IPX8'
    THEN 8 ELSE 0 END) * 1.0 / 6) * (1 - (100 - bendforce) * 1.0 / 200)
  type: number
  primary_key: false
  description: "Physical Endurance Rating (PER) = DS \xD7 (1 + (DustRes_score + WaterRes_score)/6)\
    \ \xD7 (1 - (100 - BendForce)/200). IP rating maps IPX0=0, IPX1=1, IPX2=2, IPX3=3\
    \ (extended for higher IPX values on waterres)."
  hidden: false
  meta:
    kb_id: 37
- name: is_competitive_grade_durability
  sql: (((drophtm * 1.0 / 2) + (bendforce * 1.0 / 100) + (twistdeg * 1.0 / 90)) *
    (usbconndur * 1.0 / 10000) * 10) > 8.5 AND usbconndur > 15000 AND drophtm > 1.5
    AND gripdur > 1000
  type: boolean
  primary_key: false
  description: 'Competitive-Grade Durability (KB #16): DS > 8.5 AND UsbConnDur > 15000
    AND DropHtM > 1.5 AND GripDur > 1000.'
  hidden: false
  meta:
    kb_id: 16
- name: is_ultra_durable_tournament
  sql: ((((drophtm * 1.0 / 2) + (bendforce * 1.0 / 100) + (twistdeg * 1.0 / 90)) *
    (usbconndur * 1.0 / 10000) * 10) * (1 + (CASE dustres WHEN 'IPX0' THEN 0 WHEN
    'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 ELSE 0 END + CASE waterres
    WHEN 'IPX0' THEN 0 WHEN 'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 WHEN
    'IPX4' THEN 4 WHEN 'IPX5' THEN 5 WHEN 'IPX6' THEN 6 WHEN 'IPX7' THEN 7 WHEN 'IPX8'
    THEN 8 ELSE 0 END) * 1.0 / 6) * (1 - (100 - bendforce) * 1.0 / 200)) > 9.0 AND
    (((drophtm * 1.0 / 2) + (bendforce * 1.0 / 100) + (twistdeg * 1.0 / 90)) * (usbconndur
    * 1.0 / 10000) * 10) > 8.5 AND usbconndur > 20000 AND (drophtm > 2.0 OR waterres
    IN ('IPX7', 'IPX8'))
  type: boolean
  primary_key: false
  description: 'Ultra-Durable Tournament Device (KB #47): PER > 9.0 AND DS > 8.5 AND
    UsbConnDur > 20000 AND (DropHtM > 2.0 OR WaterRes >= IPX7).'
  hidden: false
  meta:
    kb_id: 47
