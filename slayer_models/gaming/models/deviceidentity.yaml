  description: "Sensor Performance Index (SPI) \u2014 composite of DPI resolution,\
    \ microcontroller response time. Higher = better balanced resolution and responsiveness."
  hidden: false
  meta:
    kb_id: 0
- name: ber
  sql: (testsessions.battlifeh * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw
    * 10, 0)
  type: number
  primary_key: false
  description: "Battery Efficiency Ratio (BER) \u2014 battery life \xD7 capacity /\
    \ (active power \xD7 10). Joins to testsessions for battlifeh/battcapmah."
  hidden: false
  meta:
    kb_id: 1
- name: wpr
  sql: (wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 / 2)
    * ((testsessions.wlsignal + 100) * 1.0 / 100)
  type: number
  primary_key: false
  description: "Wireless Performance Rating (WPR) \u2014 range, latency variance,\
    \ channel hopping, signal strength. Joins to testsessions for wlsignal."
  hidden: false
  meta:
    kb_id: 8
- name: wpe
  sql: ((wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 /
    2) * ((testsessions.wlsignal + 100) * 1.0 / 100)) * sqrt(((testsessions.battlifeh
    * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw * 10, 0)) / 5.0) * (1 - wllatvar
    * 1.0 / 3) * 2
  type: number
  primary_key: false
  description: "Wireless Performance Efficiency (WPE) = WPR \xD7 sqrt(BER/5) \xD7\
    \ (1 - WlLatVar/3) \xD7 2. Inlined to avoid self-reference."
  hidden: false
  meta:
    kb_id: 35
- name: battery_efficiency_class
  sql: CASE WHEN ((testsessions.battlifeh * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw
    * 10, 0)) > 7.5 THEN 'Excellent Efficiency' WHEN ((testsessions.battlifeh * testsessions.battcapmah)
    * 1.0 / NULLIF(pwractmw * 10, 0)) >= 5.0 THEN 'Good Efficiency' WHEN ((testsessions.battlifeh
    * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw * 10, 0)) >= 2.5 THEN 'Average
    Efficiency' ELSE 'Poor Efficiency' END
  type: string
  primary_key: false
  description: 'Battery Efficiency Classification (KB #50): ''Excellent'' BER > 7.5,
    ''Good'' 5.0-7.5, ''Average'' 2.5-4.9, ''Poor'' < 2.5.'
  hidden: false
  meta:
    kb_id: 50
- name: is_premium_gaming_mouse
  sql: ((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) > 7.5 AND dpires
    >= 16000 AND testsessions.pollratehz >= 1000
  type: boolean
  primary_key: false
  description: "Premium Gaming Mouse (KB #10) \u2014 partial: SPI > 7.5 AND DpiRes\
    \ >= 16000 AND PollRateHz >= 1000. KB also requires CI > 8.0 (on mechanical, peer-table);\
    \ applies to mouse devices specifically."
  hidden: false
  meta:
    kb_id: 10
- name: is_extended_battery_life_device
  sql: ((testsessions.battlifeh * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw
    * 10, 0)) > 7.5 AND testsessions.battlifeh > 30 AND testsessions.qchgflag = 1
    AND pwridlemw < 100
  type: boolean
  primary_key: false
  description: 'Extended Battery Life Device (KB #13): BER > 7.5 AND BattLifeH > 30
    AND QChgFlag = 1 AND PwrIdleMw < 100.'
  hidden: false
  meta:
    kb_id: 13
- name: is_premium_wireless_solution
  sql: ((wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 /
    2) * ((testsessions.wlsignal + 100) * 1.0 / 100)) > 9.0 AND conntype = 'Wireless
    2.4GHz' AND testsessions.latms < 2.5 AND testsessions.battlifeh > 24
  type: boolean
  primary_key: false
  description: 'Premium Wireless Solution (KB #18): WPR > 9.0 AND ConnType=''Wireless
    2.4GHz'' AND LatMs < 2.5 AND BattLifeH > 24.'
  hidden: false
  meta:
    kb_id: 18
- name: is_extended_tournament_wireless
  sql: (((wlrangem * 1.0 / 10) * (1 - wllatvar * 1.0 / 5) * (1 + wlchanhop * 1.0 /
    2) * ((testsessions.wlsignal + 100) * 1.0 / 100)) * sqrt(((testsessions.battlifeh
    * testsessions.battcapmah) * 1.0 / NULLIF(pwractmw * 10, 0)) / 5.0) * (1 - wllatvar
    * 1.0 / 3) * 2) > 8.5 AND ((testsessions.battlifeh * testsessions.battcapmah)
    * 1.0 / NULLIF(pwractmw * 10, 0)) > 7.0 AND testsessions.battlifeh > 40 AND testsessions.latms
    < 2.5
  type: boolean
  primary_key: false
  description: 'Extended Tournament Ready Wireless (KB #45): WPE > 8.5 AND BER > 7.0
    AND BattLifeH > 40 AND LatMs < 2.5.'
  hidden: false
  meta:
    kb_id: 45
- name: gdvi
  sql: (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) * 0.3) + (((testsessions.pollratehz
    * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 /
    30) * 10) * 0.3) + ((((interactionandcontrol__physicaldurability.drophtm * 1.0
    / 2) + (interactionandcontrol__physicaldurability.bendforce * 1.0 / 100) + (interactionandcontrol__physicaldurability.twistdeg
    * 1.0 / 90)) * (interactionandcontrol__physicaldurability.usbconndur * 1.0 / 10000)
    * 10) * 0.2) + (((mechanical.ergorate * 1.0 / 10) * (1 + (CASE WHEN mechanical.wristflag
    = 1 THEN 1 ELSE 0 END) * 1.0 / 5) * (1 - ABS(mechanical.palmangle - 15) * 1.0
    / 45) * 10) * 0.2)
  type: number
  primary_key: false
  description: "Gaming Device Value Index (GDVI) = SPI*0.3 + IRS*0.3 + DS*0.2 + CI*0.2.\
    \ Inlined natural columns across joins (testsessions, interactionandcontrol\u2192\
    physicaldurability, mechanical)."
  hidden: false
  meta:
    kb_id: 9
- name: cgpi
  sql: (((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems)
    * 1.0 / 30) * 10) * 0.4) + (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10)
    * 10) * 0.3) + (((log10(mechanical.swtchdur) * 1.0 / 7) * mechanical.swtchcons
    * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2) + ((((interactionandcontrol.joyprec
    + interactionandcontrol.dpadacc) * 1.0 / 20) * (1 - testsessions.inplagms * 1.0
    / 10) * 10) * 0.1)
  type: number
  primary_key: false
  description: CGPI = IRS*0.4 + SPI*0.3 + SPR*0.2 + RAI*0.1. Inlined natural columns.
  hidden: false
  meta:
    kb_id: 30
- name: iec
  sql: (((1 - audioandmedia.thdpct * 1.0 / 2) * (audioandmedia.spksensedb * 1.0 /
    100) * (1 - audioandmedia.audlatms * 1.0 / 100) * 10) * 0.5) + (((interactionandcontrol.hapstr
    * 1.0 / 10) * (1 + interactionandcontrol.vibmodes * 1.0 / 10) * (1 + LENGTH(interactionandcontrol.forcefeed)
    * 1.0 / 20)) * 0.3) + (((interactionandcontrol__physicaldurability__rgb.rgbbright
    * 1.0 / 100) * (interactionandcontrol__physicaldurability__rgb.rgbcoloracc * 1.0
    / 10) * (0.5 + interactionandcontrol__physicaldurability__rgb.rgbzones * 1.0 /
    20)) * 0.2)
  type: number
  primary_key: false
  description: IEC = AQI*0.5 + HFQ*0.3 + RIQ*0.2. Inlined natural columns.
  hidden: false
  meta:
    kb_id: 33
- name: gvs
  sql: ((profcount + 1) * 1.0 / 3) * ((((testsessions.pollratehz * 1.0 / 100) * (1
    - (testsessions.inplagms + testsessions.resptimems) * 1.0 / 30) * 10) * 0.4) +
    (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) * 0.3) + (((log10(mechanical.swtchdur)
    * 1.0 / 7) * mechanical.swtchcons * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2)
    + ((((interactionandcontrol.joyprec + interactionandcontrol.dpadacc) * 1.0 / 20)
    * (1 - testsessions.inplagms * 1.0 / 10) * 10) * 0.1)) * 0.6 + ((((1 - audioandmedia.thdpct
    * 1.0 / 2) * (audioandmedia.spksensedb * 1.0 / 100) * (1 - audioandmedia.audlatms
    * 1.0 / 100) * 10) * 0.5) + (((interactionandcontrol.hapstr * 1.0 / 10) * (1 +
    interactionandcontrol.vibmodes * 1.0 / 10) * (1 + LENGTH(interactionandcontrol.forcefeed)
    * 1.0 / 20)) * 0.3) + (((interactionandcontrol__physicaldurability__rgb.rgbbright
    * 1.0 / 100) * (interactionandcontrol__physicaldurability__rgb.rgbcoloracc * 1.0
    / 10) * (0.5 + interactionandcontrol__physicaldurability__rgb.rgbzones * 1.0 /
    20)) * 0.2)) * 0.4
  type: number
  primary_key: false
  description: GVS = (ProfCount+1)/3 * CGPI*0.6 + IEC*0.4. KB precedence ambiguous;
    encoded as ((p+1)/3 * CGPI * 0.6) + (IEC * 0.4).
  hidden: false
  meta:
    kb_id: 36
- name: par
  sql: (((((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems)
    * 1.0 / 30) * 10) * 0.4) + (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10)
    * 10) * 0.3) + (((log10(mechanical.swtchdur) * 1.0 / 7) * mechanical.swtchcons
    * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2) + ((((interactionandcontrol.joyprec
    + interactionandcontrol.dpadacc) * 1.0 / 20) * (1 - testsessions.inplagms * 1.0
    / 10) * 10) * 0.1)) * 1.0 / 10) * (1 + profcount * 1.0 / 5) * ((((dpires * 1.0
    / 1000) * (1 - mcresptime * 1.0 / 10) * 10) + ((testsessions.pollratehz * 1.0
    / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 / 30) *
    10)) * 1.0 / 15)
  type: number
  primary_key: false
  description: PAR = CGPI/10 * (1 + ProfCount/5) * (SPI+IRS)/15.
  hidden: false
  meta:
    kb_id: 38
- name: vpi
  sql: ((((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) * 0.3 + ((testsessions.pollratehz
    * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 /
    30) * 10) * 0.3 + (((interactionandcontrol__physicaldurability.drophtm * 1.0 /
    2) + (interactionandcontrol__physicaldurability.bendforce * 1.0 / 100) + (interactionandcontrol__physicaldurability.twistdeg
    * 1.0 / 90)) * (interactionandcontrol__physicaldurability.usbconndur * 1.0 / 10000)
    * 10) * 0.2 + ((mechanical.ergorate * 1.0 / 10) * (1 + (CASE WHEN mechanical.wristflag
    = 1 THEN 1 ELSE 0 END) * 1.0 / 5) * (1 - ABS(mechanical.palmangle - 15) * 1.0
    / 45) * 10) * 0.2) * 0.4) + (((mechanical.ergorate * 1.0 / 10) * (1 + (CASE WHEN
    mechanical.wristflag = 1 THEN 1 ELSE 0 END) * 1.0 / 5) * (1 - ABS(mechanical.palmangle
    - 15) * 1.0 / 45) * 10) * (1 + (mechanical.ergorate - 5) * 1.0 / 10) * (1 - ABS(mechanical.palmangle
    - 15) * 1.0 / 30) * (1 + (mechanical.ergorate * (CASE WHEN mechanical.wristflag
    = 1 THEN 1 ELSE 0 END)) * 1.0 / 50)) * 0.3 + ((((interactionandcontrol__physicaldurability.drophtm
    * 1.0 / 2) + (interactionandcontrol__physicaldurability.bendforce * 1.0 / 100)
    + (interactionandcontrol__physicaldurability.twistdeg * 1.0 / 90)) * (interactionandcontrol__physicaldurability.usbconndur
    * 1.0 / 10000) * 10) * (1 + (CASE interactionandcontrol__physicaldurability.dustres
    WHEN 'IPX0' THEN 0 WHEN 'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 ELSE
    0 END + CASE interactionandcontrol__physicaldurability.waterres WHEN 'IPX0' THEN
    0 WHEN 'IPX1' THEN 1 WHEN 'IPX2' THEN 2 WHEN 'IPX3' THEN 3 WHEN 'IPX4' THEN 4
    WHEN 'IPX5' THEN 5 WHEN 'IPX6' THEN 6 WHEN 'IPX7' THEN 7 WHEN 'IPX8' THEN 8 ELSE
    0 END) * 1.0 / 6) * (1 - (100 - interactionandcontrol__physicaldurability.bendforce)
    * 1.0 / 200)) * 0.2 + (((((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms
    + testsessions.resptimems) * 1.0 / 30) * 10) * 0.4) + (((dpires * 1.0 / 1000)
    * (1 - mcresptime * 1.0 / 10) * 10) * 0.3) + (((log10(mechanical.swtchdur) * 1.0
    / 7) * mechanical.swtchcons * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2) +
    ((((interactionandcontrol.joyprec + interactionandcontrol.dpadacc) * 1.0 / 20)
    * (1 - testsessions.inplagms * 1.0 / 10) * 10) * 0.1)) * 1.0 / 10 * (1 + profcount
    * 1.0 / 5) * ((((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) + ((testsessions.pollratehz
    * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 /
    30) * 10)) * 1.0 / 15)) * 0.1
  type: number
  primary_key: false
  description: VPI = GDVI*0.4 + ESF*0.3 + PER*0.2 + PAR*0.1. Fully inlined natural
    columns across joins.
  hidden: false
  meta:
    kb_id: 39
- name: is_tournament_standard
  sql: ((((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems)
    * 1.0 / 30) * 10) * 0.4) + (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10)
    * 10) * 0.3) + (((log10(mechanical.swtchdur) * 1.0 / 7) * mechanical.swtchcons
    * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2) + ((((interactionandcontrol.joyprec
    + interactionandcontrol.dpadacc) * 1.0 / 20) * (1 - testsessions.inplagms * 1.0
    / 10) * 10) * 0.1)) > 8.0 AND testsessions.latms < 2.0 AND testsessions.pollratehz
    >= 1000 AND (conntype != 'Wireless 2.4GHz' OR wllatvar < 1.0)
  type: boolean
  primary_key: false
  description: 'Tournament Standard Device (KB #40): CGPI > 8.0 AND LatMs < 2.0 AND
    PollRateHz >= 1000 AND (WlLatVar < 1.0 if wireless).'
  hidden: false
  meta:
    kb_id: 40
- name: is_pro_multigenre
  sql: (((profcount + 1) * 1.0 / 3) * ((((testsessions.pollratehz * 1.0 / 100) * (1
    - (testsessions.inplagms + testsessions.resptimems) * 1.0 / 30) * 10) * 0.4) +
    (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) * 0.3) + (((log10(mechanical.swtchdur)
    * 1.0 / 7) * mechanical.swtchcons * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2)
    + ((((interactionandcontrol.joyprec + interactionandcontrol.dpadacc) * 1.0 / 20)
    * (1 - testsessions.inplagms * 1.0 / 10) * 10) * 0.1)) * 0.6 + ((((1 - audioandmedia.thdpct
    * 1.0 / 2) * (audioandmedia.spksensedb * 1.0 / 100) * (1 - audioandmedia.audlatms
    * 1.0 / 100) * 10) * 0.5) + (((interactionandcontrol.hapstr * 1.0 / 10) * (1 +
    interactionandcontrol.vibmodes * 1.0 / 10) * (1 + LENGTH(interactionandcontrol.forcefeed)
    * 1.0 / 20)) * 0.3) + (((interactionandcontrol__physicaldurability__rgb.rgbbright
    * 1.0 / 100) * (interactionandcontrol__physicaldurability__rgb.rgbcoloracc * 1.0
    / 10) * (0.5 + interactionandcontrol__physicaldurability__rgb.rgbzones * 1.0 /
    20)) * 0.2)) * 0.4) > 8.5 AND profcount >= 4 AND ((((testsessions.pollratehz *
    1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 / 30)
    * 10) * 0.4) + (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10) * 10) * 0.3)
    + (((log10(mechanical.swtchdur) * 1.0 / 7) * mechanical.swtchcons * (1 - mechanical.keychatter
    * 1.0 / 2)) * 0.2) + ((((interactionandcontrol.joyprec + interactionandcontrol.dpadacc)
    * 1.0 / 20) * (1 - testsessions.inplagms * 1.0 / 10) * 10) * 0.1)) > 7.5
  type: boolean
  primary_key: false
  description: 'Professional Multi-Genre Setup (KB #42): GVS > 8.5 AND ProfCount >=
    4 AND CGPI > 7.5.'
  hidden: false
  meta:
    kb_id: 42
- name: is_premium_immersive
  sql: (((((1 - audioandmedia.thdpct * 1.0 / 2) * (audioandmedia.spksensedb * 1.0
    / 100) * (1 - audioandmedia.audlatms * 1.0 / 100) * 10) * 0.5) + (((interactionandcontrol.hapstr
    * 1.0 / 10) * (1 + interactionandcontrol.vibmodes * 1.0 / 10) * (1 + LENGTH(interactionandcontrol.forcefeed)
    * 1.0 / 20)) * 0.3) + (((interactionandcontrol__physicaldurability__rgb.rgbbright
    * 1.0 / 100) * (interactionandcontrol__physicaldurability__rgb.rgbcoloracc * 1.0
    / 10) * (0.5 + interactionandcontrol__physicaldurability__rgb.rgbzones * 1.0 /
    20)) * 0.2))) > 8.0 AND ((1 - audioandmedia.thdpct * 1.0 / 2) * (audioandmedia.spksensedb
    * 1.0 / 100) * (1 - audioandmedia.audlatms * 1.0 / 100) * 10) > 7.5
  type: boolean
  primary_key: false
  description: 'Premium Immersive Experience Device (KB #44): IEC > 8.0 AND AQI >
    7.5 AND HFQ > 8.0 (if applicable) AND RIQ > 7.0 (if applicable).'
  hidden: false
  meta:
    kb_id: 44
- name: is_pro_player_certified
  sql: (((((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms + testsessions.resptimems)
    * 1.0 / 30) * 10) * 0.4) + (((dpires * 1.0 / 1000) * (1 - mcresptime * 1.0 / 10)
    * 10) * 0.3) + (((log10(mechanical.swtchdur) * 1.0 / 7) * mechanical.swtchcons
    * (1 - mechanical.keychatter * 1.0 / 2)) * 0.2) + ((((interactionandcontrol.joyprec
    + interactionandcontrol.dpadacc) * 1.0 / 20) * (1 - testsessions.inplagms * 1.0
    / 10) * 10) * 0.1)) * 1.0 / 10 * (1 + profcount * 1.0 / 5) * ((((dpires * 1.0
    / 1000) * (1 - mcresptime * 1.0 / 10) * 10) + ((testsessions.pollratehz * 1.0
    / 100) * (1 - (testsessions.inplagms + testsessions.resptimems) * 1.0 / 30) *
    10)) * 1.0 / 15)) > 8.5 AND ((((testsessions.pollratehz * 1.0 / 100) * (1 - (testsessions.inplagms
