version: 3
name: sbp_avg
source_queries:
- version: 3
  source_model:
    source_name: vehicles
    columns:
    - name: k
      sql: '1'
      type: number
  measures:
  - formula: sbp_score:avg
  dimensions:
  - name: k
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"vehicles.k\" AS k, \"vehicles.sbp_score_avg\" AS sbp_score_avg\
  \ FROM (SELECT\n  1 AS \"vehicles.k\",\n  AVG(\n    CASE\n      WHEN LOWER(TRIM(veh_qual))\
  \ = 'validated'\n      THEN 9\n      WHEN LOWER(TRIM(veh_qual)) = 'qualified'\n\
  \      THEN 7\n      ELSE 5\n    END\n  ) AS \"vehicles.sbp_score_avg\"\nFROM vehicles\
  \ AS vehicles\nGROUP BY\n  1) AS _inner"
data_source: cold_chain_pharma_compliance
columns:
- name: k
  sql: k
  type: number
  primary_key: false
  hidden: false
- name: sbp_score_avg
  sql: sbp_score_avg
  type: number
  primary_key: false
  description: 'Supplier Backup Presence proxy (KB #30, SCRS sub-score, 0-10): Validated
    vehicle = 9, Qualified = 7, else = 5. Used inside Supply Chain Resilience Score;
    heuristic from the gold task solution because the schema does not store SBP directly.'
  hidden: false
  format:
    type: float
