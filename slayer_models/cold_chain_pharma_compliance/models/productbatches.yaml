version: 3
name: productbatches
sql_table: productbatches
query_variables: {}
data_source: cold_chain_pharma_compliance
columns:
- name: batchtag
  sql: batchtag
  type: string
  primary_key: true
  hidden: false
- name: prodlink
  sql: prodlink
  type: string
  primary_key: false
  hidden: false
- name: mfg_ts
  sql: mfg_ts
  type: string
  primary_key: false
  hidden: false
- name: exp_ts
  sql: exp_ts
  type: string
  primary_key: false
  hidden: false
- name: store_cond
  sql: store_cond
  type: string
  primary_key: false
  description: "Required storage condition for this batch (KB #9, Product Storage\
    \ Classifications). One of: '2-8\xB0C' (refrigerated), '-20\xB0C' (frozen), '-70\xB0\
    C' (ultra-low temperature), '15-25\xB0C' (controlled room temperature). KB #37\
    \ (Storage Temperature for Biologics) and KB #49 (Acceptable Temperature Deviation\
    \ Limits) further annotate the meaning of these codes for biologics and brief-excursion\
    \ tolerances respectively."
  hidden: false
  meta:
    kb_ids:
    - 9
    - 37
    - 49
- name: tempmin
  sql: tempmin
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: tempmax
  sql: tempmax
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: tempsense
  sql: tempsense
  type: string
  primary_key: false
  description: 'Temperature sensitivity tier (KB #6, Temperature Sensitivity Tiers):
    ''Low'' (tolerates up to 24h of minor deviations), ''Medium'' (up to 8h), ''High''
    (cannot tolerate >2h). KB #47 (Thermodynamic Stability Class) maps a similar tiering
    Class A/B/C/D over the same column. KB #31 (Pharmaceutical Stability Budget) is
    the cumulative duration in hours/days a product can spend outside ideal conditions;
    tempsense is the per-product stability-tier indicator from which a stability budget
    is typically derived. Null = stability budget not determined.'
  hidden: false
  meta:
    kb_ids:
    - 6
    - 47
    - 31
- name: pack_type
  sql: pack_type
  type: string
  primary_key: false
  description: "Packaging type for this batch: Ampoule, Container, Syringe, Vial.\
    \ KB #29 (Premium Transport Container Types) names specialised premium containers\
    \ (Envirotainer RAP/RKN, va-Q-tainer, CSafe, Opticooler, ThermoSafe). KB #33 (Package\
    \ Integrity Monitoring Systems) describes shock/tilt/impact/pressure indicators\
    \ that may be applied. KB #43 (Package Thermal Efficiency Rating) classifies thermal\
    \ protection as 'Basic' (<24h), 'Standard' (24-48h), 'Enhanced' (48-96h), 'Extended'\
    \ (>96h) \u2014 the schema doesn't carry this rating as a column, but pack_type\
    \ is the closest available container indicator."
  hidden: false
  meta:
    kb_ids:
    - 29
    - 33
    - 43
- name: pack_cnt
  sql: pack_cnt
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: valusd
  sql: valusd
  type: string
  primary_key: false
  hidden: false
- name: insusd
  sql: insusd
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: valusd_num
  sql: CAST(REPLACE(REPLACE(valusd, '$', ''), ',', '') AS REAL)
  type: number
  primary_key: false
  description: Declared commercial value (USD) parsed to a numeric value. The raw
    'valusd' column is a formatted string like '$57,421.85'.
  hidden: false
- name: is_tier_1_cold_chain
  sql: tempsense = 'High' AND CAST(REPLACE(REPLACE(valusd, '$', ''), ',', '') AS REAL)
    > 100000
  type: boolean
  primary_key: false
  description: 'Tier 1 Cold Chain Product (KB #7): batch with ''High'' temperature
    sensitivity and value > $100,000 USD.'
  hidden: false
  meta:
    kb_id: 7
- name: rrf
  sql: "CASE store_cond WHEN '15-25\xB0C' THEN 1 WHEN '2-8\xB0C' THEN 1.5 WHEN '-20\xB0\
    C' THEN 2 WHEN '-70\xB0C' THEN 2.5 ELSE 1 END"
  type: number
  primary_key: false
  description: "Temperature factor T used inside Packing Integrity Risk Factor (KB\
    \ #19): 1 for 15-25\xB0C, 1.5 for 2-8\xB0C, 2 for -20\xB0C, 2.5 for -70\xB0C.\
    \ Reused as Route Risk Factor proxy where applicable."
  hidden: false
  meta:
    kb_id: 19
measures: []
aggregations: []
joins:
- target_model: products
  join_pairs:
  - - prodlink
    - prodcode
  join_type: left
filters: []
description: Pharmaceutical production batches with required temperature range, packaging,
  sensitivity, and value. Linked to a parent product via prodlink.
hidden: false
