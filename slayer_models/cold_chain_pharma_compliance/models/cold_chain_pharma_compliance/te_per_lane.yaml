version: 4
name: te_per_lane
source_queries:
- version: 3
  source_model: environmentalmonitoring
  measures:
  - formula: temp_excursion_count:sum
  dimensions:
  - name: route_string
    model: shipments
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"environmentalmonitoring.shipments.route_string\" AS shipments__route_string,\
  \ \"environmentalmonitoring.temp_excursion_count_sum\" AS temp_excursion_count_sum\
  \ FROM (SELECT\n  shipment_overview ->> '$.route.route_string' AS \"environmentalmonitoring.shipments.route_string\"\
  ,\n  SUM(env_metrics -> '$.temperature.excursion_count') AS \"environmentalmonitoring.temp_excursion_count_sum\"\
  \nFROM environmentalmonitoring AS environmentalmonitoring\nLEFT JOIN shipments AS\
  \ shipments\n  ON environmentalmonitoring.reckeylink = shipments.reckey\nGROUP BY\n\
  \  shipment_overview ->> '$.route.route_string') AS _inner"
data_source: cold_chain_pharma_compliance
columns:
- name: shipments__route_string
  sql: shipments__route_string
  type: string
  primary_key: false
  hidden: false
- name: temp_excursion_count_sum
  sql: temp_excursion_count_sum
  type: number
  primary_key: false
  description: Count of temperature excursions beyond limits.
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Per-lane temperature excursion count helper for Lane Risk Potential\
  \ (LRP, KB #36). Aggregates env metrics by shipments.route_string. Hidden \u2014\
  \ used internally by lane_risk_potential.\n\n[kb=36]\nLRP = \\frac{TE_{total} +\
  \ SD_{total} + CD_{total}}{N_{shipments}}, \\text{where } TE_{total} \\text{ is\
  \ the total count of temperature excursions, } SD_{total} \\text{ is the total count\
  \ of shipping delays, } CD_{total} \\text{ is the total count of customs delays,\
  \ and } N_{shipments} \\text{ is the number of shipments on that lane.} \u2014 Quantifies\
  \ the risk associated with a specific shipping route based on historical performance.\n\
  [/kb=36]"
hidden: true
meta:
  kb_id: 36
