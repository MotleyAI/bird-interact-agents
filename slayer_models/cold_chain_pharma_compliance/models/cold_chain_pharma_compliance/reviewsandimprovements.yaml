- name: lanequalstat
  sql: lanequalstat
  type: TEXT
  primary_key: false
  description: "Transport lane quality status: 'Valid', 'Invalid', 'Review Required'.\
    \ KB #54 (Serialization Maturity Model) classifies tracking maturity Level 0-4\
    \ from 'no serialization' through 'end-to-end serialized supply chain with real-time\
    \ visibility' \u2014 lane qualification status is the schema's nearest indicator\
    \ of supply-chain visibility maturity.\n\n[kb=54]\nSerialization maturity levels\
    \ are: Level 0 (No serialization), Level 1 (Batch-level tracking only), Level\
    \ 2 (Package-level serialization without systematic verification), Level 3 (Verified\
    \ package-level serialization), and Level 4 (End-to-end serialized supply chain\
    \ with real-time visibility). \u2014 Framework for assessing pharmaceutical tracking\
    \ and tracing capabilities.\n[/kb=54]"
  label: Serialization Maturity Model
  hidden: false
  meta:
    kb_id: 54
