- name: docformat
  sql: docformat
  type: TEXT
  primary_key: false
  description: "Review document format: Paper / Electronic / Hybrid. KB #53 (Validation\
    \ Documentation Requirements) lists the master plan, qualifications, mapping studies,\
    \ and final report that this review record references.\n\n[kb=53]\nRequired validation\
    \ documents include: Validation Master Plan, Risk Assessment, User Requirements\
    \ Specification, Design Qualification, Installation Qualification, Operational\
    \ Qualification, Performance Qualification, Temperature Mapping Studies, and Final\
    \ Validation Report. \u2014 The essential documentation needed to validate cold\
    \ chain processes and equipment.\n[/kb=53]"
  label: Validation Documentation Requirements
  hidden: false
  meta:
    kb_id: 53
- name: dataintegrity
  sql: dataintegrity
  type: TEXT
  primary_key: false
  description: "Data integrity verification status: 'Verified' / 'Under Review' /\
    \ 'Compromised'. KB #59 (Data Integrity Components) describes the ALCOA+ principles\
    \ \u2014 Attributable, Legible, Contemporaneous, Original, Accurate, plus Complete,\
    \ Consistent, Enduring, Available \u2014 used to classify integrity at this stage.\n\
    \n[kb=59]\nData integrity components include the ALCOA+ principles: Attributable\
    \ (traceable to individual/system), Legible (readable and permanent), Contemporaneous\
    \ (recorded at time of activity), Original (source data or certified copy), Accurate\
    \ (error-free), plus Complete (all data included), Consistent (expected sequence\
    \ followed), Enduring (preserved for required period), and Available (accessible\
    \ when needed). \u2014 Essential elements that ensure cold chain data is reliable\
    \ for decision-making.\n[/kb=59]"
  label: Data Integrity Components
  hidden: false
  meta:
    kb_id: 59
- name: audittrailcomplete
  sql: audittrailcomplete
  type: TEXT
  primary_key: false
  description: "Audit-trail completeness percent. KB #46 (Quality Management System\
    \ Maturity Model) ranks QMS at Level 1 (Basic, minimal documentation) up to Level\
    \ 5 (Optimized, fully integrated continuous improvement). audittrailcomplete is\
    \ the closest column-level proxy for the documentation-and-audit dimension of\
    \ the maturity model.\n\n[kb=46]\nQMS maturity levels range from Level 1 (Basic:\
    \ minimal documentation and reactive approaches) to Level 5 (Optimized: fully\
    \ integrated systems with continuous improvement). Intermediate levels include\
    \ Level 2 (Developing: standard procedures established), Level 3 (Defined: processes\
    \ are well-documented and followed), and Level 4 (Managed: processes are measured\
    \ and controlled). \u2014 Framework for assessing the sophistication of a cold\
    \ chain quality management system.\n[/kb=46]"
  label: Quality Management System Maturity Model
  hidden: false
  meta:
    kb_id: 46
