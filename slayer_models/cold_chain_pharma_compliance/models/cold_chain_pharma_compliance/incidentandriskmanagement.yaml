measures: []
aggregations: []
joins:
- target_model: shipments
  join_pairs:
  - - reckeyrisk
    - reckey
  join_type: left
filters: []
description: Per-shipment incident and risk management record. Holds the incident_risk_record
  JSON blob with stability, batch decision, deviation investigation, risk, reporting/notification,
  impact and lessons-learned sub-objects.
hidden: false
