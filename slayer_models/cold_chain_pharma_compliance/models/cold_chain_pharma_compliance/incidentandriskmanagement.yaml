version: 6
name: incidentandriskmanagement
sql_table: incidentandriskmanagement
query_variables: {}
data_source: cold_chain_pharma_compliance
columns:
- name: reckeyrisk
  sql: reckeyrisk
  type: TEXT
  primary_key: true
  hidden: false
- name: incident_risk_record
  sql: incident_risk_record
  type: TEXT
  primary_key: false
  description: JSON blob combining stability review, deviation investigation, risk
    assessment, reporting and impact analysis for a shipment to support CAPA and pharmacovigilance
    workflows.
  hidden: false
- name: stability_data_review
  sql: json_extract(incident_risk_record, '$.stability_and_quality.stability_data_review')
  type: TEXT
  primary_key: false
  description: 'Stability-data review summary: Completed / Pending / Not Required.'
  hidden: false
- name: stability_impact_assessment
  sql: json_extract(incident_risk_record, '$.stability_and_quality.stability_impact_assessment')
  type: TEXT
  primary_key: false
  description: 'Assessment of stability impact: Minor / Major. NULL means impact not
    assessed.'
  hidden: false
- name: product_quality_impact
  sql: json_extract(incident_risk_record, '$.stability_and_quality.product_quality_impact')
  type: TEXT
  primary_key: false
  description: 'Product-quality impact summary: Confirmed / Possible. NULL means impact
    not assessed.'
  hidden: false
- name: batch_release_decision
  sql: json_extract(incident_risk_record, '$.batch_decision.batch_release_decision')
  type: TEXT
  primary_key: false
  description: 'Decision on batch release: Approved / Pending / Rejected.'
