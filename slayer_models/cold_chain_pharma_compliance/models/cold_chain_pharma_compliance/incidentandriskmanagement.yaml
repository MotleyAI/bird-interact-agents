- name: risk_assessment_status
  sql: json_extract(incident_risk_record, '$.risk.risk_assessment_status')
  type: TEXT
  primary_key: false
  description: 'Overall risk-assessment status: Completed / Ongoing / Required.'
  hidden: false
- name: risk_level
  sql: json_extract(incident_risk_record, '$.risk.risk_level')
  type: TEXT
  primary_key: false
  description: 'Assigned risk level: High / Medium / Low. NULL means level not set.'
