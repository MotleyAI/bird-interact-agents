- name: customer_notification
  sql: json_extract(incident_risk_record, '$.reporting_notification.customer_notification')
  type: TEXT
  primary_key: false
  description: 'Customer notification status: Completed / Pending / Not Required.'
  hidden: false
- name: customer_response
  sql: json_extract(incident_risk_record, '$.reporting_notification.customer_response')
  type: TEXT
  primary_key: false
  description: 'Customer response summary: Accepted / Rejected. NULL means no response
