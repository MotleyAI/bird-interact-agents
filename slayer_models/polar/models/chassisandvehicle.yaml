  hidden: false
- name: vpc
  sql: (1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh /
    50.0) * (engineandfluids.engineloadpercent / 100.0)
  type: number
  primary_key: false
  description: 'Vehicle Performance Coefficient (KB #5): wear / speed / engine-load
    product. Cross-table to engineandfluids for engineloadpercent.'
  hidden: false
  meta:
    kb_id: 5
- name: ptec
  sql: ((1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh
    / 50.0) * (engineandfluids.engineloadpercent / 100.0)) * (0.6 + 0.4 * powerbattery.esi
    / 100.0)
  type: number
  primary_key: false
  description: "Polar Transportation Efficiency Coefficient (KB #31): VPC \xD7 (0.6\
    \ + 0.4 \xD7 ESI/100). Cross-table refs to engineandfluids + powerbattery via\
    \ equipment join."
  hidden: false
  meta:
    kb_id: 31
- name: is_safe_for_operation
  sql: ((1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh
    / 50.0) * (engineandfluids.engineloadpercent / 100.0)) > 0.6 AND brakefluidlevelpercent
    > 50 AND brakepadwearpercent < 70 AND json_extract(tiremetrics, '$.pressure_kpa')
    > 200
  type: boolean
  primary_key: false
  description: 'Vehicle Operational Safety Threshold (KB #15): VPC > 0.6 AND brakefluidlevel
    > 50 AND brakepadwear < 70 AND tire_pressure > 200.'
  hidden: false
  meta:
    kb_id: 15
