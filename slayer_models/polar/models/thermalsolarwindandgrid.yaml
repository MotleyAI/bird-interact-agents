    '$.wind.output_w')) * 100.0 / NULLIF(fuelcelloutputw + json_extract(renewablemetrics,
    '$.solar.output_w') + json_extract(renewablemetrics, '$.wind.output_w'), 0)) >
    70
  type: boolean
  primary_key: false
  description: 'Sustainable Energy Operation (KB #19) / Energy Sustainability Classification
    (KB #52) ''Energy-Sustainable'' tier: TRUE iff REC > 70%.'
