- name: ors
  sql: CASE operationalstatus WHEN 'Active' THEN 10 WHEN 'Standby' THEN 5 WHEN 'Maintenance'
    THEN 2 ELSE 0 END * (1 - operationhours * 1.0 / NULLIF(maintenancecyclehours,
    0))
  type: number
  primary_key: false
  description: "Operational Readiness Score (KB #1): status-multiplier \xD7 (1 \u2212\
    \ operationhours/maintenancecyclehours). Active=10, Standby=5, Maintenance=2,\
    \ else 0."
  hidden: false
  meta:
    kb_id: 1
- name: loss
  sql: 0.5 * equipment.eer + 0.5 * (CASE operationalstatus WHEN 'Active' THEN 10 WHEN
    'Standby' THEN 5 WHEN 'Maintenance' THEN 2 ELSE 0 END * (1 - operationhours *
    1.0 / NULLIF(maintenancecyclehours, 0))) * (1 - operationhours / 20000.0)
  type: number
  primary_key: false
  description: "Long-term Operational Stability Score (KB #37): 0.5 \xD7 EER + 0.5\
    \ \xD7 ORS \xD7 (1 \u2212 operationhours/20000)."
  hidden: false
  meta:
    kb_id: 37
- name: maintenance_priority_immediate
  sql: operationhours > maintenancecyclehours OR operationalstatus = 'Repair'
  type: boolean
  primary_key: false
  description: "Maintenance Priority Level (KB #12) \u2014 'Immediate Attention' bucket:\
    \ operationhours > maintenancecyclehours OR status='Repair'."
  hidden: false
  meta:
    kb_id: 12
- name: cipl_protection_level
  sql: CASE WHEN equipment__weatherandstructure.ssf > 0.8 AND (0.5 * equipment.eer
    + 0.5 * (CASE operationalstatus WHEN 'Active' THEN 10 WHEN 'Standby' THEN 5 WHEN
    'Maintenance' THEN 2 ELSE 0 END * (1 - operationhours * 1.0 / NULLIF(maintenancecyclehours,
    0))) * (1 - operationhours / 20000.0)) > 0.85 AND equipment.ospi > 0.9 THEN 'A'
    WHEN equipment__weatherandstructure.ssf > 0.7 AND (0.5 * equipment.eer + 0.5 *
    (CASE operationalstatus WHEN 'Active' THEN 10 WHEN 'Standby' THEN 5 WHEN 'Maintenance'
    THEN 2 ELSE 0 END * (1 - operationhours * 1.0 / NULLIF(maintenancecyclehours,
    0))) * (1 - operationhours / 20000.0)) > 0.75 AND equipment.ospi > 0.8 THEN 'B'
    ELSE 'C' END
  type: string
  primary_key: false
  description: "Critical Infrastructure Protection Level (KB #46): A/B/C based on\
    \ SSF, LOSS, OSPI thresholds. Cross-table refs: weatherandstructure (SSF) + equipment\
    \ (OSPI), reached via the operationmaintenance \u2192 equipment \u2190 weatherandstructure\
    \ path."
  hidden: false
  meta:
    kb_id: 46
