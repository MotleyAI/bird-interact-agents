    THEN 0.7 ELSE 1.0 END) > 0.8 THEN 'Green' WHEN (energyefficiencypercent * CASE
    powersource WHEN 'Solar' THEN 1.5 WHEN 'Wind' THEN 1.5 WHEN 'Hybrid' THEN 1.2
    WHEN 'Battery' THEN 1.0 WHEN 'Diesel' THEN 0.7 ELSE 1.0 END) >= 0.4 THEN 'Intermediate'
    ELSE 'High Impact' END
  type: string
  primary_key: false
