description: "Sustainable Polar Operations (KB #42): operations 'sustainable' iff\
  \ RSSI > 0.7 AND EWRII > 0.65 AND wastemanagementstatus='Normal' AND environmentalimpactindex\
  \ < 6.0. R-MULTISTAGE.\n\n[kb=42]\nPolar operations are defined as 'sustainable'\
  \ when the site maintains RSSI > 0.7 and EWRII > 0.65, with wastemanagementstatus\
  \ = 'Normal' and environmentalimpactindex < 6.0. \u2014 Defines sustainability standards\
  \ for polar operations\n[/kb=42]"
