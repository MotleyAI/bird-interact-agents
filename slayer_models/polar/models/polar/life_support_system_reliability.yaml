  type: DOUBLE
  primary_key: false
  description: 'Operational Readiness Score (KB #1): 10 x (1 - operationhours/maintenancecyclehours)
    if Active, 5 x (...) if Standby, 0 otherwise.'
  hidden: false
  format:
    type: float
- name: lssr
  sql: lssr
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
- name: tie_per_eq__tie_avg
  sql: tie_per_eq__tie_avg
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
