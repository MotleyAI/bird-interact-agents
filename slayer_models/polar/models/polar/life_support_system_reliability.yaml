  \ Peer-join via equipment (R-MULTISTAGE).\n\n[kb=33]\nLSSR = 0.7 \xD7 ORS + 0.3\
  \ \xD7 TIE \u2014 Evaluates the reliability of life support systems under polar\
  \ conditions\n[/kb=33]"
