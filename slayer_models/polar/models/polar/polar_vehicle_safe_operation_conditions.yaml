version: 5
name: polar_vehicle_safe_operation_conditions
source_queries:
- version: 3
  name: vpc_flag_p_eq_pvsoc
  source_model:
    source_name: chassisandvehicle
    columns:
    - name: vpc_ok_flag
      type: DOUBLE
      sql: CASE WHEN ((1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh
        / 50.0) * (engineandfluids.engineloadpercent / 100.0)) > 0.75 THEN 1 ELSE
        0 END
  measures:
  - formula: vpc_ok_flag:min
    name: vpc_ok
  dimensions:
  - name: chassiseqref
  whole_periods_only: false
- version: 3
  name: ptec_flag_p_eq_pvsoc
  source_model:
    source_name: polar_transportation_efficiency_coefficient
    columns:
    - name: ptec_ok_flag
      type: DOUBLE
      sql: CASE WHEN ptec > 0.7 THEN 1 ELSE 0 END
  measures:
  - formula: ptec_ok_flag:min
    name: ptec_ok
  dimensions:
  - name: chassiseqref
  whole_periods_only: false
- version: 3
  name: opstat_p_eq_pvsoc
  source_model:
    source_name: operationmaintenance
    columns:
    - name: opstat_active_flag
      type: DOUBLE
      sql: CASE WHEN operationalstatus = 'Active' THEN 1 ELSE 0 END
  measures:
  - formula: opstat_active_flag:min
    name: opstat_ok
  dimensions:
  - name: opmainteqref
  whole_periods_only: false
- version: 3
  name: safety_p_eq_pvsoc
  source_model:
    source_name: equipment
    columns:
    - name: safety_ok_flag
      type: DOUBLE
      sql: CASE WHEN safetyindex >= 0.8 THEN 1 ELSE 0 END
  measures:
  - formula: safety_ok_flag:min
    name: safety_ok
  dimensions:
  - name: equipmentcode
  whole_periods_only: false
- version: 3
  source_model:
    source_name: safety_p_eq_pvsoc
    joins:
    - target_model: vpc_flag_p_eq_pvsoc
      join_pairs:
      - - equipmentcode
        - chassiseqref
    - target_model: ptec_flag_p_eq_pvsoc
      join_pairs:
      - - equipmentcode
        - chassiseqref
    - target_model: opstat_p_eq_pvsoc
      join_pairs:
      - - equipmentcode
        - opmainteqref
  measures:
  - formula: safety_ok:min * vpc_flag_p_eq_pvsoc.vpc_ok:min * ptec_flag_p_eq_pvsoc.ptec_ok:min
      * opstat_p_eq_pvsoc.opstat_ok:min
    name: is_pvsoc
  dimensions:
  - name: equipmentcode
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"safety_p_eq_pvsoc.equipmentcode\" AS equipmentcode, \"\
  safety_p_eq_pvsoc.safety_ok_min\" AS safety_ok_min, \"safety_p_eq_pvsoc.is_pvsoc\"\
  \ AS is_pvsoc, \"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\" AS opstat_p_eq_pvsoc__opstat_ok_min,\
  \ \"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\" AS ptec_flag_p_eq_pvsoc__ptec_ok_min,\
  \ \"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\" AS vpc_flag_p_eq_pvsoc__vpc_ok_min\
  \ FROM (WITH _base AS (\nSELECT\n  safety_p_eq_pvsoc.equipmentcode AS \"safety_p_eq_pvsoc.equipmentcode\"\
  ,\n  MIN(safety_p_eq_pvsoc.safety_ok) AS \"safety_p_eq_pvsoc.safety_ok_min\"\nFROM\
  \ (\n  SELECT\n    \"equipment.equipmentcode\" AS equipmentcode,\n    \"equipment.safety_ok\"\
  \ AS safety_ok\n  FROM (\n    SELECT\n      equipment.equipmentcode AS \"equipment.equipmentcode\"\
  ,\n      MIN(CASE WHEN equipment.safetyindex >= 0.8 THEN 1 ELSE 0 END) AS \"equipment.safety_ok\"\
  \n    FROM equipment AS equipment\n    GROUP BY\n      equipment.equipmentcode\n\
  \  ) AS _inner\n) AS safety_p_eq_pvsoc\nGROUP BY\n  safety_p_eq_pvsoc.equipmentcode\n\
  ),\n_cm_safety_p_eq_pvsoc__opstat_p_eq_pvsoc__opstat_ok_min AS (\nSELECT\n  MIN(opstat_p_eq_pvsoc.opstat_ok)\
  \ AS \"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\"\nFROM (\n  SELECT\n \
  \   \"operationmaintenance.opmainteqref\" AS opmainteqref,\n    \"operationmaintenance.opstat_ok\"\
  \ AS opstat_ok\n  FROM (\n    SELECT\n      operationmaintenance.opmainteqref AS\
  \ \"operationmaintenance.opmainteqref\",\n      MIN(CASE WHEN operationmaintenance.operationalstatus\
  \ = 'Active' THEN 1 ELSE 0 END) AS \"operationmaintenance.opstat_ok\"\n    FROM\
  \ operationmaintenance AS operationmaintenance\n    GROUP BY\n      operationmaintenance.opmainteqref\n\
  \  ) AS _inner\n) AS opstat_p_eq_pvsoc\n),\n_cm_safety_p_eq_pvsoc__ptec_flag_p_eq_pvsoc__ptec_ok_min\
  \ AS (\nSELECT\n  MIN(ptec_flag_p_eq_pvsoc.ptec_ok) AS \"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\"\
  \nFROM (\n  SELECT\n    \"polar_transportation_efficiency_coefficient.chassiseqref\"\
  \ AS chassiseqref,\n    \"polar_transportation_efficiency_coefficient.ptec_ok\"\
  \ AS ptec_ok\n  FROM (\n    SELECT\n      polar_transportation_efficiency_coefficient.chassiseqref\
  \ AS \"polar_transportation_efficiency_coefficient.chassiseqref\",\n      MIN(\n\
  \        CASE WHEN polar_transportation_efficiency_coefficient.ptec > 0.7 THEN 1\
  \ ELSE 0 END\n      ) AS \"polar_transportation_efficiency_coefficient.ptec_ok\"\
  \n    FROM (\n      SELECT\n        \"vpc_per_eq.chassiseqref\" AS chassiseqref,\n\
  \        \"vpc_per_eq.vpc_avg\" AS vpc_avg,\n        \"vpc_per_eq.ptec\" AS ptec,\n\
  \        \"vpc_per_eq.esi_per_eq.esi_avg\" AS esi_per_eq__esi_avg\n      FROM (\n\
  \        WITH _base AS (\n          SELECT\n            vpc_per_eq.chassiseqref\
  \ AS \"vpc_per_eq.chassiseqref\",\n            AVG(vpc_per_eq.vpc) AS \"vpc_per_eq.vpc_avg\"\
  \n          FROM (\n            SELECT\n              \"chassisandvehicle.chassiseqref\"\
  \ AS chassiseqref,\n              \"chassisandvehicle.vpc\" AS vpc\n           \
  \ FROM (\n              SELECT\n                chassisandvehicle.chassiseqref AS\
  \ \"chassisandvehicle.chassiseqref\",\n                AVG(\n                  (\n\
  \                    1 - (\n                      chassisandvehicle.brakepadwearpercent\
  \ + chassisandvehicle.trackwearpercent\n                    ) / 200.0\n        \
  \          ) * (\n                    chassisandvehicle.vehiclespeedkmh / 50.0\n\
  \                  ) * (\n                    engineandfluids.engineloadpercent\
  \ / 100.0\n                  )\n                ) AS \"chassisandvehicle.vpc\"\n\
  \              FROM chassisandvehicle AS chassisandvehicle\n              LEFT JOIN\
  \ engineandfluids AS engineandfluids\n                ON chassisandvehicle.chassisengref\
  \ = engineandfluids.engineregistry\n              GROUP BY\n                chassisandvehicle.chassiseqref\n\
  \            ) AS _inner\n          ) AS vpc_per_eq\n          GROUP BY\n      \
  \      vpc_per_eq.chassiseqref\n        ), _cm_vpc_per_eq__esi_per_eq__esi_avg AS\
  \ (\n          SELECT\n            AVG(esi_per_eq.esi) AS \"vpc_per_eq.esi_per_eq.esi_avg\"\
  \n          FROM (\n            SELECT\n              \"powerbattery.pwrbatteqref\"\
  \ AS pwrbatteqref,\n              \"powerbattery.esi\" AS esi\n            FROM\
  \ (\n              SELECT\n                powerbattery.pwrbatteqref AS \"powerbattery.pwrbatteqref\"\
  ,\n                AVG(\n                  powerbattery.energyefficiencypercent\
  \ * CASE powerbattery.powersource\n                    WHEN 'Solar'\n          \
  \          THEN 1.5\n                    WHEN 'Wind'\n                    THEN 1.5\n\
  \                    WHEN 'Hybrid'\n                    THEN 1.2\n             \
  \       WHEN 'Battery'\n                    THEN 1.0\n                    WHEN 'Diesel'\n\
  \                    THEN 0.7\n                    ELSE 0\n                  END\n\
  \                ) AS \"powerbattery.esi\"\n              FROM powerbattery AS powerbattery\n\
  \              GROUP BY\n                powerbattery.pwrbatteqref\n           \
  \ ) AS _inner\n          ) AS esi_per_eq\n        ), _combined AS (\n          SELECT\n\
  \            _base.\"vpc_per_eq.chassiseqref\",\n            _base.\"vpc_per_eq.vpc_avg\"\
  ,\n            _cm_vpc_per_eq__esi_per_eq__esi_avg.\"vpc_per_eq.esi_per_eq.esi_avg\"\
  \n          FROM _base\n          CROSS JOIN _cm_vpc_per_eq__esi_per_eq__esi_avg\n\
  \        ), step1 AS (\n          SELECT\n            \"vpc_per_eq.chassiseqref\"\
  ,\n            \"vpc_per_eq.esi_per_eq.esi_avg\",\n            \"vpc_per_eq.vpc_avg\"\
  ,\n            \"vpc_per_eq.vpc_avg\" * (\n              0.6 + 0.4 * \"vpc_per_eq.esi_per_eq.esi_avg\"\
  \ / 100.0\n            ) AS \"vpc_per_eq.ptec\"\n          FROM _combined\n    \
  \    )\n        SELECT\n          \"vpc_per_eq.chassiseqref\",\n          \"vpc_per_eq.esi_per_eq.esi_avg\"\
  ,\n          \"vpc_per_eq.ptec\",\n          \"vpc_per_eq.vpc_avg\"\n        FROM\
  \ step1\n      ) AS _inner\n    ) AS polar_transportation_efficiency_coefficient\n\
  \    GROUP BY\n      polar_transportation_efficiency_coefficient.chassiseqref\n\
  \  ) AS _inner\n) AS ptec_flag_p_eq_pvsoc\n),\n_cm_safety_p_eq_pvsoc__vpc_flag_p_eq_pvsoc__vpc_ok_min\
  \ AS (\nSELECT\n  MIN(vpc_flag_p_eq_pvsoc.vpc_ok) AS \"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\"\
  \nFROM (\n  SELECT\n    \"chassisandvehicle.chassiseqref\" AS chassiseqref,\n  \
  \  \"chassisandvehicle.vpc_ok\" AS vpc_ok\n  FROM (\n    SELECT\n      chassisandvehicle.chassiseqref\
  \ AS \"chassisandvehicle.chassiseqref\",\n      MIN(\n        CASE\n          WHEN\
  \ (\n            (\n              1 - (\n                chassisandvehicle.brakepadwearpercent\
  \ + chassisandvehicle.trackwearpercent\n              ) / 200.0\n            ) *\
  \ (\n              chassisandvehicle.vehiclespeedkmh / 50.0\n            ) * (\n\
  \              engineandfluids.engineloadpercent / 100.0\n            )\n      \
  \    ) > 0.75\n          THEN 1\n          ELSE 0\n        END\n      ) AS \"chassisandvehicle.vpc_ok\"\
  \n    FROM chassisandvehicle AS chassisandvehicle\n    LEFT JOIN engineandfluids\
  \ AS engineandfluids\n      ON chassisandvehicle.chassisengref = engineandfluids.engineregistry\n\
  \    GROUP BY\n      chassisandvehicle.chassiseqref\n  ) AS _inner\n) AS vpc_flag_p_eq_pvsoc\n\
  ),\n_combined AS (\nSELECT _base.\"safety_p_eq_pvsoc.equipmentcode\", _base.\"safety_p_eq_pvsoc.safety_ok_min\"\
  , _cm_safety_p_eq_pvsoc__opstat_p_eq_pvsoc__opstat_ok_min.\"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\"\
  , _cm_safety_p_eq_pvsoc__ptec_flag_p_eq_pvsoc__ptec_ok_min.\"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\"\
  , _cm_safety_p_eq_pvsoc__vpc_flag_p_eq_pvsoc__vpc_ok_min.\"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\"\
  \nFROM _base\nCROSS JOIN _cm_safety_p_eq_pvsoc__opstat_p_eq_pvsoc__opstat_ok_min\n\
  CROSS JOIN _cm_safety_p_eq_pvsoc__ptec_flag_p_eq_pvsoc__ptec_ok_min\nCROSS JOIN\
  \ _cm_safety_p_eq_pvsoc__vpc_flag_p_eq_pvsoc__vpc_ok_min\n),\nstep1 AS (\nSELECT\n\
  \    \"safety_p_eq_pvsoc.equipmentcode\",\n    \"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\"\
  ,\n    \"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\",\n    \"safety_p_eq_pvsoc.safety_ok_min\"\
  ,\n    \"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\",\n    \"safety_p_eq_pvsoc.safety_ok_min\"\
  \ * \"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\" * \"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\"\
  \ * \"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\" AS \"safety_p_eq_pvsoc.is_pvsoc\"\
  \nFROM _combined\n)\nSELECT\n    \"safety_p_eq_pvsoc.equipmentcode\",\n    \"safety_p_eq_pvsoc.is_pvsoc\"\
  ,\n    \"safety_p_eq_pvsoc.opstat_p_eq_pvsoc.opstat_ok_min\",\n    \"safety_p_eq_pvsoc.ptec_flag_p_eq_pvsoc.ptec_ok_min\"\
  ,\n    \"safety_p_eq_pvsoc.safety_ok_min\",\n    \"safety_p_eq_pvsoc.vpc_flag_p_eq_pvsoc.vpc_ok_min\"\
  \nFROM step1) AS _inner"
