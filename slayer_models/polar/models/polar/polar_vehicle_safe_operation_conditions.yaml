description: "Polar Vehicle Safe Operation Conditions (KB #44): vehicles 'suitable\
  \ for polar missions' iff PTEC > 0.7 AND VPC > 0.75 AND operationalstatus = 'Active'\
  \ AND safetyindex >= 0.8. R-MULTISTAGE.\n\n[kb=44]\nPolar vehicles are considered\
  \ 'suitable for polar missions' when they maintain PTEC > 0.7 and VPC > 0.75, with\
  \ operationalstatus = 'Active' and safetyindex \u2265 0.8. \u2014 Determines the\
  \ conditions for safe operation of polar vehicles\n[/kb=44]"
hidden: false
