- name: externaltemperaturec
  sql: externaltemperaturec
  type: INT
  primary_key: false
  description: "External temp (\xB0C) for polar regions. <-40 extreme cold, -40 to\
    \ -20 standard, -20 to 0 mild, 0\u201310 warm (KB #22).\n\n[kb=22]\nExternal temperature\
    \ in polar regions typically ranges from -70\xB0C to 10\xB0C. Temperatures below\
    \ -40\xB0C represent extreme cold requiring special equipment protection measures,\
    \ -20\xB0C to -40\xB0C require standard cold weather protocols, while temperatures\
    \ above -20\xB0C are considered relatively mild for polar operations but still\
    \ require normal cold weather precautions. \u2014 Illustrates the significance\
    \ of external temperature readings in polar environments.\n[/kb=22]"
  label: externaltemperaturec
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 22
- name: windspeedms
  sql: windspeedms
  type: INT
  primary_key: false
  description: "Wind speed (m/s). <5 calm, 5\u201315 moderate, 15\u201325 strong,\
    \ >25 severe (KB #23).\n\n[kb=23]\nWind speeds in polar environments typically\
    \ range from 0 to 60 m/s. Speeds below 5 m/s represent calm conditions, 5-15 m/s\
    \ indicate moderate winds with minor operational impact, 15-25 m/s represent strong\
    \ winds requiring additional safety measures, and speeds above 25 m/s indicate\
    \ dangerous conditions that may require suspension of outdoor activities and securing\
    \ of equipment. \u2014 Illustrates the impact of wind speed measurements on operations\
    \ and safety.\n[/kb=23]"
  label: windspeedms
