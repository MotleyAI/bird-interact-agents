- name: ssf
  sql: (100 - structuralloadpercent) / 100.0 * CASE WHEN snowloadkgm2 > 100 OR windspeedms
    > 20 THEN 0.5 WHEN snowloadkgm2 > 50 OR windspeedms > 10 THEN 0.8 ELSE 1.0 END
  type: DOUBLE
  primary_key: false
  description: "Structural Safety Factor (KB #3): (100 \u2212 structuralloadpercent)/100\
    \ \xD7 weather multiplier.\n\n[kb=3]\nSSF = \\frac{100 - structuralloadpercent}{100}\
    \ \\times \\begin{cases} 0.5 & \\text{if snowloadkgm2 > 100 or windspeedms > 20}\
    \ \\\\ 0.8 & \\text{if snowloadkgm2 > 50 or windspeedms > 10} \\\\ 1.0 & \\text{otherwise}\
    \ \\end{cases} \u2014 Evaluates the safety margin of structures under extreme\
    \ weather conditions.\n[/kb=3]"
  label: Structural Safety Factor (SSF)
  hidden: false
  meta:
    kb_id: 3
