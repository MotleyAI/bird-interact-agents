description: "Polar Base Energy Security Status (KB #48): 'energy secure' iff REC\
  \ > 65 AND ESI > 0.7 AND RSSI > 0.75 AND batterystatus.level_percent > 75 AND hydrogenlevelpercent\
  \ > 70. R-MULTISTAGE.\n\n[kb=48]\nA polar base is assessed as being in an 'energy\
  \ secure' state when it maintains REC > 65%, ESI > 0.7, and RSSI > 0.75, with batterystatus.level_percent\
  \ > 75 and hydrogenlevelpercent > 70. \u2014 Determines the security status of energy\
  \ supply for polar bases\n[/kb=48]"
