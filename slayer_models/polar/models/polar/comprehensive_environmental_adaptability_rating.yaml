description: "Comprehensive Environmental Adaptability Rating (KB #49): Excellent\
  \ (ECAC > 0.85 AND SSF > 0.8 AND insulationstatus='Good'), Good (ECAC > 0.7 AND\
  \ SSF > 0.65 AND insulationstatus != 'Poor'), Limited otherwise. R-MULTISTAGE.\n\
  \n[kb=49]\nEquipment and systems are rated as having 'Excellent Adaptability' (ECAC\
  \ > 0.85 and SSF > 0.8 and thermalsolarwindandgrid.insulationstatus = 'Good'), 'Good\
  \ Adaptability' (ECAC > 0.7 and SSF > 0.65 and thermalsolarwindandgrid.insulationstatus\
  \ != 'Poor'), or 'Limited Adaptability' (other cases). \u2014 Assesses the overall\
  \ adaptability of equipment and systems to the polar environment\n[/kb=49]"
