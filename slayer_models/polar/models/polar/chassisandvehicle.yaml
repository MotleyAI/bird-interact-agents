- name: vpc
  sql: (1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh /
    50.0) * (engineandfluids.engineloadpercent / 100.0)
  type: number
  primary_key: false
  description: "Vehicle Performance Coefficient (KB #5): wear / speed / engine-load\
    \ product. Cross-table to engineandfluids for engineloadpercent.\n\n[kb=5]\nVPC\
    \ = (1 - \\frac{brakepadwearpercent + trackwearpercent}{200}) \\times \\frac{vehiclespeedkmh}{50}\
    \ \\times \\frac{engineloadpercent}{100}, \\text{ where lower wear percentages\
    \ and optimal engine load contribute to better performance.} \u2014 A metric that\
    \ evaluates vehicle performance based on mechanical condition and operational\
    \ efficiency.\n[/kb=5]"
  label: Vehicle Performance Coefficient (VPC)
  hidden: false
  meta:
    kb_id: 5
- name: is_safe_for_operation
  sql: ((1 - (brakepadwearpercent + trackwearpercent) / 200.0) * (vehiclespeedkmh
    / 50.0) * (engineandfluids.engineloadpercent / 100.0)) > 0.6 AND brakefluidlevelpercent
    > 50 AND brakepadwearpercent < 70 AND json_extract(tiremetrics, '$.pressure_kpa')
    > 200
  type: boolean
  primary_key: false
  description: "Vehicle Operational Safety Threshold (KB #15): VPC > 0.6 AND brakefluidlevel\
    \ > 50 AND brakepadwear < 70 AND tire_pressure > 200.\n\n[kb=15]\nA vehicle is\
    \ considered 'Safe for Operation' when it maintains a VPC > 0.6, has brake fluid\
    \ levels above 50%, brake pad wear below 70%, adequate tire pressure (tiremetrics.pressure_kpa\
    \ > 200), and is operated within recommended load limits (vehicleloadkg within\
    \ manufacturer specifications). \u2014 Defines the safety threshold for vehicle\
    \ operations based on multiple safety factors.\n[/kb=15]"
  label: Vehicle Operational Safety Threshold
  hidden: false
  meta:
    kb_id: 15
