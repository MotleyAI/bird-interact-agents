description: "Life Support Reliability Classification (KB #51): High (LSSR >= 0.8),\
  \ Moderate (0.6 <= LSSR < 0.8), Low (LSSR < 0.6).\n\n[kb=51]\nLife support systems\
  \ are classified into three reliability categories: 'High Reliability' WHEN (LSSR\
  \ >= 0.8), 'Moderate Reliability' WHEN (LSSR >= 0.6 AND LSSR < 0.8), and 'Low Reliability'\
  \ WHEN (LSSR < 0.6). \u2014 Categorizes life support systems into reliability classes\
  \ based on their LSSR score for operational decision-making.\n[/kb=51]"
