description: "Critical Scientific Equipment Status (KB #43): 'Fully Operational' (SER\
  \ > 0.9 AND SMSP > 0.85), 'Degraded Operation' (SER > 0.7 AND SMSP > 0.6), or 'Needs\
  \ Repair' otherwise. R-MULTISTAGE; reads from SMSP query-backed model and scientific\
  \ table.\n\n[kb=43]\nScientific equipment is classified as 'Fully Operational' (SER\
  \ > 0.9 and SMSP > 0.85), 'Degraded Operation' (SER > 0.7 and SMSP > 0.6), or 'Needs\
  \ Repair' (other cases). \u2014 Determines the operational status and reliability\
  \ of critical scientific equipment\n[/kb=43]"
