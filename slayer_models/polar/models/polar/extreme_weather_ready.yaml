version: 6
name: extreme_weather_ready
source_queries:
- version: 3
  name: ssf_per_eq_ewr
  source_model:
    source_name: weatherandstructure
    columns:
    - name: ssf_gt_07_flag
      type: DOUBLE
      sql: CASE WHEN (100 - structuralloadpercent) / 100.0 * CASE WHEN snowloadkgm2
        > 100 OR windspeedms > 20 THEN 0.5 WHEN snowloadkgm2 > 50 OR windspeedms >
        10 THEN 0.8 ELSE 1.0 END > 0.7 THEN 1 ELSE 0 END
  measures:
  - formula: ssf_gt_07_flag:min
    name: ssf_ok
  dimensions:
  - name: opmainteqref
    model: operationmaintenance
  whole_periods_only: false
- version: 3
  name: heater_per_eq_ewr
  source_model:
    source_name: cabinenvironment
    columns:
    - name: heater_on_flag
      type: DOUBLE
      sql: CASE WHEN heaterstatus != 'Off' THEN 1 ELSE 0 END
  measures:
  - formula: heater_on_flag:min
    name: heater_on
  dimensions:
  - name: cabineqref
  whole_periods_only: false
- version: 3
  name: insul_per_eq_ewr
  source_model:
    source_name: thermalsolarwindandgrid
    columns:
    - name: insul_ok_flag
      type: DOUBLE
      sql: CASE WHEN insulationstatus != 'Poor' THEN 1 ELSE 0 END
  measures:
  - formula: insul_ok_flag:min
    name: insul_ok
  dimensions:
  - name: thermaleqref
  whole_periods_only: false
- version: 3
  name: emerg_per_eq_ewr
  source_model:
    source_name: lightingandsafety
    columns:
    - name: emerg_ok_flag
      type: DOUBLE
      sql: CASE WHEN emergencylightstatus IN ('On', 'Testing') THEN 1 ELSE 0 END
  measures:
  - formula: emerg_ok_flag:min
    name: emerg_ok
  dimensions:
  - name: lighteqref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: ssf_per_eq_ewr
    joins:
    - target_model: heater_per_eq_ewr
      join_pairs:
      - - operationmaintenance__opmainteqref
        - cabineqref
    - target_model: insul_per_eq_ewr
      join_pairs:
      - - operationmaintenance__opmainteqref
        - thermaleqref
    - target_model: emerg_per_eq_ewr
      join_pairs:
      - - operationmaintenance__opmainteqref
        - lighteqref
  measures:
  - formula: ssf_ok:min * heater_per_eq_ewr.heater_on:min * insul_per_eq_ewr.insul_ok:min
      * emerg_per_eq_ewr.emerg_ok:min
    name: is_extreme_weather_ready
  dimensions:
  - name: operationmaintenance__opmainteqref
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"ssf_per_eq_ewr.operationmaintenance__opmainteqref\" AS\
  \ operationmaintenance__opmainteqref, \"ssf_per_eq_ewr.ssf_ok_min\" AS ssf_ok_min,\
  \ \"ssf_per_eq_ewr.is_extreme_weather_ready\" AS is_extreme_weather_ready, \"ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\"\
  \ AS emerg_per_eq_ewr__emerg_ok_min, \"ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\"\
  \ AS insul_per_eq_ewr__insul_ok_min, \"ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\"\
  \ AS heater_per_eq_ewr__heater_on_min FROM (WITH _base AS (\nSELECT\n  ssf_per_eq_ewr.operationmaintenance__opmainteqref\
  \ AS \"ssf_per_eq_ewr.operationmaintenance__opmainteqref\",\n  MIN(ssf_per_eq_ewr.ssf_ok)\
  \ AS \"ssf_per_eq_ewr.ssf_ok_min\"\nFROM (\n  SELECT\n    \"weatherandstructure.operationmaintenance.opmainteqref\"\
  \ AS operationmaintenance__opmainteqref,\n    \"weatherandstructure.ssf_ok\" AS\
  \ ssf_ok\n  FROM (\n    SELECT\n      operationmaintenance.opmainteqref AS \"weatherandstructure.operationmaintenance.opmainteqref\"\
  ,\n      MIN(\n        CASE\n          WHEN (\n            100 - weatherandstructure.structuralloadpercent\n\
  \          ) / 100.0 * CASE\n            WHEN weatherandstructure.snowloadkgm2 >\
  \ 100 OR weatherandstructure.windspeedms > 20\n            THEN 0.5\n          \
  \  WHEN weatherandstructure.snowloadkgm2 > 50 OR weatherandstructure.windspeedms\
  \ > 10\n            THEN 0.8\n            ELSE 1.0\n          END > 0.7\n      \
  \    THEN 1\n          ELSE 0\n        END\n      ) AS \"weatherandstructure.ssf_ok\"\
  \n    FROM weatherandstructure AS weatherandstructure\n    LEFT JOIN operationmaintenance\
  \ AS operationmaintenance\n      ON weatherandstructure.weatheropmaintref = operationmaintenance.opmaintregistry\n\
  \    GROUP BY\n      operationmaintenance.opmainteqref\n  ) AS _inner\n) AS ssf_per_eq_ewr\n\
  GROUP BY\n  ssf_per_eq_ewr.operationmaintenance__opmainteqref\n),\n_cm_ssf_per_eq_ewr__emerg_per_eq_ewr__emerg_ok_min\
  \ AS (\nSELECT\n  MIN(emerg_per_eq_ewr.emerg_ok) AS \"ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\"\
  \nFROM (\n  SELECT\n    \"lightingandsafety.lighteqref\" AS lighteqref,\n    \"\
  lightingandsafety.emerg_ok\" AS emerg_ok\n  FROM (\n    SELECT\n      lightingandsafety.lighteqref\
  \ AS \"lightingandsafety.lighteqref\",\n      MIN(\n        CASE\n          WHEN\
  \ lightingandsafety.emergencylightstatus IN ('On', 'Testing')\n          THEN 1\n\
  \          ELSE 0\n        END\n      ) AS \"lightingandsafety.emerg_ok\"\n    FROM\
  \ lightingandsafety AS lightingandsafety\n    GROUP BY\n      lightingandsafety.lighteqref\n\
  \  ) AS _inner\n) AS emerg_per_eq_ewr\n),\n_cm_ssf_per_eq_ewr__insul_per_eq_ewr__insul_ok_min\
  \ AS (\nSELECT\n  MIN(insul_per_eq_ewr.insul_ok) AS \"ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\"\
  \nFROM (\n  SELECT\n    \"thermalsolarwindandgrid.thermaleqref\" AS thermaleqref,\n\
  \    \"thermalsolarwindandgrid.insul_ok\" AS insul_ok\n  FROM (\n    SELECT\n  \
  \    thermalsolarwindandgrid.thermaleqref AS \"thermalsolarwindandgrid.thermaleqref\"\
  ,\n      MIN(CASE WHEN thermalsolarwindandgrid.insulationstatus <> 'Poor' THEN 1\
  \ ELSE 0 END) AS \"thermalsolarwindandgrid.insul_ok\"\n    FROM thermalsolarwindandgrid\
  \ AS thermalsolarwindandgrid\n    GROUP BY\n      thermalsolarwindandgrid.thermaleqref\n\
  \  ) AS _inner\n) AS insul_per_eq_ewr\n),\n_cm_ssf_per_eq_ewr__heater_per_eq_ewr__heater_on_min\
  \ AS (\nSELECT\n  MIN(heater_per_eq_ewr.heater_on) AS \"ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\"\
  \nFROM (\n  SELECT\n    \"cabinenvironment.cabineqref\" AS cabineqref,\n    \"cabinenvironment.heater_on\"\
  \ AS heater_on\n  FROM (\n    SELECT\n      cabinenvironment.cabineqref AS \"cabinenvironment.cabineqref\"\
  ,\n      MIN(CASE WHEN cabinenvironment.heaterstatus <> 'Off' THEN 1 ELSE 0 END)\
  \ AS \"cabinenvironment.heater_on\"\n    FROM cabinenvironment AS cabinenvironment\n\
  \    GROUP BY\n      cabinenvironment.cabineqref\n  ) AS _inner\n) AS heater_per_eq_ewr\n\
  ),\n_combined AS (\nSELECT _base.\"ssf_per_eq_ewr.operationmaintenance__opmainteqref\"\
  , _base.\"ssf_per_eq_ewr.ssf_ok_min\", _cm_ssf_per_eq_ewr__emerg_per_eq_ewr__emerg_ok_min.\"\
  ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\", _cm_ssf_per_eq_ewr__insul_per_eq_ewr__insul_ok_min.\"\
  ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\", _cm_ssf_per_eq_ewr__heater_per_eq_ewr__heater_on_min.\"\
  ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\"\nFROM _base\nCROSS JOIN _cm_ssf_per_eq_ewr__emerg_per_eq_ewr__emerg_ok_min\n\
  CROSS JOIN _cm_ssf_per_eq_ewr__insul_per_eq_ewr__insul_ok_min\nCROSS JOIN _cm_ssf_per_eq_ewr__heater_per_eq_ewr__heater_on_min\n\
  ),\nstep1 AS (\nSELECT\n    \"ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\",\n\
  \    \"ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\",\n    \"ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\"\
  ,\n    \"ssf_per_eq_ewr.operationmaintenance__opmainteqref\",\n    \"ssf_per_eq_ewr.ssf_ok_min\"\
  ,\n    \"ssf_per_eq_ewr.ssf_ok_min\" * \"ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\"\
  \ * \"ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\" * \"ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\"\
  \ AS \"ssf_per_eq_ewr.is_extreme_weather_ready\"\nFROM _combined\n)\nSELECT\n  \
  \  \"ssf_per_eq_ewr.emerg_per_eq_ewr.emerg_ok_min\",\n    \"ssf_per_eq_ewr.heater_per_eq_ewr.heater_on_min\"\
  ,\n    \"ssf_per_eq_ewr.insul_per_eq_ewr.insul_ok_min\",\n    \"ssf_per_eq_ewr.is_extreme_weather_ready\"\
  ,\n    \"ssf_per_eq_ewr.operationmaintenance__opmainteqref\",\n    \"ssf_per_eq_ewr.ssf_ok_min\"\
  \nFROM step1) AS _inner"
