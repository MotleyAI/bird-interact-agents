description: "Extreme Weather Readiness (KB #10) / Extreme Weather Readiness Status\
  \ (KB #50, equivalent restatement): TRUE iff SSF > 0.7 AND heaterstatus != 'Off'\
  \ AND insulationstatus != 'Poor' AND emergencylightstatus IN ('On','Testing'). Peer-join\
  \ across 4 children of equipment via opmaintenance grain (R-MULTISTAGE).\n\n[kb=10]\n\
  A composite rating where equipment is considered 'Extreme Weather Ready' if it maintains\
  \ an SSF > 0.7 and has operational heating systems (heaterstatus not 'Off'), proper\
  \ insulation (insulationstatus not 'Poor'), and functional emergency systems (emergencylightstatus\
  \ = 'On' or 'Testing'). \u2014 Evaluates how prepared equipment and structures are\
  \ for extreme weather conditions.\n[/kb=10]"
