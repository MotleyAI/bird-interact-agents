description: "Extreme Climate Adaptation Coefficient (KB #36): ECAC = SSF x (1 + TIE\
  \ x 0.5) x CASE on externaltemperaturec (0.7 if <-30, 0.85 if <-15, else 1.0). Peer-join\
  \ via equipment (R-MULTISTAGE; weather grouped via opmaintenance to reach equipment).\n\
  \n[kb=36]\nECAC = SSF \xD7 (1 + TIE \xD7 0.5) \xD7 \\begin{cases} 0.7 & \\text{if\
  \ externaltemperaturec < -30} \\\\ 0.85 & \\text{if externaltemperaturec < -15}\
  \ \\\\ 1.0 & \\text{otherwise} \\end{cases} \u2014 Evaluates equipment adaptation\
  \ capability under extreme climate conditions\n[/kb=36]"
