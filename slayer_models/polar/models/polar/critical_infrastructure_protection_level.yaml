description: "Critical Infrastructure Protection Level (KB #46): A (SSF > 0.8, LOSS\
  \ > 0.85, OSPI > 0.9), B (SSF > 0.7, LOSS > 0.75, OSPI > 0.8), or C otherwise. R-MULTISTAGE:\
  \ aggregates SSF/LOSS/OSPI per equipment then classifies.\n\n[kb=46]\nInfrastructure\
  \ is assigned protection level 'A' (SSF > 0.8, LOSS > 0.85, and OSPI > 0.9), 'B'\
  \ (SSF > 0.7, LOSS > 0.75, and OSPI > 0.8), or 'C' (other cases). \u2014 Determines\
  \ the protection level for polar critical infrastructure\n[/kb=46]"
