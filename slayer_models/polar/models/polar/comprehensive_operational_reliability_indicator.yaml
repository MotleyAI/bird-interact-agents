version: 4
name: comprehensive_operational_reliability_indicator
source_queries:
- version: 3
  name: ors_per_eq_cori
  source_model: operationmaintenance
  measures:
  - formula: ors:avg
    name: ors
  dimensions:
  - name: opmainteqref
  whole_periods_only: false
- version: 3
  name: cri_per_eq_cori
  source_model: communication
  measures:
  - formula: cri:avg
    name: cri
  dimensions:
  - name: commeqref
  whole_periods_only: false
- version: 3
  name: eer_per_eq_cori
  source_model: equipment
  measures:
  - formula: eer:avg
    name: eer
  dimensions:
  - name: equipmentcode
  whole_periods_only: false
- version: 3
  source_model:
    source_name: eer_per_eq_cori
    joins:
    - target_model: ors_per_eq_cori
      join_pairs:
      - - equipmentcode
        - opmainteqref
    - target_model: cri_per_eq_cori
      join_pairs:
      - - equipmentcode
        - commeqref
  measures:
  - formula: 0.4 * eer:avg + 0.4 * ors_per_eq_cori.ors:avg + 0.2 * cri_per_eq_cori.cri:avg
    name: cori
  dimensions:
  - name: equipmentcode
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"eer_per_eq_cori.equipmentcode\" AS equipmentcode, \"\
  eer_per_eq_cori.eer_avg\" AS eer_avg, \"eer_per_eq_cori.cori\" AS cori, \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  \ AS cri_per_eq_cori__cri_avg, \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\" AS ors_per_eq_cori__ors_avg\
  \ FROM (WITH _base AS (\nSELECT\n  eer_per_eq_cori.equipmentcode AS \"eer_per_eq_cori.equipmentcode\"\
  ,\n  AVG(eer_per_eq_cori.eer) AS \"eer_per_eq_cori.eer_avg\"\nFROM (\n  SELECT\n\
  \    \"equipment.equipmentcode\" AS equipmentcode,\n    \"equipment.eer\" AS eer\n\
  \  FROM (\n    SELECT\n      equipment.equipmentcode AS \"equipment.equipmentcode\"\
  ,\n      AVG(\n        (\n          equipment.performanceindex + equipment.reliabilityindex\n\
  \        ) / 2.0 * (\n          1 - equipment.environmentalimpactindex / 10.0\n\
  \        )\n      ) AS \"equipment.eer\"\n    FROM equipment AS equipment\n    GROUP\
  \ BY\n      equipment.equipmentcode\n  ) AS _inner\n) AS eer_per_eq_cori\nGROUP\
  \ BY\n  eer_per_eq_cori.equipmentcode\n),\n_cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg\
  \ AS (\nSELECT\n  AVG(cri_per_eq_cori.cri) AS \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  \nFROM (\n  SELECT\n    \"communication.commeqref\" AS commeqref,\n    \"communication.cri\"\
  \ AS cri\n  FROM (\n    SELECT\n      communication.commeqref AS \"communication.commeqref\"\
  ,\n      AVG(\n        (\n          CASE communication.antennastatus\n         \
  \   WHEN 'Normal'\n            THEN 10\n            WHEN 'Warning'\n           \
  \ THEN 5\n            WHEN 'Error'\n            THEN 0\n            ELSE 0\n   \
  \       END\n        ) * (\n          1 - JSON_EXTRACT(communication.signalmetrics,\
  \ '$.latency_ms') / 1000.0\n        )\n      ) AS \"communication.cri\"\n    FROM\
  \ communication AS communication\n    GROUP BY\n      communication.commeqref\n\
  \  ) AS _inner\n) AS cri_per_eq_cori\n),\n_cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg\
  \ AS (\nSELECT\n  AVG(ors_per_eq_cori.ors) AS \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \nFROM (\n  SELECT\n    \"operationmaintenance.opmainteqref\" AS opmainteqref,\n\
  \    \"operationmaintenance.ors\" AS ors\n  FROM (\n    SELECT\n      operationmaintenance.opmainteqref\
  \ AS \"operationmaintenance.opmainteqref\",\n      AVG(\n        CASE operationmaintenance.operationalstatus\n\
  \          WHEN 'Active'\n          THEN 10\n          WHEN 'Standby'\n        \
  \  THEN 5\n          ELSE 0\n        END * (\n          1 - operationmaintenance.operationhours\
  \ * 1.0 / NULLIF(operationmaintenance.maintenancecyclehours, 0)\n        )\n   \
  \   ) AS \"operationmaintenance.ors\"\n    FROM operationmaintenance AS operationmaintenance\n\
  \    GROUP BY\n      operationmaintenance.opmainteqref\n  ) AS _inner\n) AS ors_per_eq_cori\n\
  ),\n_combined AS (\nSELECT _base.\"eer_per_eq_cori.equipmentcode\", _base.\"eer_per_eq_cori.eer_avg\"\
  , _cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg.\"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  , _cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg.\"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \nFROM _base\nCROSS JOIN _cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg\nCROSS JOIN\
  \ _cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg\n),\nstep1 AS (\nSELECT\n    \"\
  eer_per_eq_cori.cri_per_eq_cori.cri_avg\",\n    \"eer_per_eq_cori.eer_avg\",\n \
  \   \"eer_per_eq_cori.equipmentcode\",\n    \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  ,\n    0.4 * \"eer_per_eq_cori.eer_avg\" + 0.4 * \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \ + 0.2 * \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\" AS \"eer_per_eq_cori.cori\"\
  \nFROM _combined\n)\nSELECT\n    \"eer_per_eq_cori.cori\",\n    \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  ,\n    \"eer_per_eq_cori.eer_avg\",\n    \"eer_per_eq_cori.equipmentcode\",\n  \
  \  \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\nFROM step1) AS _inner"
