  \ x EER + 0.4 x ORS + 0.2 x CRI. Peer-join via equipment (R-MULTISTAGE).\n\n[kb=39]\n\
  CORI = 0.4 \xD7 EER + 0.4 \xD7 ORS + 0.2 \xD7 CRI \u2014 Comprehensively assesses\
