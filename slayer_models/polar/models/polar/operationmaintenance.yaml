- name: ors
  sql: CASE operationalstatus WHEN 'Active' THEN 10 WHEN 'Standby' THEN 5 ELSE 0 END
    * (1 - operationhours * 1.0 / NULLIF(maintenancecyclehours, 0))
  type: number
  primary_key: false
  description: "Operational Readiness Score (KB #1): 10 x (1 - operationhours/maintenancecyclehours)\
    \ if Active, 5 x (...) if Standby, 0 otherwise.\n\n[kb=1]\nORS = \\begin{cases}\
    \ 10 \\times (1 - \\frac{operationhours}{maintenancecyclehours}) & \\text{if operationalstatus\
    \ = 'Active'} \\\\ 5 \\times (1 - \\frac{operationhours}{maintenancecyclehours})\
    \ & \\text{if operationalstatus = 'Standby'} \\\\ 0 & \\text{otherwise} \\end{cases}\
    \ \u2014 Quantifies how ready equipment is for immediate deployment based on operational\
    \ status and maintenance schedule.\n[/kb=1]"
  label: Operational Readiness Score (ORS)
  hidden: false
  meta:
    kb_id: 1
- name: loss
  sql: 0.5 * equipment.eer + 0.5 * (CASE operationalstatus WHEN 'Active' THEN 10 WHEN
    'Standby' THEN 5 ELSE 0 END * (1 - operationhours * 1.0 / NULLIF(maintenancecyclehours,
    0))) * (1 - operationhours / 20000.0)
  type: number
  primary_key: false
  description: "Long-term Operational Stability Score (KB #37): 0.5 x EER + 0.5 x\
    \ ORS x (1 - operationhours/20000). Cross-table to equipment via existing FK join.\n\
    \n[kb=37]\nLOSS = 0.5 \xD7 EER + 0.5 \xD7 ORS \xD7 (1 - \\frac{operationhours}{20000})\
    \ \u2014 Evaluates the stability of equipment during long-term operation\n[/kb=37]"
  label: Long-term Operational Stability Score (LOSS)
  hidden: false
  meta:
    kb_id: 37
- name: maintenance_priority_level
  sql: CASE WHEN operationhours > maintenancecyclehours OR operationalstatus = 'Repair'
    THEN 'Immediate Attention' WHEN operationhours > 0.8 * maintenancecyclehours THEN
    'Scheduled Service' ELSE 'Routine Maintenance' END
  type: string
  primary_key: false
  description: "Maintenance Priority Level (KB #12): Immediate Attention (operationhours\
    \ > maintenancecyclehours OR status='Repair'), Scheduled Service (operationhours\
    \ > 0.8 * maintenancecyclehours), Routine Maintenance (otherwise).\n\n[kb=12]\n\
    Equipment is categorized into maintenance priority levels: 'Immediate Attention'\
    \ (operationhours > maintenancecyclehours OR operationalstatus = 'Repair'), 'Scheduled\
    \ Service' (operationhours > 0.8 * maintenancecyclehours), and 'Routine Maintenance'\
    \ (all other cases), helping prioritize resource allocation. \u2014 Classifies\
    \ equipment based on the urgency of required maintenance.\n[/kb=12]"
  label: Maintenance Priority Level
  hidden: false
  meta:
    kb_id: 12
