- name: operationhours
  sql: operationhours
  type: number
  primary_key: false
  description: "Cumulative active-use hours. New: 0\u2013100, mid-life: 100\u2013\
    1000, near-replacement: high (KB #21).\n\n[kb=21]\nOperation hours represent the\
    \ cumulative time an equipment has been in active use. New equipment typically\
    \ has low hours (0-100), mid-life equipment shows moderate hours (100-1000), while\
    \ equipment approaching maintenance or replacement typically exceeds 1000 hours.\
    \ The ratio of operation hours to maintenance cycle hours is critical for preventative\
    \ maintenance scheduling. \u2014 Illustrates the meaning and importance of equipment\
    \ operation hours.\n[/kb=21]"
  label: operationhours
  hidden: false
  format:
    type: float
