version: 4
name: long_term_scientific_mission_viability
source_queries:
- version: 3
  name: smsp_p_eq_lsmv
  source_model:
    source_name: scientific_mission_success_probability
    columns:
    - name: smsp_ok_flag
      type: number
      sql: CASE WHEN smsp > 0.8 THEN 1 ELSE 0 END
  measures:
  - formula: smsp_ok_flag:min
    name: smsp_ok
  dimensions:
  - name: scieqref
  whole_periods_only: false
- version: 3
  name: cori_p_eq_lsmv
  source_model:
    source_name: comprehensive_operational_reliability_indicator
    columns:
    - name: cori_ok_flag
      type: number
      sql: CASE WHEN cori > 0.75 THEN 1 ELSE 0 END
  measures:
  - formula: cori_ok_flag:min
    name: cori_ok
  dimensions:
  - name: equipmentcode
  whole_periods_only: false
- version: 3
  name: sci_p_eq_lsmv
  source_model:
    source_name: scientific
    columns:
    - name: sci_ok_flag
      type: number
      sql: CASE WHEN calibrationstatus = 'Valid' AND dataloggingstatus = 'Active'
        THEN 1 ELSE 0 END
  measures:
  - formula: sci_ok_flag:min
    name: sci_ok
  dimensions:
  - name: scieqref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: sci_p_eq_lsmv
    joins:
    - target_model: smsp_p_eq_lsmv
      join_pairs:
      - - scieqref
        - scieqref
    - target_model: cori_p_eq_lsmv
      join_pairs:
      - - scieqref
        - equipmentcode
  measures:
  - formula: sci_ok:min * smsp_p_eq_lsmv.smsp_ok:min * cori_p_eq_lsmv.cori_ok:min
    name: is_lsmv
  dimensions:
  - name: scieqref
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"sci_p_eq_lsmv.scieqref\" AS scieqref, \"sci_p_eq_lsmv.sci_ok_min\"\
  \ AS sci_ok_min, \"sci_p_eq_lsmv.is_lsmv\" AS is_lsmv, \"sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\"\
  \ AS cori_p_eq_lsmv__cori_ok_min, \"sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\" AS\
  \ smsp_p_eq_lsmv__smsp_ok_min FROM (WITH _base AS (\nSELECT\n  sci_p_eq_lsmv.scieqref\
  \ AS \"sci_p_eq_lsmv.scieqref\",\n  MIN(sci_p_eq_lsmv.sci_ok) AS \"sci_p_eq_lsmv.sci_ok_min\"\
  \nFROM (\n  SELECT\n    \"scientific.scieqref\" AS scieqref,\n    \"scientific.sci_ok\"\
  \ AS sci_ok\n  FROM (\n    SELECT\n      scientific.scieqref AS \"scientific.scieqref\"\
  ,\n      MIN(\n        CASE\n          WHEN scientific.calibrationstatus = 'Valid'\n\
  \          AND scientific.dataloggingstatus = 'Active'\n          THEN 1\n     \
  \     ELSE 0\n        END\n      ) AS \"scientific.sci_ok\"\n    FROM scientific\
  \ AS scientific\n    GROUP BY\n      scientific.scieqref\n  ) AS _inner\n) AS sci_p_eq_lsmv\n\
  GROUP BY\n  sci_p_eq_lsmv.scieqref\n),\n_cm_sci_p_eq_lsmv__cori_p_eq_lsmv__cori_ok_min\
  \ AS (\nSELECT\n  MIN(cori_p_eq_lsmv.cori_ok) AS \"sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\"\
  \nFROM (\n  SELECT\n    \"comprehensive_operational_reliability_indicator.equipmentcode\"\
  \ AS equipmentcode,\n    \"comprehensive_operational_reliability_indicator.cori_ok\"\
  \ AS cori_ok\n  FROM (\n    SELECT\n      comprehensive_operational_reliability_indicator.equipmentcode\
  \ AS \"comprehensive_operational_reliability_indicator.equipmentcode\",\n      MIN(\n\
  \        CASE\n          WHEN comprehensive_operational_reliability_indicator.cori\
  \ > 0.75\n          THEN 1\n          ELSE 0\n        END\n      ) AS \"comprehensive_operational_reliability_indicator.cori_ok\"\
  \n    FROM (\n      SELECT\n        \"eer_per_eq_cori.equipmentcode\" AS equipmentcode,\n\
  \        \"eer_per_eq_cori.eer_avg\" AS eer_avg,\n        \"eer_per_eq_cori.cori\"\
  \ AS cori,\n        \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\" AS cri_per_eq_cori__cri_avg,\n\
  \        \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\" AS ors_per_eq_cori__ors_avg\n\
  \      FROM (\n        WITH _base AS (\n          SELECT\n            eer_per_eq_cori.equipmentcode\
  \ AS \"eer_per_eq_cori.equipmentcode\",\n            AVG(eer_per_eq_cori.eer) AS\
  \ \"eer_per_eq_cori.eer_avg\"\n          FROM (\n            SELECT\n          \
  \    \"equipment.equipmentcode\" AS equipmentcode,\n              \"equipment.eer\"\
  \ AS eer\n            FROM (\n              SELECT\n                equipment.equipmentcode\
  \ AS \"equipment.equipmentcode\",\n                AVG(\n                  (\n \
  \                   equipment.performanceindex + equipment.reliabilityindex\n  \
  \                ) / 2.0 * (\n                    1 - equipment.environmentalimpactindex\
  \ / 10.0\n                  )\n                ) AS \"equipment.eer\"\n        \
  \      FROM equipment AS equipment\n              GROUP BY\n                equipment.equipmentcode\n\
  \            ) AS _inner\n          ) AS eer_per_eq_cori\n          GROUP BY\n \
  \           eer_per_eq_cori.equipmentcode\n        ), _cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg\
  \ AS (\n          SELECT\n            AVG(cri_per_eq_cori.cri) AS \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  \n          FROM (\n            SELECT\n              \"communication.commeqref\"\
  \ AS commeqref,\n              \"communication.cri\" AS cri\n            FROM (\n\
  \              SELECT\n                communication.commeqref AS \"communication.commeqref\"\
  ,\n                AVG(\n                  (\n                    CASE communication.antennastatus\n\
  \                      WHEN 'Normal'\n                      THEN 10\n          \
  \            WHEN 'Warning'\n                      THEN 5\n                    \
  \  WHEN 'Error'\n                      THEN 0\n                      ELSE 0\n  \
  \                  END\n                  ) * (\n                    1 - JSON_EXTRACT(communication.signalmetrics,\
  \ '$.latency_ms') / 1000.0\n                  )\n                ) AS \"communication.cri\"\
  \n              FROM communication AS communication\n              GROUP BY\n  \
  \              communication.commeqref\n            ) AS _inner\n          ) AS\
  \ cri_per_eq_cori\n        ), _cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg AS (\n\
  \          SELECT\n            AVG(ors_per_eq_cori.ors) AS \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \n          FROM (\n            SELECT\n              \"operationmaintenance.opmainteqref\"\
  \ AS opmainteqref,\n              \"operationmaintenance.ors\" AS ors\n        \
  \    FROM (\n              SELECT\n                operationmaintenance.opmainteqref\
  \ AS \"operationmaintenance.opmainteqref\",\n                AVG(\n            \
  \      CASE operationmaintenance.operationalstatus\n                    WHEN 'Active'\n\
  \                    THEN 10\n                    WHEN 'Standby'\n             \
  \       THEN 5\n                    ELSE 0\n                  END * (\n        \
  \            1 - operationmaintenance.operationhours * 1.0 / NULLIF(operationmaintenance.maintenancecyclehours,\
  \ 0)\n                  )\n                ) AS \"operationmaintenance.ors\"\n \
  \             FROM operationmaintenance AS operationmaintenance\n              GROUP\
  \ BY\n                operationmaintenance.opmainteqref\n            ) AS _inner\n\
  \          ) AS ors_per_eq_cori\n        ), _combined AS (\n          SELECT\n \
  \           _base.\"eer_per_eq_cori.equipmentcode\",\n            _base.\"eer_per_eq_cori.eer_avg\"\
  ,\n            _cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg.\"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  ,\n            _cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg.\"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \n          FROM _base\n          CROSS JOIN _cm_eer_per_eq_cori__cri_per_eq_cori__cri_avg\n\
  \          CROSS JOIN _cm_eer_per_eq_cori__ors_per_eq_cori__ors_avg\n        ),\
  \ step1 AS (\n          SELECT\n            \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\"\
  ,\n            \"eer_per_eq_cori.eer_avg\",\n            \"eer_per_eq_cori.equipmentcode\"\
  ,\n            \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\",\n            0.4 * \"\
  eer_per_eq_cori.eer_avg\" + 0.4 * \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\" +\
  \ 0.2 * \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\" AS \"eer_per_eq_cori.cori\"\n\
  \          FROM _combined\n        )\n        SELECT\n          \"eer_per_eq_cori.cori\"\
  ,\n          \"eer_per_eq_cori.cri_per_eq_cori.cri_avg\",\n          \"eer_per_eq_cori.eer_avg\"\
  ,\n          \"eer_per_eq_cori.equipmentcode\",\n          \"eer_per_eq_cori.ors_per_eq_cori.ors_avg\"\
  \n        FROM step1\n      ) AS _inner\n    ) AS comprehensive_operational_reliability_indicator\n\
  \    GROUP BY\n      comprehensive_operational_reliability_indicator.equipmentcode\n\
  \  ) AS _inner\n) AS cori_p_eq_lsmv\n),\n_cm_sci_p_eq_lsmv__smsp_p_eq_lsmv__smsp_ok_min\
  \ AS (\nSELECT\n  MIN(smsp_p_eq_lsmv.smsp_ok) AS \"sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\"\
  \nFROM (\n  SELECT\n    \"scientific_mission_success_probability.scieqref\" AS scieqref,\n\
  \    \"scientific_mission_success_probability.smsp_ok\" AS smsp_ok\n  FROM (\n \
  \   SELECT\n      scientific_mission_success_probability.scieqref AS \"scientific_mission_success_probability.scieqref\"\
  ,\n      MIN(CASE WHEN scientific_mission_success_probability.smsp > 0.8 THEN 1\
  \ ELSE 0 END) AS \"scientific_mission_success_probability.smsp_ok\"\n    FROM (\n\
  \      SELECT\n        \"ser_per_eq.scieqref\" AS scieqref,\n        \"ser_per_eq.ser_avg\"\
  \ AS ser_avg,\n        \"ser_per_eq.smsp\" AS smsp,\n        \"ser_per_eq.cri_per_eq.cri_avg\"\
  \ AS cri_per_eq__cri_avg\n      FROM (\n        WITH _base AS (\n          SELECT\n\
  \            ser_per_eq.scieqref AS \"ser_per_eq.scieqref\",\n            AVG(ser_per_eq.ser)\
  \ AS \"ser_per_eq.ser_avg\"\n          FROM (\n            SELECT\n            \
  \  \"scientific.scieqref\" AS scieqref,\n              \"scientific.ser\" AS ser\n\
  \            FROM (\n              SELECT\n                scientific.scieqref AS\
  \ \"scientific.scieqref\",\n                AVG(\n                  scientific.measurementaccuracypercent\
  \ * CASE scientific.calibrationstatus\n                    WHEN 'Valid'\n      \
  \              THEN 1.0\n                    WHEN 'Due'\n                    THEN\
  \ 0.7\n                    WHEN 'Expired'\n                    THEN 0.3\n      \
  \              ELSE 0.0\n                  END\n                ) AS \"scientific.ser\"\
  \n              FROM scientific AS scientific\n              GROUP BY\n        \
  \        scientific.scieqref\n            ) AS _inner\n          ) AS ser_per_eq\n\
  \          GROUP BY\n            ser_per_eq.scieqref\n        ), _cm_ser_per_eq__cri_per_eq__cri_avg\
  \ AS (\n          SELECT\n            AVG(cri_per_eq.cri) AS \"ser_per_eq.cri_per_eq.cri_avg\"\
  \n          FROM (\n            SELECT\n              \"communication.commeqref\"\
  \ AS commeqref,\n              \"communication.cri\" AS cri\n            FROM (\n\
  \              SELECT\n                communication.commeqref AS \"communication.commeqref\"\
  ,\n                AVG(\n                  (\n                    CASE communication.antennastatus\n\
  \                      WHEN 'Normal'\n                      THEN 10\n          \
  \            WHEN 'Warning'\n                      THEN 5\n                    \
  \  WHEN 'Error'\n                      THEN 0\n                      ELSE 0\n  \
  \                  END\n                  ) * (\n                    1 - JSON_EXTRACT(communication.signalmetrics,\
  \ '$.latency_ms') / 1000.0\n                  )\n                ) AS \"communication.cri\"\
  \n              FROM communication AS communication\n              GROUP BY\n  \
  \              communication.commeqref\n            ) AS _inner\n          ) AS\
  \ cri_per_eq\n        ), _combined AS (\n          SELECT\n            _base.\"\
  ser_per_eq.scieqref\",\n            _base.\"ser_per_eq.ser_avg\",\n            _cm_ser_per_eq__cri_per_eq__cri_avg.\"\
  ser_per_eq.cri_per_eq.cri_avg\"\n          FROM _base\n          CROSS JOIN _cm_ser_per_eq__cri_per_eq__cri_avg\n\
  \        ), step1 AS (\n          SELECT\n            \"ser_per_eq.cri_per_eq.cri_avg\"\
  ,\n            \"ser_per_eq.scieqref\",\n            \"ser_per_eq.ser_avg\",\n \
  \           \"ser_per_eq.ser_avg\" * (\n              0.8 + 0.2 * \"ser_per_eq.cri_per_eq.cri_avg\"\
  \ / 10.0\n            ) AS \"ser_per_eq.smsp\"\n          FROM _combined\n     \
  \   )\n        SELECT\n          \"ser_per_eq.cri_per_eq.cri_avg\",\n          \"\
  ser_per_eq.scieqref\",\n          \"ser_per_eq.ser_avg\",\n          \"ser_per_eq.smsp\"\
  \n        FROM step1\n      ) AS _inner\n    ) AS scientific_mission_success_probability\n\
  \    GROUP BY\n      scientific_mission_success_probability.scieqref\n  ) AS _inner\n\
  ) AS smsp_p_eq_lsmv\n),\n_combined AS (\nSELECT _base.\"sci_p_eq_lsmv.scieqref\"\
  , _base.\"sci_p_eq_lsmv.sci_ok_min\", _cm_sci_p_eq_lsmv__cori_p_eq_lsmv__cori_ok_min.\"\
  sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\", _cm_sci_p_eq_lsmv__smsp_p_eq_lsmv__smsp_ok_min.\"\
  sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\"\nFROM _base\nCROSS JOIN _cm_sci_p_eq_lsmv__cori_p_eq_lsmv__cori_ok_min\n\
  CROSS JOIN _cm_sci_p_eq_lsmv__smsp_p_eq_lsmv__smsp_ok_min\n),\nstep1 AS (\nSELECT\n\
  \    \"sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\",\n    \"sci_p_eq_lsmv.sci_ok_min\"\
  ,\n    \"sci_p_eq_lsmv.scieqref\",\n    \"sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\"\
  ,\n    \"sci_p_eq_lsmv.sci_ok_min\" * \"sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\"\
  \ * \"sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\" AS \"sci_p_eq_lsmv.is_lsmv\"\n\
  FROM _combined\n)\nSELECT\n    \"sci_p_eq_lsmv.cori_p_eq_lsmv.cori_ok_min\",\n \
  \   \"sci_p_eq_lsmv.is_lsmv\",\n    \"sci_p_eq_lsmv.sci_ok_min\",\n    \"sci_p_eq_lsmv.scieqref\"\
  ,\n    \"sci_p_eq_lsmv.smsp_p_eq_lsmv.smsp_ok_min\"\nFROM step1) AS _inner"
