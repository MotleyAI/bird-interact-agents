description: "Long-term Scientific Mission Viability (KB #47): missions 'long-term\
  \ viable' iff SMSP > 0.8 AND CORI > 0.75 AND calibrationstatus = 'Valid' AND dataloggingstatus\
  \ = 'Active'. R-MULTISTAGE.\n\n[kb=47]\nScientific missions are assessed as 'long-term\
  \ viable' when all involved scientific equipment maintains SMSP > 0.8 and overall\
  \ site operations maintain CORI > 0.75, with calibrationstatus = 'Valid' and dataloggingstatus\
  \ = 'Active'. \u2014 Assesses the viability of long-term scientific missions under\
  \ polar conditions\n[/kb=47]"
