- name: fuelcellefficiencypercent
  sql: fuelcellefficiencypercent
  type: DOUBLE
  primary_key: false
  description: "Fuel cell efficiency %. <50 older/degraded, 50\u201370 standard modern,\
    \ >70 high-end (KB #29).\n\n[kb=29]\nFuel cell efficiency percentages typically\
    \ range from 40% to 90%. Values below 50% represent older or degraded fuel cell\
    \ technology, 50-70% indicate standard efficiency modern fuel cells suitable for\
    \ general applications, and values above 70% represent high-performance fuel cells\
    \ with optimal conversion of chemical energy to electrical power with minimal\
    \ waste heat generation. \u2014 Illustrates the technical significance of fuel\
    \ cell efficiency ratings.\n[/kb=29]"
  label: fuelcellefficiencypercent
  hidden: false
  format:
    type: float
  meta:
    kb_id: 29
