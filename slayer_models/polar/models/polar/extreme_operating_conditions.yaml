description: "Extreme Operating Conditions (KB #40): equipment 'operates safely under\
  \ extreme conditions' iff SSF > 0.65 AND ECAC > 0.8. Built on top of ECAC multistage\
  \ model (R-MULTISTAGE).\n\n[kb=40]\nEquipment is considered to 'operate safely under\
  \ extreme conditions' when its SSF > 0.65 and ECAC > 0.8. \u2014 Defines the extreme\
  \ environmental conditions under which equipment can safely operate\n[/kb=40]"
