- name: esi
  sql: energyefficiencypercent * CASE powersource WHEN 'Solar' THEN 1.5 WHEN 'Wind'
    THEN 1.5 WHEN 'Hybrid' THEN 1.2 WHEN 'Battery' THEN 1.0 WHEN 'Diesel' THEN 0.7
    ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: "Energy Sustainability Index (KB #2): efficiency% x powersource multiplier\
    \ (Solar/Wind=1.5, Hybrid=1.2, Battery=1.0, Diesel=0.7, otherwise 0).\n\n[kb=2]\n\
    ESI = energyefficiencypercent \\times \\begin{cases} 1.5 & \\text{if powersource\
    \ IN ('Solar', 'Wind')} \\\\ 1.2 & \\text{if powersource = 'Hybrid'} \\\\ 1.0\
    \ & \\text{if powersource = 'Battery'} \\\\ 0.7 & \\text{if powersource = 'Diesel'}\
    \ \\\\ 0 & \\text{otherwise} \\end{cases}, \\text{ providing higher ratings for\
    \ renewable energy and lower ratings for fossil fuels.} \u2014 Measures the sustainability\
    \ of an equipment's energy usage by evaluating energy efficiency and renewable\
    \ sources.\n[/kb=2]"
  label: Energy Sustainability Index (ESI)
  hidden: false
  meta:
    kb_id: 2
- name: energy_sustainability_class
  sql: CASE WHEN (energyefficiencypercent * CASE powersource WHEN 'Solar' THEN 1.5
    WHEN 'Wind' THEN 1.5 WHEN 'Hybrid' THEN 1.2 WHEN 'Battery' THEN 1.0 WHEN 'Diesel'
    THEN 0.7 ELSE 0 END) > 0.8 THEN 'Green' WHEN (energyefficiencypercent * CASE powersource
    WHEN 'Solar' THEN 1.5 WHEN 'Wind' THEN 1.5 WHEN 'Hybrid' THEN 1.2 WHEN 'Battery'
    THEN 1.0 WHEN 'Diesel' THEN 0.7 ELSE 0 END) >= 0.4 THEN 'Intermediate' ELSE 'High
    Impact' END
  type: TEXT
  primary_key: false
  description: "Energy Sustainability Classification (KB #13): Green (ESI > 0.8),\
    \ Intermediate (0.4 <= ESI <= 0.8), High Impact (ESI < 0.4).\n\n[kb=13]\nEquipment\
    \ is classified as 'Green' (ESI > 0.8), 'Intermediate' (ESI between 0.4 and 0.8),\
    \ or 'High Impact' (ESI < 0.4), with Green indicating environmentally sustainable\
    \ operations. \u2014 Categories equipment based on their energy sustainability\
    \ index for environmental impact assessment.\n[/kb=13]"
  label: Energy Sustainability Classification
  hidden: false
  meta:
    kb_id: 13
- name: battery_level_percent
  sql: json_extract(batterystatus, '$.level_percent')
