- name: price_position_52w
  sql: lowdelta * 100.0 / NULLIF(high52w - low52w, 0)
  type: DOUBLE
  primary_key: false
  description: "Price Position in 52-Week Range (KB 4) = (recent_price - low52w) /\
    \ (high52w - low52w) * 100. lowdelta = recent_price - low52w.\n\n[kb=4]\next{Position}\
    \ = \frac{\text{Recent price} - \text{52-week low price}}{\text{52-week high price}\
    \ - \text{52-week low price}} \times 100 \u2014 Calculates the current price's\
    \ position within its 52-week high-low range as a percentage.\n[/kb=4]"
  label: Price Position in 52-Week Range
  hidden: false
  meta:
    kb_id: 4
- name: recent_price
  sql: low52w + lowdelta
  type: DOUBLE
  primary_key: false
  description: Reconstructed recent (current) price = low52w + lowdelta. Used by KB
    57 Capital Preservation Index.
  hidden: false
- name: positive_return_consistency
  sql: positiveyears * 100.0 / NULLIF(positiveyears + negativeyears, 0)
  type: DOUBLE
  primary_key: false
  description: "Positive Return Consistency (KB 7) = positiveyears / (positiveyears\
    \ + negativeyears) * 100.\n\n[kb=7]\next{Consistency} = \frac{\text{Number of\
    \ years with positive returns}}{\text{number of positive years with positive returns}\
    \ + \text{number if years with negative returns}} \times 100 \u2014 Calculates\
    \ the percentage of a fund's historical years that have yielded positive returns.\n\
    [/kb=7]"
  label: Positive Return Consistency
  hidden: false
  meta:
    kb_id: 7
- name: capital_preservation_index
  sql: (1.0 / (1 + COALESCE(negativeyears, 0))) * (1 - (low52w - (low52w + lowdelta))
    * 1.0 / NULLIF(low52w, 0))
  type: DOUBLE
  primary_key: false
  description: "Capital Preservation Index (KB 57) = (1/(1+Negative Years)) * (1 -\
    \ (52-Week Low - Current Price)/52-Week Low). Current price = low52w + lowdelta.\n\
    \n[kb=57]\nCPI = (\frac{1}{1 + \text{Negative Years}}) \times (1 - \frac{\text{52-Week\
    \ Low} - \text{Current Price}}{\text{52-Week Low}}) \u2014 Scores a fund on its\
    \ ability to protect capital by combining its history of avoiding down years with\
    \ its ability to stay above its 52-week lows.\n[/kb=57]"
  label: Capital Preservation Index
  hidden: false
  meta:
    kb_id: 57
