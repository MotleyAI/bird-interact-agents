columns:
- name: riskid
  sql: riskid
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: investmentref
  sql: investmentref
  type: string
  primary_key: false
  hidden: false
- name: alpha3y
  sql: alpha3y
  type: number
  primary_key: false
  description: 3-year alpha (excess return vs benchmark).
  hidden: false
  format:
    type: integer
- name: beta3y
  sql: beta3y
  type: number
  primary_key: false
  description: "Beta over 3 years (KB 22).\n\n[kb=22]\nMeasures a fund's volatility\
    \ in relation to the overall market. Beta > 1 indicates the fund is more volatile\
    \ than the market. Beta < 1 indicates it is less volatile. Beta = 1 implies its\
    \ movement matches the market. \u2014 Illustrates the fund's market sensitivity\
    \ (Beta).\n[/kb=22]"
  label: Beta
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 22
- name: avgreturn3y
  sql: avgreturn3y
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: rsquared3y
  sql: rsquared3y
  type: number
  primary_key: false
  description: "R-squared over 3 years (KB 23). Stored on a 0-100 scale.\n\n[kb=23]\n\
    Represents the percentage of a fund's movements that can be explained by movements\
    \ in its benchmark index. A value of 95 means that 95% of the fund's performance\
    \ is attributable to the benchmark's performance. \u2014 Illustrates the fund's\
    \ correlation to its benchmark (R-squared).\n[/kb=23]"
  label: R-Squared
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 23
- name: volatility3y
  sql: volatility3y
  type: number
  primary_key: false
  description: 3-year standard deviation of returns.
  hidden: false
  format:
    type: integer
- name: sharperatio3y
  sql: sharperatio3y
  type: number
  primary_key: false
  description: "3-year Sharpe ratio (risk-adjusted return per unit of volatility)\
    \ (KB 24).\n\n[kb=24]\nMeasures the fund's excess return per unit of total risk\
    \ (volatility). A higher Sharpe Ratio is better. A ratio > 1 is generally considered\
    \ good, > 2 is very good, and > 3 is excellent. \u2014 Illustrates the fund's\
    \ risk-adjusted return (Sharpe Ratio).\n[/kb=24]"
  label: Sharpe Ratio
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 24
