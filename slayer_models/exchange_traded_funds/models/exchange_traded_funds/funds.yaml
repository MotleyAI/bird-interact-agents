- name: relative_expense_ratio
  sql: expensenet - benchmarkexp
  type: DOUBLE
  primary_key: false
  description: "Relative Expense Ratio (KB 1) = net expense ratio - benchmark expense\
    \ ratio. Negative = cheaper than benchmark.\n\n[kb=1]\next{Relative Expense} =\
    \ \text{Fund's net expense ratio} - \text{Benchmark's expense ratio} \u2014 Measures\
    \ the difference between a fund's net expense ratio and its benchmark's expense\
    \ ratio.\n[/kb=1]"
  label: Relative Expense Ratio
  hidden: false
  meta:
    kb_id: 1
- name: return_on_cost
  sql: etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)
  type: DOUBLE
  primary_key: false
  description: "Return on Cost (KB 2) = fund 1-year return / net expense ratio.\n\n\
    [kb=2]\nROC = \frac{\text{Fund's 1-year return}}{\text{Net expense ratio}} \u2014\
    \ Assesses the fund's one-year performance relative to its cost, indicating how\
    \ much return is generated per unit of expense.\n[/kb=2]"
  label: Return on Cost (ROC)
  hidden: false
  meta:
    kb_id: 2
- name: yield_to_expense_ratio
  sql: yieldrate * 1.0 / NULLIF(expensenet, 0)
  type: DOUBLE
  primary_key: false
  description: "Yield-to-Expense Ratio (KB 3) = fund yield / net expense ratio.\n\n\
    [kb=3]\nYTER = \frac{\text{Fund's yield rate}}{\text{Net expense ratio}} \u2014\
    \ Evaluates an income-generating fund's efficiency by comparing its dividend yield\
    \ to its net expense ratio.\n[/kb=3]"
  label: Yield-to-Expense Ratio (YTER)
  hidden: false
  meta:
    kb_id: 3
- name: short_term_momentum
  sql: ma50 - ma200
  type: DOUBLE
  primary_key: false
  description: "Short-Term Momentum Indicator (KB 5) = 50-day MA - 200-day MA.\n\n\
    [kb=5]\next{Momentum} = \text{50-day moving average} - \text{200-day moving average}\
    \ \u2014 A technical indicator that signals short-term trend strength by comparing\
    \ the 50-day and 200-day moving averages.\n[/kb=5]"
  label: Short-Term Momentum Indicator
  hidden: false
  meta:
    kb_id: 5
- name: is_total_return_fund
  sql: equityweight IS NOT NULL AND equityweight > 0 AND yieldrate IS NOT NULL AND
    yieldrate > 0
  type: BOOLEAN
  primary_key: false
  description: "Total Return Fund (KB 9): non-zero equity allocation AND non-zero\
    \ dividend yield.\n\n[kb=9]\nA fund is classified as a Total Return Fund if it\
    \ has both a non-zero allocation to stocks and a non-zero dividend yield. \u2014\
    \ Defines a fund that aims to provide both capital appreciation and income through\
    \ dividends.\n[/kb=9]"
  label: Total Return Fund
  hidden: false
  meta:
    kb_id: 9
- name: is_low_turnover_strategy
  sql: turnoverratio < 0.30
  type: BOOLEAN
  primary_key: false
  description: "Low-Turnover Strategy (KB 12): turnoverratio < 30%.\n\n[kb=12]\nA\
    \ fund employs a Low-Turnover Strategy if its annual portfolio turnover is less\
    \ than 30%. \u2014 An investment strategy characterized by infrequent trading\
    \ of portfolio holdings, often associated with long-term, passive, or buy-and-hold\
    \ approaches.\n[/kb=12]"
  label: Low-Turnover Strategy
  hidden: false
  meta:
    kb_id: 12
- name: is_efficient_income_generator
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) > 15
  type: BOOLEAN
  primary_key: false
  description: "Efficient Income Generator (KB 14): YTER > 15.\n\n[kb=14]\nA fund\
    \ is classified as an Efficient Income Generator if its 'Yield-to-Expense Ratio\
    \ (YTER)' is greater than 15. \u2014 A fund that provides a high dividend yield\
    \ relative to its management cost.\n[/kb=14]"
  label: Efficient Income Generator
  hidden: false
  meta:
    kb_id: 14
- name: is_golden_cross
  sql: (ma50 - ma200) > 0
  type: BOOLEAN
  primary_key: false
  description: "Golden Cross Signal (KB 17): short-term momentum > 0.\n\n[kb=17]\n\
    A Golden Cross Signal occurs for a fund when its 'Short-Term Momentum Indicator'\
    \ is positive, suggesting its short-term average price has crossed above its long-term\
    \ average price. \u2014 A bullish technical signal indicating potential for a\
    \ major rally, based on moving average trends.\n[/kb=17]"
  label: Golden Cross Signal
  hidden: false
  meta:
    kb_id: 17
- name: is_high_fee_strategic_bet
  sql: (expensenet - benchmarkexp) > 0 AND (risk_metrics.rsquared3y IS NULL OR risk_metrics.rsquared3y
    <= 90)
  type: BOOLEAN
  primary_key: false
  description: "High-Fee Strategic Bet (KB 44): positive Relative Expense Ratio AND\
    \ not a Market-Tracking Fund (R-squared 3Y <= 90).\n\n[kb=44]\nA fund is a High-Fee\
    \ Strategic Bet if its 'Relative Expense Ratio' is positive and it does not qualify\
    \ as a 'Market-Tracking Fund'. \u2014 Classifies a fund as an expensive, actively-managed\
    \ portfolio that deviates significantly from market benchmarks, representing a\
    \ pure play on manager skill.\n[/kb=44]"
  label: High-Fee Strategic Bet
  hidden: false
  meta:
    kb_id: 44
- name: active_management_footprint
  sql: (1 - risk_metrics.rsquared3y / 100.0) * 1.0 / NULLIF(turnoverratio, 0)
  type: DOUBLE
  primary_key: false
  description: "Active Management Footprint (KB 52) = (1 - R-Squared 3Y) / Turnover\
    \ Ratio. R-Squared is stored on a 0-100 scale, so divided by 100 to get 0-1 fraction.\n\
    \n[kb=52]\nAMF = \frac{1 - \text{3-Year R-Squared}}{\text{Turnover Ratio}} \u2014\
    \ Quantifies the degree of a fund's active management by measuring its deviation\
    \ from the benchmark relative to its trading activity.\n[/kb=52]"
  label: Active Management Footprint
  hidden: false
  meta:
    kb_id: 52
- name: growth_value_spectrum_score
  sql: ln(pe_ratio * 1.0 / NULLIF(pb_ratio, 0))
  type: DOUBLE
  primary_key: false
  description: "Growth-Value Spectrum Score (KB 59) = ln(P/E / P/B). Positive = growth\
    \ tilt, negative = value tilt.\n\n[kb=59]\next{GVS Score} = \\ln(\frac{\text{P/E\
    \ Ratio}}{\text{P/B Ratio}}) \u2014 A quantitative factor score that places a\
    \ fund on a spectrum from deep value to high growth based on the interplay of\
    \ its Price-to-Earnings and Price-to-Book ratios.\n[/kb=59]"
  label: Growth-Value Spectrum Score
  hidden: false
  meta:
    kb_id: 59
- name: composite_valuation_score
  sql: 0.25 * ((1.0 / NULLIF(pe_ratio, 0)) + (1.0 / NULLIF(ps_ratio, 0)) + (1.0 /
    NULLIF(pb_ratio, 0)) + (1.0 / NULLIF(pcf_ratio, 0)))
  type: DOUBLE
  primary_key: false
  description: "Composite Valuation Score (KB 51) = average of inverted P/E, P/S,\
    \ P/B, P/CF. Higher = cheaper.\n\n[kb=51]\nCVS = \frac{1}{4} \times (\frac{1}{\t\
    ext{P/E Ratio}} + \frac{1}{\text{P/S Ratio}} + \frac{1}{\text{P/B Ratio}} + \f\
    rac{1}{\text{P/CF Ratio}}) \u2014 Calculates a single score representing a fund's\
    \ valuation attractiveness by averaging the inverted values of its key price-to-metric\
    \ ratios.\n[/kb=51]"
  label: Composite Valuation Score
  hidden: false
  meta:
    kb_id: 51
- name: average_daily_value_traded_3m
  sql: vol3m * ma200
  type: DOUBLE
  primary_key: false
  description: "Average Daily Value Traded over 3 months (KB 76) = Vol_3M * 200-day\
    \ MA price (KB-prescribed proxy for average share price).\n\n[kb=76]\next{ADVT}{3M}\
    \ = \text{Average daily volume (3M)} \times \text{Average share price (e.g., 200-day\
    \ MA)} \u2014 Calculates the average monetary value of a fund's shares traded\
    \ daily over the last 3 months.\n[/kb=76]"
  label: Average Daily Value Traded (3M)
  hidden: false
  meta:
    kb_id: 76
- name: portfolio_liquidity_pressure
  sql: (networth * turnoverratio) * 1.0 / NULLIF(vol3m * ma200 * 252, 0)
  type: DOUBLE
  primary_key: false
  description: "Portfolio Liquidity Pressure (KB 58) = (Net Worth * Turnover Ratio)\
    \ / (Average Daily Volume (3M) * 252). KB defines ADV in shares; using vol3m *\
    \ ma200 to compute dollar ADV.\n\n[kb=58]\nPLP = \frac{\text{Net Worth} \times\
    \ \text{Turnover Ratio}}{\text{Average Daily Volume (3M) } \times 252} \u2014\
    \ Estimates the potential market impact of a fund's trading activity by comparing\
    \ its annual turnover to its average daily trading volume.\n[/kb=58]"
  label: Portfolio Liquidity Pressure
  hidden: false
  meta:
    kb_id: 58
- name: is_valuation_transparent
  sql: pe_ratio IS NOT NULL AND pb_ratio IS NOT NULL
  type: BOOLEAN
  primary_key: false
  description: "Valuation Data Availability (KB 84): TRUE = Transparent (P/E and P/B\
    \ both populated), FALSE = Opaque.\n\n[kb=84]\nA fund is classified as 'Transparent'\
    \ if it provides numeric values for both its P/E and P/B ratios; otherwise, it\
    \ is 'Opaque'. \u2014 A classification that categorizes funds based on whether\
    \ they disclose key valuation metrics.\n[/kb=84]"
  label: Valuation Data Availability
  hidden: false
  meta:
    kb_id: 84
- name: information_ratio_simplified
  sql: (etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)
  type: DOUBLE
  primary_key: false
  description: "Information Ratio Simplified (KB 6) = (3Y fund return - 3Y benchmark\
    \ return) / 3Y volatility.\n\n[kb=6]\nIR = \frac{\text{Fund's 3-year average return}\
    \ - \text{Benchmark's 3-year average return}}{\text{Fund's 3-year volatility}}\
    \ \u2014 Measures a fund's risk-adjusted excess return over its benchmark, using\
    \ volatility as the measure of risk.\n[/kb=6]"
  label: Information Ratio (Simplified)
  hidden: false
  meta:
    kb_id: 6
- name: performance_cost_efficiency_score
  sql: (SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns ar WHERE ar.portfolioref
    = funds.tickersym) * 1.0 / NULLIF(expensenet - benchmarkexp, 0)
  type: DOUBLE
  primary_key: false
  description: "PCES (KB 30) = Annual Fund Outperformance / Relative Expense Ratio.\
    \ Numerator uses average annual outperformance across all years for the fund.\n\
    \n[kb=30]\next{PCES} = \frac{\text{Annual Fund Outperformance}}{\text{Relative\
    \ Expense Ratio}} \u2014 Calculates a fund's efficiency by measuring its annual\
    \ outperformance relative to its cost compared to peers.\n[/kb=30]"
  label: Performance-Cost Efficiency Score
  hidden: false
  meta:
    kb_id: 30
- name: momentum_weighted_price_strength
  sql: (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w - etf_performance.low52w,
    0)) * (1 + (ma50 - ma200) * 1.0 / NULLIF(ma200, 0))
  type: DOUBLE
  primary_key: false
  description: "Momentum-Weighted Price Strength (KB 31) = Price Position * (1 + Momentum/MA200).\n\
    \n[kb=31]\next{MWPS} = \text{Price Position} \times (1 + \frac{\text{Momentum}}{\t\
    ext{200-Day Moving Average}}) \u2014 A composite technical indicator that scores\
    \ a fund based on its current price position, giving more weight to funds with\
    \ stronger upward momentum.\n[/kb=31]"
  label: Momentum-Weighted Price Strength
  hidden: false
  meta:
    kb_id: 31
- name: consistency_adjusted_information_ratio
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * ((etf_performance.positiveyears * 1.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)))
  type: DOUBLE
  primary_key: false
  description: "Consistency-Adjusted Information Ratio (KB 32) = Information Ratio\
    \ * (Positive Return Consistency / 100).\n\n[kb=32]\next{CAIR} = \text{Information\
    \ Ratio} \times \frac{\text{Positive Return Consistency}}{100} \u2014 Refines\
    \ the Information Ratio by factoring in the historical consistency of a fund's\
    \ positive returns.\n[/kb=32]"
  label: Consistency-Adjusted Information Ratio
  hidden: false
  meta:
    kb_id: 32
- name: active_manager_value
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) - (expensenet - benchmarkexp) * 10
  type: DOUBLE
  primary_key: false
  description: "Active Manager Value (KB 34) = Information Ratio - (Relative Expense\
    \ Ratio * 10).\n\n[kb=34]\next{AMV} = \text{Information Ratio} - (\text{Relative\
    \ Expense Ratio} \times 10) \u2014 Quantifies the net value an active manager\
    \ provides by subtracting the fund's relative cost from its demonstrated ability\
    \ to generate risk-adjusted excess returns.\n[/kb=34]"
  label: Active Manager Value
  hidden: false
  meta:
    kb_id: 34
- name: composite_momentum_strength
  sql: (ma50 - ma200) * (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w
    - etf_performance.low52w, 0))
  type: DOUBLE
  primary_key: false
  description: "Composite Momentum Strength (KB 36) = Short-Term Momentum * Price\
    \ Position in 52-Week Range.\n\n[kb=36]\next{CMS} = \text{Short-Term Momentum\
    \ Indicator} \times \text{Price Position in 52-Week Range} \u2014 A score that\
    \ confirms a bullish technical trend by combining a positive momentum signal with\
    \ the fund's price strength.\n[/kb=36]"
  label: Composite Momentum Strength
  hidden: false
  meta:
    kb_id: 36
- name: net_yield_advantage
  sql: yieldrate - (expensenet - benchmarkexp)
  type: DOUBLE
  primary_key: false
  description: "Net Yield Advantage (KB 37) = Yield Rate - Relative Expense Ratio.\n\
    \n[kb=37]\next{NYA} = \text{Yield Rate} - \text{Relative Expense Ratio} \u2014\
    \ Calculates a fund's final yield advantage or disadvantage after accounting for\
    \ its cost relative to peers.\n[/kb=37]"
  label: Net Yield Advantage
  hidden: false
  meta:
    kb_id: 37
- name: risk_return_efficiency_index
  sql: (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)
  type: DOUBLE
  primary_key: false
  description: "Risk-Return Efficiency Index (KB 39) = Return on Cost / 3-Year Volatility.\n\
    \n[kb=39]\next{RREI} = \frac{\text{Return on Cost}}{\text{3-Year Volatility}}\
    \ \u2014 An index that evaluates how effectively a fund translates risk (volatility)\
    \ into returns, adjusted for costs.\n[/kb=39]"
  label: Risk-Return Efficiency Index
  hidden: false
  meta:
    kb_id: 39
- name: momentum_adjusted_information_ratio
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * (1 + (ma50 - ma200) * 1.0 / NULLIF(ma200, 0))
  type: DOUBLE
  primary_key: false
  description: "Momentum-Adjusted Information Ratio (KB 54) = Information Ratio *\
    \ (1 + Momentum / 200-Day MA).\n\n[kb=54]\nMAIR = \text{Information Ratio (Simplified)}\
    \ \times (1 + \frac{\text{Short-Term Momentum Indicator}}{\text{200-Day Moving\
    \ Average}}) \u2014 A dynamic version of the Information Ratio that is enhanced\
    \ by the fund's current price momentum, rewarding funds that are outperforming\
    \ on a risk-adjusted basis and are also in a strong uptrend.\n[/kb=54]"
  label: Momentum-Adjusted Information Ratio
  hidden: false
  meta:
    kb_id: 54
- name: is_closet_indexer
  sql: risk_metrics.rsquared3y > 90 AND (expensenet - benchmarkexp) > 0
  type: BOOLEAN
  primary_key: false
  description: "Closet Indexer (KB 60): Market-Tracking Fund AND positive Relative\
    \ Expense Ratio.\n\n[kb=60]\nA fund is identified as a Closet Indexer if it is\
    \ a 'Market-Tracking Fund' but has a positive 'Relative Expense Ratio'. \u2014\
    \ A fund that is marketed as an active fund and charges higher fees, but its portfolio\
    \ holdings and performance closely track a benchmark index.\n[/kb=60]"
  label: Closet Indexer
  hidden: false
  meta:
    kb_id: 60
- name: is_strategic_beta
  sql: turnoverratio < 0.30 AND (risk_metrics.rsquared3y IS NULL OR risk_metrics.rsquared3y
    <= 90)
  type: BOOLEAN
  primary_key: false
  description: "Strategic Beta Fund (KB 61): Low-Turnover Strategy AND not a Market-Tracking\
    \ Fund.\n\n[kb=61]\nA fund is classified as Strategic Beta if it employs a 'Low-Turnover\
    \ Strategy' but is explicitly not a 'Market-Tracking Fund'. \u2014 An investment\
    \ fund that occupies the middle ground between passive and active management,\
    \ using a rules-based system to target specific factors or market segments beyond\
    \ simple market-cap weighting.\n[/kb=61]"
  label: Strategic Beta Fund
  hidden: false
  meta:
    kb_id: 61
- name: wasted_fee_amount
  sql: CASE WHEN risk_metrics.rsquared3y > 90 AND (expensenet - benchmarkexp) > 0
    THEN (expensenet - benchmarkexp) * networth ELSE NULL END
  type: DOUBLE
  primary_key: false
  description: "Wasted Fee Amount (KB 86) = (Net Expense Ratio - Benchmark Expense\
    \ Ratio) * Net Worth, but only for Closet Indexer funds (per KB definition: 'fees\
    \ paid by investors in a Closet Indexer fund'). NULL otherwise.\n\n[kb=86]\nWFA\
    \ = (\text{Net Expense Ratio} - \text{Benchmark Expense Ratio}) \times \text{Net\
    \ Worth} \u2014 The total dollar amount of fees paid by investors in a Closet\
    \ Indexer fund that are in excess of the benchmark's expense ratio.\n[/kb=86]"
  label: Wasted Fee Amount
  hidden: false
  meta:
    kb_id: 86
- name: is_global_alpha_specialist
  sql: risk_metrics.alpha5y > 0 AND UPPER(TRIM(geozone)) NOT IN ('UNITED_STATES',
    'US', 'USA', 'U.S.', 'U.S.A.', 'AMERICA', 'UNITED STATES')
  type: BOOLEAN
  primary_key: false
  description: "Global Alpha Specialist (KB 48): Alpha Generator AND geozone is anything\
    \ other than 'UNITED_STATES' or 'US' (case/whitespace tolerant; geozone is messy).\n\
    \n[kb=48]\nA fund is a Global Alpha Specialist if it is an 'Alpha Generator' and\
    \ its 'Geographic Focus' is anything other than 'UNITED_STATES' or 'US'. \u2014\
    \ An investment fund that specializes in a non-US market and has demonstrated\
    \ a skillful ability to outperform its relevant benchmark.\n[/kb=48]"
  label: Global Alpha Specialist
  hidden: false
  meta:
    kb_id: 48
- name: is_high_cost_underperformer
  sql: (expensenet - benchmarkexp) > 0 AND (SELECT (ar.fundperf - ar.categoryperf)
    FROM annual_returns ar WHERE ar.portfolioref = funds.tickersym AND ar.fundperf
