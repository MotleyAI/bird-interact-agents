  description: "Bond fund duration (KB 25): years; 1% rate move ~= duration % price\
    \ move.\n\n[kb=25]\nMeasures how much a bond fund's price is likely to change\
    \ for every 1% change in interest rates. A duration of 7 years means the fund's\
    \ price will likely fall by about 7% if interest rates rise by 1%. \u2014 Illustrates\
    \ a bond fund's interest rate sensitivity (Duration).\n[/kb=25]"
  label: Duration
  hidden: false
