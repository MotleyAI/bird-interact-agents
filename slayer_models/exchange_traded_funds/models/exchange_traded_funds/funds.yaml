  label: Passive Alpha Generator
  hidden: false
  meta:
    kb_id: 16
- name: is_elite_active_manager
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80 AND etf_performance.topweight > 0.08
  type: BOOLEAN
  primary_key: false
  description: "Elite Active Manager (KB 40): Consistent Outperformer AND High-Conviction\
    \ Portfolio.\n\n[kb=40]\nA fund is run by an Elite Active Manager if it qualifies\
    \ as a 'Consistent Outperformer' and maintains a 'High-Conviction Portfolio'.\
    \ \u2014 Identifies a top-tier fund manager who generates consistent, risk-adjusted\
    \ outperformance through a high-conviction, concentrated portfolio.\n[/kb=40]"
  label: Elite Active Manager
  hidden: false
  meta:
    kb_id: 40
- name: is_ideal_index_fund
  sql: risk_metrics.rsquared3y > 90 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp)
