    \ more expensive than its peers and has failed to outperform its category, representing\
    \ poor value for investors.\n[/kb=49]"
  label: High-Cost Underperformer
  hidden: false
  meta:
    kb_id: 49
- name: is_focused_alpha_leader
  sql: risk_metrics.alpha5y > 0 AND etf_performance.topweight > 0.08
  type: BOOLEAN
  primary_key: false
  description: "Focused Alpha Leader (KB 45): Alpha Generator AND High-Conviction\
    \ Portfolio.\n\n[kb=45]\nA fund is a Focused Alpha Leader if it is classified\
    \ as both an 'Alpha Generator' and a 'High-Conviction Portfolio'. \u2014 An actively\
    \ managed fund that successfully generates excess returns by taking concentrated\
    \ bets on its best ideas.\n[/kb=45]"
  label: Focused Alpha Leader
  hidden: false
  meta:
    kb_id: 45
- name: is_consistent_outperformer
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80
  type: BOOLEAN
  primary_key: false
  description: "Consistent Outperformer (KB 15): Alpha Generator AND Positive Return\
