  description: "Annual dividend yield (KB 20). Decimal share of share price; 0.02\
    \ = 2% yield.\n\n[kb=20]\nRepresents the annual dividend per share as a percentage\
    \ of the share's price. A value of 0.02 signifies a 2% yield. This is a crucial\
    \ metric for income-focused investors. \u2014 Illustrates the fund's annual dividend\
    \ yield.\n[/kb=20]"
  label: Yield Rate
  hidden: false
