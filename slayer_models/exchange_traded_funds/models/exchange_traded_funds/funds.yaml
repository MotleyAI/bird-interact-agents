  hidden: false
  meta:
    kb_id: 15
- name: is_passive_alpha_generator
  sql: risk_metrics.rsquared3y > 90 AND risk_metrics.alpha5y > 0
  type: BOOLEAN
  primary_key: false
  description: "Passive Alpha Generator (KB 16): Market-Tracking Fund AND Alpha Generator.\n\
    \n[kb=16]\nA fund is a Passive Alpha Generator if it is both a 'Market-Tracking\
