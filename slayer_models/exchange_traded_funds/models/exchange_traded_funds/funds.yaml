    \ equities (stocks). A value of 0.9 indicates that 90% of the fund is invested\
    \ in stocks, suggesting a growth-oriented strategy. \u2014 Illustrates the fund's\
    \ allocation to stocks.\n[/kb=27]"
  label: Equity Weight
  hidden: false
  format:
    type: integer
