    \ recovery.\n[/kb=69]"
  label: Speculative Turnaround Play
  hidden: false
  meta:
    kb_id: 69
- name: cost_adjusted_annual_outperformance_note
  sql: '''see annual_returns.annual_fund_outperformance + funds.relative_expense_ratio'''
  type: TEXT
  primary_key: false
  description: "Cost-Adjusted Annual Outperformance (KB 8): KB defines this as a qualitative\
    \ *combination* of 'Annual Fund Outperformance' and 'Relative Expense Ratio' (no\
    \ formula). At query time, use both metrics together. This stub column carries\
    \ the KB id for traceability.\n\n[kb=8]\nA fund's performance is adjusted by combining\
    \ its 'Annual Fund Outperformance' with its 'Relative Expense Ratio'. A higher\
    \ positive outperformance and a lower (negative) relative expense are desirable.\
    \ \u2014 Evaluates a fund's performance by considering both its excess return\
    \ over its category and its cost relative to its benchmark.\n[/kb=8]"
  label: Cost-Adjusted Annual Outperformance
  hidden: true
  meta:
    kb_id: 8
- name: holistic_outperformance_metric
  sql: ((SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns ar WHERE ar.portfolioref
    = funds.tickersym) + ((SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns
    ar WHERE ar.portfolioref = funds.tickersym) + (expensenet - benchmarkexp))) /
    2.0
  type: DOUBLE
  primary_key: false
  description: "Holistic Outperformance Metric (KB 38) = (Annual Fund Outperformance\
    \ + Cost-Adjusted Annual Outperformance) / 2. KB 8 defines 'cost-adjusted' as\
    \ Annual Outperformance + Relative Expense Ratio (a qualitative combination);\
    \ using sum here as the most natural numeric reading.\n\n[kb=38]\next{HOM} = \f\
    rac{\text{Annual Fund Outperformance} + \text{Cost-Adjusted Annual Outperformance}}{2}\
    \ \u2014 A comprehensive metric that blends a fund's raw outperformance with its\
    \ risk-adjusted, cost-adjusted performance.\n[/kb=38]"
  label: Holistic Outperformance Metric
  hidden: false
  meta:
    kb_id: 38
- name: high_quality_credit_share
  sql: (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa') THEN
    ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM bond_allocations
    ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink = funds.tickersym)
  type: DOUBLE
  primary_key: false
  description: Share of fund's bond holdings rated US-government / AAA / AA. Used
    by KB 19 High-Quality Credit Portfolio.
  hidden: false
- name: is_high_quality_credit_portfolio
  sql: (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa') THEN
    ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM bond_allocations
    ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink = funds.tickersym)
    > 0.60
  type: BOOLEAN
  primary_key: false
  description: "High-Quality Credit Portfolio (KB 19): >60% of bond holdings are government\
    \ / AAA / AA.\n\n[kb=19]\nA fund is defined as having a High-Quality Credit Portfolio\
    \ if the sum of its allocations to government, AAA, and AA rated bonds exceeds\
    \ 60% of its total bond holdings. \u2014 A bond fund that primarily holds securities\
    \ with very low credit risk.\n[/kb=19]"
  label: High-Quality Credit Portfolio
  hidden: false
  meta:
    kb_id: 19
- name: is_premier_income_fund
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) > 15 AND (SELECT SUM(CASE WHEN br.creditmark
    IN ('us_government', 'aaa', 'aa') THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct),
    0) FROM bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey
    WHERE ba.fundlink = funds.tickersym) > 0.60
  type: BOOLEAN
  primary_key: false
  description: "Premier Income Fund (KB 42): Efficient Income Generator AND High-Quality\
    \ Credit Portfolio.\n\n[kb=42]\nA fund is a Premier Income Fund if it is both\
    \ an 'Efficient Income Generator' and has a 'High-Quality Credit Portfolio'. \u2014\
    \ Identifies a superior income-focused fund that is not only efficient in generating\
    \ yield but also prioritizes the safety of its underlying bond holdings.\n[/kb=42]"
  label: Premier Income Fund
  hidden: false
  meta:
    kb_id: 42
- name: quality_income_score
  sql: CASE WHEN (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa')
    THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM
    bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink
    = funds.tickersym) > 0.60 THEN (yieldrate * 1.0 / NULLIF(expensenet, 0)) ELSE
    NULL END
  type: DOUBLE
  primary_key: false
  description: "Quality-Income Score (KB 35): Yield-to-Expense Ratio if fund qualifies\
    \ as High-Quality Credit Portfolio, else NULL.\n\n[kb=35]\nThis score is the 'Yield-to-Expense\
    \ Ratio' for a fund, but only applies if the fund also qualifies as a 'High-Quality\
    \ Credit Portfolio'. \u2014 A metric that assesses income-generating funds on\
    \ both the efficiency and the credit quality of their yield.\n[/kb=35]"
  label: Quality-Income Score
  hidden: false
  meta:
    kb_id: 35
- name: secure_income_efficiency_score
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) * (SELECT SUM(CASE WHEN br.creditmark
    IN ('us_government', 'aaa', 'aa') THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct),
    0) FROM bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey
    WHERE ba.fundlink = funds.tickersym)
  type: DOUBLE
  primary_key: false
  description: "Secure Income Efficiency Score (KB 55) = Yield-to-Expense Ratio *\
    \ Allocation to High-Quality Credit.\n\n[kb=55]\nSIES = \text{Yield-to-Expense\
    \ Ratio} \times (\text{Allocation to High-Quality Credit}) \u2014 A composite\
    \ score for income funds that measures yield-generating efficiency while heavily\
    \ weighting for the credit safety of the underlying assets.\n[/kb=55]"
  label: Secure Income Efficiency Score
  hidden: false
  meta:
    kb_id: 55
- name: is_contrarian_value_play
  sql: (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w - etf_performance.low52w,
    0)) < 25 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp) < 0
  type: BOOLEAN
  primary_key: false
  description: "Contrarian Value Play (KB 47): Price Position < 25% AND Low-Turnover\
    \ Strategy AND negative Relative Expense Ratio.\n\n[kb=47]\nA fund is a Contrarian\
    \ Value Play if its Price Position in 52-Week Range is below 25%, it follows a\
    \ Low-Turnover Strategy, and its Relative Expense Ratio is negative. \u2014 A\
    \ fund that is currently out of favor with the market but is managed with a patient,\
    \ low-cost, long-term strategy, making it a potential value investment.\n[/kb=47]"
  label: Contrarian Value Play
  hidden: false
  meta:
    kb_id: 47
- name: is_efficient_core_holding
  sql: risk_metrics.rsquared3y > 90 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp)
    < 0 AND (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) > 50
  type: BOOLEAN
  primary_key: false
  description: "Efficient Core Holding (KB 65): Ideal Index Fund AND high Return on\
    \ Cost. KB doesn't pin 'high'; using ROC > 50 as a heuristic.\n\n[kb=65]\nA fund\
    \ is an Efficient Core Holding if it qualifies as an 'Ideal Index Fund' and also\
    \ exhibits a high 'Return on Cost (ROC)'. \u2014 An ideal fund for the core of\
    \ a portfolio, characterized by extremely low costs, tight benchmark tracking,\
    \ and proven efficiency in translating assets into returns.\n[/kb=65]"
  label: Efficient Core Holding
  hidden: false
  meta:
    kb_id: 65
- name: is_momentum_driven_growth_fund
  sql: ln(pe_ratio * 1.0 / NULLIF(pb_ratio, 0)) > 0 AND (ma50 - ma200) > 0
  type: BOOLEAN
  primary_key: false
  description: "Momentum-Driven Growth Fund (KB 66): GVS > 0 (growth tilt) AND Golden\
    \ Cross Signal.\n\n[kb=66]\nA fund is a Momentum-Driven Growth Fund if its 'Growth-Value\
    \ Spectrum Score' indicates a growth tilt and it is also currently signaling a\
    \ 'Golden Cross Signal'. \u2014 A fund that specifically targets high-growth companies\
    \ that are also exhibiting strong, positive price momentum in the market.\n[/kb=66]"
  label: Momentum-Driven Growth Fund
  hidden: false
  meta:
    kb_id: 66
- name: is_true_active_differentiator
  sql: ((1 - risk_metrics.rsquared3y / 100.0) * 1.0 / NULLIF(turnoverratio, 0)) >
    0.5 AND (risk_metrics.alpha3y * 1.0 / NULLIF(risk_metrics.volatility3y * sqrt(1
    - risk_metrics.rsquared3y / 100.0), 0)) > 0.2 AND etf_performance.topweight >
    0.08
  type: BOOLEAN
  primary_key: false
  description: "True Active Differentiator (KB 68): AMF > 0.5 AND Appraisal Ratio\
    \ > 0.2 AND High-Conviction Portfolio.\n\n[kb=68]\nA fund is a True Active Differentiator\
    \ if it has 'Active Management Footprint' > 0.5, 'Appraisal Ratio' > 0.2, and\
    \ is also a 'High-Conviction Portfolio'. \u2014 A fund that demonstrates genuine\
    \ active management through significant deviation from its benchmark, skilled\
    \ stock selection, and a high-conviction approach.\n[/kb=68]"
  label: True Active Differentiator
  hidden: false
  meta:
    kb_id: 68
- name: total_value_score
  sql: CASE WHEN (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) * ((etf_performance.r3y
    - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y, 0)) * (etf_performance.positiveyears
    * 100.0 / NULLIF(etf_performance.positiveyears + etf_performance.negativeyears,
    0)) IS NULL THEN NULL ELSE pow(ABS((etf_performance.r1y * 1.0 / NULLIF(expensenet,
    0)) * ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0))), 1.0/3.0) * CASE WHEN (etf_performance.r1y
    * 1.0 / NULLIF(expensenet, 0)) * ((etf_performance.r3y - etf_performance.benchr3y)
    * 1.0 / NULLIF(risk_metrics.volatility3y, 0)) * (etf_performance.positiveyears
    * 100.0 / NULLIF(etf_performance.positiveyears + etf_performance.negativeyears,
    0)) < 0 THEN -1 ELSE 1 END END
  type: DOUBLE
  primary_key: false
  description: "Total Value Score (KB 33) = cube_root(Return on Cost * Information\
    \ Ratio * Positive Return Consistency). Sign-preserving via |x|^(1/3) * sign(x).\n\
    \n[kb=33]\next{TVS} = \\sqrt[3]{\text{Return on Cost} \times \text{Information\
    \ Ratio} \times \text{Positive Return Consistency}} \u2014 A holistic performance\
    \ score combining risk-adjusted returns, cost-efficiency, and historical consistency.\n\
    [/kb=33]"
  label: Total Value Score
  hidden: false
  meta:
    kb_id: 33
- name: is_reliable_core_holding
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80 AND equityweight IS NOT NULL AND equityweight
    > 0 AND yieldrate IS NOT NULL AND yieldrate > 0
  type: BOOLEAN
  primary_key: false
  description: "Reliable Core Holding (KB 46): Consistent Outperformer AND Total Return\
    \ Fund.\n\n[kb=46]\nA fund is a Reliable Core Holding if it is a 'Consistent Outperformer'\
    \ and is also structured as a 'Total Return Fund'. \u2014 Identifies a fund suitable\
    \ as a core portfolio holding due to its history of steady returns and its balanced\
    \ approach to providing both growth and income.\n[/kb=46]"
  label: Reliable Core Holding
  hidden: false
  meta:
    kb_id: 46
- name: category_average_duration
  sql: (SELECT AVG(f2.duration) FROM funds f2 WHERE f2.productclass = funds.productclass
    AND f2.duration IS NOT NULL)
  type: DOUBLE
  primary_key: false
  description: "Category Average Duration (KB 71): mean of duration across funds in\
    \ the same productclass.\n\n[kb=71]\n\bar{D}c = \frac{\\sum \text{Fund Durations}}{\t\
    ext{Total number of funds}} \text{ for a given category.} \u2014 Calculates the\
    \ average duration for all funds within the same investment category.\n[/kb=71]"
  label: Category Average Duration
  hidden: false
  meta:
    kb_id: 71
- name: duration_advantage
  sql: (SELECT AVG(f2.duration) FROM funds f2 WHERE f2.productclass = funds.productclass
    AND f2.duration IS NOT NULL) - duration
  type: DOUBLE
  primary_key: false
  description: "Duration Advantage (KB 72) = Category Average Duration - Fund Duration.\
    \ Positive = lower duration than peers.\n\n[kb=72]\nD{\text{adv}} = \text{Category\
    \ Average Duration} - \text{Fund's Duration} \u2014 Measures how much lower a\
    \ fund's duration is compared to its category average.\n[/kb=72]"
  label: Duration Advantage
  hidden: false
  meta:
    kb_id: 72
- name: cvs_percentile_rank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY 0.25 * (COALESCE(1.0
    / NULLIF(pe_ratio, 0), 0) + COALESCE(1.0 / NULLIF(ps_ratio, 0), 0) + COALESCE(1.0
    / NULLIF(pb_ratio, 0), 0) + COALESCE(1.0 / NULLIF(pcf_ratio, 0), 0)))
  type: DOUBLE
  primary_key: false
  description: Percentile rank of Composite Valuation Score within productclass (0=lowest
    CVS, 1=highest). Used by KB 63 Q-GARP and KB 64 High-Conviction Value Investor.
  hidden: false
- name: alpha5y_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT alpha5y FROM
    risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
  type: DOUBLE
  primary_key: false
  description: Percentile rank of fund's 5Y Alpha within its productclass.
  hidden: false
- name: sharpe3y_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT sharperatio3y
    FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
  type: DOUBLE
  primary_key: false
  description: Percentile rank of fund's 3Y Sharpe within its productclass.
  hidden: false
- name: inverse_expense_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY -expensenet)
  type: DOUBLE
  primary_key: false
  description: Percentile rank of fund's inverse net expense (i.e., cheapness) within
    its productclass.
  hidden: false
- name: composite_score
  sql: (PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT alpha5y FROM
    risk_metrics WHERE risk_metrics.investmentref = funds.tickersym)) + PERCENT_RANK()
    OVER (PARTITION BY productclass ORDER BY (SELECT sharperatio3y FROM risk_metrics
    WHERE risk_metrics.investmentref = funds.tickersym)) + PERCENT_RANK() OVER (PARTITION
    BY productclass ORDER BY -expensenet)) / 3.0
  type: DOUBLE
  primary_key: false
  description: "Composite Score (KB 80) = average percentile rank of (5Y Alpha, 3Y\
    \ Sharpe, Inverse Net Expense) within productclass.\n\n[kb=80]\next{Score} = \f\
    rac{\text{Percentile Rank}(\text{5Y Alpha}) + \text{Percentile Rank}(\text{3Y\
    \ Sharpe}) + \text{Percentile Rank}(\text{Inverse Net Expense})}{3} \u2014 A normalized\
    \ score that averages a fund's percentile rank across multiple key performance\
    \ and cost metrics, allowing for peer-group comparison.\n[/kb=80]"
  label: Composite Score
  hidden: false
  meta:
    kb_id: 80
- name: is_fallen_angel
  sql: (SELECT alpha5y FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym)
    > 0 AND ((SELECT positiveyears FROM performance WHERE performance.productref =
    funds.tickersym) * 100.0 / NULLIF((SELECT positiveyears FROM performance WHERE
    performance.productref = funds.tickersym) + (SELECT negativeyears FROM performance
    WHERE performance.productref = funds.tickersym), 0)) > 80 AND (SELECT alpha3y
    FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym) < 0
  type: BOOLEAN
  primary_key: false
  description: "Fallen Angel (KB 62): a fund that was previously a Consistent Outperformer\
    \ (Alpha Generator AND Positive Return Consistency > 80) but whose most recent\
    \ 3-year alpha is now negative.\n\n[kb=62]\nA fund is a Fallen Angel if it was\
    \ previously considered a 'Consistent Outperformer' but its most recent 3-year\
    \ alpha is now negative. \u2014 A once highly-regarded fund that has seen a significant\
    \ decline in its performance and ability to generate alpha.\n[/kb=62]"
  label: Fallen Angel
  hidden: false
  meta:
    kb_id: 62
- name: is_q_garp
  sql: (SELECT alpha5y FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym)
    > 0 AND ((SELECT positiveyears FROM performance WHERE performance.productref =
    funds.tickersym) * 100.0 / NULLIF((SELECT positiveyears FROM performance WHERE
    performance.productref = funds.tickersym) + (SELECT negativeyears FROM performance
    WHERE performance.productref = funds.tickersym), 0)) > 80 AND (SELECT cvs_pr FROM
    (SELECT tickersym AS t, PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY
    0.25 * (COALESCE(1.0 / NULLIF(pe_ratio, 0), 0) + COALESCE(1.0 / NULLIF(ps_ratio,
    0), 0) + COALESCE(1.0 / NULLIF(pb_ratio, 0), 0) + COALESCE(1.0 / NULLIF(pcf_ratio,
    0), 0))) AS cvs_pr FROM funds) sub WHERE sub.t = funds.tickersym) >= 0.5
  type: BOOLEAN
  primary_key: false
  description: "Quality-Growth at a Reasonable Price / Q-GARP (KB 63): Consistent\
    \ Outperformer (Alpha Generator AND Positive Return Consistency > 80) AND Composite\
    \ Valuation Score in the top 50th percentile of its category (productclass).\n\
    \n[kb=63]\nA fund follows a Q-GARP strategy if it is a 'Consistent Outperformer'\
    \ and has a 'Composite Valuation Score' in the top 50th percentile of its category.\
    \ \u2014 An investment style that seeks to own high-quality, growing companies\
    \ without overpaying. These funds blend quality, growth, and value characteristics.\n\
    [/kb=63]"
  label: Quality-Growth at a Reasonable Price (Q-GARP)
  hidden: false
  meta:
    kb_id: 63
- name: is_high_conviction_value_investor
  sql: (SELECT topweight FROM performance WHERE performance.productref = funds.tickersym)
    > 0.08 AND (SELECT cvs_pr FROM (SELECT tickersym AS t, PERCENT_RANK() OVER (PARTITION
    BY productclass ORDER BY 0.25 * (COALESCE(1.0 / NULLIF(pe_ratio, 0), 0) + COALESCE(1.0
    / NULLIF(ps_ratio, 0), 0) + COALESCE(1.0 / NULLIF(pb_ratio, 0), 0) + COALESCE(1.0
    / NULLIF(pcf_ratio, 0), 0))) AS cvs_pr FROM funds) sub WHERE sub.t = funds.tickersym)
    >= 0.75
  type: BOOLEAN
  primary_key: false
  description: "High-Conviction Value Investor (KB 64): High-Conviction Portfolio\
    \ (largest holding > 8%) AND Composite Valuation Score in the top 25th percentile\
    \ of its category.\n\n[kb=64]\nA fund is a High-Conviction Value Investor if it\
    \ is a 'High-Conviction Portfolio' and has a 'Composite Valuation Score' in the\
    \ top 25th percentile of its category. \u2014 A fund manager who adheres to a\
    \ strict value discipline, evidenced by attractive valuation metrics, while taking\
    \ large, concentrated positions in their best ideas.\n[/kb=64]"
  label: High-Conviction Value Investor
  hidden: false
  meta:
    kb_id: 64
- name: category_fund_count
  sql: (SELECT COUNT(*) FROM funds f2 WHERE f2.productclass = funds.productclass)
  type: DOUBLE
  primary_key: false
  description: "Number of funds in the same investment category (productclass). Used\
    \ by KB 81 Category Dominator (requires category contains at least 10 funds).\n\
    \n[kb=81]\nThe fund with the highest 'Composite Score' within its investment category,\
    \ provided the category contains at least 10 funds. \u2014 Identifies the single\
    \ best-performing fund within an investment category based on a multi-factor composite\
    \ score.\n[/kb=81]"
  label: Category Dominator
  hidden: false
  meta:
    kb_id: 81
- name: is_category_dominator
  sql: (SELECT COUNT(*) FROM funds f2 WHERE f2.productclass = funds.productclass)
    >= 10 AND (SELECT cs FROM (SELECT tickersym AS t, (PERCENT_RANK() OVER (PARTITION
    BY productclass ORDER BY (SELECT alpha5y FROM risk_metrics WHERE risk_metrics.investmentref
    = funds.tickersym)) + PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY
    (SELECT sharperatio3y FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
    + PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY -expensenet)) / 3.0
    AS cs FROM funds) sub WHERE sub.t = funds.tickersym) = (SELECT MAX(cs) FROM (SELECT
    tickersym AS t, productclass AS pc, (PERCENT_RANK() OVER (PARTITION BY productclass
    ORDER BY (SELECT alpha5y FROM risk_metrics WHERE risk_metrics.investmentref =
    funds.tickersym)) + PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT
    sharperatio3y FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
    + PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY -expensenet)) / 3.0
    AS cs FROM funds) sub2 WHERE sub2.pc = funds.productclass)
  type: BOOLEAN
  primary_key: false
  description: "Category Dominator (KB 81): the fund with the highest Composite Score\
    \ within its investment category, provided the category contains at least 10 funds.\n\
    \n[kb=81]\nThe fund with the highest 'Composite Score' within its investment category,\
    \ provided the category contains at least 10 funds. \u2014 Identifies the single\
    \ best-performing fund within an investment category based on a multi-factor composite\
    \ score.\n[/kb=81]"
  label: Category Dominator
  hidden: false
  meta:
    kb_id: 81
- name: alpha3y_for_regression
  sql: (SELECT alpha3y FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym)
  type: DOUBLE
  primary_key: false
  description: 3-Year Alpha pulled inline from risk_metrics, used as the Y variable
    for the Alpha-Turnover Slope (KB 82) and Fit Quality (KB 83) ModelMeasures. Helper
    / data carrier; the kb_ids live on the measures that operationalize the regression.
  hidden: false
  meta: {}
measures:
- formula: alpha3y_for_regression:covar_samp(other=turnoverratio) / turnoverratio:var_samp
  name: alpha_turnover_slope
  label: Alpha-Turnover Slope
  description: "[kb=82]\n\beta_{\\alpha, T} = \text{Slope of regression}(\text{3-Year\
    \ Alpha}, \text{Turnover Ratio}) \u2014 Calculates the slope of the linear regression\
    \ line between a fund's alpha (dependent variable, Y) and its turnover ratio (independent\
    \ variable, X).\n[/kb=82]"
  meta:
    kb_id: 82
- formula: alpha3y_for_regression:corr(other=turnoverratio) * alpha3y_for_regression:corr(other=turnoverratio)
  name: alpha_turnover_fit_quality
  label: Fit Quality
  description: "[kb=83]\nR^2 = \text{R-squared of regression}(\text{3-Year Alpha},\
    \ \text{Turnover Ratio}) \u2014 Measures how well the turnover ratio explains\
    \ the variation in alpha in the regression model.\n[/kb=83]"
  meta:
    kb_id: 83
