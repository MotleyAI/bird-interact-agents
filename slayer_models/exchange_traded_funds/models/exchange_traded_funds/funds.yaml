- name: turnoverratio
  sql: turnoverratio
  type: INT
  primary_key: false
  description: "Annual portfolio turnover ratio (KB 21). 1.0 = full replacement once\
    \ a year; <0.3 buy-and-hold; >1.0 active trading.\n\n[kb=21]\nMeasures how frequently\
    \ assets within a fund are bought and sold. A ratio of 1.0 (100%) means the fund\
    \ replaces its entire portfolio once per year. A low value (<0.3) suggests a buy-and-hold\
    \ strategy, while a high value (>1.0) indicates active trading. \u2014 Illustrates\
    \ the fund's portfolio turnover.\n[/kb=21]"
  label: Turnover Ratio
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 21
- name: strategynotes
  sql: strategynotes
  type: TEXT
  primary_key: false
  hidden: false
- name: expensenet
  sql: expensenet
  type: INT
  primary_key: false
  description: "Net expense ratio (KB 26): annual fee as fraction of assets; 0.005\
    \ = 0.5%.\n\n[kb=26]\nThe annual fee charged to investors as a percentage of assets.\
    \ A value of 0.005 corresponds to a 0.5% annual fee. Lower is generally better,\
    \ as costs directly reduce returns. \u2014 Illustrates the fund's net annual cost\
    \ (Expense Ratio).\n[/kb=26]"
  label: Net Expense Ratio
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 26
