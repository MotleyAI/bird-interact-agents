  hidden: false
  meta:
    kb_id: 13
- name: pricerange52w
  sql: pricerange52w
  type: string
  primary_key: false
  hidden: false
- name: returnmetrics
  sql: returnmetrics
  type: string
  primary_key: false
  hidden: false
- name: histstats
  sql: histstats
  type: string
  primary_key: false
  hidden: false
- name: is_high_conviction_portfolio
  sql: topweight > 0.08
  type: boolean
  primary_key: false
  description: 'High-Conviction Portfolio (KB 13): largest holding weight > 8%.'
  hidden: false
  meta:
    kb_id: 13
- name: price_position_52w
  sql: lowdelta * 100.0 / NULLIF(high52w - low52w, 0)
  type: number
  primary_key: false
  description: Price Position in 52-Week Range (KB 4) = (recent_price - low52w) /
    (high52w - low52w) * 100. lowdelta = recent_price - low52w.
  hidden: false
  meta:
    kb_id: 4
- name: recent_price
  sql: low52w + lowdelta
  type: number
  primary_key: false
  description: Reconstructed recent (current) price = low52w + lowdelta. Used by KB
    57 Capital Preservation Index.
  hidden: false
- name: positive_return_consistency
  sql: positiveyears * 100.0 / NULLIF(positiveyears + negativeyears, 0)
  type: number
  primary_key: false
  description: Positive Return Consistency (KB 7) = positiveyears / (positiveyears
    + negativeyears) * 100.
  hidden: false
  meta:
    kb_id: 7
- name: capital_preservation_index
  sql: (1.0 / (1 + COALESCE(negativeyears, 0))) * (1 - (low52w - (low52w + lowdelta))
    * 1.0 / NULLIF(low52w, 0))
  type: number
  primary_key: false
  description: Capital Preservation Index (KB 57) = (1/(1+Negative Years)) * (1 -
    (52-Week Low - Current Price)/52-Week Low). Current price = low52w + lowdelta.
  hidden: false
  meta:
    kb_id: 57
measures: []
aggregations: []
joins:
- target_model: funds
  join_pairs:
  - - productref
    - tickersym
  join_type: left
filters: []
description: Per-fund performance snapshot (1:1 to funds via productref). Holds 52-week
  price range, returns over 1M / 3M / 1Y / 3Y / 5Y / 10Y vs benchmark, year-counts
  (positive/negative).
hidden: false
