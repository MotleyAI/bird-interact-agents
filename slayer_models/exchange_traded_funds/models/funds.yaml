description: 'Exchange-traded fund (ETF) reference data: one row per fund (PK=productnum,
  business key tickersym). Holds basic identification, family/category/exchange relationships,
  asset-mix metrics (equityweight, bondweight), valuation ratios (pe_ratio, pb_ratio,
  ps_ratio, pcf_ratio), expense ratios (expensenet, benchmarkexp), yield, turnover,
  technical price levels (ma50, ma200) and 3-month volume.'
