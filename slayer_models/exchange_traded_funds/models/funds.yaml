  sql: parentgroup
  type: string
  primary_key: false
  hidden: false
- name: listingvenue
  sql: listingvenue
  type: string
  primary_key: false
  hidden: false
- name: productclass
  sql: productclass
  type: string
  primary_key: false
  hidden: false
- name: networth
  sql: networth
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: yieldrate
  sql: yieldrate
  type: number
  primary_key: false
  description: Annual dividend yield (KB 20). Decimal share of share price; 0.02 =
    2% yield.
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 20
- name: launchdate
  sql: launchdate
  type: string
  primary_key: false
  hidden: false
- name: turnoverratio
  sql: turnoverratio
  type: number
  primary_key: false
  description: Annual portfolio turnover ratio (KB 21). 1.0 = full replacement once
    a year; <0.3 buy-and-hold; >1.0 active trading.
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 21
- name: strategynotes
  sql: strategynotes
  type: string
  primary_key: false
  hidden: false
- name: expensenet
  sql: expensenet
  type: number
  primary_key: false
  description: 'Net expense ratio (KB 26): annual fee as fraction of assets; 0.005
    = 0.5%.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 26
- name: benchmarkexp
  sql: benchmarkexp
  type: number
  primary_key: false
  description: Benchmark / category-average expense ratio for comparison.
  hidden: false
  format:
    type: integer
- name: vol3m
  sql: vol3m
  type: number
  primary_key: false
  description: Average daily trading volume over the past 3 months (KB 76).
  hidden: false
  format:
    type: integer
- name: volrecent
  sql: volrecent
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: ma50
  sql: ma50
  type: number
  primary_key: false
  description: 50-day moving-average price (used by KB 5 momentum).
  hidden: false
  format:
    type: integer
- name: ma200
  sql: ma200
  type: number
  primary_key: false
  description: 200-day moving-average price (used by KB 5 momentum and KB 76 ADVT).
  hidden: false
  format:
    type: integer
- name: equityweight
  sql: equityweight
  type: number
  primary_key: false
  description: 'Equity Weight (KB 27): fraction of fund assets in equity (stocks).
    0.9 = 90% stocks.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 27
- name: bondweight
  sql: bondweight
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: pb_ratio
  sql: pb_ratio
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: pcf_ratio
  sql: pcf_ratio
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: pe_ratio
  sql: pe_ratio
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: ps_ratio
  sql: ps_ratio
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: avgmaturity
  sql: avgmaturity
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: duration
  sql: duration
  type: number
  primary_key: false
  description: 'Bond fund duration (KB 25): years; 1% rate move ~= duration % price
    move.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 25
- name: fundclass
  sql: fundclass
  type: string
  primary_key: false
  hidden: false
- name: fundmetrics
  sql: fundmetrics
  type: string
  primary_key: false
  hidden: false
- name: tradingdata
  sql: tradingdata
  type: string
  primary_key: false
  hidden: false
- name: allocweights
  sql: allocweights
  type: string
  primary_key: false
  hidden: false
- name: valuationratios
  sql: valuationratios
  type: string
  primary_key: false
  hidden: false
- name: relative_expense_ratio
  sql: expensenet - benchmarkexp
  type: number
  primary_key: false
  description: Relative Expense Ratio (KB 1) = net expense ratio - benchmark expense
    ratio. Negative = cheaper than benchmark.
  hidden: false
  meta:
    kb_id: 1
- name: return_on_cost
  sql: etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)
  type: number
  primary_key: false
  description: Return on Cost (KB 2) = fund 1-year return / net expense ratio.
  hidden: false
  meta:
    kb_id: 2
- name: yield_to_expense_ratio
  sql: yieldrate * 1.0 / NULLIF(expensenet, 0)
  type: number
  primary_key: false
  description: Yield-to-Expense Ratio (KB 3) = fund yield / net expense ratio.
  hidden: false
  meta:
    kb_id: 3
- name: short_term_momentum
  sql: ma50 - ma200
  type: number
  primary_key: false
  description: Short-Term Momentum Indicator (KB 5) = 50-day MA - 200-day MA.
  hidden: false
  meta:
    kb_id: 5
- name: is_total_return_fund
  sql: equityweight IS NOT NULL AND equityweight > 0 AND yieldrate IS NOT NULL AND
    yieldrate > 0
  type: boolean
  primary_key: false
  description: 'Total Return Fund (KB 9): non-zero equity allocation AND non-zero
    dividend yield.'
  hidden: false
  meta:
    kb_id: 9
- name: is_low_turnover_strategy
  sql: turnoverratio < 0.30
  type: boolean
  primary_key: false
  description: 'Low-Turnover Strategy (KB 12): turnoverratio < 30%.'
  hidden: false
  meta:
    kb_id: 12
- name: is_efficient_income_generator
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) > 15
  type: boolean
  primary_key: false
  description: 'Efficient Income Generator (KB 14): YTER > 15.'
  hidden: false
  meta:
    kb_id: 14
- name: is_golden_cross
  sql: (ma50 - ma200) > 0
  type: boolean
  primary_key: false
  description: 'Golden Cross Signal (KB 17): short-term momentum > 0.'
  hidden: false
  meta:
    kb_id: 17
- name: is_high_fee_strategic_bet
  sql: (expensenet - benchmarkexp) > 0 AND (risk_metrics.rsquared3y IS NULL OR risk_metrics.rsquared3y
    <= 90)
  type: boolean
  primary_key: false
  description: 'High-Fee Strategic Bet (KB 44): positive Relative Expense Ratio AND
    not a Market-Tracking Fund (R-squared 3Y <= 90).'
  hidden: false
  meta:
    kb_id: 44
- name: active_management_footprint
  sql: (1 - risk_metrics.rsquared3y / 100.0) * 1.0 / NULLIF(turnoverratio, 0)
  type: number
  primary_key: false
  description: Active Management Footprint (KB 52) = (1 - R-Squared 3Y) / Turnover
    Ratio. R-Squared is stored on a 0-100 scale, so divided by 100 to get 0-1 fraction.
  hidden: false
  meta:
    kb_id: 52
- name: growth_value_spectrum_score
  sql: ln(pe_ratio * 1.0 / NULLIF(pb_ratio, 0))
  type: number
  primary_key: false
  description: Growth-Value Spectrum Score (KB 59) = ln(P/E / P/B). Positive = growth
    tilt, negative = value tilt.
  hidden: false
  meta:
    kb_id: 59
- name: composite_valuation_score
  sql: 0.25 * ((1.0 / NULLIF(pe_ratio, 0)) + (1.0 / NULLIF(ps_ratio, 0)) + (1.0 /
    NULLIF(pb_ratio, 0)) + (1.0 / NULLIF(pcf_ratio, 0)))
  type: number
  primary_key: false
  description: Composite Valuation Score (KB 51) = average of inverted P/E, P/S, P/B,
    P/CF. Higher = cheaper.
  hidden: false
  meta:
    kb_id: 51
- name: average_daily_value_traded_3m
  sql: vol3m * ma200
  type: number
  primary_key: false
  description: Average Daily Value Traded over 3 months (KB 76) = Vol_3M * 200-day
    MA price (KB-prescribed proxy for average share price).
  hidden: false
  meta:
    kb_id: 76
- name: portfolio_liquidity_pressure
  sql: (networth * turnoverratio) * 1.0 / NULLIF(vol3m * ma200 * 252, 0)
  type: number
  primary_key: false
  description: Portfolio Liquidity Pressure (KB 58) = (Net Worth * Turnover Ratio)
    / (Average Daily Volume (3M) * 252). KB defines ADV in shares; using vol3m * ma200
    to compute dollar ADV.
  hidden: false
  meta:
    kb_id: 58
- name: is_valuation_transparent
  sql: pe_ratio IS NOT NULL AND pb_ratio IS NOT NULL
  type: boolean
  primary_key: false
  description: 'Valuation Data Availability (KB 84): TRUE = Transparent (P/E and P/B
    both populated), FALSE = Opaque.'
  hidden: false
  meta:
    kb_id: 84
- name: information_ratio_simplified
  sql: (etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)
  type: number
  primary_key: false
  description: Information Ratio Simplified (KB 6) = (3Y fund return - 3Y benchmark
    return) / 3Y volatility.
  hidden: false
  meta:
    kb_id: 6
- name: performance_cost_efficiency_score
  sql: (SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns ar WHERE ar.portfolioref
    = funds.tickersym) * 1.0 / NULLIF(expensenet - benchmarkexp, 0)
  type: number
  primary_key: false
  description: PCES (KB 30) = Annual Fund Outperformance / Relative Expense Ratio.
    Numerator uses average annual outperformance across all years for the fund.
  hidden: false
  meta:
    kb_id: 30
- name: momentum_weighted_price_strength
  sql: (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w - etf_performance.low52w,
    0)) * (1 + (ma50 - ma200) * 1.0 / NULLIF(ma200, 0))
  type: number
  primary_key: false
  description: Momentum-Weighted Price Strength (KB 31) = Price Position * (1 + Momentum/MA200).
  hidden: false
  meta:
    kb_id: 31
- name: consistency_adjusted_information_ratio
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * ((etf_performance.positiveyears * 1.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)))
  type: number
  primary_key: false
  description: Consistency-Adjusted Information Ratio (KB 32) = Information Ratio
    * (Positive Return Consistency / 100).
  hidden: false
  meta:
    kb_id: 32
- name: active_manager_value
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) - (expensenet - benchmarkexp) * 10
  type: number
  primary_key: false
  description: Active Manager Value (KB 34) = Information Ratio - (Relative Expense
    Ratio * 10).
  hidden: false
  meta:
    kb_id: 34
- name: composite_momentum_strength
  sql: (ma50 - ma200) * (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w
    - etf_performance.low52w, 0))
  type: number
  primary_key: false
  description: Composite Momentum Strength (KB 36) = Short-Term Momentum * Price Position
    in 52-Week Range.
  hidden: false
  meta:
    kb_id: 36
- name: net_yield_advantage
  sql: yieldrate - (expensenet - benchmarkexp)
  type: number
  primary_key: false
  description: Net Yield Advantage (KB 37) = Yield Rate - Relative Expense Ratio.
  hidden: false
  meta:
    kb_id: 37
- name: risk_return_efficiency_index
  sql: (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)
  type: number
  primary_key: false
  description: Risk-Return Efficiency Index (KB 39) = Return on Cost / 3-Year Volatility.
  hidden: false
  meta:
    kb_id: 39
- name: momentum_adjusted_information_ratio
  sql: ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * (1 + (ma50 - ma200) * 1.0 / NULLIF(ma200, 0))
  type: number
  primary_key: false
  description: Momentum-Adjusted Information Ratio (KB 54) = Information Ratio * (1
    + Momentum / 200-Day MA).
  hidden: false
  meta:
    kb_id: 54
- name: is_closet_indexer
  sql: risk_metrics.rsquared3y > 90 AND (expensenet - benchmarkexp) > 0
  type: boolean
  primary_key: false
  description: 'Closet Indexer (KB 60): Market-Tracking Fund AND positive Relative
    Expense Ratio.'
  hidden: false
  meta:
    kb_id: 60
- name: is_strategic_beta
  sql: turnoverratio < 0.30 AND (risk_metrics.rsquared3y IS NULL OR risk_metrics.rsquared3y
    <= 90)
  type: boolean
  primary_key: false
  description: 'Strategic Beta Fund (KB 61): Low-Turnover Strategy AND not a Market-Tracking
    Fund.'
  hidden: false
  meta:
    kb_id: 61
- name: wasted_fee_amount
  sql: CASE WHEN risk_metrics.rsquared3y > 90 AND (expensenet - benchmarkexp) > 0
    THEN (expensenet - benchmarkexp) * networth ELSE NULL END
  type: number
  primary_key: false
  description: 'Wasted Fee Amount (KB 86) = (Net Expense Ratio - Benchmark Expense
    Ratio) * Net Worth, but only for Closet Indexer funds (per KB definition: ''fees
    paid by investors in a Closet Indexer fund''). NULL otherwise.'
  hidden: false
  meta:
    kb_id: 86
- name: is_global_alpha_specialist
  sql: risk_metrics.alpha5y > 0 AND UPPER(TRIM(geozone)) NOT IN ('UNITED_STATES',
    'US', 'USA', 'U.S.', 'U.S.A.', 'AMERICA', 'UNITED STATES')
  type: boolean
  primary_key: false
  description: 'Global Alpha Specialist (KB 48): Alpha Generator AND geozone is anything
    other than ''UNITED_STATES'' or ''US'' (case/whitespace tolerant; geozone is messy).'
  hidden: false
  meta:
    kb_id: 48
- name: is_high_cost_underperformer
  sql: (expensenet - benchmarkexp) > 0 AND (SELECT (ar.fundperf - ar.categoryperf)
    FROM annual_returns ar WHERE ar.portfolioref = funds.tickersym AND ar.fundperf
    IS NOT NULL AND ar.categoryperf IS NOT NULL ORDER BY ar.calendaryear DESC LIMIT
    1) < 0
  type: boolean
  primary_key: false
  description: 'High-Cost Underperformer (KB 49): positive Relative Expense Ratio
    AND negative Annual Fund Outperformance for the latest reported year.'
  hidden: false
  meta:
    kb_id: 49
- name: is_focused_alpha_leader
  sql: risk_metrics.alpha5y > 0 AND etf_performance.topweight > 0.08
  type: boolean
  primary_key: false
  description: 'Focused Alpha Leader (KB 45): Alpha Generator AND High-Conviction
    Portfolio.'
  hidden: false
  meta:
    kb_id: 45
- name: is_consistent_outperformer
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80
  type: boolean
  primary_key: false
  description: 'Consistent Outperformer (KB 15): Alpha Generator AND Positive Return
    Consistency > 80.'
  hidden: false
  meta:
    kb_id: 15
- name: is_passive_alpha_generator
  sql: risk_metrics.rsquared3y > 90 AND risk_metrics.alpha5y > 0
  type: boolean
  primary_key: false
  description: 'Passive Alpha Generator (KB 16): Market-Tracking Fund AND Alpha Generator.'
  hidden: false
  meta:
    kb_id: 16
- name: is_elite_active_manager
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80 AND etf_performance.topweight > 0.08
  type: boolean
  primary_key: false
  description: 'Elite Active Manager (KB 40): Consistent Outperformer AND High-Conviction
    Portfolio.'
  hidden: false
  meta:
    kb_id: 40
- name: is_ideal_index_fund
  sql: risk_metrics.rsquared3y > 90 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp)
    < 0
  type: boolean
  primary_key: false
  description: 'Ideal Index Fund (KB 41): Market-Tracking Fund AND Low-Turnover Strategy
    AND negative Relative Expense Ratio.'
  hidden: false
  meta:
    kb_id: 41
- name: is_rebound_prospect
  sql: (SELECT (ar.fundperf - ar.categoryperf) FROM annual_returns ar WHERE ar.portfolioref
    = funds.tickersym AND ar.fundperf IS NOT NULL AND ar.categoryperf IS NOT NULL
    ORDER BY ar.calendaryear DESC LIMIT 1) < 0 AND (ma50 - ma200) > 0
  type: boolean
  primary_key: false
  description: 'Rebound Prospect (KB 43): negative latest-year Annual Fund Outperformance
    AND Golden Cross Signal.'
  hidden: false
  meta:
    kb_id: 43
- name: is_speculative_turnaround_play
  sql: (expensenet - benchmarkexp) > 0 AND (SELECT (ar.fundperf - ar.categoryperf)
    FROM annual_returns ar WHERE ar.portfolioref = funds.tickersym AND ar.fundperf
    IS NOT NULL AND ar.categoryperf IS NOT NULL ORDER BY ar.calendaryear DESC LIMIT
    1) < 0 AND (ma50 - ma200) > 0
  type: boolean
  primary_key: false
  description: 'Speculative Turnaround Play (KB 69): High-Cost Underperformer AND
    Golden Cross Signal.'
  hidden: false
  meta:
    kb_id: 69
- name: cost_adjusted_annual_outperformance_note
  sql: '''see annual_returns.annual_fund_outperformance + funds.relative_expense_ratio'''
  type: string
  primary_key: false
  description: 'Cost-Adjusted Annual Outperformance (KB 8): KB defines this as a qualitative
    *combination* of ''Annual Fund Outperformance'' and ''Relative Expense Ratio''
    (no formula). At query time, use both metrics together. This stub column carries
    the KB id for traceability.'
  hidden: true
  meta:
    kb_id: 8
- name: holistic_outperformance_metric
  sql: ((SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns ar WHERE ar.portfolioref
    = funds.tickersym) + ((SELECT AVG(ar.fundperf - ar.categoryperf) FROM annual_returns
    ar WHERE ar.portfolioref = funds.tickersym) + (expensenet - benchmarkexp))) /
    2.0
  type: number
  primary_key: false
  description: Holistic Outperformance Metric (KB 38) = (Annual Fund Outperformance
    + Cost-Adjusted Annual Outperformance) / 2. KB 8 defines 'cost-adjusted' as Annual
    Outperformance + Relative Expense Ratio (a qualitative combination); using sum
    here as the most natural numeric reading.
  hidden: false
  meta:
    kb_id: 38
- name: high_quality_credit_share
  sql: (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa') THEN
    ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM bond_allocations
    ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink = funds.tickersym)
  type: number
  primary_key: false
  description: Share of fund's bond holdings rated US-government / AAA / AA. Used
    by KB 19 High-Quality Credit Portfolio.
  hidden: false
- name: is_high_quality_credit_portfolio
  sql: (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa') THEN
    ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM bond_allocations
    ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink = funds.tickersym)
    > 0.60
  type: boolean
  primary_key: false
  description: 'High-Quality Credit Portfolio (KB 19): >60% of bond holdings are government
    / AAA / AA.'
  hidden: false
  meta:
    kb_id: 19
- name: is_premier_income_fund
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) > 15 AND (SELECT SUM(CASE WHEN br.creditmark
    IN ('us_government', 'aaa', 'aa') THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct),
    0) FROM bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey
    WHERE ba.fundlink = funds.tickersym) > 0.60
  type: boolean
  primary_key: false
  description: 'Premier Income Fund (KB 42): Efficient Income Generator AND High-Quality
    Credit Portfolio.'
  hidden: false
  meta:
    kb_id: 42
- name: quality_income_score
  sql: CASE WHEN (SELECT SUM(CASE WHEN br.creditmark IN ('us_government', 'aaa', 'aa')
    THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct), 0) FROM
    bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey WHERE ba.fundlink
    = funds.tickersym) > 0.60 THEN (yieldrate * 1.0 / NULLIF(expensenet, 0)) ELSE
    NULL END
  type: number
  primary_key: false
  description: 'Quality-Income Score (KB 35): Yield-to-Expense Ratio if fund qualifies
    as High-Quality Credit Portfolio, else NULL.'
  hidden: false
  meta:
    kb_id: 35
- name: secure_income_efficiency_score
  sql: (yieldrate * 1.0 / NULLIF(expensenet, 0)) * (SELECT SUM(CASE WHEN br.creditmark
    IN ('us_government', 'aaa', 'aa') THEN ba.allocationpct ELSE 0 END) * 1.0 / NULLIF(SUM(ba.allocationpct),
    0) FROM bond_allocations ba JOIN bond_ratings br ON ba.ratinglink = br.ratekey
    WHERE ba.fundlink = funds.tickersym)
  type: number
  primary_key: false
  description: Secure Income Efficiency Score (KB 55) = Yield-to-Expense Ratio * Allocation
    to High-Quality Credit.
  hidden: false
  meta:
    kb_id: 55
- name: is_contrarian_value_play
  sql: (etf_performance.lowdelta * 100.0 / NULLIF(etf_performance.high52w - etf_performance.low52w,
    0)) < 25 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp) < 0
  type: boolean
  primary_key: false
  description: 'Contrarian Value Play (KB 47): Price Position < 25% AND Low-Turnover
    Strategy AND negative Relative Expense Ratio.'
  hidden: false
  meta:
    kb_id: 47
- name: is_efficient_core_holding
  sql: risk_metrics.rsquared3y > 90 AND turnoverratio < 0.30 AND (expensenet - benchmarkexp)
    < 0 AND (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) > 50
  type: boolean
  primary_key: false
  description: 'Efficient Core Holding (KB 65): Ideal Index Fund AND high Return on
    Cost. KB doesn''t pin ''high''; using ROC > 50 as a heuristic.'
  hidden: false
  meta:
    kb_id: 65
- name: is_momentum_driven_growth_fund
  sql: ln(pe_ratio * 1.0 / NULLIF(pb_ratio, 0)) > 0 AND (ma50 - ma200) > 0
  type: boolean
  primary_key: false
  description: 'Momentum-Driven Growth Fund (KB 66): GVS > 0 (growth tilt) AND Golden
    Cross Signal.'
  hidden: false
  meta:
    kb_id: 66
- name: is_true_active_differentiator
  sql: ((1 - risk_metrics.rsquared3y / 100.0) * 1.0 / NULLIF(turnoverratio, 0)) >
    0.5 AND (risk_metrics.alpha3y * 1.0 / NULLIF(risk_metrics.volatility3y * sqrt(1
    - risk_metrics.rsquared3y / 100.0), 0)) > 0.2 AND etf_performance.topweight >
    0.08
  type: boolean
  primary_key: false
  description: 'True Active Differentiator (KB 68): AMF > 0.5 AND Appraisal Ratio
    > 0.2 AND High-Conviction Portfolio.'
  hidden: false
  meta:
    kb_id: 68
- name: total_value_score
  sql: CASE WHEN (etf_performance.r1y * 1.0 / NULLIF(expensenet, 0)) * ((etf_performance.r3y
    - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y, 0)) * (etf_performance.positiveyears
    * 100.0 / NULLIF(etf_performance.positiveyears + etf_performance.negativeyears,
    0)) IS NULL THEN NULL ELSE pow(ABS((etf_performance.r1y * 1.0 / NULLIF(expensenet,
    0)) * ((etf_performance.r3y - etf_performance.benchr3y) * 1.0 / NULLIF(risk_metrics.volatility3y,
    0)) * (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0))), 1.0/3.0) * CASE WHEN (etf_performance.r1y
    * 1.0 / NULLIF(expensenet, 0)) * ((etf_performance.r3y - etf_performance.benchr3y)
    * 1.0 / NULLIF(risk_metrics.volatility3y, 0)) * (etf_performance.positiveyears
    * 100.0 / NULLIF(etf_performance.positiveyears + etf_performance.negativeyears,
    0)) < 0 THEN -1 ELSE 1 END END
  type: number
  primary_key: false
  description: Total Value Score (KB 33) = cube_root(Return on Cost * Information
    Ratio * Positive Return Consistency). Sign-preserving via |x|^(1/3) * sign(x).
  hidden: false
  meta:
    kb_id: 33
- name: is_reliable_core_holding
  sql: risk_metrics.alpha5y > 0 AND (etf_performance.positiveyears * 100.0 / NULLIF(etf_performance.positiveyears
    + etf_performance.negativeyears, 0)) > 80 AND equityweight IS NOT NULL AND equityweight
    > 0 AND yieldrate IS NOT NULL AND yieldrate > 0
  type: boolean
  primary_key: false
  description: 'Reliable Core Holding (KB 46): Consistent Outperformer AND Total Return
    Fund.'
  hidden: false
  meta:
    kb_id: 46
- name: category_average_duration
  sql: (SELECT AVG(f2.duration) FROM funds f2 WHERE f2.productclass = funds.productclass
    AND f2.duration IS NOT NULL)
  type: number
  primary_key: false
  description: 'Category Average Duration (KB 71): mean of duration across funds in
    the same productclass.'
  hidden: false
  meta:
    kb_id: 71
- name: duration_advantage
  sql: (SELECT AVG(f2.duration) FROM funds f2 WHERE f2.productclass = funds.productclass
    AND f2.duration IS NOT NULL) - duration
  type: number
  primary_key: false
  description: Duration Advantage (KB 72) = Category Average Duration - Fund Duration.
    Positive = lower duration than peers.
  hidden: false
  meta:
    kb_id: 72
- name: cvs_percentile_rank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY 0.25 * (COALESCE(1.0
    / NULLIF(pe_ratio, 0), 0) + COALESCE(1.0 / NULLIF(ps_ratio, 0), 0) + COALESCE(1.0
    / NULLIF(pb_ratio, 0), 0) + COALESCE(1.0 / NULLIF(pcf_ratio, 0), 0)))
  type: number
  primary_key: false
  description: Percentile rank of Composite Valuation Score within productclass (0=lowest
    CVS, 1=highest). Used by KB 63 Q-GARP and KB 64 High-Conviction Value Investor.
  hidden: false
- name: alpha5y_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT alpha5y FROM
    risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
  type: number
  primary_key: false
  description: Percentile rank of fund's 5Y Alpha within its productclass.
  hidden: false
- name: sharpe3y_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT sharperatio3y
    FROM risk_metrics WHERE risk_metrics.investmentref = funds.tickersym))
  type: number
  primary_key: false
  description: Percentile rank of fund's 3Y Sharpe within its productclass.
  hidden: false
- name: inverse_expense_pctrank_in_category
  sql: PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY -expensenet)
  type: number
  primary_key: false
  description: Percentile rank of fund's inverse net expense (i.e., cheapness) within
    its productclass.
  hidden: false
- name: composite_score
  sql: (PERCENT_RANK() OVER (PARTITION BY productclass ORDER BY (SELECT alpha5y FROM
    risk_metrics WHERE risk_metrics.investmentref = funds.tickersym)) + PERCENT_RANK()
    OVER (PARTITION BY productclass ORDER BY (SELECT sharperatio3y FROM risk_metrics
    WHERE risk_metrics.investmentref = funds.tickersym)) + PERCENT_RANK() OVER (PARTITION
    BY productclass ORDER BY -expensenet)) / 3.0
  type: number
  primary_key: false
  description: Composite Score (KB 80) = average percentile rank of (5Y Alpha, 3Y
    Sharpe, Inverse Net Expense) within productclass.
  hidden: false
  meta:
    kb_id: 80
