  hidden: false
- name: geozone
  sql: geozone
  type: string
  primary_key: false
  description: 'Geographic focus (KB 18): raw label such as UNITED_STATES / usa /
    U.S.A. / International / Pacific/Asia ex-Japan Stk; case + spelling vary.'
  hidden: false
  meta:
    kb_id: 18
- name: shortlabel
  sql: shortlabel
  type: string
  primary_key: false
  hidden: false
- name: fulldescription
  sql: fulldescription
  type: string
  primary_key: false
  hidden: false
