- name: is_alpha_generator
  sql: alpha5y > 0
  type: boolean
  primary_key: false
  description: 'Alpha Generator (KB 10): 5-year alpha > 0.'
  hidden: false
  meta:
    kb_id: 10
- name: is_market_tracking
  sql: rsquared3y > 90
  type: boolean
  primary_key: false
  description: 'Market-Tracking Fund (KB 11): 3-year R-squared > 90.'
  hidden: false
  meta:
    kb_id: 11
- name: is_defensive_anchor
  sql: beta3y < 0.75 AND (1.0 / (1 + COALESCE(funds__etf_performance.negativeyears,
    0))) * (1 - (funds__etf_performance.low52w - (funds__etf_performance.low52w +
    funds__etf_performance.lowdelta)) * 1.0 / NULLIF(funds__etf_performance.low52w,
    0)) >= 0.5
  type: boolean
  primary_key: false
  description: 'Defensive Anchor (KB 67): 3-year Beta < 0.75 AND high Capital Preservation
    Index. KB doesn''t pin the CPI threshold; using 0.5 as a ''high'' default. The
    CPI formula is inlined here because it lives on etf_performance.'
  hidden: false
  meta:
    kb_id: 67
- name: appraisal_ratio
  sql: alpha3y * 1.0 / NULLIF(volatility3y * sqrt(1 - rsquared3y / 100.0), 0)
  type: number
  primary_key: false
  description: Appraisal Ratio (KB 50) = 3Y Alpha / (3Y Volatility * sqrt(1 - 3Y R-Squared)).
    R-squared rescaled from 0-100 to 0-1.
  hidden: false
  meta:
    kb_id: 50
- name: cost_adjusted_alpha
  sql: alpha3y - funds.relative_expense_ratio
  type: number
  primary_key: false
  description: Cost-Adjusted Alpha (KB 53) = 3Y Alpha - Relative Expense Ratio.
  hidden: false
  meta:
    kb_id: 53
- name: manager_skill_ratio
  sql: alpha3y * 1.0 / NULLIF(funds.expensenet, 0)
  type: number
  primary_key: false
  description: Manager Skill Ratio (KB 56) = 3Y Alpha / Net Expense Ratio.
  hidden: false
  meta:
    kb_id: 56
- name: beta_drift_3y_vs_5y
  sql: beta3y - beta5y
  type: number
  primary_key: false
  description: 'Beta Drift (KB 77): change in market sensitivity. Using Beta_3Y minus
    Beta_5Y as the canonical ''recent vs longer'' pairing in this schema.'
  hidden: false
  meta:
    kb_id: 77
- name: rsquared_drift_3y_vs_5y
  sql: rsquared3y - rsquared5y
  type: number
  primary_key: false
  description: 'R-Squared Drift (KB 78): change in benchmark correlation. Using R-Squared_3Y
    minus R-Squared_5Y.'
  hidden: false
  meta:
    kb_id: 78
- name: is_style_drift
  sql: ABS(beta3y - beta5y) > 0.15 OR ABS(rsquared3y - rsquared5y) > 10
  type: boolean
  primary_key: false
  description: 'Style Drift (KB 79): TRUE when |Beta drift| > 0.15 OR |R-squared drift|
    > 10.'
  hidden: false
  meta:
    kb_id: 79
measures: []
aggregations: []
joins:
- target_model: funds
  join_pairs:
  - - investmentref
    - tickersym
  join_type: left
filters: []
description: Per-fund risk and risk-adjusted return metrics over 3, 5, and 10 year
  windows (alpha, beta, R-squared, volatility, Sharpe, Treynor). One row per fund,
  joined on investmentref = funds.tickersym.
hidden: false
