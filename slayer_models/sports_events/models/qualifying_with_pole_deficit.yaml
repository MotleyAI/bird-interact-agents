version: 3
name: qualifying_with_pole_deficit
source_queries:
- version: 3
  name: best_qual_per_driver
  source_model: qualifying
  dimensions:
  - name: qualkey
  - name: rbind
  - name: pilotrec
  - name: corptag
  - name: px_pos
  - name: best_qualifying_seconds
  whole_periods_only: false
- version: 3
  source_model:
    source_name: best_qual_per_driver
    columns:
    - name: pole_seconds
      type: number
      sql: MIN(best_qualifying_seconds) OVER (PARTITION BY rbind)
      description: Pole-sitter's best qualifying time in seconds for this race (window
        function over qualifying).
    - name: qualifying_time_deficit_to_pole
      type: number
      sql: best_qualifying_seconds - MIN(best_qualifying_seconds) OVER (PARTITION
        BY rbind)
      description: 'Qualifying Time Deficit to Pole (KB #28): driver''s best qualifying
        time minus pole sitter''s, in seconds.'
    - name: is_qualifying_specialist
      type: boolean
      sql: (best_qualifying_seconds - MIN(best_qualifying_seconds) OVER (PARTITION
        BY rbind)) < 0.2
      description: 'Qualifying Specialist (KB #41): TRUE iff Qualifying Time Deficit
        to Pole < 0.2 s.'
    - name: qualifying_performance_cluster
      type: string
      sql: CASE WHEN (best_qualifying_seconds - MIN(best_qualifying_seconds) OVER
        (PARTITION BY rbind)) < 0.15 THEN 'Pole Threat' WHEN (best_qualifying_seconds
        - MIN(best_qualifying_seconds) OVER (PARTITION BY rbind)) < 0.4 THEN 'Mid
        Gap' ELSE 'Backmarker' END
      description: 'Qualifying Performance Cluster (KB #53): ''Pole Threat'' (<0.15
        s), ''Mid Gap'' (0.15-0.4 s), ''Backmarker'' (>=0.4 s) by qualifying deficit
        to pole.'
  dimensions:
  - name: qualkey
  - name: rbind
  - name: pilotrec
  - name: corptag
  - name: px_pos
  - name: best_qualifying_seconds
  - name: pole_seconds
  - name: qualifying_time_deficit_to_pole
  - name: is_qualifying_specialist
  - name: qualifying_performance_cluster
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"best_qual_per_driver.qualkey\" AS qualkey, \"best_qual_per_driver.rbind\"\
  \ AS rbind, \"best_qual_per_driver.pilotrec\" AS pilotrec, \"best_qual_per_driver.corptag\"\
  \ AS corptag, \"best_qual_per_driver.px_pos\" AS px_pos, \"best_qual_per_driver.best_qualifying_seconds\"\
  \ AS best_qualifying_seconds, \"best_qual_per_driver.pole_seconds\" AS pole_seconds,\
  \ \"best_qual_per_driver.qualifying_time_deficit_to_pole\" AS qualifying_time_deficit_to_pole,\
  \ \"best_qual_per_driver.is_qualifying_specialist\" AS is_qualifying_specialist,\
  \ \"best_qual_per_driver.qualifying_performance_cluster\" AS qualifying_performance_cluster\
  \ FROM (SELECT\n  best_qual_per_driver.qualkey AS \"best_qual_per_driver.qualkey\"\
  ,\n  best_qual_per_driver.rbind AS \"best_qual_per_driver.rbind\",\n  best_qual_per_driver.pilotrec\
  \ AS \"best_qual_per_driver.pilotrec\",\n  best_qual_per_driver.corptag AS \"best_qual_per_driver.corptag\"\
  ,\n  best_qual_per_driver.px_pos AS \"best_qual_per_driver.px_pos\",\n  best_qual_per_driver.best_qualifying_seconds\
  \ AS \"best_qual_per_driver.best_qualifying_seconds\",\n  MIN(best_qualifying_seconds)\
  \ OVER (PARTITION BY rbind) AS \"best_qual_per_driver.pole_seconds\",\n  best_qualifying_seconds\
  \ - MIN(best_qualifying_seconds) OVER (PARTITION BY rbind) AS \"best_qual_per_driver.qualifying_time_deficit_to_pole\"\
  ,\n  (\n    best_qualifying_seconds - MIN(best_qualifying_seconds) OVER (PARTITION\
  \ BY rbind)\n  ) < 0.2 AS \"best_qual_per_driver.is_qualifying_specialist\",\n \
  \ CASE\n    WHEN (\n      best_qualifying_seconds - MIN(best_qualifying_seconds)\
  \ OVER (PARTITION BY rbind)\n    ) < 0.15\n    THEN 'Pole Threat'\n    WHEN (\n\
  \      best_qualifying_seconds - MIN(best_qualifying_seconds) OVER (PARTITION BY\
  \ rbind)\n    ) < 0.4\n    THEN 'Mid Gap'\n    ELSE 'Backmarker'\n  END AS \"best_qual_per_driver.qualifying_performance_cluster\"\
  \nFROM (\n  SELECT\n    \"qualifying.qualkey\" AS qualkey,\n    \"qualifying.rbind\"\
  \ AS rbind,\n    \"qualifying.pilotrec\" AS pilotrec,\n    \"qualifying.corptag\"\
  \ AS corptag,\n    \"qualifying.px_pos\" AS px_pos,\n    \"qualifying.best_qualifying_seconds\"\
  \ AS best_qualifying_seconds\n  FROM (\n    SELECT\n      qualifying.qualkey AS\
  \ \"qualifying.qualkey\",\n      qualifying.rbind AS \"qualifying.rbind\",\n   \
  \   qualifying.pilotrec AS \"qualifying.pilotrec\",\n      qualifying.corptag AS\
  \ \"qualifying.corptag\",\n      qualifying.px_pos AS \"qualifying.px_pos\",\n \
  \     MIN(\n        COALESCE(\n          CASE\n            WHEN q1_r IS NULL OR\
  \ INSTR(q1_r, ':') = 0\n            THEN NULL\n            ELSE CAST(SUBSTRING(q1_r,\
  \ 1, INSTR(q1_r, ':') - 1) AS REAL) * 60 + CAST(SUBSTRING(q1_r, INSTR(q1_r, ':')\
  \ + 1) AS REAL)\n          END,\n          1e18\n        ),\n        COALESCE(\n\
  \          CASE\n            WHEN q2_r IS NULL OR INSTR(q2_r, ':') = 0\n       \
  \     THEN NULL\n            ELSE CAST(SUBSTRING(q2_r, 1, INSTR(q2_r, ':') - 1)\
  \ AS REAL) * 60 + CAST(SUBSTRING(q2_r, INSTR(q2_r, ':') + 1) AS REAL)\n        \
  \  END,\n          1e18\n        ),\n        COALESCE(\n          CASE\n       \
  \     WHEN q3_r IS NULL OR INSTR(q3_r, ':') = 0\n            THEN NULL\n       \
  \     ELSE CAST(SUBSTRING(q3_r, 1, INSTR(q3_r, ':') - 1) AS REAL) * 60 + CAST(SUBSTRING(q3_r,\
  \ INSTR(q3_r, ':') + 1) AS REAL)\n          END,\n          1e18\n        )\n  \
  \    ) AS \"qualifying.best_qualifying_seconds\"\n    FROM qualifying AS qualifying\n\
  \  ) AS _inner\n) AS best_qual_per_driver) AS _inner"
