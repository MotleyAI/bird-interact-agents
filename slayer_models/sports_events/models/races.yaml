version: 3
name: races
sql_table: races
query_variables: {}
data_source: sports_events
columns:
- name: rak_id
  sql: rak_id
  type: number
  primary_key: true
  description: Unique race identifier.
  hidden: false
  format:
    type: integer
- name: yr
  sql: yr
  type: number
  primary_key: false
  description: Year of the race.
  hidden: false
  format:
    type: integer
- name: rnum
  sql: rnum
  type: number
  primary_key: false
  description: Round number within the season.
  hidden: false
  format:
    type: integer
- name: trkbind
  sql: trkbind
  type: number
  primary_key: false
  description: Foreign key to circuits.
  hidden: false
  format:
    type: integer
- name: event_schedule
  sql: event_schedule
  type: string
  primary_key: false
  description: 'JSONB column. Groups all date and time-related fields for a race weekend
    schedule including practice, qualifying, and sprint sessions. KB #0 (race weekend
    structure: up to 3 FP sessions, qualifying, Grand Prix, sometimes sprint), KB
    #1 (Q1/Q2/Q3 qualifying knockout), KB #2 (sprint session), KB #7 (NULL dates/times
    mean TBD/not applicable/not published).'
  hidden: false
  meta:
    kb_ids:
    - 0
    - 1
    - 2
    - 7
- name: event_name
  sql: json_extract(event_schedule, '$.event_name')
  type: string
  primary_key: false
  description: Official event name (extracted).
  hidden: false
- name: date_set
  sql: REPLACE(json_extract(event_schedule, '$.date_set'), '/', '-')
  type: date
  primary_key: false
  description: Main race date (extracted; '/' replaced with '-' for ISO format).
  hidden: false
- name: start_time
  sql: json_extract(event_schedule, '$.start_time')
  type: string
  primary_key: false
  description: 'Race start time (extracted). NULL = TBD / not recorded (KB #7).'
  hidden: false
- name: details_url
  sql: json_extract(event_schedule, '$.details_url')
  type: string
  primary_key: false
  description: URL to additional race details (extracted).
  hidden: false
- name: fp1_date
  sql: REPLACE(json_extract(event_schedule, '$.sessions.fp1.date'), '/', '-')
  type: date
  primary_key: false
  description: 'Free Practice 1 date (extracted). NULL = not scheduled / TBD (KB #7).'
  hidden: false
- name: fp2_date
  sql: REPLACE(json_extract(event_schedule, '$.sessions.fp2.date'), '/', '-')
  type: date
  primary_key: false
  description: 'Free Practice 2 date (extracted). NULL = not scheduled / TBD (KB #7).'
  hidden: false
- name: fp3_date
  sql: REPLACE(json_extract(event_schedule, '$.sessions.fp3.date'), '/', '-')
  type: date
  primary_key: false
  description: 'Free Practice 3 date (extracted). NULL = not scheduled / TBD (KB #7).'
  hidden: false
- name: qualifying_date
  sql: REPLACE(json_extract(event_schedule, '$.sessions.qualifying.date'), '/', '-')
  type: date
  primary_key: false
  description: 'Qualifying session date (extracted). NULL = TBD (KB #7).'
  hidden: false
- name: sprint_date
  sql: REPLACE(json_extract(event_schedule, '$.sessions.sprint.date'), '/', '-')
  type: date
  primary_key: false
  description: 'Sprint session date (extracted). NULL = no sprint for this event or
    date not released (KB #2, KB #7).'
  hidden: false
- name: has_sprint
  sql: json_extract(event_schedule, '$.sessions.sprint.date') IS NOT NULL
  type: boolean
  primary_key: false
  description: 'TRUE iff the weekend includes a Sprint session (KB #2).'
  hidden: false
measures: []
aggregations: []
joins:
- target_model: circuits
  join_pairs:
  - - trkbind
    - cctkey
  join_type: left
filters: []
description: 'F1 race weekends. One row per Grand Prix. The event_schedule JSONB column
  groups date/time fields for the race weekend''s sessions (FP1/FP2/FP3, qualifying,
  sprint). KB #0 documents that a typical race weekend has up to 3 Free Practice sessions,
  a Qualifying session, and the Grand Prix Race (some weekends also include a Sprint).
  KB #1 documents the multi-stage Q1/Q2/Q3 qualifying knockout. KB #2 documents the
  Sprint Session: a shorter race that has its own abbreviated qualifying, awards fewer
  championship points and sets the grid for the main race. KB #7 documents that NULL
  date/time fields mean the schedule is To Be Determined (TBD), not applicable, or
  not yet published.'
hidden: false
