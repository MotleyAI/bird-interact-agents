version: 3
name: circuits
sql_table: circuits
query_variables: {}
data_source: sports_events
columns:
- name: cctkey
  sql: cctkey
  type: number
  primary_key: true
  description: Unique circuit identifier.
  hidden: false
  format:
    type: integer
- name: location_metadata
  sql: location_metadata
  type: string
  primary_key: false
  description: 'JSONB column. Encapsulates all geographical and identification data
    related to the circuit''s location: name, reference_code, location.{city,country},
    coordinates.{latitude,longitude,elevation_m}, external_link. Per KB #3, missing
    city/latitude/longitude indicates data was not supplied or is unknown in the source
    feed. Per KB #4, missing elevation_m indicates the data point was not recorded.'
  hidden: false
  meta:
    kb_ids:
    - 3
    - 4
- name: circuit_name
  sql: json_extract(location_metadata, '$.name')
  type: string
  primary_key: false
  description: Circuit name (extracted from location_metadata).
  hidden: false
- name: reference_code
  sql: json_extract(location_metadata, '$.reference_code')
  type: string
  primary_key: false
  description: Short circuit reference code (extracted).
  hidden: false
- name: city
  sql: json_extract(location_metadata, '$.location.city')
  type: string
  primary_key: false
  description: 'City of the circuit (extracted). NULL means the locality is not supplied
    or unknown in the source feed (KB #3).'
  hidden: false
- name: country
  sql: json_extract(location_metadata, '$.location.country')
  type: string
  primary_key: false
  description: Country of the circuit (extracted).
  hidden: false
- name: latitude
  sql: json_extract(location_metadata, '$.coordinates.latitude')
  type: number
  primary_key: false
  description: 'Latitude of the circuit (extracted). NULL = unknown (KB #3).'
  hidden: false
- name: longitude
  sql: json_extract(location_metadata, '$.coordinates.longitude')
  type: number
  primary_key: false
  description: 'Longitude of the circuit (extracted). NULL = unknown (KB #3).'
  hidden: false
- name: elevation_m
  sql: json_extract(location_metadata, '$.coordinates.elevation_m')
  type: number
  primary_key: false
  description: 'Circuit elevation in metres (extracted). NULL = not recorded (KB #4).'
  hidden: false
- name: is_high_altitude
  sql: CASE WHEN CAST(json_extract(location_metadata, '$.coordinates.elevation_m')
    AS REAL) > 800 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'High-Altitude Circuit (KB #14): elevation > 800 m above sea level.'
  hidden: false
  meta:
    kb_id: 14
measures: []
aggregations: []
joins: []
filters: []
description: F1 circuits. One row per circuit. Geographical and identification data
  is held in the JSONB-style location_metadata column; convenience extracted columns
  are exposed below.
hidden: false
