description: 'Reliable and Performing Constructor (KB #45): a team where Constructor
  Reliability Rate > 95% AND Constructor''s Performance Score (CPS) ranks in the top
  3 for the season. Built as custom SQL: aggregates constructor_results to (constructor,
  year), then ranks CPS with a window function.'
