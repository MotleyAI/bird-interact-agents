version: 3
name: reliable_and_performing_constructor
sql: "WITH season_metrics AS (\n  SELECT\n    cr.unitnode AS unitnode,\n    r.yr AS\
  \ yr,\n    SUM(cr.scoreval) AS season_total_points,\n    SUM(CASE WHEN cr.st_mark\
  \ IS NULL THEN 1 ELSE 0 END) AS finishes,\n    COUNT(*) AS starts,\n    SUM(cr.scoreval)\
  \ * SUM(CASE WHEN cr.st_mark IS NULL THEN 1.0 ELSE 0.0 END) / NULLIF(COUNT(*), 0)\
  \ AS cps,\n    100.0 * SUM(CASE WHEN cr.st_mark IS NULL THEN 1.0 ELSE 0.0 END) /\
  \ NULLIF(COUNT(*), 0) AS reliability_pct\n  FROM constructor_results cr\n  JOIN\
  \ races r ON cr.matchref = r.rak_id\n  GROUP BY cr.unitnode, r.yr\n)\nSELECT\n \
  \ unitnode,\n  yr,\n  season_total_points,\n  finishes,\n  starts,\n  cps,\n  reliability_pct,\n\
  \  RANK() OVER (PARTITION BY yr ORDER BY cps DESC) AS cps_season_rank,\n  CASE WHEN\
  \ reliability_pct > 95 AND RANK() OVER (PARTITION BY yr ORDER BY cps DESC) <= 3\
  \ THEN 1 ELSE 0 END AS is_reliable_and_performing\nFROM season_metrics"
query_variables: {}
data_source: sports_events
