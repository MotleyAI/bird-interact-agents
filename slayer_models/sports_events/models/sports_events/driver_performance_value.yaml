  hidden: false
- name: dpv
  sql: dpv
  type: DOUBLE
  primary_key: false
  description: "Driver Performance Value (KB #37): PPR / driver_age. Higher = more\
    \ points per race relative to age.\n\n[kb=37]\nDPV = \\frac{\\text{Driver's Points\
    \ Per Race (PPR)}}{\\text{Driver Age}}, \\text{providing a measure of success\
    \ relative to experience.} \u2014 Calculates a value metric for a driver by comparing\
    \ their points-scoring record to their age.\n[/kb=37]"
  label: Driver Performance Value
  hidden: false
  meta:
    kb_id: 37
