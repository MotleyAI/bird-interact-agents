version: 6
name: driver_performance_value
sql: "SELECT\n  ds.drive_link AS drive_link,\n  r.yr AS yr,\n  CAST(MAX(ds.acc_pt)\
  \ AS REAL) / NULLIF(COUNT(*), 0) AS ppr,\n  CAST(strftime('%Y', 'now') - strftime('%Y',\
  \ d.driver_identity ->> '$.birth_date') AS INTEGER) -\n    (strftime('%m-%d', 'now')\
  \ < strftime('%m-%d', d.driver_identity ->> '$.birth_date')) AS driver_age,\n  (CAST(MAX(ds.acc_pt)\
  \ AS REAL) / NULLIF(COUNT(*), 0))\n    / NULLIF(\n        CAST(strftime('%Y', 'now')\
  \ - strftime('%Y', d.driver_identity ->> '$.birth_date') AS INTEGER) -\n       \
  \   (strftime('%m-%d', 'now') < strftime('%m-%d', d.driver_identity ->> '$.birth_date')),\n\
  \        0) AS dpv\nFROM driver_standings ds\nJOIN races r ON ds.rlink = r.rak_id\n\
  JOIN drivers d ON d.drv_main = ds.drive_link\nWHERE d.driver_identity ->> '$.birth_date'\
  \ IS NOT NULL\nGROUP BY ds.drive_link, r.yr"
query_variables: {}
data_source: sports_events
