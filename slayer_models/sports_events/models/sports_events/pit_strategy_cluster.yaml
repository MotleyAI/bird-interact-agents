version: 5
name: pit_strategy_cluster
source_queries:
- version: 3
  name: stops_per_race
  source_model: pit_stops
  measures:
  - formula: '*:count'
  - formula: wunit:count_distinct
  dimensions:
  - name: matchidx
  whole_periods_only: false
- version: 3
  source_model:
    source_name: stops_per_race
    columns:
    - name: average_stops_per_car
      type: DOUBLE
      sql: _count * 1.0 / NULLIF(wunit_count_distinct, 0)
    - name: pit_strategy_cluster
      type: TEXT
      sql: CASE WHEN _count * 1.0 / NULLIF(wunit_count_distinct, 0) < 1.5 THEN 'Single-Stop
        Race' WHEN _count * 1.0 / NULLIF(wunit_count_distinct, 0) < 2.5 THEN 'Standard
        Two-Stop' ELSE 'High-Strategy Event' END
  dimensions:
  - name: matchidx
  - name: pit_strategy_cluster
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"stops_per_race.matchidx\" AS matchidx, \"stops_per_race.pit_strategy_cluster\"\
  \ AS pit_strategy_cluster FROM (SELECT\n  stops_per_race.matchidx AS \"stops_per_race.matchidx\"\
  ,\n  CASE\n    WHEN stops_per_race._count * 1.0 / NULLIF(stops_per_race.wunit_count_distinct,\
  \ 0) < 1.5\n    THEN 'Single-Stop Race'\n    WHEN stops_per_race._count * 1.0 /\
  \ NULLIF(stops_per_race.wunit_count_distinct, 0) < 2.5\n    THEN 'Standard Two-Stop'\n\
  \    ELSE 'High-Strategy Event'\n  END AS \"stops_per_race.pit_strategy_cluster\"\
  \nFROM (\n  SELECT\n    \"pit_stops.matchidx\" AS matchidx,\n    \"pit_stops._count\"\
  \ AS _count,\n    \"pit_stops.wunit_count_distinct\" AS wunit_count_distinct\n \
  \ FROM (\n    SELECT\n      pit_stops.matchidx AS \"pit_stops.matchidx\",\n    \
  \  COUNT(*) AS \"pit_stops._count\",\n      COUNT(DISTINCT pit_stops.wunit) AS \"\
  pit_stops.wunit_count_distinct\"\n    FROM pit_stops AS pit_stops\n    GROUP BY\n\
  \      pit_stops.matchidx\n  ) AS _inner\n) AS stops_per_race) AS _inner"
data_source: sports_events
columns:
- name: matchidx
  sql: matchidx
  type: DOUBLE
  primary_key: false
  description: Foreign key to races.
  hidden: false
  format:
    type: integer
- name: pit_strategy_cluster
  sql: pit_strategy_cluster
  type: TEXT
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Pit Strategy Cluster (KB #55) per race: classifies a race into 'Single-Stop\
  \ Race' (<1.5 stops/car), 'Standard Two-Stop' (1.5-2.5), 'High-Strategy Event' (>=2.5)\
  \ by Average Stops Per Car (KB #54).\n\n[kb=55]\nThree categories: 'Single-Stop\
  \ Race' (<1.5 stops), 'Standard Two-Stop' (1.5-2.5 stops), 'High-Strategy Event'\
  \ (\u22652.5 stops) \u2014 Classifies races based on average number of pit stops\
  \ per car.\n[/kb=55]"
hidden: false
meta:
  kb_id: 55
