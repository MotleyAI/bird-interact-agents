version: 5
name: driver_points_per_race
sql: "SELECT\n  ds.drive_link AS drive_link,\n  r.yr AS yr,\n  MAX(ds.acc_pt) AS season_total_points,\n\
  \  COUNT(*) AS races_completed,\n  CAST(MAX(ds.acc_pt) AS REAL) / NULLIF(COUNT(*),\
  \ 0) AS ppr\nFROM driver_standings ds\nJOIN races r ON ds.rlink = r.rak_id\nGROUP\
  \ BY ds.drive_link, r.yr"
query_variables: {}
data_source: sports_events
columns:
- name: drive_link
  sql: drive_link
  type: DOUBLE
  primary_key: false
  description: Foreign key to drivers.
  hidden: false
- name: yr
  sql: yr
  type: DOUBLE
  primary_key: false
  description: Year of the season.
  hidden: false
- name: season_total_points
  sql: season_total_points
  type: DOUBLE
  primary_key: false
  description: Driver's cumulative season points (max acc_pt across the season's standings
    rows).
  hidden: false
- name: races_completed
  sql: races_completed
  type: DOUBLE
  primary_key: false
  description: Number of races the driver has standings rows for in the season.
  hidden: false
- name: ppr
  sql: ppr
  type: DOUBLE
  primary_key: false
  description: "Driver's Points Per Race (KB #26): season_total_points / races_completed.\
    \ Measure of points-scoring efficiency.\n\n[kb=26]\nPPR = \\frac{P_{total}}{R_{completed}},\
    \ \\text{where } P_{total} \\text{ is the driver's cumulative points and } R_{completed}\
    \ \\text{ is the number of races the driver has participated in.} \u2014 Calculates\
    \ a driver's average points accumulation per race.\n[/kb=26]"
  label: Driver's Points Per Race (PPR)
  hidden: false
  meta:
    kb_id: 26
measures: []
aggregations: []
joins:
- target_model: drivers
  join_pairs:
  - - drive_link
    - drv_main
  join_type: left
filters: []
description: 'Driver''s Points Per Race (KB #26): for each (driver, season), the maximum
  cumulative season points (max acc_pt across the season) divided by the number of
  races completed (count of standings rows). Built as a single SQL block backed by
  driver_standings + races.'
hidden: false
