description: 'Qualifying to Race Pace Differential (KB #34): QRD = driver''s average
  race lap time (seconds) minus their best qualifying lap (seconds), per (race, driver).
  Built directly as a custom SQL model joining lap_times to a per-(race, driver) best-qualifying-time
  subquery. Uses KB #21 / KB #23 / KB #28.'
