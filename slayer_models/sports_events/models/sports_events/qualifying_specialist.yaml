description: "Qualifying Specialist (KB #41): one row per (race, driver) qualifying\
  \ entry; is_qualifying_specialist is TRUE iff the driver's Qualifying Time Deficit\
  \ to Pole (KB #28) is less than 0.2 seconds.\n\n[kb=41]\nA driver is a Qualifying\
  \ Specialist if their Qualifying Time Deficit to Pole is less than 0.2 seconds.\
  \ \u2014 Defines a driver who excels in qualifying but may not maintain the same\
  \ relative pace during the race.\n[/kb=41]"
