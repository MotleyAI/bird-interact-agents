- name: matchidx
  sql: matchidx
  type: DOUBLE
  primary_key: false
  description: Foreign key to races.
  hidden: false
  format:
    type: integer
- name: _count
  sql: _count
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: integer
- name: wunit_count_distinct
  sql: wunit_count_distinct
  type: DOUBLE
  primary_key: false
  description: Foreign key to drivers.
  hidden: false
  format:
    type: integer
- name: average_stops_per_car
  sql: average_stops_per_car
  type: DOUBLE
  primary_key: false
  description: 'Average Stops Per Car (KB #54): total_stops / unique_cars_with_a_pit_stop,
    per race.'
  hidden: false
- name: pit_strategy_cluster
  sql: pit_strategy_cluster
  type: TEXT
  primary_key: false
  description: 'Pit Strategy Cluster (KB #55): ''Single-Stop Race'' (<1.5), ''Standard
    Two-Stop'' (1.5-2.5), ''High-Strategy Event'' (>=2.5) by Average Stops Per Car.'
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Average Stops Per Car (KB #54) per race: (total number of pit stops)\
  \ / (number of unique cars that made a pit stop). Stage 1 aggregates pit_stops by\
  \ race; stage 2 exposes the ratio.\n\n[kb=54]\nFor a given race, this is calculated\
  \ as: (Total Number of Pit Stops) / (Number of Unique Cars that made a Pit Stop).\
  \ \u2014 Calculates the average number of pit stops undertaken by each competing\
  \ car in a single race.\n[/kb=54]"
hidden: false
meta:
  kb_id: 54
