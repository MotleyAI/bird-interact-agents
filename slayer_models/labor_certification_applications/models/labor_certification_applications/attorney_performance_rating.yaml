description: "Attorney Performance Rating per attorney (KB #52): High Performer (>95%\
  \ approval), Standard (85-95%), Underperformer (<85%). Per-attorney rows.\n\n[kb=52]\n\
  Attorneys are rated as High Performers (over 95% approval rate), Standard Performers\
  \ (85-95% approval rate), or Underperformers (below 85% approval rate), based on\
  \ their application outcomes. \u2014 Categorizes attorneys based on their application\
  \ success rates.\n[/kb=52]"
