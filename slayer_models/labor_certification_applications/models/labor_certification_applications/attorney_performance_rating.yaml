  type: DOUBLE
  primary_key: false
  description: '1 if joined case is certified, else 0. Resolved via the cases join.
    KB #24.'
  hidden: false
- name: _count
  sql: _count
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: integer
- name: approval_rate
  sql: approval_rate
  type: DOUBLE
  primary_key: false
