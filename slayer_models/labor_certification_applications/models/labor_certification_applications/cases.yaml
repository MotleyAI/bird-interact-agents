  primary_key: false
  hidden: false
- name: fulltimeind
  sql: fulltimeind
  type: string
  primary_key: false
  description: "Full-Time Position Indicator (KB #4). 'Y'/'1' = full-time (\u2265\
    35 hours/week), 'N'/'0' = part-time. May vary by employer.\n\n[kb=4]\nA full-time\
    \ position typically means employment for at least 35 hours per week, though specific\
    \ definitions may vary by employer. Non-full-time positions may include part-time\
    \ roles that require fewer hours per week. This indicator is recorded as part\
    \ of the application data. \u2014 Illustrates what defines a full-time position\
    \ in visa applications.\n[/kb=4]"
  label: Full-Time Position Indicator
  hidden: false
  meta:
    kb_id: 4
