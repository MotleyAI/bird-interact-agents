  primary_key: false
  hidden: false
- name: soccd
  sql: soccd
  type: string
  primary_key: false
  description: "Standard Occupational Classification (SOC) code (KB #7). E.g. 15-1253.00\
    \ = Software Quality Assurance Analysts and Testers; 29-1141.00 = Registered Nurses.\n\
    \n[kb=7]\nThe Standard Occupational Classification (SOC) code is a standardized\
    \ numbering system that identifies and classifies occupations. For example, 15-1253.00\
    \ represents 'Software Quality Assurance Analysts and Testers', while 29-1141.00\
    \ represents 'Registered Nurses'. These codes help ensure that foreign workers\
    \ are properly classified and paid according to their occupational category. The\
    \ SOC code is included in the job information for each application. \u2014 Illustrates\
    \ the Standard Occupational Classification system used in labor certification\
    \ applications.\n[/kb=7]"
  label: SOC Code Framework
  hidden: false
  meta:
    kb_id: 7
