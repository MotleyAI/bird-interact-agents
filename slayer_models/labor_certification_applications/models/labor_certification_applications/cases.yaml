- name: visacls
  sql: visacls
  type: string
  primary_key: false
  description: "Visa classification (KB #1). Possible values include H-1B (specialty\
    \ occupations), H-1B1 Singapore, H-1B1 Chile, E-3 Australian.\n\n[kb=1]\nThe visa\
    \ classification system includes several types: H-1B (specialty occupations requiring\
    \ theoretical and practical application of specialized knowledge), H-1B1 Singapore\
    \ (Singapore nationals in specialty occupations), H-1B1 Chile (Chilean nationals\
    \ in specialty occupations), and E-3 Australian (Australian nationals in specialty\
    \ occupations). \u2014 Illustrates the different types of work visas available\
    \ in the employment-based immigration system.\n[/kb=1]"
  label: Visa Classification Types
  hidden: false
  meta:
    kb_id: 1
