- name: h1bdep
  sql: h1bdep
  type: string
  primary_key: false
  description: "H-1B Dependency Status (KB #2). 'Yes' indicates the employer is H-1B\
    \ dependent (proportion of H-1B workers exceeds thresholds: >15% for >50 employees,\
    \ 8 workers for 26-50, 4 workers for \u226425).\n\n[kb=2]\nAn employer is considered\
    \ H-1B dependent when the proportion of H-1B workers relative to the total workforce\
    \ exceeds specific thresholds: 15% for employers with more than 50 employees,\
    \ 8 workers for employers with 26-50 employees, or 4 workers for employers with\
    \ 25 or fewer employees. H-1B dependent employers face additional attestation\
    \ requirements. This status is tracked as part of the application data. \u2014\
    \ Illustrates what it means for an employer to be H-1B dependent.\n[/kb=2]"
  label: H-1B Dependency Status
  hidden: false
  meta:
    kb_id: 2
- name: willfulv
  sql: willfulv
  type: string
  primary_key: false
  description: "Willful Violator status (KB #3). 'Yes' indicates the employer was\
    \ found by DOL to have committed a willful failure to meet LCA conditions or material\
    \ misrepresentation in the past 5 years.\n\n[kb=3]\nA willful violator is an employer\
    \ who has been found by the Department of Labor to have committed a willful failure\
    \ to meet LCA conditions or made a misrepresentation of material fact on an LCA\
    \ within the past 5 years. Such employers face additional attestation requirements\
    \ similar to H-1B dependent employers. This status is tracked as part of the application\
    \ data. \u2014 Illustrates what constitutes a willful violator designation for\
    \ employers.\n[/kb=3]"
  label: Willful Violator Status
  hidden: false
  meta:
    kb_id: 3
