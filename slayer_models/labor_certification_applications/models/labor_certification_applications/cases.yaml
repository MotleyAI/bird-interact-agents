  hidden: false
- name: decision_date
  sql: DATE(decisionday)
  type: date
  primary_key: false
  description: Decision date as a real DATE (input '2023-12-29').
  hidden: false
- name: application_processing_time
  sql: CAST(julianday(decisionday) - julianday(REPLACE(recvday, '/', '-')) AS INTEGER)
  type: number
  primary_key: false
  description: "Application Processing Time (APT, KB #12): days between recvday and\
    \ decisionday.\n\n[kb=12]\nAPT is the number of days between the date the application\
    \ is received and the date a decision is made. Both dates are recorded as part\
    \ of the application data. \u2014 Calculates the number of days between application\
    \ receipt and decision.\n[/kb=12]"
  label: Application Processing Time (APT)
  hidden: false
  meta:
    kb_id: 12
- name: recv_month
  sql: CAST(SUBSTR(recvday, 6, 2) AS INTEGER)
  type: number
  primary_key: false
  description: "Month of receipt (1-12), parsed from recvday 'YYYY/MM/DD'. Used for\
    \ KB #23/50 seasonal analysis.\n\n[kb=23]\nSAI = (Number of Applications in Month\
    \ / Average Monthly Applications). Application receipt dates are tracked as part\
    \ of the application data. \u2014 Measures the concentration of applications in\
    \ different months of the year.\n[/kb=23]"
  label: Seasonal Application Index (SAI)
  hidden: false
  meta:
    kb_id: 23
- name: is_amended
  sql: CASE WHEN amendflag > 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if amended petition. KB #37 component.\n\n[kb=37]\nACS is calculated\
    \ as a weighted sum of factors such as H-1B dependency, willful violator status,\
    \ new employment, and amendment status. Each factor is represented as a binary\
    \ indicator in the application data. \u2014 Quantifies the complexity of a visa\
    \ application based on multiple factors.\n[/kb=37]"
  label: Application Complexity Score (ACS)
  hidden: false
  meta:
    kb_id: 37
- name: is_new_employment
  sql: CASE WHEN newemp > 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if new-employment petition. KB #37 component.\n\n[kb=37]\nACS is\
    \ calculated as a weighted sum of factors such as H-1B dependency, willful violator\
    \ status, new employment, and amendment status. Each factor is represented as\
    \ a binary indicator in the application data. \u2014 Quantifies the complexity\
    \ of a visa application based on multiple factors.\n[/kb=37]"
  label: Application Complexity Score (ACS)
  hidden: false
  meta:
    kb_id: 37
- name: is_h1b_dependent_yes
  sql: CASE WHEN h1bdep = 'Yes' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if h1bdep='Yes'. KB #2 / KB #37 component.\n\n[kb=37]\nACS is calculated\
    \ as a weighted sum of factors such as H-1B dependency, willful violator status,\
    \ new employment, and amendment status. Each factor is represented as a binary\
    \ indicator in the application data. \u2014 Quantifies the complexity of a visa\
    \ application based on multiple factors.\n[/kb=37]"
  label: Application Complexity Score (ACS)
  hidden: false
  meta:
    kb_id: 37
- name: is_willful_violator_yes
  sql: CASE WHEN willfulv = 'Yes' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if willfulv='Yes'. KB #3 / KB #37 component.\n\n[kb=37]\nACS is\
    \ calculated as a weighted sum of factors such as H-1B dependency, willful violator\
    \ status, new employment, and amendment status. Each factor is represented as\
    \ a binary indicator in the application data. \u2014 Quantifies the complexity\
    \ of a visa application based on multiple factors.\n[/kb=37]"
  label: Application Complexity Score (ACS)
  hidden: false
  meta:
    kb_id: 37
- name: complexity_score
  sql: CAST(CASE WHEN h1bdep = 'Yes' THEN 1 ELSE 0 END + CASE WHEN willfulv = 'Yes'
    THEN 1 ELSE 0 END + CASE WHEN newemp > 0 THEN 1 ELSE 0 END + CASE WHEN amendflag
    > 0 THEN 1 ELSE 0 END AS INTEGER)
  type: number
  primary_key: false
  description: "Application Complexity Score (KB #37): unweighted sum of binary factors\
    \ h1bdep='Yes', willfulv='Yes', newemp>0, amendflag>0. Range 0-4. KB doesn't pin\
    \ weights so equal weights are used.\n\n[kb=37]\nACS is calculated as a weighted\
    \ sum of factors such as H-1B dependency, willful violator status, new employment,\
    \ and amendment status. Each factor is represented as a binary indicator in the\
    \ application data. \u2014 Quantifies the complexity of a visa application based\
    \ on multiple factors.\n[/kb=37]"
  label: Application Complexity Score (ACS)
  hidden: false
  meta:
    kb_id: 37
- name: complexity_tier
  sql: CASE WHEN h1bdep = 'Yes' OR willfulv = 'Yes' OR statbasis IS NOT NULL AND statbasis
    <> '' THEN 'Complex' ELSE 'Standard' END
  type: string
  primary_key: false
  description: "Application Complexity Tier (KB #51): Complex if h1bdep='Yes' OR willfulv='Yes'\
    \ OR statbasis present (special attestation), else Standard.\n\n[kb=51]\nApplications\
    \ are classified as Standard (straightforward cases), or Complex (cases involving\
    \ H-1B dependency, willful violator status, or special attestations). Complexity\
    \ factors are tracked as part of the application data. \u2014 Categorizes applications\
    \ based on their procedural complexity.\n[/kb=51]"
  label: Application Complexity Tiers
  hidden: false
  meta:
    kb_id: 51
- name: delay_risk_profile
  sql: CASE WHEN willfulv = 'Yes' OR (CAST(CASE WHEN h1bdep = 'Yes' THEN 1 ELSE 0
    END + CASE WHEN willfulv = 'Yes' THEN 1 ELSE 0 END + CASE WHEN newemp > 0 THEN
    1 ELSE 0 END + CASE WHEN amendflag > 0 THEN 1 ELSE 0 END AS INTEGER)) >= 3 THEN
    'High Risk' WHEN (CAST(CASE WHEN h1bdep = 'Yes' THEN 1 ELSE 0 END + CASE WHEN
    willfulv = 'Yes' THEN 1 ELSE 0 END + CASE WHEN newemp > 0 THEN 1 ELSE 0 END +
    CASE WHEN amendflag > 0 THEN 1 ELSE 0 END AS INTEGER)) BETWEEN 1 AND 2 THEN 'Moderate
    Risk' ELSE 'Low Risk' END
  type: string
  primary_key: false
  description: "Application Delay Risk Profile (KB #57): High Risk if willfulv='Yes'\
    \ OR ACS\u22653; Moderate if ACS in 1-2; else Low.\n\n[kb=57]\nApplications are\
    \ classified as Low Risk (no special factors), Moderate Risk (1-2 complexity factors),\
    \ or High Risk (3 or more complexity factors or from willful violators), based\
    \ on the Application Complexity Score (ACS). \u2014 Categorizes applications based\
    \ on their risk of processing delays.\n[/kb=57]"
  label: Application Delay Risk Profile
  hidden: false
  meta:
    kb_id: 57
- name: visa_filing_window
  sql: CASE WHEN beginday IS NULL OR recvday IS NULL THEN NULL WHEN CAST(julianday(REPLACE(SUBSTR(beginday,7,4)||'-'||SUBSTR(beginday,4,2)||'-'||SUBSTR(beginday,1,2),
    '/','-')) - julianday(REPLACE(recvday, '/', '-')) AS INTEGER) > 180 THEN 'Early
    Filing' WHEN CAST(julianday(REPLACE(SUBSTR(beginday,7,4)||'-'||SUBSTR(beginday,4,2)||'-'||SUBSTR(beginday,1,2),
    '/','-')) - julianday(REPLACE(recvday, '/', '-')) AS INTEGER) BETWEEN 120 AND
    180 THEN 'Optimal Window (4-6 Months)' WHEN CAST(julianday(REPLACE(SUBSTR(beginday,7,4)||'-'||SUBSTR(beginday,4,2)||'-'||SUBSTR(beginday,1,2),
    '/','-')) - julianday(REPLACE(recvday, '/', '-')) AS INTEGER) BETWEEN 30 AND 119
    THEN '1-3 Months Before' WHEN CAST(julianday(REPLACE(SUBSTR(beginday,7,4)||'-'||SUBSTR(beginday,4,2)||'-'||SUBSTR(beginday,1,2),
    '/','-')) - julianday(REPLACE(recvday, '/', '-')) AS INTEGER) BETWEEN 0 AND 29
    THEN 'Same Month' ELSE 'After Start Date' END
  type: string
  primary_key: false
  description: "Visa Filing Window (KB #41): Early Filing (>6mo), Optimal Window (4-6mo),\
    \ 1-3 Months Before, Same Month, After Start Date. beginday is in DD/MM/YYYY format.\n\
    \n[kb=41]\nThe visa filing window represents when applications are submitted relative\
    \ to the intended employment start date. Applications are categorized as: 'Optimal\
    \ Window (4-6 Months)' before start date, 'Early Filing' (more than 6 months before),\
    \ '1-3 Months Before', 'Same Month', or 'After Start Date'. These categories help\
    \ analyze filing patterns and potential processing challenges. Submission and\
    \ start dates are tracked as part of the application data. \u2014 Categorizes\
    \ the timing of visa application submissions relative to employment start date.\n\
    [/kb=41]"
  label: Visa Filing Window
  hidden: false
  meta:
    kb_id: 41
- name: naics_code
  sql: CAST(employer.employer_contact_info ->> '$.naics_code' AS INTEGER)
  type: number
  primary_key: false
  description: 'Employer NAICS code (KB #6) resolved via the employer join.'
  hidden: false
- name: naics_2digit
  sql: SUBSTR(CAST(CAST(employer.employer_contact_info ->> '$.naics_code' AS INTEGER)
    AS TEXT), 1, 2)
  type: string
  primary_key: false
  description: First 2 digits of NAICS (industry sector) via employer join.
  hidden: false
- name: asr_certified_helper
  sql: CASE WHEN LOWER(TRIM(statustag)) = 'certified' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Helper for Application Success Rate (ASR, KB #18). Same expression\
    \ as is_certified but stamped for KB #18 so the ASR measure (application_success_rate,\
    \ formula is_certified:sum * 100.0 / *:count) is discoverable by KB #18.\n\n[kb=18]\n\
    ASR = (Number of Certified Applications by Employer / Total Applications by Employer)\
    \ \xD7 100%. Employer and application status are tracked as part of the application\
    \ data. \u2014 Measures the success rate of applications by employer.\n[/kb=18]"
  label: Application Success Rate (ASR)
  hidden: true
  meta:
    kb_id: 18
- name: sad_application_helper
  sql: '1'
  type: number
  primary_key: false
  description: "Helper marking each row as one application for State Application Distribution\
    \ (SAD, KB #19). The SAD measure (state_application_distribution, formula *:count)\
    \ groups by case_worksite.wsstate or worksite.wstate; pct = count / total.\n\n\
    [kb=19]\nSAD = (Number of Applications in State / Total Number of Applications)\
    \ \xD7 100%. State information is included in the worksite data. \u2014 Measures\
    \ the percentage of applications in each state.\n[/kb=19]"
  label: State Application Distribution (SAD)
  hidden: true
  meta:
    kb_id: 19
- name: iad_application_helper
  sql: '1'
  type: number
  primary_key: false
  description: "Helper marking each row as one application for Industry Application\
    \ Distribution (IAD, KB #20). The IAD measure (industry_application_distribution,\
    \ formula *:count) groups by employer.naics_code (or naics_2digit); pct = count\
    \ / total.\n\n[kb=20]\nIAD = (Number of Applications in Industry / Total Number\
    \ of Applications) \xD7 100%. Industry is determined by the employer's NAICS code.\
    \ \u2014 Measures the percentage of applications in each industry based on NAICS\
    \ codes.\n[/kb=20]"
  label: Industry Application Distribution (IAD)
  hidden: true
  meta:
    kb_id: 20
- name: vcd_application_helper
  sql: '1'
  type: number
  primary_key: false
  description: "Helper marking each row as one application for Visa Class Distribution\
    \ (VCD, KB #29). The VCD measure (visa_class_distribution, formula *:count) groups\
    \ by visacls; pct = count / total.\n\n[kb=29]\nVCD = (Number of Applications for\
    \ Visa Class / Total Number of Applications) \xD7 100%. Visa classification is\
    \ tracked as part of the application data. \u2014 Measures the percentage distribution\
    \ of different visa classifications.\n[/kb=29]"
  label: Visa Class Distribution (VCD)
  hidden: true
  meta:
    kb_id: 29
- name: processing_efficiency_ratio
  sql: AVG(CAST(julianday(decisionday) - julianday(REPLACE(recvday, '/', '-')) AS
    INTEGER)) OVER () * 1.0 / NULLIF(CAST(julianday(decisionday) - julianday(REPLACE(recvday,
    '/', '-')) AS INTEGER), 0)
  type: number
  primary_key: false
  description: "Processing Efficiency Ratio (PER, KB #32): (global average APT) /\
    \ (this row's APT). Values >1 indicate faster than average processing.\n\n[kb=32]\n\
    PER = (Average Processing Time / Application Processing Time), where values above\
    \ 1 indicate faster than average processing. Processing time is calculated from\
    \ application receipt and decision dates. \u2014 Measures the efficiency of application\
    \ processing relative to average times.\n[/kb=32]"
  label: Processing Efficiency Ratio (PER)
  hidden: false
  meta:
    kb_id: 32
measures:
- formula: is_certified:sum * 100.0 / *:count
  name: approval_rate
  description: 'Approval Rate AR (KB #13). Use globally or per group (employer, attorney,
    state).'
- formula: is_certified:sum * 100.0 / *:count
  name: application_success_rate
  description: 'Application Success Rate by employer (KB #18). Same formula as AR;
    group by homefirm.'
- formula: is_h1b:sum * 100.0 / *:count
  name: employer_h1b_concentration
  description: 'Employer H-1B Concentration within-group share (KB #15). Group by
    homefirm.'
- formula: is_continuation:sum * 100.0 / *:count
  name: employer_retention_rate
  description: 'Employer Retention Rate (KB #25). Group by homefirm.'
- formula: has_attorney:sum * 100.0 / *:count
  name: external_counsel_rate
  description: 'External Counsel Rate (KB #26).'
- formula: is_premium_processing:sum * 100.0 / *:count
  name: premium_processing_rate
  description: 'Premium Processing Rate (KB #39).'
- formula: '*:count'
  name: visa_class_distribution
  description: 'Visa Class Distribution (KB #29): query as count by visacls; the percentage
    is computed by the agent against the total. Use group_by visacls.'
- formula: '*:count'
  name: state_application_distribution
  description: 'State Application Distribution (KB #19): count of cases per state;
    distribution computed as count / total. Group by case_worksite.wsstate (or worksite.wstate).'
- formula: '*:count'
  name: industry_application_distribution
  description: 'Industry Application Distribution (KB #20): count by NAICS-derived
    industry. Group by employer.naics_code.'
- formula: '*:count'
  name: occupational_demand_index_count
  description: "Occupational Demand Index per SOC \u2014 numerator only (KB #21).\
    \ ODI = (apps for SOC) / (avg apps per SOC); compute the avg in a follow-up query."
- formula: application_processing_time:avg
  name: average_processing_time
  description: 'Average APT (component of KB #32 PER).'
- formula: '*:count'
  name: attorney_case_load
  description: 'Attorney Case Load (KB #14): rows are cases; group by case_attorney.counselmail.
    Reachable via case_attorney join.'
- formula: '*:count'
  name: employer_scale
  description: 'Employer Scale (KB #30 numerator): count of applications per employer.
    ESI = employer_count / avg_employer_count; compute the avg in a follow-up query.'
- formula: '*:count'
  name: seasonal_application_index_numer
  description: 'Seasonal Application Index numerator (KB #23): count of applications
    per receipt month. Divide by avg monthly apps.'
