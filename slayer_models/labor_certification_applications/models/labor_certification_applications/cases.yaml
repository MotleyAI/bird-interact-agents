- name: pubdisc
  sql: pubdisc
  type: string
  primary_key: false
  description: "Public Disclosure Options (KB #10). 'Disclose Business' indicates\
    \ employer consents to public disclosure of business info; other options may restrict\
    \ to protect confidential business info.\n\n[kb=10]\nEmployers can choose whether\
    \ their business information is publicly disclosed in the visa application process.\
    \ 'Disclose Business' indicates the employer consents to having their information\
    \ publicly available, while other options may restrict disclosure to protect confidential\
    \ business information. Disclosure choices are recorded as part of the application\
    \ data. \u2014 Illustrates the choices employers have regarding public disclosure\
    \ of their business information.\n[/kb=10]"
  label: Public Disclosure Options
  hidden: false
  meta:
    kb_id: 10
