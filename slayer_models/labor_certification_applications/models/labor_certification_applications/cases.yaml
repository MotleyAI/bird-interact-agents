- name: status_norm
  sql: LOWER(TRIM(statustag))
  type: string
  primary_key: false
  description: "Lowercased+trimmed statustag for case-insensitive matching ('certified',\
    \ 'denied', 'withdrawn', 'certified-withdrawn').\n\n[kb=47]\nPossible outcomes\
    \ for a visa application include: Certified (approved), Denied (rejected), Withdrawn\
    \ (voluntarily withdrawn by applicant), and Certified-Withdrawn (approved but\
    \ later withdrawn). Application status is tracked as part of the application data.\
    \ \u2014 Defines the possible status outcomes for visa applications.\n[/kb=47]"
  label: Application Status Categories
  hidden: false
  meta:
    kb_id: 47
- name: is_certified
  sql: CASE WHEN LOWER(TRIM(statustag)) = 'certified' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if statustag='certified' (case-insensitive), else 0. Used for approval\
    \ rate (KB #13).\n\n[kb=13]\nAR = (Number of Certified Applications / Total Number\
    \ of Applications) \xD7 100%. Application status is tracked as part of the application\
    \ data. \u2014 Calculates the percentage of certified applications out of total\
    \ applications.\n[/kb=13]"
  label: Approval Rate (AR)
  hidden: false
  meta:
    kb_id: 13
- name: is_denied
  sql: CASE WHEN LOWER(TRIM(statustag)) = 'denied' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if denied else 0 (KB #47).\n\n[kb=47]\nPossible outcomes for a visa\
    \ application include: Certified (approved), Denied (rejected), Withdrawn (voluntarily\
    \ withdrawn by applicant), and Certified-Withdrawn (approved but later withdrawn).\
    \ Application status is tracked as part of the application data. \u2014 Defines\
    \ the possible status outcomes for visa applications.\n[/kb=47]"
  label: Application Status Categories
  hidden: false
  meta:
    kb_id: 47
- name: is_withdrawn
  sql: CASE WHEN LOWER(TRIM(statustag)) = 'withdrawn' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if withdrawn else 0 (KB #47).\n\n[kb=47]\nPossible outcomes for\
    \ a visa application include: Certified (approved), Denied (rejected), Withdrawn\
    \ (voluntarily withdrawn by applicant), and Certified-Withdrawn (approved but\
    \ later withdrawn). Application status is tracked as part of the application data.\
    \ \u2014 Defines the possible status outcomes for visa applications.\n[/kb=47]"
  label: Application Status Categories
  hidden: false
  meta:
    kb_id: 47
- name: is_certified_withdrawn
  sql: CASE WHEN LOWER(TRIM(statustag)) = 'certified-withdrawn' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if certified-withdrawn else 0 (KB #47).\n\n[kb=47]\nPossible outcomes\
    \ for a visa application include: Certified (approved), Denied (rejected), Withdrawn\
    \ (voluntarily withdrawn by applicant), and Certified-Withdrawn (approved but\
    \ later withdrawn). Application status is tracked as part of the application data.\
    \ \u2014 Defines the possible status outcomes for visa applications.\n[/kb=47]"
  label: Application Status Categories
  hidden: false
  meta:
    kb_id: 47
- name: is_h1b
  sql: CASE WHEN visacls = 'H-1B' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if visa class = H-1B else 0. KB #15.\n\n[kb=15]\nEHC = (Number of\
    \ H-1B Applications by Employer / Total Number of H-1B Applications) \xD7 100%.\
    \ Visa classification and employer information are tracked in the application\
    \ data. \u2014 Measures the proportion of H-1B applications submitted by an employer\
    \ relative to all applications.\n[/kb=15]"
  label: Employer H-1B Concentration (EHC)
  hidden: false
  meta:
    kb_id: 15
- name: is_continuation
  sql: CASE WHEN contemp > 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if continuation petition (contemp>0). KB #25.\n\n[kb=25]\nERR =\
    \ (Number of Continuation Applications / Total Number of Applications by Employer)\
    \ \xD7 100%. Employer and application type are tracked as part of the application\
    \ data. \u2014 Measures the percentage of continuation applications by an employer.\n\
    [/kb=25]"
  label: Employer Retention Rate (ERR)
  hidden: false
  meta:
    kb_id: 25
- name: has_attorney
  sql: CASE WHEN filekey IN (SELECT case_attorney.docketkey FROM case_attorney) THEN
    1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if case has at least one attorney. KB #26.\n\n[kb=26]\nECR = (Number\
    \ of Applications with Attorney / Total Number of Applications) \xD7 100%. Attorney\
    \ assignment is tracked as part of the application process. \u2014 Measures the\
    \ percentage of applications using external legal counsel.\n[/kb=26]"
  label: External Counsel Rate (ECR)
  hidden: false
  meta:
    kb_id: 26
- name: is_premium_processing
  sql: CASE WHEN supporth = 'Yes' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "1 if supporth='Yes'; proxy for premium processing (no explicit column).\
    \ KB #39.\n\n[kb=39]\nPPR = (Number of Premium Processing Applications / Total\
    \ Number of Applications) \xD7 100%. Premium processing status is tracked as part\
    \ of the application data. \u2014 Measures the percentage of applications using\
    \ premium processing.\n[/kb=39]"
  label: Premium Processing Rate (PPR)
  hidden: false
  meta:
    kb_id: 39
- name: recv_date
  sql: DATE(REPLACE(recvday, '/', '-'))
