version: 6
name: case_attorney
sql_table: case_attorney
query_variables: {}
data_source: labor_certification_applications
columns:
- name: docketkey
  sql: docketkey
  type: TEXT
  primary_key: true
  hidden: false
- name: counselmail
  sql: counselmail
  type: TEXT
  primary_key: true
  hidden: false
- name: counselfor
  sql: counselfor
  type: TEXT
  primary_key: false
  description: "Attorney Representation Status (KB #9). 'Yes' indicates the employer\
    \ has retained legal counsel for the visa application; otherwise self-represented.\n\
    \n[kb=9]\nAttorney representation status indicates whether an employer has legal\
    \ counsel for the visa application process. When present, it shows the employer\
    \ has retained qualified legal assistance for navigating immigration regulations.\
    \ When absent, it indicates the employer is self-represented, handling the application\
    \ process internally without specialized legal counsel. This status is tracked\
    \ as part of the application process. \u2014 Illustrates the significance of attorney\
    \ representation in visa applications.\n[/kb=9]"
  label: Attorney Representation Status
  hidden: false
  meta:
    kb_id: 9
- name: is_case_certified
  sql: CASE WHEN LOWER(TRIM(cases.statustag)) = 'certified' THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: "1 if joined case is certified, else 0. Resolved via the cases join.\
    \ KB #24.\n\n[kb=24]\nASR = (Number of Certified Applications by Attorney / Total\
    \ Applications by Attorney) \xD7 100%. Attorney assignment and application status\
    \ are tracked as part of the application process. \u2014 Measures the certification\
    \ rate of applications handled by each attorney.\n[/kb=24]"
  label: Attorney Success Rate (ASR_Attorney)
  hidden: false
  meta:
    kb_id: 24
- name: visacls
  sql: cases.visacls
  type: TEXT
  primary_key: false
  description: 'Visa class for the case (KB #1) via cases join, denormalized.'
  hidden: false
- name: acl_case_helper
  sql: docketkey
  type: TEXT
  primary_key: false
  description: "Helper for Attorney Case Load (ACL, KB #14). The ACL measure (attorney_case_load,\
    \ formula docketkey:count_distinct) counts distinct cases per attorney; group\
    \ by counselmail.\n\n[kb=14]\nACL is the total number of cases handled by each\
    \ attorney. Attorney assignment is tracked as part of the application process.\
    \ \u2014 Measures the number of cases handled by each attorney.\n[/kb=14]"
  label: Attorney Case Load (ACL)
  hidden: true
  meta:
    kb_id: 14
- name: asi_visa_class_helper
  sql: cases.visacls
  type: TEXT
  primary_key: false
  description: "Helper for Attorney Specialization Index (ASI, KB #34). ASI = 1 -\
    \ (distinct visa classes handled / total visa classes); see attorney_specialization_index\
    \ measure. Group by counselmail.\n\n[kb=34]\nASI = 1 - (Number of Different Visa\
    \ Types Handled by Attorney / Total Number of Visa Types), where values closer\
    \ to 1 indicate higher specialization. Attorney and visa type information are\
    \ tracked as part of the application process. \u2014 Measures how specialized\
    \ an attorney is in specific visa types.\n[/kb=34]"
  label: Attorney Specialization Index (ASI)
  hidden: true
  meta:
    kb_id: 34
measures:
- formula: docketkey:count_distinct
  name: attorney_case_load
  description: 'Attorney Case Load (KB #14): distinct cases handled. Group by counselmail.'
- formula: cases.visacls:count_distinct
  name: attorney_visa_types_handled
  description: 'Number of distinct visa types handled by an attorney (component of
    KB #34 ASI).'
- formula: 1.0 - cases.visacls:count_distinct * 1.0 / 4.0
  name: attorney_specialization_index
  description: 'Attorney Specialization Index (KB #34).'
- formula: is_case_certified:sum * 100.0 / *:count
  name: attorney_success_rate
  description: 'Attorney Success Rate (KB #24): % certified applications by attorney.
    Group by counselmail.'
- formula: is_case_certified:sum * 100.0 / *:count
  name: attorney_performance_rating_helper
  description: 'Helper for KB #52 Attorney Performance Rating tiers.'
aggregations: []
joins:
- target_model: attorney
  join_pairs:
  - - counselmail
    - lawmail
  join_type: left
- target_model: cases
  join_pairs:
  - - docketkey
    - filekey
  join_type: left
filters: []
description: Bridge table linking cases to attorneys (M:N). Each row indicates an
  attorney represents a case.
hidden: false
