description: "Attorney Specialization Category per attorney (KB #45). Per-attorney\
  \ rows.\n\n[kb=45]\nAttorneys are classified as Specialists (over 80% of cases in\
  \ one visa type), Generalists (even distribution across visa types), or Hybrid Practitioners\
  \ (significant experience in 2-3 visa categories). Attorney and visa type information\
  \ are tracked as part of the application process. \u2014 Categorizes attorneys based\
  \ on their visa application specialization patterns.\n[/kb=45]"
