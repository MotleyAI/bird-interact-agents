version: 3
name: prevailing_wage
sql_table: prevailing_wage
query_variables: {}
data_source: labor_certification_applications
columns:
- name: trackno
  sql: trackno
  type: string
  primary_key: true
  hidden: false
- name: wage_details
  sql: wage_details
  type: string
  primary_key: false
  description: 'JSON column. KB #5: prevailing_wage.level is one of I (entry-level),
    II (qualified), III (experienced), IV (fully competent). KB #8: offered_wage.unit
    and prevailing_wage.unit are payment units: Hour, Week, Month, Year.'
  hidden: false
  meta:
    kb_ids:
    - 5
    - 8
- name: offered_wage_unit
  sql: wage_details ->> '$.offered_wage.unit'
  type: string
  primary_key: false
  description: 'Offered wage payment unit (Hour, Week, Month, Year) (KB #8).'
  hidden: false
  meta:
    kb_id: 8
- name: prevailing_wage_unit
  sql: wage_details ->> '$.prevailing_wage.unit'
  type: string
  primary_key: false
  description: 'Prevailing wage payment unit (Hour, Week, Month, Year) (KB #8).'
  hidden: false
  meta:
    kb_id: 8
- name: prevailing_wage_level
  sql: wage_details ->> '$.prevailing_wage.level'
  type: string
  primary_key: false
  description: 'Prevailing wage level I (entry) - IV (fully competent) (KB #5).'
  hidden: false
  meta:
    kb_id: 5
- name: alternate_source_type
  sql: wage_details ->> '$.alternate_source.source_type'
  type: string
  primary_key: false
  description: 'Alternate prevailing-wage source type when not OES: CBA, Survey, etc.
    (KB #60).'
  hidden: false
  meta:
    kb_id: 60
- name: offered_wage_raw
  sql: CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$', ''), ',',
    '') AS REAL)
  type: number
  primary_key: false
  description: Numeric offered wage in its native unit (parsed from offered_wage.from
    like '$130000.00').
  hidden: false
- name: prevailing_wage_raw
  sql: CAST(REPLACE(REPLACE(REPLACE(wage_details ->> '$.prevailing_wage.value', 'USD',
    ''), ',', ''), ' ', '') AS REAL)
  type: number
  primary_key: false
  description: Numeric prevailing wage in its native unit (parsed from prevailing_wage.value
    like 'USD 116,979.00').
  hidden: false
- name: offered_wage_annual
  sql: CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$', ''), ',',
    '') AS REAL) * CASE wage_details ->> '$.offered_wage.unit' WHEN 'Hour' THEN 2080
    WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END
  type: number
  primary_key: false
  description: "Offered wage annualized: hourly\xD72080, weekly\xD752, monthly\xD7\
    12, yearly\xD71."
  hidden: false
- name: prevailing_wage_annual
  sql: CAST(REPLACE(REPLACE(REPLACE(wage_details ->> '$.prevailing_wage.value', 'USD',
    ''), ',', ''), ' ', '') AS REAL) * CASE wage_details ->> '$.prevailing_wage.unit'
    WHEN 'Hour' THEN 2080 WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN
    1 ELSE NULL END
  type: number
  primary_key: false
  description: "Prevailing wage annualized: hourly\xD72080, weekly\xD752, monthly\xD7\
    12, yearly\xD71."
  hidden: false
- name: wage_differential_rate
  sql: (CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$', ''), ',',
    '') AS REAL) * CASE wage_details ->> '$.offered_wage.unit' WHEN 'Hour' THEN 2080
    WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END - CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END) * 100.0 / NULLIF(CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END, 0)
  type: number
  primary_key: false
  description: 'Wage Differential Rate (KB #11): ((offered_annual - prevailing_annual)
    / prevailing_annual) * 100.'
  hidden: false
  meta:
    kb_id: 11
- name: wage_premium_rate
  sql: (CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$', ''), ',',
    '') AS REAL) * CASE wage_details ->> '$.offered_wage.unit' WHEN 'Hour' THEN 2080
    WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END - CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END) * 100.0 / NULLIF(CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END, 0)
  type: number
  primary_key: false
  description: 'Wage Premium Rate (KB #17): ((offered - minimum_required) / minimum_required)
    * 100. Minimum required is the prevailing wage in this dataset.'
  hidden: false
  meta:
    kb_id: 17
- name: is_premium_wage_position
  sql: (CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$', ''), ',',
    '') AS REAL) * CASE wage_details ->> '$.offered_wage.unit' WHEN 'Hour' THEN 2080
    WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END - CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END) * 100.0 / NULLIF(CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END, 0) > 20
  type: boolean
  primary_key: false
  description: 'Premium Wage Position (KB #40): true iff WDR > 20%.'
  hidden: false
  meta:
    kb_id: 40
- name: wage_competitiveness_tier
  sql: CASE WHEN (CAST(REPLACE(REPLACE(wage_details ->> '$.offered_wage.from', '$',
    ''), ',', '') AS REAL) * CASE wage_details ->> '$.offered_wage.unit' WHEN 'Hour'
    THEN 2080 WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL
    END - CAST(REPLACE(REPLACE(REPLACE(wage_details ->> '$.prevailing_wage.value',
    'USD', ''), ',', ''), ' ', '') AS REAL) * CASE wage_details ->> '$.prevailing_wage.unit'
    WHEN 'Hour' THEN 2080 WHEN 'Week' THEN 52 WHEN 'Month' THEN 12 WHEN 'Year' THEN
    1 ELSE NULL END) * 100.0 / NULLIF(CAST(REPLACE(REPLACE(REPLACE(wage_details ->>
    '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE wage_details
    ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN 52 WHEN 'Month'
    THEN 12 WHEN 'Year' THEN 1 ELSE NULL END, 0) < 0 THEN 'Below-Market' WHEN (CAST(REPLACE(REPLACE(wage_details
    ->> '$.offered_wage.from', '$', ''), ',', '') AS REAL) * CASE wage_details ->>
    '$.offered_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN 52 WHEN 'Month' THEN
    12 WHEN 'Year' THEN 1 ELSE NULL END - CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END) * 100.0 / NULLIF(CAST(REPLACE(REPLACE(REPLACE(wage_details
    ->> '$.prevailing_wage.value', 'USD', ''), ',', ''), ' ', '') AS REAL) * CASE
    wage_details ->> '$.prevailing_wage.unit' WHEN 'Hour' THEN 2080 WHEN 'Week' THEN
    52 WHEN 'Month' THEN 12 WHEN 'Year' THEN 1 ELSE NULL END, 0) <= 10 THEN 'Market-Competitive'
    ELSE 'Premium' END
  type: string
  primary_key: false
  description: "Wage Competitiveness Tier (KB #48): Below-Market (WDR<0), Market-Competitive\
    \ (0\u2264WDR\u226410), Premium (WDR>10)."
  hidden: false
  meta:
    kb_id: 48
measures: []
aggregations: []
joins: []
filters: []
description: Prevailing wage record per case. JSON column wage_details holds offered_wage
  (from/to/unit), prevailing_wage (value/unit/level/oes_year), and alternate_source.
hidden: false
