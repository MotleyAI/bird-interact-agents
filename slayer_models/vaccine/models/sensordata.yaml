- name: alerttime
  sql: alerttime
  type: string
  primary_key: false
  hidden: false
- name: alertkind
  sql: alertkind
  type: string
  primary_key: false
  hidden: false
- name: containlink
  sql: containlink
  type: string
  primary_key: false
  hidden: false
- name: vehsenseref
  sql: vehsenseref
  type: string
  primary_key: false
  hidden: false
- name: tss
  sql: (1 - COALESCE(CAST(tempdevcount AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0)) * COALESCE(tempstabidx, 1)
  type: number
  primary_key: false
  description: 'Temperature Stability Score (TSS). Overall temperature stability of
    a container, based on deviation count, critical events, and the stored stability
    index (KB #0).'
  hidden: false
  meta:
    kb_id: 0
- name: tbs
  sql: ABS(tempnowc - storetempc) / NULLIF(temptolc, 0) * tempdevcount
  type: number
  primary_key: false
  description: 'Temperature Breach Severity (TBS). Severity of temperature breaches
    as |TempNowC - StoreTempC| / TempTolC * TempDevCount (KB #9).'
  hidden: false
  meta:
    kb_id: 9
- name: hqi
  sql: (1 - COALESCE(CAST(handleevents AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0))
  type: number
  primary_key: false
  description: 'Handling Quality Index (HQI). Quality of shipment handling, based
    on handling events and critical events (KB #8).'
  hidden: false
  meta:
    kb_id: 8
- name: cri
  sql: (1 - ((1 - COALESCE(CAST(tempdevcount AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0)) * COALESCE(tempstabidx, 1))) * (1 - COALESCE(container.coolremainpct,
    0) / 100)
  type: number
  primary_key: false
  description: 'Container Risk Index (CRI). Overall risk level for a container based
    on temperature stability and coolant status: (1 - TSS) * (1 - CoolRemainPct/100)
    (KB #2). CoolRemainPct comes from the joined container row.'
  hidden: false
  meta:
    kb_id: 2
- name: trs
  sql: ((1 - ((1 - COALESCE(CAST(tempdevcount AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0)) * COALESCE(tempstabidx, 1))) * (1 - COALESCE(container.coolremainpct,
    0) / 100)) * (1 - ((1 - COALESCE(CAST(handleevents AS REAL) / 100, 0)) * (1 -
    COALESCE(CAST(critevents AS REAL) / 10, 0)))) * (1 + ABS(tempnowc - storetempc)
    / NULLIF(temptolc, 0) * tempdevcount)
  type: number
  primary_key: false
  description: 'Total Risk Score (TRS). Combined container risk and handling quality:
    CRI * (1 - HQI) * (1 + TBS) (KB #30).'
  hidden: false
  meta:
    kb_id: 30
- name: cei
  sql: ((1 - COALESCE(CAST(tempdevcount AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0)) * COALESCE(tempstabidx, 1)) * (COALESCE(container.coolremainpct,
    0) / 100.0) * (1 - ((100 - container.coolremainpct) / NULLIF(julianday('now')
    - julianday(container.refilllatest), 0)) / 20.0)
  type: number
  primary_key: false
  description: 'Coolant Efficiency Index (CEI). How efficiently coolant maintains
    temperature stability: TSS * (CoolRemainPct/100) * (1 - CDR/20) (KB #31). CDR
    and CoolRemainPct come from the joined container row.'
  hidden: false
  meta:
    kb_id: 31
- name: esf
  sql: ((1 - COALESCE(CAST(tempdevcount AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0)) * COALESCE(tempstabidx, 1)) * (1 + (ABS(tempnowc - storetempc)
    / NULLIF(temptolc, 0) * tempdevcount) / 5.0) * (((1 - COALESCE(CAST(tempdevcount
    AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents AS REAL) / 10, 0)) * COALESCE(tempstabidx,
    1)) * (COALESCE(container.coolremainpct, 0) / 100.0) * (1 - ((100 - container.coolremainpct)
    / NULLIF(julianday('now') - julianday(container.refilllatest), 0)) / 20.0)) *
    (1 + ABS(tempnowc - storetempc) / NULLIF(temptolc, 0))
  type: number
  primary_key: false
  description: 'Environmental Stress Factor (ESF). Combined environmental stressors
    on vaccine stability: TSS * (1 + TBS/5) * CEI * (1 + |TempNowC - StoreTempC|/TempTolC)
    (KB #53).'
  hidden: false
  meta:
    kb_id: 53
- name: is_stable_transport
  sql: CASE WHEN ((1 - COALESCE(CAST(handleevents AS REAL) / 100, 0)) * (1 - COALESCE(CAST(critevents
    AS REAL) / 10, 0))) > 0.9 AND ((1 - COALESCE(CAST(tempdevcount AS REAL) / 100,
    0)) * (1 - COALESCE(CAST(critevents AS REAL) / 10, 0)) * COALESCE(tempstabidx,
    1)) > 0.8 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'Stable Transport flag. True when HQI > 0.9 AND TSS > 0.8 (KB #14).'
  hidden: false
  meta:
    kb_id: 14
- name: is_temperature_alert
  sql: CASE WHEN (ABS(tempnowc - storetempc) / NULLIF(temptolc, 0) * tempdevcount)
    > 2.0 AND tempdevcount > 5 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: 'Temperature Alert flag. True when TBS > 2.0 AND TempDevCount > 5 (KB
    #16).'
  hidden: false
  meta:
    kb_id: 16
measures: []
aggregations: []
joins:
- target_model: container
  join_pairs:
  - - containlink
    - containregistry
  join_type: left
- target_model: transportinfo
  join_pairs:
  - - vehsenseref
    - vehiclereg
  join_type: left
filters: []
description: "Time-series sensor measurements (temperature, humidity, shock, light,\
  \ alerts) for one container/vehicle. ReadingInterval (KB #60) \u2014 the time between\
  \ successive temperature readings in this dataset \u2014 is treated as a fixed 15\
  \ minutes by convention (acceptable range 5-60 minutes) and is used as a denominator\
  \ when normalising rates of temperature change (e.g. in TSC, KB #50)."
hidden: false
meta:
  kb_id: 60
