  source_model: sensordata
  measures:
  - formula: cri:max
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  source_model:
    source_name: cri_per_container
    columns:
    - name: risk_rank
      type: number
      sql: RANK() OVER (ORDER BY cri_max DESC)
  dimensions:
