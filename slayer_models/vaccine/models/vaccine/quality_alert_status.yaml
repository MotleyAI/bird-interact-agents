description: "Quality Alert Status (KB #46). One row per vaccinedetails record with\
  \ is_quality_alert_status boolean = QMI < 0.3 AND VSI < 0.5. QMI (KB #37) and VSI\
  \ (KB #39) are computed inline from per-shipment / per-container peer aggregates.\n\
  \n[kb=46]\nA status where QMI < 0.3 and VSI < 0.5 \u2014 Identifies severe quality\
  \ issues.\n[/kb=46]"
