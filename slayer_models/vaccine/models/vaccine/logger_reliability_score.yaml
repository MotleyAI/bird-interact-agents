description: "Logger Reliability Score (LRS, KB #34). One row per container with LRS\
  \ = LHI * (1 - CMR) * TSS, where LHI (KB #6) and CMR (KB #32) are computed inline\
  \ (CMR uses MCS from regulatoryandmaintenance, TBS from sensordata, LHI from datalogger)\
  \ and TSS (KB #0) is averaged over sensordata rows for the container. The Logger\
  \ Critical State classification (KB #45) lives on a sibling model `logger_critical_state`.\n\
  \n[kb=34]\nLRS = \text{LHI} \\times (1 - \\text{CMR}) \\times \\text{TSS} \u2014\
  \ Comprehensive score for logger reliability.\n[/kb=34]"
