description: "Critical Safety Condition (KB #49). One row per shipment with is_critical_safety_condition\
  \ boolean = VSI < 0.3 AND TSR < 0.4. VSI (KB #39) is averaged across the shipment's\
  \ vaccinedetails records (per-record VSI computed inline). TSR (KB #35) is computed\
  \ per shipment from the joined transportinfo row using per-vehicle aggregates of\
  \ TRS (KB #30) and HQI (KB #8) over sensordata.\n\n[kb=49]\nA condition where VSI\
  \ < 0.3 and TSR < 0.4 \u2014 Identifies critically unsafe overall conditions.\n\
  [/kb=49]"
