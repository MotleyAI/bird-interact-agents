description: "Quality Maintenance Index (QMI, KB #37). One row per vaccinedetails\
  \ record with QMI = MCS * SQI * (1 - TBS/10), where MCS (KB #7) is averaged over\
  \ regulatoryandmaintenance rows for the vaccine's shipment, SQI (KB #33) is computed\
  \ inline from VVP/HQI/CRI, and TBS (KB #9) is averaged over sensordata rows for\
  \ the container. The High Maintenance Priority (KB #42) and Quality Alert Status\
  \ (KB #46) classifications live on sibling models `high_maintenance_priority` and\
  \ `quality_alert_status`.\n\n[kb=37]\nQMI = \\text{MCS} \\times \\text{SQI} \\times\
  \ (1 - \\frac{\\text{TBS}}{10}) \u2014 Combined quality and maintenance metric.\n\
  [/kb=37]"
