description: "Logistics Performance Metric (LPM, KB #54). One row per vehicle with\
  \ LPM = RCP * HQI / sqrt(1 + TRS), where RCP (KB #4) is on transportinfo and HQI\
  \ (KB #8) and TRS (KB #30) are averaged over sensordata rows for the vehicle.\n\n\
  [kb=54]\nLPM = \\text{RCP} \\cdot \\frac{\\text{HQI}}{\\sqrt{1 + \\text{TRS}}} \u2014\
  \ Evaluates overall logistics efficiency with temporal considerations.\n[/kb=54]"
hidden: false
