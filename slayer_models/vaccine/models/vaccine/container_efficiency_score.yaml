query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.containvac\"\
  \ AS containvac, \"vaccinedetails.ser\" AS ser, \"vaccinedetails.cei_cri_per_container.cei\"\
  \ AS cei_cri_per_container__cei, \"vaccinedetails.cei_cri_per_container.cri\" AS\
  \ cei_cri_per_container__cri, \"vaccinedetails.ces\" AS ces FROM (SELECT\n  vaccinedetails.vacregistry\
  \ AS \"vaccinedetails.vacregistry\",\n  vaccinedetails.containvac AS \"vaccinedetails.containvac\"\
  ,\n  CAST(vaccinedetails.vialtally AS REAL) * 10 / NULLIF(container.volliters, 0)\
  \ AS \"vaccinedetails.ser\",\n  cei_cri_per_container.cei AS \"vaccinedetails.cei_cri_per_container.cei\"\
  ,\n  cei_cri_per_container.cri AS \"vaccinedetails.cei_cri_per_container.cri\",\n\
  \  vaccinedetails.ser * cei_cri_per_container.cei * (\n    1 - cei_cri_per_container.cri\n\
  \  ) AS \"vaccinedetails.ces\"\nFROM vaccinedetails AS vaccinedetails\nLEFT JOIN\
  \ container AS container\n  ON vaccinedetails.containvac = container.containregistry\n\
  LEFT JOIN (\n  (\n    SELECT\n      \"sensordata.containlink\" AS containlink,\n\
  \      \"sensordata.cei\" AS cei,\n      \"sensordata.cri\" AS cri\n    FROM (\n\
  \      SELECT\n        sensordata.containlink AS \"sensordata.containlink\",\n \
  \       AVG(\n          (\n            (\n              1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n            ) * (\n              1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n            ) * COALESCE(sensordata.tempstabidx, 1)\n     \
  \     ) * (\n            COALESCE(container.coolremainpct, 0) / 100.0\n        \
  \  ) * (\n            1 - (\n              (\n                100 - container.coolremainpct\n\
  \              ) / NULLIF(JULIANDAY('now') - JULIANDAY(container.refilllatest),\
  \ 0)\n            ) / 20.0\n          )\n        ) AS \"sensordata.cei\",\n    \
  \    AVG(\n          (\n            1 - (\n              (\n                1 -\
  \ COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100, 0)\n              ) * (\n\
  \                1 - COALESCE(CAST(sensordata.critevents AS REAL) / 10, 0)\n   \
  \           ) * COALESCE(sensordata.tempstabidx, 1)\n            )\n          )\
  \ * (\n            1 - COALESCE(container.coolremainpct, 0) / 100\n          )\n\
  \        ) AS \"sensordata.cri\"\n      FROM sensordata AS sensordata\n      LEFT\
  \ JOIN container AS container\n        ON sensordata.containlink = container.containregistry\n\
  \      GROUP BY\n        sensordata.containlink\n    ) AS _inner\n  )\n) AS cei_cri_per_container\n\
  \  ON vaccinedetails.containvac = cei_cri_per_container.containlink) AS _inner"
