description: "Container Efficiency Score (CES, KB #36). One row per vaccinedetails\
  \ record with CES = SER * CEI * (1 - CRI), where SER (KB #5) is on vaccinedetails\
  \ and CEI (KB #31), CRI (KB #2) are averaged over sensordata rows for the container.\
  \ The Severe Container Risk (KB #41) and Container Alert Status (KB #48) classifications\
  \ live on sibling models `severe_container_risk` and `container_alert_status`.\n\
  \n[kb=36]\nCES = \\text{SER} \\times \\text{CEI} \\times (1 - \\text{CRI}) \u2014\
  \ Overall container efficiency considering multiple metrics.\n[/kb=36]"
