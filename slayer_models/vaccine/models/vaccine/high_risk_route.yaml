version: 4
name: high_risk_route
source_queries:
- version: 3
  name: cri_per_vehicle
  source_model: sensordata
  measures:
  - formula: cri:max
    name: cri
  dimensions:
  - name: vehsenseref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: cri_per_vehicle
      join_pairs:
      - - vehiclereg
        - vehsenseref
    columns:
    - name: is_high_risk_route
      type: boolean
      sql: CASE WHEN (CAST(distdonekm AS REAL) / NULLIF(distdonekm + distleftkm, 0)
        * 100) < 50 AND cri_per_vehicle.cri > 0.4 THEN 1 ELSE 0 END
  dimensions:
  - name: vehiclereg
  - name: rcp
  - name: cri
    model: cri_per_vehicle
  - name: is_high_risk_route
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.rcp\"\
  \ AS rcp, \"transportinfo.cri_per_vehicle.cri\" AS cri_per_vehicle__cri, \"transportinfo.is_high_risk_route\"\
  \ AS is_high_risk_route FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\"\
  ,\n  CAST(transportinfo.distdonekm AS REAL) / NULLIF(transportinfo.distdonekm +\
  \ transportinfo.distleftkm, 0) * 100 AS \"transportinfo.rcp\",\n  cri_per_vehicle.cri\
  \ AS \"transportinfo.cri_per_vehicle.cri\",\n  CASE\n    WHEN (\n      CAST(transportinfo.distdonekm\
  \ AS REAL) / NULLIF(transportinfo.distdonekm + transportinfo.distleftkm, 0) * 100\n\
  \    ) < 50\n    AND cri_per_vehicle.cri > 0.4\n    THEN 1\n    ELSE 0\n  END AS\
  \ \"transportinfo.is_high_risk_route\"\nFROM transportinfo AS transportinfo\nLEFT\
  \ JOIN (\n  (\n    SELECT\n      \"sensordata.vehsenseref\" AS vehsenseref,\n  \
  \    \"sensordata.cri\" AS cri\n    FROM (\n      SELECT\n        sensordata.vehsenseref\
  \ AS \"sensordata.vehsenseref\",\n        MAX(\n          (\n            1 - (\n\
  \              (\n                1 - COALESCE(CAST(sensordata.tempdevcount AS REAL)\
  \ / 100, 0)\n              ) * (\n                1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n              ) * COALESCE(sensordata.tempstabidx, 1)\n   \
  \         )\n          ) * (\n            1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n          )\n        ) AS \"sensordata.cri\"\n      FROM sensordata\
  \ AS sensordata\n      LEFT JOIN container AS container\n        ON sensordata.containlink\
  \ = container.containregistry\n      GROUP BY\n        sensordata.vehsenseref\n\
  \    ) AS _inner\n  )\n) AS cri_per_vehicle\n  ON transportinfo.vehiclereg = cri_per_vehicle.vehsenseref)\
  \ AS _inner"
data_source: vaccine
columns:
- name: vehiclereg
  sql: vehiclereg
  type: string
  primary_key: false
  hidden: false
- name: rcp
  sql: rcp
  type: number
  primary_key: false
  description: 'Route Completion Percentage (RCP). Percentage of route completed:
    DistDoneKm / (DistDoneKm + DistLeftKm) * 100 (KB #4).'
  hidden: false
- name: cri_per_vehicle__cri
  sql: cri_per_vehicle__cri
  type: number
  primary_key: false
  hidden: false
- name: is_high_risk_route
  sql: is_high_risk_route
  type: boolean
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "High-Risk Route status (KB #12). One row per vehicle/route (transportinfo)\
  \ with RCP (Route Completion Percentage, KB #4) and the per-vehicle max CRI (Container\
  \ Risk Index, KB #2) aggregated from sensordata, plus is_high_risk_route boolean\
  \ = RCP < 50 AND CRI > 0.4. RCP and CRI live on peer children of container; the\
  \ per-vehicle CRI is aggregated from sensordata via the vehsenseref FK to transportinfo\
  \ before the composite predicate is evaluated.\n\n[kb=12]\nA route where RCP < 50%\
  \ and CRI > 0.4 \u2014 Identifies high-risk transportation routes.\n[/kb=12]"
hidden: false
meta:
  kb_id: 12
