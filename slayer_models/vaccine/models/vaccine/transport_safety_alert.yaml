version: 6
name: transport_safety_alert
source_queries:
- version: 3
  name: trs_cei_hqi_per_vehicle_tsa
  source_model: sensordata
  measures:
  - formula: trs:avg
    name: trs
  - formula: cei:avg
    name: cei
  - formula: hqi:avg
    name: hqi
  dimensions:
  - name: vehsenseref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: trs_cei_hqi_per_vehicle_tsa
      join_pairs:
      - - vehiclereg
        - vehsenseref
    columns:
    - name: rrf
      type: DOUBLE
      sql: (1 - rcp / 100.0) * trs_cei_hqi_per_vehicle_tsa.trs * (1 - trs_cei_hqi_per_vehicle_tsa.cei)
    - name: tsr
      type: DOUBLE
      sql: rcp / 100.0 * (1 - trs_cei_hqi_per_vehicle_tsa.trs) * trs_cei_hqi_per_vehicle_tsa.hqi
    - name: is_transport_safety_alert
      type: BOOLEAN
      sql: CASE WHEN (rcp / 100.0 * (1 - trs_cei_hqi_per_vehicle_tsa.trs) * trs_cei_hqi_per_vehicle_tsa.hqi)
        < 0.5 AND ((1 - rcp / 100.0) * trs_cei_hqi_per_vehicle_tsa.trs * (1 - trs_cei_hqi_per_vehicle_tsa.cei))
        > 0.7 THEN 1 ELSE 0 END
  dimensions:
  - name: vehiclereg
  - name: rrf
  - name: tsr
  - name: is_transport_safety_alert
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.rrf\"\
  \ AS rrf, \"transportinfo.tsr\" AS tsr, \"transportinfo.is_transport_safety_alert\"\
  \ AS is_transport_safety_alert FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\"\
  ,\n  (\n    1 - transportinfo.rcp / 100.0\n  ) * trs_cei_hqi_per_vehicle_tsa.trs\
  \ * (\n    1 - trs_cei_hqi_per_vehicle_tsa.cei\n  ) AS \"transportinfo.rrf\",\n\
  \  transportinfo.rcp / 100.0 * (\n    1 - trs_cei_hqi_per_vehicle_tsa.trs\n  ) *\
  \ trs_cei_hqi_per_vehicle_tsa.hqi AS \"transportinfo.tsr\",\n  CASE\n    WHEN (\n\
  \      transportinfo.rcp / 100.0 * (\n        1 - trs_cei_hqi_per_vehicle_tsa.trs\n\
  \      ) * trs_cei_hqi_per_vehicle_tsa.hqi\n    ) < 0.5\n    AND (\n      (\n  \
  \      1 - transportinfo.rcp / 100.0\n      ) * trs_cei_hqi_per_vehicle_tsa.trs\
  \ * (\n        1 - trs_cei_hqi_per_vehicle_tsa.cei\n      )\n    ) > 0.7\n    THEN\
  \ 1\n    ELSE 0\n  END AS \"transportinfo.is_transport_safety_alert\"\nFROM transportinfo\
  \ AS transportinfo\nLEFT JOIN (\n  (\n    SELECT\n      \"sensordata.vehsenseref\"\
  \ AS vehsenseref,\n      \"sensordata.trs\" AS trs,\n      \"sensordata.cei\" AS\
  \ cei,\n      \"sensordata.hqi\" AS hqi\n    FROM (\n      SELECT\n        sensordata.vehsenseref\
  \ AS \"sensordata.vehsenseref\",\n        AVG(\n          (\n            (\n   \
  \           1 - (\n                (\n                  1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n                ) * (\n                  1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n                ) * COALESCE(sensordata.tempstabidx, 1)\n \
  \             )\n            ) * (\n              1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n            )\n          ) * (\n            1 - (\n              (\n\
  \                1 - COALESCE(CAST(sensordata.handleevents AS REAL) / 100, 0)\n\
  \              ) * (\n                1 - COALESCE(CAST(sensordata.critevents AS\
  \ REAL) / 10, 0)\n              )\n            )\n          ) * (\n            1\
  \ + ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n          )\n        ) AS \"sensordata.trs\",\n\
  \        AVG(\n          (\n            (\n              1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n            ) * (\n              1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n            ) * COALESCE(sensordata.tempstabidx, 1)\n     \
  \     ) * (\n            COALESCE(container.coolremainpct, 0) / 100.0\n        \
  \  ) * (\n            1 - (\n              (\n                100 - container.coolremainpct\n\
  \              ) / NULLIF(JULIANDAY('now') - JULIANDAY(container.refilllatest),\
  \ 0)\n            ) / 20.0\n          )\n        ) AS \"sensordata.cei\",\n    \
  \    AVG(\n          (\n            1 - COALESCE(CAST(sensordata.handleevents AS\
  \ REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          )\n        ) AS \"sensordata.hqi\"\n      FROM sensordata\
  \ AS sensordata\n      LEFT JOIN container AS container\n        ON sensordata.containlink\
  \ = container.containregistry\n      GROUP BY\n        sensordata.vehsenseref\n\
  \    ) AS _inner\n  )\n) AS trs_cei_hqi_per_vehicle_tsa\n  ON transportinfo.vehiclereg\
  \ = trs_cei_hqi_per_vehicle_tsa.vehsenseref) AS _inner"
