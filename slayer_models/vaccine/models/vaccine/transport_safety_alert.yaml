description: "Transport Safety Alert (KB #47). One row per vehicle with is_transport_safety_alert\
  \ boolean = TSR < 0.5 AND RRF > 0.7. TSR (KB #35) and RRF (KB #38) are computed\
  \ inline from RCP (transportinfo) and per-vehicle averages of TRS (KB #30), CEI\
  \ (KB #31), HQI (KB #8) over sensordata.\n\n[kb=47]\nA condition where TSR < 0.5\
  \ and RRF > 0.7 \u2014 Identifies unsafe transport conditions.\n[/kb=47]"
