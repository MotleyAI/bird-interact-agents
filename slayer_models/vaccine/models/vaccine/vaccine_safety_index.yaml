description: "Vaccine Safety Index (VSI, KB #39). One row per vaccinedetails record\
  \ with VSI = VVP / 365 * CEI * (1 - TRS), where VVP (KB #3) is computed inline as\
  \ (ExpireDay - Current_Date) * avg(TSS) per container, CEI (KB #31), TRS (KB #30)\
  \ are averaged over sensordata rows for the container. The Unsafe Vaccine Condition\
  \ classification (KB #44) lives on a sibling model `unsafe_vaccine_condition`.\n\
  \n[kb=39]\nVSI = \\frac{\text{VVP}}{365} \\times \\text{CEI} \\times (1 - \\text{TRS})\
  \ \u2014 Overall safety index for vaccine shipment.\n[/kb=39]"
