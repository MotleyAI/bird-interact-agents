version: 5
name: quality_compromise_status
source_queries:
- version: 3
  name: tss_per_container
  source_model: sensordata
  measures:
  - formula: tss:avg
    name: tss
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  source_model:
    source_name: vaccinedetails
    joins:
    - target_model: tss_per_container
      join_pairs:
      - - containvac
        - containlink
    columns:
    - name: vvp_value
      type: DOUBLE
      sql: (julianday(expireday) - julianday('now')) * tss_per_container.tss
    - name: is_quality_compromise
      type: BOOLEAN
      sql: CASE WHEN ((julianday(expireday) - julianday('now')) * tss_per_container.tss)
        < 30 OR vaccine_shipments.qualcheck = 'Failed' THEN 1 ELSE 0 END
  dimensions:
  - name: vacregistry
  - name: shipinject
  - name: containvac
  - name: vvp_value
  - name: qualcheck
    model: vaccine_shipments
  - name: is_quality_compromise
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.shipinject\"\
  \ AS shipinject, \"vaccinedetails.containvac\" AS containvac, \"vaccinedetails.vvp_value\"\
  \ AS vvp_value, \"vaccinedetails.vaccine_shipments.qualcheck\" AS vaccine_shipments__qualcheck,\
  \ \"vaccinedetails.is_quality_compromise\" AS is_quality_compromise FROM (SELECT\n\
  \  vaccinedetails.vacregistry AS \"vaccinedetails.vacregistry\",\n  vaccinedetails.shipinject\
  \ AS \"vaccinedetails.shipinject\",\n  vaccinedetails.containvac AS \"vaccinedetails.containvac\"\
  ,\n  (\n    JULIANDAY(vaccinedetails.expireday) - JULIANDAY('now')\n  ) * tss_per_container.tss\
  \ AS \"vaccinedetails.vvp_value\",\n  vaccine_shipments.qualcheck AS \"vaccinedetails.vaccine_shipments.qualcheck\"\
  ,\n  CASE\n    WHEN (\n      (\n        JULIANDAY(vaccinedetails.expireday) - JULIANDAY('now')\n\
  \      ) * tss_per_container.tss\n    ) < 30\n    OR vaccine_shipments.qualcheck\
  \ = 'Failed'\n    THEN 1\n    ELSE 0\n  END AS \"vaccinedetails.is_quality_compromise\"\
  \nFROM vaccinedetails AS vaccinedetails\nLEFT JOIN shipments AS vaccine_shipments\n\
  \  ON vaccinedetails.shipinject = vaccine_shipments.shipmentregistry\nLEFT JOIN\
  \ (\n  (\n    SELECT\n      \"sensordata.containlink\" AS containlink,\n      \"\
  sensordata.tss\" AS tss\n    FROM (\n      SELECT\n        sensordata.containlink\
  \ AS \"sensordata.containlink\",\n        AVG(\n          (\n            1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          ) * COALESCE(sensordata.tempstabidx, 1)\n       \
  \ ) AS \"sensordata.tss\"\n      FROM sensordata AS sensordata\n      GROUP BY\n\
  \        sensordata.containlink\n    ) AS _inner\n  )\n) AS tss_per_container\n\
  \  ON vaccinedetails.containvac = tss_per_container.containlink) AS _inner"
data_source: vaccine
