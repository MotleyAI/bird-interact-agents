description: "Quality Compromise status (KB #19). One row per vaccinedetails record\
  \ with VVP (computed inline as (ExpireDay - Current_Date) * avg(TSS) per container,\
  \ KB #3) and the shipment's QualCheck, plus is_quality_compromise boolean = VVP\
  \ < 30 OR QualCheck = 'Failed'.\n\n[kb=19]\nA shipment where VVP < 30 or QualCheck='Failed'\
  \ \u2014 Identifies quality-compromised shipments.\n[/kb=19]"
