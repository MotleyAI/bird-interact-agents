version: 5
name: route_risk_factor
source_queries:
- version: 3
  name: trs_cei_per_vehicle
  source_model: sensordata
  measures:
  - formula: trs:avg
    name: trs
  - formula: cei:avg
    name: cei
  dimensions:
  - name: vehsenseref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: trs_cei_per_vehicle
      join_pairs:
      - - vehiclereg
        - vehsenseref
    columns:
    - name: rrf
      type: DOUBLE
      sql: (1 - rcp / 100.0) * trs_cei_per_vehicle.trs * (1 - trs_cei_per_vehicle.cei)
  dimensions:
  - name: vehiclereg
  - name: rcp
  - name: trs
    model: trs_cei_per_vehicle
  - name: cei
    model: trs_cei_per_vehicle
  - name: rrf
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.rcp\"\
  \ AS rcp, \"transportinfo.trs_cei_per_vehicle.trs\" AS trs_cei_per_vehicle__trs,\
  \ \"transportinfo.trs_cei_per_vehicle.cei\" AS trs_cei_per_vehicle__cei, \"transportinfo.rrf\"\
  \ AS rrf FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\"\
  ,\n  CAST(transportinfo.distdonekm AS REAL) / NULLIF(transportinfo.distdonekm +\
  \ transportinfo.distleftkm, 0) * 100 AS \"transportinfo.rcp\",\n  trs_cei_per_vehicle.trs\
  \ AS \"transportinfo.trs_cei_per_vehicle.trs\",\n  trs_cei_per_vehicle.cei AS \"\
  transportinfo.trs_cei_per_vehicle.cei\",\n  (\n    1 - transportinfo.rcp / 100.0\n\
  \  ) * trs_cei_per_vehicle.trs * (\n    1 - trs_cei_per_vehicle.cei\n  ) AS \"transportinfo.rrf\"\
  \nFROM transportinfo AS transportinfo\nLEFT JOIN (\n  (\n    SELECT\n      \"sensordata.vehsenseref\"\
  \ AS vehsenseref,\n      \"sensordata.trs\" AS trs,\n      \"sensordata.cei\" AS\
  \ cei\n    FROM (\n      SELECT\n        sensordata.vehsenseref AS \"sensordata.vehsenseref\"\
  ,\n        AVG(\n          (\n            (\n              1 - (\n             \
  \   (\n                  1 - COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100,\
  \ 0)\n                ) * (\n                  1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n                ) * COALESCE(sensordata.tempstabidx, 1)\n \
  \             )\n            ) * (\n              1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n            )\n          ) * (\n            1 - (\n              (\n\
  \                1 - COALESCE(CAST(sensordata.handleevents AS REAL) / 100, 0)\n\
  \              ) * (\n                1 - COALESCE(CAST(sensordata.critevents AS\
  \ REAL) / 10, 0)\n              )\n            )\n          ) * (\n            1\
  \ + ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n          )\n        ) AS \"sensordata.trs\",\n\
  \        AVG(\n          (\n            (\n              1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n            ) * (\n              1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n            ) * COALESCE(sensordata.tempstabidx, 1)\n     \
  \     ) * (\n            COALESCE(container.coolremainpct, 0) / 100.0\n        \
  \  ) * (\n            1 - (\n              (\n                100 - container.coolremainpct\n\
  \              ) / NULLIF(JULIANDAY('now') - JULIANDAY(container.refilllatest),\
  \ 0)\n            ) / 20.0\n          )\n        ) AS \"sensordata.cei\"\n     \
  \ FROM sensordata AS sensordata\n      LEFT JOIN container AS container\n      \
  \  ON sensordata.containlink = container.containregistry\n      GROUP BY\n     \
  \   sensordata.vehsenseref\n    ) AS _inner\n  )\n) AS trs_cei_per_vehicle\n  ON\
  \ transportinfo.vehiclereg = trs_cei_per_vehicle.vehsenseref) AS _inner"
data_source: vaccine
