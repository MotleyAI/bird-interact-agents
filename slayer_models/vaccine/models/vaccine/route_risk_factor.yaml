  primary_key: false
  description: 'Route Completion Percentage (RCP). Percentage of route completed:
    DistDoneKm / (DistDoneKm + DistLeftKm) * 100 (KB #4).'
  hidden: false
- name: trs_cei_per_vehicle__trs
  sql: trs_cei_per_vehicle__trs
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
- name: trs_cei_per_vehicle__cei
  sql: trs_cei_per_vehicle__cei
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: float
- name: rrf
  sql: rrf
  type: DOUBLE
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Route Risk Factor (RRF, KB #38). One row per vehicle with RRF = (1 -\
  \ RCP/100) * TRS * (1 - CEI), where RCP (KB #4) is on transportinfo and TRS (KB\
  \ #30), CEI (KB #31) are averaged over sensordata rows for the vehicle. The Critical\
  \ Route Status (KB #43) and Transport Safety Alert (KB #47) classifications (both\
  \ depending on TSR alongside RRF) live on sibling models `critical_route_status`\
  \ and `transport_safety_alert`.\n\n[kb=38]\nRRF = (1 - \\frac{\text{RCP}}{100})\
  \ \\times \\text{TRS} \\times (1 - \\text{CEI}) \u2014 Comprehensive route risk\
  \ assessment.\n[/kb=38]"
hidden: false
meta:
  kb_id: 38
