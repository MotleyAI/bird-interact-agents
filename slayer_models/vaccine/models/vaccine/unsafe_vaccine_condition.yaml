description: "Unsafe Vaccine Condition (KB #44). One row per vaccinedetails record\
  \ with is_unsafe_vaccine_condition boolean = VSI < 0.4 AND CES < 0.5. VSI (KB #39)\
  \ and CES (KB #36) are computed inline from per-container peer aggregates of TSS\
  \ / CEI / TRS / CRI plus SER on vaccinedetails.\n\n[kb=44]\nA condition where VSI\
  \ < 0.4 and CES < 0.5 \u2014 Identifies potentially compromised vaccines.\n[/kb=44]"
