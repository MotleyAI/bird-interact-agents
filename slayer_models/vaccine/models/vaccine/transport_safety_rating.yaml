version: 6
name: transport_safety_rating
source_queries:
- version: 3
  name: trs_hqi_per_vehicle
  source_model: sensordata
  measures:
  - formula: trs:avg
    name: trs
  - formula: hqi:avg
    name: hqi
  dimensions:
  - name: vehsenseref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: trs_hqi_per_vehicle
      join_pairs:
      - - vehiclereg
        - vehsenseref
    columns:
    - name: tsr
      type: DOUBLE
      sql: rcp / 100.0 * (1 - trs_hqi_per_vehicle.trs) * trs_hqi_per_vehicle.hqi
  dimensions:
  - name: vehiclereg
  - name: rcp
  - name: trs
    model: trs_hqi_per_vehicle
  - name: hqi
    model: trs_hqi_per_vehicle
  - name: tsr
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.rcp\"\
  \ AS rcp, \"transportinfo.trs_hqi_per_vehicle.trs\" AS trs_hqi_per_vehicle__trs,\
  \ \"transportinfo.trs_hqi_per_vehicle.hqi\" AS trs_hqi_per_vehicle__hqi, \"transportinfo.tsr\"\
  \ AS tsr FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\"\
  ,\n  CAST(transportinfo.distdonekm AS REAL) / NULLIF(transportinfo.distdonekm +\
  \ transportinfo.distleftkm, 0) * 100 AS \"transportinfo.rcp\",\n  trs_hqi_per_vehicle.trs\
  \ AS \"transportinfo.trs_hqi_per_vehicle.trs\",\n  trs_hqi_per_vehicle.hqi AS \"\
  transportinfo.trs_hqi_per_vehicle.hqi\",\n  transportinfo.rcp / 100.0 * (\n    1\
  \ - trs_hqi_per_vehicle.trs\n  ) * trs_hqi_per_vehicle.hqi AS \"transportinfo.tsr\"\
  \nFROM transportinfo AS transportinfo\nLEFT JOIN (\n  (\n    SELECT\n      \"sensordata.vehsenseref\"\
  \ AS vehsenseref,\n      \"sensordata.trs\" AS trs,\n      \"sensordata.hqi\" AS\
  \ hqi\n    FROM (\n      SELECT\n        sensordata.vehsenseref AS \"sensordata.vehsenseref\"\
  ,\n        AVG(\n          (\n            (\n              1 - (\n             \
  \   (\n                  1 - COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100,\
  \ 0)\n                ) * (\n                  1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n                ) * COALESCE(sensordata.tempstabidx, 1)\n \
  \             )\n            ) * (\n              1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n            )\n          ) * (\n            1 - (\n              (\n\
  \                1 - COALESCE(CAST(sensordata.handleevents AS REAL) / 100, 0)\n\
  \              ) * (\n                1 - COALESCE(CAST(sensordata.critevents AS\
  \ REAL) / 10, 0)\n              )\n            )\n          ) * (\n            1\
  \ + ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n          )\n        ) AS \"sensordata.trs\",\n\
  \        AVG(\n          (\n            1 - COALESCE(CAST(sensordata.handleevents\
  \ AS REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          )\n        ) AS \"sensordata.hqi\"\n      FROM sensordata\
  \ AS sensordata\n      LEFT JOIN container AS container\n        ON sensordata.containlink\
  \ = container.containregistry\n      GROUP BY\n        sensordata.vehsenseref\n\
  \    ) AS _inner\n  )\n) AS trs_hqi_per_vehicle\n  ON transportinfo.vehiclereg =\
  \ trs_hqi_per_vehicle.vehsenseref) AS _inner"
