  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Transport Safety Rating (TSR, KB #35). One row per vehicle with TSR\
  \ = RCP / 100 * (1 - TRS) * HQI, where RCP (KB #4) is on transportinfo and TRS (KB\
  \ #30) and HQI (KB #8) are averaged over sensordata rows for the vehicle. The Critical\
  \ Transport Condition classification (KB #40) lives on a sibling model `critical_transport_condition`.\n\
  \n[kb=35]\nTSR = \\frac{\\text{RCP}}{100} \\times (1 - \\text{TRS}) \\times \\text{HQI}\
  \ \u2014 Safety rating for transport considering multiple factors.\n[/kb=35]"
hidden: false
