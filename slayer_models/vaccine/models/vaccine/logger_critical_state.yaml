description: "Logger Critical State (KB #45). One row per container with is_logger_critical_state\
  \ boolean = LRS < 0.3 AND CMR > 0.8. LRS (KB #34) and CMR (KB #32) are computed\
  \ inline from per-container peer aggregates of MCS / TBS / LHI / TSS.\n\n[kb=45]\n\
  A logger where LRS < 0.3 and CMR > 0.8 \u2014 Identifies critically failing loggers.\n\
  [/kb=45]"
