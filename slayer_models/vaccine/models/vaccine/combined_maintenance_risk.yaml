version: 6
name: combined_maintenance_risk
source_queries:
- version: 3
  name: mcs_per_shipment
  source_model: regulatoryandmaintenance
  measures:
  - formula: mcs:avg
    name: mcs
  dimensions:
  - name: shipgov
  whole_periods_only: false
- version: 3
  name: tbs_per_container
  source_model: sensordata
  measures:
  - formula: tbs:avg
    name: tbs
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  name: lhi_per_container
  source_model: datalogger
  measures:
  - formula: lhi:avg
    name: lhi
  dimensions:
  - name: containlog
  whole_periods_only: false
- version: 3
  source_model:
    source_name: container
    joins:
    - target_model: mcs_per_shipment
      join_pairs:
      - - shipown
        - shipgov
    - target_model: tbs_per_container
      join_pairs:
      - - containregistry
        - containlink
    - target_model: lhi_per_container
      join_pairs:
      - - containregistry
        - containlog
    columns:
    - name: cmr
      type: DOUBLE
      sql: (1 - mcs_per_shipment.mcs) * (1 + tbs_per_container.tbs / 5.0) * (1 - lhi_per_container.lhi)
  dimensions:
  - name: containregistry
  - name: shipown
  - name: mcs
    model: mcs_per_shipment
  - name: tbs
    model: tbs_per_container
  - name: lhi
    model: lhi_per_container
  - name: cmr
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"container.containregistry\" AS containregistry, \"container.shipown\"\
  \ AS shipown, \"container.mcs_per_shipment.mcs\" AS mcs_per_shipment__mcs, \"container.tbs_per_container.tbs\"\
  \ AS tbs_per_container__tbs, \"container.lhi_per_container.lhi\" AS lhi_per_container__lhi,\
  \ \"container.cmr\" AS cmr FROM (SELECT\n  container.containregistry AS \"container.containregistry\"\
  ,\n  container.shipown AS \"container.shipown\",\n  mcs_per_shipment.mcs AS \"container.mcs_per_shipment.mcs\"\
  ,\n  tbs_per_container.tbs AS \"container.tbs_per_container.tbs\",\n  lhi_per_container.lhi\
  \ AS \"container.lhi_per_container.lhi\",\n  (\n    1 - mcs_per_shipment.mcs\n \
  \ ) * (\n    1 + tbs_per_container.tbs / 5.0\n  ) * (\n    1 - lhi_per_container.lhi\n\
  \  ) AS \"container.cmr\"\nFROM container AS container\nLEFT JOIN (\n  (\n    SELECT\n\
  \      \"sensordata.containlink\" AS containlink,\n      \"sensordata.tbs\" AS tbs\n\
  \    FROM (\n      SELECT\n        sensordata.containlink AS \"sensordata.containlink\"\
  ,\n        AVG(\n          ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n        ) AS \"sensordata.tbs\"\n      FROM sensordata\
  \ AS sensordata\n      GROUP BY\n        sensordata.containlink\n    ) AS _inner\n\
  \  )\n) AS tbs_per_container\n  ON container.containregistry = tbs_per_container.containlink\n\
  LEFT JOIN (\n  (\n    SELECT\n      \"datalogger.containlog\" AS containlog,\n \
  \     \"datalogger.lhi\" AS lhi\n    FROM (\n      SELECT\n        datalogger.containlog\
  \ AS \"datalogger.containlog\",\n        AVG(\n          container.batterypct /\
  \ 100.0 * (\n            1 - COALESCE(CAST(datalogger.memusepct AS REAL) / 100,\
  \ 0)\n          ) * COALESCE(datalogger.datapct, 0) / 100.0\n        ) AS \"datalogger.lhi\"\
  \n      FROM datalogger AS datalogger\n      LEFT JOIN container AS container\n\
  \        ON datalogger.containlog = container.containregistry\n      GROUP BY\n\
  \        datalogger.containlog\n    ) AS _inner\n  )\n) AS lhi_per_container\n \
  \ ON container.containregistry = lhi_per_container.containlog\nLEFT JOIN (\n  (\n\
  \    SELECT\n      \"regulatoryandmaintenance.shipgov\" AS shipgov,\n      \"regulatoryandmaintenance.mcs\"\
  \ AS mcs\n    FROM (\n      SELECT\n        regulatoryandmaintenance.shipgov AS\
  \ \"regulatoryandmaintenance.shipgov\",\n        AVG(\n          regulatoryandmaintenance.compscore\
  \ * (\n            1 - COALESCE(CAST(regulatoryandmaintenance.incidents AS REAL)\
  \ / 10, 0)\n          )\n        ) AS \"regulatoryandmaintenance.mcs\"\n      FROM\
  \ regulatoryandmaintenance AS regulatoryandmaintenance\n      GROUP BY\n       \
  \ regulatoryandmaintenance.shipgov\n    ) AS _inner\n  )\n) AS mcs_per_shipment\n\
  \  ON container.shipown = mcs_per_shipment.shipgov) AS _inner"
