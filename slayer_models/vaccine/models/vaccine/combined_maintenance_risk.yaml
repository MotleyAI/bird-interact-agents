description: "Combined Maintenance Risk (CMR, KB #32). One row per container with\
  \ CMR = (1 - MCS) * (1 + TBS/5) * (1 - LHI), where MCS (KB #7) is averaged over\
  \ regulatoryandmaintenance rows for the container's shipment, TBS (KB #9) is averaged\
  \ over sensordata rows for the container, and LHI (KB #6) is averaged over datalogger\
  \ rows for the container.\n\n[kb=32]\nCMR = (1 - \\text{MCS}) \\times (1 + \\frac{\\\
  text{TBS}}{5}) \\times (1 - \\text{LHI}) \u2014 Evaluates overall maintenance risk\
  \ considering compliance and incidents.\n[/kb=32]"
