version: 6
name: vaccine_viability_period
source_queries:
- version: 3
  name: tss_per_container
  source_model: sensordata
  measures:
  - formula: tss:avg
    name: tss
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  source_model:
    source_name: vaccinedetails
    joins:
    - target_model: tss_per_container
      join_pairs:
      - - containvac
        - containlink
    columns:
    - name: days_to_expire
      type: DOUBLE
      sql: julianday(expireday) - julianday('now')
  measures:
  - formula: days_to_expire:max * tss_per_container.tss:max
    name: vvp
  dimensions:
  - name: vacregistry
  - name: containvac
  - name: expireday
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.containvac\"\
  \ AS containvac, \"vaccinedetails.expireday\" AS expireday, \"vaccinedetails.days_to_expire_max\"\
  \ AS days_to_expire_max, \"vaccinedetails.vvp\" AS vvp, \"vaccinedetails.tss_per_container.tss_max\"\
  \ AS tss_per_container__tss_max FROM (WITH _base AS (\nSELECT\n  vaccinedetails.vacregistry\
  \ AS \"vaccinedetails.vacregistry\",\n  vaccinedetails.containvac AS \"vaccinedetails.containvac\"\
  ,\n  vaccinedetails.expireday AS \"vaccinedetails.expireday\",\n  MAX(JULIANDAY(vaccinedetails.expireday)\
  \ - JULIANDAY('now')) AS \"vaccinedetails.days_to_expire_max\"\nFROM vaccinedetails\
  \ AS vaccinedetails\nGROUP BY\n  vaccinedetails.vacregistry,\n  vaccinedetails.containvac,\n\
  \  vaccinedetails.expireday\n),\n_cm_vaccinedetails__tss_per_container__tss_max\
  \ AS (\nSELECT\n  MAX(tss_per_container.tss) AS \"vaccinedetails.tss_per_container.tss_max\"\
  \nFROM (\n  SELECT\n    \"sensordata.containlink\" AS containlink,\n    \"sensordata.tss\"\
  \ AS tss\n  FROM (\n    SELECT\n      sensordata.containlink AS \"sensordata.containlink\"\
  ,\n      AVG(\n        (\n          1 - COALESCE(CAST(sensordata.tempdevcount AS\
  \ REAL) / 100, 0)\n        ) * (\n          1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n        ) * COALESCE(sensordata.tempstabidx, 1)\n      ) AS\
  \ \"sensordata.tss\"\n    FROM sensordata AS sensordata\n    GROUP BY\n      sensordata.containlink\n\
  \  ) AS _inner\n) AS tss_per_container\n),\n_combined AS (\nSELECT _base.\"vaccinedetails.vacregistry\"\
  , _base.\"vaccinedetails.containvac\", _base.\"vaccinedetails.expireday\", _base.\"\
  vaccinedetails.days_to_expire_max\", _cm_vaccinedetails__tss_per_container__tss_max.\"\
  vaccinedetails.tss_per_container.tss_max\"\nFROM _base\nCROSS JOIN _cm_vaccinedetails__tss_per_container__tss_max\n\
  ),\nstep1 AS (\nSELECT\n    \"vaccinedetails.containvac\",\n    \"vaccinedetails.days_to_expire_max\"\
  ,\n    \"vaccinedetails.expireday\",\n    \"vaccinedetails.tss_per_container.tss_max\"\
  ,\n    \"vaccinedetails.vacregistry\",\n    \"vaccinedetails.days_to_expire_max\"\
  \ * \"vaccinedetails.tss_per_container.tss_max\" AS \"vaccinedetails.vvp\"\nFROM\
  \ _combined\n)\nSELECT\n    \"vaccinedetails.containvac\",\n    \"vaccinedetails.days_to_expire_max\"\
  ,\n    \"vaccinedetails.expireday\",\n    \"vaccinedetails.tss_per_container.tss_max\"\
  ,\n    \"vaccinedetails.vacregistry\",\n    \"vaccinedetails.vvp\"\nFROM step1)\
  \ AS _inner"
