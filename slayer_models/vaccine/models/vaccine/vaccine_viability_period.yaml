description: "Vaccine Viability Period (VVP). Remaining viable days for vaccines considering\
  \ temperature deviations: VVP = (ExpireDay - Current_Date) * TSS, where TSS is the\
  \ average Temperature Stability Score over sensordata rows for the vaccine's container\
  \ (KB #3). Each row is one vaccinedetails record.\n\n[kb=3]\nVVP = (ExpireDay -\
  \ Current_Date) \\times TSS \u2014 Calculates remaining viable days for vaccines\
  \ considering temperature deviations.\n[/kb=3]"
