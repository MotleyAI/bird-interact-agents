description: "Efficient Container status (KB #18). One row per container with the\
  \ per-container average SER (Storage Efficiency Ratio, KB #5) and average TSS (Temperature\
  \ Stability Score, KB #0), plus is_efficient_container boolean = SER > 0.8 AND TSS\
  \ > 0.9. SER and TSS live on peer children of container (vaccinedetails / sensordata)\
  \ and are aggregated per container before the composite predicate is evaluated.\n\
  \n[kb=18]\nA container where SER > 0.8 and TSS > 0.9 \u2014 Identifies efficiently\
  \ utilized containers.\n[/kb=18]"
