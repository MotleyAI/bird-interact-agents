description: "Container Alert Status (KB #48). One row per vaccinedetails record with\
  \ is_container_alert boolean = CES < 0.4 AND TRS > 0.7. CES (KB #36) is computed\
  \ inline from SER (vaccinedetails) and per-container averages of CEI (KB #31), CRI\
  \ (KB #2), TRS (KB #30) over sensordata.\n\n[kb=48]\nA status where CES < 0.4 and\
  \ TRS > 0.7 \u2014 Identifies containers requiring urgent attention.\n[/kb=48]"
