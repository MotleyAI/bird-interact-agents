- name: mcs
  sql: compscore * (1 - COALESCE(CAST(incidents AS REAL) / 10, 0))
  type: number
  primary_key: false
  description: "Maintenance Compliance Score (MCS). Compliance with maintenance schedules:\
    \ CompScore * (1 - Incidents/10) (KB #7).\n\n[kb=7]\nMCS = CompScore \\times (1\
    \ - \\frac{Incidents}{10}) \u2014 Calculates compliance with maintenance schedules.\n\
    [/kb=7]"
  label: Maintenance Compliance Score (MCS)
  hidden: false
  meta:
    kb_id: 7
- name: is_maintenance_due
  sql: CASE WHEN (compscore * (1 - COALESCE(CAST(incidents AS REAL) / 10, 0))) < 0.7
    AND (julianday('now') > julianday(maintdatenext) OR julianday('now') > julianday(calibdatenext))
    THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Maintenance Due flag. True when MCS < 0.7 AND (Current_Date > MaintDateNext\
    \ OR Current_Date > CalibDateNext) (KB #13).\n\n[kb=13]\nEquipment where MCS <\
    \ 0.7 and (Current_Date > MaintDateNext or Current_Date > CalibDateNext) \u2014\
    \ Identifies equipment requiring maintenance.\n[/kb=13]"
  label: Maintenance Due
  hidden: false
  meta:
    kb_id: 13
- name: days_overdue
  sql: MAX(julianday('now') - julianday(maintdatenext), julianday('now') - julianday(calibdatenext),
    0)
  type: number
  primary_key: false
  description: "Days Overdue. Number of days past the scheduled maintenance or calibration\
    \ date: max(Current_Date - MaintDateNext, Current_Date - CalibDateNext, 0) (KB\
    \ #61).\n\n[kb=61]\nDaysOverdue = \\max\\left( (\\text{Current_Date} - \\text{MaintDateNext}),\
    \ (\\text{Current_Date} - \\text{CalibDateNext}), 0 \\right) \u2014 Calculates\
    \ the number of days past the scheduled maintenance or calibration date.\n[/kb=61]"
  label: Days Overdue
  hidden: false
  meta:
    kb_id: 61
