description: "Severe Container Risk (KB #41). One row per vaccinedetails record with\
  \ is_severe_container_risk boolean = CES < 0.3 AND CEI < 0.5. CES (KB #36) is computed\
  \ inline from SER (vaccinedetails) and per-container averages of CEI (KB #31) and\
  \ CRI (KB #2) over sensordata.\n\n[kb=41]\nA container where CES < 0.3 and CEI <\
  \ 0.5 \u2014 Identifies containers with severe combined risks.\n[/kb=41]"
