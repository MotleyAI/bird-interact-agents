version: 4
name: severe_container_risk
source_queries:
- version: 3
  name: cei_cri_per_container_scr
  source_model: sensordata
  measures:
  - formula: cei:avg
    name: cei
  - formula: cri:avg
    name: cri
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  source_model:
    source_name: vaccinedetails
    joins:
    - target_model: cei_cri_per_container_scr
      join_pairs:
      - - containvac
        - containlink
    columns:
    - name: ces
      type: number
      sql: ser * cei_cri_per_container_scr.cei * (1 - cei_cri_per_container_scr.cri)
    - name: is_severe_container_risk
      type: boolean
      sql: CASE WHEN (ser * cei_cri_per_container_scr.cei * (1 - cei_cri_per_container_scr.cri))
        < 0.3 AND cei_cri_per_container_scr.cei < 0.5 THEN 1 ELSE 0 END
  dimensions:
  - name: vacregistry
  - name: containvac
  - name: ces
  - name: is_severe_container_risk
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.containvac\"\
  \ AS containvac, \"vaccinedetails.ces\" AS ces, \"vaccinedetails.is_severe_container_risk\"\
  \ AS is_severe_container_risk FROM (SELECT\n  vaccinedetails.vacregistry AS \"vaccinedetails.vacregistry\"\
  ,\n  vaccinedetails.containvac AS \"vaccinedetails.containvac\",\n  vaccinedetails.ser\
  \ * cei_cri_per_container_scr.cei * (\n    1 - cei_cri_per_container_scr.cri\n \
  \ ) AS \"vaccinedetails.ces\",\n  CASE\n    WHEN (\n      vaccinedetails.ser * cei_cri_per_container_scr.cei\
  \ * (\n        1 - cei_cri_per_container_scr.cri\n      )\n    ) < 0.3\n    AND\
  \ cei_cri_per_container_scr.cei < 0.5\n    THEN 1\n    ELSE 0\n  END AS \"vaccinedetails.is_severe_container_risk\"\
  \nFROM vaccinedetails AS vaccinedetails\nLEFT JOIN (\n  (\n    SELECT\n      \"\
  sensordata.containlink\" AS containlink,\n      \"sensordata.cei\" AS cei,\n   \
  \   \"sensordata.cri\" AS cri\n    FROM (\n      SELECT\n        sensordata.containlink\
  \ AS \"sensordata.containlink\",\n        AVG(\n          (\n            (\n   \
  \           1 - COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100, 0)\n     \
  \       ) * (\n              1 - COALESCE(CAST(sensordata.critevents AS REAL) /\
  \ 10, 0)\n            ) * COALESCE(sensordata.tempstabidx, 1)\n          ) * (\n\
  \            COALESCE(container.coolremainpct, 0) / 100.0\n          ) * (\n   \
  \         1 - (\n              (\n                100 - container.coolremainpct\n\
  \              ) / NULLIF(JULIANDAY('now') - JULIANDAY(container.refilllatest),\
  \ 0)\n            ) / 20.0\n          )\n        ) AS \"sensordata.cei\",\n    \
  \    AVG(\n          (\n            1 - (\n              (\n                1 -\
  \ COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100, 0)\n              ) * (\n\
  \                1 - COALESCE(CAST(sensordata.critevents AS REAL) / 10, 0)\n   \
  \           ) * COALESCE(sensordata.tempstabidx, 1)\n            )\n          )\
  \ * (\n            1 - COALESCE(container.coolremainpct, 0) / 100\n          )\n\
  \        ) AS \"sensordata.cri\"\n      FROM sensordata AS sensordata\n      LEFT\
  \ JOIN container AS container\n        ON sensordata.containlink = container.containregistry\n\
  \      GROUP BY\n        sensordata.containlink\n    ) AS _inner\n  )\n) AS cei_cri_per_container_scr\n\
  \  ON vaccinedetails.containvac = cei_cri_per_container_scr.containlink) AS _inner"
