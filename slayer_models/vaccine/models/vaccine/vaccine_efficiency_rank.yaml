version: 6
name: vaccine_efficiency_rank
source_queries:
- version: 3
  source_model:
    source_name: vaccinedetails
    columns:
    - name: efficiency_rank
      type: DOUBLE
      sql: RANK() OVER (ORDER BY CAST(vialtally AS REAL) * 10 / NULLIF(container.volliters,
        0) DESC)
  dimensions:
  - name: vacregistry
  - name: ser
  - name: efficiency_rank
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.ser\"\
  \ AS ser, \"vaccinedetails.efficiency_rank\" AS efficiency_rank FROM (SELECT\n \
  \ vaccinedetails.vacregistry AS \"vaccinedetails.vacregistry\",\n  CAST(vialtally\
  \ AS REAL) * 10 / NULLIF(container.volliters, 0) AS \"vaccinedetails.ser\",\n  RANK()\
  \ OVER (ORDER BY CAST(vialtally AS REAL) * 10 / NULLIF(container.volliters, 0) DESC)\
  \ AS \"vaccinedetails.efficiency_rank\"\nFROM vaccinedetails AS vaccinedetails\n\
  LEFT JOIN container AS container\n  ON vaccinedetails.containvac = container.containregistry)\
  \ AS _inner"
data_source: vaccine
