- name: vacregistry
  sql: vacregistry
  type: DOUBLE
  primary_key: false
  hidden: false
  format:
    type: integer
- name: ser
  sql: ser
  type: DOUBLE
  primary_key: false
  description: 'Storage Efficiency Ratio (SER). How efficiently container volume is
    utilized: VialTally * 10 / VolLiters (KB #5). Reaches container.volliters via
    the FK join.'
  hidden: false
- name: efficiency_rank
  sql: efficiency_rank
  type: DOUBLE
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Vaccine Efficiency Rank (KB #63). Vaccine-detail rows ranked in descending\
  \ order of SER (Storage Efficiency Ratio = VialTally * 10 / VolLiters). Backing\
  \ query joins vaccinedetails to container for VolLiters and computes the rank window-function.\n\
  \n[kb=63]\nRank assigned to containers based on descending order of SER \u2014 Ranks\
  \ containers based on their storage efficiency.\n[/kb=63]"
