description: "Container Health Status (KB #10). Four-level classification per container\
  \ based on CRI (KB #2), avg/min TSS (KB #0), and max TBS (KB #9) over sensordata\
  \ readings in the past 1 year (filtered by alerttime). Levels (evaluated in order,\
  \ first match wins): Critical (CRI > 0.6 OR current min TSS < 0.4); Stable (avg\
  \ TSS >= 0.7 AND max TBS <= 1.0); Unstable (avg TSS < 0.4 OR max TBS > 1.5); Moderate\
  \ (avg TSS >= 0.4 AND max TBS <= 1.5). The 'past 1 year' window is encoded as the\
  \ stage filter alerttime >= date('now', '-1 year'); switch to an R-VAR anchor variable\
  \ if the agent prefers explicit anchor-date control.\n\n[kb=10]\nFour-level classification\
  \ based on CRI, TSS, and TBS:\n- Critical: CRI > 0.6 OR current TSS < 0.4\n- Unstable:\
  \ Average TSS < 0.4 OR maximum TBS > 1.5 over the past 1 year, and not Critical\n\
  - Moderate: Average TSS >= 0.4 AND maximum TBS <= 1.5 over the past 1 year, and\
  \ not Critical\n- Stable: Average TSS >= 0.7 AND maximum TBS <= 1.0 over the past\
  \ 1 year, and not Critical \u2014 Classifies containers based on overall risk and\
  \ temperature stability to prioritize immediate action and monitor operational trends.\n\
  [/kb=10]"
