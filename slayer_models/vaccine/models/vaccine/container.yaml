- name: cdr
  sql: (100 - coolremainpct) / NULLIF(julianday('now') - julianday(refilllatest),
    0)
  type: number
  primary_key: false
  description: "Coolant Depletion Rate (CDR). How quickly coolant is being depleted,\
    \ in percentage points per day: (100 - CoolRemainPct) / (Current_Date - RefillLatest)\
    \ (KB #1).\n\n[kb=1]\nCDR = \\frac{100 - CoolRemainPct}{(Current_Date - RefillLatest)}\
    \ \u2014 Measures how quickly the coolant is being depleted.\n[/kb=1]"
  label: Coolant Depletion Rate (CDR)
  hidden: false
  meta:
    kb_id: 1
- name: is_coolant_critical
  sql: CASE WHEN ((100 - coolremainpct) / NULLIF(julianday('now') - julianday(refilllatest),
    0)) > 1 AND coolremainpct < 30 THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Coolant Critical flag. True when CDR > 1 AND CoolRemainPct < 30 (KB\
    \ #17).\n\n[kb=17]\nA condition where CDR > 1 and CoolRemainPct < 30 \u2014 Identifies\
    \ critical coolant conditions.\n[/kb=17]"
  label: Coolant Critical
  hidden: false
  meta:
    kb_id: 17
