version: 4
name: critical_transport_condition
source_queries:
- version: 3
  name: trs_hqi_per_vehicle_ctc
  source_model: sensordata
  measures:
  - formula: trs:avg
    name: trs
  - formula: hqi:avg
    name: hqi
  dimensions:
  - name: vehsenseref
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: trs_hqi_per_vehicle_ctc
      join_pairs:
      - - vehiclereg
        - vehsenseref
    columns:
    - name: tsr
      type: number
      sql: rcp / 100.0 * (1 - trs_hqi_per_vehicle_ctc.trs) * trs_hqi_per_vehicle_ctc.hqi
    - name: is_critical_transport_condition
      type: boolean
      sql: CASE WHEN (rcp / 100.0 * (1 - trs_hqi_per_vehicle_ctc.trs) * trs_hqi_per_vehicle_ctc.hqi)
        < 0.4 AND trs_hqi_per_vehicle_ctc.trs > 0.6 THEN 1 ELSE 0 END
  dimensions:
  - name: vehiclereg
  - name: tsr
  - name: is_critical_transport_condition
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.tsr\"\
  \ AS tsr, \"transportinfo.is_critical_transport_condition\" AS is_critical_transport_condition\
  \ FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\",\n  transportinfo.rcp\
  \ / 100.0 * (\n    1 - trs_hqi_per_vehicle_ctc.trs\n  ) * trs_hqi_per_vehicle_ctc.hqi\
  \ AS \"transportinfo.tsr\",\n  CASE\n    WHEN (\n      transportinfo.rcp / 100.0\
  \ * (\n        1 - trs_hqi_per_vehicle_ctc.trs\n      ) * trs_hqi_per_vehicle_ctc.hqi\n\
  \    ) < 0.4\n    AND trs_hqi_per_vehicle_ctc.trs > 0.6\n    THEN 1\n    ELSE 0\n\
  \  END AS \"transportinfo.is_critical_transport_condition\"\nFROM transportinfo\
  \ AS transportinfo\nLEFT JOIN (\n  (\n    SELECT\n      \"sensordata.vehsenseref\"\
  \ AS vehsenseref,\n      \"sensordata.trs\" AS trs,\n      \"sensordata.hqi\" AS\
  \ hqi\n    FROM (\n      SELECT\n        sensordata.vehsenseref AS \"sensordata.vehsenseref\"\
  ,\n        AVG(\n          (\n            (\n              1 - (\n             \
  \   (\n                  1 - COALESCE(CAST(sensordata.tempdevcount AS REAL) / 100,\
  \ 0)\n                ) * (\n                  1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n                ) * COALESCE(sensordata.tempstabidx, 1)\n \
  \             )\n            ) * (\n              1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n            )\n          ) * (\n            1 - (\n              (\n\
  \                1 - COALESCE(CAST(sensordata.handleevents AS REAL) / 100, 0)\n\
  \              ) * (\n                1 - COALESCE(CAST(sensordata.critevents AS\
  \ REAL) / 10, 0)\n              )\n            )\n          ) * (\n            1\
  \ + ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n          )\n        ) AS \"sensordata.trs\",\n\
  \        AVG(\n          (\n            1 - COALESCE(CAST(sensordata.handleevents\
  \ AS REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          )\n        ) AS \"sensordata.hqi\"\n      FROM sensordata\
  \ AS sensordata\n      LEFT JOIN container AS container\n        ON sensordata.containlink\
  \ = container.containregistry\n      GROUP BY\n        sensordata.vehsenseref\n\
  \    ) AS _inner\n  )\n) AS trs_hqi_per_vehicle_ctc\n  ON transportinfo.vehiclereg\
  \ = trs_hqi_per_vehicle_ctc.vehsenseref) AS _inner"
data_source: vaccine
columns:
- name: vehiclereg
  sql: vehiclereg
  type: string
  primary_key: false
  hidden: false
- name: tsr
  sql: tsr
  type: number
  primary_key: false
  hidden: false
- name: is_critical_transport_condition
  sql: is_critical_transport_condition
  type: boolean
  primary_key: false
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Critical Transport Condition (KB #40). One row per vehicle with is_critical_transport_condition\
  \ boolean = TSR < 0.4 AND TRS > 0.6. TSR is computed from RCP (KB #4) on transportinfo\
  \ and per-vehicle averages of TRS (KB #30) and HQI (KB #8) over sensordata.\n\n\
  [kb=40]\nA transport condition where TSR < 0.4 and TRS > 0.6 \u2014 Identifies critically\
  \ unsafe transport conditions.\n[/kb=40]"
hidden: false
meta:
  kb_id: 40
