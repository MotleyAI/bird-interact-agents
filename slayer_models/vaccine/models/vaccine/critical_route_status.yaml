description: "Critical Route Status (KB #43). One row per vehicle with is_critical_route_status\
  \ boolean = RRF > 0.8 AND TSR < 0.3. RRF (KB #38) and TSR (KB #35) are computed\
  \ inline from RCP (transportinfo) and per-vehicle averages of TRS (KB #30), CEI\
  \ (KB #31), HQI (KB #8) over sensordata.\n\n[kb=43]\nA route where RRF > 0.8 and\
  \ TSR < 0.3 \u2014 Identifies routes with critical risk levels.\n[/kb=43]"
