description: "High Maintenance Priority (KB #42). One row per vaccinedetails record\
  \ with is_high_maintenance_priority boolean = CMR > 0.7 AND QMI < 0.4. CMR (KB #32)\
  \ and QMI (KB #37) are computed inline from per-shipment / per-container peer aggregates\
  \ of MCS / TBS / LHI / TSS / HQI / CRI.\n\n[kb=42]\nEquipment where CMR > 0.7 and\
  \ QMI < 0.4 \u2014 Identifies equipment requiring urgent maintenance.\n[/kb=42]"
