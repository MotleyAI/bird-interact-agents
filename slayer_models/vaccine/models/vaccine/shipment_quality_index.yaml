description: "Shipment Quality Index (SQI, KB #33). One row per vaccinedetails record\
  \ with SQI = VVP / 365 * HQI * (1 - CRI), where VVP (KB #3) is computed inline as\
  \ (ExpireDay - Current_Date) * avg(TSS) per container, HQI (KB #8) and CRI (KB #2)\
  \ are averaged over sensordata rows for the container.\n\n[kb=33]\nSQI = \\frac{\\\
  text{VVP}}{365} \\times \\text{HQI} \\times (1 - \\text{CRI}) \u2014 Overall quality\
  \ score for shipment considering multiple factors.\n[/kb=33]"
