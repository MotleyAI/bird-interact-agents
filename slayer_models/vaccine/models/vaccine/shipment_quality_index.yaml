query_variables: {}
backing_query_sql: "SELECT \"vaccinedetails.vacregistry\" AS vacregistry, \"vaccinedetails.containvac\"\
  \ AS containvac, \"vaccinedetails.tss_per_container_sqi.tss\" AS tss_per_container_sqi__tss,\
  \ \"vaccinedetails.tss_per_container_sqi.hqi\" AS tss_per_container_sqi__hqi, \"\
  vaccinedetails.tss_per_container_sqi.cri\" AS tss_per_container_sqi__cri, \"vaccinedetails.sqi\"\
  \ AS sqi FROM (SELECT\n  vaccinedetails.vacregistry AS \"vaccinedetails.vacregistry\"\
  ,\n  vaccinedetails.containvac AS \"vaccinedetails.containvac\",\n  tss_per_container_sqi.tss\
  \ AS \"vaccinedetails.tss_per_container_sqi.tss\",\n  tss_per_container_sqi.hqi\
  \ AS \"vaccinedetails.tss_per_container_sqi.hqi\",\n  tss_per_container_sqi.cri\
  \ AS \"vaccinedetails.tss_per_container_sqi.cri\",\n  (\n    (\n      JULIANDAY(vaccinedetails.expireday)\
  \ - JULIANDAY('now')\n    ) * tss_per_container_sqi.tss\n  ) / 365.0 * tss_per_container_sqi.hqi\
  \ * (\n    1 - tss_per_container_sqi.cri\n  ) AS \"vaccinedetails.sqi\"\nFROM vaccinedetails\
  \ AS vaccinedetails\nLEFT JOIN (\n  (\n    SELECT\n      \"sensordata.containlink\"\
  \ AS containlink,\n      \"sensordata.tss\" AS tss,\n      \"sensordata.hqi\" AS\
  \ hqi,\n      \"sensordata.cri\" AS cri\n    FROM (\n      SELECT\n        sensordata.containlink\
  \ AS \"sensordata.containlink\",\n        AVG(\n          (\n            1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          ) * COALESCE(sensordata.tempstabidx, 1)\n       \
  \ ) AS \"sensordata.tss\",\n        AVG(\n          (\n            1 - COALESCE(CAST(sensordata.handleevents\
  \ AS REAL) / 100, 0)\n          ) * (\n            1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n          )\n        ) AS \"sensordata.hqi\",\n        AVG(\n\
  \          (\n            1 - (\n              (\n                1 - COALESCE(CAST(sensordata.tempdevcount\
  \ AS REAL) / 100, 0)\n              ) * (\n                1 - COALESCE(CAST(sensordata.critevents\
  \ AS REAL) / 10, 0)\n              ) * COALESCE(sensordata.tempstabidx, 1)\n   \
  \         )\n          ) * (\n            1 - COALESCE(container.coolremainpct,\
  \ 0) / 100\n          )\n        ) AS \"sensordata.cri\"\n      FROM sensordata\
  \ AS sensordata\n      LEFT JOIN container AS container\n        ON sensordata.containlink\
  \ = container.containregistry\n      GROUP BY\n        sensordata.containlink\n\
  \    ) AS _inner\n  )\n) AS tss_per_container_sqi\n  ON vaccinedetails.containvac\
  \ = tss_per_container_sqi.containlink) AS _inner"
