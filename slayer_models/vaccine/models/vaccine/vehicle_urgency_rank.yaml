description: "Vehicle Urgency Rank (KB #65). Vehicles ranked in descending order of\
  \ CMR + DaysOverdue/30, where CMR (KB #32) is computed inline per the vehicle's\
  \ container (via transportinfo.containtransit) using MCS/TBS/LHI peer aggregates,\
  \ and DaysOverdue (KB #61) is the max DaysOverdue across regulatoryandmaintenance\
  \ rows for the vehicle.\n\n[kb=65]\n\\text{Rank assigned to vehicles based on descending\
  \ order of } \\text{CMR} + \\text{DaysOverdue} / 30 \u2014 Ranks vehicles based\
  \ on maintenance risk and overdue days.\n[/kb=65]"
