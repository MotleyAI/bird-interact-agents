version: 6
name: vehicle_urgency_rank
source_queries:
- version: 3
  name: mcs_per_shipment_ur
  source_model: regulatoryandmaintenance
  measures:
  - formula: mcs:avg
    name: mcs
  dimensions:
  - name: shipgov
  whole_periods_only: false
- version: 3
  name: tbs_per_container_ur
  source_model: sensordata
  measures:
  - formula: tbs:avg
    name: tbs
  dimensions:
  - name: containlink
  whole_periods_only: false
- version: 3
  name: lhi_per_container_ur
  source_model: datalogger
  measures:
  - formula: lhi:avg
    name: lhi
  dimensions:
  - name: containlog
  whole_periods_only: false
- version: 3
  name: cmr_per_container_ur
  source_model:
    source_name: container
    joins:
    - target_model: mcs_per_shipment_ur
      join_pairs:
      - - shipown
        - shipgov
    - target_model: tbs_per_container_ur
      join_pairs:
      - - containregistry
        - containlink
    - target_model: lhi_per_container_ur
      join_pairs:
      - - containregistry
        - containlog
    columns:
    - name: cmr
      type: DOUBLE
      sql: (1 - mcs_per_shipment_ur.mcs) * (1 + tbs_per_container_ur.tbs / 5.0) *
        (1 - lhi_per_container_ur.lhi)
  dimensions:
  - name: containregistry
  - name: cmr
  whole_periods_only: false
- version: 3
  name: days_overdue_per_vehicle
  source_model: regulatoryandmaintenance
  measures:
  - formula: days_overdue:max
    name: days_overdue
  dimensions:
  - name: vehgov
  whole_periods_only: false
- version: 3
  source_model:
    source_name: transportinfo
    joins:
    - target_model: cmr_per_container_ur
      join_pairs:
      - - containtransit
        - containregistry
    - target_model: days_overdue_per_vehicle
      join_pairs:
      - - vehiclereg
        - vehgov
    columns:
    - name: urgency_score
      type: DOUBLE
      sql: cmr_per_container_ur.cmr + days_overdue_per_vehicle.days_overdue / 30.0
    - name: urgency_rank
      type: DOUBLE
      sql: RANK() OVER (ORDER BY (cmr_per_container_ur.cmr + days_overdue_per_vehicle.days_overdue
        / 30.0) DESC)
  dimensions:
  - name: vehiclereg
  - name: containtransit
  - name: cmr
    model: cmr_per_container_ur
  - name: days_overdue
    model: days_overdue_per_vehicle
  - name: urgency_score
  - name: urgency_rank
  whole_periods_only: false
query_variables: {}
backing_query_sql: "SELECT \"transportinfo.vehiclereg\" AS vehiclereg, \"transportinfo.containtransit\"\
  \ AS containtransit, \"transportinfo.cmr_per_container_ur.cmr\" AS cmr_per_container_ur__cmr,\
  \ \"transportinfo.days_overdue_per_vehicle.days_overdue\" AS days_overdue_per_vehicle__days_overdue,\
  \ \"transportinfo.urgency_score\" AS urgency_score, \"transportinfo.urgency_rank\"\
  \ AS urgency_rank FROM (SELECT\n  transportinfo.vehiclereg AS \"transportinfo.vehiclereg\"\
  ,\n  transportinfo.containtransit AS \"transportinfo.containtransit\",\n  cmr_per_container_ur.cmr\
  \ AS \"transportinfo.cmr_per_container_ur.cmr\",\n  days_overdue_per_vehicle.days_overdue\
  \ AS \"transportinfo.days_overdue_per_vehicle.days_overdue\",\n  cmr_per_container_ur.cmr\
  \ + days_overdue_per_vehicle.days_overdue / 30.0 AS \"transportinfo.urgency_score\"\
  ,\n  RANK() OVER (\n    ORDER BY (\n      cmr_per_container_ur.cmr + days_overdue_per_vehicle.days_overdue\
  \ / 30.0\n    ) DESC\n  ) AS \"transportinfo.urgency_rank\"\nFROM transportinfo\
  \ AS transportinfo\nLEFT JOIN (\n  (\n    SELECT\n      \"container.containregistry\"\
  \ AS containregistry,\n      \"container.cmr\" AS cmr\n    FROM (\n      SELECT\n\
  \        container.containregistry AS \"container.containregistry\",\n        (\n\
  \          1 - mcs_per_shipment_ur.mcs\n        ) * (\n          1 + tbs_per_container_ur.tbs\
  \ / 5.0\n        ) * (\n          1 - lhi_per_container_ur.lhi\n        ) AS \"\
  container.cmr\"\n      FROM container AS container\n      LEFT JOIN (\n        (\n\
  \          SELECT\n            \"sensordata.containlink\" AS containlink,\n    \
  \        \"sensordata.tbs\" AS tbs\n          FROM (\n            SELECT\n     \
  \         sensordata.containlink AS \"sensordata.containlink\",\n              AVG(\n\
  \                ABS(sensordata.tempnowc - sensordata.storetempc) / NULLIF(sensordata.temptolc,\
  \ 0) * sensordata.tempdevcount\n              ) AS \"sensordata.tbs\"\n        \
  \    FROM sensordata AS sensordata\n            GROUP BY\n              sensordata.containlink\n\
  \          ) AS _inner\n        )\n      ) AS tbs_per_container_ur\n        ON container.containregistry\
  \ = tbs_per_container_ur.containlink\n      LEFT JOIN (\n        (\n          SELECT\n\
  \            \"regulatoryandmaintenance.shipgov\" AS shipgov,\n            \"regulatoryandmaintenance.mcs\"\
  \ AS mcs\n          FROM (\n            SELECT\n              regulatoryandmaintenance.shipgov\
  \ AS \"regulatoryandmaintenance.shipgov\",\n              AVG(\n               \
  \ regulatoryandmaintenance.compscore * (\n                  1 - COALESCE(CAST(regulatoryandmaintenance.incidents\
  \ AS REAL) / 10, 0)\n                )\n              ) AS \"regulatoryandmaintenance.mcs\"\
  \n            FROM regulatoryandmaintenance AS regulatoryandmaintenance\n      \
  \      GROUP BY\n              regulatoryandmaintenance.shipgov\n          ) AS\
  \ _inner\n        )\n      ) AS mcs_per_shipment_ur\n        ON container.shipown\
  \ = mcs_per_shipment_ur.shipgov\n      LEFT JOIN (\n        (\n          SELECT\n\
  \            \"datalogger.containlog\" AS containlog,\n            \"datalogger.lhi\"\
  \ AS lhi\n          FROM (\n            SELECT\n              datalogger.containlog\
  \ AS \"datalogger.containlog\",\n              AVG(\n                container.batterypct\
  \ / 100.0 * (\n                  1 - COALESCE(CAST(datalogger.memusepct AS REAL)\
  \ / 100, 0)\n                ) * COALESCE(datalogger.datapct, 0) / 100.0\n     \
  \         ) AS \"datalogger.lhi\"\n            FROM datalogger AS datalogger\n \
  \           LEFT JOIN container AS container\n              ON datalogger.containlog\
  \ = container.containregistry\n            GROUP BY\n              datalogger.containlog\n\
  \          ) AS _inner\n        )\n      ) AS lhi_per_container_ur\n        ON container.containregistry\
  \ = lhi_per_container_ur.containlog\n    ) AS _inner\n  )\n) AS cmr_per_container_ur\n\
  \  ON transportinfo.containtransit = cmr_per_container_ur.containregistry\nLEFT\
  \ JOIN (\n  (\n    SELECT\n      \"regulatoryandmaintenance.vehgov\" AS vehgov,\n\
  \      \"regulatoryandmaintenance.days_overdue\" AS days_overdue\n    FROM (\n \
  \     SELECT\n        regulatoryandmaintenance.vehgov AS \"regulatoryandmaintenance.vehgov\"\
  ,\n        MAX(\n          MAX(\n            JULIANDAY('now') - JULIANDAY(regulatoryandmaintenance.maintdatenext),\n\
  \            JULIANDAY('now') - JULIANDAY(regulatoryandmaintenance.calibdatenext),\n\
  \            0\n          )\n        ) AS \"regulatoryandmaintenance.days_overdue\"\
  \n      FROM regulatoryandmaintenance AS regulatoryandmaintenance\n      GROUP BY\n\
  \        regulatoryandmaintenance.vehgov\n    ) AS _inner\n  )\n) AS days_overdue_per_vehicle\n\
  \  ON transportinfo.vehiclereg = days_overdue_per_vehicle.vehgov) AS _inner"
