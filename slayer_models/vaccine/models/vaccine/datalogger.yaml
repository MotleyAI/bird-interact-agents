- name: lhi
  sql: container.batterypct / 100.0 * (1 - COALESCE(CAST(memusepct AS REAL) / 100,
    0)) * COALESCE(datapct, 0) / 100.0
  type: number
  primary_key: false
  description: "Logger Health Index (LHI). Overall health score for the data logger:\
    \ BatteryPct/100 * (1 - MemUsePct/100) * DataPct/100 (KB #6). BatteryPct comes\
    \ from the joined container row.\n\n[kb=6]\nLHI = \\frac{BatteryPct}{100} \\times\
    \ (1 - \\frac{MemUsePct}{100}) \\times \\frac{DataPct}{100} \u2014 Overall health\
    \ score for data logger.\n[/kb=6]"
  label: Logger Health Index (LHI)
  hidden: false
  meta:
    kb_id: 6
- name: is_logger_failure_risk
  sql: CASE WHEN (container.batterypct / 100.0 * (1 - COALESCE(CAST(memusepct AS REAL)
    / 100, 0)) * COALESCE(datapct, 0) / 100.0) < 0.3 OR (container.batterypct < 20
    AND container.pwrbackupflag = 'Not Available') THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "Logger Failure Risk flag. True when LHI < 0.3 OR (BatteryPct < 20\
    \ AND PwrBackupFlag = 'Not Available') (KB #15). BatteryPct and PwrBackupFlag\
    \ come from the joined container row.\n\n[kb=15]\nA logger where LHI < 0.3 or\
    \ (BatteryPct < 20 and PwrBackupFlag='Not Available') \u2014 Identifies loggers\
    \ at risk of failure.\n[/kb=15]"
  label: Logger Failure Risk
  hidden: false
  meta:
    kb_id: 15
- name: is_commproto_rf
  sql: CASE WHEN commproto = 'RF' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "True when CommProto = 'RF': uses 433MHz ISM band radio frequency transmission\
    \ with FSK modulation for short-range data exchange below 100m (KB #22).\n\n[kb=22]\n\
    Uses 433MHz ISM band radio frequency transmission with FSK modulation for short-range\
    \ data exchange below 100m. \u2014 Illustrates RF communication protocol\n[/kb=22]"
  label: 'CommProto: ''RF'''
  hidden: false
  meta:
    kb_id: 22
- name: is_commproto_satellite
  sql: CASE WHEN commproto = 'Satellite' THEN 1 ELSE 0 END
  type: boolean
  primary_key: false
  description: "True when CommProto = 'Satellite': uses satellite networks for global\
    \ coverage and reliable data transmission (KB #26).\n\n[kb=26]\nIndicates the\
    \ system is using satellite networks for global coverage and reliable data transmission.\
    \ \u2014 Illustrates satellite communication mode\n[/kb=26]"
  label: 'CommProto: ''Satellite'''
  hidden: false
  meta:
    kb_id: 26
