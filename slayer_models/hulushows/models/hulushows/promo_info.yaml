version: 6
name: promo_info
sql_table: promo_info
query_variables: {}
data_source: hulushows
columns:
- name: content_key
  sql: content_key
  type: INT
  primary_key: true
  description: "PK \u2014 1:1 with core.content_key."
  hidden: false
  format:
    type: integer
- name: tiernotices
  sql: tiernotices
  type: TEXT
  primary_key: false
  description: "JSONB column with free_tier and member_tier objects, each holding\
    \ 4 promo-message fields (Alert_Note, Avail_Note, Promo_Note, Expire_Note) \u2014\
    \ 8 max promotional slots total."
  hidden: false
- name: free_alert_note
  sql: tiernotices ->> '$.free_tier.Alert_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: free_avail_note
  sql: tiernotices ->> '$.free_tier.Avail_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: free_promo_note
  sql: tiernotices ->> '$.free_tier.Promo_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: free_expire_note
  sql: tiernotices ->> '$.free_tier.Expire_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: member_alert_note
  sql: tiernotices ->> '$.member_tier.Alert_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: member_avail_note
  sql: tiernotices ->> '$.member_tier.Avail_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: member_promo_note
  sql: tiernotices ->> '$.member_tier.Promo_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: member_expire_note
  sql: tiernotices ->> '$.member_tier.Expire_Note'
  type: TEXT
  primary_key: false
  hidden: false
- name: promotional_message_count
  sql: (CASE WHEN (tiernotices ->> '$.free_tier.Alert_Note') IS NOT NULL AND TRIM(tiernotices
    ->> '$.free_tier.Alert_Note') <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices
    ->> '$.free_tier.Avail_Note') IS NOT NULL AND TRIM(tiernotices ->> '$.free_tier.Avail_Note')
    <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.free_tier.Promo_Note')
    IS NOT NULL AND TRIM(tiernotices ->> '$.free_tier.Promo_Note') <> '' THEN 1 ELSE
    0 END) + (CASE WHEN (tiernotices ->> '$.free_tier.Expire_Note') IS NOT NULL AND
    TRIM(tiernotices ->> '$.free_tier.Expire_Note') <> '' THEN 1 ELSE 0 END) + (CASE
    WHEN (tiernotices ->> '$.member_tier.Alert_Note') IS NOT NULL AND TRIM(tiernotices
    ->> '$.member_tier.Alert_Note') <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices
    ->> '$.member_tier.Avail_Note') IS NOT NULL AND TRIM(tiernotices ->> '$.member_tier.Avail_Note')
    <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.member_tier.Promo_Note')
    IS NOT NULL AND TRIM(tiernotices ->> '$.member_tier.Promo_Note') <> '' THEN 1
    ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.member_tier.Expire_Note') IS NOT
    NULL AND TRIM(tiernotices ->> '$.member_tier.Expire_Note') <> '' THEN 1 ELSE 0
    END)
  type: DOUBLE
  primary_key: false
  description: "Promotional Message Count (PMC, KB 25): the count of promotional messages\
    \ found by adding up all the filled-in promotional and availability notes for\
    \ a piece of content. KB 80 (Promotional Intensity Summary) summarises the same\
    \ per-row count via aggregation \u2014 encoded as the average_promotional_message_count\
    \ measure.\n\n[kb=25]\nPMC = The count of promotional messages is found by adding\
    \ up all the filled-in promotional and availability notes for a piece of content.\
    \ \u2014 Counts the total promotional fields for a content entry.\n[/kb=25]"
  label: Promotional Message Count
  hidden: false
  meta:
    kb_id: 25
- name: promo_saturation_ratio
  sql: ((CASE WHEN (tiernotices ->> '$.free_tier.Alert_Note') IS NOT NULL AND TRIM(tiernotices
    ->> '$.free_tier.Alert_Note') <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices
    ->> '$.free_tier.Avail_Note') IS NOT NULL AND TRIM(tiernotices ->> '$.free_tier.Avail_Note')
    <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.free_tier.Promo_Note')
    IS NOT NULL AND TRIM(tiernotices ->> '$.free_tier.Promo_Note') <> '' THEN 1 ELSE
    0 END) + (CASE WHEN (tiernotices ->> '$.free_tier.Expire_Note') IS NOT NULL AND
    TRIM(tiernotices ->> '$.free_tier.Expire_Note') <> '' THEN 1 ELSE 0 END) + (CASE
    WHEN (tiernotices ->> '$.member_tier.Alert_Note') IS NOT NULL AND TRIM(tiernotices
    ->> '$.member_tier.Alert_Note') <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices
    ->> '$.member_tier.Avail_Note') IS NOT NULL AND TRIM(tiernotices ->> '$.member_tier.Avail_Note')
    <> '' THEN 1 ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.member_tier.Promo_Note')
    IS NOT NULL AND TRIM(tiernotices ->> '$.member_tier.Promo_Note') <> '' THEN 1
    ELSE 0 END) + (CASE WHEN (tiernotices ->> '$.member_tier.Expire_Note') IS NOT
    NULL AND TRIM(tiernotices ->> '$.member_tier.Expire_Note') <> '' THEN 1 ELSE 0
    END)) / 8.0
  type: DOUBLE
  primary_key: false
  description: "Promo Saturation Ratio (PSR, KB 82): non-null promo fields / 8.\n\n\
    [kb=82]\nThis measures how packed a show is with promotional content. It looks\
    \ at how many of the 8 possible promo message spots are used. A score of 1.0 means\
    \ all spots are filled. \u2014 Promo Saturation Ratio (PSR) quantifies how heavily\
    \ a show is overloaded with promotional messages. It is calculated as the total\
    \ number of non-null promotional fields (alertnote, availnote, promonote, expirenote)\
    \ across both the free and member tiers, divided by 8 (the maximum possible promotional\
    \ slots). The maximum PSR identifies the most saturated show in terms of promotional\
    \ presence.\n[/kb=82]"
  label: Maximum Promo Saturation Ratio
  hidden: false
  meta:
    kb_id: 82
measures:
- formula: promo_saturation_ratio:max
  name: max_promo_saturation_ratio
  description: 'Maximum Promo Saturation Ratio (KB 82): the most saturated show''s
    PSR.'
- formula: promotional_message_count:avg
  name: average_promotional_message_count
  label: Promotional Intensity Summary
  description: "Promotional Intensity Summary (KB 80): average promo-message count\
    \ per content row \u2014 summarises how many promo message types (availability/promotion/alert/expiration)\
    \ are filled in across the catalog.\n\n[kb=80]\nWe check each show or movie for\
    \ various promo message types\u2014like availability, promotions, alerts, or expirations\u2014\
    and count how many of them are actually filled in. \u2014 Summarizes the number\
    \ of promotional notes available for each content across all tiers.\n[/kb=80]"
  meta:
    kb_id: 80
- formula: promotional_message_count:sum
  name: total_promotional_messages
  description: Total non-null promo notes across all rows in scope (KB 80 summary).
aggregations: []
joins:
- target_model: core
  join_pairs:
  - - content_key
    - content_key
  join_type: left
filters: []
description: One row per content_key with promotional / notification messages, organized
  by tier (free / member). The tiernotices JSON has 4 message slots per tier (Avail/Promo/Alert/Expire)
  for 8 total slots.
hidden: false
