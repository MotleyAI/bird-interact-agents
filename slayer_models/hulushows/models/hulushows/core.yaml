  description: "Underutilized Franchise (KB 49) helper: aggregate Media Total / Episode\
    \ Total per franchise. Group by series_id and filter title_count >= 3 AND franchise_episode_total\
    \ < 10 (KB references 'Media Total' which here uses content_info.episode_total\
    \ as the aggregate engagement signal).\n\n[kb=49]\nFranchises with \u2265 3 content\
    \ items and aggregate Media Total < 10 are underutilized. \u2014 Defines a franchise\
    \ ID that has multiple content entries but low total media output.\n[/kb=49]"
  meta:
