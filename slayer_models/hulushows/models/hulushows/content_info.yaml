version: 4
name: content_info
sql_table: content_info
query_variables: {}
data_source: hulushows
columns:
- name: content_key
  sql: content_key
  type: number
  primary_key: true
  description: "PK \u2014 1:1 with core.content_key."
  hidden: false
  format:
    type: integer
- name: story_outline
  sql: story_outline
  type: string
  primary_key: false
  description: Plot synopsis / show description for discovery and recommendations.
  hidden: false
- name: mediacounts
  sql: mediacounts
  type: string
  primary_key: false
  description: JSONB column with content_volumes (Clips_Total, Episode_Total, Feature_Films,
    Film_Clips, Seasons_Total, Videos_Total).
  hidden: false
- name: visualassets
  sql: visualassets
  type: string
  primary_key: false
  description: JSONB column with KeyArt_URL, Thumbnail_URL, Link_Desc, Art_Copyright.
  hidden: false
- name: clips_total
  sql: CAST(mediacounts ->> '$.content_volumes.Clips_Total' AS INTEGER)
  type: number
  primary_key: false
  description: Total short-clip volume for the content (Clips_Total).
  hidden: false
- name: episode_total
  sql: CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER)
  type: number
  primary_key: false
  description: Total episode count across all seasons (Episodes Vol).
  hidden: false
- name: feature_films
  sql: CAST(mediacounts ->> '$.content_volumes.Feature_Films' AS INTEGER)
  type: number
  primary_key: false
  description: Number of feature films associated with this content.
  hidden: false
- name: film_clips
  sql: CAST(mediacounts ->> '$.content_volumes.Film_Clips' AS INTEGER)
  type: number
  primary_key: false
  description: Number of film clips / trailers for film content.
  hidden: false
- name: seasons_total
  sql: CAST(mediacounts ->> '$.content_volumes.Seasons_Total' AS INTEGER)
  type: number
  primary_key: false
  description: Total seasons available.
  hidden: false
- name: videos_total
  sql: CAST(mediacounts ->> '$.content_volumes.Videos_Total' AS INTEGER)
  type: number
  primary_key: false
  description: Aggregate count of all video content types (episodes + clips + features).
  hidden: false
- name: is_long_running
  sql: CAST(mediacounts ->> '$.content_volumes.Seasons_Total' AS INTEGER) >= 10
  type: boolean
  primary_key: false
  description: "Long-running Series (KB 15): 10+ seasons.\n\n[kb=15]\nAny series that\
    \ continues for 10 or more years or installments is considered long-running. \u2014\
    \ Identifies series with significant longevity.\n[/kb=15]"
  label: Long-running Series
  hidden: false
  meta:
    kb_id: 15
- name: is_limited_series
  sql: CAST(mediacounts ->> '$.content_volumes.Seasons_Total' AS INTEGER) = 1 AND
    CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER) <= 10
  type: boolean
  primary_key: false
  description: "Limited Series (KB 40): a single season with no more than ten episodes.\n\
    \n[kb=40]\nIf a show consists of only a single part and no more than ten installments,\
    \ it's called a limited series. \u2014 Defines content with very few seasons,\
    \ often a single story arc.\n[/kb=40]"
  label: Limited Series
  hidden: false
  meta:
    kb_id: 40
- name: is_high_engagement
  sql: CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER) >= 100 AND
    CAST(mediacounts ->> '$.content_volumes.Clips_Total' AS INTEGER) >= 100
  type: boolean
  primary_key: false
  description: "High Engagement Show (KB 17): 'very large number of episodes and extra\
    \ video segments'. Operationalised as Episode_Total \u2265 100 AND Clips_Total\
    \ \u2265 100.\n\n[kb=17]\nIf a show includes a very large number of episodes and\
    \ extra video segments, it\u2019s considered highly engaging. \u2014 Represents\
    \ shows with significant content volume.\n[/kb=17]"
  label: High Engagement Show
  hidden: false
  meta:
    kb_id: 17
- name: content_size_index
  sql: COALESCE(CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER),
    0) + 2 * COALESCE(CAST(mediacounts ->> '$.content_volumes.Film_Clips' AS INTEGER),
    0) + COALESCE(CAST(mediacounts ->> '$.content_volumes.Feature_Films' AS INTEGER),
    0) + COALESCE(CAST(mediacounts ->> '$.content_volumes.Clips_Total' AS INTEGER),
    0)
  type: number
  primary_key: false
  description: "Content Size Index (CSI, KB 21): sum of Episodes Vol + Film Clip Vol\
    \ + Feature Vol + Game Vol + Film Clip Vol (KB lists 'Film Cli pVol' twice \u2014\
    \ we add it twice, weight 2) + Trailer Vol. content_info.mediacounts has no Game/Trailer\
    \ fields (those live in show_rollups), so this approximation uses Episode_Total\
    \ + 2*Film_Clips + Feature_Films + Clips_Total.\n\n[kb=21]\nCSI = \\text{Episodes\
    \ Vol} + \\text{Film Clip Vol} + \\text{Feature Vol} + \\text{Game Vol} + \\text{Film\
    \ Cli pVol} + \\text{Trailer Vol} \u2014 Measures overall content size from video\
    \ types.\n[/kb=21]"
  label: Content Size Index
  hidden: false
  meta:
    kb_id: 21
- name: se_ratio
  sql: 1.0 * CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER) /
    NULLIF(CAST(mediacounts ->> '$.content_volumes.Seasons_Total' AS INTEGER), 0)
  type: number
  primary_key: false
  description: "Season-to-Episode Ratio (KB 23): avg episodes per season = Episodes\
    \ Vol / Seasons Count.\n\n[kb=23]\nSE_Ratio = \\frac{\\text{Episodes Vol}}{\\\
    text{Seasons Count}} \u2014 Computes average episodes per season.\n[/kb=23]"
  label: Season to Episode Ratio
  hidden: false
  meta:
    kb_id: 23
- name: title_to_episode_ratio
  sql: 1.0 * LENGTH(core.content_title) / (1 + COALESCE(CAST(mediacounts ->> '$.content_volumes.Episode_Total'
    AS INTEGER), 0))
  type: number
  primary_key: false
  description: "Title-to-Episode Ratio (TER, KB 36): LENGTH(content_title) / (Episode_Total\
    \ + 1). content_title comes from the joined core model.\n\n[kb=36]\nTER = The\
    \ ratio of the length of a show\u2019s title to its total number of episodes,\
    \ plus one. \u2014 Ratio between content title length and episode volume.\n[/kb=36]"
  label: Title-to-Episode Ratio (TER)
  hidden: false
  meta:
    kb_id: 36
- name: studio_productivity_index
  sql: 1.0 * CAST(mediacounts ->> '$.content_volumes.Videos_Total' AS INTEGER) / (1
    + COALESCE(CAST(mediacounts ->> '$.content_volumes.Seasons_Total' AS INTEGER),
    0))
  type: number
  primary_key: false
  description: "Studio Productivity Index (SPI, KB 32): Videos_Total / (Seasons_Total\
    \ + 1). KB phrasing is 'videos / project groupings + 1'.\n\n[kb=32]\nSPI = The\
    \ productivity of a studio is measured by dividing the number of videos it made\
    \ by the number of project groupings, plus one. \u2014 Measures how productive\
    \ a studio is based on the number of videos and seasons it produces.\n[/kb=32]"
  label: Studio Productivity Index (SPI)
  hidden: false
  meta:
    kb_id: 32
- name: has_clips_int
  sql: CASE WHEN COALESCE(CAST(mediacounts ->> '$.content_volumes.Clips_Total' AS
    INTEGER), 0) > 0 OR COALESCE(CAST(mediacounts ->> '$.content_volumes.Film_Clips'
    AS INTEGER), 0) > 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: Integer flag (1=Has Clips, 0=No Clips) per KB 79.
  hidden: false
- name: clip_availability_flag
  sql: CASE WHEN COALESCE(CAST(mediacounts ->> '$.content_volumes.Clips_Total' AS
    INTEGER), 0) > 0 OR COALESCE(CAST(mediacounts ->> '$.content_volumes.Film_Clips'
    AS INTEGER), 0) > 0 THEN 'Has Clips' ELSE 'No Clips' END
  type: string
  primary_key: false
  description: "Clip Availability Flag (KB 79): 'Has Clips' if any film clip / clip\
    \ content exists, else 'No Clips'.\n\n[kb=79]\nIf a show includes at least one\
    \ film clip, it\u2019s marked as 'Has Clips'; if it doesn\u2019t, it\u2019s marked\
    \ as 'No Clips'. \u2014 Flags shows based on whether they contain any film clip\
    \ content.\n[/kb=79]"
  label: Clip Availability Flag
  hidden: false
  meta:
    kb_id: 79
- name: is_clip_bucket_empty
  sql: COALESCE(CAST(mediacounts ->> '$.content_volumes.Film_Clips' AS INTEGER), 0)
    = 0 AND COALESCE(CAST(mediacounts ->> '$.content_volumes.Episode_Total' AS INTEGER),
    0) > 0
  type: boolean
  primary_key: false
  description: "Empty Clip Bucket Indicator (KB 47): Film_Clips=0 AND Episode_Total>0.\n\
    \n[kb=47]\nShows where Film Clips Count = 0 and Episodes Vol > 0 indicate a 'clip\
    \ bucket empty' status. \u2014 Highlights content with no associated clips but\
    \ existing full episodes.\n[/kb=47]"
  label: Empty Clip Bucket Indicator
  hidden: false
  meta:
    kb_id: 47
- name: content_volume_level
  sql: CASE WHEN COALESCE(CAST(mediacounts ->> '$.content_volumes.Videos_Total' AS
    INTEGER), 0) > 500 THEN 'High' WHEN COALESCE(CAST(mediacounts ->> '$.content_volumes.Videos_Total'
    AS INTEGER), 0) BETWEEN 200 AND 500 THEN 'Medium' ELSE 'Low' END
  type: string
  primary_key: false
  description: "Content Volume Level Classification (KB 75): High if Videos_Total>500,\
    \ Medium if 200..500, Low otherwise.\n\n[kb=75]\nIf videos total > 500 then 'High';\
    \ if between 200 and 500 then 'Medium'; otherwise 'Low'. \u2014 Classifies shows\
    \ into tiers based on total video volume.\n[/kb=75]"
  label: Content Volume Level Classification
  hidden: false
  meta:
    kb_id: 75
measures: []
aggregations: []
joins:
- target_model: core
  join_pairs:
  - - content_key
    - content_key
  join_type: left
filters: []
description: "One row per content_key with detail blobs: story_outline, mediacounts\
  \ (content_volumes \u2014 episode/clip/feature/season/film_clips/videos totals),\
  \ and visualassets (key art / thumbnail / link description / copyright)."
hidden: false
