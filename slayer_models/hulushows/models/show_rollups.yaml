version: 3
name: show_rollups
sql_table: show_rollups
query_variables: {}
data_source: hulushows
columns:
- name: srkeys
  sql: srkeys
  type: number
  primary_key: true
  description: "FK to core.content_key \u2014 which show this rollup row is for."
  hidden: false
  format:
    type: integer
- name: srlinks
  sql: srlinks
  type: number
  primary_key: true
  description: "FK to rollups.tierkey \u2014 which subscription tier (free / subscriber\
    \ / current / free_on_web / etc.)."
  hidden: false
  format:
    type: integer
  meta:
    kb_ids:
    - 16
    - 41
    - 76
- name: launchmoment
  sql: launchmoment
  type: string
  primary_key: false
  description: "First-availability timestamp in this tier. KB 9 documents that this\
    \ field carries multiple date formats. NULL with Media_Total>0 \u2192 'legacy-uploaded'\
    \ content (KB 48)."
  hidden: false
  meta:
    kb_ids:
    - 9
    - 48
- name: latestadd
  sql: latestadd
  type: string
  primary_key: false
  description: Most-recent content addition timestamp for this tier. NULL implies
    the content has not been updated since first appearance (KB 14).
  hidden: false
  meta:
    kb_id: 14
- name: contentvols
  sql: contentvols
  type: string
  primary_key: false
  description: 'JSONB column with standard_content volumes: Ep_Vol, Clip_Vol, Game_Vol,
    Season_Vol, Feature_Vol, Media_Total, Trailer_Vol, FilmClip_Vol.'
  hidden: false
- name: html5metrics
  sql: html5metrics
  type: string
  primary_key: false
  description: 'JSONB column with html5_volumes: H5_Clips, H5_Games, H5_Episodes,
    H5_Features, H5_Trailers, H5_FilmClips, H5_MediaTotal.'
  hidden: false
- name: ratinginfo
  sql: ratinginfo
  type: string
  primary_key: false
  description: "JSONB column with TV_Rating, Peak_Rating (KB 2/19 \u2014 noisy variants\
    \ like 'TVMA','MA','T14'), and Unrated_Vol (KB 12)."
  hidden: false
  meta:
    kb_ids:
    - 2
    - 12
    - 19
- name: ep_vol
  sql: CAST(contentvols ->> '$.standard_content.Ep_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Episode volume for this tier.
  hidden: false
- name: clip_vol
  sql: CAST(contentvols ->> '$.standard_content.Clip_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Clip volume for this tier.
  hidden: false
- name: game_vol
  sql: CAST(contentvols ->> '$.standard_content.Game_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Game volume for this tier.
  hidden: false
- name: season_vol
  sql: CAST(contentvols ->> '$.standard_content.Season_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Season volume for this tier.
  hidden: false
- name: feature_vol
  sql: CAST(contentvols ->> '$.standard_content.Feature_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Feature volume for this tier.
  hidden: false
- name: media_total
  sql: CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER)
  type: number
  primary_key: false
  description: Total media for this tier (Media_Total).
  hidden: false
  meta:
    kb_ids:
    - 24
    - 26
    - 51
    - 55
- name: trailer_vol
  sql: CAST(contentvols ->> '$.standard_content.Trailer_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Trailer volume for this tier.
  hidden: false
  meta:
    kb_id: 58
- name: filmclip_vol
  sql: CAST(contentvols ->> '$.standard_content.FilmClip_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: FilmClip volume for this tier.
  hidden: false
- name: h5_clips
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Clips' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible clip count for this tier (KB 7).
  hidden: false
- name: h5_games
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Games' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible game count (KB 7).
  hidden: false
- name: h5_episodes
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Episodes' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible episode count for this tier (KB 7).
  hidden: false
- name: h5_features
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Features' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible feature count (KB 7).
  hidden: false
- name: h5_trailers
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Trailers' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible trailer count (KB 7).
  hidden: false
- name: h5_filmclips
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_FilmClips' AS INTEGER)
  type: number
  primary_key: false
  description: HTML5-compatible film clip count (KB 7).
  hidden: false
- name: h5_media_total
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_MediaTotal' AS INTEGER)
  type: number
  primary_key: false
  description: Total HTML5-compatible media count for this tier (KB 7).
  hidden: false
  meta:
    kb_id: 7
- name: tv_rating
  sql: ratinginfo ->> '$.TV_Rating'
  type: string
  primary_key: false
  description: Television rating string for this tier (KB 2/19).
  hidden: false
- name: peak_rating_raw
  sql: ratinginfo ->> '$.Peak_Rating'
  type: string
  primary_key: false
  description: Raw peak-rating string for this tier. KB 2/19 enumerates the canonical
    ratings (TV-Y, TV-Y7, TV-G, TV-PG, TV-14, TV-MA); raw values are noisy ('TVMA',
    'MA', 'T14', 'FOURTEEN').
  hidden: false
- name: peak_rating_canonical
  sql: CASE WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo ->> '$.Peak_Rating',''),
    '-', ''), ' ', '')) IN ('TVMA','MA','MATURE','ADULT','18','18+') THEN 'TV-MA'
    WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo ->> '$.Peak_Rating',''), '-', ''),
    ' ', '')) IN ('TV14','14','14+','T14','TEEN','FOURTEEN') THEN 'TV-14' WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo
    ->> '$.Peak_Rating',''), '-', ''), ' ', '')) IN ('TVPG','PG','PARENTALGUIDANCE')
    THEN 'TV-PG' WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo ->> '$.Peak_Rating',''),
    '-', ''), ' ', '')) IN ('TVG','G','GENERAL','ALL') THEN 'TV-G' WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo
    ->> '$.Peak_Rating',''), '-', ''), ' ', '')) IN ('TVY7','Y7','TVY7FV') THEN 'TV-Y7'
    WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo ->> '$.Peak_Rating',''), '-', ''),
    ' ', '')) IN ('TVY','Y','T') THEN 'TV-Y' ELSE NULL END
  type: string
  primary_key: false
  description: 'Peak_Rating mapped to one of the six canonical TV ratings (KB 2/19):
    TV-Y, TV-Y7, TV-G, TV-PG, TV-14, TV-MA. NULL when the raw value is ''Not Rated'',
    '''', or unrecognised.'
  hidden: false
  meta:
    kb_ids:
    - 2
    - 19
    - 81
- name: is_unrated
  sql: (ratinginfo ->> '$.TV_Rating') IS NULL AND (CASE WHEN UPPER(REPLACE(REPLACE(COALESCE(ratinginfo
    ->> '$.Peak_Rating',''), '-', ''), ' ', '')) IN ('TVMA','MA','MATURE','ADULT','18','18+','TV14','14','14+','T14','TEEN','FOURTEEN','TVPG','PG','PARENTALGUIDANCE','TVG','G','GENERAL','ALL','TVY7','Y7','TVY7FV','TVY','Y','T')
    THEN 0 ELSE 1 END = 1)
  type: boolean
  primary_key: false
  description: 'Unrated Media (KB 12): TRUE when neither TV_Rating nor a canonical
    Peak_Rating is set.'
  hidden: false
  meta:
    kb_id: 12
- name: unrated_vol
  sql: CAST(ratinginfo ->> '$.Unrated_Vol' AS INTEGER)
  type: number
  primary_key: false
  description: Count of unrated content items in this (show, tier) bucket.
  hidden: false
- name: is_html5_compatible
  sql: CAST(html5metrics ->> '$.html5_volumes.H5_Episodes' AS INTEGER) > 0
  type: boolean
  primary_key: false
  description: 'HTML5 Compatible Show (KB 11): TRUE when H5_Episodes > 0.'
  hidden: false
  meta:
    kb_id: 11
- name: html5_depth_index
  sql: COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_Clips' AS INTEGER), 0) +
    COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_Episodes' AS INTEGER), 0) +
    COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_Trailers' AS INTEGER), 0) +
    COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_Games' AS INTEGER), 0)
  type: number
  primary_key: false
  description: 'HTML5 Depth Index (HDI, KB 59): H5_Clips + H5_Episodes + H5_Trailers
    + H5_Games.'
  hidden: false
  meta:
    kb_id: 59
- name: her
  sql: 1.0 * CAST(html5metrics ->> '$.html5_volumes.H5_Episodes' AS INTEGER) / NULLIF(CAST(contentvols
    ->> '$.standard_content.Ep_Vol' AS INTEGER), 0)
  type: number
  primary_key: false
  description: 'HTML5 Episode Ratio (HER, KB 20): H5_Episodes / Ep_Vol.'
  hidden: false
  meta:
    kb_id: 20
- name: mpcr
  sql: 1.0 * CAST(html5metrics ->> '$.html5_volumes.H5_MediaTotal' AS INTEGER) / NULLIF(CAST(contentvols
    ->> '$.standard_content.Media_Total' AS INTEGER), 0)
  type: number
  primary_key: false
  description: 'Media Platform Compatibility Rate (MPCR, KB 22): H5_MediaTotal / Media_Total.'
  hidden: false
  meta:
    kb_id: 22
- name: is_single_platform_dependent
  sql: COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_MediaTotal' AS INTEGER),
    0) >= COALESCE(CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER),
    0) AND COALESCE(CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER),
    0) > 0
  type: boolean
  primary_key: false
  description: "Single-Platform Dependency (KB 60): TRUE when all available media\
    \ in this tier is HTML5-compatible (H5_MediaTotal \u2265 Media_Total)."
  hidden: false
  meta:
    kb_id: 60
- name: cfr
  sql: 1.0 * CAST(contentvols ->> '$.standard_content.FilmClip_Vol' AS INTEGER) /
    NULLIF(CAST(contentvols ->> '$.standard_content.Feature_Vol' AS INTEGER), 0)
  type: number
  primary_key: false
  description: 'Clip-to-Feature Ratio (CFR, KB 56): FilmClip_Vol / Feature_Vol.'
  hidden: false
  meta:
    kb_id: 56
- name: peak_media_load
  sql: MAX(COALESCE(CAST(contentvols ->> '$.standard_content.Trailer_Vol' AS INTEGER),
    0), COALESCE(CAST(contentvols ->> '$.standard_content.Feature_Vol' AS INTEGER),
    0))
  type: number
  primary_key: false
  description: 'Peak Media Load (KB 77): for each (show, tier), MAX(Trailer_Vol, Feature_Vol).'
  hidden: false
  meta:
    kb_id: 77
- name: is_legacy_uploaded
  sql: (launchmoment IS NULL OR TRIM(launchmoment) = '') AND COALESCE(CAST(contentvols
    ->> '$.standard_content.Media_Total' AS INTEGER), 0) > 0
  type: boolean
  primary_key: false
  description: "Missing Launch Moment (KB 48): launchmoment NULL while Media_Total\
    \ > 0 \u2192 legacy-uploaded."
  hidden: false
  meta:
    kb_id: 48
- name: tier_has_no_recent_update
  sql: latestadd IS NULL OR TRIM(latestadd) = ''
  type: boolean
  primary_key: false
  description: "Null Update Tag (KB 14): TRUE when latestadd is missing \u2192 content\
    \ unchanged since first appearance."
  hidden: false
- name: current_year
  sql: CAST(strftime('%Y', 'now') AS INTEGER)
  type: number
  primary_key: false
  description: 'Helper: current year (used by KB 27 longevity).'
  hidden: false
- name: launch_year
  sql: CASE WHEN launchmoment IS NULL OR TRIM(launchmoment) = '' THEN NULL ELSE CAST(SUBSTR(launchmoment,
    1, 4) AS INTEGER) END
  type: number
  primary_key: false
  description: Year extracted from launchmoment (KB 9 documents formats; sample data
    is YYYY-MM-DD). Used by KB 27 (longevity) and KB 91 (launch year distribution).
  hidden: false
  meta:
    kb_id: 91
- name: longevity
  sql: CASE WHEN launchmoment IS NULL OR TRIM(launchmoment) = '' THEN NULL ELSE CAST(strftime('%Y',
    'now') AS INTEGER) - CAST(SUBSTR(launchmoment, 1, 4) AS INTEGER) END
  type: number
  primary_key: false
  description: 'Show Longevity Estimate (KB 27): current_year - launch_year.'
  hidden: false
  meta:
    kb_id: 27
- name: tsi_days
  sql: CASE WHEN latestadd IS NULL OR TRIM(latestadd) = '' THEN NULL ELSE CAST(julianday('now')
    - julianday(CASE WHEN latestadd LIKE '%/%/%' THEN substr(latestadd, length(latestadd)
    - 3, 4) || '-' || (CASE WHEN length(substr(latestadd, 1, instr(latestadd, '/')
    - 1)) = 1 THEN '0' || substr(latestadd, 1, instr(latestadd, '/') - 1) ELSE substr(latestadd,
    1, instr(latestadd, '/') - 1) END) || '-' || (CASE WHEN length(substr(substr(latestadd,
    instr(latestadd, '/') + 1), 1, instr(substr(latestadd, instr(latestadd, '/') +
    1), '/') - 1)) = 1 THEN '0' || substr(substr(latestadd, instr(latestadd, '/')
    + 1), 1, instr(substr(latestadd, instr(latestadd, '/') + 1), '/') - 1) ELSE substr(substr(latestadd,
    instr(latestadd, '/') + 1), 1, instr(substr(latestadd, instr(latestadd, '/') +
    1), '/') - 1) END) ELSE latestadd END) AS INTEGER) END
  type: number
  primary_key: false
  description: 'Temporal Staleness Index (TSI, KB 57): days between today and latest
    update. Handles both YYYY-MM-DD and M/D/YYYY formats found in latestadd.'
  hidden: false
  meta:
    kb_id: 57
- name: trailer_deficient_int
  sql: CASE WHEN COALESCE(CAST(contentvols ->> '$.standard_content.Ep_Vol' AS INTEGER),
    0) >= 50 AND COALESCE(CAST(contentvols ->> '$.standard_content.Trailer_Vol' AS
    INTEGER), 0) = 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: "Trailer-Deficient Feature (KB 67): TRUE when many episodes (\u2265\
    50) but Trailer_Vol = 0."
  hidden: false
  meta:
    kb_id: 67
- name: is_visually_empty
  sql: COALESCE(CAST(contentvols ->> '$.standard_content.Trailer_Vol' AS INTEGER),
    0) = 0 AND COALESCE(CAST(contentvols ->> '$.standard_content.Clip_Vol' AS INTEGER),
    0) = 0 AND COALESCE(CAST(contentvols ->> '$.standard_content.FilmClip_Vol' AS
    INTEGER), 0) = 0
  type: boolean
  primary_key: false
  description: 'Helper used by KB 69/70: no trailers AND no extra clips/film_clips.'
  hidden: false
- name: is_legacy_title
  sql: (launchmoment IS NULL OR TRIM(launchmoment) = '') AND (latestadd IS NULL OR
    TRIM(latestadd) = '' OR julianday('now') - julianday(CASE WHEN latestadd LIKE
    '%/%/%' THEN substr(latestadd, length(latestadd) - 3, 4) || '-' || (CASE WHEN
    length(substr(latestadd, 1, instr(latestadd, '/') - 1)) = 1 THEN '0' || substr(latestadd,
    1, instr(latestadd, '/') - 1) ELSE substr(latestadd, 1, instr(latestadd, '/')
    - 1) END) || '-01' ELSE latestadd END) > 365)
  type: boolean
  primary_key: false
  description: 'Legacy Title Indicator (KB 65): no launch date AND no recent update
    (>365 days). Combines KB 14 (null update) with KB 48 (missing launch).'
  hidden: false
  meta:
    kb_id: 65
- name: tier_distribution_ratio_helper
  sql: CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER)
  type: number
  primary_key: false
  description: "Marker for Tier Distribution Ratio (KB 29): the per-row Media_Total\
    \ used in the TDR ratio Media_Total_tier / \u03A3 Media_Total_tier. The aggregation/grouping\
    \ is performed in the query."
  hidden: false
  meta:
    kb_id: 29
- name: is_high_visibility_empty_bucket
  sql: COALESCE(CAST(contentvols ->> '$.standard_content.Trailer_Vol' AS INTEGER),
    0) = 0 AND COALESCE(CAST(contentvols ->> '$.standard_content.Clip_Vol' AS INTEGER),
    0) = 0 AND COALESCE(CAST(contentvols ->> '$.standard_content.FilmClip_Vol' AS
    INTEGER), 0) = 0
  type: boolean
  primary_key: false
  description: 'High-Visibility Empty Bucket (KB 69) / Highly Rated but Visually Empty
    (KB 70) row predicate: TRUE when no clips and no trailers. KB 69/70 then filter
    by user_score being high (joined from core).'
  hidden: false
  meta:
    kb_ids:
    - 69
    - 70
- name: is_tier_content_gap
  sql: 1.0 * CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER) / (1.0
    + COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_MediaTotal' AS INTEGER),
    0)) < 1.0
  type: boolean
  primary_key: false
  description: 'Tier-Specific Content Gaps (KB 64): tier where normalized content
    amount (KB 31 NMV style) is below threshold (here < 1.0).'
  hidden: false
  meta:
    kb_id: 64
- name: normalized_media_volume
  sql: 1.0 * CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER) / (1.0
    + COALESCE(CAST(html5metrics ->> '$.html5_volumes.H5_MediaTotal' AS INTEGER),
    0))
  type: number
  primary_key: false
  description: 'Normalized Media Volume (NMV, KB 31): KB definition is ''total content
    amount / (total number of parts or groupings + 1)''. KB references children KB
    4 (HasLogo flags) and KB 5 (Movie identifier formats); we operationalise ''parts''
    as the H5_MediaTotal grouping count + 1 (the only available grouping signal),
    so NMV = Media_Total / (1 + H5_MediaTotal).'
  hidden: false
  meta:
    kb_id: 31
- name: media_share_log_term
  sql: CASE WHEN CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER)
    > 0 THEN CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER) * ln(1.0
    * CAST(contentvols ->> '$.standard_content.Media_Total' AS INTEGER)) ELSE 0 END
  type: number
  primary_key: false
  description: "Helper for AES (KB 35): per-row term contributing to availability\
    \ entropy = -\u03A3 type_i * log(type_i). The full entropy formula uses tier proportions;\
    \ this column carries the per-row product term so the agent can sum/normalise\
    \ at query time."
  hidden: false
  meta:
    kb_id: 35
measures:
- formula: srlinks:count_distinct
  name: tier_count
  description: Number of distinct tiers a show appears in (used by KB 16/41/76, AMT
    KB 26, TNML KB 51).
- formula: srlinks:count_distinct
  name: is_multi_tier
  description: Same calculation as tier_count; reach via filter '>= 2' for KB 16 (Multi-Tier
    Presence), '>= 3' for KB 41/76.
- formula: media_total:sum
  name: total_media
  description: Sum of Media_Total across rows in scope. Used as 'Total Media Volume'
    in KB 51 (TNML).
- formula: 1.0 * media_total:sum / NULLIF(srlinks:count_distinct, 0)
  name: tier_normalized_media_load
  description: 'Tier-Normalized Media Load (TNML, KB 51): Total Media Volume / Number
    of Availability Tiers. Group by srkeys to get one value per show.'
- formula: 1.0 * media_total:sum / NULLIF(srlinks:count_distinct, 0)
  name: average_media_per_tier
  description: "Average Media per Tier (AMT, KB 26): \u03A3 Media_Total_tier / |Tiers|.\
    \ Same shape as TNML; KB 26 references KB 3 (tier values)."
- formula: 1.0 * trailer_vol:sum / NULLIF(*:count, 0)
  name: trailer_coverage_ratio
  description: 'Trailer Coverage Ratio (TCR, KB 58): Trailer_Vol / Total Content Items.'
- formula: 1.0 * unrated_vol:sum / NULLIF(media_total:sum, 0)
  name: unrated_share
  description: 'Unrated Share (KB 24): Unrated_Vol / Media_Total over rows in scope.'
- formula: 1.0 * unrated_vol:sum / NULLIF(media_total:sum, 0)
  name: unrated_proportion_per_tier
  description: 'Unrated Proportion per Tier (UPT, KB 55): same formula as KB 24, but
    grouped by tier (use dimension rollups.tiertype).'
- formula: 1.0 * h5_episodes:sum / NULLIF(ep_vol:sum, 0)
  name: html5_episode_ratio
  description: 'Aggregate HER (KB 20): summed H5_Episodes / summed Ep_Vol over rows
    in scope. The row-level her column gives the per-row form.'
- formula: 1.0 * h5_media_total:sum / NULLIF(media_total:sum, 0)
  name: media_platform_compatibility_rate
  description: 'Aggregate MPCR (KB 22): summed H5_MediaTotal / summed Media_Total.'
- formula: 1.0 * filmclip_vol:sum / NULLIF(feature_vol:sum, 0)
  name: clip_to_feature_ratio
  description: Aggregate CFR (KB 56).
- formula: srlinks:count_distinct
  name: tier_count_per_show
  description: "Same as tier_count \u2014 alias used in KB 73 (\u2265 3 tiers in a\
    \ franchise)."
- formula: h5_clips:sum + h5_episodes:sum + h5_trailers:sum + h5_games:sum
  name: html5_depth_index_total
  description: Aggregate HDI (KB 59) over rows in scope.
- formula: longevity:avg
  name: longevity_avg
  description: Average longevity (KB 27) across rows in scope.
- formula: tsi_days:avg
  name: temporal_staleness_index_avg
  description: Average TSI (KB 57) across rows.
- formula: 1.0 * media_total:sum / NULLIF(total_media:sum, 0)
  name: tier_distribution_ratio
  description: "Tier Distribution Ratio (TDR, KB 29): Media_Total_tier / \u03A3_tier\
    \ Media_Total_tier. Group by tier dimension to compute per-tier share. Note: this\
    \ is the ratio per row in scope vs. total scope, so use group-by-tier filter narrowing."
- formula: trailer_deficient_int:sum
  name: trailer_deficient_count
  description: Count of (show, tier) rows that are trailer-deficient (KB 67).
- formula: peak_rating_canonical:count
  name: most_common_peak_rating_count
  description: "Helper for KB 81 \u2014 count of rows by peak_rating_canonical when\
    \ grouped on that dim, the agent picks top by ORDER BY desc + LIMIT 1."
- formula: '*:count'
  name: launch_year_count
  description: 'Launch Year Distribution (KB 91): count of rollup rows per launch_year.
    Group by launch_year.'
- formula: srkeys:count_distinct
  name: show_count
  description: "Distinct show count among rows (used in KB 49 / 73 'franchise has\
    \ \u22653 shows')."
- formula: media_share_log_term:sum
  name: availability_entropy_score
  description: "Availability Entropy Score (AES, KB 35): KB definition is -\u03A3\
    \ type_i * log(type_i) over availability tier proportions. Use group-by-tier on\
    \ Media_Total + log normalisation; this measure exposes the underlying \u03A3\
    \ term for further composition."
aggregations: []
joins:
- target_model: core
  join_pairs:
  - - srkeys
    - content_key
  join_type: left
- target_model: rollups
  join_pairs:
  - - srlinks
    - tierkey
  join_type: left
filters: []
description: 'One row per (content_key, tier) pair. Carries per-tier launch + update
  timestamps and three JSONB blobs: contentvols (standard_content with Ep/Clip/Game/Season/Feature/Media_Total/Trailer/FilmClip
  volumes), html5metrics (html5_volumes with H5_* counts), and ratinginfo (TV_Rating,
  Peak_Rating, Unrated_Vol).'
hidden: false
