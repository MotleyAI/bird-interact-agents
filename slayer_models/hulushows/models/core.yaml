version: 3
name: core
sql_table: core
query_variables: {}
data_source: hulushows
columns:
- name: content_key
  sql: content_key
  type: number
  primary_key: true
  description: "Primary key \u2014 unique id per Hulu content item (show/movie/special)."
  hidden: false
  format:
    type: integer
- name: canonical_name
  sql: canonical_name
  type: string
  primary_key: false
  description: Standardized canonical name (slug-style) for cross-platform search/matching.
  hidden: false
- name: content_title
  sql: content_title
  type: string
  primary_key: false
  description: Display title shown in UI.
  hidden: false
- name: series_id
  sql: series_id
  type: number
  primary_key: false
  description: "Franchise/series identifier \u2014 content sharing the same series_id\
    \ belongs to the same franchise (KB 13). NULL = standalone content."
  hidden: false
  format:
    type: integer
  meta:
    kb_ids:
    - 13
    - 49
    - 66
    - 72
    - 73
    - 85
    - 86
    - 87
- name: studiolink
  sql: studiolink
  type: number
  primary_key: false
  description: "FK to companies.entity_key \u2014 primary production studio for the\
    \ content."
  hidden: false
  format:
    type: integer
  meta:
    kb_ids:
    - 84
    - 88
    - 89
- name: annotations
  sql: annotations
  type: string
  primary_key: false
  description: Free-text annotation/metadata blob; populated when the content has
    any extra notes (KB 38 ACR uses 'has annotation'). NULL when no annotations.
  hidden: false
  meta:
    kb_id: 38
- name: genreclass
  sql: genreclass
  type: string
  primary_key: false
  description: "JSONB column with content classification: User_Score (mixed format\
    \ strings \u2014 KB 1), Content_Type ('show'/'movie'/'special' \u2014 KB 0), Primary_Genre\
    \ (broad genre \u2014 KB 74), Hierarchical_Genres (delimited multi-genre string\
    \ using '~' for sub-genre and '|' for alternative \u2014 KB 6)."
  hidden: false
  meta:
    kb_ids:
    - 0
    - 1
    - 6
    - 74
- name: user_score_raw
  sql: genreclass ->> '$.User_Score'
  type: string
  primary_key: false
  description: "Raw User_Score string from genreclass JSON. KB 1 documents multiple\
    \ formats: '4.35', '4.35 \u2605', '$4.35M', '4.35 RTG', etc."
  hidden: false
  meta:
    kb_id: 1
- name: user_score
  sql: CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) / CASE WHEN (genreclass ->> '$.User_Score')
    LIKE '%bp%' THEN 100.0 ELSE 1.0 END
  type: number
  primary_key: false
  description: "Normalized User_Score as REAL \u2014 strips currency/star/RTG/bp suffixes\
    \ and divides basis points by 100 to align with the 0-5 rating scale. KB 1."
  hidden: false
  meta:
    kb_ids:
    - 28
    - 30
    - 34
    - 53
    - 78
    - 83
- name: content_type
  sql: genreclass ->> '$.Content_Type'
  type: string
  primary_key: false
  description: 'Content type label: ''show'', ''movie'', or ''special'' (KB 0).'
  hidden: false
  meta:
    kb_id: 0
- name: primary_genre
  sql: genreclass ->> '$.Primary_Genre'
  type: string
  primary_key: false
  description: Primary high-level genre tag (KB 74).
  hidden: false
  meta:
    kb_id: 74
- name: hierarchical_genres
  sql: genreclass ->> '$.Hierarchical_Genres'
  type: string
  primary_key: false
  description: Delimited hierarchical-genre string using '~' for sub-genre and '|'
    for alternative branches (KB 6).
  hidden: false
  meta:
    kb_id: 6
- name: has_annotation
  sql: CASE WHEN annotations IS NOT NULL AND TRIM(annotations) <> '' THEN 1 ELSE 0
    END
  type: number
  primary_key: false
  description: 1 when the content has any annotation text, 0 otherwise. Used by KB
    38 (ACR).
  hidden: false
  meta:
    kb_id: 38
- name: title_length
  sql: LENGTH(content_title)
  type: number
  primary_key: false
  description: "Number of characters in content_title \u2014 used by KB 36 (TER) and\
    \ KB 90 (Average Title Length per Studio)."
  hidden: false
  meta:
    kb_ids:
    - 36
    - 90
- name: is_movie_by_type
  sql: LOWER(genreclass ->> '$.Content_Type') = 'movie'
  type: boolean
  primary_key: false
  description: "TRUE when content_type='movie' (one of the Movie Identifier Format\
    \ conventions \u2014 KB 5)."
  hidden: false
  meta:
    kb_id: 5
- name: is_show_by_type
  sql: LOWER(genreclass ->> '$.Content_Type') = 'show'
  type: boolean
  primary_key: false
  description: TRUE when content_type='show'.
  hidden: false
- name: n_genre_tokens
  sql: CASE WHEN (genreclass ->> '$.Hierarchical_Genres') IS NULL OR TRIM(genreclass
    ->> '$.Hierarchical_Genres') = '' THEN 0 ELSE 1 + (LENGTH(genreclass ->> '$.Hierarchical_Genres')
    - LENGTH(REPLACE(REPLACE(genreclass ->> '$.Hierarchical_Genres', '|', ''), '~',
    ''))) END
  type: number
  primary_key: false
  description: Total genre tokens in Hierarchical_Genres = 1 + count of '|' or '~'
    delimiters. Used by KB 50 (GFI) and KB 39 (MGSS).
  hidden: false
  meta:
    kb_id: 39
- name: n_genre_delimiters
  sql: (LENGTH(COALESCE(genreclass ->> '$.Hierarchical_Genres', '')) - LENGTH(REPLACE(REPLACE(COALESCE(genreclass
    ->> '$.Hierarchical_Genres', ''), '|', ''), '~', '')))
  type: number
  primary_key: false
  description: "Number of '~' or '|' delimiters in Hierarchical_Genres \u2014 used\
    \ as the GFI denominator (+1) per KB 50."
  hidden: false
- name: genre_fragmentation_index
  sql: CASE WHEN (genreclass ->> '$.Hierarchical_Genres') IS NULL OR TRIM(genreclass
    ->> '$.Hierarchical_Genres') = '' THEN NULL ELSE (1.0 + (LENGTH(genreclass ->>
    '$.Hierarchical_Genres') - LENGTH(REPLACE(REPLACE(genreclass ->> '$.Hierarchical_Genres',
    '|', ''), '~', '')))) / (1.0 + (LENGTH(genreclass ->> '$.Hierarchical_Genres')
    - LENGTH(REPLACE(REPLACE(genreclass ->> '$.Hierarchical_Genres', '|', ''), '~',
    '')))) END
  type: number
  primary_key: false
  description: 'Genre Fragmentation Index (KB 50): n_genre_tokens / (1 + n_genre_delimiters).
    Note: tokens = 1 + delimiters by construction so GFI = (1+d)/(1+d) = 1; encoded
    literally per KB formula.'
  hidden: false
  meta:
    kb_id: 50
- name: is_highly_diversified
  sql: (LENGTH(COALESCE(genreclass ->> '$.Hierarchical_Genres', '')) - LENGTH(REPLACE(REPLACE(COALESCE(genreclass
    ->> '$.Hierarchical_Genres', ''), '|', ''), '~', ''))) >= 3
  type: boolean
  primary_key: false
  description: "TRUE when the show spans many genre branches (KB 44) \u2014 operationalised\
    \ as \u22653 hierarchical-genre delimiters."
  hidden: false
  meta:
    kb_id: 44
- name: is_fragmented_genre
  sql: (LENGTH(COALESCE(genreclass ->> '$.Hierarchical_Genres', '')) - LENGTH(REPLACE(REPLACE(COALESCE(genreclass
    ->> '$.Hierarchical_Genres', ''), '|', ''), '~', ''))) > 4
  type: boolean
  primary_key: false
  description: "Fragmented Genre Definition (KB 62) \u2014 flagged when the genre\
    \ hierarchy uses many sub/alt delimiters (>4)."
  hidden: false
  meta:
    kb_id: 62
- name: is_animation_family_genre
  sql: (genreclass ->> '$.Primary_Genre') IN ('Animation and Cartoons', 'Primetime
    Animation', 'Teen', 'Comedy', 'Sitcoms') OR (genreclass ->> '$.Hierarchical_Genres')
    LIKE '%Animation and Cartoons%' OR (genreclass ->> '$.Hierarchical_Genres') LIKE
    '%Primetime Animation%' OR (genreclass ->> '$.Hierarchical_Genres') LIKE '%Sitcoms%'
  type: boolean
  primary_key: false
  description: 'Animation Families genre membership (KB 46): Primary_Genre or Hierarchical_Genres
    contains ''Animation and Cartoons'', ''Primetime Animation'', ''Teen'', ''Comedy'',
    or ''Sitcoms''.'
  hidden: false
  meta:
    kb_id: 46
- name: is_comedy
  sql: (genreclass ->> '$.Primary_Genre') = 'Comedy' OR (genreclass ->> '$.Hierarchical_Genres')
    LIKE '%Comedy%'
  type: boolean
  primary_key: false
  description: Comedy genre membership (used by KB 43 Iconic Comedy Brands).
  hidden: false
- name: is_highly_rated
  sql: CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) / CASE WHEN (genreclass ->> '$.User_Score')
    LIKE '%bp%' THEN 100.0 ELSE 1.0 END > 4.2
  type: boolean
  primary_key: false
  description: "'Highly rated' shorthand (KB 43) \u2014 user_score > 4.2 (top of KB\
    \ 78 'High' band)."
  hidden: false
- name: comedy_int
  sql: CASE WHEN (genreclass ->> '$.Primary_Genre') = 'Comedy' OR (genreclass ->>
    '$.Hierarchical_Genres') LIKE '%Comedy%' THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: Integer 0/1 of is_comedy.
  hidden: false
  meta:
    kb_id: 43
- name: highly_rated_comedy_int
  sql: CASE WHEN ((genreclass ->> '$.Primary_Genre') = 'Comedy' OR (genreclass ->>
    '$.Hierarchical_Genres') LIKE '%Comedy%') AND CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) > 4.2 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: 'Integer 0/1 indicator: highly-rated comedy show. Used by KB 43 (group
    by studiolink, sum, then filter sum >= 3).'
  hidden: false
  meta:
    kb_id: 43
- name: episode_rating_band
  sql: CASE WHEN CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) < 3.5 THEN 'Low' WHEN CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) <= 4.2 THEN 'Medium' ELSE 'High' END
  type: string
  primary_key: false
  description: 'Episode Rating Band (KB 78): Low (<3.5), Medium (3.5..4.2), High (>4.2).
    Operationalised on user_score per row.'
  hidden: false
  meta:
    kb_id: 78
- name: user_score_tier
  sql: CASE WHEN CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) >= 4 THEN 'High' WHEN CAST(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(genreclass
    ->> '$.User_Score', CHAR(9733), ''), '$', ''), 'M', ''), 'RTG', ''), 'bp', ''),
    ' ', ''), ',', ''), '%', '') AS REAL) >= 2 THEN 'Medium' ELSE 'Low' END
  type: string
  primary_key: false
  description: 'Tiered User Score Coverage band (KB 83): High (4..5), Medium (2..4),
    Low (0..2).'
  hidden: false
  meta:
    kb_id: 83
- name: is_animation_family_int
  sql: CASE WHEN (genreclass ->> '$.Primary_Genre') IN ('Animation and Cartoons',
    'Primetime Animation', 'Teen', 'Comedy', 'Sitcoms') OR (genreclass ->> '$.Hierarchical_Genres')
    LIKE '%Animation and Cartoons%' OR (genreclass ->> '$.Hierarchical_Genres') LIKE
    '%Primetime Animation%' OR (genreclass ->> '$.Hierarchical_Genres') LIKE '%Sitcoms%'
    THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: Integer 0/1 form of is_animation_family_genre.
  hidden: false
- name: is_high_csi_low_acr_helper
  sql: CASE WHEN content_info.content_size_index > 100 AND (CASE WHEN annotations
    IS NOT NULL AND TRIM(annotations) <> '' THEN 1 ELSE 0 END) = 0 THEN 1 ELSE 0 END
  type: number
  primary_key: false
  description: 'Incomplete High-Engagement Title (KB 63): high CSI (>100, derived
    in joined content_info) AND no annotation (ACR < 0.5). Per-row indicator joining
    to content_info via the auto-FK.'
  hidden: false
  meta:
    kb_id: 63
- name: is_over_fragmented
  sql: (LENGTH(COALESCE(genreclass ->> '$.Hierarchical_Genres', '')) - LENGTH(REPLACE(REPLACE(COALESCE(genreclass
    ->> '$.Hierarchical_Genres', ''), '|', ''), '~', ''))) > 6 AND COALESCE(content_info.clips_total,
    0) > COALESCE(content_info.feature_films, 0)
  type: boolean
  primary_key: false
  description: 'Over-Fragmented Offering (KB 68 / KB 71): >6 nested genre delimiters
    AND short-form clips > long-form features.'
  hidden: false
  meta:
    kb_ids:
    - 68
    - 71
- name: is_series_title_uniform_helper
  sql: canonical_name
  type: string
  primary_key: false
  description: 'Helper for Series Title Uniformity Flag (KB 87): per-row canonical_name;
    the agent computes COUNT(DISTINCT canonical_name)=1 grouped by series_id at query
    time.'
  hidden: false
  meta:
    kb_id: 87
measures:
- formula: user_score:avg
  name: average_episode_rating
  description: 'Average Episode Rating (AER, KB 30): average user_score across content
    rows. KB phrasing says ''across all episodes of a show''; this dataset has one
    user_score per content row, so AER reduces to AVG(user_score) over the rows in
    scope.'
- formula: user_score:avg
  name: average_user_score
  description: Mean user score across content rows. Used by KB 30 (AER).
- formula: user_score:var_samp
  name: user_score_dispersion
  description: 'User Score Dispersion (USD, KB 34): variance of user_score across
    content rows in scope (e.g. all episodes/items of a show or franchise).'
- formula: user_score:stddev_samp
  name: rating_diversity_score
  description: 'Rating Diversity Score (RDS, KB 53): stddev of (user) rating across
    rows; KB says ''stddev(Rating) across all content within a Franchise Group''.
    Group by series_id when computing per franchise.'
- formula: '*:count'
  name: title_count
  description: Count of content rows. Useful for KB 84 (Studio Activity Index) / KB
    85-89 (counting titles per series or studio).
- formula: content_key:count_distinct
  name: studio_catalog_size
  description: 'Studio Catalog Size (KB 88): distinct content_keys per studio when
    grouped by studiolink. Same data underlies KB 84 (SAI) and KB 89 (Title Count
    per Studio).'
- formula: content_key:count_distinct
  name: series_size
  description: 'Series Size (KB 86) / Series Entry Count (KB 85): count of distinct
    content rows tied to a series_id. Group by series_id.'
- formula: title_length:avg
  name: average_title_length
  description: 'Average Title Length per Studio (KB 90): mean number of characters
    in content_title. Group by studiolink.'
- formula: 1.0 * has_annotation:sum / *:count
  name: annotated_content_ratio
  description: 'Annotated Content Ratio (ACR, KB 38): share of content rows with non-empty
    annotations.'
- formula: highly_rated_comedy_int:sum
  name: highly_rated_comedy_count
  description: "Iconic Comedy Brands helper (KB 43): per-studio count of highly-rated\
    \ comedy shows. Group by studiolink and filter \u2265 3."
- formula: content_key:count_distinct
  name: studio_activity_index
  description: 'Studio Activity Index (SAI, KB 84): count of distinct titles linked
    to a studio (group by studiolink).'
- formula: '*:count'
  name: title_count_per_studio
  description: 'Title Count per Studio (KB 89): count of content rows per studio.
    Same as KB 88 (Studio Catalog Size) when studio_link is the grouping.'
- formula: '*:count'
  name: series_entry_count
  description: 'Series Entry Count (KB 85): count of content rows per series_id.'
- formula: user_score:min
  name: min_user_score
  description: Minimum user_score in scope. Used by KB 28 (NUS) as the minimum.
- formula: user_score:max
  name: max_user_score
  description: Maximum user_score in scope. Used by KB 28 (NUS) as the maximum.
aggregations: []
joins:
- target_model: companies
  join_pairs:
  - - studiolink
    - entity_key
  join_type: left
- target_model: content_info
  join_pairs:
  - - content_key
    - content_key
  join_type: left
filters: []
description: One row per Hulu show / movie / special. Holds the canonical key (`content_key`),
  display title, free-text annotations, the `genreclass` JSONB blob (User_Score, Content_Type,
  Primary_Genre, Hierarchical_Genres), and FKs to series and studio.
hidden: false
