    'medium' THEN 3 WHEN 'high' THEN 5 ELSE NULL END) * visitordwellmin) / 1000.0
  type: number
  primary_key: false
  description: 'Visitor Impact Risk (KB #10): VisitorCountDaily * VisitorFlowRate_score
    * VisitorDwellMin / 1000.'
