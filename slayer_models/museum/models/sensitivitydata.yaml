version: 3
name: sensitivitydata
sql_table: sensitivitydata
query_variables: {}
data_source: museum
columns:
- name: sensitivityregistry
  sql: sensitivityregistry
  type: number
  primary_key: true
  hidden: false
  format:
    type: integer
- name: artref
  sql: artref
  type: string
  primary_key: false
  hidden: false
- name: envsensitivity
  sql: envsensitivity
  type: string
  primary_key: false
  hidden: false
- name: lightsensitivity
  sql: lightsensitivity
  type: string
  primary_key: false
  description: 'Light/UV sensitivity classification (KB #23): ''Low'' (tolerates up
    to 300 lux, e.g. stone), ''Medium'' (limited to 150-200 lux, e.g. oil paintings),
    ''High'' (50 lux or less, e.g. textiles, paper).'
  hidden: false
  meta:
    kb_id: 23
- name: tempsensitivity
  sql: tempsensitivity
  type: string
  primary_key: false
  hidden: false
- name: humiditysensitivity
  sql: humiditysensitivity
  type: string
  primary_key: false
  description: 'Humidity sensitivity classification (KB #24): ''Low'' (30-65% RH,
    e.g. stone), ''Medium'' (40-60% RH, e.g. wood), ''High'' (45-55% RH minimal fluctuation,
    e.g. lacquer).'
  hidden: false
  meta:
    kb_id: 24
- name: vibrasensitivity
  sql: vibrasensitivity
  type: string
  primary_key: false
  hidden: false
- name: pollutantsensitivity
  sql: pollutantsensitivity
  type: string
  primary_key: false
  hidden: false
- name: pestsensitivity
  sql: pestsensitivity
  type: string
  primary_key: false
  hidden: false
- name: handlesensitivity
  sql: handlesensitivity
  type: string
  primary_key: false
  hidden: false
- name: transportsensitivity
  sql: transportsensitivity
  type: string
  primary_key: false
  hidden: false
- name: displaysensitivity
  sql: displaysensitivity
  type: string
  primary_key: false
  hidden: false
- name: storagesensitivity
  sql: storagesensitivity
  type: string
  primary_key: false
  hidden: false
- name: envsensweight
  sql: CASE LOWER(TRIM(envsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for EnvSensitivity per KB #1: Low=1, Medium=5, High=10.'
  hidden: false
  meta:
    kb_id: 1
- name: lightsensweight
  sql: CASE LOWER(TRIM(lightsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for LightSensitivity per KB #1: Low=1, Medium=5, High=10.'
  hidden: false
  meta:
    kb_id: 1
- name: tempsensweight
  sql: CASE LOWER(TRIM(tempsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for TempSensitivity per KB #1: Low=1, Medium=5, High=10.'
  hidden: false
  meta:
    kb_id: 1
- name: humidsensweight
  sql: CASE LOWER(TRIM(humiditysensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN
    5 WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for HumiditySensitivity per KB #1: Low=1, Medium=5,
    High=10.'
  hidden: false
  meta:
    kb_id: 1
- name: vibrasensweight
  sql: CASE LOWER(TRIM(vibrasensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for VibraSensitivity per KB #1 mapping (Low=1, Medium=5,
    High=10), extended to all SensitivityData fields.'
  hidden: false
  meta:
    kb_id: 1
- name: pollutantsensweight
  sql: CASE LOWER(TRIM(pollutantsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN
    5 WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for PollutantSensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: pestsensweight
  sql: CASE LOWER(TRIM(pestsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for PestSensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: handlesensweight
  sql: CASE LOWER(TRIM(handlesensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5
    WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for HandleSensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: transportsensweight
  sql: CASE LOWER(TRIM(transportsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN
    5 WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for TransportSensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: displaysensweight
  sql: CASE LOWER(TRIM(displaysensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5
    WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for DisplaySensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: storagesensweight
  sql: CASE LOWER(TRIM(storagesensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5
    WHEN 'high' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric weight for StorageSensitivity per KB #1 extended mapping.'
  hidden: false
  meta:
    kb_id: 1
- name: erf
  sql: (CASE LOWER(TRIM(envsensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN
    'high' THEN 10 ELSE NULL END + CASE LOWER(TRIM(lightsensitivity)) WHEN 'low' THEN
    1 WHEN 'medium' THEN 5 WHEN 'high' THEN 10 ELSE NULL END + CASE LOWER(TRIM(tempsensitivity))
    WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN 'high' THEN 10 ELSE NULL END + CASE
    LOWER(TRIM(humiditysensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN 'high'
    THEN 10 ELSE NULL END) / 4.0
  type: number
  primary_key: false
  description: 'Environmental Risk Factor (KB #2): mean of the 4 explicitly named
    sensitivity weights (Env, Light, Temp, Humid). Higher = more environmental risk.
    Note: the literal KB lists 4 names plus ''etc.''; some gold queries simplify to
    envsensweight only -- see envsensweight column for that single-aspect variant.'
  hidden: false
  meta:
    kb_id: 2
- name: high_sens_count
  sql: (CASE WHEN LOWER(TRIM(envsensitivity))='high' THEN 1 ELSE 0 END + CASE WHEN
    LOWER(TRIM(lightsensitivity))='high' THEN 1 ELSE 0 END + CASE WHEN LOWER(TRIM(tempsensitivity))='high'
    THEN 1 ELSE 0 END + CASE WHEN LOWER(TRIM(humiditysensitivity))='high' THEN 1 ELSE
    0 END + CASE WHEN LOWER(TRIM(vibrasensitivity))='high' THEN 1 ELSE 0 END + CASE
    WHEN LOWER(TRIM(pollutantsensitivity))='high' THEN 1 ELSE 0 END + CASE WHEN LOWER(TRIM(pestsensitivity))='high'
    THEN 1 ELSE 0 END + CASE WHEN LOWER(TRIM(handlesensitivity))='high' THEN 1 ELSE
    0 END + CASE WHEN LOWER(TRIM(transportsensitivity))='high' THEN 1 ELSE 0 END +
    CASE WHEN LOWER(TRIM(displaysensitivity))='high' THEN 1 ELSE 0 END + CASE WHEN
    LOWER(TRIM(storagesensitivity))='high' THEN 1 ELSE 0 END)
  type: number
  primary_key: false
  description: 'Number of sensitivity columns with value ''High'' (used by KB #14
    Accelerated Deterioration Scenario which checks >=2 high).'
  hidden: false
- name: dsd
  sql: 36.0 * (10 - (CASE LOWER(TRIM(lightsensitivity)) WHEN 'low' THEN 1 WHEN 'medium'
    THEN 5 WHEN 'high' THEN 10 ELSE NULL END)) * (10 - (CASE LOWER(TRIM(tempsensitivity))
    WHEN 'low' THEN 1 WHEN 'medium' THEN 5 WHEN 'high' THEN 10 ELSE NULL END)) * (10
    - (CASE LOWER(TRIM(humiditysensitivity)) WHEN 'low' THEN 1 WHEN 'medium' THEN
    5 WHEN 'high' THEN 10 ELSE NULL END)) / 1000.0
  type: number
  primary_key: false
  description: 'Display Safety Duration (KB #4): BaseDuration(=36 months) * (10 -
    LightSensWeight) * (10 - TempSensWeight) * (10 - HumidSensWeight) / 1000. Recommended
    max display duration in months.'
  hidden: false
  meta:
    kb_id: 4
- name: is_organic_vulnerable
  sql: LOWER(TRIM(artifactscore.mattype)) IN ('wood', 'textile', 'paper') AND LOWER(TRIM(envsensitivity))
    = 'high'
  type: boolean
  primary_key: false
  description: 'Organic Material Vulnerability (KB #20): MatType in {Wood, Textile,
    Paper} AND EnvSensitivity = ''High''. Requires specialized environmental controls.'
  hidden: false
  meta:
    kb_id: 20
measures: []
aggregations: []
joins:
- target_model: artifactscore
  join_pairs:
  - - artref
    - artregistry
  join_type: left
filters: []
hidden: false
