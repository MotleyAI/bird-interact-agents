  sql: publicaccessrating
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: eduvaluerating
  sql: eduvaluerating
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: conservediff
  sql: conservediff
  type: string
  primary_key: false
