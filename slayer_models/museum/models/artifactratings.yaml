  sql: deteriorrate
  type: string
  primary_key: false
  hidden: false
- name: conservestatus_score
  sql: CASE artifactscore.conservestatus WHEN 'Excellent' THEN 1 WHEN 'Good' THEN
    3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN 7 WHEN 'Critical' THEN 10 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric mapping of ConserveStatus per KB #0: Excellent=1, Good=3,
    Fair=5, Poor=7, Critical=10.'
  hidden: false
  meta:
    kb_id: 0
- name: cpi
  sql: ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0
  type: number
  primary_key: false
  description: 'Conservation Priority Index (KB #0): (HistSignRating + ResearchValRating
    + CultScore) * (10 - ConserveStatus_score) / 30. Higher = more urgent.'
  hidden: false
  meta:
    kb_id: 0
- name: is_high_priority
  sql: ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0 > 7
  type: boolean
  primary_key: false
  description: 'Conservation Priority Level ''High Priority'' (KB #56): CPI > 7.'
  hidden: false
  meta:
    kb_id: 56
- name: is_medium_priority
  sql: ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0 > 4 AND ((histsignrating + researchvalrating
    + cultscore) * (10 - CASE artifactscore.conservestatus WHEN 'Excellent' THEN 1
    WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN 7 WHEN 'Critical' THEN
    10 ELSE NULL END)) / 30.0 <= 7
  type: boolean
  primary_key: false
  description: 'Conservation Priority Level ''Medium Priority'' (KB #56): 4 < CPI
    <= 7.'
  hidden: false
  meta:
    kb_id: 56
- name: is_low_priority
  sql: ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0 <= 4
  type: boolean
  primary_key: false
  description: 'Conservation Priority Level ''Low Priority'' (KB #56): CPI <= 4.'
  hidden: false
  meta:
    kb_id: 56
- name: priority_level
  sql: CASE WHEN ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0 > 7 THEN 'High Priority' WHEN
    ((histsignrating + researchvalrating + cultscore) * (10 - CASE artifactscore.conservestatus
    WHEN 'Excellent' THEN 1 WHEN 'Good' THEN 3 WHEN 'Fair' THEN 5 WHEN 'Poor' THEN
    7 WHEN 'Critical' THEN 10 ELSE NULL END)) / 30.0 > 4 THEN 'Medium Priority' ELSE
    'Low Priority' END
  type: string
  primary_key: false
  description: 'Conservation Priority Level label (KB #56): High Priority (CPI > 7),
    Medium (4 < CPI <= 7), Low (CPI <= 4).'
  hidden: false
  meta:
    kb_id: 56
measures: []
aggregations: []
joins:
- target_model: artifactscore
  join_pairs:
  - - artref
    - artregistry
  join_type: left
filters: []
