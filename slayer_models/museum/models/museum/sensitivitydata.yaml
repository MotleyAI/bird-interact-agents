- name: lightsensitivity
  sql: lightsensitivity
  type: string
  primary_key: false
  description: "Light/UV sensitivity classification (KB #23): 'Low' (tolerates up\
    \ to 300 lux, e.g. stone), 'Medium' (limited to 150-200 lux, e.g. oil paintings),\
    \ 'High' (50 lux or less, e.g. textiles, paper).\n\n[kb=23]\nValues include 'Low'\
    \ (can tolerate up to 300 lux, like stone artifacts), 'Medium' (should be limited\
    \ to 150-200 lux, like oil paintings), and 'High' (restricted to 50 lux or less,\
    \ like textiles and works on paper). \u2014 Illustrates light sensitivity classifications\
    \ and their implications.\n[/kb=23]"
  label: SensitivityData.LightSensitivity
  hidden: false
  meta:
    kb_id: 23
