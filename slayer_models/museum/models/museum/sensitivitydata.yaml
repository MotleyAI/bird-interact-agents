  primary_key: false
  description: "Humidity sensitivity classification (KB #24): 'Low' (30-65% RH, e.g.\
    \ stone), 'Medium' (40-60% RH, e.g. wood), 'High' (45-55% RH minimal fluctuation,\
    \ e.g. lacquer).\n\n[kb=24]\nValues include 'Low' (can tolerate 30-65% RH, like\
    \ stone artifacts), 'Medium' (requires 40-60% RH, like wood), and 'High' (requires\
    \ 45-55% RH with minimal fluctuation, like lacquer work). \u2014 Illustrates humidity\
    \ sensitivity classifications and their implications.\n[/kb=24]"
  label: SensitivityData.HumiditySensitivity
