- name: visitorflowrate_score
  sql: CASE LOWER(TRIM(visitorflowrate)) WHEN 'low' THEN 1 WHEN 'medium' THEN 3 WHEN
    'high' THEN 5 ELSE NULL END
  type: number
  primary_key: false
  description: "Numeric VisitorFlowRate per KB #10: Low=1, Medium=3, High=5.\n\n[kb=10]\n\
    VIR = \\frac{VisitorCountDaily \\times VisitorFlowRate \\times VisitorDwellMin}{1000},\
    \ \\text{where VisitorFlowRate is numerically mapped: Low=1, Medium=3, High=5}\
    \ \u2014 Assesses the risk posed by visitor traffic to artifacts in exhibition\
    \ halls.\n[/kb=10]"
  label: Visitor Impact Risk (VIR)
  hidden: false
  meta:
    kb_id: 10
- name: vir
  sql: (visitorcountdaily * (CASE LOWER(TRIM(visitorflowrate)) WHEN 'low' THEN 1 WHEN
    'medium' THEN 3 WHEN 'high' THEN 5 ELSE NULL END) * visitordwellmin) / 1000.0
  type: number
  primary_key: false
  description: "Visitor Impact Risk (KB #10): VisitorCountDaily * VisitorFlowRate_score\
    \ * VisitorDwellMin / 1000.\n\n[kb=10]\nVIR = \\frac{VisitorCountDaily \\times\
    \ VisitorFlowRate \\times VisitorDwellMin}{1000}, \\text{where VisitorFlowRate\
    \ is numerically mapped: Low=1, Medium=3, High=5} \u2014 Assesses the risk posed\
