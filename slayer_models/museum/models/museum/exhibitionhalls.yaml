  description: "CCTV coverage classification (KB #25): 'Full' = 100%% coverage with\
    \ overlapping cameras; 'Partial' = 60-90%% with possible blind spots; 'Limited'\
    \ = <60%% covering only high-value areas.\n\n[kb=25]\n'Full' indicates 100% exhibition\
    \ space coverage with overlapping cameras, 'Partial' indicates 60-90% coverage\
    \ with possible blind spots, and 'Limited' indicates less than 60% coverage focusing\
    \ only on high-value areas. \u2014 Illustrates CCTV coverage classifications.\n\
    [/kb=25]"
  label: ExhibitionHalls.CCTVCoverage
