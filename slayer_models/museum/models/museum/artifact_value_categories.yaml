description: 'Per-artifact High-Value classification (KB #11, #51). NTILE(10) over
  the full population gives top-10% deciles for HistSignRating and CultScore. Computed
  as a SQL-backed model since percentile rank requires a window-over-population evaluation
  that can''t be inlined as a per-row column expression.'
