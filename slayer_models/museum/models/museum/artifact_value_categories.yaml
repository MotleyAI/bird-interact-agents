  description: "[kb=11]\nAn artifact is considered high-value when its InsValueUSD\
    \ exceeds $1,000,000 OR when both HistSignRating and CultScore are in the top\
    \ 10% of all artifacts. \u2014 Identifies artifacts with exceptional historical,\
    \ cultural, or monetary value requiring special attention.\n[/kb=11]"
  label: High-Value Artifact
  hidden: false
  meta:
    kb_id: 11
- name: value_category
  sql: value_category
  type: string
  primary_key: false
  description: "[kb=51]\nAn artifact falls into 'Monetary High-Value' category when\
    \ its InsValueUSD exceeds $1,000,000. It qualifies as 'Cultural/Historical High-Value'\
    \ when both its HistSignRating and CultScore are in the top 10% of all artifacts\
    \ (percentile rank = 1). Otherwise 'Other'. \u2014 Classification system for categorizing\
    \ high-value artifacts based on their monetary or cultural/historical significance.\n\
    [/kb=51]"
  label: High-Value Category
  hidden: false
  meta:
    kb_id: 51
