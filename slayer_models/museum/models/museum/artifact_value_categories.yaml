version: 4
name: artifact_value_categories
sql: SELECT s.artref AS artref, s.insvalueusd AS insvalueusd, r.histsignrating AS
  histsignrating, r.cultscore AS cultscore, NTILE(10) OVER (ORDER BY r.histsignrating
  DESC) AS hist_decile, NTILE(10) OVER (ORDER BY r.cultscore DESC) AS cult_decile,
  CASE WHEN s.insvalueusd > 1000000 OR (NTILE(10) OVER (ORDER BY r.histsignrating
  DESC) = 1 AND NTILE(10) OVER (ORDER BY r.cultscore DESC) = 1) THEN 1 ELSE 0 END
  AS is_high_value_full, CASE WHEN s.insvalueusd > 1000000 THEN 'Monetary High-Value'
  WHEN NTILE(10) OVER (ORDER BY r.histsignrating DESC) = 1 AND NTILE(10) OVER (ORDER
  BY r.cultscore DESC) = 1 THEN 'Cultural/Historical High-Value' ELSE 'Other' END
  AS value_category FROM artifactsecurityaccess s JOIN artifactratings r ON s.ratingref
  = r.ratingrecordregistry
