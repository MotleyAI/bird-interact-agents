  sql: envreadregistry
  type: INT
  primary_key: true
  hidden: false
  format:
    type: integer
- name: monitorcode
  sql: monitorcode
  type: TEXT
  primary_key: false
  hidden: false
- name: readtimestamp
  sql: readtimestamp
