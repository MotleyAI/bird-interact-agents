  description: "[kb=29]\nValues in lux range from near-dark (5-10 lux) to typical\
    \ indoor lighting (300-500 lux). Conservation standards recommend 50 lux for highly\
    \ sensitive materials, 150-200 lux for paintings and wood, and up to 300 lux for\
    \ stone and metal. Daylight can exceed 10,000 lux and should be filtered. \u2014\
    \ Illustrates light intensity measurements and their conservation implications.\n\
