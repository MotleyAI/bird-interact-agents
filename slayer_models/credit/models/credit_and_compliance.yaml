  sql: risklev
  type: string
  primary_key: false
  description: Risk level enum (Low/Medium/High/Very High). 'Low' = minimal risk,
    'Medium' = moderate (standard monitoring), 'High' = significant risk (enhanced
    monitoring), 'Very High' = severe risk (active intervention).
  hidden: false
  meta:
    kb_id: 25
- name: defhist
  sql: defhist
  type: string
  primary_key: false
  description: 'Default-history payment classification. Possible values: Excellent
