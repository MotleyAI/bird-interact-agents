  hidden: false
  meta: {}
- name: propvalue
  sql: json_extract(propfinancialdata, '$.propvalue')
  type: number
  primary_key: false
  description: Property value (extracted from propfinancialdata JSON).
  hidden: false
  meta: {}
- name: propown
  sql: json_extract(propfinancialdata, '$.propown')
  type: string
  primary_key: false
  description: 'Property ownership: Rent/Living with Parents/Own (extracted from propfinancialdata
    JSON).'
  hidden: false
  meta: {}
- name: proptype
  sql: json_extract(propfinancialdata, '$.proptype')
  type: string
  primary_key: false
  description: 'Property classification: Apartment/House/Condo (extracted from propfinancialdata
    JSON).'
  hidden: false
  meta: {}
- name: rentpayhist
  sql: json_extract(propfinancialdata, '$.rentpayhist')
  type: string
  primary_key: false
  description: Rent payment history (extracted from propfinancialdata JSON).
  hidden: false
  meta: {}
- name: mortpayhist
  sql: json_extract(propfinancialdata, '$.mortgagebits.mortpayhist')
  type: string
  primary_key: false
  description: Mortgage payment history (extracted from propfinancialdata JSON).
  hidden: false
  meta: {}
- name: ltv
  sql: CASE WHEN json_extract(propfinancialdata, '$.propvalue') > 0 THEN CAST(json_extract(propfinancialdata,
    '$.mortgagebits.mortbalance') AS REAL) / CAST(json_extract(propfinancialdata,
    '$.propvalue') AS REAL) END
  type: number
  primary_key: false
  description: Loan-to-Value Ratio (LTV) = mortgage balance / property value. Below
    0.80 avoids PMI; 0.80-0.95 typically requires PMI; above 0.95 high leverage /
    increased lending risk.
  hidden: false
  meta:
    kb_ids:
    - 2
    - 24
