- name: propfinancialdata
  sql: propfinancialdata
  type: string
  primary_key: false
  description: 'Property/housing JSON: propown (Rent/Living with Parents/Own), proptype
    (Apartment/House/Condo), propvalue (DECIMAL), rentpayhist enum, and mortgagebits
    {mortbalance, mortpayhist}.'
  hidden: false
  meta: {}
- name: mortbalance
  sql: json_extract(propfinancialdata, '$.mortgagebits.mortbalance')
  type: number
  primary_key: false
