  label: Credit Building Opportunity
  hidden: false
  meta:
    kb_id: 45
- name: is_investment_services_target
  sql: CASE WHEN credit_and_compliance__bank_and_transactions__expenses_and_assets.totassets
    > 0 AND (credit_and_compliance__bank_and_transactions__expenses_and_assets.liqassets
    / credit_and_compliance__bank_and_transactions__expenses_and_assets.totassets)
    > 0.3 AND credit_and_compliance__bank_and_transactions__expenses_and_assets__employment_and_income.mthincome
