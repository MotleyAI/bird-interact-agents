    \ strong income (mthincome > $5,000). \u2014 Identifies customers who are good\
    \ candidates for investment services.\n[/kb=46]"
  label: Investment Services Target
  hidden: false
  meta:
    kb_id: 46
- name: is_cross_sell_priority
  sql: CASE WHEN (0.4 * MIN(1.0, credit_accounts_and_history.produsescore) + 0.3 *
    MIN(1.0, credit_accounts_and_history.chanusescore) + 0.2 * MIN(1.0, credit_and_compliance__bank_and_transactions.bankrelscore)
    + 0.1 * MIN(1.0, CAST(credit_accounts_and_history.custservint AS REAL) / 10.0))
    > 0.7 AND (0.6 * (CAST(credit_and_compliance.credscore AS REAL) / 850.0) + 0.4
    * (1.0 - credit_accounts_and_history.credutil)) > 0.7 AND credit_and_compliance__bank_and_transactions__expenses_and_assets__employment_and_income__core_record.crossratio
    > 0.5 AND credit_accounts_and_history.produsescore < 0.5 THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: "Cross-Sell Priority flag (KB 49): CES > 0.7 AND CQI > 0.7 AND crossratio\
    \ > 0.5 AND produsescore < 0.5.\n\n[kb=49]\nA customer with strong CES (Customer\
    \ Engagement Score > 0.7), positive CQI (Credit Quality Index > 0.7), and unrealized\
    \ product potential (crossratio > 0.5 but produsescore < 0.5). \u2014 Identifies\
    \ customers who should be prioritized for cross-selling efforts.\n[/kb=49]"
  label: Cross-Sell Priority
  hidden: false
  meta:
    kb_id: 49
- name: is_high_engagement
  sql: CASE WHEN (0.4 * MIN(1.0, credit_accounts_and_history.produsescore) + 0.3 *
    MIN(1.0, credit_accounts_and_history.chanusescore) + 0.2 * MIN(1.0, credit_and_compliance__bank_and_transactions.bankrelscore)
    + 0.1 * MIN(1.0, CAST(credit_accounts_and_history.custservint AS REAL) / 10.0))
    > 0.7 THEN 1 ELSE 0 END
  type: DOUBLE
  primary_key: false
  description: "High Engagement Criteria flag (KB 50): CES > 0.7.\n\n[kb=50]\nA Customer\
    \ Engagement Score (CES) greater than 0.7. \u2014 Defines customers with a high\
    \ level of engagement with bank products and services.\n[/kb=50]"
  label: High Engagement Criteria
  hidden: false
  meta:
    kb_id: 50
- name: credutil_impact_band
  sql: CASE WHEN credutil < 0.30 THEN 'Optimal' WHEN credutil < 0.50 THEN 'Moderate
    Negative Impact' WHEN credutil < 0.70 THEN 'Significant Negative Impact' ELSE
    'Severe Impact' END
  type: TEXT
  primary_key: false
  description: "Credit Utilization Impact band derived from credutil.\n\n[kb=23]\n\
    Credit Utilization (credutil) ranges from 0-1 (or above). Utilization under 0.30\
    \ is optimal for credit scores, 0.30-0.50 has moderate negative impact, 0.50-0.70\
    \ has significant negative impact, and above 0.70 severely impacts credit scores.\
    \ \u2014 Illustrates how credit utilization affects credit scores.\n[/kb=23]"
  label: Credit Utilization Impact
  hidden: false
  meta:
    kb_id: 23
