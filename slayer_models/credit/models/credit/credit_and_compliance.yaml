- name: credscore_category
  sql: CASE WHEN credscore BETWEEN 300 AND 579 THEN 'Poor' WHEN credscore BETWEEN
    580 AND 669 THEN 'Fair' WHEN credscore BETWEEN 670 AND 739 THEN 'Good' WHEN credscore
    BETWEEN 740 AND 799 THEN 'Very Good' WHEN credscore BETWEEN 800 AND 850 THEN 'Excellent'
    ELSE 'Unknown' END
  type: TEXT
  primary_key: false
  description: "Credit score category: Poor/Fair/Good/Very Good/Excellent/Unknown\
    \ per KB 20 bands.\n\n[kb=20]\nCredit scores (credscore) typically range from\
    \ 300-850. 300-579: Poor, 580-669: Fair, 670-739: Good, 740-799: Very Good, 800-850:\
    \ Excellent, Otherwise: Unknown. Higher scores indicate lower credit risk. \u2014\
    \ Illustrates the meaning of different credit score ranges.\n[/kb=20]"
  label: Credit Score Categories
  hidden: false
  meta:
    kb_id: 20
- name: risklev_score
  sql: CASE risklev WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN
    'Very High' THEN 4 END
  type: DOUBLE
  primary_key: false
  description: "Numeric encoding of risklev for use in composite scores: Low=1, Medium=2,\
    \ High=3, Very High=4.\n\n[kb=8]\nRAR = profitscore \xD7 (1 - \\frac{risklev}{4}),\
    \ \\text{where risklev is converted to a numeric scale: Low=1, Medium=2, High=3,\
    \ Very High=4} \u2014 Measures the profitability of a customer relationship adjusted\
    \ for credit risk.\n[/kb=8]"
  label: Risk-Adjusted Return (RAR)
  hidden: false
  meta:
    kb_id: 8
