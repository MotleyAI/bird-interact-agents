- name: credscore
  sql: credscore
  type: INT
  primary_key: false
  description: "Credit score (300-850). 300-579 Poor, 580-669 Fair, 670-739 Good,\
    \ 740-799 Very Good, 800-850 Excellent. Higher = lower credit risk.\n\n[kb=20]\n\
    Credit scores (credscore) typically range from 300-850. 300-579: Poor, 580-669:\
    \ Fair, 670-739: Good, 740-799: Very Good, 800-850: Excellent, Otherwise: Unknown.\
    \ Higher scores indicate lower credit risk. \u2014 Illustrates the meaning of\
    \ different credit score ranges.\n[/kb=20]"
  label: Credit Score Categories
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 20
- name: risklev
  sql: risklev
  type: TEXT
  primary_key: false
  description: "Risk level enum (Low/Medium/High/Very High). 'Low' = minimal risk,\
    \ 'Medium' = moderate (standard monitoring), 'High' = significant risk (enhanced\
    \ monitoring), 'Very High' = severe risk (active intervention).\n\n[kb=25]\nRisk\
    \ level (risklev) values indicate likelihood of default or financial difficulty.\
    \ 'Low' indicates minimal risk, 'Medium' indicates moderate risk requiring standard\
    \ monitoring, 'High' indicates significant risk requiring enhanced monitoring,\
    \ and 'Very High' indicates severe risk requiring active intervention. \u2014\
    \ Illustrates what different risk level classifications mean.\n[/kb=25]"
  label: Risk Level Classifications
  hidden: false
  meta:
    kb_id: 25
- name: defhist
  sql: defhist
  type: TEXT
  primary_key: false
  description: "Default-history payment classification. Possible values: Excellent\
    \ (no late payments), Good (minimal late), Fair (occasional missed), Poor (regular\
    \ missed), Current (up to date), Past (historical data). Same enum reused for\
    \ cardpayhist, loanpayhist, mortpayhist, rentpayhist.\n\n[kb=26]\nPayment history\
    \ (defhist, mortpayhist, rentpayhist, cardpayhist, loanpayhist) classifications\
    \ indicate reliability. 'Excellent' indicates no late payments, 'Good' indicates\
    \ minimal late payments, 'Fair' indicates occasional missed payments, 'Poor' indicates\
    \ regular missed payments, 'Current' indicates being up to date, and 'Past' indicates\
    \ historical data. \u2014 Illustrates what different payment history classifications\
    \ indicate.\n[/kb=26]"
  label: Payment History Quality
  hidden: false
  meta:
    kb_id: 26
