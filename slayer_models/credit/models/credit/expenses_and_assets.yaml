- name: ltv
  sql: CASE WHEN json_extract(propfinancialdata, '$.propvalue') > 0 THEN CAST(json_extract(propfinancialdata,
    '$.mortgagebits.mortbalance') AS REAL) / CAST(json_extract(propfinancialdata,
    '$.propvalue') AS REAL) END
  type: DOUBLE
  primary_key: false
  description: "Loan-to-Value Ratio (LTV) = mortgage balance / property value (extracted\
    \ from propfinancialdata JSON).\n\n[kb=2]\nLTV = \\frac{\\text{Mortgage Balance}}{\\\
    text{Property Value}} = \\frac{\\text{propfinancialdata.mortgagebits.mortbalance}}{\\\
    text{propfinancialdata.propvalue}} \u2014 Calculates the ratio of loan amount\
    \ to the value of the asset securing the loan.\n[/kb=2]"
  label: Loan-to-Value Ratio (LTV)
  hidden: false
  meta:
    kb_id: 2
- name: ltv_band
  sql: CASE WHEN CASE WHEN json_extract(propfinancialdata, '$.propvalue') > 0 THEN
    CAST(json_extract(propfinancialdata, '$.mortgagebits.mortbalance') AS REAL) /
    CAST(json_extract(propfinancialdata, '$.propvalue') AS REAL) END < 0.80 THEN 'No
    PMI Required' WHEN CASE WHEN json_extract(propfinancialdata, '$.propvalue') >
    0 THEN CAST(json_extract(propfinancialdata, '$.mortgagebits.mortbalance') AS REAL)
    / CAST(json_extract(propfinancialdata, '$.propvalue') AS REAL) END <= 0.95 THEN
    'PMI Required' ELSE 'High Leverage' END
  type: TEXT
  primary_key: false
  description: "LTV significance band derived from ltv.\n\n[kb=24]\nLoan-to-Value\
    \ ratio (LTV) typically ranges from 0-1 (or above). Below 0.80 generally avoids\
    \ private mortgage insurance requirements, 0.80-0.95 typically requires PMI, and\
    \ above 0.95 indicates high leverage and increased lending risk. \u2014 Illustrates\
    \ what different LTV ratios mean for mortgage lending.\n[/kb=24]"
  label: Loan-to-Value Ratio Significance
  hidden: false
  meta:
    kb_id: 24
