- name: churnrate
  sql: churnrate
  type: number
  primary_key: false
  description: "Churn rate (0-1). Below 0.1 low attrition risk, 0.1-0.2 moderate,\
    \ 0.2-0.3 high, above 0.3 severe (immediate relationship intervention).\n\n[kb=29]\n\
    Churn rate (churnrate) ranges from 0-1. Values below 0.1 indicate low attrition\
    \ risk, 0.1-0.2 indicates moderate risk, 0.2-0.3 indicates high risk, and above\
    \ 0.3 indicates severe risk of customer loss requiring immediate relationship\
    \ management intervention. \u2014 Illustrates what different churn rate values\
    \ indicate about customer retention risk.\n[/kb=29]"
  label: Churn Rate Significance
  hidden: false
  format:
    type: float
  meta:
    kb_id: 29
- name: cohort_quarter
  sql: strftime('%Y', date(scoredate, '-' || tenureyrs || ' years')) || '-Q' || ((CAST(strftime('%m',
    date(scoredate, '-' || tenureyrs || ' years')) AS INTEGER) - 1) / 3 + 1)
  type: string
  primary_key: false
  description: "Cohort quarter when the customer started with the institution: scoredate\
    \ minus tenureyrs years, formatted as YYYY-Q[1-4].\n\n[kb=51]\nQuarter of the\
    \ year when the customer started with the institution (scoring date minus tenure\
    \ years) \u2014 Quarter of the year when the customer started with the institution.\n\
    [/kb=51]"
  label: Cohort Quarter
