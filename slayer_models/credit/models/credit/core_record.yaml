  description: "Cross-sell ratio (0-1). Below 0.2 indicates minimal product relationships,\
    \ 0.2-0.5 moderate opportunity, above 0.5 strong relationship with high additional\
    \ sales potential.\n\n[kb=27]\nCross-sell ratio (crossratio) ranges from 0-1.\
    \ Values below 0.2 indicate minimal product relationships, 0.2-0.5 indicates moderate\
    \ opportunity, and above 0.5 indicates strong existing relationship with high\
    \ additional sales potential. \u2014 Illustrates what different cross-sell ratio\
    \ values indicate.\n[/kb=27]"
