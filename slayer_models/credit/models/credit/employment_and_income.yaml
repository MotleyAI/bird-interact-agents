- name: debincratio_band
  sql: CASE WHEN debincratio < 0.36 THEN 'Excellent' WHEN debincratio < 0.43 THEN
    'Good' WHEN debincratio < 0.50 THEN 'Concerning' ELSE 'Risky' END
  type: TEXT
  primary_key: false
  description: "DTI interpretation band derived from debincratio.\n\n[kb=22]\nDebt-to-Income\
    \ ratio (debincratio) ranges from 0-1 (or above). Below 0.36 is typically considered\
    \ excellent, 0.36-0.43 is good, 0.43-0.50 is concerning, and above 0.50 is risky\
    \ for new credit approval. \u2014 Illustrates what different debt-to-income ratios\
    \ mean for lending decisions.\n[/kb=22]"
