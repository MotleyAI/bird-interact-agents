  sql: credit_and_compliance__bank_and_transactions__expenses_and_assets__employment_and_income__core_record__tenureyrs
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: credit_and_compliance__bank_and_transactions__expenses_and_assets__employment_and_income__core_record__crossratio
  sql: credit_and_compliance__bank_and_transactions__expenses_and_assets__employment_and_income__core_record__crossratio
  type: number
  primary_key: false
  hidden: false
  format:
    type: float
