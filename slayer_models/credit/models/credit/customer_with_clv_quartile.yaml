description: "High-Value Customer (KB 12): customer_with_clv_quartile is a query-backed\
  \ model that computes per-customer CLV quartile via NTILE(4) and exposes an `is_high_value_customer`\
  \ flag (1 when quartile=1 AND tenureyrs > 5 AND crossratio > 0.5, else 0).\n\n[kb=12]\n\
  A customer with custlifeval in the top quartile, tenureyrs > 5, and crossratio >\
  \ 0.5. \u2014 Identifies customers with significant value to the institution.\n\
  [/kb=12]"
