- name: vendsecrate_value
  sql: CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D' THEN
    1 ELSE 1 END
  type: DOUBLE
  primary_key: false
  description: "Numeric value of VendSecRate \u2014 KB #24: 'A'=4, 'B'=3, 'C'=2, 'D'/other=1.\n\
    \n[kb=24]\nEnum: 'A' = 4, 'B' = 3, 'C' = 2, 'D' or others = 1. This numeric scale\
    \ quantifies vendor security, where 'A' reflects top-tier security (score 4),\
    \ and lower ratings (down to 'D') indicate progressively weaker security controls.\
    \ \u2014 Illustrates the vendor security rating.\n[/kb=24]"
  label: VendorManagement.VendSecRate
  hidden: false
  meta:
    kb_id: 24
- name: vri
  sql: (CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END
  type: DOUBLE
  primary_key: false
  description: "Vendor Reliability Index (VRI) \u2014 KB #6: VendSecRate value \xD7\
    \ (1 if ContrState='Active' else 0.5).\n\n[kb=6]\nVRI = \\text{VendSecRate value}\
    \ \\times \\begin{cases} 1 & \\text{if ContrState = 'Active'} \\\\ 0.5 & \\text{otherwise}\
    \ \\end{cases} \u2014 Assesses vendor reliability based on security rating and\
    \ contract status.\n[/kb=6]"
  label: Vendor Reliability Index (VRI)
  hidden: false
  meta:
    kb_id: 6
- name: vra
  sql: ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END) * (riskmanagement.riskassess
    * 1.0 / NULLIF(riskmanagement.ctrleff, 0))
  type: DOUBLE
  primary_key: false
  description: "Vendor Risk Amplification (VRA) \u2014 KB #38: VRI \xD7 RES.\n\n[kb=38]\n\
    VRA = \\text{VRI} \\times \\text{RES} \u2014 Quantifies how vendor issues amplify\
    \ overall risk exposure.\n[/kb=38]"
  label: Vendor Risk Amplification (VRA)
  hidden: false
  meta:
    kb_id: 38
- name: vrc
  sql: (((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END) * (riskmanagement.riskassess
    * 1.0 / NULLIF(riskmanagement.ctrleff, 0))) * (1 - ((CASE vendsecrate WHEN 'A'
    THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN
    contrstate = 'Active' THEN 1 ELSE 0.5 END))
  type: DOUBLE
  primary_key: false
  description: "Vendor Risk Concentration (VRC) \u2014 KB #53: VRA \xD7 (1 \u2212\
    \ VRI).\n\n[kb=53]\nVRC = \\text{VRA} \\times (1 - \\text{VRI}) \u2014 Assesses\
    \ the concentration of risk from a vendor\u2019s compliance and security issues.\n\
    [/kb=53]"
  label: Vendor Risk Concentration (VRC)
  hidden: false
  meta:
    kb_id: 53
- name: vendor_risk_tier
  sql: CASE WHEN ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN
    2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5
    END) < 2 THEN 'High Risk' WHEN ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN
    3 WHEN 'C' THEN 2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active'
    THEN 1 ELSE 0.5 END) < 3 THEN 'Medium Risk' ELSE 'Low Risk' END
  type: TEXT
  primary_key: false
  description: "Vendor Risk Tier (KB #16): High Risk if VRI<2, Medium if 2\u2264VRI<3,\
    \ Low if VRI\u22653.\n\n[kb=16]\nA vendor is: High Risk if VRI < 2, Medium Risk\
    \ if 2 \u2264 VRI < 3, Low Risk if VRI \u2265 3 \u2014 Categorizes vendors into\
    \ risk tiers based on security and compliance.\n[/kb=16]"
  label: Vendor Risk Tier
  hidden: false
  meta:
    kb_id: 16
- name: is_non_compliant_vendor
  sql: polcomp = 'Non-compliant' OR proccomp = 'Non-compliant'
  type: BOOLEAN
  primary_key: false
  description: "Non-Compliant Vendor (KB #12): PolComp='Non-compliant' OR ProcComp='Non-compliant'.\n\
    \n[kb=12]\nA vendor where PolComp = 'Non-compliant' or ProcComp = 'Non-compliant'\
    \ \u2014 Identifies vendors failing compliance standards.\n[/kb=12]"
  label: Non-Compliant Vendor
  hidden: false
  meta:
    kb_id: 12
