- name: res
  sql: riskassess * 1.0 / NULLIF(ctrleff, 0)
  type: DOUBLE
  primary_key: false
  description: "Risk Exposure Score (RES) \u2014 KB #2: RiskAssess \xD7 CtrlEff^(-1)\
    \ (i.e. RiskAssess / CtrlEff).\n\n[kb=2]\nRES = \\text{RiskAssess} \\times \\\
    text{CtrlEff}^{-1} \u2014 Calculates the overall risk exposure by combining risk\
    \ assessment and residual risk.\n[/kb=2]"
  label: Risk Exposure Score (RES)
  hidden: false
  meta:
    kb_id: 2
- name: ccr
  sql: costusd * 1.0 / (penusd + 1)
  type: DOUBLE
  primary_key: false
  description: "Compliance Cost Ratio (CCR) \u2014 KB #3: CostUSD / (PenUSD + 1).\n\
    \n[kb=3]\nCCR = \\frac{\\text{CostUSD}}{\\text{PenUSD} + 1} \u2014 Evaluates the\
    \ cost of compliance relative to potential penalties.\n[/kb=3]"
  label: Compliance Cost Ratio (CCR)
  hidden: false
  meta:
    kb_id: 3
- name: ire
  sql: slapct * 1.0 / (avgresolhrs + 1)
  type: DOUBLE
  primary_key: false
  description: "Incident Resolution Efficiency (IRE) \u2014 KB #48: SLApct / (AvgResolHrs\
    \ + 1).\n\n[kb=48]\nIRE = \\text{SLApct} / (\\text{AvgResolHrs} + 1), \\text{where\
    \ SLApct and AvgResolHrs are from RiskManagement, adding 1 to avoid division by\
    \ zero.} \u2014 Measures how efficiently incidents are resolved relative to SLA\
    \ compliance.\n[/kb=48]"
  label: Incident Resolution Efficiency (IRE)
  hidden: false
  meta:
    kb_id: 48
- name: cbrf
  sql: (riskassess * 1.0 / NULLIF(ctrleff, 0)) * CASE WHEN dataflow.orignation !=
    dataflow.destnation THEN 2 ELSE 1 END
  type: DOUBLE
  primary_key: false
  description: "Cross-Border Risk Factor (CBRF) \u2014 KB #9: RES \xD7 2 if cross-border\
    \ else 1.\n\n[kb=9]\nCBRF = \\text{RES} \\times \\begin{cases} 2 & \\text{if OrigNation\
    \ \\neq DestNation} \\\\ 1 & \\text{otherwise} \\end{cases} \u2014 Evaluates risk\
    \ associated with cross-border data transfers.\n[/kb=9]"
  label: Cross-Border Risk Factor (CBRF)
  hidden: false
  meta:
    kb_id: 9
- name: iif
  sql: (riskassess * 1.0 / NULLIF(ctrleff, 0)) * (1 - (slapct * 1.0 / (avgresolhrs
    + 1)))
  type: DOUBLE
  primary_key: false
  description: "Incident Impact Factor (IIF) \u2014 KB #55: RES \xD7 (1 \u2212 IRE).\n\
    \n[kb=55]\nIIF = \\text{RES} \\times (1 - \\text{IRE}) \u2014 Measures the potential\
    \ impact of incidents based on risk exposure and resolution efficiency.\n[/kb=55]"
  label: Incident Impact Factor (IIF)
  hidden: false
  meta:
    kb_id: 55
- name: is_critical_data_flow_risk
  sql: (riskassess * 1.0 / NULLIF(ctrleff, 0)) > 0.7 AND ((dataflow.successpct * 1.0
    / (dataflow.errtally + 1)) * (1 - (dataflow.rtrytally * 1.0 / (dataflow.errtally
    + 1)))) < 0.5
  type: BOOLEAN
  primary_key: false
  description: "Critical Data Flow Risk (KB #39): RES > 0.7 AND DFRS < 0.5.\n\n[kb=39]\n\
    A data flow where RES > 0.7 and DFRS < 0.5 \u2014 Identifies data flows with both\
    \ high risk exposure and poor reliability.\n[/kb=39]"
  label: Critical Data Flow Risk
  hidden: false
  meta:
    kb_id: 39
- name: is_unstable_high_risk_flow
  sql: (((dataflow.successpct * 1.0 / (dataflow.errtally + 1)) * (1 - (dataflow.rtrytally
    * 1.0 / (dataflow.errtally + 1)))) * (dataflow.successpct * 1.0 / (dataflow.errtally
    + 1))) < 0.5 AND ((riskassess * 1.0 / NULLIF(ctrleff, 0)) > 0.7 AND ((dataflow.successpct
    * 1.0 / (dataflow.errtally + 1)) * (1 - (dataflow.rtrytally * 1.0 / (dataflow.errtally
    + 1)))) < 0.5)
  type: BOOLEAN
  primary_key: false
  description: "Unstable High-Risk Flow (KB #60): DFSI < 0.5 AND Critical Data Flow\
    \ Risk.\n\n[kb=60]\nA data flow where DFSI < 0.5 and Critical Data Flow Risk exists\
    \ \u2014 Identifies high-risk data flows with poor stability.\n[/kb=60]"
  label: Unstable High-Risk Flow
  hidden: false
  meta:
    kb_id: 60
