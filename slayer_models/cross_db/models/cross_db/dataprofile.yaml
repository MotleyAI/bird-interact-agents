- name: datasense
  sql: datasense
  type: TEXT
  primary_key: false
  hidden: false
- name: volgb
  sql: volgb
  type: DOUBLE
  primary_key: false
  description: "Approximate data volume in gigabytes. KB #22: 1000 = large dataset,\
    \ 0.1 typical for small logs.\n\n[kb=22]\nRanges from 0 to millions. A VolGB of\
    \ 1000 might represent a large dataset, while 0.1 is typical for small logs, from\
    \ DataProfile. \u2014 Illustrates the volume of data in gigabytes.\n[/kb=22]"
  label: DataProfile.VolGB
  hidden: false
  format:
    type: float
  meta:
    kb_id: 22
- name: rectally
  sql: rectally
  type: INT
  primary_key: false
  hidden: false
  format:
    type: integer
