- name: is_cross_border_compliance_gap
  sql: (gdprcomp = 'Non-compliant' OR (loclawcomp = 'Non-compliant' AND riskmanagement__dataflow.orignation
    != riskmanagement__dataflow.destnation))
  type: BOOLEAN
  primary_key: false
  description: "Cross-Border Compliance Gap (KB #15): GdprComp='Non-compliant' OR\
    \ (LocLawComp='Non-compliant' AND OrigNation\u2260DestNation).\n\n[kb=15]\nA compliance\
    \ record where GdprComp = 'Non-compliant' or LocLawComp = 'Non-compliant' and\
    \ OrigNation \u2260 DestNation \u2014 Identifies compliance issues in cross-border\
    \ data flows.\n[/kb=15]"
  label: Cross-Border Compliance Gap
  hidden: false
  meta:
    kb_id: 15
- name: is_regulatory_risk_exposure
  sql: ((riskmanagement.riskassess * 1.0 / NULLIF(riskmanagement.ctrleff, 0)) * CASE
    WHEN riskmanagement__dataflow.orignation != riskmanagement__dataflow.destnation
    THEN 2 ELSE 1 END) > 1.5 AND (gdprcomp = 'Non-compliant' OR (loclawcomp = 'Non-compliant'
    AND riskmanagement__dataflow.orignation != riskmanagement__dataflow.destnation))
  type: BOOLEAN
  primary_key: false
  description: "Regulatory Risk Exposure (KB #19): CBRF > 1.5 AND Cross-Border Compliance\
    \ Gap.\n\n[kb=19]\nA data flow with CBRF > 1.5 and Cross-Border Compliance Gap\
    \ exists \u2014 Identifies data flows with high regulatory risk due to compliance\
    \ gaps and cross-border transfers.\n[/kb=19]"
  label: Regulatory Risk Exposure
  hidden: false
  meta:
    kb_id: 19
- name: is_regulatory_overload_flow
  sql: (((riskmanagement.riskassess * 1.0 / NULLIF(riskmanagement.ctrleff, 0)) * CASE
    WHEN riskmanagement__dataflow.orignation != riskmanagement__dataflow.destnation
    THEN 2 ELSE 1 END) > 1.5 AND (gdprcomp = 'Non-compliant' OR (loclawcomp = 'Non-compliant'
    AND riskmanagement__dataflow.orignation != riskmanagement__dataflow.destnation)))
    AND gdprcomp = 'Non-compliant'
  type: BOOLEAN
  primary_key: false
  description: "Regulatory Overload Flow (KB #46): Regulatory Risk Exposure AND GdprComp='Non-compliant'.\n\
    \n[kb=46]\nA data flow with Regulatory Risk Exposure and GdprComp = 'Non-compliant'\
    \ \u2014 Highlights data flows with both regulatory risk and compliance gaps.\n\
    [/kb=46]"
  label: Regulatory Overload Flow
  hidden: false
  meta:
    kb_id: 46
- name: is_incident_prone_compliance_flow
  sql: ((riskmanagement.riskassess * 1.0 / NULLIF(riskmanagement.ctrleff, 0)) * (1
    - (riskmanagement.slapct * 1.0 / (riskmanagement.avgresolhrs + 1)))) > 0.8 AND
    gdprcomp = 'Non-compliant'
  type: BOOLEAN
  primary_key: false
  description: "Incident-Prone Compliance Flow (KB #64): IIF > 0.8 AND GdprComp='Non-compliant'.\n\
    \n[kb=64]\nA data flow where IIF > 0.8 and GdprComp = 'Non-compliant' \u2014 Flags\
    \ data flows with high incident impact and compliance gaps.\n[/kb=64]"
  label: Incident-Prone Compliance Flow
  hidden: false
  meta:
    kb_id: 64
