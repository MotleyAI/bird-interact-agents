- name: vendsecrate_value
  sql: CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D' THEN
    1 ELSE 1 END
  type: number
  primary_key: false
  description: "Numeric value of VendSecRate \u2014 KB #24: 'A'=4, 'B'=3, 'C'=2, 'D'/other=1."
  hidden: false
  meta:
    kb_id: 24
- name: vri
  sql: (CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END
  type: number
  primary_key: false
  description: "Vendor Reliability Index (VRI) \u2014 KB #6: VendSecRate value \xD7\
    \ (1 if ContrState='Active' else 0.5)."
  hidden: false
  meta:
    kb_id: 6
- name: vra
  sql: ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END) * (riskmanagement.riskassess
    * 1.0 / NULLIF(riskmanagement.ctrleff, 0))
  type: number
  primary_key: false
  description: "Vendor Risk Amplification (VRA) \u2014 KB #38: VRI \xD7 RES."
  hidden: false
  meta:
    kb_id: 38
- name: vrc
  sql: (((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D'
    THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5 END) * (riskmanagement.riskassess
    * 1.0 / NULLIF(riskmanagement.ctrleff, 0))) * (1 - ((CASE vendsecrate WHEN 'A'
    THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN
    contrstate = 'Active' THEN 1 ELSE 0.5 END))
  type: number
  primary_key: false
  description: "Vendor Risk Concentration (VRC) \u2014 KB #53: VRA \xD7 (1 \u2212\
    \ VRI)."
  hidden: false
  meta:
    kb_id: 53
- name: vendor_risk_tier
  sql: CASE WHEN ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN
    2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active' THEN 1 ELSE 0.5
    END) < 2 THEN 'High Risk' WHEN ((CASE vendsecrate WHEN 'A' THEN 4 WHEN 'B' THEN
    3 WHEN 'C' THEN 2 WHEN 'D' THEN 1 ELSE 1 END) * CASE WHEN contrstate = 'Active'
    THEN 1 ELSE 0.5 END) < 3 THEN 'Medium Risk' ELSE 'Low Risk' END
  type: string
  primary_key: false
  description: "Vendor Risk Tier (KB #16): High Risk if VRI<2, Medium if 2\u2264VRI<3,\
    \ Low if VRI\u22653."
  hidden: false
  meta:
    kb_id: 16
- name: is_non_compliant_vendor
  sql: polcomp = 'Non-compliant' OR proccomp = 'Non-compliant'
  type: boolean
  primary_key: false
  description: 'Non-Compliant Vendor (KB #12): PolComp=''Non-compliant'' OR ProcComp=''Non-compliant''.'
  hidden: false
  meta:
    kb_id: 12
