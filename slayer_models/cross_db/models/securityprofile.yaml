  hidden: false
  format:
    type: integer
- name: recordregistry
  sql: recordregistry
  type: string
  primary_key: false
  hidden: false
- name: encstate
  sql: encstate
  type: string
  primary_key: false
  description: 'Encryption status. KB #23: ''Full'' = all data encrypted; ''Partial''
    suggests gaps.'
  hidden: false
  meta:
    kb_id: 23
- name: encmeth
  sql: encmeth
  type: string
  primary_key: false
