  sql: aclstate
  type: string
  primary_key: false
  hidden: false
- name: apisecstate
  sql: apisecstate
  type: string
  primary_key: false
  hidden: false
- name: logintcheck
  sql: logintcheck
  type: string
  primary_key: false
  hidden: false
- name: logretdays
  sql: logretdays
  type: number
  primary_key: false
  description: 'Audit log retention period in days. KB #29: 365 meets many compliance
    needs; <30 may violate regulations.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 29
- name: bkpstate
  sql: bkpstate
  type: string
  primary_key: false
  hidden: false
- name: drecstate
  sql: drecstate
  type: string
  primary_key: false
  hidden: false
- name: bcstate
  sql: bcstate
  type: string
  primary_key: false
  hidden: false
- name: srs
  sql: CASE WHEN encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate =
    'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END
  type: number
  primary_key: false
  description: "Security Robustness Score (SRS) \u2014 KB #5: 3 if Full enc AND Strong\
    \ ACL; 2 if Full enc OR Adequate ACL; 1 otherwise."
  hidden: false
  meta:
    kb_id: 5
- name: sccr
  sql: (CASE WHEN encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate =
    'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END) * 1.0 / (riskmanagement.costusd
    + 1)
  type: number
  primary_key: false
  description: "Security Control Cost Ratio (SCCR) \u2014 KB #31: SRS / (CostUSD +\
    \ 1)."
  hidden: false
  meta:
    kb_id: 31
- name: ecr
  sql: (CASE WHEN encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate =
    'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END) * (dataprofile.volgb * CASE
    dataprofile.datasense WHEN 'High' THEN 3 WHEN 'Medium' THEN 2 WHEN 'Low' THEN
    1 ELSE 1 END)
  type: number
  primary_key: false
  description: "Encryption Coverage Ratio (ECR) \u2014 KB #35: SRS \xD7 DSI."
  hidden: false
  meta:
    kb_id: 35
- name: spm
  sql: ((CASE WHEN encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate
    = 'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END) * (dataprofile.volgb * CASE
    dataprofile.datasense WHEN 'High' THEN 3 WHEN 'Medium' THEN 2 WHEN 'Low' THEN
    1 ELSE 1 END)) * (logretdays * 1.0 / 365)
  type: number
  primary_key: false
  description: "Security Posture Maturity (SPM) \u2014 KB #52: ECR \xD7 LogRetDays/365."
  hidden: false
  meta:
    kb_id: 52
- name: is_secure_data_flow
  sql: (CASE WHEN encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate =
    'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END) = 3
  type: boolean
  primary_key: false
  description: 'Secure Data Flow (KB #11): SRS = 3.'
  hidden: false
  meta:
    kb_id: 11
- name: is_sensitive_data_exposure
  sql: (dataprofile.volgb * CASE dataprofile.datasense WHEN 'High' THEN 3 WHEN 'Medium'
    THEN 2 WHEN 'Low' THEN 1 ELSE 1 END) > 100 AND (CASE WHEN encstate = 'Full' AND
    aclstate = 'Strong' THEN 3 WHEN encstate = 'Full' OR aclstate = 'Adequate' THEN
    2 ELSE 1 END) < 2
  type: boolean
  primary_key: false
  description: 'Sensitive Data Exposure (KB #14): DSI > 100 AND SRS < 2.'
  hidden: false
  meta:
    kb_id: 14
- name: is_unprotected_sensitive_data
  sql: (dataprofile.volgb * CASE dataprofile.datasense WHEN 'High' THEN 3 WHEN 'Medium'
    THEN 2 WHEN 'Low' THEN 1 ELSE 1 END) > 100 AND ((CASE WHEN encstate = 'Full' AND
    aclstate = 'Strong' THEN 3 WHEN encstate = 'Full' OR aclstate = 'Adequate' THEN
    2 ELSE 1 END) * (dataprofile.volgb * CASE dataprofile.datasense WHEN 'High' THEN
    3 WHEN 'Medium' THEN 2 WHEN 'Low' THEN 1 ELSE 1 END)) < 2
  type: boolean
  primary_key: false
  description: 'Unprotected Sensitive Data (KB #41): DSI > 100 AND ECR < 2.'
  hidden: false
  meta:
    kb_id: 41
- name: is_insecure_high_volume_flow
  sql: dataprofile.volgb > 500 AND (CASE WHEN encstate = 'Full' AND aclstate = 'Strong'
    THEN 3 WHEN encstate = 'Full' OR aclstate = 'Adequate' THEN 2 ELSE 1 END) < 2
  type: boolean
  primary_key: false
  description: 'Insecure High-Volume Flow (KB #45): VolGB > 500 AND SRS < 2.'
  hidden: false
  meta:
    kb_id: 45
- name: is_sensitive_unstable_flow
  sql: (((dataflow.successpct * 1.0 / (dataflow.errtally + 1)) * (1 - (dataflow.rtrytally
    * 1.0 / (dataflow.errtally + 1)))) * (dataflow.successpct * 1.0 / (dataflow.errtally
    + 1))) < 0.5 AND ((dataprofile.volgb * CASE dataprofile.datasense WHEN 'High'
    THEN 3 WHEN 'Medium' THEN 2 WHEN 'Low' THEN 1 ELSE 1 END) > 100 AND (CASE WHEN
    encstate = 'Full' AND aclstate = 'Strong' THEN 3 WHEN encstate = 'Full' OR aclstate
    = 'Adequate' THEN 2 ELSE 1 END) < 2)
  type: boolean
  primary_key: false
  description: 'Sensitive Unstable Flow (KB #68): DFSI < 0.5 AND Sensitive Data Exposure.'
  hidden: false
  meta:
    kb_id: 68
measures: []
aggregations: []
joins:
- target_model: dataflow
  join_pairs:
  - - flowkey
    - recordregistry
  join_type: left
- target_model: dataprofile
  join_pairs:
  - - profilekey
    - profiletrace
  join_type: left
- target_model: riskmanagement
  join_pairs:
  - - riskkey
    - risktrace
  join_type: left
filters: []
hidden: false
