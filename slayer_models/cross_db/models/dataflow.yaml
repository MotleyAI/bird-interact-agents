- name: successpct
  sql: successpct
  type: number
  primary_key: false
  description: "Success rate (0\u2013100%) of data transfer attempts. KB #20: 95%\
    \ indicates reliable transfers; <80% suggests frequent failures."
  hidden: false
  format:
    type: float
  meta:
    kb_id: 20
- name: errtally
  sql: errtally
  type: number
  primary_key: false
  description: 'Total errors observed for this data flow. KB #27: 0 = flawless; >10
    suggests reliability issues.'
  hidden: false
  format:
    type: integer
  meta:
    kb_id: 27
- name: rtrytally
  sql: rtrytally
  type: number
  primary_key: false
  hidden: false
  format:
    type: integer
- name: dte
  sql: successpct * 1.0 / (errtally + 1)
  type: number
  primary_key: false
  description: "Data Transfer Efficiency (DTE) \u2014 KB #0: SuccessPct / (ErrTally\
    \ + 1)."
  hidden: false
  meta:
    kb_id: 0
- name: bsi
  sql: bwidthpct * datasizemb * 1.0 / NULLIF(durmin, 0)
  type: number
  primary_key: false
  description: "Bandwidth Saturation Index (BSI) \u2014 KB #1: BwidthPct \xD7 DataSizeMB\
    \ / DurMin."
  hidden: false
  meta:
    kb_id: 1
- name: dfrs
  sql: (successpct * 1.0 / (errtally + 1)) * (1 - (rtrytally * 1.0 / (errtally + 1)))
  type: number
  primary_key: false
  description: "Data Flow Reliability Score (DFRS) \u2014 KB #30: DTE \xD7 (1 \u2212\
    \ RtryTally / (ErrTally + 1))."
  hidden: false
  meta:
    kb_id: 30
- name: dfsi
  sql: ((successpct * 1.0 / (errtally + 1)) * (1 - (rtrytally * 1.0 / (errtally +
    1)))) * (successpct * 1.0 / (errtally + 1))
  type: number
  primary_key: false
  description: "Data Flow Stability Index (DFSI) \u2014 KB #50: DFRS \xD7 SuccessPct\
    \ / (ErrTally + 1)."
  hidden: false
  meta:
    kb_id: 50
- name: is_cross_border
  sql: orignation != destnation
  type: boolean
  primary_key: false
  description: 'Cross-Border Data Flow (KB #75): TRUE iff OrigNation != DestNation.'
  hidden: false
  meta:
    kb_id: 75
- name: transfer_path
  sql: orignation || ' -> ' || destnation
  type: string
  primary_key: false
  description: 'Transfer Path (KB #70): ''OrigNation -> DestNation'' string.'
  hidden: false
  meta:
    kb_id: 70
- name: is_overloaded_data_flow
  sql: (bwidthpct * datasizemb * 1.0 / NULLIF(durmin, 0)) > 50 AND (successpct * 1.0
    / (errtally + 1)) < 1.0
  type: boolean
  primary_key: false
  description: 'Overloaded Data Flow (KB #18): BSI > 50 AND DTE < 1.0.'
  hidden: false
  meta:
    kb_id: 18
