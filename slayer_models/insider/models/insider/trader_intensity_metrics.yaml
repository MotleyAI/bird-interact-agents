  sql: tle
  type: DOUBLE
  primary_key: false
  hidden: false
- name: rat
  sql: rat
  type: DOUBLE
  primary_key: false
  hidden: false
- name: avg_omi
  sql: avg_omi
  type: DOUBLE
  primary_key: false
  hidden: false
- name: avg_sai
  sql: avg_sai
  type: DOUBLE
  primary_key: false
  hidden: false
- name: ati
  sql: dtr * tle * avg_omi
  type: DOUBLE
  primary_key: false
  description: "Aggressive Trading Intensity (ATI = DTR * TLE * avg(OMI)) \u2014 KB\
    \ #36.\n\n[kb=36]\nATI = \\text{DTR} \\times \\text{TLE} \\times \\text{OMI}.\
    \ \u2014 Measures intensity by combining high turnover, leverage, and order modification\
    \ frequency.\n[/kb=36]"
  label: Aggressive Trading Intensity (ATI)
  hidden: false
  meta:
    kb_id: 36
- name: swt
  sql: avg_sai * dtr
  type: DOUBLE
  primary_key: false
  description: "Suspicion-Weighted Turnover (SWT = avg(SAI) * DTR) \u2014 KB #37.\n\
    \n[kb=37]\nSWT = \\text{SAI} \\times \\text{DTR} \\\\ \\text{where SAI is Suspicious\
    \ Activity Index  and DTR is Daily Turnover Rate .} \u2014 Calculates daily turnover\
    \ weighted by the Suspicious Activity Index.\n[/kb=37]"
  label: Suspicion-Weighted Turnover (SWT)
  hidden: false
  meta:
    kb_id: 37
- name: is_high_velocity_suspicion
  sql: rat > 1.0 AND avg_sai > 0.6
  type: BOOLEAN
  primary_key: false
  description: "High Velocity Suspicion Trader (KB #66): RAT > 1.0 AND avg(SAI) >\
    \ 0.6.\n\n[kb=66]\nA trader with a high Risk-Adjusted Turnover (RAT)  (e.g., >\
    \ 1.0) AND a high Suspicious Activity Index (SAI)  (e.g., > 0.6). \u2014 Identifies\
    \ traders exhibiting both high risk-adjusted turnover and a high suspicious activity\
    \ index.\n[/kb=66]"
  label: High Velocity Suspicion Trader
  hidden: false
  meta:
    kb_id: 66
- name: ass
  sql: avg_sai * (dtr * tle * avg_omi)
  type: DOUBLE
  primary_key: false
  description: "Aggressive Suspicion Score (ASS = SAI * ATI) \u2014 KB #54. Uses avg(SAI)\
    \ per trader and ATI = DTR * TLE * avg(OMI).\n\n[kb=54]\nASS = \\text{SAI} \\\
    times \\text{ATI} \u2014 Combines overall suspicious activity index with aggressive\
    \ trading intensity, identifying traders who are both suspicious and trade aggressively.\n\
    [/kb=54]"
  label: Aggressive Suspicion Score (ASS)
  hidden: false
  meta:
    kb_id: 54
