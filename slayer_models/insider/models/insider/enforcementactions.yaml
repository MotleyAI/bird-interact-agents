- name: resstat
  sql: resstat
  type: TEXT
  primary_key: false
  description: "Resolution progress status (Pending / In Progress / Resolved). KB\
    \ #72 (Premature Resolution Block): updates to 'Resolved' must be blocked when\
    \ linked investigationdetails.iii > 75.\n\n[kb=72]\nBlock UPDATE of enforcementactions.resstat\
    \ to 'Resolved' IF linked investigationdetails yield an Investigation Intensity\
    \ Index > 75 \u2014 A business rule preventing an enforcement action from being\
    \ marked as 'Resolved' if associated risk metrics (like III) exceed a predefined\
    \ threshold, ensuring high-risk cases receive sufficient review.\n[/kb=72]"
  label: Premature Resolution Block
  hidden: false
  meta:
    kb_id: 72
