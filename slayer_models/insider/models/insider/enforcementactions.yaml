- name: traderestr
  sql: traderestr
  type: TEXT
  primary_key: false
  description: "Trading Restriction Period Types (KB #29): 'Blackout' = complete prohibition\
    \ on trading specific securities or during certain periods (e.g. around earnings).\
    \ 'Special' = other case-specific restrictions (order-type / position-size limits,\
    \ pre-trade approvals).\n\n[kb=29]\n`traderestr`: 'Blackout' typically refers\
    \ to a complete prohibition on trading specific securities or during certain periods\
    \ (e.g., around earnings announcements). 'Special' indicates other, specific restrictions\
    \ tailored to the case, which might include limits on order types, position sizes,\
    \ or requiring pre-trade approvals. \u2014 Explains the types of trading restrictions\
    \ imposed as part of enforcement.\n[/kb=29]"
  label: Trading Restriction Period Types
  hidden: false
  meta:
