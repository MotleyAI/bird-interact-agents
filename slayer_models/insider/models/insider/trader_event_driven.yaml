version: 5
name: trader_event_driven
sql: "SELECT\n  tr.trdref AS tradereg,\n  SUM(CASE WHEN sf.corpeventprx IS NOT NULL\
  \ THEN 1 ELSE 0 END) * 1.0 / NULLIF(COUNT(sf.sentreg), 0) AS event_share,\n  COUNT(sf.sentreg)\
  \ AS n_transactions_with_sentiment\nFROM transactionrecord tr\nLEFT JOIN sentimentandfundamentals\
  \ sf ON sf.transref = tr.transreg\nGROUP BY tr.trdref"
query_variables: {}
data_source: insider
columns:
- name: tradereg
  sql: tradereg
  type: TEXT
  primary_key: true
  hidden: false
- name: event_share
  sql: event_share
  type: DOUBLE
  primary_key: false
  description: Share of trader's transactions with non-null corpeventprx.
  hidden: false
- name: n_transactions_with_sentiment
  sql: n_transactions_with_sentiment
  type: DOUBLE
  primary_key: false
  hidden: false
- name: is_event_driven_trader
  sql: event_share > 0.30
  type: BOOLEAN
  primary_key: false
  description: 'Event-Driven Trader (KB #17): >30% of transactions linked to a corporate
    event.'
  hidden: false
measures: []
aggregations: []
joins: []
filters: []
description: "Per-trader event-driven flag (KB #17): share of a trader's transactions\
  \ linked (via sentimentandfundamentals) with non-null corpeventprx. is_event_driven_trader\
  \ = share > 0.30.\n\n[kb=17]\nA trader may be classified as Event-Driven if a significant\
  \ portion (>30%) of their transactionrecord entries (linked via trdref) have a non-null\
  \ corpeventprx (joined via transref). \u2014 Classifies traders whose activity appears\
  \ strongly linked to corporate events.\n[/kb=17]"
hidden: false
