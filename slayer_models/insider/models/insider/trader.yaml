version: 5
name: trader
sql_table: trader
query_variables: {}
data_source: insider
columns:
- name: tradereg
  sql: tradereg
  type: TEXT
  primary_key: true
  hidden: false
- name: tradekind
  sql: tradekind
  type: TEXT
  primary_key: false
  description: Broad category of the trader (Market Maker, Broker, Individual, Institution).
  hidden: false
- name: acctdays
  sql: acctdays
  type: INT
  primary_key: false
  description: Age of the trading account in days since opening.
  hidden: false
  format:
    type: integer
- name: acctbal
  sql: acctbal
  type: DOUBLE
  primary_key: false
  description: Current cash equity in the trader's account in USD.
  hidden: false
  format:
    type: float
- name: freqscope
  sql: freqscope
  type: TEXT
  primary_key: false
  description: 'Average trading frequency classification: Low, Medium, High.'
  hidden: false
- name: voldaily
  sql: voldaily
  type: DOUBLE
  primary_key: false
  description: Mean daily share volume traded across all symbols.
  hidden: false
  format:
    type: float
- name: posavg
  sql: posavg
  type: DOUBLE
  primary_key: false
  description: Average position size in USD held per trade.
  hidden: false
  format:
    type: float
- name: posspan
  sql: posspan
  type: TEXT
  primary_key: false
  description: "Trader Position Holding Style (KB #20): Intraday = open+close same\
    \ day; Swing = a few days to weeks; Position = weeks to months on broader trends;\
    \ Long-term = months/years on fundamentals.\n\n[kb=20]\n`posspan`: 'Intraday'\
    \ implies positions are typically opened and closed within the same trading day.\
    \ 'Swing' suggests holding for a few days to weeks, capturing short-term price\
    \ moves. 'Position' implies holding for weeks to months, based on broader trends.\
    \ 'Long-term' indicates holding for months or years, often based on fundamental\
    \ analysis. \u2014 Illustrates the typical duration traders hold their positions,\
    \ based on their strategy.\n[/kb=20]"
  label: Trader Position Holding Style
  hidden: false
  meta:
    kb_id: 20
- name: trading_performance
  sql: trading_performance
  type: TEXT
  primary_key: false
  description: 'JSONB metrics. Top-level: winpct, plratio. Nested risklevel: {risklevel
    (Conservative/Moderate/Aggressive), margpct, levratio}.'
  hidden: false
- name: winpct
  sql: json_extract(trading_performance, '$.winpct')
  type: DOUBLE
  primary_key: false
  description: Historical win-rate percentage (extracted from trading_performance
    JSON).
  hidden: false
- name: plratio
  sql: json_extract(trading_performance, '$.plratio')
  type: DOUBLE
  primary_key: false
  description: Profit-to-loss ratio of realised trades (extracted from trading_performance
    JSON).
  hidden: false
- name: tle
  sql: CAST(json_extract(trading_performance, '$.risklevel.levratio') AS REAL)
  type: DOUBLE
  primary_key: false
  description: "Trader Leverage Exposure (TLE = trading_performance.risklevel.levratio)\
    \ \u2014 KB #2.\n\n[kb=2]\nTLE = \\text{trading_performance.risklevel.levratio}\
    \ \u2014 Extracts the leverage ratio from the trader's performance data.\n[/kb=2]"
  label: Trader Leverage Exposure (TLE)
  hidden: false
  meta:
    kb_id: 2
- name: margpct
  sql: CAST(json_extract(trading_performance, '$.risklevel.margpct') AS REAL)
  type: DOUBLE
  primary_key: false
  description: Margin utilisation percentage (extracted from trading_performance.risklevel
    JSON).
  hidden: false
- name: risk_appetite
  sql: json_extract(trading_performance, '$.risklevel.risklevel')
  type: TEXT
  primary_key: false
  description: 'Trader Risk Appetite (KB #23 reference): Conservative / Moderate /
    Aggressive.'
  hidden: false
- name: dtr
  sql: voldaily * 1.0 / NULLIF(acctbal, 0)
  type: DOUBLE
  primary_key: false
  description: "Daily Turnover Rate (DTR = voldaily / acctbal) \u2014 KB #0.\n\n[kb=0]\n\
    DTR = \\frac{\\text{voldaily}}{\\text{acctbal}} \u2014 Calculates the ratio of\
    \ a trader's daily trading volume to their account balance, indicating capital\
    \ velocity.\n[/kb=0]"
  label: Daily Turnover Rate (DTR)
  hidden: false
  meta:
    kb_id: 0
- name: rawr
  sql: json_extract(trading_performance, '$.winpct') * 1.0 / MAX(1.0, CAST(json_extract(trading_performance,
    '$.risklevel.levratio') AS REAL))
  type: DOUBLE
  primary_key: false
  description: "Risk-Adjusted Win Rate (RAWR = winpct / Max(1, TLE)) \u2014 KB #59.\n\
    \n[kb=59]\nRAWR = \\frac{\\text{trading_performance.winpct}}{\\text{Max}(1, \\\
    text{TLE})} \u2014 Calculates the trader's historical win percentage adjusted\
    \ for their leverage exposure.\n[/kb=59]"
  label: Risk-Adjusted Win Rate (RAWR)
  hidden: false
  meta:
    kb_id: 59
- name: rat
  sql: (voldaily * 1.0 / NULLIF(acctbal, 0)) * CAST(json_extract(trading_performance,
    '$.risklevel.levratio') AS REAL)
  type: DOUBLE
  primary_key: false
  description: "Risk-Adjusted Turnover (RAT = DTR * TLE) \u2014 KB #30.\n\n[kb=30]\n\
    RAT = \\text{DTR} \\times \\text{TLE} \\\\ \\text{where DTR is Daily Turnover\
    \ Rate  and TLE is Trader Leverage Exposure .} \u2014 Calculates trader turnover\
    \ scaled by their leverage exposure.\n[/kb=30]"
  label: Risk-Adjusted Turnover (RAT)
  hidden: false
  meta:
    kb_id: 30
- name: is_high_risk_trader
  sql: (CAST(json_extract(trading_performance, '$.risklevel.levratio') AS REAL) >
    5.0 AND json_extract(trading_performance, '$.risklevel.risklevel') = 'Aggressive')
    OR (voldaily * 1.0 / NULLIF(acctbal, 0)) > 0.5
  type: BOOLEAN
  primary_key: false
  description: "High-Risk Trader Profile (KB #10): TLE>5 AND risk_appetite='Aggressive'\
    \ OR DTR>0.5.\n\n[kb=10]\nA trader is considered High-Risk if their TLE > 5.0\
    \ AND their `trading_performance.risklevel.risklevel` is 'Aggressive' OR their\
    \ DTR > 0.5. \u2014 Identifies traders exhibiting characteristics associated with\
    \ high-risk trading strategies.\n[/kb=10]"
  label: High-Risk Trader Profile
  hidden: false
  meta:
    kb_id: 10
- name: is_high_frequency_high_risk
  sql: ((CAST(json_extract(trading_performance, '$.risklevel.levratio') AS REAL) >
    5.0 AND json_extract(trading_performance, '$.risklevel.risklevel') = 'Aggressive')
    OR (voldaily * 1.0 / NULLIF(acctbal, 0)) > 0.5) AND freqscope = 'High'
  type: BOOLEAN
  primary_key: false
  description: "High-Frequency High-Risk Trader (KB #40): High-Risk Trader Profile\
    \ AND freqscope='High'.\n\n[kb=40]\nA trader matching the High-Risk Trader Profile\
    \  AND whose freqscope is 'High'. \u2014 Identifies traders classified as High-Risk\
    \ who also operate at high frequency.\n[/kb=40]"
  label: High-Frequency High-Risk Trader
  hidden: false
  meta:
    kb_id: 40
measures: []
aggregations: []
joins: []
filters: []
description: A trader account in the insider-trading surveillance system. PK = `tradereg`.
  JSON `trading_performance` exposes `winpct`, `plratio`, and a nested `risklevel`
  block (`risklevel`, `margpct`, `levratio`).
hidden: false
