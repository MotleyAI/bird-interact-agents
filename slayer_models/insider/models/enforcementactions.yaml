version: 3
name: enforcementactions
sql_table: enforcementactions
query_variables: {}
data_source: insider
columns:
- name: enforcereg
  sql: enforcereg
  type: string
  primary_key: true
  hidden: false
- name: compref2
  sql: compref2
  type: string
  primary_key: false
  hidden: false
- name: acttake
  sql: acttake
  type: string
  primary_key: false
  description: Enforcement action applied (Warning / Restriction / Suspension).
  hidden: false
- name: esclvl
  sql: esclvl
  type: string
  primary_key: false
  description: Escalation destination within the organisation (Supervisor / Compliance
    / Legal).
  hidden: false
- name: resstat
  sql: resstat
  type: string
  primary_key: false
  description: 'Resolution progress status (Pending / In Progress / Resolved). KB
    #72 (Premature Resolution Block): updates to ''Resolved'' must be blocked when
    linked investigationdetails.iii > 75.'
  hidden: false
  meta:
    kb_id: 72
- name: penimp
  sql: penimp
  type: string
  primary_key: false
  description: Type of penalty imposed (Warning / Fine / Ban).
  hidden: false
- name: penamt
  sql: penamt
  type: number
  primary_key: false
  description: Monetary amount of fines or restitution in USD.
  hidden: false
  format:
    type: float
- name: legactstat
  sql: legactstat
  type: string
  primary_key: false
  description: Status of any legal proceedings.
  hidden: false
- name: settlestat
  sql: settlestat
  type: string
  primary_key: false
  description: Settlement progress.
  hidden: false
- name: repimp
  sql: repimp
  type: string
  primary_key: false
  description: Estimated reputational impact.
  hidden: false
- name: busrestr
  sql: busrestr
  type: string
  primary_key: false
  description: Extent of business restrictions imposed (Partial / Full).
  hidden: false
- name: remedstat
  sql: remedstat
  type: string
  primary_key: false
  description: Status of required remediation actions.
  hidden: false
- name: traderestr
  sql: traderestr
  type: string
  primary_key: false
  description: 'Trading Restriction Period Types (KB #29): ''Blackout'' = complete
    prohibition on trading specific securities or during certain periods (e.g. around
    earnings). ''Special'' = other case-specific restrictions (order-type / position-size
    limits, pre-trade approvals).'
  hidden: false
  meta:
    kb_id: 29
- name: sysupdneed
  sql: sysupdneed
  type: string
  primary_key: false
  description: Whether surveillance systems require updates.
  hidden: false
- name: polupdneed
  sql: polupdneed
  type: string
  primary_key: false
  description: Need for policy updates.
  hidden: false
- name: trainreq
  sql: trainreq
  type: string
  primary_key: false
  description: Mandatory training requirement type.
  hidden: false
- name: repgenstat
  sql: repgenstat
  type: string
  primary_key: false
  description: How enforcement reports are generated.
  hidden: false
- name: dataretstat
  sql: dataretstat
  type: string
  primary_key: false
  description: Data-retention status for case records.
  hidden: false
- name: auditstat
  sql: auditstat
  type: string
  primary_key: false
  description: Audit-trail completeness for the action.
  hidden: false
- name: conflvl
  sql: conflvl
  type: string
  primary_key: false
  description: Confidentiality level of the case data.
  hidden: false
- name: accrestr
  sql: accrestr
  type: string
  primary_key: false
  description: Access restrictions applied to the case.
  hidden: false
- name: datashare
  sql: datashare
  type: string
  primary_key: false
  description: Data-sharing status with external parties.
  hidden: false
- name: invdetref
  sql: invdetref
  type: string
  primary_key: false
  hidden: false
- name: efir
  sql: penamt * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal, 0)
  type: number
  primary_key: false
  description: "Enforcement Financial Impact Ratio (EFIR = penamt / acctbal) \u2014\
    \ KB #9. acctbal joined via compliancecase.transactionrecord.trader."
  hidden: false
  meta:
    kb_id: 9
- name: lefi
  sql: (penamt * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal, 0))
    * log10(MAX(10.0, penamt))
  type: number
  primary_key: false
  description: "Logarithmic Enforcement Fine Impact (LEFI = EFIR * log10(Max(10, penamt)))\
    \ \u2014 KB #35."
  hidden: false
  meta:
    kb_id: 35
- name: res
  sql: (compliancecase.prevviol * 1.0 / MAX(1.0, compliancecase__transactionrecord__trader.acctdays
    / 365.0)) * (penamt * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal,
    0))
  type: number
  primary_key: false
  description: "Recidivism Enforcement Severity (RES = CRS * EFIR) \u2014 KB #53.\
    \ CRS inlined from compliancecase fields."
  hidden: false
  meta:
    kb_id: 53
- name: is_significant_enforcement_action
  sql: penimp = 'Fine' OR penimp = 'Ban' OR acttake = 'Suspension' OR busrestr = 'Full'
  type: boolean
  primary_key: false
  description: 'Significant Enforcement Action (KB #19): penimp IN (''Fine'',''Ban'')
    OR acttake=''Suspension'' OR busrestr=''Full''.'
  hidden: false
  meta:
    kb_id: 19
- name: is_financially_impactful_case
  sql: (penimp = 'Fine' OR penimp = 'Ban' OR acttake = 'Suspension' OR busrestr =
    'Full') AND ((penamt * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal,
    0)) > 0.1)
  type: boolean
  primary_key: false
  description: 'Financially Impactful Enforcement Case (KB #48): Significant Enforcement
    Action AND EFIR > 0.1.'
  hidden: false
  meta:
    kb_id: 48
- name: is_escalated_compliance_failure
  sql: (compliancecase.prevviol > 3 OR compliancecase.comprate = 'C' OR compliancecase.comprate
    = 'D' OR (compliancecase.prevviol * 1.0 / MAX(1.0, compliancecase__transactionrecord__trader.acctdays
    / 365.0)) > 1.0) AND (penimp = 'Fine' OR penimp = 'Ban' OR acttake = 'Suspension'
    OR busrestr = 'Full')
  type: boolean
  primary_key: false
  description: 'Escalated Compliance Failure (KB #61): Problematic Compliance History
    (joined case) AND Significant Enforcement Action.'
  hidden: false
  meta:
    kb_id: 61
- name: is_costly_high_frequency_risk_enforcement
  sql: ((penimp = 'Fine' OR penimp = 'Ban' OR acttake = 'Suspension' OR busrestr =
    'Full') AND ((penamt * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal,
    0)) > 0.1)) AND (((CAST(json_extract(compliancecase__transactionrecord__trader.trading_performance,
    '$.risklevel.levratio') AS REAL) > 5.0 AND json_extract(compliancecase__transactionrecord__trader.trading_performance,
    '$.risklevel.risklevel') = 'Aggressive') OR (compliancecase__transactionrecord__trader.voldaily
    * 1.0 / NULLIF(compliancecase__transactionrecord__trader.acctbal, 0)) > 0.5) AND
    compliancecase__transactionrecord__trader.freqscope = 'High')
  type: boolean
  primary_key: false
  description: 'Costly High-Frequency Risk Enforcement (KB #69): Financially Impactful
    Enforcement Case AND High-Frequency High-Risk Trader.'
  hidden: false
  meta:
    kb_id: 69
measures: []
aggregations: []
joins:
- target_model: compliancecase
  join_pairs:
  - - compref2
    - compreg
  join_type: left
- target_model: investigationdetails
  join_pairs:
  - - invdetref
    - invdetreg
  join_type: left
filters: []
description: 'Enforcement-action record opened against a compliance case. PK = `enforcereg`,
  FK = `compref2` -> compliancecase, optional FK = `invdetref` -> investigationdetails.
  Carries the action type, escalation level, penalty type/amount, and resolution status.
  KB #72 (Premature Resolution Block): business rule preventing UPDATE of resstat
  to ''Resolved'' when the linked investigationdetails yield III > 75.'
hidden: false
