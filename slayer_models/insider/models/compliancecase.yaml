version: 3
name: compliancecase
sql_table: compliancecase
query_variables: {}
data_source: insider
columns:
- name: compreg
  sql: compreg
  type: string
  primary_key: true
  hidden: false
- name: transref
  sql: transref
  type: string
  primary_key: false
  hidden: false
- name: regfilestat
  sql: regfilestat
  type: string
  primary_key: false
  description: Status of mandatory regulatory filings (Delayed / Missing / Current).
  hidden: false
- name: disclosecmp
  sql: disclosecmp
  type: string
  primary_key: false
  description: Disclosure compliance status (Full / Non-compliant / Partial).
  hidden: false
- name: brokrepstat
  sql: brokrepstat
  type: string
  primary_key: false
  description: Broker-dealer reporting standing (Incomplete / Late / Complete).
  hidden: false
- name: exchnotif
  sql: exchnotif
  type: string
  primary_key: false
  description: Exchange notifications issued (Warning / Inquiry).
  hidden: false
- name: prevviol
  sql: prevviol
  type: number
  primary_key: false
  description: Count of previous compliance violations on record.
  hidden: false
  format:
    type: integer
- name: comprate
  sql: comprate
  type: string
  primary_key: false
  description: 'Compliance Rating Grade (KB #71): A = excellent compliance; B = good
    with minor issues; C = significant deficiencies needing attention; D = serious
    or repeated failures requiring immediate action.'
  hidden: false
  meta:
    kb_id: 71
- name: risksc
  sql: risksc
  type: number
  primary_key: false
  description: Composite compliance risk score.
  hidden: false
  format:
    type: float
- name: alertlvl
  sql: alertlvl
  type: string
  primary_key: false
  description: Current alert severity (Low / Medium / High / Critical).
  hidden: false
- name: invstprior
  sql: invstprior
  type: string
  primary_key: false
  description: Priority assigned for investigation (Low / Medium / High).
  hidden: false
- name: casestat
  sql: casestat
  type: string
  primary_key: false
  description: Lifecycle state of the compliance case (Investigation / Monitoring
    / Closed).
  hidden: false
- name: revfreq
  sql: revfreq
  type: string
  primary_key: false
  description: Frequency of periodic reviews (Daily / Weekly / Monthly).
  hidden: false
- name: lastrevdt
  sql: lastrevdt
  type: string
  primary_key: false
  hidden: false
- name: nextrevdt
  sql: nextrevdt
  type: string
  primary_key: false
  hidden: false
- name: monitint
  sql: monitint
  type: string
  primary_key: false
  description: Ongoing monitoring intensity level (Standard / Enhanced / Intensive).
  hidden: false
- name: survsys
  sql: survsys
  type: string
  primary_key: false
  description: Surveillance system(s) producing the alert (Primary / Secondary / Multiple).
  hidden: false
- name: detectmth
  sql: detectmth
  type: string
  primary_key: false
  description: How the behaviour was detected (Automated / Manual / Hybrid).
  hidden: false
- name: fposrate
  sql: fposrate
  type: number
  primary_key: false
  description: False-positive rate of the detection model (percentage).
  hidden: false
  format:
    type: float
- name: modelconf
  sql: modelconf
  type: number
  primary_key: false
  description: Confidence score returned by the detection algorithm.
  hidden: false
  format:
    type: float
- name: abhvref
  sql: abhvref
  type: string
  primary_key: false
  hidden: false
- name: comprate_value
  sql: CASE comprate WHEN 'A' THEN 1 WHEN 'B' THEN 2 WHEN 'C' THEN 3 WHEN 'D' THEN
    4 ELSE NULL END
  type: number
  primary_key: false
  description: 'Numeric grade derived from comprate (A=1, B=2, C=3, D=4) for use in
    KB #32 (CHS).'
  hidden: false
- name: alert_level_multiplier
  sql: CASE alertlvl WHEN 'Low' THEN 1 WHEN 'Medium' THEN 2 WHEN 'High' THEN 3 WHEN
    'Critical' THEN 4 ELSE NULL END
  type: number
  primary_key: false
  description: 'AlertLevelMultiplier (KB #33): Low=1, Medium=2, High=3, Critical=4.'
  hidden: false
- name: crs
  sql: prevviol * 1.0 / MAX(1.0, transactionrecord__trader.acctdays / 365.0)
  type: number
  primary_key: false
  description: "Compliance Recidivism Score (CRS = prevviol / Max(1, acctdays/365))\
    \ \u2014 KB #5. acctdays joined from transactionrecord.trader."
  hidden: false
  meta:
    kb_id: 5
- name: chs
  sql: 1.0 / (1.0 + (prevviol * 1.0 / MAX(1.0, transactionrecord__trader.acctdays
    / 365.0)) * (CASE comprate WHEN 'A' THEN 1 WHEN 'B' THEN 2 WHEN 'C' THEN 3 WHEN
    'D' THEN 4 ELSE 0 END))
  type: number
  primary_key: false
  description: "Compliance Health Score (CHS = 1 / (1 + CRS * ComplianceRatingValue))\
    \ \u2014 KB #32."
  hidden: false
  meta:
    kb_id: 32
- name: is_elevated_regulatory_scrutiny
  sql: (alertlvl = 'High' OR alertlvl = 'Critical') AND invstprior = 'High' AND monitint
    = 'Intensive'
  type: boolean
  primary_key: false
  description: 'Elevated Regulatory Scrutiny (KB #14): alertlvl IN (''High'',''Critical'')
    AND invstprior=''High'' AND monitint=''Intensive''.'
  hidden: false
  meta:
    kb_id: 14
- name: is_problematic_compliance_history
  sql: prevviol > 3 OR comprate = 'C' OR comprate = 'D' OR (prevviol * 1.0 / MAX(1.0,
    transactionrecord__trader.acctdays / 365.0)) > 1.0
  type: boolean
  primary_key: false
  description: 'Problematic Compliance History (KB #15): prevviol>3 OR comprate IN
    (''C'',''D'') OR CRS>1.0.'
  hidden: false
  meta:
    kb_id: 15
- name: is_chronic_compliance_violator
  sql: (prevviol > 3 OR comprate = 'C' OR comprate = 'D' OR (prevviol * 1.0 / MAX(1.0,
    transactionrecord__trader.acctdays / 365.0)) > 1.0) AND (prevviol * 1.0 / MAX(1.0,
    transactionrecord__trader.acctdays / 365.0)) > 1.5
  type: boolean
  primary_key: false
  description: 'Chronic Compliance Violator (KB #44): Problematic Compliance History
    AND CRS > 1.5.'
  hidden: false
  meta:
    kb_id: 44
- name: is_confirmed_manipulator_under_scrutiny
  sql: (json_extract(transactionrecord.risk_indicators, '$.layerind') = 'Confirmed'
    OR (CAST(json_extract(transactionrecord.risk_indicators, '$.spoofprob') AS REAL)
    > 0.75 AND (CASE WHEN transactionrecord.cancelpct >= 1.0 THEN NULL ELSE transactionrecord.modfreq
    * 1.0 / (1.0 - transactionrecord.cancelpct) END) > 1.0)) AND ((alertlvl = 'High'
    OR alertlvl = 'Critical') AND invstprior = 'High' AND monitint = 'Intensive')
  type: boolean
  primary_key: false
  description: 'Confirmed Manipulator Under Scrutiny (KB #42): Market Manipulation
    Pattern: Layering/Spoofing (joined transaction) AND Elevated Regulatory Scrutiny
    (this case).'
  hidden: false
  meta:
    kb_id: 42
- name: is_severe_chronic_violator_case
  sql: ((alertlvl = 'High' OR alertlvl = 'Critical') AND invstprior = 'High' AND monitint
    = 'Intensive') AND ((prevviol > 3 OR comprate = 'C' OR comprate = 'D' OR (prevviol
    * 1.0 / MAX(1.0, transactionrecord__trader.acctdays / 365.0)) > 1.0) AND (prevviol
    * 1.0 / MAX(1.0, transactionrecord__trader.acctdays / 365.0)) > 1.5)
  type: boolean
  primary_key: false
  description: 'Severe Chronic Violator Case (KB #68): Elevated Regulatory Scrutiny
    AND Chronic Compliance Violator.'
  hidden: false
  meta:
    kb_id: 68
- name: is_high_scrutiny_wash_trading_case
  sql: ((alertlvl = 'High' OR alertlvl = 'Critical') AND invstprior = 'High' AND monitint
    = 'Intensive') AND (json_extract(transactionrecord.risk_indicators, '$.washsus')
    = 'High' AND transactionrecord__trader.voldaily > 1000000)
  type: boolean
  primary_key: false
  description: 'High-Scrutiny Wash Trading Case (KB #63): Elevated Regulatory Scrutiny
    AND High-Volume Wash Trading Concern.'
  hidden: false
  meta:
    kb_id: 63
measures: []
aggregations: []
joins:
- target_model: advancedbehavior
  join_pairs:
  - - abhvref
    - abhvreg
  join_type: left
- target_model: transactionrecord
  join_pairs:
  - - transref
    - transreg
  join_type: left
filters: []
description: Compliance-case record opened against a transaction. PK = `compreg`,
  FK = `transref` -> transactionrecord, FK = `abhvref` -> advancedbehavior. Carries
  the alert level, monitoring intensity, prior-violation count, and the overall compliance
  rating for the trader.
hidden: false
