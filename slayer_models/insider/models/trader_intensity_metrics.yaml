version: 3
name: trader_intensity_metrics
sql: "SELECT\n  t.tradereg,\n  t.voldaily * 1.0 / NULLIF(t.acctbal, 0) AS dtr,\n \
  \ CAST(json_extract(t.trading_performance, '$.risklevel.levratio') AS REAL) AS tle,\n\
  \  (t.voldaily * 1.0 / NULLIF(t.acctbal, 0)) * CAST(json_extract(t.trading_performance,\
  \ '$.risklevel.levratio') AS REAL) AS rat,\n  AVG(CASE WHEN tr.cancelpct >= 1.0\
  \ THEN NULL ELSE tr.modfreq * 1.0 / (1.0 - tr.cancelpct) END) AS avg_omi,\n  AVG(\n\
  \    (0.2 * (CAST(json_extract(tr.risk_indicators, '$.spoofprob') AS REAL) / 100.0))\n\
  \    + (0.2 * (CAST(json_extract(tr.risk_indicators, '$.frontscore') AS REAL) /\
  \ 100.0))\n    + (0.2 * CAST(json_extract(tr.risk_indicators, '$.qstuffindex') AS\
  \ REAL))\n    + (0.2 * (CASE json_extract(tr.risk_indicators, '$.washsus') WHEN\
  \ 'Low' THEN 0.1 WHEN 'Medium' THEN 0.5 WHEN 'High' THEN 1.0 ELSE 0 END))\n    +\
  \ (0.2 * (CASE json_extract(tr.risk_indicators, '$.layerind') WHEN 'None' THEN 0.0\
  \ WHEN 'Suspected' THEN 0.5 WHEN 'Confirmed' THEN 1.0 ELSE 0 END))\n  ) AS avg_sai\n\
  FROM trader t\nLEFT JOIN transactionrecord tr ON tr.trdref = t.tradereg\nGROUP BY\
  \ t.tradereg, t.voldaily, t.acctbal, t.trading_performance"
query_variables: {}
data_source: insider
columns:
- name: tradereg
  sql: tradereg
  type: string
  primary_key: true
  hidden: false
- name: dtr
  sql: dtr
  type: number
  primary_key: false
  hidden: false
- name: tle
  sql: tle
  type: number
  primary_key: false
  hidden: false
- name: rat
  sql: rat
  type: number
  primary_key: false
  hidden: false
- name: avg_omi
  sql: avg_omi
  type: number
  primary_key: false
  hidden: false
- name: avg_sai
  sql: avg_sai
  type: number
  primary_key: false
  hidden: false
- name: ati
  sql: dtr * tle * avg_omi
  type: number
  primary_key: false
  description: "Aggressive Trading Intensity (ATI = DTR * TLE * avg(OMI)) \u2014 KB\
    \ #36."
  hidden: false
- name: swt
  sql: avg_sai * dtr
  type: number
  primary_key: false
  description: "Suspicion-Weighted Turnover (SWT = avg(SAI) * DTR) \u2014 KB #37."
  hidden: false
- name: is_high_velocity_suspicion
  sql: rat > 1.0 AND avg_sai > 0.6
  type: boolean
  primary_key: false
  description: 'High Velocity Suspicion Trader (KB #66): RAT > 1.0 AND avg(SAI) >
    0.6.'
  hidden: false
- name: ass
  sql: avg_sai * (dtr * tle * avg_omi)
  type: number
  primary_key: false
  description: "Aggressive Suspicion Score (ASS = SAI * ATI) \u2014 KB #54. Uses avg(SAI)\
    \ per trader and ATI = DTR * TLE * avg(OMI)."
  hidden: false
