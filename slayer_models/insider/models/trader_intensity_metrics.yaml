description: 'Per-trader intensity metrics combining trader-level DTR/TLE with averaged
  per-transaction OMI/SAI. Encodes KB #36 (ATI = DTR * TLE * avg(OMI)), KB #37 (SWT
  = avg(SAI) * DTR), and KB #66 (High Velocity Suspicion Trader: RAT > 1.0 AND avg(SAI)
  > 0.6).'
